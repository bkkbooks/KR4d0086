front:
  text: 山谷外集詩注卷之一
  hash: sha256:3a746fb69d3795a1ce59065cc197f25bab50787f77a6ec48f52e5a4b8930b656
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_001-1a}
body:
  text: 青神史容撰注賦劉明仲墨竹賦子劉山山川之英骨毛粹清晉元帝紀嵇紹曰琅邪王毛骨非常老杜詩衆中見毛骨猶是麒麟兒用意風塵之表晉王戎傳王衍自然是風塵表物如秋髙月明文選謝靈運詩野曠沙岸净天髙秋月明游戯翰墨龍虵起陸隂符經曰天發殺機龍虵起陸嘗其餘巧檀弓云爾以人之母嘗巧顧作二竹其一枝葉條逹莊子至樂篇此之謂條逹而福持戰國䇿張儀說魏王云魏地四平諸侯四通條逹輻湊東坡嘗以是語記文與可畫云與可之於竹石枯木眞可謂得其理者矣如是而生如是而死如是而攣拳瘠蹙如是而條逹遂茂惠風舉之蘭亭序惠風和暢瘦地筍笴古我反箭莖也杜詩瘦地飜宜粟夏篁解衣三河少年史記貨殖傳昔唐都河東殷人都河内周人都河􅀯夫三河在天下之中若鼎足禀生勦剛退之詩禀生肖勦剛勦輕捷也鋤交切春服楚楚語春服旣成詩衣裳楚楚俠游專塲史記有游俠傳選詩京華游俠客東都賦云秦政利觜長距終得擅塲注云擅專也鮑明逺雉朝飛云專塲挾兩恃強力王謝子弟生長見聞文献不足猶超人羣梁武帝評書云王僧䖍書如􅀭州王謝家子弟縱復不端正皆有一種風氣文献岀語莊子以馭人羣老杜云殊俗自人羣其一折幹偃蹇斫頭不屈蜀志張飛傳飛破巴郡生􅀗太守􅃊顔飛呵顔曰大軍至何不降而敢拒􅀾顔曰我州但有断頭將軍无降將軍也飛怒令左右牽去斫頭顔色不変曰斫頭便斫頭何爲怒􅁘飛壯而釋之拔老葉硬強項風雪後漢董宣傳宣爲洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出以奴驂乗宣大言数主罪叱奴下車格殺之主訴帝帝召宣使叩頭謝主宣不從強使頓之宣兩手據地終不肯俯帝􅀏因勑強項令出賜錢三十萬廉藺之骨成塵凛凜猶有生氣丗說􅁃道季曰廉頗藺相如之骨雖千載尚凛凜有生氣曹蜍李志雖在厭厭如九泉下人鮑明逺云彭韓及廉藺疇昔巳成􅁅雖汲黯之不斈挫淮南之鋒於千里之外汲黯傳上曰人果不可以無斈􅀚黯之言日益甚矣又曰淮南王謀反惮黯曰黯好直諌至說公孫弘等如發􅀩耳子劉子陵雲自許司馬相如傳飄飄有陵雲氣按劒者多鄒陽傳明月之珠夜光之璧以暗投人於道衆莫不按劒相眄者故以㱕我請􅀚謂何黄庭坚曰吾子於此可謂能矣猶有脩篁之歳晚枯枿之發春枿牙葛切西漢叙傳三枿之起注詩云苞有三枿木斫而枿生也亦作蘖孟子云非无萌蘖之生焉少者骨梗梗當作鯁陳平傳項王骨鯁之臣杜周傳朝骨骾之臣注骾即鯁字老而日新附之以傾崖礜石謝靈運云崖傾光難留丘希範云崖傾嶼難傍唐李白云崖傾月難圎摧之以冰霜斧斤第其曾髙昭穆至于來昆仍雲尓雅玄孫之子爲來孫來孫之子爲晜孫晜孫之子爲仍孫仍孫之子爲雲孫組練十幅左㐮三年帥組甲三百􅀍練三千此借用其字文選謝玄暉詩西戡収組練煙寒雨昏廼爲能尽之盖陽虎有若之似夫子市人識之陽虎見孔子丗家有若見仲尼弟子傳顔回之具体門人不知孟子云子夏子游子張皆有聖人之一体冉牛閔子顔渊則具体而微蘇子曰丗之工人或能曲尽其形至於其理非髙人逸才不能辨此語見東坡集中浄因院畫記意其在斯故藉外論之梓人不以􅂟賞成虚莊子云梓􅂟削木爲鐻鐻成見者驚猶􅄦神魯侯問焉對曰臣將爲鐻必齋三日而不敢懷􅂟賞爵禄齋七日忘吾有四肢形体也痀偻不以萬物易蜩莊子云仲尼見痀偻者承蜩猶掇之也仲尼曰子巧乎有道邪曰吾處身也若橛株拘雖万物之多而唯蜩之知吾不反不仄不以万物易蜩之翼何爲而不得及其至也禹之喻於水仲尼之妙於韶禹行水行其所無事孔子聞韶不知􅁏味盖得其妙也盖因物而不用吾私焉若夫燕荆􅀯之無俗氣山谷作道臻師墨竹序云往時天章閣待制燕粛始作生竹超然免於流俗近丗集䝨校理文同遂能極其変態郭若虚圗畫見聞録云燕粛字穆之位龍圗閣直斈士以尚書礼部侍郎致仕善畫山水寒林大堂寺有畫屏風玉堂刑部景寕坊居第及許洛佛寺皆有畫壁所畫近百軸皆取入禁中故丗所傳无幾庖丁之解牛進技以道者也莊子庖丁爲文恵君解牛奏刀騞然莫不中音文恵君曰技盖至此乎庖丁釋刀而對曰臣之所好者道也進乎技矣文湖州之得成竹於胷中坡集文與可畫偃竹記其略云畫竹必先得成竹於胸中執筆熟視乃見其所欲畫者急起從之振筆直遂以追其所見如兎起鶻落少縱則逝矣王㑹稽之用筆如印印泥者也書訣墨薮載顔魯公記張長史筆法云長史日聞於禇河南云用筆當如印印泥錐畫沙􅀄不言出於會稽内史王逸少也當考詩云鶴鳴于九皐声聞于天妙万物以成象繫辝曰神也者妙万物而爲言也必其􅅐中洞然好斈者天不能掣其肘刘子勉旃家語云宓子賤爲單父宰辝去請近史二人與俱二史書子賤掣肘書不善則怒之楊惲傳勉旃无多談放目亭賦走馬承受丁君作亭於其􅅟東北吾友宋楙宗以爲尽表裏江山之勝名其亭曰放目而黔江居士爲之賦山谷以紹聖二年安置黔州歴三􅀊以黔江自号丁君􅅟當在䕫州按前集附載知命詩有行次巫山宋楙宗送折花厨醖詩云喚得巫山強項令揷花傾酒對陽䑓又有宋楙宗􅀉䕫州五十詩三首盖楙宗時宰巫山爲丁君求作此賦楙宗名肇放心者逐指而䘮背孟子放心而不知求又云养其一指而失其肩背放口者招尤而速累退之感二鳥賦祗以招尤而速累自作訿訿詩翕翕訿訿注毀也自増憒憒莊子彼又悪能憒憒然丗說王丞相末年不復省事自嘆曰人言我憒憒後人當思此憒憒登髙臨逺唯放目可以无悔防心以守國之械墨子曰公輸般爲雲梯之械以攻宋墨子解帶爲城以牒爲械公輸般之攻械尽墨子之守固有餘防口以挈瓶之智左傳雖有挈瓶之智守不假器山谷與一僧簡云持心如城守口如瓶必有相應者以此放目焉墨丈尋常而見万里之外國語其察色也不過墨丈尋常之間注五尺爲墨倍墨爲丈八尺爲㝷倍㝷爲常後漢竇融傳天子明見万里之外古詩溪上吟并序山谷生於􅂟暦五年乙酉至嘉祐六年辛丑年十七春山鳥啼新雨天霽汀草怒長竹篠交隂黄子􅀚漁於塘下㝷春于小桃源從以溪童稚子畦丁三四輩茶鼎酒瓢渊明詩編雖不命戒未甞不取諸左右臨滄波拂白石詠渊明詩数篇清風爲我吹衣好鳥爲我􅂆飲當其漻然无所拘係而依依規矩凖䋲之間自有佳処乃知白蓮社中人不逹渊明詩意者多矣過酒肆則飲亦无量也然未始甚醉盖其所遇與畢卓刘伶輩同而自謂所得與二子異人亦殊未能知之也酒酣得紙書之爲溪上吟短生无長期靈運豫章行短生旅長丗􅁪斍白日欹天台賦嗟人生之短期孰長年之能執􅂓暇日婆娑王粲登楼賦􅂓假日以消􅁨李善本作暇注云暇或作假離騷經􅂓假日以偷楽􅀘注云顔師古曰日中心愁悶假延目月苟爲娛楽耳今俗猶言借時度日言暇者非國風宛丘云婆娑其下出門望髙丘拱木漫春蘿左秦繆謂蹇叔尓墓之木拱矣試爲省􅄦録魏文帝與呉質書云􅀚其姓名巳爲􅄦録不飲死者多安能如南山千􅀊保不磨送窮文吾立子名百丗不磨在丗崇名節飄如赴燭蛾漢婁護傳論議常依名節選詩努力崇名徳南史􅀓亮傳直􅀫禁中睹夜蛾赴燭作感物賦以􅀉意及汝知悔時万事蓬一窠太白詩昔日万乗墳今成一科蓬又蓬科馬鬛今巳平青青陵陂麥妍暖亦巳花莊子儒以詩礼發冢小儒曰詩固有之青青之麥生於陵陂長煙淡平川孟浩然詩㣲雲淡河漢輕風不爲波无人按律吕好鳥自和􅁔杖藜山中㱕莊子原憲杖􅀺而出牛羊在坡陀本自无廊庿王羲之傳報殷浩書曰吾素无廊庿政尓楽澗阿渊明詩御冬足大布麁絺以應陽政尓不能得哀哉亦可傷洪駒父詩話称山谷云渊明詩云政頼古人書政尓不能得政冝委運去皆當時語而或者改作上頼古人書止尓不能得甚失句法詩考槃在澗考槃在阿念昔􅀭子雲刻意師孟軻狂夫移九鼎深巷考四科亦有好事人時能載酒過无疑㪯尓酒定知我爲何􅀭雄字子雲其賛云雄三丗不徙官及王莽􅆲位談說之士用符命称功徳􅀗封爵者甚衆雄復不侯人希至其門時有好事者載酒肴從㳺斈四科謂徳行言語政事文斈而四科字見論語正義退之詩遇酒即酩酊君知我爲誰莊子云刻意尚行離丗異俗清江引時年十七江鴎揺蕩荻花秋老杜詩揺蕩菊花期楽天詩楓葉荻花秋索索八十漁翁百不􅁨杜詩吾知徐公百不􅁨清曉采蓮來盪槳楽府有采蓮曲老杜詩不有小舟能盪槳百壷那送酒如泉夕陽収䋄更横舟羣児斈漁亦不悪晉謝道藴傳王郎逸少子不悪老妻白頭從此楽全家醉着蓬底眠唐韓渥詩漁翁醉着无人喚過午醒來雪滿舡南唐近事史虚白詩風雨掲却屋渾家醉不知舟在寒沙夜潮落還家呈伯氏元注云葉縣作山谷年二十三治平四年丁未登進士第授汝州葉縣尉明年改元熈寕去日櫻桃􅀄破花㱕來着子如紅豆四時驅迫少須􅁷兩鬢飄零成老醜老杜云親故傷老醜永懷往在江南日原上急難風雨後私田苦薄王稅多諸弟號寒諸妺痩退之云冬暖而児號寒扶將白髮渡江來漢孝景王皇后傳云女逃匿扶將出拜楽府木蘭􅁔爺嬢聞女來出郭相扶將吾二人如左右手韓信傳如失左右手晉邵續傳續諫成都王討長沙王云兄弟如左右手苟從禄仕我邅田屈原九􅁔云邅吾兮洞庭注邅轉也陟連切惜誦云欲儃佪以干傺兮注儃知然切且慰家貧兄孝友強趍手板汝陽城晉輿服志古者貴賤皆執笏主書君上之教令後惟八座執笏其餘卿士但執手板示非記事官也退之贈張籍詩上馬揷手板和盧郎中詩行抽手板付丞相􅀕文云朱衣象板盖唐人以笏爲板􅀄无分別也更責愆期􅀍訶詬詩匪我愆期法官毒螫草自揺西都賦蕩亡秦之毒螫螫舒亦切丞相霜威人避走丞相謂冨文忠公也按實録熈寕元年二月判河陽冨弼判汝州明年二月冨公復拜相山谷之官當是熈寕元年戊申盖外集有詩其序云巳酉二月按闘死者於舞陽壁間得往􅀊書拂塵落筆之時􅀚者左右去歳即戊申也賤貧􅀌逺盖如此此事端於我何有一嚢粟麥七千錢東方朔傳侏儒長三尺余奉一嚢粟錢二百四十臣朔長九尺余亦奉一囊粟錢二百四十五人兄弟二十口官如元亮且折腰晉書云陶潜字元亮宋書云陶潜字渊明或云渊明字元亮南史云陶潜字渊明或云字深明名元亮昭明大子作傳云陶渊明字元亮或云潜字渊明諸書皆云爲彭澤令郡遣督郵至縣吏白應束帶見之潜嘆曰吾不能爲五斗米折腰事郷里小人解印去縣心似次山羞曲肘元結次山集有悪曲一篇古人有􅁖曲者不曲臂以取物不曲􅂰以便坐北䆫書􅁽乆不開筐篋黄塵生鏁鈕賈􅁩䟽云俗吏之所務在於刀筆筐篋而不知大体師古筐篋所以盛書何當略得共討論論語丗叔討論之况乃雍容把盃酒意氣敷􅃾貴壯年鮑昭行路難云意氣敷􅃾在盛時老杜兩公壯藻思得我色敷􅃾不早計之且衰朽安得短舡万里隨江風养魚去作陶朱公斑衣奉親伯與儂陶朱公养魚法見齊民要術其略云以六畒地爲池池中有九洲六谷求鯉魚納池中列女傳老萊子养二親行年七十着五色采衣爲小児啼大業拾遺記帝嘲羅娘云幸好留儂伴成夢不留儂住意如何帝自逹廣陵多效呉語故称儂云四方上下相依從退之詩四方上下逐東野雖有離別无由逄用舎由人不由己語爲仁由己而由人乎哉乃是伏轅駒犢耳田蚡傳今日廷論局􅃐効轅下駒流民嘆按實録熈寕二年正月判汝州冨弼言唐鄧㐮汝地廣不耕河北流民至者日衆若尽給以閑田使􅀗生养實兩得其便云云此詩言河北灾傷流民至襄葉間可見在葉縣作朔方頻年无好雨杜好雨知時節五種不入虛春秋漢伍􅀍傳秦時徐福入海多齎五種而行注五谷之種也月令首種不入迩來后土中夜震有似巨鰲復戴三山逰列子五山之根不得暫峙帝使巨鰲十五㪯首而戴之二山流於北極傾墙摧棟壓老弱􅁈声未定随洪流地文劃劙水觱沸退之􅀕神文劃劙隂雲卷日月也劙力支切詩觱沸檻泉沸音弗十戸八九生魚頭南史康絢傳淮水􅁀漲堰壞奔流于海殺数万人恠物随流而下或人頭魚身或龍形馬首退之月蝕詩堯呼大水浸十日不惜万國赤子生魚頭盖効玉川子詩天髙日走沃不及但見万國赤子生魚頭也稍聞澶渊渡河日数万河北不知虚幾州纍纍襁􅀒㐮葉間問舎无所耕无牛三國志刘備謂許汜云君求田問舎言无可采此借使其字􅀄來猶自得曠土嗟尓後至將何怙退之桃源詩􅀄來猶自念郷邑歳乆此地還成家詩无父何怙刺史守令真分􅁨老杜同元使君春陵詩序曰當天子分􅁨之地明詔哀痛如父母前漢西域傳武帝末年遂弃輪䑓之地而下哀痛之詔廟堂已用伊周徒謂冨公巳拜相也何時眼前見安堵杜詩何時眼前突兀見此屋田單傳即墨即降願無虜掠吾族家妻子令安堵漢髙祖紀吏民皆安堵如故踈逺之謀未易陳市上三言或成虎韓非子云魏使龐葱與太子質於邯郸謂魏王曰今一人言市有虎王信之乎曰否兩人言王信之乎王曰寡人疑之矣三人言王信之乎王曰寡人信之矣葱曰市亦無虎明矣然三人言而成虎今邯郸去大梁也逺於市而議臣者過於三人願王察之禍災流行固無時堯湯水旱人不知左傳天灾流行國家代有漢食貨志堯有九年之水湯有七年之旱􅁊侯之疾􅀄無證扁鵲入秦始治病史記扁鵲傳鵲過齊謂􅁊侯曰君有疾在腠理不治將深􅁊侯曰寡人無疾後五日復見曰疾在血脉􅁊侯不應後五日復見望見􅁊侯而走投膠􅄹匊俟河淸抱朴子云寸膠不能理黄河之濁左傳曰周詩有之俟河之清人壽幾何一簞豈能續民命南史劉懷珍族弟善明靑州饑善明有積粟開倉以賑郷里多􅀗全濟百姓呼其家田爲續命田雖然猶願及此春略講周公十二政周禮地官司徒以荒政十有二聚萬民云云詩意謂扁鵲巳去而始治病固無及矣以一簞食一瓢飲而欲救民死言賑濟無益也雖如此而及今春講荒政猶庻幾風生羣口方出竒史記白起賛料敵合変出竒無窮老生常談幸聽之三國志􅃹輅傳鄧颺曰此老生常談次韻荅張沙河知邢州沙河縣此以下皆北京教授時作此詩云古人已悲銅雀上銅雀䑓在相州相魏鄰境也葉縣詩多刪去僅存兩首及律詩数篇餘見内集十四卷盖刪去也張侯堂堂身八尺老大無機如漢隂莊子曰子貢過漢隂見一丈人方將爲圃畦鑿隧而入井抱甕而出􅈅子貢曰有械於此鑿木爲機後重前輕挈水若抽其名爲槹夫子不欲乎爲圃者曰吾聞有機械者必有機事有機事者必有機心吾非不知羞而不爲也猛摩虎牙取吞噬法言云茅焦雖辯摩虎牙矣此語必有謂自嘆日月不照臨詩日居月諸照臨下土策名日已汙軒冕左傳策名委質莊子繕性篇非軒冕之謂也逃去未必焚山林琴操曰介子推作龍蛇之􅁔而隠文公求之不肯出乃燔木子推抱木而死魏志太祖聞阮瑀名辟之不應逃入山中太祖使人焚山得之我評君才甚髙妙􅀌竹截管空桑琴漢律暦志黄帝使伶倫自太夏之西昆侖之隂取竹之解谷生其竅厚均者断兩莭間而吹之以爲黄鍾之宮周禮曰􅀌竹之管雲和之琴瑟雲門之舞又曰孫竹之管空桑之琴瑟咸池之舞四十未曽成老翁文選魏文帝與呉質書曰已成老翁但未白頭耳老杜丈夫盖棺事如定君今幸未成老翁紫髯垂頥鬱森森献帝春秋曰張遼問呉降人向有紫髯將軍是誰降人荅曰是孫會稽眉宇之間見風雅文選枚叔七發云陽氣見於眉宇之間侵􅁋而上杜詩眉宇真天人藍田煙霧生球琳李商隠詩藍田日暖玉生煙司空圗集云詩家之景如藍田日暖良玉生煙禹貢云厥貢惟球琳琅玕胷中碨磊政須酒丗說阮籍胸中礨隗故須澆之東海可􅄃北斗斟詩維北有斗不可以挹酒漿楚詞九􅁔云援北斗兮酌桂漿古人巳悲銅雀上不聞向時清吹音文選弔魏武帝文曰吾婕好妓人着銅雀䑓月朝十五日輙向帳作妓文選謝玄暉銅雀䑓詩云欎欎西陵樹詎聞􅁔吹聲鮑明逺集行路難云不見栢梁銅雀上寕聞古時清吹音百年毀譽付誰定取醉自可結舌瘖杜詩乘舟取醉非難事退之詩三盃取醉不復論晉叚灼傳云智直之不用皆杜口結舌使公繫腰印如斗晉周顗傳顧左右曰今年殺諸賊奴取金印如斗大繫肘駟馬髙盖驅駸駸漢于定囯傳少髙大閭門令容駟馬髙盖車詩載驟駸駸親朋改觀婢僕敬成都男子寕異今孟郊詩云親賔改舊􅀚僮僕生新敬漢䔥望之傳䔥育杜陵男子何詣曹也又言屋底甚懸罄屋底見上左傳室如垂罄兒婚女嫁取千金後漢向長傳男女娶嫁古來聖賢多不飽誰能獨無父母心白樂天詩遂令天下父母心不重生男重生女衆鶵墯地各有命強爲百草􅁨春霖佛書云朝生王子一日墮地便勝凡人傳玄楽府云男兒當門戸墯地自生神前集書贈俞清老其略云男女婚嫁渠儂墮地自有衣食分斉今蹙眉終日者正爲百草􅁨春雨耳艾封人子暗目睫與王同床悔沾􅁭莊子曰麗之姫艾封人之子也晉國之始得之也涕泣沾􅁭及其至於王所與王同床食蒭豢而後悔其泣也史記齊使者至越日幸也越之不亡也吾不責其智之如目見毫毛而不見其睫也隴鳥入籠左右啄文選鷦鷯賦鸚鵡恵而入籠鸚鵡賦命虞人於隴抵南方異物志廣管雷羅等州多鸚鵡但稍小不及隴山者終日思歸碧山岑韓詩遥岑出寸碧一生能幾開口􅀏莊子盗跖篇其中開口而􅀏者一月之中不過四五日何忍更遣百慮侵昜云一致而百慮忽投雄篇冩逸興仰占乾文動奎參孝經援神契云奎主文章詳見第四卷答莘老詩注參與奎皆西万七􅀫故云自陳使酒甞罵坐漢書季布使酒難近􅈅夫罵坐不敬惜予不與朋合􅆪君材蜀錦三千丈要在刀尺成衣衾文選郭㤗機詩衣工秉刀尺棄我忽若遺南朝例有風流癖楚地俗多詞賦􅁋用晉書杜預左傳癖皇甫謐書􅁋之義言耽惑也屈原離騷豈不好只今漂骨滄江潯屈原作懷沙之賦於是懷石自投汨羅以死見史記本傳正令夷甫開三窟晉王􅄛傳􅄛字夷甫雖居􅌠輔而爲自全之計乃以弟澄爲荆州族弟敦爲青州謂曰卿二人在外而吾留此足爲三窟矣獵以我道皆成禽楊子云獵德而得德前集有詩云安得八紘􅆯以道獵衆智文選張平子思玄賦績典藉以爲罟兮驅儒墨以爲禽取此意也温恭忠厚神所勞於魚得計豈厭深莊子云於蟻弃智於魚得計又云魚鱉不厭深丈夫身在要勉力退之詩身在則有餘豈有吾子終陸沉莊子云方且與丗違而不屑與之俱是陸沉者也鄙人相士盖多矣漢髙紀臣少好相人相人多矣無如季相勿作蔡澤􅀏噤吟楊雄解嘲云蔡澤雖噤吟而􅀏唐㪯噤音巨錦反吟魚錦反史記蔡澤傳澤從唐舉相曰吾聞先生相李兊曰百日之内當持國秉政有之乎唐舉熟視而􅀏曰先生曷鼻巨肩魋顔蹙齃􅂰攣吾聞聖人不相殆先生乎次韻時進叔二十六韻時子河上園竹間開棟宇繫辭云上棟下宇大兒勝衣冠小兒豐頰輔後漢禰衡傳大兒孔文舉小兒楊德祖史記三王丗家皇子頼天能勝衣趍拜檀弓云如不勝衣万石君傳云子孫勝冠者韓文始任戴冠易咸其輔頰舌左傳􅂖也豐下必有後於魯國嫁女與朱公伏臘可稱舉謂稱觴舉酒也漢楊惲傳歳時伏臘烹羊炮羔斗酒自勞髮踈雖蒼浪張鷟僉載􅀘遺云王熊爲洛陽令判婦人阿孟狀云阿孟身年八十􅁂髮早巳滄浪齒嚼未齟齬楚詞云吾固知其齟齬而難入雞棲牛羊下見國風詩各自有室處四墙規摹小易守若􅅬莒舎前花木深唐常建詩竹徑通幽處禆房花木深春物麗觀覩舎後曲池蛙楚詞坐堂伏檻臨曲池齋堂風月苦盧仝詩使君池亭風月苦此豈不足歟退之詩擺頭􅀏且言我豈不足欤歎歳不我與見論語客宦􅀌雲耳未知秦呉楚向來千駟公果愧一丘土千駟見論語選詩昔爲萬乘君今爲丘山土寕當損軒昂退之聽琴詩劃然変軒昻聊欲效俯傴左傳正考父三命兹益共故其鼎銘曰一命而偻􅄪命而傴三命而俯時子听然􅀏子虚賦亡是公听然而􅀏吾巳悟倉䑕史記李斯傳斯年少時爲郡小吏見吏舎厠中䑕食不㓗近人大数驚恐之斯入倉􅀚倉中䑕食積粟居大廡之下不見人犬之􅁨斯嘆曰人之賢不肖如䑕矣在所自處耳乃從荀卿斈帝王之術少猶守章句晚實爱農圃農圃見論語鵲巢最知風蟻穴識隂雨漢翼奉傳巢居知風穴處知雨文選張茂先詩巢居知風寒穴處識隂雨丗網事諳委文選詩丗網嬰我身退之與桞中丞書與賊不相諳委醉郷俗淳古唐王績醉郷記末云醉郷之俗豈古華胥之囯乎何其淳寂也坐忘两家說肉堅與腸腐晋孔羣傳羣嗜酒王導戒之曰卿不見酒家覆瓿布日月乆糜爛􅁘答曰公不見肉糟淹更堪乆􅁘酒至即使傾杜詩毎過得酒傾客來敢辝窭曲礼客歠醢主人辝以窭時邀五桞陶陶潜有五桞先生傳共過三徑詡漢書鮑宣傳後載自成帝至王莽時清名之士十二人蔣詡元卿爲兖州刺史以廉直爲名王莽居攝以病免官歸郷里卧不出户渊明有聖賢集録云求仲羊仲皆挫廉逃名蔣元卿之去兖州還杜陵荆􅁄塞門舎中有三逕惟二人從之游時人謂之二仲見嵇康髙士傳徃在少年場漢尹賞傳賞守長安令􅄂㪯輕薄少年􅁖子殺数百人瘞寺門􅁊東長安中歌之曰安所求子死􅁊東少年場生時諒不謹枯骨後何葬豪氣壓頴汝晋周顗傳汝頴固多竒士祖納傳汝頴之士利如錐借令今尚爾眞復難共語晋石勒傳勒􅀏曰胡人正自難與言稍知憐麴蘖退之詩髙士例湏憐麹蘖丈夫終莫生畦畛字本出書􅀃命云云漸解等灉濋元注云水自河出爲灉自濟出爲濋見爾雅釋水朋友半山阿光隂共行旅人故義當親衣故義當􅀘古艶􅁔曰焭焭白兎東走西顧衣不如新人不如故飛鳬至令尹後漢王喬傳爲葉令有神術毎月朔望常自縣詣䑓朝顕宗恠其來数而不見車􅀐宻令伺之言其臨至􅂺有双鳬從東􅀯來於是候鳬至舉羅張之但得一􅃗舄乃詔尚方􅐷視則四年中所賜官属履也期我向君所君爲拂眠床􅀯史魚弘傳有眠床一張皆是蹙栢淹留莫城阻唐歐陽詹􅀄發太原途中􅀉太原所思云高城巳不見况復城中人二月丁卯喜雨呉体爲北門留守文潞公作按實録熈寕七年判河陽文彦􅀶判大名府乘輿齋祭甘泉宮甘泉本秦離宮漢武帝増廣之自武帝至西漢末皆上甘泉祠􅀕遣使駿奔河岳中書武成云丁未祀于周庿􅀖甸侯衛駿奔走執边豆誰與至尊分旰食仲舒傳制曰朕承至尊休德左傳伍奢曰楚君大夫其旰食乎北門卧鎮司徒公唐裴度傳度節度河東帝諭意曰爲朕卧護北門可也微風不動天如醉􅁃信哀江􅀯賦云天何爲而此醉元注云時聞太母閔雨勤甚故有微風不動之句盖言􅁨勤如此而天不聞有若醉焉􅃳物無聲春有功老杜詩云􅃳物細無聲三十餘年霖雨手見書􅀃命淹留河外作時豐古風次韻答􅀄和甫飢思河鯉與河魴並見毛詩渴思蔗漿玉盌凉楚詞招䰟云胹鼈炮羔有柘漿冬願純綿對隂雪王褒頌云荷㫋􅀍毳者難與道純綿之䴡宻夏願縐絺度盛陽囯風􅂪彼縐絺萬端作計身愁苦王莽傳所以誑事大后下至旁測方故萬端一事不諧􅁂蒼浪後漢宋弘傳帝顧謂主曰事不諧矣蒼浪見上調􅀏天街吟海燕文選詩調􅀏􅂺酬荅嘲謔無慙沮晋天文志昴畢之間謂之天街梁呉筠燕詩一燕海上來一燕髙堂息藜羮脫粟非公狂王褒頌云羮藜􅍭糗者不足與論大牢之滋味脫粟見孫洪傳君吟春風花草香杜詩春風花草香我爱春夜璧月凉陳書后妃傳其曲云璧月夜夜滿美人美人隔湘水杜詩美人胡爲隔秋水其雨其雨怨朝陽阮藉其雨怨朝陽蘭荃􅄹懷報瓊􅅼左聲伯夢渉河或與巳瓊􅅼食之泣而爲瓊瑰􅄹其懷􅁔曰済洹之水贈我以瓊瑰歸乎歸乎瓊瑰􅄹吾懷乎又見毛詩冠纓自㓗非滄浪見孟子及楚詞道人四十心如水孟子我四十不動心漢鄭崇傳臣門如市臣心如水那得夢爲蝴蝶狂莊子齊物篇莊周夢爲胡蝶栩栩然胡蝶也自喻適志與不知周也俄而覺則蘧蘧然周也不知周之夢爲胡蝶與胡蝶之夢爲周與次韻荅和甫盧泉三首并序􅀄虞丗字和甫善醫有必用方行於丗盧其所居也時在河北和甫作盧泉之水不求於古楽府而規摹暗合余爲和成三疊自余官河外罕得逆耳之言於朋交和甫爱我也居有薬言吾不欲其思盧泉也故作其一父母之􅀖有如仲尼桞下恵而懷安之以吾之楽双井知和甫之不忘盧泉也故作其二坐進此道者於物无擇清漳之波濁河之流盧泉之水求其異味而不得也親楽之身安之斯可矣故作其三夫三言者雖不同唯知言者領其不異也􅀄侯不能六尺長史記晏氏傳云其御之妻謂其爲之晏子長不滿六尺身相齊囯顕名諸侯少日結交皆老蒼杜詩脫略小時輩結交皆老蒼􅀔利不可更炎凉漢張耳陳餘賛􅀔利之交古人羞之老杜詩且復過炎凉大白詩榮枯異炎凉解纓從我濯滄浪解纓見上與君論心松栢香取後凋之義何爲獨憶盧泉之上多緑楊盧泉如練照秋陽謝玄暉詩澄江净如練泉上之人猶謗傷退之詩不知羣児愚那用故謗傷此􅀖雖陋有佳士勿厭風沙吹茫茫願君不􅀒上池水史記扁鵲傳長桑君呼扁鵲與語曰我有禁方年老欲傳與公乃出其懷中薬子扁鵲曰飲是以上池之水三十日當知物矣其後扁鵲過虢虢太子死扁鵲能生之故天下盡以扁鵲爲能生死人扁鵲曰越人非能生死人也此自當生者越人能使之起耳囊中探丸起人死漢尹賞傳長安閭里少年相與探丸爲弹得赤丸者斫武吏得黒者斫文吏借此以言丸薬詩意謂薬石之言也盧泉之木百尺長下䕃泉色如木蒼蘋風荷雨洒面凉倒影揺蕩天滄浪杜詩影動倒景揺瀟湘網登錦鱗蒲荇香杜詩渚蒲牙白水荇青何以貫之桞與楊石皷文其魚維何維鱮維鯉何以貫之維楊與桞古來希價入咸陽史記吕不韋傳不韋著呂氏春秋布咸陽市門懸千金其上有能増損一字者子千金貪功害能相中傷文選李陵答􅂫武書妨功害能之臣盡爲萬戸侯白楽天詩自賢誇智慧相紏闘功能君今巳出紛争外但思煙波春淼茫奉親安楽一杯水李白詩萬言不直一杯水此摘其字盧泉之濵可忘死說苑楚昭王欲之荆䑓司馬子棊諌曰荆䑓之遊左洞庭右彭蠡其楽使人遺老而忘死舎後鍾􅆊爐煙長杜詩􅆊放時出寺鍾殘仍殷床舎前簾影竹蒼蒼事親煗席扇枕凉東􅀚漢記曰黄香躬勤苦盡心供飬冬無􅀍袴而親極滋味暑即扇枕寒即以身温席陶渊明黄香賛其序云九歳失母思慕骨立事父竭力以致飬暑則扇床枕寒即以身温席本傳不載中有一士􅁂蒼浪見上同心之言蘭麝香繫辝同心之言其臭如蘭與游者誰似姓楊朝發枉渚夕辰陽屈原九章云朝發枉渚兮夕􅀫辰陽懷瑾握瑜祗自傷九章又云懷瑾握瑜􅀆窮不知所示東有濁河西清漳漢髙祖紀田肯曰夫齊西有濁河之限胡爲搔頭盧泉思茫茫李固傳搔頭弄姿注引西漢雜記武帝過李夫人就取玉簮搔頭清明在躬不在水礼清明在躬志氣如神此曹狡獪可心死神仙傳王逺謂麻姑曰吾老矣不復作此狡獪変化也列子云心死形廢招子髙二十二韻兼簡常甫丗弼我行向厭次厭次棣州所治縣也夏扇日在揺甘􅀲未除壟髙桞尚鳴蜩詩小弁菀彼桞斯鳴蜩嘒嘒駕言􅂓攝歸詩駕言出游聊攝􅀶州所治聊城縣也即左傳所謂聊攝以東飛霜曉封條文選􅄂擬詩嘉樹生朝陽凝霜封其條􅀒薪泣裘􅄄公子御狐貂王孫子曰昔衞君重裘累䄄而坐見路有􅀒薪而哭者問其故對曰雪下衣薄是以哭也見藝文􅀋聚王褒頌云襲狐裘之煗者不􅁨至寒之悽惨法言云舉丗寒貂狐不亦燠乎歳月坐晼晚選詩思君令人老歳月忽已晚宋玉九卞曰日晼晚其將入􅀆􅁂顔颯然凋道德千古事斯文非一朝杜詩文章千古事得失寸心知徃者我不及離騷云徃者不可及􅀆來者猶可待後生多見超退之詩只見有不如不見有所超吾黨二三子士林􅋍􅀌標小謝抱周易忘言獨參寥莊子玄􅁳聞之參寥參寥聞之疑始崔郎楚左史楚左史􅀝相二典考舜堯王生風雅斈談辯秋江潮釋氏所謂海潮音也洒筆驚有司小敵謂可驕光武紀諸部喜曰刘將軍平生見小敵怯今見大敵勇可怪也安知樗蒱局臨開敗三梟李翶有五木經云樗蒱五木玄白判又云王采四甿采六白二玄三曰梟又曰馬出􅀄開疊行非王采不出閞二生数歩隔屡赴茗埦邀陸羽茶經四之器曰盌越州上明州次婺州次岳州次小謝殊未來選詩日暮碧雲合佳人殊未來我斍百里遥問之􅁨菽水見孟子心慮極無聊賈􅁩傳一二指慉心慮無聊父憐母不訶日以濁酒澆酒澆見上此道如鼎實念子羮未調文選潘安仁詩王生和鼎實書曰若作和羮爾惟塩梅古來有親飬回也楽一瓢不田鶉生宎在物乃爲妖莊子曰吾未嘗爲牧而羊生於奥未嘗好田而鶉生於宎吾言有師承後漢儒林傳序師資所承可信如斗杓斗杓招遥星也詩以解子􅁨亦以當子招此詩言三子者㪯進士不中選謝治易崔習書王習詩不爲不至而譬之於􅀶有勝􅀒也小謝懟而不出自言無以奉菽水之􅂬故爲言顔子事親一簞食一瓢飲不改其楽以解其􅁨也王純亮字丗弼山谷妺婿山谷至自厭次盖以檄考試進士也外集刪去詩中有一詩其叙云次韻荅常甫丗弼二君不利秋官鬱􅊊不平故予詩多及君子處得失事與此篇同時林爲之送筆戯贈閻生作三副規畫宣城葛三副栗尾􅀥核散卓皆筆名東坡云宣城諸葛氏筆擅天下其間不甚佳者終有家法如北苑茶内庫酒教坊楽雖弊精神欲強斈之而草野氣終不可脫外貌雖銑澤毫心或麄糲尓雅絶澤謂之銑注云美金光澤也蜀志張裔傳張府君如瓠壷外雖澤而内實麄杜詩百年麄糲腐儒餐功將希栗尾拙乃成棗核李􅂟縳散卓東坡云散卓筆惟諸葛能之他人斈者皆得其形似而无其法反不如常筆含墨能不􅂥退之毛頴傳頴爲人強記無不愛重又善隨人意後雖見廢弃終黙不􅂥病在惜白毫徃徃半巧拙小字亦周旋大字難曲折時時一毛乱乃似逆梳髮張鼎徒有表明皇雜録上欲相􅂫頲夜艾召直􅀫舎人䔥嵩草詔旣成其詞曰囯之瓌寳上曰頲瓌之子不欲斥其父名當爲刋削乆之復進唯改曰囯之珍寳上擲其草曰虚有其表耳此借喻也徐偃元無骨後漢東夷傳注云徐君宮人娠而生􅆑弃之有犬名鵠蒼衘􅆑以歸遂生小児生而偃因以名尸子曰偃生而有筋無骨故曰偃東坡云魯直出衆工筆使僕歴試筆鋒如着塩曲蟮詰曲􅁓上魯直云此徐偃筆也有筋無骨可謂名不虚得如東坡之言則徐偃有筋無骨非獨山谷借喻亦當時固有此語􅁘模畫記姓名項籍傳書足記姓名而已亦可應倉卒爲之街􅀯居時通鈴下謁晋羊祐傳鈴閣之下侍衛不過数人楊方傳􅀄爲郡鈴下威儀晴軒坐風凉怪我把枯筆開囊撲蠧魚遣奴送一束洗硯磨松煤揮􅎈至日没蚤年斈屠龍莊子朱泙漫斈屠龍於支離益弹千金之家技成無所用其巧適用固踈闊自言所斈不同流俗若屠龍之技無所用之如退之書云凢所辛苦而僅有之者皆符於空言而不適於實用故斈成而道益窮年老而身愈困也廣文困虀塩唐増囯子斈置廣文舘以鄭䖍爲􅀶士山谷時爲大名府囯子監教授故以自况退之送窮文云太斈四年朝虀暮塩烹茶對秋月略無人問字况有客投轄楊雄傳刘棻常從雄斈作竒字陳遵傳遵嗜酒毎大飲賔客滿堂輙閞門取客車轄投井中雖有急不得去文章􅀉呻吟講授費頰舌閑無用心處雌黄到筆墨晋王􅄛傳丗號口中雌黄時不與人遊即歳不我與意也巳見上孔子尚爱日楊子法言或曰孔子之道不可小欤曰小則敗聖如何曰若是則何爲去乎曰爱日曰爱日而去何也曰由羣婢之故也作詩當鳴鼔聊自攻短闕用論語鳴鼔而攻之自攻其短也退之詩還家雖闕短指日親晨飡此摘其字􅄪和答爲之君莫嘲廣文沍寒􅀍絺葛左傳其藏冰也深山窮谷固隂沍寒北史􅀽充傳年十餘歳父黨至門時冬􅀄充尚求葛衫客戯曰絺􅀆葛􅀆凄􅀆以風充應聲曰唯絺唯綌服之无斁杜詩焉知􅀯鄰客九月猶絺綌君勿嘲廣文窮年飯粢糲列子云食則粢糲居則蓬室常恐爼豆子與丗充肴核莊子云老􅆅之役有庚桑楚者居畏壘之山三年而畏壘大壌畏壘之民相與言曰胡不尸而祝之社而稷之庚桑子聞之曰畏壘之細民而􅀼竊然欲爼豆子於賢人之間小雅边豆有楚殽核惟旅凡木不願材退之􅀕子厚文凡木之生不願爲材大折小枝洩檪依曲轅社聊用神其拙莊子曰匠石之齊至于曲轅見檪社樹其大蔽牛􅀚者如市匠石頋曰散木也無所可用故能若是之壽匠石歸櫟社見夢曰汝將烏乎比予哉若將比予於文木􅁘夫柤􅀺橘柚果蓏之属實熟則剥則辱大枝折小枝􅂥吾家本江􅀯一丘藏曲折杜詩一丘藏曲折緩歩有躋攀瀕溪䕃蒼筤係辝震爲蒼筤竹䔥􅎈可散髮文選嵇叔夜詩散髮岩岫旣無使鬼錢晋魯褒錢神論云錢無耳可使􅄦又無封侯骨漢翟方進傳從蔡父相蔡父大竒其形皃謂曰小史有封侯骨當以經術進薄禄庇閑曹且免受逼卒爲此􅂴出門徒弊懷中謁漢髙祖紀乃紿爲謁曰賀錢萬師古曰爲謁者書刺自言爵里若今參見通名也後漢禰衡傳隂懷一刺旣無所之至於刺字漫㓕直齋賔客退風物供落筆詩成着牀頭晋王湛傳牀頭有周易不知今幾束君何向予勤見詩歎埋没嗣宗湏酒澆見上未信胷懷闊自狀一片心唐裴度自賛曰一片靈䑓丹青莫狀碧潭浸寒月寒山子詩我心似秋月碧潭清皎㓗令德感來教爲君賦車轄小雅門閞車之轄􅀆此篇又云令德來教君思揚雄吒吒當爲吃本傳口吃不能劇談何似張儀舌史記張儀傳儀云視吾舌尚在否此意恐太狂願爲引繩墨此語盖荅其和章之意望其規正如木従繩也政使此道非改過從今日報章望瓊琚見毛詩勿使音塵闕文選月賦美人邁􅀆音塵闕謝靈運詩各勉日新志音塵慰寂㓕􅄪和答爲之林君維閩英数面成􅀲葛渊明集答龐參軍詩序云俗諺曰数面成親况情過此者乎晋王導傳導與其子恱弈碁争道導􅀏曰相與有􅀲葛那得爲尓􅁘鄰居接扙藜過飯厭踈粝漢鮑宣傳俱過宣一飯去後漢苐五倫傳不過従兄飯杖藜見上大雅云彼䟽斯稗箋云䟽麄也謂糲米也退之詩䟽糲亦足飽我饑讀書飽工夫論事極精核􅀯史王僧䖍傳文帝書天然勝羊欣工夫少於欣漢書孝宣之治綜核名實政亊文學法理之士咸精其能􅁬身君子場勇若怒未􅂥東都賦云馬踠餘足士怒未渫窮年棲旅巢易旅卦鳥焚其巢由命非由拙王良驅八駿左傳哀二年郵無䘏御簡子注王良也左傳又􅁛子良又曰郵良穆天子傳云八駿之乘盗􅌐赤􅂹曰義渠黄騮緑耳方駕度九折九折阪在漢蜀郡􅃊道縣王尊叱馭處學堂踈雨餘退之秋懷詩斈堂日無事石砌長苔髮尓雅藫石衣注云水荅也一名石髪弟子肥如瓠漢張蒼傳肥白如瓠先生痩唯骨元注云林君在朱氏講授朱氏児皆面白豊肥林君如刻削北門一都會一都㑹也史記貨殖傳多有此語塵埃人卒卒司馬迁書卒卒無湏􅁷之間霍光傳見雲家卒卒髙盖如秋荷势利相奔謁􅀔利之交見上惟君尚寂寞來􅀚草玄筆揚雄傳雄作大玄自言寂寞爲尸斯文未易陳政當高閣束退之詩春秋五傳束髙閣字本出􅁃翼傳金馬事陸沉史記滑稽傳東方朔􅁔曰陸沉於俗避丗金馬門市門逐乾没貨殖傳刺綉文不如􅀝市門張湯傳始爲小吏乾没未湏相賢愚退之别趙子云冝各從所務詎用相賢愚聊自嘲迂濶憶昨戯贈詩迺辱報明月邹陽傳明月之珠夜光之璧極知推挽意左傳或推之或挽之我車君欲轄見前篇車轄注屠龍真狂言屠龍見前篇奔馬不及舌語駟不及舌自悔出屠龍之語也第二篇固云此意恐大狂頋爲引䋲墨賜書盈五車莊子曰惠施多方其書五車直舎方二墨見上㑹意便欣然渊明集五桞先生傳云好讀書不求甚解毎有㑹意便欣然忘食餘事過窗日尚恐素飡錢諸生在城闕詩不素飡􅀆又云挑􅀆逹􅀆在城闕􅀆髙祖紀賜餐錢奉邑贈趙言饒陽趙方士眼如九秋鷹釋氏書云舎利弗此言鶖鷺子以其母眼如鶖鷺也此用其意斈書不成不斈劒項籍傳斈書不成去斈剱又不成去心術妙解通神明醫如府身拾地芥夏侯勝傳取青紫如俯拾地芥耳相如仰面􅀚天星劉向傳夜􅀚天星自言方術􅄂􅄦怪萬種一貫皆天成一貫見語大梁卜肆傾賔客二十餘年聲籍籍得錢滿屋不経營寒山子詩丈夫莫守困無錢即􅀴營散與市人還􅀉食韓信􅀉食於漂母北門塵土滿衣􅁭廣文直舎官槐隂杜詩廣文到官舎白雲􅂆酒終日醉紅燭圍碁清夜深大車駟馬不囬首史記范騅傳湏賈曰吾非大車駟馬不出強項老翁來見㝷強項見上向人忠信去表襮詩素衣朱襮尓雅黼領謂之襮退之云襮順而裏方可喜正在無機心機心見上軽談禍福邀重糈史記貨殖傳諸食技術之人爲重糈也司馬季主傳卜而有不審不見奪糈注云騷経曰懷椒糈以要之王逸云糈精米所以享神所在多於竹葦林維摩􅀴云譬如甘蔗竹葦稲麻叢林翁言此軰無足聽見葉知根論才性飛騰九天沉九泉漢郊祀志九天巫祠九天師古曰九天謂中央鈞天東方蒼天東北旻天北方玄天西北幽天西方造天西􅀯朱天􅀯方炎天東􅀯陽天其􅀃見淮􅀯子九渊有九名見莊子應帝王篇晋胡奮傳聞女爲貴人哭曰老奴不死唯有二児男入九地之下女上九天之上自種自収皆在行班固奕㫖曰􅀶懸於投不必在行先期出語駭傳聞事至十九中時病輪囷離竒惜老大成器本可千萬乘邹陽傳蟠木根柢輪囷離竒而爲萬乘器自歎輕霜白髮新又去驚動都城人都城逹官老於事退之詩中朝大官老於亊嫌翁出言不娬媚唐魏徴傳帝曰人言徴㪯止踈慢我但見其娬媚耳前集元師此君軒詩云神人傳書道人命死生禍福如㸔鏡晚知直語觸憎嫌深藏幽寺聽鍾磬與此同意有手莫炙􅁠門火杜詩炙手可热势絶倫唐崔鉉傳曰鄭楊叚薛炙手可热有口莫辯荆山玉新序曰荆人卞和得玉璞而献之荆厲王王使玉尹相之曰石也以和爲謾而断其左足武王即位和復奉璞而献之武王使玉尹相之曰石也又断其右足共王即位和乃奉璞而哭於荆山三日三夜泣盡而継之以血共王使人問之對曰寳玉而名之以石貞士而戮之以謾此臣之所以悲也王乃使人理其璞而得寳玉焉名之曰和氏之璧吴宫火起燕焚巢此語謂上句􅁠門火越絶書吴西宫在長秋門秦始皇十一年守宮者照燕失火燒也鮑照空城雀云猶勝吴宫燕無罪得焚巢李白野田黄雀行遊莫逐炎洲翠棲莫近吴宮燕吴宮火起焚尓巢炎洲逐翠遭網羅當時卞和斮两足此語謂上句荆山玉千里辝家却入門韓詩二十辝家來射䇿三春榮木會歸根歸去來詞木欣欣以向榮老子云夫物芸芸各復歸其根歸根曰静我有江􅀯黄篾舫隋書煬帝紀上御龍舟幸江都文武官五品以上給楼􅂳九品以上給黄篾與公長入白鷗羣莊子曰入獸不乱羣入烏不乱行次韻晁􅀘之廖正一贈答詩按晁无咎集云及第東歸將赴調􅀉李成季又云復用前篇韻答明略并呈魯直按登科記巳未元豐二年晁􅀘之廖正一同榜晁字无咎廖字明略无咎集中又有建除体詩荅魯直教授時教授北京也晁子抱材耕谷口楊子曰谷口鄭子真耕乎岩石之下丗有髙賢踐台斗杜詩及乎貞􅀚􅀄尚書踐台斗頃入計吏西入閞漢朱買臣隨上計吏爲卒將重車至長安閞夫数日傳車還漢終軍傳􅀄軍從済􅀯當詣􅀶士歩入閞閞吏予軍繻曰爲復傳軍曰大丈夫西遊終不復傳還退之詩屈指数日怜嬰孩字本左傳行則数日而返封侯半属妄校尉射虎猛將猶行間李廣傳廣與王朔語曰自漢擊匈奴廣未嘗不在其中而妄校尉以下材能不及中以軍功取侯者数十人廣不爲後人然終無尺寸功以得封邑何也廣出獵見草中石以爲虎而射之中石没矢視之石也老杜贈司空王思礼云未甚拔行間犬戎大充斥字本出漢吴王濞傳諸客皆得爲將校尉行間候司馬無因自致青雲上史記范睢傳湏賈曰不意君能自致於青雲之上浪􅀃諸公見嗟賞張文潜誌无咎之墓云年十三從王安囯於常州斈官安囯名重天下一見公大竒之公從皇考於杭之新城作七迷今端明􅂫公試通判杭州讀之嘆曰吾可以閣筆矣延譽公如不及由此名籍甚􅂹伏塩車不稱情賈􅁩弔屈原賦口􅂹垂两耳服塩車􅀆輕裘肥馬鳯凰城裘馬見論語鳯凰城謂汴京也刘夢得詩􅀯山􅀫雨晴春入鳯凰城此言長安也建中靖囯􅀄陳無巳在館中和謝公定雨行逢賣花云得知春入鳯凰城可見指帝城矣盖兩人方賜第歸來也臨安雖有鳯凰山趙清献詩云老來重守鳯凰城然與此不相渉前集詩亦借長安以言汴京歸來作詩謝同列句與桃李争春榮十年山林廖居士今隨詔書􅁛㪯子文章宏䴡斈西京新有詩聲似侯喜退之石鼎聮句序云侯喜新有能詩聲君不見古來良爲知音難絶弦不爲時人弹後漢景丹傳何意二郡良爲我來此摘其字揚雄傳觧嘲云鍾期死伯牙絶絃破琴而不肯與衆鼔巳喜瓊枝在我側楚詞折瓊枝以継佩晋衛玠傳珠玉在側斍我形穢更恨桂樹無由攀淮􅀯小山云桂樹叢生􅀆山之幽偃蹇連蜷􅀆枝相繚攀援桂枝􅀆聊淹留千里風期􅀄不隔杜詩風期終破浪獨怜形迹滯河山再次韻呈廖明略吾􅀚三江五湖口周礼聀方氏揚州其川三江其浸五湖湯湯誰能議升斗湯湯見書莊子外物篇鮒魚對曰君豈有斗升之水而活我􅁘物誠有之士則然司馬相如諌書曰人誠有之士亦冝然晩得廖子喜往還斈如雲夢吞八九子虚賦吞若雲夢者八九文如壯士開黄間李廣傳廣以大黄射其禆將注黄肩弩也黄肩即黄間大黄其大者也十年呻吟江湖上青楓由鷗付心賞選詩心賞猶難恃又懷人去心賞未减北郭漢先生五府交書不到城元注云漢汝􅀯廖扶按本傳州郡公府辟召皆不應時人號爲北郭先生相者㪯肥􅂹空老宋玉九辯云今之相者􅀆㪯肥史記滑稽傳諺曰相馬失之瘐相士失之貧山中無人桂自榮楚詞䴡桂樹之冬榮君旣不能如鍾丗美匭凾上書動天子按實録元豐元年十一月乙酉大斈生鍾丗美爲試校書􅀰睦州軍事推官大斈正以内舎生上書稱首故也又按續通鑑長編云或刻丗美書印賣上批丗美所論有經制四夷等事傳播非便令開封禁之又按九朝通略云元豐二年先是大斈生宣城鍾丗美欲上辟雍圗㑹得假歸寕旣還而新斈已成因再上書論斈校云云又言前二府大臣見於政事其德弥邵而道藝足爲後斈之師者孰若以提㪯大斈今乃使之退託於山林無用之地良爲可惜丗美所謂大臣盖指王安石也其後擢丗美爲中書習斈公事又按黨事始末云建中靖囯元年九月乙未詔中書省開具元符三年臣僚姓名正上六人丗美爲首又云庚子中書省検㑹元符三年宣德􅀰提㪯福建路常平鍾丗美應詔上書當復熈寕元豐紹聖政事以銷天変可贈諌議大夫與一子郊社斎􅀰鍾丗美何足言山谷盖戯語也正堪一􅀏耳而當時用亊者之所升黜實係囯之㒷替不可不記也羣書所紀始末皆不詳故具列於此按唐武后垂拱二年三月鑄銅爲匭置之朝堂以受天下表䟽退之詩匭凾朝出開明光且向華隂郡下作參軍要令公怒令公喜晋郄超傳􅁊温辟爲􅁺時王珣爲温主簿皆爲温所重府中語曰髯參軍短主簿能令公喜能令公怒超髯珣短故也君不見晁家楽府可􅃹弦前集詩云晁子庿中雅􅁔自注云无咎楽府於今第一惜無傾城爲一弹漢李夫人傳􅁔曰北方有佳人絶丗而獨立一顧傾人城再顧傾人囯從軍􅀘􅁺百僚底老杜詩有材無命百僚底九閞虎豹何由攀楚詞招䰟云虎豹九閞啄害下人男児身徤事未定且莫著書藏名山杜詩男児功名遂亦在老大時又云丈夫盖棺事始定司馬迁書云著書藏之名山傳之其人走答明略適堯民來相約奉謁故篇末及之君不見生不頋爲牛後寕爲雞口囯策􅂫素􅀃韓王云鄙語曰寕爲雞口不爲牛後今西面交臂而事秦何異牛後乎吾聞向來得道人終古不忒如維斗莊子云維斗得之終古不忒終古猶言常也希價咸陽諸少年見盧泉詩註可推令往挽令還異乎汲黯招之不來麾之不去也管子書云推之而往引之而來俗學風波能自拔莊子云俗斈以求復其􅀄我識廖侯眉宇間唐元德秀傳見紫芝眉宇使人名利之心都盡莊子云老子謂􅀯榮趎曰吾見汝眉睫之間吾固以得汝矣省庭無人與争長左􅀮十一年􅅬侯薛侯來朝爭長主司得之如受賞大白送人赴選詩云夫子有盛材主司得球琳䔥何傳進賢受上賞東家一􅀏市盡傾略无下蔡與陽城文選宋玉賦登徒子云臣里之美者莫若臣東家之子嫣然一􅀏惑陽城迷下蔡傾城見上漢司馬相如傳一坐盡傾生珠之水砂䃯􅃳生玉之山草木榮荀子曰玉在山而木潤渊生珠而崖不枯陸機文賦云石韞玉而山輝水懷珠而川媚􅀚君詞章亦如此諒知躬行有君子論語躬行君子則吾未之有得更約探囊閱旧文莊子云胠篋探囊蛛絲燈花􅂇我喜西京􅄂記蜘蛛集而百亊喜杜詩燈花何大喜退之燈花詩更頌將喜亊來報主人翁盧仝詩一片新茶破鼻香請君速來􅂇我喜賢楽堂前竹影斑好鳥自語莫令弹退之竹徑詩無塵從不掃有鳥莫令弹北鄰著作相勞苦漢張耳傳勞苦如平生􅂬整駕謁子邀同攀漢王式傳􅁔􅌐駒注云逸詩篇名客欲去􅁔之其詞曰􅌐駒在路僕夫整駕應煩下榻煮茶薬文選沈休文詩賔至下塵榻王勃􅅬王閣記云徐穉下陳蕃之榻坐待月輪衘屋山退之詩每􅀐屋山下窺瞰答明畧併􅀉无咎可以忘􅁨唯有酒漢東方朔傳銷􅁨者莫如酒晋顧榮傳嘗縱酒酣暢曰惟酒可以忘􅁨但無如作病何耳清聖濁賢皆可口三囯徐邈傳平時醉客謂酒清者爲聖人濁者爲賢人莊子曰其猶柤棃橘柚邪其味相反而皆可於口前日過君飲不多明日解酲無五斗晋劉伶傳一飲一石五斗解酲古木清隂丹井欄大白詩絡緯秋帝金井欄夜來凉月屋頭還論交撥置形骸外渊明詩撥置且莫念一觴聊可揮莊子云申屠嘉兀者也而與鄭子産同師於伯昏無人申屠嘉曰今子与我遊於形骸之内而子索我於形骸之外不亦過乎得意相忘樽爼間氷壷不可與夏虫饗莊子秋水篇夏虫不可以語於氷者篤於時也秋月不可與俗士賞已得樽前两友生更思一士済陽城雖無四至九卿之規畫汲黯傳姊子司馬安善䆠四至九卿猶有千秋萬歳之真榮渊明挽詩千秋萬歳後誰知榮與辱杜詩千秋萬歳名寂寞身後亊空名未食大倉米史記平凖書大倉之粟陳陳今作斑衣老萊子斑衣見上卿家嗣宗望尓來不獨我聞足音喜晋阮籍字嗣宗以况堯民尭民盖无咎諸父行如嗣宗之於阮咸也故其詩云巳得樽前两友生更思一士済陽城两生謂尭民明畧而无咎時在済州済州其所居也號済陽郡莊子逃空谷者聞足音跫然而喜西風索寞葉新乾退之秋懷詩霜風侵梧桐衆葉著樹乾長鋏歸來亦罷弹史記孟嘗君傳馮弹其剱而􅁔曰長鋏歸來乎食无魚窮巷􅅾蒿􅀷一丈三輔决録張仲蔚所居蓬蒿没人朱門廉陛髙難攀賈􅁩傳故陛九級上廉逺地則堂髙陛亡級亷近地則堂卑吾儕相逢置是亊可丗之下仰髙山毛詩髙山仰止再次韻呈明略并􅀉无咎夏雲凉生土嚢口陶潜詩夏雲多竒峯宋玉風賦盛怒於土囊之口周鼎湯盤見科斗礼記有湯之盤銘衛孔悝之鼎銘左傳有正考父鼎銘尚書序云皆科斗文字清風古氣滿眼前乃是户曹報章還只今書生無此語巳在貞元元和間韓愈賛正元和間愈遂以六經之文爲諸儒唱一夫鄂鄂獨無望千夫唯唯皆論賞啇鞅傳趙良曰千羊之皮不如一狐之腋千夫之諾諾不如一士之諤諤趙丗家簡子曰吾聞千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舎之鄂鄂是以􅁨也野人泣血漫相明和氏之璧無連城和璧見上連城見藺相如傳參軍拄笏㸔雲氣晋王徽之傳爲車􅀐􅁊冲􅀐兵參軍冲謂曰卿在府日乆比當相料理徽之髙視以手板拄頰云西山朝來致有爽氣耳此中安知枯與榮我夢浮天波萬里扁舟去作䲭夷子史記范蠡浮海自謂䲭夷子兩士風流對酒樽四無人聲鳥聲喜退之履霜操云四無人聲誰與児語夢囬􅅰􅅰仍丗間心如傷弓怯虚弹囯䇿曰有雁從東方來更嬴虚發而雁下魏王曰射可至此乎更嬴曰其飛徐其鳴悲飛徐者故瘡痛也鳴悲者失羣也故聞弦音而下不堪市井逐乾没乾没見張湯傳且頋朋舊相追攀􅀉聲小􅁺篤行李落日東面空雲山趙廣漢傳云亭長􅀉聲謝我鮑照詩頋尓篤行李􅄪荅明略二首挾䇿讀書計糊口莊子問臧奚事則挾􅁽讀書左傳使糊其口於四方故人南箕與北斗詩維􅀯有箕維北有斗言離别江􅀯江北萬重山文選謝靈運詩江􅀯倦歴覧江北曠周旋千里􅀉書聲不還當時朱弦冩心曲果在髙山深水間礼記清庿之瑟朱弦而䟽越秦囯風乱我心曲􅀃􅁐曰伯牙子鼔琴鍾子期听之方鼔而志在太山子期曰巍二乎若太山少選之間而志在流水子期復曰湯湯乎苦流水子期死伯牙破琴絶弦終身不復鼔琴枯桐滿腹生蛛網忍向時人覔清賞七卷律詩有云忍向時人覓賞音廖侯文字得我驚五岳縱横守􅃊城萬夫之下不稱屈䔥何傳能詘於一人之下而信於萬乘之上此借使其字定知名滿四海非真榮冨於春秋巳如此曹參傳悼恵王冨於春秋髙五王傳皇帝春秋冨它日卜鄰長児子一丘各自有林泉扶將白頭親宴喜扶將見上詩稱宴喜者􅄪山谷所引盖魯頌所謂魯侯宴喜令妻壽豈也秋風日暮衣裳单楽天詩如何爲不念馬痩衣裳单深巷落葉巳如弹数來㑹面復能幾六龍去人不可攀文選郭景純遊仙詩六龍安可頓運流有代謝注曰六龍日駕也李善曰楚詞云貫鴻以東朅􅀆維六龍於扶桑王逸曰結轡於扶桑以留日曹子建與吴季重書云思抑六龍之首頓羲和之轡短􅁔溷公更一和􅂓乞淮􅀯作小山楚詞有刘安招隠士一首王逸云淮􅀯小山之所作也廖侯言如不岀口礼檀弓趙文子其言呐呐然如不出諸其口銓量古今膽如斗莊子銓才諷􅀃之士音義云輇七全切輇量人也蜀志姜維膽大如斗度越崔張與二班崔張謂崔瑗張衡二班謂彪與固也楊雄賛則必度越諸子矣古風蕭蕭筆追還前日辝家來射䇿退之短檠􅁔大斈儒生東魯客二十辝家來射䇿聲名籍甚諸公間陸賈傳名聲籍甚晁錯傳後鄧公其子章顕諸公間華隂白雲鎻千嶂勝日一談誰能賞晋衞玠傳遇有勝日親友時請一言無不咨嗟以爲入微君不見􅇮時子産識然明左㐮二十五年晋程鄭卒子産始知然明注前年然明謂程鄭將卒知音鬱鬱閉佳城西漢􅄂記􅅬公駕至東都門馬以足跑地得石槨銘曰佳城鬱鬱三千年見白日吁嗟􅅬公居此室勿以匣中之明月計較糞上之朝榮漢邹陽傳明月之珠夜光之璧朝榮謂朝菌也莊子音義云朝菌天隂生糞上見日則死文選楽府王明君辝昔爲匣中玉今爲糞上英我去丘園十年矣種桑可􅅙犢生子使年七十今中半山谷年二十三治平四年擢進士第至熈寕丁巳七十將半矣寒山子詩飬得一牸牛生得五犢子犢子又生児積数无窮巳安能朝四暮三浪􅁨喜莊子狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆恱據席談經只強顔不安時論取譏弹文選曹子建與楊德祖書僕嘗好人譏弹其文有不善者應時改定爱君草木同臭味頗似􅀲葛相依攀左㐮八年李武子曰今譬於草木寡君在君君之臭味也又二十二年鄭公孫僑對曰謂我敝邑迩在晋囯譬諸吾臭味也􅀲葛見上注我有仙方煮白石何時期君藍田山神仙傳白石先生常煮白石爲粮杜詩云未試囊中湌玉法明朝且入藍田山李預居長安每羡古人飡玉之法躬往藍田掘得若環璧􅄂器者百餘椎爲屑日服食之見魏書李先傳後次韻感春五首我與子桑友旣往雨弥旬莊子曰子輿子桑友而淋雨十日子輿曰子桑殆病矣褁飯而往食之交情未曽改用漢書翟公書門之語而反其意所謂一死一生乃知交情一貴一賤交情乃見天地忽趍新東風無行迹佳􅂔滿城闉鮑明逺詩􅃊車臨逈陌延瞰歴城闉麥苗生陂隴歎息不食陳麥生陵陂見上注左傳不食新矣今巳及麥故云不食陳誰能褁飯來定是寂寞人一曲古流水志在流水見上註試拂絃上塵古木少生意輪囷卧河濵慙愧桃與李相隨見陽春張侯脫朝衣児􅄄多純緑礼記深衣具父母衣純以青聞道無米㫪煮术斈辟榖神仙傳㳙子齊人也好餌术張良傳即導引不食谷注服辟谷薬官吏但索錢退之嗟哉董生行云門外惟有吏日來徴租更索錢詔書哀惸獨小雅苛矣冨人哀此惸獨東方九尺長不得侏儒禄東方朔亊見上屋中聲鵝鴈日暮攪心曲退日酬崔十云云有時未朝飡得米日巳晏隔墻聞讙呼衆口極鵝鴈心曲見上注窮巷無桃李緼􅂁非春服見論語我吟白駒詩知君在空谷祁寒不可怨天道自平分書冬祁寒小民亦惟曰怨咨宋玉九辨云皇天平分四時􅀆切獨悲此凛秋退之詩云皇天平分成四時春風誕謾最可悲及爾春風來四肢有餘温丈夫力如虎詩簡􅀆有力如虎爲人行􅈅園邹陽書於陵仲子辝三公爲人􅈅園椒蘭工壅蔽未可怨芳蓀離騷經云余以䔵爲可恃􅀆􅆧無實而容長椒專侒以慢慆􅀆榝又欲充夫佩愇又云覧椒蘭其若兹􅀆又况揭車與江離注云蘭懷王少弟司馬子蘭也椒楚大夫子椒也寒魚守窮轍􅂪呴一沬恩莊子泉涸魚相與處於陸相呴以湿相濡以沫窮轍見後篇枯魚注一朝􅀍湔祓吹毛見瘢痕囯䇿汙明􅀃春申君曰君獨無湔祓僕也文選廣絶交論云剪拂使其長鳴注云與湔祓同吹毛求疵見前漢中山靖王勝傳君面有瘢美玉可以㓕瘢注云瘢瘡痕也見王莽傳鳥聲春漸長煙雨春薄暮風光不長妍如客暫時寓芸芸物爭時老子曰大物芸芸各復歸其根天地有常度東方朔客難曰天有常度地有常形君子有常行我行覩大河黄流日東騖退之感二鳥賦出囯門而東鶩喟然欲乘桴見語莽不見洲渚張侯但飲酒無用恨覉旅十年冨貴子今作一丘土文選七哀詩昔爲萬乘君今爲丘山土茶如鷹􅀲拳湯作􅈉眼煎時邀草玄客北苑修貢録茶有小芽有中芽小芽者其小如鷹􅀲蔡君模茶録云候湯最難未熟則沫浮過熟則茶沉前丗謂之􅈉眼者過熟湯也揚雄傳云時雄方草大玄有以自守泊如也晴明坐􅀯軒􅀏談非丗故嵇康書云丗故繁其慮七不堪也獨立萬物先春風引車馬隠隠何闐闐蜀都賦車馬雷駭轟轟闐闐髙盖相磨戞􅀐奴爭道喧史記田仁任安傳曰平陽主家令两人與􅀐奴同席而食漢霍光傳两家奴爭道杜詩瑶池􅂔鬱律羽林相摩戞吾人撫榮觀宴處自超然老子曰雖有榮􅀚燕處超然城中百年木有鵲巣其㒹鳲鳩來相宅日暮更謀迁書洛誥云召公旣相宅詩維鵲有巣維鳩居之聖柬將寓于衛行乞食於齊有可怜之色􅄪次韻感春五首贈之温氣冰底歸忽忽六過旬易曰過旬災也園林改柯葉礼器云如竹葥之有筠也如松栢之有心也故貫四時而不改柯易葉鳥聲日日新耕稼百年外四郊無短闉曲礼四郊多壘此卿大夫之辱也髙丘試顧望俯仰迹巳陳蘭亭禊飲序云俛仰之間巳爲陳迹信陵松鬱鬱不見􅇮時人史記魏公子无忌封爲信陵君大名府即魏也空懷􅀒暄賞列子宋囯有田夫謂其妻曰􅀒日之暄人莫知者以献吾君將有重賞莫望屬車塵司馬相如諌獵書云犯屬車之清塵詩意言雖不忘君而无因自進也腹中書萬卷阽死溝壑濵騷經云阽余身而危死􅀆漢文紀云阽於危亡注云近边欲墮之意音簷一音反坫之坫東方朔傳先狗馬填溝壑投壷與射覆一􅀏物皆春東方朔傳上嘗使諸数家射覆置守宮盂下射之皆不能中朔自賛曰臣嘗受易請射之迺别蓍布封而對曰臣以爲龍又無角謂之爲蛇又有足􅉥􅉥脉脉善縁壁是非守宮即蜥蝪上曰善賜帛十疋復使射他物連中􅂺賜帛朔平原厭次人厭次今棣州所治縣也與大名相近神異經曰王女投壷天爲之􅀏則爲電種萱欲遣􅁨叢薄空自緑嵇康飬生論云合􅂬蠲忿萱草忘􅁨洗心日三省易聖人以此洗心語吾日三省吾身人亦不我穀詩此􅀖之人不我肯榖誰能書䆫下草玄抱幽獨太白詩誰能書閣下白首大玄經抱獨見陶詩白首官不迁校書漢天禄三丗不徙官校書天禄閣見雄傳身當萬户侯見此篇上谷注皷吹擁部曲解佩着犀渠吴都賦家有鶴􅂰户有犀渠注鶴􅂰矛也犀渠楯也張弓揷彫服周礼司弓中秋献矢菔韓文弓韔服矢揷房何時李將軍射獵出上谷李廣傳数從射獵文帝曰令當髙祖時萬户侯何足道哉景帝時爲上谷太守春風鳴布榖尓雅鳲鳩鴶鵴注今布谷也杜詩云布谷處處催春種天道似􅂆分左僖二十一年務穡􅂆分持飢望路人誰能顔色温􅀏憶枯魚􅀃詼諧老􅃮園莊子曰莊周貸粟於監河侯監河侯曰我將得邑金貸子三百金可乎周曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之對曰我東海之波臣君豈有斗升之水而活我哉周曰我且􅀯遊呉越之王激西江之水而迎子可乎鮒魚忿然作色曰吾得斗升之水然活耳君乃言此曽不如索我於枯魚之肆詼諧見東方朔賛􅃮園見上注湘纍不得禄哀怨冩荃蓀楊雄弔屈原文曰因江潭而淮記􅀆敬弔楚之湘纍千年澗谷松慚愧兩露恩思爲萬乘器萬乘器見上注頋掩斧鑿㾗退之詩徒􅀚斧鑿痕風雨桃李華佳人來何暮後漢廉范傳廉叔度來何暮詩日暮碧雲合佳人殊未耒安齊果未安寓衛豈所寓􅁃信集中詠懷詩云寓衛非所寓安齊獨未安按左傳晋公子重耳出奔及齊齊􅁊公妻之有馬二十乘公子安之從者以爲不可囯風式微􅀺侯寓于衛張侯室縣磬見上注得酒美無度詩彼其之子美無度常􅁨腐腸死三囯陳思王傳注云丁儀父冲過諸將飲醉爛腸死文選枚乘七發云命曰腐腸之薬湏我嫁阿騖三囯朱建平傳􅀄荀攸鍾繇相親善攸先亡子㓜繇與人書曰吾與公逹曽共使朱建平相建平曰荀君雖少然當以後亊付鍾君吾時啁之曰惟當嫁卿阿騖耳何意戯言遂験乎今欲嫁阿騖使得善處䨇魚傳尺素何處迷春渚文選詩客從逺方來遺我双鯉魚呼童烹鯉魚中有尺素書啼鳥􅂆不歸暁鞍逐行旅遥知登楼興信美非吾土王粲登楼賦雖信美而非吾土􅀆曽何足以少留魯公但食粥百口常􅁨煎顔魯公帖云拙於生亊㪯家食粥巳数月今又罄竭秪益􅁨煎恵及少米實済艱勤金張貴席寵張安丗傳功臣之丗惟有張氏親近貴顕比於外戚刘向傳産禄席大后之寵注席因也奴􅊢乘朱軒鮑照詩奕奕朱軒馳丈夫例寒餓萬丗无後先風霾天作􅁖詩終風且霾羲之傳􅂺作数日􅁖雷亦怒闐闐俄傾花桞静煙暖谷鳥喧司空圗集戴容州云詩家之景如藍田日暖良玉生煙人事毎如此飜覆不常然杜萬亊反覆何所無下流多謗議司馬迁荅任安書貧下未易居下流多謗議髙位又疾㒹囯語髙位實疾僨厚味實醋毒空餘壯士志不逐四時迁選詩賞逐四時移山谷外集詩註卷一
