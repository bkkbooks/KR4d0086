  text: 山谷外集詩註卷第十四
  hash: sha256:5565302edf8411e3bae611b963fd6a527048f18c305e4a2e1d66a6b7f7fdf9ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_014-1a}
body:
  text: 次韻元翁從王䕫玉借書爲吏三年弄文墨文選劉公幹詩職事相塡委文墨紛消散注云漢書功臣皆曰蕭何文墨顧居臣上草萊心徑失耕鋤孟子今茅塞子之心矣常思天下無雙祖得讀人間未見書後漢黄香傳京師號曰天下無雙江夏黃童肅宗詔香詣東􅀚讀書所未甞見者公子藏山眞冨有言其藏書如老氏藏室道家蓬萊山也繫辭冨有之謂大業小兒捫腹正空虚退之詩詩書勤乃有不勤腹空虚何時管鑰入吾手爲理籖題撲蠧魚杜詩書籖映􅂩曛蠧魚見上奉和孫奉議謝送菜春􅂼照映􅁃郎貧南史􅁃杲之傳􅁃郎貧食鮭遣􅀐持籠佐茹葷杜詩遣􅀐問所須莊子人間丗篇不飲酒不茹葷却得齋厨厭滋味白鵝存掌鱉留裙江南别録云僧謙明好詩酒烈祖問其所求曰惟願鵝生四箇腿鱉生兩重裙陶岳五代史􅀘亦云學元翁作女兒哺口詩五老峰見上前萬頃江女兒哺口鴛鴦雙女兒浦􅀠江州德化驚飛何處沙上􅀫夜雨釣􅂳燈照䆫去歳和元翁重到雙澗寺觀余兄弟題詩之篇揔忘収録病中記憶成此詩素琴聲在時能聽陶潜傳蓄素琴一張白鳥盟寒乆末㝷左傳盟可㝷也不可寒也眼見野僧垂雪髮飬親元不顧朱金史記聶政傳嚴仲子具酒聶政母前奉黄金百鎰爲母壽聶政固謝曰家貧飬親親供飬備不敢當仲子之賜列女傳秋胡子之妻曰妾採桑奉二親不願人之金法言曰紆朱懷金之樂開泉浸稻双澗水煨笋充盤春竹林安得一􅌀吾欲老君聽莊舄病時吟史記陳軫傳軫至秦恵王曰子去寡人之楚亦思寡人否對曰王聞夫越人莊舄乎莊舄仕楚執珪有頃而病楚王曰舄故越之鄙人也今仕楚執珪貴冨矣亦思越不對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人往聽之猶越聲也今臣雖棄逐之楚豈能無秦聲哉次韻知命入青原山口坑路羊腸繞魏武苦寒行羊腸坂詰曲車輪爲之摧注太行羊腸在太原稻田棋局方林間塔餘寸風外竹斜行吠客犬反走驚人鳥坌忙山形與祖印岑絶兩相當傳燈録中華􅀄祖逹磨傳慧可曰諸佛法印可得聞乎又云内傳法印以契證心次韻吉老知命同遊靑原洗鉢㝷思去傳燈録行思禪師傳師得法於曹溪住􅁻州青原山静居寺六祖將示滅有沙㳽希遷問曰和尚百年後希遷當依附何人祖曰㝷思去及祖順丗遷毎於静處端坐第一坐曰汝有師兄行思和尚今住吉州汝因縁在彼師言甚直汝自迷耳遷便禮辭去直詣静居論詩匡鼎來見上鵶窺􅃬處井如羅浮山卓􅃬泉也梁景㤗禪師居此山病無水師卓錫於地泉涌数尺自是得井唐子西作記又如舒州三祖山飛􅃬泉寳公自金陵飛錫而至以相山谷寺基泉爲之湧岀見同安志魚泳釣時䑓垂足収親子師旣付法希遷垂一足遷禮拜㝷辭往南嶽即南嶽石頭和尚也存身亘劫􅁅漢武帝穿昆明池悉是􅁅有外國胡僧曰此天地劫􅁅之餘見髙僧傳僧雛手金鑰一爲道人開杜詩不寢聽金鑰至人來有㑹吾道本無家閱丗魚行水遺書鳥印沙退之聮句云沙􅂐印廻平言鳥跡印沙如􅂐文也齋盂香佛飯法席雨天花並見維摩經時有清談勝還同歎永嘉晋書不意永嘉之末復聞正始之音次韻十九叔父臺源聞道桃源境鋤荒三逕通杜詩葵荒欲自鋤三徑見上人曽夢蟻穴見上鶴亦怕雞籠用晋嵇紹鶴處雞群意萬壑秋聲别千江月體同湏知有一路不在白雲中心珠道􅂣儀千江同一月萬户盡皆春以言賔頭尊者應四天下供次韻曽都豊喜雨水旱國代有左傳僖十三天災流行國家代有人神理本通徧雩祠小大春秋書大雩敢指蜺雌雄南史王筠傳沈約製郊居賦示筠草筠讀雌霓五的反連蜷約撫掌曰僕恐人呼爲霓五兮反地厭焚惔極詩如惔如焚天囬顧盻中蛟龍起乖卧星斗䀲澄空雲挾雷聲走西京雜記淮南王著鴻烈自言字中皆挾風霜江飜電脚紅寵光歸稼穡老杜江雨詩寵光蕙葉與多碧􅀧注桃花舒小紅滴􅄋在梧桐詖訟猶相及時霖恐未豐㓗齋蘄得􅀊同病託諸公和李才甫先軰快閣五首山寒江冷丹楓落唐文蓻傳崔信詩云楓落呉江冷爭渡行人簇晚沙􅁃信詩河橋争渡喧孟浩然詩漁梁渡頭争渡喧菰葉蘋花飛白鳥一張紅錦夕陽斜杜牧之題韋家亭子云蔫紅半落平地晚曲渚飄成錦一張赤欄終日􅀝西風山色挼藍小雨中雪浪齋日記荆公小詞云揉藍一水縈花草寂寞小橋千嶂抱人不到柴門自有淸風掃唐人詩但言水如藍挼藍字始於荆公將老􅁂毛秋着木相思親舊水連空長江淡淡吞天去甲子隨波日日流萬事轉頭同墮甑郭林宗傳後孟敏荷甑墯地不顧而去一身隨丗作虚舟莊子山木篇方舟而済於河有虚􅂳來觸舟雖有􅄶心之人不怒人能虚巳以遊丗其孰能害之雲横章貢二水雨飜盆杜詩白帝城下雨飜盆寺下深江水到門落日荷鉏人著本漢食貨志理民之道地著爲本注謂安土也音直略反西風滿地葉歸根鮑明逺詩别葉早辝風注引翼氏風角云木落歸本水流向東西風嘉氣浮馬祖山也東北祥風繞静居静居寺即青原山山邑豐年人少訟身來訪道得齋魚幾道復覔㯽榔蛮煙雨裏紅千樹逐水排痰肘後方見上莫道忍飢窮縣令陸􅀛􅂪􅂎菊賦序云我幾年來忍飢誦經豈不知屠沽兒有酒􅁏􅁘煩君一斛􅀉㯽榔用劉穆之事巳見上注發贑上􅀉余洪範二川來集南康郡䖍州治贑縣唐武德曰䖍州天寳曰南康郡二川謂章水貢水皆北流合于贑縣流入大江紹㒷改作贑州氣味相似相和流木落山明數歸鴈欎􅀌欄楯繞深秋􅓹􅀌臺在䖍州䖍吉鄰郡當是解大和徃德平也􅅐中淳于吞一石史記淳于髠一石亦醉塵下庖丁解十牛莊子音義庖人丁其名也管子有屠牛坦一朝解九牛塵下疑是筆下它日欲言人不解西風散髪掉扁舟嵇叔夜詩散髮巗岫同韻和元明兄知命弟九日相憶革囊南渡傳詩句摹冩相思意象真九日黃花傾壽酒幾囬青眼望歸塵蚤爲學問文章誤杜詩紈絝不餓死儒冠多誤身晚作東西南北人記孔子曰丘也東西􅀯北之人也此亦是徃德平時作安得田園可温飽長抛簪紱褁頭巾後漢皇甫規傳退不得温飽以全命萬里千山厭問津芭蕉林裏自觀身維摩經是身如芭蕉中無有又云又復觀身身不離病鄰田雞􅁰留熊也風雨閞河走阿秦熊也阿秦當是山谷兄弟小字山谷兄弟五人大臨庭堅叔獻叔逹仲熊仲熊即墓志所謂非熊代書一篇所謂阿熊而今詩所謂熊也阿秦盖可􅀋推鴻鴈池边照双影春令原上憶三人兄弟中两人相聚而三人别去也年年献壽湏􅂬喜白髮黄花映角巾晋羊祜傳與從弟琇書曰旣定边事當角巾東路歸故里題吉州承天院清凉軒菩薩清凉月遊於畢竟空維磨經法無戯論故楞􅃊經􅀂離明暗見畢竟空我觀諸境盡心與古人同僧髮侵眉白桃花映竹紅倘來㝷祖意展手似家風祖師西來意見上題槐安閣并序東禅僧進文結小閣於􅃦室東飬生之具取諸左右而足彼雖聞中天之臺百常之觀盖無慕嫪之心予爲題曰槐安閣而賦詩夫據功名之㑹以嫭姱一丗其與蟻丘亦有卞乎雖然陋蟻丘而仰㤗山之崇崛猶未離乎俗觀也淳于棼夢大槐安囯詳巳見上曲閣深房古屋頭病僧枯几過春秋垣衣本草垣衣一名昔邪又云在墻垣謂之垣衣在水中石上謂之陟釐蛛網䝉䆫牖萬象縱橫不繫留賈􅁩服鳥賦汎乎􅀂不係之舟白蟻􅀾酣千里血檀羅國來伐王命棼征之敗績亦槐安囯事也晋楚􅀾於鄢陵􅀾酣之時子反渴而求飲見淮南子黄􅆝炊熟百年休炊黄􅆝未熟見上功成事遂人間丗人間丗莊子篇名欲夢槐安向此遊老子功成名遂天之道大和奉呈吉老縣丞山擁鳩民縣左隠八年君釋三囯之圗以鳩其民注鳩集也江橫决事厅土風尊健訟吏道要繁刑觟􅚞今無種觟胡瓦切􅚞除􅀝切此兩姓今無人矣按後漢儒林洼丹傳時中山觟陽鴻亦以孟氏易教授有名又按姓氏書裭姓古有善听者􅚞俞汲黯傳公以此無種矣蒲盧教未形事詳見中庸里多斉􅗎氏元注云􅗎氏漢書音閑面今済南田家有此姓音諌材謝宋庖丁庖丁莊子不言宋當考令尹三年課斯人萬物靈書惟人萬物之靈吾方師豈弟僚友􅂇丹青丹青謂縁飾吏事也立春韭苗香煑餅崔寔四民月令曰立秋無食煑餅野老不知春㸔鏡道如咫􅀝楼梅照人退之春雪間早梅詩寒光􅂇照人趙嘏詩長笛一聲人􅀝楼子範徼廵諸郷捕逐群盗幾盡輙作長句勞行李白髮尉曹能挽弓著鞭跨馬欲生風乃兄本是文章伯杜詩每語見許文章伯此老真成矍鑠翁馬援傳矍鑠哉是翁也枹鼔諸村宵警報漢張敞傳云枹鼔稀鳴市無偷盗牛羊幾處暮牢空得公萬户開門卧萬夫爭処首先処􅅐中元有不病者傳燈録德山宣鍳禅師傳師因疾僧問還有不病者無師曰有如何是不病者師曰阿邪阿邪記得陶潜歸去來山谷誌畢守之墓云吉州大守以元豐五年冬没於理所其銘云公疾卧牖上章請老戯贈南安倅桞朝散桞侯風味晩相見衣􅃑頗薫荀令香見此卷酴醾詩注桃李能言妙歌舞借使李廣傳桃李不言樽前一曲断人腸刘禹錫於李司空坐上賦詩曰髮􆁖梳頭宫様粧春風一曲杜韋娘司空見慣渾閑事断盡江南刺史膓因贈以妓洞庭歸客有佳句玉臺新詠有梁栁惲江南曲云洞庭有歸客瀟湘逢故人亦見文選􅁃嶺梅花如小棠􅁃嶺見上詩蔽芾甘棠箋云召伯舎小棠之下乗興髙帆少相待淮湖秋月要傳觴文選南都賦儇才斉敏授爵傳觴睡起柿葉鋪庭紅顆秋董爐沉水度衣篝􅀃文曰篝落也可董衣松風夢與故人遇同駕飛鴻跨九州文選郭璞遊仙詩赤松臨上仙駕鴻乗紫煙次韻君庸寓慈雲寺待韶恵錢不至主簿㸔梅落雪中閨人應賦首飛蓬詩伯􅀆自伯之東首如飛蓬問安兒女音書少破􅀏壷觴夢􅄰同歸去來詞引壷觴以自酌文選刘越石詩序云破涕爲􅀏排終身之積憤求数刻之暫歡馬祖峰前靑未了鬰􅀌臺下水如空馬祖鬰􅀌見上杜詩斉魯靑未了江山信羙思歸去文選登楼賦雖信羙非吾土􅀆曽何足以少留听我勞􅁔亦欲東文選謝叔源詩誤彼蟋蟀唱信此勞者􅁔注引韓詩曰朋友之道缺勞者􅁔其事漢書髙祖曰吾亦欲東耳次韻奉答存道主簿主簿朝衣如敗荷髙懷千尺上松蘿小雅頍弁蔦與女蘿施于松栢毛云蔦􅀉生也女蘿兔􅁝松蘿也旅人爭席方歸去莊子寓言篇其徃也舎者避席其返也舎者與之爭席秋水黏天不自多莊子秋水篇吾未嘗以此自多退之􅀕文洞庭汗漫粘天無壁斈到㑹時忘粲可僧粲恵可傳燈録皆有傳杜詩余亦師粲可身猶􅅞禅寂詩留别後見羊何文選謝靈運詩序云登臨海嶠􅀄發強中作與恵連可見羊何共和之大白詩别後遥傳滄海作可見羊何共和之向來四海習鑿歯今日期君不啻過四海習鑿歯弥天釋道安見晋書習鑿歯傳此用主簿事題神移仁壽塔十二觀音無正面僧伽至臨淮嘗卧賀跋氏家現十二面觀音形其家欣􅂟遂捨宅焉即今寺也見宋僧傳問十二面觀音阿那面正見傳燈録義玄禅師傳誰令塔户向東開定知四􅆊神通力阿含經曰丗尊􅀃四􅆊福􅀂能􅀘理故寺是謂二􅆊之福見􅀄斈記曽借六丁風雨推退之詩天官勑六丁雷電下取將蠅􅀃冰霜如夢寐莊子秋水篇井蛙不可以語於海夏虫不可以語於冰鷃聞鍾鼔亦驚猜逹生篇譬之􅀂載鼷以車馬楽鷃以鍾鼔也彼又烏能無驚乎哉從今不信維磨詰断取三千丗界來維摩經断取三千大千丗界如陶家輪著右掌中擲過恒沙丗界之外題海首座壁􅀐虎度諸嶺天台豐于禅師居天台山囯清寺嘗誦唱道􅁔乗虎入松門衆僧驚畏見傳燈録入鷗同一波王立之詩話云方時敏言荆公云鷗鳥不驚之􅀋如何作語則好故山谷有云入鷗同一波香寒明鼻觀楞􅃊經云丗尊教我􅀚鼻端白日永稱頭陀文選頭陀寺碑李善曰天笁言頭陀此言斗薮盖斗薮煩惱也題仁上座􅀞松偃蹇松枝隔煙􅀨知儂定是􅀊寒材百年根莭要老硬傳燈録岩頭云德山老人一條脊骨硬如鐡將恐崩崖倒石來大白詩崩崖轉石萬壑雷次韻漢公招七兄白髮霏霏雪􅀧斑朱櫻怱忽鳥衘殘傳燈録潙山與仰山游行次烏衘一紅柿落前祐將與仰山仰山接得以水洗了却與祐云云介甫詩云鳥殘紅柿昔曽分公庭休吏進湯餅漢薛宣傳日至休吏語燕無人窺井欄詩句多傳知有暇道人相見不應難老􅀰親屈延処士風味依稀如姓􅁊元注云􅁊冲礼処士刘之鄭粲甚厚按晋􅁊冲傳云命処士南陽刘之爲長史驎之不屈親徃迎之礼之甚厚又辟処士長沙鄭粲爲别駕備礼尽恭粲感其好賢乃起應命送髙士敦赴成都鈐轄二首東坡集中亦有此詩乃元祐三年也自此以前皆大和作此後元祐間作玉鈐金印臨參井淮南子云通許由之論金縢豹韜廢矣注云金藤豹韜周公太公隂謀圗王之書也囯朝置功轄曰鈐曰􅅬曰韜皆取秘宻之義太白蜀道難云捫參歴井仰歇息控蜀通秦四十州日下書來望鴻鴈江頭花發醉貔貅礼記曲礼前有鷙獸則載貔貅注亦鷙獸也巴滇有馬駒空老漢有巴郡治江州今重慶府所治巴縣也後漢末分而爲三巴西郡治閬中令閬州所治縣也巴東郡治魚復令䕫州所治奉郎也與巴郡爲三巴蜀馬皆取之西南夷史記西南夷傳云西南夷君長以什數夜􅀰爲大其西靡莫之屬以什數滇爲大如淳曰滇音㒹㒹馬出其囯駒空老言不用兵也林箐無人葉自秋能爲將軍􅁔此曲鳴機割錦與纒頭開元中冨人王元宝㑹賔客明日或問曰昨來有何髙談宝曰但費錦纒頭耳杜詩樽前還有錦􅆞頭捧日髙宣亊東京四姓候後漢紀顕宗九年爲四姓小侯開立學校置五經師注外戚樊氏郭氏隂氏馬氏也髙盖宣仁后家軍中聞爼豆語爼豆之亊則常聞之廟勝脫兠鍪退之詩边封脫兠鍪焼燭海棠夜香衣薬市秋君平識行李􅃊君平見漢書河漢接天流次韻子瞻元夕扈從三首此詩見秦少游集非山谷語次韻子瞻送穆父二絶錢勰字穆父元社􅀄知開封府迁給亊中復以龍圗閣待制知開封以係囚别所迁就圄空岀知越州越今爲紹㒷府􅄅然今日望人材當今人物渺然見上毎見紫芝眉宇開唐元德秀字紫芝房琯毎見歎曰見紫芝眉宇使人名利之心都尽又觸恵文江海去快㠶誰與挽令囬漢張敞傳弟武拜爲梁相曰梁囯大都吏民凋敝當以柱後恵又弹治之秦時獄法吏柱後恵文武意欲以刑法治梁謫官猶得住蓬萊越州有蓬萊館抱牘人稀書卷開牘謂案牘退之藍田丞㕔記云文書行吏抱成案詣丞張敞憮眉應急召此用尹京亊也張敞治京兆爲婦􅀞眉長安中傳張京兆眉憮有司以奏上問之云云董宣強項莫低囬強項令見墨竹賦和子瞻内翰題公擇舅中丞山房幽人八座復中䑓東坡迁端明翰林侍讀二斈士守礼部尚書時公擇爲御史中丞想見書堂山杏開四十餘年僧屈指時因秋鴈􅀉聲來東坡集有李氏山房藏書記其略云余友李公擇少時讀書於庐山五老峯下白石庵之僧舎公擇旣去而山中之人思之指其所居爲李氏山房藏書其後元豐七年東坡自黃移汝因徃筠自筠遊庐山書李公擇白石山房云偶尋流水上崔嵬五老蒼顔一􅀏開􅀂見謫仙煩􅀉語匡山頭白早歸來山谷和章乃元祐七年作盖東坡是年自楊州召爲兵部尚書也屈指字見漢陳湯傳詘指計其日曰不出五日以潞公所惠揀芽送公擇次舊韻前集有謝公擇分賜茶三絶句今次前韻􅂟雲十六升龍様前漢志􅀂煙非煙􅀂雲非雲郁郁紛紛䔥索輪囷是謂􅂟雲囯老元年宻賜來左傳囯老皆賀子文北苑貢茶録云慶曆中蔡君謨造小鳯團自小團岀而龍鳯遂爲次元豐有旨造宻雲龍其品又加於小團之上披拂龍紋射牛斗外家英鍳似張雷東坡是年自楊州召爲兵部尚書也屈指字見漢陳湯傳詘指計其日曰不出五日以潞公所惠揀芽送公擇次舊韻前集有謝公擇分賜茶三絶句今次前韻􅂟雲十六升龍様前漢志􅀂煙非煙􅀂雲非雲郁郁紛紛䔥索輪囷是謂􅂟雲囯老元年宻賜來左傳囯老皆賀子文北苑貢茶録云慶曆中蔡君謨造小鳯團自小團岀而龍鳯遂爲次元豐有旨造宻雲龍其品又加於小團之上披拂龍紋射牛斗外家英鍳似張雷謂張華雷煥吏部蘇尚書右選胡侍􅀰皆和鄙句次韻道謝不待烹茶喚睡囬天官两􅌠和詩來清如接筧以竹通水通春溜快似揮刀斫怒雷天官吏部也冡􅌠以喻尚書其屬有太􅌠卿一人比侍􅀰奉同公擇作揀芽詠貢茶録云茶芽最上曰小芽如雀舌鷹爪次曰中芽乃一芽帯一葉者號一槍一旗号揀芽最爲竒特赤囊歳上䨇龍壁元注云囊貢小團亦单疊唯揀芽双疊曽見前朝盛亊來想得天香隨御所延春閣道轉輕雷元注云元豐未作延春閣今歳官茶極妙而難爲賞音者戯作两詩用前韻雞􅂫狗虱難同味煎茶賦云或済以􅐭勾賊破家滑竅走水又况雞􅂫之與胡麻雞􅂫俗呼紫􅂫胡麻一名狗虱皆見本草懷取君恩歸去來青箬湖边㝷顧陸箬溪在湖州顧陸謂顧野王陸羽按寰宇記湖州長興縣箬溪在縣􅀯一名顧渚顧野王輿地志云夾溪悉生箭箬南岸曰上箬北岸曰下箬村人取下箬水醸酒醇羙俗􅁛箬下酒陸鴻漸名羽有顧渚山記二篇盛言顧渚茶之羙爲江左第一張彦逺名􅀞記有論顧陸張呉用筆一篇謂顧愷之陸探微與此詩不相渉山谷特借使顧陸二字顧野王有傳白蓮社裏覔宗雷白蓮社在江州庐山晋慧逺法師故亊也同社十八人宗炳字少文雷次宗字仲倫與焉乳花飜椀正眉開時苦渴羗衝􅀬來拾遺記晋有羗人姚馥但言渴於酒群軰呼爲渴羗􅀄斈記程曉伏日詩云今丗褦襶子觸􅀬到人家揺扇髀中疼流汗正滂沱褦襶謂不暁亊渴羗亦此流也知味者誰心巳許維摩雖黙語如雷時維摩詰黙然無言文殊師利嘆曰善哉善哉乃至無有文字語言是真入不二法門公擇用前韻嘲戯双井萬仞峯前双井塢山谷所居双井􅀠洪之分寕婆娑曽占早春來如今摸索蒼龍壁沉井銅瓶漫斈雷老杜銅缾詩乱後碧井廢時清瑶泉深銅瓶未失水百丈有哀音又戯双井解嘲山芽落磑風囬雪曽爲尚書破睡來勿以􅁎姜棄鷦􅷑逢時瓦釡亦鳴雷左雖有􅁎姜无棄鷦􅷑文選屈平卜居云黄鍾毀棄瓦釜雷鳴奉同六舅尚書詠茶碾煎烹三首要及新香碾一盃不應傳宝到雲來見上碎身粉骨方餘味莫厭聲喧萬壑雷萬壑雷見上碎身粉骨如老杜詠丁香云晚墮蘭麝中休懐粉身念也風炉小鼎不湏催魚眼長隨蟹眼來深注寒泉収第一亦防􅑎腹爆乾雷蟹眼􅑎腹並見上乳粥瓊糜霧脚囬色香味觸映根來六根眼耳鼻舌身意即色香聲味觸法見楞􅃊經茶録有色香味瓊糜見上睡魔有耳不及掩唐李靖傳兵機事以速爲神震霆不及掩耳直拂䋲宋過疾雷王立之以小詩送並蔕牲丹戯答分送香紅惜折殘春隂醉起薄羅寒不如王謝堂前燕曽見新粧並􅀝欄刘夢得詩旧時王謝堂前燕飛入㝷常百姓家露稀風晚别春叢柫掠殘粧可意紅多病廢詩仍止酒可憐雖在與誰同玉臺新詠有􅁔詞云東飛百勞西飛燕其末云空留可怜與誰同題子瞻書詩後詩就金聲玉振書成蠆尾銀鈎見上巳作青雲直上何時散髮滄州北山移文云干青雲而直上散髮見上註戯贈髙述江湖心計不淺翰墨風流有餘相期乃千載亊要湏讀五車書見上與李公擇道中見两客布衣班荆而坐對戯弈秋因作一絶两客班荆覆局圗左㐮二十六年楚伍舉奔鄭將遂奔晋聲子將如晋遇之於鄭郊班荆相與食而言復故魏志王粲傳􅀚人圍棊局壞粲覆之不誤一道㸔人車馬溷泥塗文昌八座鄰樞極唐刘洎䟽云八座比於文昌六曹尚書及令僕爲八座見晋聀官志後漢梁統傳論􅌠相運動樞極天上歸來愧不如題歸去來圗二首曰日言歸真得歸迎門兒女􅀏牽衣太白詩兒女􅁔􅀏牽人衣宅边猶是旧時桞漫向丗人言昨非詞云斍今是而昨非人間処処猶崔子語猶吾大夫崔子豈忍更令三徑荒誰與老翁同避丗桃花源裏捕魚􅀰桃花源見上注題陽閞圗二首断腸聲裏無形影􅀞出無聲亦断膓想得陽閞更西路北風低草見牛羊髙􅂬玉壁之㑹使斛律金作勑勒􅁔其詞曰山蒼蒼天茫茫風吹草􅊠見牛羊􅂬自和之哀感流涕人事好乖當語離渊明答龐参軍詩序云人亊好参便當語離龍眠皃出断腸時李伯時畫也杜詩皃得山僧及童子渭城桞色閞何亊自是離人作許悲渭城桞色見上漢書陽閞去長安二千五百里唐人送客西出都門三十里曰渭城今有渭城館刘夢得詩旧人惟有何戡在更與殷勤唱渭城次韻答少章聞雁听雞二首平生絶少分甘処司馬迁傳与士大夫絶甘分少師古曰自絶旨甘而与人共其多少身要從師萬亊忘霜鴈呌群傾半枕退之詩一一呌群猿夢囬兄弟綵衣行礼王制父之歯隨行兄之歯雁行綵衣用老萊子亊朝士聞雞常半途朱門擁􅀍不閞渠秦􅀰五起听三唱殘燭貪傳未見書見上題王居士所藏王友畫桃杏花二首山谷元符三年五月復宣徳􅀰自戎泝江省其姑於青神尉廨十一月復還戎過加州至楽山王朴子厚題桃杏花草書超逸今藏於洪雅楊氏戎今爲叙州堎雲一􅀏見桃花三十年來始到家從此春風春雨後乱隨流水到天涯傳燈録福州靈雲志勤禅師􅀄在潙山因桃花悟道有偈曰三十年來㝷剱客幾逢落葉幾抽枝自從一見桃花後直至如今更不疑凌雲見桃萬亊無我見杏花心亦如從此華山圗籍上更添潘浪倒􅀐驢潘閬詩髙爱三峰挿大虚囬頭仰望倒􅀐驢傍人大􅀏從他􅀏終擬移家向此居戯答􅄷夢得承制二首結髮從征听皷􅎏李廣傳謂其麾下曰廣結髮與匈奴大小七十餘􅀾礼君子听皷􅎏之聲則思將帥未曽一展胸中竒退之代張籍書開口一吐胸中之竒彎弓如月落霜雁誰道將軍能賦詩橫槊見上不爲萬􅀐先傳杯把筆過年年杜牧之詩自􅀃江湖不歸去阻風中酒過年年懷中黄石閑三略兵書有黃石公三略三卷道上青旗謾百篇青旗謂置筒上加旗也元白號詩筒題李十八知常軒身心如一是知常老子知常曰明亊不驚人味乆長史記淳于髠傳斉威王喜隠髠􅀃之以隠曰囯中有大鳥三年不飛不鳴王知此鳥何也王曰此鳥不鳴則巳一鳴驚人盖丗功名棊一局幽閑鼔吹云令孤相擬李逺爲杭州宣宗曰李逺云長日惟能一局棊豈可臨郡藏山文字紙千張司馬迁自序云整齊百家􅄂語藏之名山副在京師坡詩云功名半幅紙兒女浪苦辛無心海燕窺金屋漢武故事金屋貯阿嬌有意江鷗傍草堂驚破􅀯柯少時夢見上新晴鼔角報斜陽次韻奉答吉鄰機冝􅃛虜乘秋屢合圍禮記王制天子不合圍諸侯不掩羣上書公獨請偏師庭中子弟芝蘭秀見上塞上威名草木知唐張萬福傳德宗以萬福爲濠州刺史召謂曰先帝改爾名正朕謂江淮草木亦知爾威名􅀂從所改恐賊不知是郷也復賜舊名千里折衝􅀷􅀉此晏子春秋范昭謂晋平公曰齊未可并吾欲試其君晏子知之吾欲犯其樂大師知之於是輟伐齊謀孔子聞之曰不出樽爼之間而折衝千里之外晏子之謂也三衙虚席看除誰三衙謂殿前都指揮使侍衛馬軍都指揮使侍衛歩軍都指揮使與君相見清班在仁祖重來築舊基送曹黔􅀯口號按實録紹聖元年十二月甲午黄庭堅謫涪州別駕黔州安置二年四月二十三日到黔州見謝裴寓開元寺寺有摩圍閤黔守曹譜字伯逹摩圍山色醉今朝試問歸程指斗杓荔子隂成棠棣愛詩甘棠羙召伯也蔽芾甘棠勿翦勿伐箋云思其人敬其樹今以甘棠爲棠棣竹枝歌是去思謡山谷甞云竹枝歌本出三巴其流在湖湘耳漢何武傳所居無赫赫名去後嘗見思陽関一曲悲紅䄂巫峽千波怨􅀞橈歸去天心承雨露􅀟魚來報舊賔僚題劉氏所藏展子䖍感應觀音二首張彦逺歴代名畫記云展子䖍歴北齊周隋爲朝散大夫帳内都督觸物留情悉皆絶妙尤善臺閣人馬人間猶有展生筆佛事蒼茫煙景寒退之詩蕭蕭風景寒常恐花飛蝴蝶散明䆫一日百回㸔恐歳乆化爲蝴蝶也杜陽雜編穆宗殿前千葉牡丹始開宫中夜有黄白蛺蝶萬數飛集花間輝光照耀逹旦乃去上令張密網於空中遂得數百皆金玉也後開寳厨覩金屑玉屑錢内將有化爲蝶者廼覺馬杜詩自今以後知人意一日須㸔一百回郡盗挽弓江簸􅂳杜詩浪簸船應拆丹青當在普通前普通梁武帝年號時未有侯景之亂也誰能與作赤挽板當是護衛之物赤挽恐是赤欄第三卷有詩云横溪赤欄橋晏元獻􅀋要云台州有赤欄橋在州城臨江老筆猶堪壽百年以虎臂杖送李任道二首走送書堂􅀝絳紗後漢馬融傳常坐髙堂施絳紗帳前授生徒後列女樂瘦藤七尺走驚虵晴沙每要交頭拄㝷徧漁翁野老家未衰筋力先扶杖曲禮云老者不以筋力爲禮漢賈山傳雖老羸癃疾扶杖而徃聽之能救衰年十二三漢髙祖紀士卒墯指者十二三注謂十人之中二三墯指今以言十分救得二三分也八百老彭嗟杖晚可憐矍鑠馬征􅀯神僊傳彭祖姓籛名鏗至殷末已七百六十七歳而不㐮論語竊比於我老彭矍鑠見後漢馬援傳謝周文之送猫兒飬得狸奴立戰功將軍細柳有家風用周亞夫細柳營事一簞未厭魚餐薄四壁能令䑕穴空戯呈田子平元符三年十二月山谷發戎州明年改建中靖國四月至荆􅀯乞知太平州留荆􅀯待命遂踰冬有戯簡田子平詩此詩盖同時作茸割即非茸割肥羊自是肥羊老杜詩云禮遇宰肥羊愁當置青醥老夫􅂊堪一筯諸生賛詠甘香􅁍歎佳人纎手晚來應廢紅粧此言田家庖婢或其内子如老杜所云喚婦出房親自撰也荆州衣冠千户厚意獨有田郎三輔决録云田鳯爲尚書郎容儀端正帝目送之題柱云堂堂乎張京兆田郎今以子平比田鳯太平州作二首崇寜元年春自荆􅀯歸洪州分寜因徃􅀽州萍郷省其兄元明還至江州與其家相㑹六月赴太平州九日而罷歐靚腰艾栁一渦小梅催拍大梅歌此皆太平州官妓舞餘片片棃花雨言其泣下也樂天詩棃花一枝春帶雨柰此當途風月何太平治當途縣千古人心指下傳楊姝煙月過年年過年年見上不知心向誰邊􅋀彈盡松風欲斷絃呉氏漫録云䂊章先生守當塗日㑹上作木蘭花贈故人􅁃元規曰􅁃郎三韭常安樂使有萬錢無處着徐熈小鴨水边花明月清風都占􅁍朱顔老尽心如昨萬亊休亊休莫莫樽前徤在不饒人歐舞梅􅁔君更酌自注云歐梅當時二妓也山谷評書云按欲入木弹欲断絃此用筆法也長沙留别崇寕二年謫冝州三年二月過洞庭歴潭衡永桂夏至貶所長沙即潭州也折脚鐺中同淡粥傳燈録汾州無業禅師曰古得道人得意之後茅茨石室向折脚鐺中煮飯喫過三十二十年曲腰桑下把離杯大白集中有魯城北郭曲腰桑下送張子還嵩陽一首小鴨水边花明月清風都占􅁍朱顔老尽心如昨萬亊休亊休莫莫樽前徤在不饒人歐舞梅􅁔君更酌自注云歐梅當時二妓也山谷評書云按欲入木弹欲断絃此用筆法也長沙留别崇寕二年謫冝州三年二月過洞庭歴潭衡永桂夏至貶所長沙即潭州也折脚鐺中同淡粥傳燈録汾州無業禅師曰古得道人得意之後茅茨石室向折脚鐺中煮飯喫過三十二十年曲腰桑下把離杯大白集中有魯城北郭曲腰桑下送張子還嵩陽一首知君不是􅀯遷客魑魅無情湏早囬左文十八舜臣尭流四㓙族投諸四裔以禦魑魅注山林異氣所生爲人害者贈花光老浙江衲子静無塵衲子見傳燈録箇箇莊􅃊服飾新何似乾明能効古渠知北斗裏藏身傳燈録慧清禅師傳僧問北斗裏藏身意智如何師曰九九八十一題花光爲曽公卷作水边梅梅蘂觸人意楽天榴花詩香塵擬觸坐禅人冐寒開雪花遥憐水風晚片片􅀧汀沙冷齋夜話衡州花光仁老以墨爲梅魯直􅀚之曰如嫰寒春曉行􅀌山離落間但欠香耳清明佳節清明桃李􅀏本亊詩􅀶陵崔護清明獨遊都城􅀯得居人莊酒渴扣門求飲有女子以盂水至􅀝小桃佇立而意屬殊厚來歳清明往㝷之門庭如故而扃欽之因題詩曰去年今日此門中人面桃花相映紅人面不知何処去桃花依舊􅀏春風云云野田荒壠只生愁雷驚天地龍蛇蛰謂巳過驚蟄莭雨足郊原草木柔人乞􅀕餘驕妾婦孟子所􅁛斉人乞墦間之􅀕㱕而驕其妻妾以言清明上􅊘士甘焚死不公侯陸劌鄴中記寒食断火起於子推據左傳史記無介推􅀍焚亊周礼司炟仲春以木鐸修火禁則禁火盖周之旧制賢愚千載知誰是滿眼蓬蒿共一丘漢陽惲傳古与今同一丘之貉師古曰言其同􅀋也山谷外集詩註卷之十四終
