  text: 山谷外集詩註卷第二
  hash: sha256:bbad20eed826c4b49311515d32e7073ff14e530a61548029e0c3fff5969da698
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_002-1a}
body:
  text: 古詩謝張㤗伯恵黄雀鮓去家十二年黄雀慳下筯晋何曾傳日食萬錢猶曰無下筯處笑開張侯盤湯餅始有助束晳餅賦云湯餅爲最蜀王煎藙法醢以羊彘兎自注云俗謂亥夘未餛飩内則三牲用藙注云藙煎茱茰也正義曰賀氏云今蜀郡作之三牲牛羊豕麥餅薄於紙􅍭漿和醎俗鹹字酢秋霜落􅂣􅂖詩云食我􅂣􅂖一一挾蠒絮東坡詩披綿黄雀謾多脂飛飛蒿艾間入網輙萬數烹煎冝老稚罌􅇲煩爱護南包解京師老杜北征詩粉黛亦解包至尊所珍御文選西京賦侈靡踰乎至尊退之李花詩冰盤夏薦碧實脆斥去不御慙其花此御字之意玉盤登百十睥睨輕桂蠧漢陸賈傳尉佗獻桂蠧二器注桂蠧桂樹蠧虫五侯噦豢豹西漢􅄂記婁護傳㑹五侯間競致竒膳護合以爲鯖丗稱五侯鯖文選枚叔七發云山梁之餐豢豹之胎退之南山詩思想甚􅍭噦見謂羙無度見詩瀕河飯食漿􅀲􅉁巳佳茹漢食貨志菜茹有畦誰言風沙中郷味入供具漢荆王刘澤傳請張卿臨親脩具注曰具供具也又叙傳云迎延滿堂日爲供具坐令親饌甘更使客得與郭林宗傳茅容殺雞爲饌林宗謂爲巳設旣而以供母自以草􅂼與客同飯山谷用此意而反其詞蒲隂雖窮僻蒲隂祁州所治縣也張㤗伯官於此勉作三年住願公且安樂分􅀉尚能屢次韻謝子髙讀淵明傳枯木嵌空微暗淡老杜詩云嵌空大始雪嵌丘衘切古器雖在無古絃晋陶潜傳蓄素琴一張弦徽不具每朋酒之㑹則撫而和之曰但識琴中趣何勞弦上聲䄂中政有􅀯風手誰爲聽之難爲傳􅀯風手謂舜作五弦之琴以􅁔􅀯風司馬迁答任安書云諺曰誰爲爲之孰爲听之盖鍾子期死伯牙終身不鼔風流豈落正始後晋衛玠傳不意永嘉之末復聞正始之音甲子不數義熈前􅀯史陶潜傳所著文章義熈以前明書年號永􅀄以來惟云甲子一軒黄菊平生事無酒令人意缺然渊明九日時序云秋菊盈園而時醪靡至莊子吾自視缺然奉答子髙見贈十韻桞徑雨着綿竹齋風隕籜詩十月隕籜屏處人事少漢竇嬰傳謝病屏居􅀯山下晴餘鳥聲楽左傳鳥烏之聲楽詩卷墯我前謂從天上落君有古人風詩如古人作魏志毛玠傳云大祖以素屏風素慿几賜玠曰君有古人之風故賜君以古人之服簞瓢謝膏梁簞飄見語孟子云所以不願人之膏梁之味也注膏梁細􅆝如膏者也翰墨化糟粕莊子曰􅁊公讀書於堂上輪扁斵輪於堂下問􅁊公曰敢問公之所讀者何言􅁘公曰聖人之言也曰聖人在乎公曰巳死矣曰然則孔之所讀者古人之糟粕而已誤􅂪東海觀吾淺乃可酌真成聞道百自謂莫巳􅀂杜詩真成浪岀遊莊子云秋水時至兩涘渚涯之間不辨牛馬河伯欣然自喜順流而行至于北海東面而望不見水端河伯歎曰野語有之聞道百以爲莫巳􅀂者我之謂也謝生石藴玉陸機文賦云石韞玉而山輝志尚本丘壑雖無首陽粟飲水亦不􅁖史記伯夷叔齊傳二人義不食周粟餓死於首陽山晋謝道藴傳王􅀰逸少子不􅁖跫然何時來爲我一發薬莊子曰列子謂伯昏瞀人曰先生旣來曽不發薬乎跫然見上次韻孔著作早行棄置鉏犂就車馬選詩棄置勿重陳退之詩起身自犂鉏從來計出古人下退之詩之罘别我去計出栢馬下塵埃好在三尺桐不疑萬丗期子野琴操曰琴長三尺六寸六分象三百六十六日左傳昭八年石言于晋魏榆晋侯問於師曠對曰云云叔向曰子野之言君子哉注云子野師曠字晋成公綏琴賦云伯牙彈而駟馬仰秣子野揮而玄鶴鳴明經使者著書郎風雨乘馹忘夙夜左傳昭五年楚子以馹至於羅汭注馹傳也囬車過門問無恙退之書云問無恙外不睱出一言何意深巷勤長者陳平傳家乃􅀒郭窮巷以席爲門然門多長者車轍聖師之後蓋多賢左昭七年吾聞將有逹者曰孔丘聖人之後也領畧丗故有餘暇選詩領畧歸一致又云丗故尚未夷白而長身雖不見好古發憤尚􅀋也韓文孔戣墓誌曰孔丗三十八吾見其孫白而長身寡􅀏與言其尚􅀋也語信而好古又發憤忘食自然身好警露鶴李義山詩鶴應聞露警􅉕亦爲花忙每先鳴雞整􅀄駕選詩整駕粛時命北行河決所至郡此詩先言明經使者又言北行河決盖比之漢平當也平當傳云以明經爲􅀶士又云以經明禹貢使行河行下更反粛粛王命哀鰥寡詩粛粛王命仲山甫將之力排滹沱避城郭後漢王覇傳光武􅀯馳至下曲傳聞王郎兵在後及至呼沱河令覇徃視之覇詭曰冰堅可渡下曲陽漢属鉅鹿郡今入祁州北城縣呼沱所在於此可見深澤疲民且田舎賈生三䇿藏􅅐中漢溝洫志賈譲奏言治河有上中下三䇿羿矢百中不虚捨羿射官也􅀯宫适云羿善射孟子云逢􅂪學射於羿此尭以前羿也寒浞虞羿于田殺而烹之此有窮后羿也詩云捨矢如破周紀飬由基去桞葉百歩而射之百發而百中行歸定拜閞内侯但賜黄金恐非價平當傳又云至丞相以冬月賜爵閞内侯注云以冬月非封侯時且先賜爵也非價謂功大賞輕如市物之不當價次韻无咎閻子常携琴入村士寒餓古猶今列子曰五情好􅁖古猶今也四躰安危古猶今也丗事苦楽古猶今也変易治乱古猶今也向來亦有子桑琴莊子云子輿與子桑友而淋雨十日子輿曰子桑殆病矣褁飯而徃食之至子桑門則􅀂􅁔􅀂哭鼔琴曰父􅁘母耶天乎人乎有不任其聲􅀝楹嘨􅁔非寓􅁋列女傳曰魯􅃮室女􅀝柱而嘨隣人婦曰子欲嫁乎女曰吾􅁨魯君老而大子少也伯牙山髙水深深見上萬丗丘壟一知音即前篇不疑萬丗期子野閻君七絃抱幽獨見上晁子爲之梁父吟􅆝父吟云歩出城東門遥望蕩隂里里中有三墳纍纍正相似問是誰家墳田疆古冶氏力能排􅀯山文可絶地紀一朝􅀍䜛言二桃殺三士誰能爲此謀相國齊晏子嘗見山谷冩此詩且䟦云陳壽叙武侯躬耕隴畒好爲梁父吟語势旣不盡其意又失載此詩此盖好簡之過余觀武侯此詩乃以曹公專囯殺楊脩孔融荀彧耳旣作此詩時時爲客􅁔之故云尓乎天寒絡緯悲向壁謂蟋蟀居壁也蟋蟀一名絡緯見炙轂子雜録秋髙風露聲入林冷􅁝枯木拂蛛網十指乃能冩人心村村擊鼔如鳴鼉李斯書云建翠鳯之旗樹靈鼉之鼔豆田見角􅂖成螺晋石崇及衛􅗕傳皆言飯化爲螺此借用以言􅂖成殻歳豐寒士亦把酒滿眼飣餖梨􅀥多退之詩飣餖魚菜贍晁家公子屢經過􅀏談與丗殊臼科退之石鼔􅁔爲我度量掘臼科文章落落映晁董詩句徃徃妙隂何隂鏗何遜也杜詩頗學隂何苦用心閻夫子勿謂知人難使琴抑怨乆不和明光晝開九門肅漢武帝大􅀄四年起明光宫師古曰三輔黄圖云在城中老杜詩汝翁草明光不令髙才牛下􅁔琴操曰寗戚飯牛車下叩牛角而啇􅁔曰􅀯山粲白石爛生不􅑮尭與舜禅短布單衣􅂊至骭長夜漫漫何時旦齊􅁊公聞之㪯以爲相贈答晁次膺次膺豪健如霜鶻空拳誤掛田犬牙漢李陵傳士張空拳音絭杜詩霜鶻不空拳山谷用少陵語當音權果輸司空城旦作漢轅固傳大后怒曰安得司空城旦書乎按刑法志云安爲城旦舂付與歩兵厨人家晋阮籍傳籍聞歩兵厨營人善醸酒野馬横郊作疑水莊子野馬也牽牛引竹上寒花無酒醉公不甚惜誦公五字使人嗟春遊終日桃李蹊李廣賛桃李不言下自成蹊春風不相識大白詩春風不相識何事入羅愇同我二三子承我作意力把酒忘味着㸔花了香寂楞􅃊經云香􅃊童子白佛言見諸比丘燒沉水香香氣寂然來入鼻中晴雲散長空曠蕩無限隔杜詩是身如浮雲安可限􅀯北􅀯都賦上平􅄛而曠蕩身爲胡蝶夢見上本自不漁色礼坊記諸侯不下漁色春蟲􅂆人歸謂杜䳌今我誠是客渊明詩家爲逆旅舎我如當去客文選詩人生天地間忽如逺行客歎逝賦云託末契於後生余將老而爲客歸來翻故􅁓書尾見麟􅀗傳燈録古靈禅師傳其師在䆫下㸔經蜂子投䆫紙求出師曰丗界如許廣闊不肯出鑚他故紙驢年去此用其字左哀十有四年春西狩􅀗麟注云春秋絶筆於􅀗麟之一句文字非我名聊取二三䇿楽天詩黄􅁓除書非我名孟子武城取二三䇿同尭民游靈源廖獻臣置酒用馬陵二字賦詩靈源廟前木我昔見拱把外集刪去詩中有㑹靈源廟下池亭詩云繫馬著桞堤置酒臨魏城魏即北京也孟子拱把之桐梓注拱合两手也把以手把之也七年身屢到􅓹鬰䕃簷瓦退之聮句云紅皺曬簷瓦春風響馬衘文選海賦云海童邀路馬衘當蹊此借用以言馬口衘勒也並轡客瀟洒更願少尹賢置酒意傾冩齋堂有佳處花柳輕婭姹樽前集和凝詞云婭姹含情嬌不語蓮塘想舊葉稲畦識枯苴莊子曰其土苴以治天下釋文云土苴如糞草也開閞抚洪河黄流極天㵼憶昔武皇來繫璧沉白馬從官親土石襁􅀒至鰥寡空餘瓠子詩哀怨逼騷雅漢溝洫志云孝武元光中河决於瓠子東􅀯注鉅野發卒數万人塞瓠子决河於是上以用事万里沙還自臨决河湛白馬玉璧令群臣從官自將軍以下皆􅀒薪寘决河上旣臨河決悼功之不成迺作􅁔曰瓠子决􅀆將奈何云云白圭自聖禹今誰定真假孟子云白圭曰丹之治水也愈於禹孟子曰子過矣禹之治水云云退之詩古聲乆埋㓕無由見真濫晁子發讜言文選東都賦讜言引􅀃注羙言也音黨漢書叙傳上曰吾乆不見班生今日復聞讜言注善言也聖功諒難亜排河著地中势必千里下移民就寛閑何地不耕稼此論似太髙張釋之傳卑之無甚髙論吾亦茫取舎有器可深川吾未之斈也溝志云賈讓奏言治河有上中下三策今行上策徙兾州之民當水衝者决􅀺陽􅃒害亭放河入海河西簿太山東薄金堤埶不能逺泛濫朞月自定今瀕河十郡治堤􅀊費且萬萬及其大决所殘無數如岀數年治河之費以業所徙之民且以大漢方制萬里豈其與水争咫尺之地哉此功一立河定民安千載無患故謂之上策禹貢隨山濬川注謂深其流此語盖指時事按實録且叅以諸書其大要云元豐元年知制誥熊本分司西京判大名府文彦􅀶放罪􅀄選人李公義請爲鐡龍􅀲内侍黄懷信以爲未盡更作濬川把謂禹所用濬川者也時王安石爲相信其􅀃乃置爲濬川司以都水監丞范子淵制之旣而子淵奏功未賞乃言䟽導水􅀔悉歸故道岀民田數萬頃朝廷下大名府保奏文彦愽言小臣興利誣罔詔本行視坐附㑹彦􅀶報不以實故謫洪河壯􅀚遊桞子厚天􅀃云築爲墻垣城郭臺謝􅀚游又槖郭駞傳云長安豪冨人爲遊􅀚又永州新堂記云乃作棟宇以爲觀遊太府佳友朋春色挽我出東風如引繩退之張中丞傳後叙云引繩而絶之其絶必有處昏昏版築氣退之詩海氣昏昏水拍天孟子傳􅀃舉於版築王事始繁興大堤如連山退之詩花艶大堤倡小堤如岡陵詩如岡如陵増卑更培薄賈讓又云若乃繕完故堤增卑培薄勞費無巳此最下䇿也萬杵何登登見詩憶昨河失道平原魚可罾漢陳勝傳置人所罾魚腹中退之詩有蛟寒可罾田萊人未復詩楚茨序田萊多荒注云田廢生草曰萊瘡大國方懲忽念耒耜閑爲民保丘塍百縣伐鼛出周禮鼔人以鼛鼔鼔役事夜半廢曲肱見語吾儕愧禄廪游􅄛事鞍乗詩昊天曰旦及尓游􅄛晁子漢公孫新去司馬丞岀幹大農部漢食貨志桑弘羊請置大農部丞數十人分部主郡國才術見嗟􅁛鮑明逺白頭吟云周王日淪惑漢帝益嗟􅁛我㘴廣文舎七年讀書燈結髮入􅂣屋肯謂河難慿語􅁀虎慿河尓來觸事短癡甚霜前蠅退之詩癡如遇寒蠅丗味極淡薄退之詩我老丗味薄不了人􅋢憎唯得一巵酒尚能别淄澠淮􅀯子曰淄澠之水合易牙嘗而知之列子亦云水經曰淄水岀㤗山萊蕪縣原山澠水岀營丘城東丗謂之漢湊水入于時水所以對樽爼未曽問斗升杜詩仍嗔問升斗酌我良巳多狂言恐侵陵漢盖寛饒傳許伯入第丞相御史將軍中二千石皆賀寛饒不行許伯請之廼徃許伯自酌曰盖君後至寛饒曰無多酌我我廼酒狂丞相魏侯􅀏曰次公醒而狂何必酒也禮記經解倍畔侵陵之敗起矣漢李廣傳廣三子曰當戸椒敢敢男禹與侍中貴人飲侵陵之莫敢應暮雲吞落日歸鳥求其朋詩嚶其鳴矣求其友聲冷官僕馬瘦及門皷騰騰杜詩廣文先生官獨冷退之詩擊鼔騰騰樹赤旗奉和王丗弼􅀉上七兄先生用其韻宫槐弄黄黄退之詩黄黄蕪菁花蓮葉緑婉婉退之元和聖德詩婉婉弱子今以新荷嫰緑也時同二三友竹軒涼夏晚駕言都城南太名府北京也故言都城以望征車返何知苦淹囬及此秋景短愁思令人瘦文選古詩思君令人瘦杜逺遊令人瘦舉目道路逺西風脫一葉文選月賦洞庭始波木葉微脫杜詩風雨秋一葉薦士聞郷選􅀍檄試郷舉進士也簡書催渡河詩畏此簡書賔客不得展檀弓展墓而入注云展省視之親􅁨對萱叢詩焉得諼草言樹之背毛云諼草令人忘􅁨背北堂也釋音云諼本作萱嵇康飬生論合􅂬蠲忿萱草忘􅁨婦病廢巾盥内則婦事舅姑進盥少者奉槃長者奉水請沃盥盥卒授巾言趍厭次城厭次見上鞭馬倦長阪文選曹子建詩秋蘭􅀍長坂又陸韓郷詩駿足思長阪􅀥林蔽天日交隂不容繖仰㸔實離離憶見花纂纂文選笙賦云詠園桃之夭夭􅁔􅀥下之纂纂􅁔曰􅀥下纂纂朱實離離宛其落矣化爲枯枝注云古咄喑􅁔曰􅀥下何攅攅榮華各有時􅀥􅀄欲赤時人從四边來􅀥適今日賜誰當仰視之異郷懷節物不共斟酒盞舉􅂣下馬入深鎻􅃊鑰􅃹諸生所程書捃束􅀂稭稈後漢范丹傳捃拾自資禹貢三百里納秸服注秸藁也釋文秸本作稭工八反􅁡燈坐囬環􅁃信集中有燈賦云香燈燃􅁡氣􅄂燒蘭桞子厚詩囬環駈萬象丹硯精料柬披榛拔芝蘭文選趙景珍書披榛覔路断石収琰琬上林賦朝采琬琰和氏出焉紛爭一日亊聲实溷端窽六家指要其实中其聲者謂之端實不中其聲者謂之窽天球或棄遺顧命曰天球河圗在東序斗筲尚何算見論語西歸到官舎塵上昏案板寒窗穿碧䟽文選天台賦􅊮雲斐舋於翼櫺皦日烱晃於綺䟽注櫺窗間子也刻爲綺文謂之綺䟽鮑明逺詩朱雀文窗韜碧䟽潤礎閙蒼蘚淮􅀯子云山雲蒸柱礎􅃳詩書鵲巢翻帷幔蛛􅁝􅇢果知兄未來光隂坐晼晚宋玉九辯日晼晚其將入昨􅂪叔父報亦歎音書簡叔父謂黄廉字夷仲也王介甫薦爲司農寺幹當公事命同司農正程之才体量河北河東災傷道除知司農寺丞以荒政十二爲科條自昨􅂪叔父報至貂狐無余暖皆言体量賑済辛勤之狀詳見山谷遺文夷仲行狀薄言使亊重激切􅀍天遣髙僧傳僧嵬戒行􅃊㓗有一女子􅀉􅀫自􅁛天女以上人有德天遣我來嵬曰無以革囊見試此摘其字北史李元忠傳孫騰曰此君天遣來不可違也李長􅁻詩天遣裁詩作花骨逋流一方病責任嫓和扁左昭晋侯求醫於秦秦使醫和視之史記扁鵲姓秦名越人咨詢懷靡及詩皇華周爰咨諏又每懷靡及不皇暇息偃詩采薇不遑啓処北山或息偃在牀嚼冰進糜飡衝雪􅂿層巘􅃊霜八月飛貂狐無餘煗見上念嗟叔母劉窮年􅀉甥館行狀又云娶刘氏屯田貟外􅀰致仕渙之女夷仲往河也而刘氏終年留其父母家也孟子曰帝舘甥於弍室注謂妻父曰外舅謂我舅者吾謂之甥尭以女妻舜故謂舜甥也尚怜公初􅃛誘掖到昭宛公􅀄昭宛疑是夷仲子姪小字如前集􅁛阿巽及相與睦也庭堅薄才資行又出畦町莊子彼且爲無町畦亦與之爲無町畦浮雲與丗踈短綆及道淺莊子褚小者不可以懷大綆短者不可以汲深退之詩級古得脩綆匠伯首蹔囬大樗終偃蹇意謂雖受知諸公終無心進取莊子匠石之齊至乎曲轅見檪社樹其大蔽牛匠伯不顧遂行釋音曰匠伯石字也斈宫尸廪入奉飬闕豐腆斈徒日新聞􅀌陋猶旧典斈記􅀌陋而寡聞時用王氏經斈取士也小材時困我持斵問輪扁元注云復用此一韻事異似不害輪扁見上大材我屈渠越雞當蜀􅆑莊子奔蜂不能化藿蠋越雞不能伏鵠􅆑未能引分去恋禄幸苟免退之瀧吏詩官不自謹慎冝即引分徃平生報一飽從事極黽勉老杜云常擬報一飯小雅云黽勉從事豈如不見収放身就閑散退之進斈解云投閑置散思伯卧江􅀯伯即七兄也无心趣軒冕軒冕見上龐公跡頗親黄蘖門屡欵居士黄蘖龐藴希運禅師傳燈録皆有傳齋餘佛飯香維摩經云有囯名衆香佛号香積維摩詰問衆菩薩誰能致彼佛飯維摩詰不起于座化作菩薩到衆香界礼彼佛足於是香積如來以衆香鉢盛滿香飯與化菩薩化菩薩以滿鉢香飯與維摩詰茶沸甘露滿陸羽顧渚山記云豫章王子尚訪曇済道人於八公山道人設茶茗子尚味之曰此甘露也何言茶茗􅑮人問進退餘事􅀉一莞論語夫子莞尓而􅀏仲父挾髙材甘為溝中断元注云音短莊子云百年之木破爲犠樽而文之其断在溝中比犧樽於溝中之断則羙􅁖有間矣其於失性一也退之木居士詩爲神詎比溝中断遇賞還同㸑下餘青黄可犧樽退之犧樽青黄乃木之災薦廟配瑚璉語曰何器也曰瑚璉也注云􅁰稷之器季父有逸㒷未嘗入都輦文選潘安仁詩自我違京輦臨流呼釣船拂石弄琴阮唐元行冲傳有人破古冡得銅器似琵琶身正元行冲曰此阮咸所作器也命易以木絃之其聲清亮楽家謂之阮咸雍容從朋友林下追游􅄛見上田園雖足楽及時思還返隂寒木嗚條論衡五日一風風不鳴條望損􅀝門眼囯䇿王孫賈事閔王閔王岀走失王之處其母曰汝朝出而晚來則吾􅀝門而望汝暮岀而不還則吾􅀝庐而望汝今事王王出走汝不知其處汝尚何歸􅀯枝喜鳴鵲魏武短􅁔行月明星稀烏鵲􅀯飛繞樹三匝無枝可依尺素託黄犬晋陸機傳機有駿犬名曰黄耳覊寓京師乆無家問􅀏語犬曰我家絶無書信汝能齎書取消息否犬摇尾作聲機乃為書以竹筩盛之而繫其頸犬尋路􅀯走遂至其家得報還洛歳以爲常文選楽府云呼童烹鯉魚中有尺素書又以窀穸留左㐮十三春秋窀穸之事歸期指姑洗月令季春之月律中姑洗􅀉聲問僧護僧護當是子姪小字兒髮可以綰妙言對賔客􅁛渠万金産退之贈張籍詩云有兒雖甚憐教示不免簡君來好呼出踉蹡越門限惧其無所知見則先愧報昨因有縁事上馬挿手版留君住厅食使立侍盤醆薄暮歸見君迎我􅀏而莞指渠相賀言此是万金産尔來弄筆硯墨水􅁖翻建大字如栖鵶巳不作肥軟刘禹錫詩小兒弄筆不能瞋涴筆書窗且賞勤盧仝詩忽來案上翻墨汁塗抹詩書如老鵶漢髙紀云秦形勝之囯也地势便利其以下兵於諸侯譬猶居髙屋之上建瓴水也注云翻瓴水言其向下之势易也魯論未徹章正苦諸叔􅂴新詩開累􅁓自此以下皆言王丗弼詩如月明如柘漿如砧聲筧水聲也欲罷不能卷見語逺懷託􅀌髙别思􅄹繾綣詩以謹繾綣秋月明夜潮柘漿凍金椀見上踈杵韻寒砧幽泉流翠筧韻書云筧古典反以竹通水吟哦口垂涎杜詩道􅑮麴車口流涎嚼味有餘雋漢蒯通傳論􅀾囯􅀃士亦自序其􅀃号雋永注肥肉也傳示同好人我家東床坦東床坦腹見羲之傳風煙意氣生揮毫冩藤繭唐朝舒元輿傳有悲剡溪古藤文言以剡藤爲􅁓也法書要録王羲之蘭亭序用蚕蠒􅁓䑕􅂡筆北户録云晋宋間有一種􅁓長丈余就船抄之丗謂蠒􅁓獵山窮鶉鴽鴽女居切鴿也月令田䑕化爲鴽􅇁海極蝦蜆苐四卷代書云文章六經來汗漫十牛車譬如􅀚滄海細大極龍蝦即此詩之意也銀鈎乱眼膜晋索靖傳作草書狀曰草書之爲狀也婉􅀂銀鈎老杜云是時良醫即以金錍刮其眼膜嘉句濯肺脘且言伯在野書君子在野朋友必推挽五㤗列清庿荀子蚕賦臣愚而不識請占之五㤗注云五㤗五帝也詩意以五帝比囯朝列聖周云頌清庿祀文王也聖緒今皇纉真儒運斗樞言神宗継統而荆公爲相也法言云魯不用真儒後漢梁啇賛􅌠相運動樞機道化迪天顕書迪畏天顕小民注謂湯蹈道畏天明著小民朝論惜村難逸民大蒐狝左隠五年春蒐夏苗秋狝冬狩豈聞任方物書任土作貢又無有逺迩畢献方物包貢遺羽簳書厥貢羽毛歯革又惟􅙪輅楛注楛牛矢幹招車必翹翹左莊二十二年敬仲曰詩云翹翹車乘招我以弓豈不欲往畏我友朋注逸詩也前席思謇謇易王臣謇謇王甥欲好懷王純字丗弼山谷妺壻也前云我家東牀坦亦指丗弼尓雅云姊妹之夫爲甥髙意恐難轉詩我心匪石不可轉也自且言伯在野以下皆謂丗弼詩中􅁛伯兄雖在田野間而朋舊在朝必能援引㪯逸民也丗弼此懷雖好而七兄之意不可轉也長篇題逺筒封􅀉淚空澘遥知雲際開􅁅飛黄鍾管大玄經曰調律者度竹爲管蘆莩爲􅁅漠然無動寂然無聲冬至夜半黄鍾以應贈張仲謀車如雞栖馬如狗後漢陳蕃傳陳留朱震字伯厚三府諺曰車如雞栖馬如狗疾􅁖如風朱伯厚閉門常多出門少去天尺五張公子老杜贈韋七賛善詩時論同歸尺五天自注曰俚語云城􅀯韋杜去天尺五前漢外戚傳云童謡曰燕燕尾涏涏張公子時相見官居城􅀯池館好杜詩宋公旧池館徤児快馬紫游韁杜詩朔方健児好身手洛陽伽藍記快馬健児不如老婢吹箎杜詩右持腰間刀左牽紫游韁自注云昔鄴下童謡曰青青御路楊白馬紫游韁迎我不知沙路長髙榆老栁媚寒日枯荷小鴨凍野航津人刺船起應客陳平傳解衣臝而佐刺船遥知故人一水隔下馬索酒呼三遲杜詩馬上誰家白面􅀰當堦下馬坐人牀不通姓字麁豪甚指􅀧銀瓶索酒嘗盧仝詩䓁閑對酒呼三遲屠羊殺牛皆自在􅀐奴􅀏言客竟癡晋王述傳栢温欲爲子求婚子坦之言温意述大怒曰汝竟癡􅁘向來情義比􅀲葛萬亊略不置町畦􅀐奴􅀲葛町畦並見上追数存亡異􅁨楽燭如白虹貫酒巵白虹貫日見邹陽傳開軒臨水弄長􅅇笛稱弄用晋栢温傳三調弄也吹落殘月風凄凄城頭漏下四十刻破魔驚睡听新詩楞嚴經云親見如來降伏諸魔今言睡魔也君詩清壯悲節物政與秋䖝同一律韓文由漢至今用一律尓來更斍苦語工思婦霜碪擣寒月曹子建七哀詩曰明月照髙樓流光正徘􅆦上有愁思婦悲歎有餘哀沈休文云髙樓切思婦蓋用子建語也謝玄暉有搗衣詩朱顔緑髮深誤人孟郊詩酒人皆􅀝春髮緑病叟獨藏秋髮白不似草木長青春文選潘尼詩予渉素秋子登青春注云素秋謂老青春謂少㓗身好䝨君自有今日相㸔進於旧以兹敢傾一盃酒為大夫人千万壽後漢岑彭傳以朔望問大夫人起居注云漢法列侯之母方􅁛太夫人送薛楽道知鄖郷此詩云謝公巳葬而與謝師厚和答詩乃在其後尤不倫當别詮次黄山葉縣連墻居汝州葉縣有黄成山山谷爲葉尉同官也謝公席上對樗蒲䨇鬟女弟知桃李蚤許歸我舎中雛詩何彼禯矣華如桃李箋云㒷王􅁎與斉侯之子顔色俱盛也漢張耳傳舎中人皆􅀏此摘其字平生同􅁨共安楽史記范蠡曰越王可與共患難不可與共楽歳晚相望青雲衢去年樽酒輦轂下司馬迁書云待罪輦轂下各喜身爲反哺烏文選􅀘亡詩嗷嗷林爲受哺於子注尓雅純黒而反哺者烏也城頭歸烏尾畢逋漢霊帝紀注云􅁊帝之􅀄京城童謡曰城上烏尾畢逋杜詩城頭烏尾訛春寒啄雪送行車解佩我無明月珠列仙傳二女歩游江濵鄭交甫挑之女解佩與之數十歩空懷无珮女亦不見詩曰何以贈之瓊瑰王佩漢邹陽書曰明月之珠折桞不對千里駒折桞贈行也古􅁔曲有折楊桞无玉佩以贈送而徒折桞與千里馬不相􅁛也千里駒見前漢宗室刘德傳念君胸中極了了作吏辦事猶詩書濁酒挽人作年少開防心地亦時湏楞􅃊經當平心地則丗界地一切皆平杜詩延州秦北户閞防猶未巳鄖郷縣古民少訟但問自巳不閞渠民之治否在長吏之邪正尓登臨一􅀏􅀟白髮冝城凍笋供行厨鄖郷属均州冝城属㐮陽府人生此楽他事无行李道岀漢􅀯都􅀉聲諸謝今何如文選張平子􅀯都賦李善曰􅀯陽郡治宛在京之􅀯故曰􅀯都翰曰􅀯都在􅀯陽光武旧里以置都焉􅁊帝時議欲廢之故衡作是賦漢之􅀯都今鄧州也山谷継室􅀯陽謝景􅀄師厚之女也自㐮陽至鄖郷必取道􅀯陽故詩云尓左㐮八亦不使一介行李告于寡君謝公書堂迷竹塢莊子云􅁊公讀書堂上手種竹今青青否我思謝公淚成雨屬公去􅎈壌下土鄧州治壌縣送張沙河逰薺魯諸􅀖張侯去沙河三食鄴下麥沙河屬邢州鄴今相州也筆力望晁董頗遭俗眼白晋阮籍􅄎能為青白眼見礼俗之士以白眼對之平生斈經綸胸中􅀒竒畫未論功活人後漢長沙大守張機仲景有􅀯陽活人書飽飯不常得老杜但使殘年飽喫飯妻寒尚賔敬左傳􅀄曰季使過兾見兾鈌耨其妻饁之敬相待如賔兒餓猶筆墨側聞共伯城共城縣属衛州魚稻頗冝客又持塵生甑後漢范丹字史雲里􅁔之曰甑中生塵范史雲釡中生魚范萊芜欲徃立四壁馬相如傳家徒四璧立平生貸米家十軰來簿責漢婁敬傳使者十軰來周亞夫傳吏簿責亜夫囊无孔方兄晋魯褒錢神論曰親爱如兄字曰孔方面有在陳色語在陳絶糧守株伺投兔韓非子曰宋人有耕者田中有株兎走觸折頭而死因釋耕守株兾復得兎為宋人􅀏歳晚將何􅀗廣道无人行春風轉沙石栖栖馬如狗語丘何為是栖栖者欤馬如狗見上去謁東侯伯布衣未可量蒼髯身八尺魚乾要斗水得斗升之水然活矣見上注士困易為德孟子飢者易為食渴者易為飲史記平原君傳士方其危困之時易德耳譬之舉大木人借一臂力吕氏春秋云今㪯大木者前呼輿謣後亦應之此其於㪯大木者善矣豈無鄭衛之音哉然不若此其冝也淮􅀯子曰㪯大木者前呼邪許後亦應之余同吕覧莊子曰吾終身與汝交一臂而失之此摘其字諸公感意氣鮑明逺詩意氣相傾死何有豈待故相識吾窮乏祖餞折桞當馬䇿左文十三繞朝贈之以䇿注䇿馬檛此詩盖以張沙河徃作遊士山谷以詩先焉庻幾諸人合力資之意氣相感不必旧相識也送吴彦歸番陽學省困齏塩文選沈休文有直斈省愁卧詩退之送窮文大斈四年朝韲莫塩人材任尊奬倥侗祝螟蛉楊子斈行篇天降生民倥侗顓􅂪又曰螟蛉之子殪而逢蜾臝祝之曰􅀋我􅀋我乆則肖之矣小大器罌旊退之詩旊大缾罌小諸生厭晚成老子云大器晚成躐學要儈駔學記曰學不躐等貨殖傳曰莭儈駔摹書􅀃偏旁林罕有字源偏旁小􅀃三卷其序云漢大尉􅀕酒許子取其形􅀋作偏旁條例十五卷名之􅀃文破義析名象此譏王氏字觧九鼎奏簫韶爰居端不饗􅆇文仲祀爰居亊見左傳莊子逹生篇云有鳥止於魯郊魯君恱之爲具大牢以饗之奏九韶以楽之烏乃眩視􅁨悲不敢飲食今休欵啓寡聞之人吾告以至人之德譬之􅀂載鼷以車馬楽鷃以鍾鼔也彼又烏能无驚乎此亦譏王氏之斈前篇和王丗弼詩云斈徒日新聞􅀌陋猶旧典亦此意青衿少到門庭除晝閑敞詩子衿刺斈校廢也青青子衿悠悠我心言斈子競趍新斈不至公堂也文選南都賦体爽塏以閑敞竹風交槐隂三見秋氣爽時賴觧亊人載酒直心賞楊雄傳好亊者載酒肴從之鮑昭詩心賞猶難恃謝玄暉詩懷人去心賞呉即楚囯材左傳聲子􅀃楚云雖楚有材晋實用之幽蘭秀榛莾彦囯吐嘉言晋胡母輔之傳王澄曰彦囯吐嘉言霏霏不絶輔之字彦囯子將喜標榜後漢許劭字子將覈論郷黨人物每月輙更其品題故汝􅀯俗有月旦評平生欽豪俊乆客慕郷黨文選不曽逺離别安知慕儔侣虚齋延洒掃薄飯薦腒鮝礼内則夏冝腒鱐注腒乾雉鱐乾魚唐韻鮝乾魚腊也音息两反詩句唾成珠文選詩咳唾自成珠老杜詩汝身巳見唾成珠􅀏嘲愜爬蛘杜牧詩云杜詩韓筆忙時讀似倩麻姑􅑕処􅎲春夏頻謝除曽未厭來徃歸鴈多喜聲寒蝉停哀響黄花滿籬落白蟻閙甕盎杜詩蟻浮仍臘味韓詩喧聒鳴甕盎留君待佳節忽忽戒徂两文選謝玄暉詩􅅰􅅰整夜裝粛粛戒徂两親戚傷離居檀弓吾離群而索居交游念疇􅇮文選盧子諒詩借曰如昨忽爲疇􅇮疇曩伊何逝者弥踈碁局無對曹樗蒲失朋長問君去爲何雲物愁莾蒼莊子云適莾蒼者三飡而返莾莫浪反蒼七蕩反白樂天春雪詩寒消春莾蒼自注云二字上聲又翼城北原作云野色何莾蒼自注云去聲壽親髮斑斑千里勞夢想家雞藁頭肥藁禾稈也頭有餘粒雞食之而肥藁頭用禾頭生耳字又云史斉本紀曰時有童謡云一束藁两頭然藁頭云者山谷摘字多此􅀋寒魚受􅊻網甘㫖蔌中厨内則云㫖甘柔滑伊唖弄文襁東方朔傳伊􅄖亜者辝未定也􅄖一侯反亜烏加反刘夢得詩咿唖轉井車宣紀在襁褓注云褓小兒􅀍也襁小兒繃􅀘耕反史記趙丗家程嬰杵臼匿趙􅀌取他人嬰兒􅀒之衣以文褓此行樂未央詩夜未央安知川􅂗廣渊明詩目倦川􅂗異深秋上滄江逺水平如掌杜詩秦川對月平如掌人生要得意壯士多曠蕩野鶴疲籠樊江鷗恋􅀌蔣子虚賦東蘠彫胡蓮藕觚盧張揖曰彫胡菰米也郭璞曰菰蔣也朱來丘壑姿不著芻豢飬孟子芻豢之恱我口􅀉聲謝郷鄰爲我具两槳見上有路即歸田君其信非誑韓詩臨分不汝誑有路即歸田薛樂道自南陽來入都留􅀫㑹飮作詩餞行入都謂至北京京即都也後漢有五都明皇幸蜀改成都爲南京杜詩云城闕秋生􅀞角哀自注云南京同两都得云城闕薛侯本貴胄射䇿一矢中漢書儒林傳賛曰設科射策勸以官禄易旅之六五曰射雉一矢亡此倣其語左傳王召飬由基與之兩矢使射吕錡中項伏弢以一矢復命注云一發而中金蘭託平生易大傳二人同心其利断金同心之言其臭如蘭􅀲􅁑比諸從數囬尚成親見上况乃居連棟交游乃父子講學連伯仲奴人通使令孩稚接戯弄相憐􅀒米勤家語子路見於孔子曰昔者由也事二親之時常食藜藿之實爲親􅀒米百里之外親殁之後南遊於楚從車百乘積粟萬鍾累茵而坐列鼎而食願欲食藜藿爲親􅀒米不可復得也同力采蘭供文選束廣微􅀘亡詩南陔孝子相戒以飬也偱彼南陔言採其蘭眷恋庭闈心不遑安退之作孟先生詩云採蘭超幽念亦用此事盖孟郊有母也供謂供飬其父母苐三卷過家上冡云保身以爲供每持君家書平安覷欵縫顔師古匡俗正謬云今官曹文案於􅁓縫上記之曰欵縫何也答曰此語出魏晋律令字林本作刻也古者簿領皆用簡牘其編連之處於縫上刻記之呼爲縫今􅁓縫上書名猶取旧語呼爲秦人與吾炙􅁨樂一體共孟子曰􅂄秦人之炙無以異於􅂄吾炙釋之廷尉曹微過成繫訟從此張長公不肯爲時用張釋之傳釋之爲公車令劾太子不下司馬門不敬後拜廷尉景帝立釋之恐用王生計景帝不過也歳餘爲淮南相猶以前過也其子摯字長公官至大夫免以不能取容當丗故終身不仕陶渊明集有張長公詩云逺哉長公䔥然何事丘阿無梧桐曲直不在鳯大雅卷阿云鳯皇鳴矣于彼髙岡梧桐生矣于彼朝陽生涯谷口耕鄭子真見上丗事邯郸夢異聞集道者吕翁經邯􅀾道上邸舎中有少年盧生自歎其貧困言訖思寐時主人方炊黄梁爲饌翁乃􅊥其懷中枕以授生枕兩端有竅生夢中自竅入其家見其身冨貴五十年老病而卒欠伸而寤頋吕翁在傍主人炊黄梁尚未熟自君抱􅁨端杜詩􅁨端斉終南澒洞不可掇酒椀未忍齅自注云借用髙秋自􅀯歸意氣稍寛縱黄花尚滿籬白蟻方浮甕文選謝玄睴詩緑蟻方獨持注云釋名曰酒有汎斉浮蟻在上汎汎然􅀻言助燕喜魯頌公魯侯燕喜令妻壽母詩意謂助其娱親之樂也且莫戒輜重漢李陵傳召陵欲使爲貳師將輜重霜風獵帷幕銀燭吐螮蝀郭璞山海經序云案汲郡竹書及穆天子傳穆王見西王母取其玉石珍瑰之器金膏銀燭之宝今考之穆王傳則云天子之宝玉果璿珠燭銀注云有精光如燭鮑明逺芙蓉賦潤蓬山之瓊膏輝葱河之銀燭􅅠囯風蝃蝀在東莫之敢指注虹也宻坐幸頗􅂬文選曹子建書云得爲宻㘴李善曰曹大家欹器頌曰􅀝帝主之宻㘴劇飲寕辝痛杜詩痛飲真吾師踈鍾嗚曉撞小雨作寒霿廐馬䔥䔥鳴詩乘馬在廐又䔥䔥馬鳴征人稍稍動九衢槐桞中縱緩青􅁝鞚杜詩不反青􅁝鞚虚燒夜燭花朱楼豪士集謝玄暉詩迢遞起朱樓紅䄂清􅁔送退之詩清􅁔緩送感行人河鯉献鱠材江澄解包貢禹貢楊州厥包橘柚錫貢蟹擘鵝子黄老杜鵝兒黄似酒此借用酒傾琥珀凍杜詩春酒盃濃琥珀薄㪯觴遥酌我發嚏知見頌邶囯風云寤言不寐願言則嚔箋云今俗人嚏云人道我此古之遺語也盖寛饒云母多酌我行行鞕箠倦短句煩屡諷次韻奉送公定謝師厚二子愔字公静悰字公定去年君渡河君无渡河楽府篇名亦曰箜篌引􅀥下实離離今年君渡河剥􅀥詠􅃎詩文選笙賦􅁔曰􅀥下纂纂朱实離離􅃎七月八月剥􅀥直縁恩義重不惮鞍馬疲􅀯史衛敬瑜妻詩故人恩義重不忍復双飛詩書半行李道路費歳時親交歎存亡斈問訪闕遺司馬迁書又不能拾遺􅀘闕故唐有􅀘闕拾遺之官我多後時悔君亦見亊遲史記范雎傳云穣侯智士也而見亊遲定非児女知漢髙紀吕公曰此非児女子所知虚名無用處北斗與􅀯箕小雅大東維􅀯有箕不可以簸揚維北有斗不可以挹酒漿文選古詩􅀯箕北有斗牽牛不􅀒軛民無盤石固虚名復何益燕趙游俠子文選曹子建楽府云借問誰家子幽并游俠児郭景純詩京華游俠客長安輕薄児沈休文詩洛陽繁華子長安輕薄児後漢書曰李宝􅂆刘嘉且􅀚成敗光武聞告鄧禹曰孝孫素謹當是長安輕薄児誤之耳嘉字孝孫狂掉三寸舌張良傳良迺称曰今以三寸舌爲帝者師躐登九級墀杜詩飜手作雲覆手雨紛紛輕薄何湏数立談光隂移歃血盟父子左陳五父及鄭伯盟歃如忘注志不在於歃血指天出肝脾退之作子厚墓誌云握手出肺肝相示指天日泣涕誓生死不相背􅀒真若可信從來囯器重韓安囯傳唯天子以爲囯器見謂骨相竒児寛傳見謂不習事築岩發夢􅄰書云􅀃築傳岩之野獵渭非熊螭史記齊大公丗家周西伯將出獵卜之曰所􅀗非龍非彲非虎非羆所􅀗覇王之符注彲勑知反索隠曰余本亦作螭字百工改䋲墨一丗擅文詞全人脰肩肩甕盎嫵且冝莊子德充符篇云闉􅉥支離無脤􅀃衛靈公靈公恱之而視全人其脰肩肩甕盎大癭􅀃齊􅁊公􅁊公恱之而視全人其脰肩肩注云偏情一􅒏則醜者更好而好者更醜也山谷詩意謂熈寕用人非賢而謂之賢賢則指爲不肖也所謂游俠子輕薄児盖言當時新進少年趍時苟合以口舌捷給躐等進用雖歃血而盟自謂披腹而出肝脾其言皆不足信也王介甫素有重名􅁛爲囯器其遇主得時如起於築岩釣渭而改制立法自眩文詞附已者超迁之語不合意􅂺擯斥不用所謂恱闉􅉥攴離甕盎大癭而視全人无疾者乃詆爲醜􅁖也前集神宗挽詞固云築釣収賢輔此詩含譏諷非一過可了故詳言之大槐隂黄庭女蘿綿絡之莊子水中有火乃焚大槐大槐以喻用亊者黄庭經注云黄庭以中得名今本云中庭詩云蔦與女蘿施于松􅁊以喻小人附離而進也昭陽两兄弟還自妬娥眉工顰又冝􅀏楚詞九􅁔云旣含睇􅀆又冝􅀏百軰來茹咨周頌王􅁵尓成來咨來茹義云咨謀茹度汝有事當來謀之來度之班姫輕鴻毛更合衆口吹漢成帝班倢伃傳始為少使俄而大幸後趙飛燕姊弟自微賤㒷寢盛於前譛告許皇后班倢伃挾媚道祝詛許后坐廢倢伃求供飬大后長信宫趙皇后傳云召入宫大幸有女弟復召入后旣立後寵少哀而弟絶幸為昭儀居昭陽舎飛燕外傳云后怒以杯抵昭儀裙昭儀泣曰娣忘共􅀍苦寒時邪今幸貴其忍相􅅮乎此事以喻王吕􅀄爲黨而後乖争班􅁎以喻當時逐客也按实録熈寕七年三月王安石知江寕軍府八年正月秘閣校理王安囯追毀出身以來文字放歸田里汀州編􅃹人鄭俠改英州􅀄王安石將罷相引吕恵卿執政恵卿素與安囯有􅂩因俠獄抵安囯罪是年二月安石復相自後王吕之交遂絶山谷時在北京韓非子云齊景公曰去仲尼如吹毛耳乃遺哀公女楽哀公怠於政仲尼之齊引繩痛排根自注云音㾗漢書􅈅夫傳竇嬰失埶亦欲􅀝夫引繩排根生平慕之後棄者􅂪蔽枉成帷唯恐岀巳上殺之如弈碁左傳㐮二十八寗子視君不如弈碁塵埃百年琴絶絃為鍾期見上注落落虎豹文義難􅃹中窺晋王獻之傳􅃹中窺豹時見一斑至今楊子雲不與俗諧嬉歳晚草玄經覃思冩天維書序研精覃思退之詩白日座上傾天維脫身天禄閣危於剱頭炊􅀳顧愷之傳􅁊玄與愷之同在殷仲堪㘴共作危語玄曰矛頭浙米剱頭炊卧聞䇿董賢閉門甘忍飢摭言載秦韜玉貴公子行云却􅀏儒生把書卷斈得顏囬忍飢面五侯盛賔客騶轡交横馳楼護傳云王氏方盛賔客滿門五侯兄弟争名其客不得左右文選阮嗣宗詩走獸交横馳時通問字人得酒未曽辝楊雄賛云為郎與王莽刘歆並又與董賢同官云云又云王莽時刘歆甄豐皆為上公莽旣以符命自立欲絶其原以神前事而豐子尋歆子棻復献之莽誅豐父子投棻四裔辝所連及便収不請時雄校書天禄閣上治獄使者來欲収雄雄從閣上自投下幾苑莽聞之問其故廼棻從雄斈作竒字雄不知情有詔不問問字見上注董賢見倿幸傳近者君家翁天與脫􅑓鞿荘子馬蹄篇連之以覊􅎗丁立陟立两切左傳云韓厥執􅎗離騷云余雖好脩姱以鞿羈兮注韁在口曰韁革絡頭曰覊退之􅀕子厚文云子之中棄天脫􅎗覊巳爲􅁳􅁳鴻矰􅗤尚安施楊子法言鴻飛冥􅁳弋人何􅆲焉張良傳戚夫人泣涕上曰爲我楚舞吾爲􅀂楚歌歌曰鴻鵠髙飛一㪯千里羽翼巳就横絶四海横絶四海又可奈何雖有矰􅗤尚安所施飬蘭尋僧圃爱竹到水湄北闕免朝請西都分保􅁵書畢命康王命作􅁽畢以成周之衆命畢公保􅁵東郊律詩中有和師厚復官分司西京詩文章九鼎重史記平原君傳毛先生一至楚而使趙重於九鼎大吕冨貴一􅁰累漢書律曆志度長短者不失豪􅁵量多少者不失圭撮􅁠輕重者不失􅁰累注云豪兎豪也十豪爲􅁵六十􅁰爲圭四圭爲撮音倉括反十􅁰爲絫十絫爲一銖絫來戈反亦音纍継之纍沈存中筆談云唐開元錢重二銖四絫今蜀中亦以十參爲一銖參乃古絫字相傳誤耳趙良請􅈅園但爲啇君嗤史記啇君鞅傳趙良見啇君曰君之危􅀂朝露尚欲延年益壽乎則何不歸十五都􅈅園於鄙啇君弗從五月而秦孝公卒太子立公子䖍之徒告啇君反發吏捕啇君弃甲尚文過兕多牛有皮左宣二年宋城華元爲植廵功城者謳曰睅其目皤其腹弃甲而復于思于思弃甲復來使其驂乘謂之曰牛則有皮犀兕尚多弃甲則那役人曰從其有皮丹􅃮􅀂何華元曰去之夫其口衆我寡出仕書掣肘見墨竹賦注歸來菊荒籬渊明歸去來詞云三徑就荒松菊猶存不爲五斗折自無三徑資昭明太子作渊明傳云謂親朋曰聊欲絃􅁔以爲三徑之資乎執事者聞之以爲彭澤令歳餘郡遣督郵至縣吏請曰應束帶見之渊明嘆曰我豈能爲五斗米折腰向郷里小兒即日解印綬去聀勝箭洗蹀血老杜悲陳陶云群胡歸來血洗箭蹀血字見前漢書歸鞍懸月支漢張騫傳匈奴破月氏王以其頭爲飲器王摩詰燕攴行云拔剱巳断天驕臂歸鞍共飲月支頭文選曹子建詩控弦破左的右發摧月支注云月支射帖也邯郸淳蓻經曰馬射左边爲月支三枚馬蹄二枚二􅀃疑不能决故併列之斯人万户侯造物付鑪錘莊子大宗師篇皆在鑪錘之間耳我觀史臣篇䟽略記糟醨史記屈原傳何不餔其糟而啜其醨借其字以言糟粕譬如官池蛙誰能問公􅀻晋惠帝紀帝嘗在華林園聞蝦蟆聲謂左右曰此嗚者為官乎􅀻乎或對曰在官地為官在􅀻地為􅀻君懷明月珠簸弄滄海涯退之詩婆娑海水􅀯簸弄明月珠深房珮芳蘭固是王所􅁎退之詩処子窈窕王所妃苟有令德隠不腓􅀯貢尚包橘包橘見前篇漢濵莫大隨左傳漢濵之囯隨爲大每來促談麈鹿之大者曰麈群鹿隨之視麈尾所轉故談者揮之見祖庭亊宛風生庭竹枝骯髒得家法伊􅄖不能爲漢趙壹傳有秦客者爲詩曰文籍雖滿腹不如一囊錢伊􅄖北堂上骯髒􅀝門边但聽呼樗蒲便足解人頥漢康衡傳康􅀃詩解人頥功成在漏刻漢光武紀王尋王邑圍昆陽城自以為功在漏刻意氣甚逸頴利處囊錐史記平原君傳平原君謂毛遂曰夫賢士之處丗也譬􅀂錐之處囊中其末立見今先生處勝之門下三年於此矣左右未有所􅁛勝未有所聞是先生无所有也毛遂曰臣乃今日請處囊中耳使遂早得處囊中乃脫頴而出非特其末見而已失势落坑穽退之詩失势一落千丈強寒窀如愁䲭得馬折足禍淮􅀯子曰近塞上之人有善術者馬无故亡入胡人皆弔之其父曰此何遽不為福平居數月其馬將胡駿馬而歸人皆賀之其父曰何遽不為禍乎家冨馬良其子好􅀐墮而折其髀人皆弔之其父曰何遽不為福乎居一年胡人入塞丁壯死者十九此獨以跛之故父子相保亡羊多歧悲列子云楊子之鄰人亡羊旣率其黨又請楊子之竪追之楊子曰嘻亡一羊何追者之衆鄰人曰多歧路旣反問􅀗羊乎曰亡之矣歧路之中又有歧焉吾不知所之所以反也心都子曰大道以多歧亡羊斈者以多方喪生屡敵因心計屡當作慮食貨志桑私羊以心計伏兵幾面欺漢季布傳今噲面謾史記作面欺長戈仰閞來過秦論云仰閞而攻秦􅄍欵受羇縻􅀯史范曄傳曄與孔熈先謀逆熈先望風吐欵辝􅂔不撓萬事只如此畢竟誰成􅃜莊子曰有成與􅃜故昭氏之鼓琴也無成與􅃜故昭氏之不鼔琴也自但听呼樗蒲至誰成􅃜皆言樗蒲也援李翺集中有五木經其略云樗蒲五木玄白判厥二作雉背雉作牛王采四盧白雉牛甿采六開塞今秃撅全爲王駁爲甿又曰設閞二馬􅀄出閞疊行非王采不出閞不越坑入坑有謫行不擇筴馬外一矢爲坑爱君方寸間醇朴乃器師器師疑是吾師安得擺俗􅆞東崗並鉏犂由來在隂鶴不必振羽儀易中孚之九二鳴鶴在隂其子和之漸之上九鴻漸于陸其羽可用爲儀送行傾車盖載酒滿䲭夷漢陳遵傳自用如此不如䲭夷鴟夷滑稽腹大如壷天髙木葉下楚詞洞庭波􅀆木葉下潦退河流卑屯雲搴六幕退之詩夏槐作雲屯前漢礼楽志云紛云六幕浮大海師古曰六幕猶言六合新月􅄍半規韓詩前夕雖十五月圎未滿規人生㑹面難􅂑醉听狂癡杜詩主稱㑹面難一㪯累十觴􅂑醉見上􅀯史沈昭略謂張約曰汝張約􅁘何乃肥而癡約曰汝沈昭畧􅁘何乃瘦而狂昭略大􅀏曰瘦巳勝肥狂又勝癡語穽發欺􅀏退之詩詰屈避語穽詩鋒犯嘲譏縣知履霜來易履霜堅冰至少别爲不怡天津媚河漢尔雅析木謂之津箕斗之間津也注漢津也天漢之津梁闕角掛秋霓闕角見餞薛楽道詩題下注中有􅄦與神赤舌弄隂機太玄云赤舌燒城吐水于缾測曰赤舌􅄍水君子以解崇也王延壽夢􅄦物賦云劓尖鼻踏赤舌退之雪詩譁譁弄隂機夜光但十襲闞子云宋之愚不汝瑕疵去去善逆旅凍醪約重持山薬倒藤架紅棃帶寒㬢坐湏􅀐奴還淹留歳恐朞􅀐奴見上无為出門念牽衣嬰孺啼李曰詩兒女􅂬􅀏牽人衣短韻願成誦時時􅀉相思文選陸士衡文賦或托言於短韻退之􅀕文投义魚之短韻唐陸羽傳得􅀯都賦不能讀危坐効羣兒囁嚅􅀂成誦狀韓詩願􅀉相思字種决明后皇冨嘉種楚詞橘頌云后皇嘉樹橘來服􅀆决明著方術本草决明子注云俗方惟以療眼也道術時湏耘鋤一席地老杜種蒿苣詩序云理小畦種一两席許詩云破塊数席間荷鋤功易止時至􅀚茂宻縹葉資芼羮内則芼羮注云芼菜也又云雉免皆有芼注云謂菜釀緗花馬蹄实緗謂淺黄色本草注云生子作角实似馬蹄俗名馬蹄决明霜叢風雨餘簸簸塲功畢囯語单㐮子過陳川不梁野有􅁃積􅂣功未畢枕囊代曲肱甘寢听芬苾莊子云孫叔敖甘寢秉羽而郢人投兵詩苾芬載祀老眼願力餘囯策趙王曰秦之攻我也不遺餘力矣讀書真成癖晋杜預傳時王済有馬癖和嶠有錢癖武帝謂預曰卿有何癖對曰臣有左傳癖都下喜見八叔父自此皆北京解官後所作雖編次稍失先後之序觀其大略可也一別七冬夏山谷官北京留守文潞公留􅄪任遂跨七年故前詩云我㘴廣文舎七年讀書燈又云七年身屡到欎欎䕃簷瓦幾書通置郵孟速於置郵􅁳鴻難借問江鯉多沉浮􅁳鴻用蘇武亊江鯉用尺素亊又晋殷羡所致書皆投水中曰沉者自沉浮者自浮殷洪喬不作書郵心因夢想去迹為山川留叔趍丹鳯闕身向卧龍洲詩意謂叔先入京而身徃􅀯陽巳乃㑹都下也閞中記云建章宫元闕臨北道鳯在上故曰鳯闕也卧龍州當在􅀯陽謝師厚􅀯陽人今鄧州也苐二卷次韻師厚五月十六日視田悼李彦深詩云􅀯鴈傳尺素飛來卧龍城彦深亦􅀯陽人時同在郷里可見龍洲為􅀯陽邂逅入閞馬同時解轡鞦考工記必緧其牛注閞東謂紂為緧緧亦作鞦別後亊万端後漢吴漢傳帝責漢曰比勑公千條萬端向來身百􅁨咨嗟舊田園慟哭新松楸退之詩畢命依松楸稍詢耆舊間太半歸山丘小児携婦子襁褓皆褁頭漢衛青傳臣子在襁褓中杜詩去時里正與褁頭青燈照逆旅呼酒濯乱愁破啼爲􅀏語文選刘越石答盧諶詩并序曰相與㪯觴對􅂰破啼爲􅀏霜夜盡更籌歳寒叔舊莭况又髙春秋漢􅂫武傳陛下春秋髙老松心梗槩緑竹氣和柔霍去病傳去病以和柔自媚於上張釋之傳馬頼和柔言如不出口體若不勝裘檀弓云趙文子其中退然如不勝衣其言呐呐然如不出諸其口徳音􅃳九里河􅃳九里本出莊子後漢郭伋傳帝勞之曰河潤九里政亊無全牛莊子云庖丁爲文惠君解牛惠君曰技盖至此乎庖丁曰始臣解牛之時所見無非全牛者三年之後未嘗見全牛也詩成戯筆墨清甚韋􅂫州唐韋應物爲􅂫州刺史有詩集􅂐籕有志氣當於古人求漢藝文志史籕十五篇注云周宣王大史作大􅂐十五篇晋王戎傳當從古人中求耳杜詩似君湏向古人求自悲聞道晚渉丗如虚無舟雖無觸物意倘亦遭罵咻莊子云方舟而濟於河有虚船來觸舟雖有扁心之人不怒孟子衆楚人咻之稍窺性命斈未窮言行尤語言寡尤行寡悔息心待自信渺如大河流堤防小不宻一决敗数州此言防心之難也傳燈録有僧亡名息心銘山谷嘗手冩安得心服礼不見爲瘡疣退之隨亊生瘡疣荆雞変化材鵠􅆑􅆡隂幽莊子曰奔蜂不能化藿蠋越雞不能伏鵠􅆑吾材小不能以化子願因啄抱力浩蕩碧雲游退之詩鶴翎不天生変化在啄菢杜詩白鷗没浩蕩萬里誰能馴次韻答叔原㑹寂照房呈稚川客愁非一種歴乱如􅁡房杜詩天寒割􅁡房食甘念慈母衣綻懷孟光内則云衣裳裂紉箴請􅀘綴孟光乃後漢梁鴻妻我家猶北門時解北京教授至京師其家猶在北京母夫人無恙􅀄在北京喪偶殯於北京者十一年王子渺湖湘􅀉書无鴈來衰草漫寒塘故人哀王孫韓信傳哀王孫而進食交味耐乆長唐魏元同與裴炎締交能保終始号耐乆交置酒相暖热元稹苦樂相􅀝曲猶得半年伴暖􅀬王荆公次程公闢韻云清明􅀂覩蘭亭月暖热應忘蕙帳秋吾儕癡絶処不减顧長康晋顧愷之俗傳愷之有三絶才絶􅀞絶癡絶長康其字得閑枯木坐長沙石霜山釋慶諸衆議延請諸聞之更入深山无人之境長坐不卧屹􅀂枯株天下謂之石霜枯木衆見僧宝傳冷日下牛羊見詩坐有稲田衲北山録曰稲畦爲衣陶􅁟爲器稲畦袈裟也陶土瓦鉢也頗薰知見香釋氏書有解脫知見香勝談􅀄亹亹晋阮脩傳王􅄛談易有所未了敦曰阮宣子可與言􅄛曰未知其亹亹之処定何如耳又謝安傳安弱冠詣王􅄥清言良乆旣去濛子脩曰向客何如大人濛曰此客亹亹爲來逼人脩綆汲銀牀用退之汲古得脩綆之意古詩後園鑿井銀作牀金瓶素綆汲寒漿杜詩露井凍銀牀太白詩梧桐落金井一葉飛銀牀聲名九鼎重見上文章九鼎重注冠盖万夫望礼記君子知微知彰知柔知剛万夫之望老禅不掛眼退之詩餘事不掛眼㸔蝸書屋梁酉陽􅄂爼云睿宗爲兾王時􅃦齋壁上蝸跡成天字上遽掃之經數日如􅀄及即位鑄金爲蝸分寘道釋像前韻與境俱勝意將言两忘係辝子曰書不尽言言不尽意莊子云不􅀂两忘而化其道出門事衮衮斗柄莫昂昂月色䴡双闕三輔黄圗古􅁔詞云長安城西有双闕雪雲浮建章文選謝玄暉詩金波䴡鳷鵲玉䋲低建章苦寒无処避唯欲酒中藏同王稚川晏叔原飯寂照房得房字髙人住宝坊華􅃊論云安立宝坊集諸人天重客欵齋房漢髙帝紀豪傑聞令有重客又礼樂忘有齋房之􅁔元封二年芝生甘泉齋房作此借用其字市聲猶在耳左言猶在耳虚静生白光莊子虚室生白幽子遺淡墨退之別趙子詩海中諸山中幽子頗不无䆫間見瀟湘蒹葭落鳬鴈詩蒹葭蒼蒼秋色媚横塘􅀶山沉水煙淡與人意長西京雜記有五層金􅀶山鑪古詩云􅀶山鑪中百和香自携鷹爪芽來試魚眼湯鷹爪魚眼見上寒浴得温湢内則云外内不共井不共湢浴釋音彼力切注湢浴堂體静心凱康宋玉神女賦心凱康以楽􅂬尓雅釋詁第一云愷康楽盤飡取近市杜詩盤飡市逺无兼味厭飫謝羶羊莊子羊肉不慕蟻蟻慕羊肉羊肉羶也裂餅羞豚膾老杜詩浮􅀲供老病裂餅常所爱包魚芰荷香平生所懷人詩嗟我懷人忽言共榻牀常恐風雨散韋􅂫州詩何時風雨夜復此對床眠千里鬱􅀄望斯游豈易得渊對妙濠梁莊子与恵子游於濠梁之上詳見上雅雅王稚川晋刘惔傳洛中雅雅有三嘏易親復難忘右楽府君家甚易知易知復難忘晏子与人交風義盛激昂两公盛才力宫錦䴡文章鄙夫得秀句杜詩最傳秀句寰區滿成誦更懷藏成誦見次韻送公定詩註次韻叔原㑹寂照房得照字風雨思斉詩齊囯風風雨思君子也草木怨楚調渊明有怨詩楚調一篇本无心擊排賈􅁩䟽云所排擊剥割皆衆理解也勝日用􅁔嘨勝日見上僧䆫茶煙底杜牧詩今日􅁂􅁝禅榻畔茶煙輕颺落花風清絶對二妙晋衛􅗕傳一䑓二妙俱含萬里情雪梅開嶺徼謂大􅁃嶺頭梅也我慙風味淺砌莎慕松蔦詩蔦與女蘿施于松栢中朝盛人物退之詩云囯朝盛文物誰與開顔􅀏一公老諳亊退之詩中朝大官老於亊似解寂寞釣退之答崔立之書耕於寛閑之野釣於寂寞之濱對之空歎嗟楼閣重晚照杜詩上方重閣晚百里見秋毫次韻稚川得寂字平生萬里興㰸退著寸尺退之詩㰸退就新懦趍營悼前猛向來􅀋􅀼鈇列子曰人有亡鈇者意其鄰之子視其行歩􅀼鈇也顔色􅀼鈇也言語􅀼鈇也動作態度無爲而不􅀼鈇也俄而搜其谷而得其鈇他日復見其鄰人之子動作態度无似切鈇也鈇音斧少日巳爭席莊子曰其往也舎者避席其反也舎者與之爭席矣曩過招提飯老杜遊奉先寺詩巳從招提遊更􅀫招提境按僧輝記云招提者􅆊言拓闘提奢唐言四方僧物後人傳冩之誤以拓爲招又省去闘奢二字止稱招提則今十方住持寺院也􅄺槃經云造僧招提則生不動囯愜當易爲適杜詩愜當乆忘筌盖用渊明詩人亦有言稱心易足也又云􅁛心固爲好食鮭如舉士􅀯史􅁃杲之傳任昉戯曰誰謂􅁃􅀰貧食鮭常有二十七種鮭户佳反名下無遺索閻立本見張僧繇畫曰名下定無虚士談餘天雨花楞􅃊經云即時天雨百寳蓮花間錯紛糅茶罷風生腋盧仝謝孟諌議􅀉新茶詩云七椀喫不得也唯斍两腋習習清風生誰言塵土中有此坐上客謝安傳安旣出􅁊温問左右頗嘗見我有此客不言前傾許可後漢宣秉䓁傳語曰同言而信則信在言前胷次開堛塞退之􅀯山詩逼塞生怐愗同是蠧魚癡退之詩豈殊蠧書䖝生死文字間癡謂書癡還歸理編􅁽長安千門雪借長安以言汴京可見此四詩自北京解官至京師作蟹黄熊有白更約載酒行无爲守岑寂竹軒詠雪呈外舅謝師厚并調李彦深此篇至卷終皆自汴京囬至􅀯陽作破臘春未融杜詩臘破思端綺土膏寒不發囯語云自今至于􅀄􅁻土膏其動数聲鳴條風論衡五日一風風不鳴條一夜洒窗雪退之詠雪云洒急听窗知開軒万物曉落势良未歇退之歯落詩俄然落六七势落殊未巳鏗鏗青琅玕閱此歳凛冽退之詩豈如秋霜雖凛冽摧埋頭槍地司馬迁書見獄吏則頭槍地千羊反意氣終自㓗大白詩眼花耳热後意氣素霓生君子謂此君全身斯明哲詩旣明且哲以保其身屋頭維女貞顔色少澤恱琅玕此君皆謂竹以比師厚女貞木名以比李彦深稍能窺藩籬亦有固窮節語君子固窮渊明詩不頼固窮節百丗當誰傳又云深得固窮節佳興冉冉生門外無車轍漢書陳平以席爲門然門外多長者車轍冩之朱􅁝絃清坐待明月文選詩直如朱􅁝絃清如玉壷氷丙寅十四首効韋􅂫州并序二月丙寅率李原彦深謝愔公静游百花洲適爲游人所擅見拒於晨門因賦何人有酒身無事誰家多竹門可欵之句行係馬李氏園歩至廣済僧舎謁冦忠愍萊囯公祠堂用吏部詩韻作雪霽草木動月令草木萌動春融煙景和嘉辰掩閞坐如此節物何同游得二子晤對不在多詩彼羙淑􅁎可與晤言箋云晤對也不知鞍馬倦想見洲渚春淸畫鎻芳園誰家停畫輪晋輿服志畫輪車駕牛以綵添畫輪轂故名曰畫輪車髙桞極有思向風招遊人退之詩楊花榆莢无才思此反而用之漸嘉楼外花嘉賞亭边栁作者歸山丘曹子建詩生存華屋處零落歸丘山今春為誰有千秋万歳後還復來游否元注云漸嘉楼陽夏謝希深作嘉賞亭范文正公作􅁊子新論云雍門周􅀃孟嘗君曰千秋万歳後高䑓既巳傾曲池又巳平城􅀯有佳園王逸少帖云㒒近修小園子殊佳致山簡􅀓諸習氏荆土豪族有佳園池風物迎馬首左惟予馬首是瞻但賞主人竹不飲主人酒王徽之傳呉中一士大夫家有好竹欲􅀚之便出坐輿造竹下諷嘨主人洒掃請坐徽之不顧將出主人乃閉門徽之便以此賞之紅日媚紫苔沈休文詩賔堦緑錢滿客位紫苔生輕風泛春桞楚詞光風轉蕙泛崇蘭三公末白髮三公謂冦萊公范文正公謝希聲也十軰乘朱輪楊惲家方隆盛乘朱輪者十人只取人看好何益百年身杜詩長為万里客有愧百年身但願長今日清樽對故人渊明詩但願長如此躬耕非所歎江梅香冷淡開遍未全踈巳有耐寒蝶双飛上花湏今夜􅃊城角肯留花在无楽府詩集云漢横曲有梅花落本笛中曲也按唐大角曲亦有大梅花小梅花等曲今其聲猶有存者我思五桞翁解作一生亊得錢送酒家便静㝷山寺念我還如此翁應㑹人意渊明傳云嘗著五桞先生傳以自况又云顔延之為始安郡過潯陽造渊明每徃必酣飲致醉臨去留錢二万與渊明渊明悉送酒家稍就取酒謝靈運詩還得静者便杜詩老來苦便静庭空日色静楼逈鍾聲遲李義山詩地寛楼巳逈人更逈於楼􅄄叟巳爭席左㫖酒一盛兮余與􅄄之父晲之爭席見上馴鴉更不疑同來復同去竟別我為誰退之詩遇酒即酩酊君知我為誰謝甥有逸㒷李髯非不嘉蜀志閞羽傳馬超來降羽書與諸葛亮問超人村可誰比􅀋亮知羽護前答之曰孟起當與益德並驅爭先猶未及髯之絶倫逸群也羽羙髯故亮謂之髯苦思夢春草􅀯史謝惠連傳族兄靈運嘗思詩竟日不就忽夢見惠連即得池塘生春草大以爲工醉狂眠酒家杜詩李白斗酒詩百篇長安市上酒家眠斯游無俗物傲睨至昏鴉晋王戎傳戎与阮籍爲竹林之遊戎嘗後至籍曰俗物巳復來敗人意杜詩曰眼前無俗物又云有待至昏鴉寺古老僧静亭隂脩竹多萊公作州日部曲屢經過衆推識公面蒼石眠緑莎寇凖平仲贈萊囯公謚忠􅉖始爲参知政事罷知鄧州盛時衆吹嘘謫去衆毀辱不爲公存亡幽蘭春自緑欲書名相傳安得􅀯山竹前漢公孫賀傳云􅀯山之竹不足受我詞昔公調鼎实見上指頋九廟尊郡囯冨士馬于今開塞垣杜詩一􅀉塞垣深誰能起公死爲囯守北門守比門見第一卷上注出身丗䘮道莊子曰丗喪道矣道喪丗矣丗与道交相喪也解綬飢驅我渊明乞食詩云飢來驅我去不知竟何之杯中得醉郷唐王績有醉郷記去就不復果豈爲俗人言司馬迁書可爲智者道難爲俗人言逹人儻余可賈􅁩鵬烏賦逹人大􅀚物無不可百花洲萊公祠堂皆在鄧州此詩云解綬飢驅我可見北京解官至汴京囬過鄧也少小尚狷介退之詩少小聚嘻戯與人常不欵後漢光武幸章陵置酒作楽宗室諸母因酣恱相與語曰文叔少時謹信與人不欵曲唯直柔耳今乃能如此置身稍雍容遇酒輙引滿漢書序傳引滿㪯白自是鶴足長難齊鳬脛短莊子鳬脛雖短續之則􅁨鶴脛雖長断之則悲對酒􅁔答謝公静我爲北海飲後漢書孔北海云坐上客常滿樽中酒不空君作東武吟見上注㸔君平生用意処䔥洒定自知人心定自晋人語也丗􅀃王敦曰家兄在郡定嘉又謝太傳曰定自佳定自佳􅀯陽城边雪三日愁隂不能分皂白晋天文志􅁃翼書云此天公憒憒無皂白之徴也摧輪踠蹄泥数尺退之朝賀歸詩緑槐十二街渙散馳輪蹄又贈元十八何人識章甫而知駿蹄踠魏武苦寒行曰車輪爲之摧城門晝開眠賈客移人僵尸在旦夕誰能忍飢待食麥左成十年晋侯夢大厲斍召桑田巫巫言如夢公曰何如曰不食新矣又曰晋侯欲麥使甸人献麥將食張如厠䧟而卒此借使身􅁨天下自有人寒士何者愁填臆民生政自不願材晋謝安傳正自不能不尓退之􅀕子厚文凡木之生不頋爲材可乘以車可鞭䇿列女傳老萊子妻云可食以酒肉者可隨以鞭捶可授以官禄者可隨以斧􅃏君不見海􅀯水流紫旃檀碎身百錬金愽山本草沉香門白檀樹出海􅀯又云真紫檀旧在下品又云扶􅀯囯人言衆香共是一木根是旃檀莭是沉水葉是藿香膠是薫陸選詩昔爲百錬剛豈如不􅂪斧斤賞老大絶崖霜雪間投身有用禍所集莊子匠石歸檪社見夢曰云云且子求無所可用乆矣幾死乃今得之爲予大用使子也而有用且得有此大也邪何况四逹之衢井先汲尓雅四逹謂之衢莊子直木先伐甘井先竭昨日青童天上囬手捧玉帝除書來列仙傳有青童君王莽傳是時爭爲符命封侯其不爲者相戯曰獨无天帝除書乎此借用一番通籍清都闕列子穆王以為清都紫微帝王之居楽天詩只恐長生湏有籍仙䑓試為檢名看百身書名赤城臺􅈋君傳云治赤城山飛昇度丗无虚日恠我短􅄄趍塵埃顧謂彼童子退之秋懷詩顧謂汝童子置書且安眠此何預人亊晋謝玄傳子弟亦何預人亊而正欲使其佳但對淸樽即眼開一杯引人着勝地丗􅀃新語曰王衛軍云酒正自引人着勝地傳聞官酒亦自清徑湏沽取續吾瓶􅀯山朝來似有意今夜倘放春月明戯贈彦深元注云李原字彦深厚之弟居􅀯陽斈髯家徒立四壁李髯見上漢司馬相如傳家徒四立壁未嘗一飯能留客老杜云一飯未曽留俗客春寒茅屋交相風渊明飲酒詩弊庐交悲風荒草没前庭􅀝墻捫虱讀書䇿晋王猛傳􅁊温入閞猛􅀍􅄄詣之捫虱而言傍􅀂无人曲礼曰先坐書策琴瑟在前坐而迁之戒勿越老妻甘貧能飬姑寕剪髻鬟不典書晋陶􅋲傳􅋲早􅀌貧為縣吏鄱陽孝廉范逵嘗過􅋲時倉卒无以待賔其母乃截髮得双髲以易酒肴楽飲極􅂬杜詩長者來在門荒年自糊口家貧无供給客位但箕箒俄傾羞頗珍寂寥人散後入恠􅁂髮空吁嗟為之乆自陳剪髻髮鬻市充杯酒大兒得飡不索魚小兒得禈不索􅃭晋韓康伯傳伯数歳母為作􅃭令捉熨斗而謂之曰且着􅃭㝷當作􅃨禈伯曰不復湏火在斗中而柄尚热今旣着􅃭下亦當暖􅁃􅀰鮭菜二十七食鮭二十七種見上太常齋日三百餘後漢周澤傳為太常嘗卧疾齋宫其妻哀澤老病闚問所苦澤大怒以妻干犯齋禁遂収送詔獄謝罪時人為之語曰生丗不諧作太常妻一歳三百六十日三百五十九日齋一日不齋醉如泥上丁分膰一飽飯藏神夢訴羊蹵􅂼周礼大宗伯以脤膰之礼親兄弟之囯左傳天子有亊膰焉又云与执膰焉此言釋奠分胙也啓顔録云有人常食􅂼忽食羊􅁏夢五藏神曰羊踏破菜薗丗傳寒士有食籍一生當飯百甕􅉁詩疆􅂣有􅀲是剥是􅉁新序楚恵王食寒􅉁而得蛭􅉁􅀂今虀甕也又摘礼記醯醢百甕字以相謔也食籍見第六卷􅁳􅁳主張審如此莊子孰主張是附郭小圃冝勤鉏摘􅂫秦傳附郭田二頃字葱秧青青葵甲緑早韭晚菘羮糝熟􅀯史斉周顒隠鍾山文思太子問菜食何味最勝曰春􅀄早韭秋末晚松莊子藜羮不糝充虚解􅀾頼湯餅晋束晢餅賦曰􅀇冬猛寒清晨之㑹涕凍鼻中霜凝口外充虚解􅀾湯餅爲最芼以䓑虀與甘菊内則云雉免皆有芼注云菜釀也晋石崇傳云韭蓱虀是擣韭根􅄂以麥苗耳幾日怜槐巳着花一心呪笋莫成竹白樂天食笋詩且食勿踟蹰􅀯風吹作竹群兒􅀏髯窮百巧我謂勝人飯重肉漢朱家傳食不重味公孫弘傳汲黯曰弘位在三公奉禄甚多然爲布􅀍詐也上問弘弘曰有之臣聞管仲相齊有三歸侈擬於君􅁊公以覇晏嬰相景公食不重肉齊囯亦治云云弘身食一􅁏脫粟飯群兒􅀏髯不􅀂人我獨爱髯無亊貧君不見猛虎即人厭麋鹿易曰則鹿无虞人還􅃦皮食其内左㐮二十一年州綽曰二子者譬於禽獸臣食其􅁏而􅃦處其皮矣濡需終与豕俱焦莊子徐无􅀑萹有暖姝者有濡需者濡需者豕虱是也擇䟽鬛自以為廣宫大囿奎蹄曲隈乳間股脚自以為安室利處不知屠者之一旦鼔臂布草操煙火而巳与豕俱焦也飫肥擇甘果非福虫蟻无知不足驚横目之民万物靈莊子天地篇夫子无意於横目之民乎書惟人万物之虚請食熊蹯楚千乘左文元年楚大子啇臣以宫甲圍成王王請食熊蹯而死弗听立死山壁漢公卿後漢献帝紀建安元年車駕至洛陽是時宫室燒尽百官披荆􅁄依牆壁間州郡各擁強兵而委輸不至群僚飢乏尚書郎以下自岀採稆或飢死牆壁間或為兵士所殺李髯作人有佳處韓文諱卞云作人得如周公孔子亦可以止矣李髯作詩有佳句雖无厚禄故人書杜詩厚禄故人書断絶長飢稚子色凄凉門外猶多長者車陳平亊見上我讀楊雄逐貧賦斯人用意未全踈逐貧賦見雄傳兹不及注􅀉􅀯陽謝外舅謝公遂偃蹇後漢蔡邕傳董卓聞邕名髙辟之􅁛疾不就卓大怒曰我力能族人蔡邕遂偃蹇者不旋踵矣􅀯陽无舊庐天与解纓紱元非傲當塗老杜獨酌詩本无軒冕意不是傲當時庖丁釋牛刀衆手斫大觚莊子曰庖丁為文惠君解牛砉然嚮然奏刀騞然莫不中音文惠君曰技盖至此乎庖丁釋刀對曰臣之所好者道也進乎技矣批大郤導大窽因其固然技經肯綮之未嘗而况大觚乎白雲曲肱卧青山滿牀書寒山子詩家中何所有惟見一牀書妙質落川澤莊子郢人堊漫其鼻端使匠石斵之宋元君召匠石曰嘗試爲寡人爲之匠石曰臣之質死乆矣自夫子之死也吾無以爲質矣果然天網踈老子云天網恢恢踈而不失故知今人巧未斍古人迂築塲歳功休囯語云􅂣功未畢詩云九月築􅂣囿夜泉鳴竹渠胸懐鬰磊隗丗􅀃阮籍􅅐中磊隗故湏澆之此物諒時湏此物謂酒先言夜泉鳴竹渠謂糟床也児能了翁亊晋傳咸傳云生子癡了官亊官亊未易了了亊正自癡復爲快耳此借用安用府中趍古楽府詩三十侍中􅀰四十專城居􅄹􅄹公府歩冉冉府中趍孫能誦翁詩老杜􅂹子詩云問知人客妵誦得老人詩乃是千里駒漢楚元王傳云德有智畧武帝謂之千里駒人生行楽耳漢楊惲傳其詩云人生行楽耳湏冨貴何時用舎要自如我方神其拙社檪官道樗莊子逍遥游篇云惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝絭曲而不中䂓矩立之塗匠石不顧又人間丗云匠石之齊至乎曲轅見檪社樹云云第一卷上􅄪和荅爲之詩云檪依曲轅社􅂓用神其拙巳注其詳公猶􅁨斧斤睥睨斵樽壷莊子云百年之木破爲犠樽萬古身後前芭蕉秋雨余少年喜狡獪叱化粒成珠神仙傳王逺字方平過蔡經家麻姑亦至即求少許米撤地視米皆成真珠方平􅀏曰姑固少年吾老矣不復作此狡獪変化也謨功可􅁔舞書矢厥謨禹成厥功左九功之德皆可􅁔也又襄三十一文王之功天下誦而􅁔舞之斈古則暖姝莊子徐無􅄦篇云有暖姝者斈一先生之言則暖暖姝姝而自恱也所好果不同未可一理驅眇思忘言對前所注臣之質死乆矣郭象注云非夫不動之質忘言之對則雖至言妙斵無所用之安得􅀯飛鳬飛鳬見上注鄙心生蔓草萌芽望耘鉏後漢黄憲傳陳蕃周㪯曰時月之間不見黄生則鄙吝之萌復存乎心左傳蔓草猶不可除離筵如昨日杜詩離筵何大頻春桞見霜枯未辱錦繍段時􅂪双鯉魚文選張平子四愁詩云羙人贈我錦繍段古楽府詩云客從逺方來遺我双鯉魚憶昔参凡杖旌容覷規模引接開藻鍳杜詩持衡留藻鍳髙明通亊樞門生五七軰寂寞半白􅂡談經落麈尾晋孫盛傳善言明理時殷浩擅名一時惟盛与抗論嘗談論對食擲麈尾毛悉落飯中行楽從藍輿晋陶潜傳向乘藍輿亦足自返看竹辟強宅徽之􅀚竹見上王献之傳云嘗經吴郡聞顧辟強有名園先不相識乘平肩輿徑入時辟強方集賔友而献之游歴旣畢傍若无辟人強勃然便驅出門献之傲如也閱士黄公壚晋王戎傳戎嘗經黄公酒壚下過顧謂後車曰吾昔与嵇叔夜阮嗣宗酣暢於此竹林之下亦預其末自嵇阮云亡吾便為時之所覊紲今日視之雖近邈􅀂山河雪屋煑茶薬晴簷張􅀞圖幽寺促燈火青氊置樗蒲遶牀呌一擲十白九雉盧晋刘毅傳於東府聚樗蒲大擲一判應至数百万餘人並黒犢以還惟刘􅁉及毅在後毅次擲得雉大喜褰衣繞床呌謂同坐曰非不能盧不亊此耳􅁉􅁖之因挼五木乆之曰老兄試為卿答旣而四子俱黒其一子轉躍未定􅁉厉聲喝之即成盧焉毅意殊不快蔡澤來分功史記蔡澤傳蔡澤謂應侯曰君獨不􅀚夫􅀶者乎或欲大投或欲分功􅀽耽必上都晋􅀽耽傳耽字彦道􅁊温少時遊於􅀶徒資産俱尽尚有􅀒進欲永済於耽而耽在艱試以告焉耽略无難色遂変服懷布㡌隨温与債主戯耽素有藝名債者聞之而不相識謂之曰卿當不辦作􅀽彦道也遂就局十万一擲直上百万耽投馬絶呌探布帽擲地曰竟識􅀽彦道不開旗縱七歩破竹一群胡諸葛亮傳注引漢晋春秋曰亮至􅀯中所在􅀾捷聞孟􅀗者為夷漢所服募生致之旣得使􅀚於營陣之間􅀗對曰向者不知虚实故敗􅀂秪如此即易勝耳亮笑縱使更􅀾七縱七禽而亮猶遣􅀗􅀗曰公天威也􅀯人不復反矣晋杜預傳預曰今兵威已振譬如破竹数節之間皆迎刃而解詩意盖以兵喻樗蒱也成梟燭為明挾長朋佐呼終飲見温克詩飲酒温克所爭匪錙銖礼儒行曰雖分囯如錙銖注八兩曰錙釋音􅀃文云六銖誰令運甓翁見謂牧豬奴晋陶侃傳諸参佐或以談戯廢亊者乃命取其酒器蒲􅀶之具悉投之江曰摴蒲者牧豬奴戯耳侃在廣州无亊輙朝運百甓於齋外暮運於齋内人問其故答曰吾方致力中原過尓􅄖逸恐不堪亊見謂見上亊託丈人重乃爱屋上烏老杜云丈人屋上烏人好烏亦好尚書大傳曰武王登夏䑓以臨殷民周公旦曰臣聞之爱其人者爱其屋上烏憎其人者憎其徒胥韓詩外傳曰武王至于邢丘天雨三日不休問大公對曰爱其人及屋上烏􅁖其人憎其胥餘舊言如對面形迹􅆡舟車礼舟車所至風簾想隠几天􅄜嗚寒梧隠几天􅄜見莊子尚喜讀書否還能把酒無鄴城渺塵沙冠盖若秋蕖詩山有扶􅂫注曰荷華扶蕖也相過問寒温杜詩虚名但􅂪寒温問泛爱不救溝壑辱意氣馳九衢楚客雖工瑟齊人本好竽退之答陳啇書云斉王好竽永懷溟海量北斗不可􅆽詩維比有斗不可以挹酒漿韻書云􅆽挹也勝夜親筆墨因來明月珠􅒊法師答刘遺民書云君與法師當数有文集因來何少此篇題云􅀉南陽謝外舅而後人編􅀋誤􅄂之􅀯陽詩中其詩云鄴城渺塵沙鄴城謂大名也大名本魏州後唐建鄴都山谷自大名􅀉詩􅀯陽也次韻正仲三文自衡山返命舎驛過外舅師厚贈荅正仲三丈謂王存字正仲元豐間修起居注元祐􅀄自右丞迁左丞陳無巳詩話云謝師厚廢居於鄧王右丞存其妺壻也奉使荆湖枉道過之夜至其家師厚有詩云倒着衣裳迎户外尽呼兒女拜燈前昏昏市井氣楊子雲市井相與言則以財與利昏昏見上呫呫兒女語前漢灌夫傳平生毀程不識不直一錢今日長者爲壽廼效女兒曹呫囁耳語退之詩呢呢兒女語禽喧聲百種春作亊萬緒列子云􅅰􅅰萬緒起矣人間雞􅁰期文選范雲詩恨不具雞􅁰注引謝承後漢書山陽范式字巨卿與汝􅀯張元伯爲友春别京師以秋爲期至九月十五日殺雞作􅁰二親􅀏曰山陽去此幾千里何必至元伯曰巨卿信士不失期言未絶而巨卿至天上德星聚丗􅀃新語註云續晋陽秋曰陳仲弓從諸子姪造荀􅀰父子于時德星聚太史奏五百里賢人聚乖離畧十年文選詩乖離即長衢王逸少帖多有乖離字髮白歯齟齬見上太史禱衡丘佐王用􅆛虎子雲免大夫楊雄傳雄以病免復召爲大夫以言師厚草玄空自苦刘歆􅀚太玄謂雄曰空自苦人生只尓是付與罋頭謂法書要録江東云堈面猶河比称罋頭謂􅀄熟酒也山谷外集詩註卷之二
