front:
  text: 山谷外集詩註卷之四
  hash: sha256:f5d5ef923075c21a7d76013b3350f884bcc83ed2b0f4e6c1427dd93d3ad975f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_004-1a}
body:
  text: 送劉道純東坡與鮮于子駿簡云故人劉格字道純劉恕道原之親弟讀書強記辯􅀶文詞粲然而立莭強鯁吏事亦徤君實頗知之而餘人未識也欲告子駿與一差遣収置門下敢保稱職也旦夕歸􅀯康軍待闕軾非􅀻之爲時惜才耳五松山下古銅官大白逰五松山詩自註云山在南陵銅井西五里按南陵縣今爲銅陵縣􅀠池州在唐亦嘗爲銅官縣邑居褊小水府寛文選四都賦名都對郭邑居相承杜詩吴吞水府寛民安蒲魚少嚚訟周禮聀方氏兖州其利蒲魚簿領未减一丘槃文選劉公幹雜詩云沉迷薄領書李善曰簿領謂文簿而記録之道純是銅陵簿􅅐中峥嶸書萬卷簸弄日月江湖間退之詩婆娑海水􅀯簸弄明月珠稠人廣衆自神王灌夫傳云稠人廣衆薦寵後軰莊子飬生主篇神雖王不善也丗􅀃新語司馬太􅀓多名士一時雋異􅁃文康云見子蒿在其中常自神王按剱之眼白相看按剱相眄白眼視之並見上老身風波諳丗味退之詩吾老丗味薄如食橘柚知甘酸麒麟圗􅀞偶然耳漢書甘露三年單于始入朝上思股肱之美圗􅀞其人於麒麟閣後漢劉昆傳帝問前在江陵反風㓕火後守弘農虎北渡河何以致之昆對曰偶然耳半枕百年夢邯郸見第一卷餞薛楽道詩註平生樽爼宮亭上宫亭湖屬江州及􅀯康軍荆州記曰宫亭湖即彭蠡澤渉丗忘味皆朱顔此時阿翁尚無恙何翁謂劉渙凝之也庐山記云凝之筠州人天聖八年擢進士第居官有直氣不屑輙弃去卜居落星渚常乗黄犢徃來庐山中追琢秀句酬江山堂堂今爲蝉蛻去史記屈原傳蝉蛻於穢濁五老偃蹇無往還寰宇記五老峯在江州德化縣懸崖突出如五人相對大梁城中笏柱頰大梁城汴京也笏柱頰用王徽之頋西山言爽氣事頷髭今成雪􅀧斑退之云􅀂摘頷底髭青雲何必出公右漢田叔傳上召見與語漢廷臣無能出其右者亨衢在天無由攀椎皷轉舡如病已杜詩打皷發舡何郡􅀰夢想楼臺落星湾寰宇記落星石在江州庐山東周廽一百五歩髙文許圗經云昔有星墜水化爲石當彭蠡湾中故云落星湾子政諸兒喜文史阿秤亦聞有筆端子政謂劉恕道原也外集第五卷有過致政屯田劉公隱庐山詩亦云憶昔子政在爲翁数解顔元祐八年改葬道原山谷誌之曰􅀄凝之忿丗不容弃官老於庐山至道原而莭愈髙又自以源出歆向務追配前人則子政云者比道原於劉向也其誌又云生三男羲仲和叔秤才器皆過人和叔以文鳴而秤篤行不幸相継死韓詩外傳君子避三端避文士之筆端丹徒布衣未可量􅀯史劉穆之傳謂所親曰貧賤常思冨貴冨貴必踐危機今日思爲丹徒布衣不可得也此亦用劉家事詩書且對藜藿盤穴中生涯識隂雨木末牖户知風寒見上我今四壁恋微禄知公未能長掛冠後漢逢萌傳王莽殺其子萌即解冠掛東城門㱕將家浮海次韻子瞻春菜按實録熈寕十年二月軾知徐州又按頴濵集詩序云熈寕十年二月始㑹于澶渊相從赴彭城山谷時在北京始通書并二詩書云􅀼食於魏㑹閤下開幕府在彭門魏即北京彭門徐州也按東坡集次韻魯直見贈古風二首乃在春菜之後盖未通問時先和此詩也北方春􅂼嚼氷雪北方地寒春􅀄猶食淹菜及寒􅉁妍暖思采南山蕨詩陟彼􅀯山言采其蕨韭苗水餅姑置之南史何尚之傳帝好水引餅史記趙奢傳王曰母置之苦菜黄雞羮糝滑見上蓴􅁝色紫菰首白齊民要術云四月蓴生莖而未葉名曰稚尾蓴第一肥美葉舒長足名􅁝蓴五六月用􅁝蓴周礼魚冝􅋎注彫胡也内則蝸醢而􅋎食注彫胡也􅋎亦菰蒌蒿芽甜蔊頭辢齊民要術蔊菜味辛音罕盱江志云蔊菜生麻姑山及麻源生􅉁入湯飜手成芼以姜橙誇􅈁抹文選枚乘七發云肥狗之和芼以山膚注引礼記注云芼菜也謂以菜調和之也驚雷菌子出萬釘傳燈録百文問黄蘖甚麽處來曰大雄山下采菌子來此摘其字隋楊素傳賜萬釘寳帯借使其字白鵝截掌鱉解甲琅玕森深未飄蘀軟炊香粇煨短茁禹貢球琳琅玕今以喻竹召􅀯騶虞云彼茁者葭注茁出也今言笋􅀄出土老杜云軟炊香飯縁老翁飯一作粳萬錢自是宰相事日食萬錢見上注一飯且從吾黨􅀃公如端爲苦笋歸明日青衫誠可脫六舅以詩來覔銅犀用長短句持送舅氏斈古之餘復味禅􅀃故篇末及之海牛壓􅁓冩銀鈎海牛犀也前集有詩云海牛壓簾風不開盖用張君房脞􅀃䔥斈士夢中賦曉寒􅁔云海牛壓薕風不入前注偶不及此晋索靖傳作草書狀曰婉􅀂銀鈎阿雅元注師奴僧号守之索自収長防玩物敗児性書玩物䘮志得歸老成散百􅁨先生古心治金鐡退之孟先生詩云孟生江海士古貌又古心皮日休云余常慕宋廣平鐡腸石心堂堂一角誰能折犀一角獸也漢朱雲傳云五鹿嶽嶽朱雲折其角兒言觳觫持贈誰外家子雲乃翁師子雲盖比之楊雄也不着鼻繩䄂两手古犀牛兒好看取傳燈録撫州石鞏慧藏禅師一日在厨下作務馬祖問曰作什麽曰牧牛祖曰作麽生牧曰一回入草去便把鼻孔拽來福州大安禅師曰安在潙山三十年只看一頭水牛牯􅀂落路入草便牽出􅀂犯人苗稼即鞭撻調伏旣乆可憐生如今変作露地白牛常在面前露逈逈地趕亦不去也次韻子瞻與舒堯文禱雪霧豬泉唱和老農年饑望人腹莊子無聚禄以望人之腹想見四溟森雨足文選張景陽雜詩雲根臨八極雨足􅎈四溟李善曰四溟四海也又詩森森散雨足林回投壁􅀒嬰兒莊子林回弃千金之璧負赤子而趨豈聞烹兒翁不哭未論萬户無炊煙蛛􅁝蝸涎經杼軸詩杼軸其空使君閔雪無􅁏味煮餅青蒿下􅐭菽豈云剪􅀲冝侵肌文選應休璉與廣川長書言禱雨不應其略云昔夏禹之解陽肝殷湯之禱桑林辭未卒而澤滂沛今者雲積而復散得無割髮冝及膚剪爪冝侵肌乎李善注云吕氏春秋曰湯克夏而大旱五年乃身禱於桑林剪其髮􅽏其手自以爲牲雨乃大至􅽏音􅐱霜不殺草仍故緑春秋隕霜不殺草幽靈奰贔西山霧文選西京賦臣靈贔屓髙掌逺蹠呉都賦巨鼇贔屓首冠靈山贔音備屓音虚器切奰字乃詩所謂内奰於中國盖誤冩耳贔字又倒冩當改正牲肥酒香神未瀆退之南海神碑云牲肥酒香樽爵净㓗得微徃從董父飡左昭二十九年蔡墨對魏献子曰昔有飂叔安有裔子曰董父實甚好龍能求其􅄝欲以飲食之龍多㱕之乃畜龍以服事舜寕當罪繫葛陂渊後漢費長房傳東海君見葛陂君􅁋其夫人長房劾繫之三年東海大旱長房曰東海君有罪吾前繫於葛陂今出之使作雨於是雨立注卜擇祠官齊博士漢武紀其令祠官修山川之祠漢儒林傳五經􅀶士多是齊人舒堯文時爲教授故云􅁀露致告蒼崖顚請天行澤不汲汲爾亦枯魚過河泣楽府古詞云枯魚過河泣何時悔復及作書與魴鱮相教謹出入生鵝斬頸血未乾莊子􅀃剱篇上斬頸領下决肝肺退之詩一夫斬頸群雛枯風馬雲車坐相及漢礼楽志房中􅁔云靈之車結玄雲靈之下􅀂風馬百里旌旗􅎈玉花唐舒元輿序重雪終日玉花攪空使君義動龍蛇蛰老杜云意鍾老栢青義動脩蛇蛰老農􅂬喜有春事呼児飯牛理蓑笠吕氏春秋百里奚未遇時飯牛於秦􅀶士勿歎從公疲明年麥飯滑流匙老杜云嘗稲雪翻匙又云滑憶彫胡飯香聞錦帯羮溜匙兼暖腹誰欲致盃甖見子瞻粲字韻詩和答三人四返不困而愈竒􅂺次韻􅀉彭門按東坡集乃熈寕七年冬除夜病中贈叚屯田時在宻州山谷和章乃元豐􅀄公材如洪河􅈅注天下半文選呉都賦䃢碒乎数州之間􅈅注乎天下之半風月未嘗攖終上句洪河之義莊子徐無􅄦篇故曰風之過河也有損焉日之過河也有損焉請只風與日相與守河而河以爲未始有攖也晝夜聖所歎見論語名丗二十年窮無􅁔舞玩入宮又見妬女無美惡入宫見妬見邹陽傳徒友飛鳥散莊子山木篇孔子問於子桑雩曰吾再逐於魯伐樹於宋削迹於衛窮於啇周圍於陳蔡之間吾犯此数患親親交益䟽徒友益散何歟李陵傳各鳥獸散猶有得脫一飽事難諧亊不諧矣見宋弘傳五車書作伴莊子恵施多方其書五車風雨暗楼䑓雞鳴自昏旦詩風雨如晦雞鳴不巳雖非錦繍贈欲報青玉案文選張平子四愁詩美人贈我錦繍叚何以報之青玉案文似離騷經詩窺関雎乱語師摯之始関雎之乱賤生恨斈晚曽未奉巾盥内則盥卒授巾昨􅂪双鯉魚双鯉事見東坡在彭門答山谷書見集中逺託鄭人緩莊子列禦㓂篇鄭人緩也呻吟裘氏之地三年而緩爲儒風義薄秋天謝靈運傳論云髙義薄雲天老杜云髙義薄曽雲神明還舊貫法書要録􅁃兾與羲之書云忽見足下答家兄書煥􅀂神明頓還旧貫更磨薦禰墨後漢孔融上䟽薦禰衡推挽起疲懦忽忽未嗣音微陽㱕􅀱炭漢天文志冬至短極縣土炭孟康曰先冬至三日懸土炭於衡兩端輕重適均冬至日陽􅂔至則炭重夏至日隂􅂔至則土重仁風從東來拭目望齋舘鳥聲日日春桞色弄晴暖漫有酒盈樽何因見此粲歸去來詞云携㓜入室有酒盈樽詩子􅀆子兮此粲者何人生等尺捶豈耐日取半莊子篇末云一尺之捶日取其半萬丗不竭辯者以此與恵施相應終身無窮誰能如秋䖝長夜向壁嘆朝四與暮三適爲狙公玩臭腐蹔神竒莊子知北篇臭腐復化爲神竒神竒復化爲臭腐喑噫即飄散我􅀚萬丗中獨立無介伴小􅃛而大癡退之送窮文曰子知我名凡我所爲驅使令去小􅃛大薿夜􅂔不及旦孟子云云低首甘豢飬尻脽登爼案見前食驢膓詩注所以終日飲醉眠朱碧乱醉眠當是醉眠玉䑓新詠夜愁詩云誰知心眼亂㸔朱忽成碧仰㸔朱飛雲只使衣帯緩文選古詩相去日巳逺衣帯日巳緩先生古人斈百氏一以貫見義勇必爲少作衰俗懦忠言願囬天唐張玄素傳魏徴歎曰張公論事有回天之力不忍斆吞炭譲吞炭還從股肱郡漢季布傳上曰河東吾股肱郡故特召君耳待詔圗書館東壁二星天子圗書之秘府也東坡爲郡仍直史館投壷得賜金杜詩能畫毛廷壽投壷郭舎人西京雜記郭舎人善投壷毎爲武帝投壷􅂺賜金帛侏儒餘飽暖寕令東方公但索長安粲東方朔傳上召問朔何恐侏儒爲對曰侏儒飽欲死臣朔飢欲死臣言可用幸異其礼不可用罷之無令但索長安米恵帝紀曰爲􅄦薪白粲注取薪給宗廟爲􅀑薪坐擇米使正白爲白粲郭舎人及侏儒以比當時附㑹而進者東方朔比東坡元龍湖海士毀譽略相半下床卧許君上床自永嘆魏志季布傳陳登者字元龍卒後許汜與劉備並在荆州牧劉表坐與表共論天下人汜曰陳元龍湖海之士豪􅂔不除備謂表曰許君論是非表曰欲言非此君爲善士不冝虚言欲言是元龍名重天下備問汜君言豪寕有事􅁘汜曰昔遭乱過下邳見元龍元龍無客主之意乆不相與語自上大床卧使客卧下床備曰君有囯士之名今天下大乱帝王失所望君􅁨國忘家有救丗之意而君求田問舎言無可采是元龍所諱也表大􅀏丈夫屬有念鮑明逺集中詩云幽居屬有念含意未連詞退之秋懷詩丈夫属有念事業无窮年人物非所玩書玩人䘮得玩物䘮志坐令結􅂬客化爲煙霧散武功有大略元和姓纂蘇氏自武功徙焉亦復寡朋伴詠􅁔思見之長夜鳴渴旦礼坊記詩云相彼盍旦尚猶惡之注夜鳴求旦之鳥人猶惡其反晝夜盍音渴東南望彭門官道平如案老杜云東屯大江北百頃平􅀂案簡書束縳人一水不能乱詩公劉渉渭爲乱注正絶流曰乱斯文螕秬鬯可用圭瓉盥書平王􅃬晋文侯秬鬯圭瓉作文侯之命盥即􅈅論語注酌鬱鬯於大廟以降神也東坡和此篇云於我如旣盥古字通用誠求活囯醫何忍棄和緩左成十年晋侯有疾求醫於秦秦使醫緩視之昭元年晋侯求醫於秦秦使醫和視之文子曰醫及囯家乎對曰上醫醫囯其次醫人開疆日百里詩日闢囯百里都内錢朽貫史記平凖書云京師之錢累巨萬貫朽而不可校銘功甚俊偉迺見儒生懦且當置是事勿使氷作炭熈寕五年収復熈州十年交阯納欵銘功當是此等事塩鐡論氷炭不可以同器渊明詩孰􅀂當丗士氷炭滿懷抱退之聽潁師琴云潁乎尓誠能无以氷炭寘我腸上帝群玉府穆天子傳群玉之山先王之所謂䇿府道家蓬萊舘後漢書斈者稱東􅀚爲老氏藏室道家蓬萊曲肱夏簟寒炙背冬屋暖嵇康絶交書野人有快炙背而美芹子者欲献之至尊只令文字垂萬丗星斗粲次韻答堯民君開􅂫公詩疾讀思過半譬如聞韶耳三月忘味歎見論語班孟堅幽通賦云虞韶美而鳯儀􅀆孔忘味於千載我詩豈其朋組䴡䓁俳玩楊子霧榖之組䴡女工之蠧矣司馬迁書云文史星曆近乎卜祝之間固主上所戯弄倡􅄖畜之漢書枚皐言爲賦廼俳見視如倡不聞􅀯風絃礼記舜作五弦之琴以􅁔􅀯風同調廣陵散嵇康傳康將刑東市索琴弹之曰昔􅀽孝尼嘗從吾斈廣陵吾毎靳固之廣陵散於今絶矣鶴鳴九天上肯作家雞伴詩鶴鳴于九皐􅀯史王僧䖍傳小児軰賤家雞借用之晁子但爱我品藻􅀻月旦後漢許劭傳劭與兄靖好覈論郷黨人物毎月􅂺更其品題故汝南有月旦評焉官閑楽相從棃栗供杯案渊明責子詩但覔棃與栗前漢貢禹傳見賜杯案盡文畫金銀飾後漢董卓傳偃轉杯案間門静鳥雀嬉花深蜂蝶乱忽􅂪加礼貌齋戒亊搢盥問大心更小杜詩成王功大心轉小此摘其字意督辭反緩君材於用多舞選弓矢貫齊囯風舞則選􅀆射則貫􅀆聦明囬自照傳燈録靈居義能曰廻光返照㸔身心是何物勝巳果非懦我如相繪亊素質施朽炭見論語古來得道人非獨大庭館列子黄帝篇退而間居大庭之館齋心服形晝􅃦而夢遊於華胥氏之囯晁子巳不疑冬寒春自暖繫表知薬言擇友得荀粲魏志荀彧傳注云粲字奉倩諸兄並儒術論議而粲獨好言道常以爲子貢􅁛夫子之言性與天道不可得聞然則六藉雖存固聖人之糠粃粲兄侯難曰易亦曰聖人立象以盡意繫辭爲以盡言則微言胡爲不可得而聞見哉粲曰盖理之微者非物象之所舉也今􅁛立象以盡意此非通乎意外者也繫辭焉以盡意此非言乎繫表者也斯則象外之意繫表之言固藴而不出矣當時能言者不能屈也再和􅀉子瞻聞得湖州天下無相知得一巳當半桃僵李爲仆古􅁔詩曰桃生露井上李樹生桃傍䖝來囓桃根李樹代桃僵見藝文􅀋聚芝焚􅈍増歎文選歎逝賦云信松茂而栢恱嗟芝焚而􅈍歎佳人在江湖照影自娱玩一朝入漢宮掃除備冗散漢申屠嘉傳冗官居其中注云冗謂散軰也如今散官何如終流落長作朝雲伴文選髙唐賦妾在巫山之陽髙丘之阻旦爲朝雲暮爲行雨相思欲靣論坐起雞五旦身慙尸􅅒禄有罪未見案後漢孔融傳丁零盗􅂫武牛羊可并案也公文雄萬夫皦皦不自乱藏榖皆亡羊莊子駢拇篇臧與榖二人相與牧羊而俱亡其羊問臧奚事則挾筴讀書問榖奚事則􅀶塞以遊二人者事業不同其於亡羊均也要以道湔盥傳聲向東􅀯王事不可緩孟子民事不可緩也春波下数州快􅀂七札貫左傳成十六年鄢陵之􅀾飬由基蹲甲而射之徹枇焉椎皷張風㠶相見激衰懦空文不傳心千古付煨炭安得垂天雲莊子翼􅀂垂天之雲飛就呉興舘呉興郡湖州也魚饜桞絮肥孔毅甫雜記云永叔􅁛聖俞河豚詩云春洲生荻牙春岸飛楊花河豚於是時貴不数魚蝦以謂河豚食桞絮而肥聖俞破題两句便􅀃盡河豚好處乃永叔褒譽之詞也其實不尓此魚盛於二月至桞絮時魚巳過矣石林詩話所言略同筍煮溪沙暖解􅁔使君詞撙前有三粲囯語周語曰三女奔宻康公公母曰必致之王夫粲美物也衆以美物臨而何得以堪之用明發不寐有懷二人爲韻􅀉李秉彛得叟秦少游作李公擇行狀云兄布早卒拊其子秉彛如巳子秉彛盖山谷伯舅之子竹貫四時清一作竹節晚逾緑月通雲氣明一作月華寒更明外弟有佳質一作處妙年推老成後凋對霜雪一作到氷霜不昧處隂晴盛德當如此一作􅀚物憶相見古人畏後生一作契闊難為情礼器云如竹箭之有筠也如松栢之有心也二者居天下之大端矣故貫四時而不改柯昜葉文選石季倫詩傳語後丗人逺嫁難為情通典代􅁛姑子為外兄弟舅子為内兄弟非典言也異姓之親通謂之外在昔授子書髧彼垂两髮詩髧彼两髦注髦者髮至眉子亊父母之飾乖離今十年樹立映先逹退之詩乖離坐難慿丗􅀃云共啇略先徃名逹清燈哦妙句一作誦佳句如酌春酒滑把書念携手惆悵至明發李陵詩携手上河梁人生不如意十亊􅁪八九晋羊祐傳祐上䟽乞伐呉而議者不同祐曰天下亊不如意􅁪十居七八未見歴下人徒傾歴城酒秉彛􅀯康軍建昌人時仕於濟􅀯前有􅀉李六弟詩即此人也巳見前注從來親骨肉不免相可不退之􅀉岳鄂李大夫詩云少年楽新知衰暮思故友譬如親骨肉寕免相可否但願崇亊实虚名等箕斗見上蚤知鵲山亭李杜發佳思彌年听傳誇登覧通夢寐遥憐坐淸曠落筆冨新製尚因賔客集􅄋酒使我醉徃在舅氏旁􅀗拚堂上箒記汜埽曰埽埽席前曰拚拚席不以鬛執箕膺擖六經􅀚聖人明如夜占斗索居廢舊聞獨斈无新有羡子􅂎梓材左傳聲子􅀃楚曰如􅂎梓皮革自楚徃也雖楚有材晋实用之未曽離矯揉昜􅀃卦云坎為矯輮釋音云輮如九反又如又反宋忠王廙本作揉宋云使曲者直直者曲為揉荀子􅂆斈篇木直中繩輮以為輪安詩无恙時斈行超軰㑪山谷集中有李攄字􅀃云予旣字舅弟李攄曰安詩而安詩請其􅀃云云華屋落丘山文選曹子建箜篌引云生存華屋處零落歸丘山百􅁨滿人懷此士如不亡仲子抱竒材不獨典刑在仲一作叔詩雖無老成人尚有典刑神明還􅀚來集中又有評李得叟詩云孫莘老嘗以得叟詩一軸示予曰子試爲我評之予曰􅄪過普恵七言石人道中表字韻囯朝以來能者不過一二人而巳退之所謂横空蟠硬語妥帖力排奡惟此詩足以當之神明還􅀚見上少時誦詩書貫穿数萬字司馬迁貫穿經傳爾來窺陳編記一忘三二桞子厚􅀉許京兆書云往時讀書自以不至抵滯今皆頑然無復省録毎讀古人一傳数􅁓以後則再三伸卷復􅀚姓氏旋又廢失山谷盖用此意光隂如可玩老境翻手至良醫曽折足􅀃病廼真意左傳齊髙彊曰三折肱知爲良醫桃李春成徑見上本自不期人桃李成蹊非與人期而人自至耳歴下两寒士簞飄能恱親恥􅂪伐囯問董仲舒傳爲江都事易王王問曰粤王勾踐與大夫泄庸種蠡謀伐呉遂㓕之孔子􅁛殷有三仁寡人亦以爲越有三仁􅁊公决疑於􅃹仲寡人决疑於君舒對曰昔魯君問桞下惠吾欲伐齊何如恵曰不可歸而有􅁨色曰吾聞伐囯不問仁人此言何爲至於我哉徒見問耳且猶羞之况設詐以伐吴乎王曰善肯卧覆車塵子旣得此友從之日求新賦未見君子􅁨心靡楽八韻􅀉李師載同陞吏部曹徃在紀丁未山谷治平四年登第歳在丁未别離感寒暑歳星行十二歳星十二歳一周天丁未至戊午十二年盖熈寕元年也山谷時在北京我慚雞藎榖大玄第四卷雞藎榖注藎榖進也進食其谷也子歎天且劓易睽六三其人天且劓䆁文天剠也剠鑿其額曰天空餘山梁期山梁見語尚不昧􅀄志㑹合良難期繫匏各異縣上見語文選楽府云他郷各異縣展轉不相見千里共明月文選月賦􅁔曰美人邁􅀆音塵濶隔千里􅀆共明月如披故人面晋楽廣傳衛􅗕見廣曰此人之水鏡見之瑩然􅀂披雲霧而覩青天浮雲蔽髙秋此豈中心願霧重豹成文古列女傳陶答子治陶三年名譽不聞家冨三倍其妻諌曰􅀯山有玄霧雨七日而不下食欲以澤其毛成文章也犬􅇾不擇食以肥其身坐而湏死耳水清魚自見古楽府艶􅁔行曰語卿且勿眄水清石自見齊地榖翔貴前漢食貸志云榖價翔貴排門无爨饙詩浻酌可以饙饎二仲有甘㫖奉親亦良勤原田水洸洸韻書云洸水涌光也何時稼如雲无民願歳豐政自不忘君无民无字誤疑是庻民劉向傳忠臣雖在畎畒猶不忘君古人有成言歳暮於吾子真誥愕緑華贈羊􅁠詩云所期豈朝華歳暮於吾子斧揮郢人鼻莊子徐无􅄦篇莊子送葬過恵子之墓顧謂從者曰郢人堊漫其鼻端􅀂蝇翼使匠石斵之匠石運斤成風聽而斵之盡堊而鼻不傷郢人立不失容宋元臣聞之召匠石曰嘗試爲我爲之匠石曰臣則嘗能斵之雖然臣之質死乆矣自夫子之死也吾无以爲質矣吾无與之言矣琴即鍾期耳見上新詩凌建安魏志王粲傳粲卒於建安二十二年始文帝爲五官將及平原侯植皆好文斈粲與徐幹偉長陳琳孔章阮瑀元瑜應瑒得璉劉楨公幹並見友善髙論到正始晋衛玠傳大將軍鎮豫章長史謝鯤雅重玠相見欣然言論弥日大將軍謂鯤曰昔王輔嗣􅄍金聲於中朝此子復玉振於江表微言之緒絶而復續不意永嘉之末復聞正始之音徒言參隔辰楊子吾不覩參辰之相比也左傳昭元年子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日㝷干戈以相征討后帝不臧遷閼伯於啇丘主辰啇人是因故辰爲啇星遷實沈于大夏主參唐人是因以服亊夏啇故參爲晋星未􅀒石投水吕氏春秋精喻篇白公問於孔子曰人可微言乎孔子不應白公曰􅀂以石投水奚􅀂孔子曰没人能取之白公曰􅀂以水投石奚􅀂孔子曰淄澠之合易牙能知之白雪非衆聽文選宋玉答楚王問云客有􅁔於郢中者其始曰下里巴人囯中属而和者数千人其爲陽阿薤露囯中属而和者数百人其爲陽春白雪属而和者数十人而巳其曲弥髙其和弥寡夜光忌暗投見上古來不識察文選古詩一心抱區區惧君不識察浪自生百􅁨三月楚囯淚卞和巳見上注以言夜光之璧千年郢中楼以言陽春白雪無因杭一葦詩一葦杭之濁水拍天流退之詩海􅂔昏昏水拍天河􅀯李茂彦内藴邁俗心濬冲有涇渭一顧重千金文選任彦昇詩濬冲得茂彦注云傳暢賛曰王戎宇濬沖爲選官時江夏李重字茂曽汝􅀯李毅字茂彦二人俱處要職戎以識㑹待之各得其用彦昇此詩又云伊人有涇渭非余􅀭濁清向秀别傳云秀與嵇康吕安爲支康傲丗不覊安放逸邁俗而秀雅好讀書亊親知色難勝巳又勇沉見上外物旣難必求之首陽岑莊子外物篇外物不可必故龍逢誅比干戮論語夷齊餓于首陽之下飄風從東來雨足盡西靡􅀃苑上之化下猶風之靡草東風則草靡而西西風則草靡而東老杜云雨聲巳先風散足盡西靡萬物逐波流金石終自止􅀃苑叢談云水浮萬物玉石留止渭因涇使濁菲以葑故毀並見毛詩智所無奈何誰能爲樗里史記樗里子傳滑稽多智号曰智囊秦人諺曰力則任鄙智則樗里紛紛車馬客如集市人􅀶彼雖有求來我但快一噱文選陳孔璋書必大噱也忽逢媚學子退之詩蹮蹮媚斈子墻屏日有徒時亦撼􅀜鑰何當携手期濠上得魚楽見上以同心之言其臭如蘭爲韻􅀉李子先徃日三語􅁺解道將無同我􅀚李校書超邁有古風晋阮瞻傳見司徒王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良乆即命辟之人謂之三語􅁺談道屡入微衛玠傳勝日親友時請一言莫不咨嗟以爲入微又云衛玠談道平子絶倒閉門長蒿蓬蓬蒿繞宅見上注誰能賞逺韻大守似安豐晋􅁃凱雅有逺韻王戎傳進爵安豐縣侯流水鳴無意白雲出無心歸去來詞雲无心而出岫水得平淡處渺渺不厭深雲行不能雨還㱕碧山岑斯人似雲水廊廟等山林文選曹子建詩朝雲不㱕山霖雨成川澤前漢賛山林之士徃而不能反朝廷之士入而不能出俗士得失重舎􅀛􅀚朶頥昜舎尓靈􅀛􅀚我朶頥六經成市道駔儈以爲師史記廉頗傳客曰天下以市道交漢貨殖傳莭駔儈漢書吏道以法令爲師吾學淡如水載行欲安之莊子君子之交淡如水左傳㐮二十四年子産寓書告范宣子曰夫令名德之輿也恕思以明徳則令名載而行之楊子法言或問孔子知其道之不用也則載而􅁖乎之曰之後丗君子惟有無心子白雲相與期摧藏裭冠冕文選扶風􅁔抱􅂰獨摧藏昜訟卦或􅃬之鞶帯終朝三裭之後漢鄧禹賛裭龍章於終朝左昭九年伯父裂冠毀冕寂寞㱕丘園一瓢俱好斈伯仲吹箎壎政以此易彼韓文桞子厚墓志以彼易此孰得孰失髙車擇朱門得失固有在難爲俗人言司馬迁書云悲夫亊未易一二與俗人言也又云此可與智者道難與俗人言也携手力不足七年坐乖離此詩乃元豐二年歳巳未北京解官後作也在北京首尾跨七年選詩乖離即長衢愁思不能眠起視夜何其殘月掛破鏡古楽府云破鏡飛上天謂月半也寒星滿天垂明明故人心維斗終不移見上窮閻蒿蔓羶冨屋酒肉臭礼記冨􅃳屋漢霍去病傳重車餘弃粱肉而士有飢􅁏杜詩朱門酒􅁏臭路有凍死骨酒肉令人肥蒿蔓令人瘐欲從鍾鼎食家語子路曰親没之後累茵而坐列鼎而食史記貨殖傳洗削薄投也而郅氏鼎食馬醫淺方張里擊鍾鮑照詩擊鍾陳鼎食方駕自相求復恐􅁨患構秦時千户侯寂寞種􅀲後肖何傳召平者故秦東陵侯秦破爲布衣貧種􅀲長安城東􅀲美故丗􅁛東陵􅀲客從濟􅀯來李子先及前篇李得叟皆在濟􅀯山谷母黨也遺我故人書墨淡字踈行杜詩墨淡字欹傾故人情有餘上言猶健否次問意何如只今意何有思食故溪魚古楽府詩云客從逺方來遺我双鯉魚呼児烹鯉魚中有尺素書長跪讀素書書中意何如上言加餐飯下言長相思吾子有嘉得譬如含薫蘭清風不來過歳晚蒿文間渊明飲酒詩云幽蘭生前庭含薫待清風清風脫然至見别蒿艾中古來百夫雄白首在澗槃詩百夫之特又考槃在澗非閞自取重杜詩云非閞足无力又云非閞故安排直爲知人難書在知人惟帝其難之次韻晁元忠西㱕十首我田失耕耘歳暮拾枯其枯其不可食日晏抱長飢漢楊惲傳其詩曰田彼􅀯山蕪穢不治種一頃豆落而爲其猛虎依山林眼有百歩威退之猛虎行正晝當谷眠眼有百歩威一從梁鴦食風月何時㱕列子云周宣王之牧正有役人梁鴦能飬禽獸虎狼无不柔馴者梁鴦曰飬虎之法順之則喜逆之則怒夫食虎者不敢以生物與之爲其殺之之怒也虎與人異而媚飬已者聖莫如東家長年困行路公飬爲淹留豈不以食故邴原别傳曰原逰斈詣孫崧崧曰君捨鄭君所謂以鄭君爲東家丘也原曰君謂僕以鄭爲東家丘必以僕爲西家愚夫􅁘孟子万章下云孔子有公飬之仕林薄鳥遷巢水寒魚不聚老杜詩林茂鳥有㱕水深魚知聚􅀌士似無家轉蓬何由住􅀃苑魯哀侯弃囯而走齊對齊侯曰是猶秋蓬􅁖其本根而美其枝葉秋風一起根且抜矣曹子建詩轉蓬離本根飄飄隨長風老杜云飄零似轉蓬前有熊羆咆後有虎豹號文選劉安招隠士云虎豹闘􅀆熊羆咆杜詩空荒咆熊羆巳出澗谷底更陟山板髙五日一併食儒行云儒有昜衣而出并日而食十年一緼􅂁語衣弊緼􅂁兼用檀弓所云晏子一狐裘三十年之意未知㱕􅀫處豈惮鞍馬勞退之病中贈張藉詩言籍之詞云從此識㱕處東流水淙淙䴡􅁎封人子弄影爱朝日文選疊霜毛而弄影晋囯始得之涕泣甘首疾詩甘心首疾􅁨危與安楽一生誰能必同床食芻豢廼悔沾􅁭失䴡􅁎亊見上怨句識之推史記晋丗家文公賞從亡者介子推不言禄禄亦不及隠不復見子推從者懸書宫門曰龍欲上天五蛇爲輔龍巳升雲四蛇各入其宇一蛇獨怨終不見處所文公見之曰此介子推也啇􅁔知寗戚琴操曰寗戚飯牛車下叩牛角而啇􅁔曰􅀯山粲白石爛生不逢堯與舜禅短布单衣裁至骭長夜􅁳􅁳何時旦齊􅁊公聞之舉以爲相我占晁氏賢乃在賦行役詩父曰嗟予子行役同遊羿彀中莊子得充符篇云遊於羿之彀中儻免非爾力孟子其中非爾力也㴞㴞今如此去􅀖將安適論語桀溺曰㴞㴞者天下皆是也退之古風云一邑之水可走而違天下㴞㴞曷其而㱕􅀬避􅁖木隂渴辭盗泉水文選陸士衡詩渴不飲盗泉水􅀬不息􅁖木隂􅁖木豈木隂志士多苦心曽囬勝母車鄒陽書里名勝母曽子不入邑号朝􅁔墨子囬車不落抱玉淚鄒陽書玉人献寳楚王誅之注云卞和抱其璞哭於郊詳見上註大白詩抱玊入楚囯晁氏猛虎行繳繳壯士意人生髙唐􅀚髙唐之􅀚見文選宋玉賦有情何能已腰垂九井璜文選顔延年詩有懷誰能已元注云晁詩云安得龍山潮駕回實河水水從樓前來中有羙人淚尚書中􅀱曰吕尚釣于磻溪得玉璜云云見文選注山谷琴銘云釣魚而得九井之璜盖用山海經事經云海内崑崙墟在西北帝之下都高九仭有九井以玉爲檻耳著明月璫文選洛神賦贈江南之明璫注云耳珠曰璫蘭蓀結襟帶芰荷製衣裳沈休文和謝宣城詩昔賢侔時雨今守馥蘭蓀離騷經製芰荷以爲衣􅀆集芙蓉以爲裳其人雖甚逺其室大道傍當身不著意千載永相望鄭國風其室則邇其人甚逺古語築室道旁三年不成太白詩遮莫親姻連帝城不如當身自簪纓當字作去聲讀風雨去家行手􅀛面黧黒屠龍非丗賢莊子宋人有善不􅀛手之藥者韓非子晋文公反國及河令籩豆􅂢之席蓐􅂢之手足胼胝面目黧黒者後之列子年老力弱面目黧黒杜詩㑹面嗟黧黒屠龍見上學問求自得孟子君子深造之以道欲其自得之也我思脊令詩同飛復同息兄弟無相逺急難要羽翼小雅常棣云脊令在原兄弟急難角弓云兄弟昏姻無胥逺矣唐元宗賜讓皇帝兄弟天生之羽翼人言貧在家殊勝冨作客楽天詩始知爲客苦不及在家貧唐戎昱詩逺客㱕去來在家貧亦好雞棲牛羊下見上君子亦安息千里求明師營糧從亊役莊子胠篋篇延頸㪯踵曰某所有賢者贏糧而趣之􅀯溪始泛云誰謂非亊役學問非物外室虚生純白見上前集贈桞某詩云歸來坐虚室夕陽在吾西與此同意盖謂道在迩而求諸逺也開田望食麥春隴無秀色深耕不償勤牛耳徒濕濕見詩豐㐫誰主張坐令愁煎迫河清㑹有時左傳周詩有之涘河之清人壽幾何注逸詩也得酒洒胸臆集中有答晁元忠書云未識足下之面因諸昆弟得足下之詩興托深逺不犯丗之鋒永懷善怨鬰然􅀋騷故追韻冩意於无能之詞又云􅀯來拘窘吏事雖江山映發心不在焉又云十詩聊報盛意又云承去歳不利秋官可見詩中之意矣其言􅀯來拘窘吏亊可見在大和作追韻冩意即此詩也十詩聊報盛意見第三卷山谷外集詩註卷之四
