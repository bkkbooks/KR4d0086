front:
  text: 山谷外集詩注卷之十二
  hash: sha256:27c3850606ee98f15f6203df6106349c46157cd9065ff4a6d5d6d3f8e3eeac75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_012-1a}
body:
  text: 讀曹公傳并序曹公自以勲髙宰衡文對西伯蟬蛻揖譲之中而用漢室於家巷離騷經云五子用失乎家巷後漢延篤傳䔍以病免歸教授家巷更黨錮之災義士忠臣耘除略盡献靈之間北面朝者拱而觀變漢魏何擇焉彼見宗廟社稷之無與也執大阿而用其頴以司一丗之命左右無不得意引後宫於鈇銊如刈蒲茅後漢献帝伏皇后紀政在曹操操求董貴人殺之帝以貴人有􅗖累爲請不得后懷懼與父書言操殘逼􅃺令宻圖之事露操逼帝廢后令華歆勒兵入宫收后后閉戸藏壁中歆就牽后出時帝在後殿后􅀍髮徒跣行泣過訣曰不能復相活􅁘帝曰我亦不知命在何時遂將后下􅁀室以􅁨崩夫匹婦婢使得罪家人猶爲謝過而親北面受命之君自以爲未知死所嗚呼癘憐王其誰曰過言􅀾國策楚語云或􅀃春申君曰孫子天下賢人也君何辭之春申君於是使人請孫子於趙孫子爲書謝曰癘人憐王此不恭之語也雖然不可不審察也此爲劫弑死亡之主言也夫人主年少而矜材無法術以知姦則大臣主断楚王子圍以冠纓絞王殺之因自立也齊崔杼攻莊公射中其股遂殺之近代李兊用趙餓主父於沙丘淖齒用齊擢閔王之筋縣於其廟梁夫癘雖㿈腫抱疾上比前丗未至絞纓射股下比近代未至擢筋而餓死也由此􅀚之癘雖憐王可也注云續韓非子諺曰癘憐王雖然終已恭譲腹毒而色取仁任丕以易漢姓者何也漢之末造雖得罪於社稷骨鯁之臣而猶不得罪於民故猶爱其名耳余聞曰道揆以上惠不足而明有餘不在社稷而数有功粢盛殆其不継哉感之作曹公詩一章南征北伐報功頻劉氏親爲魏國賓畢竟以丕成霸業豈能於漢作純臣献帝紀建安二十五年正月庚子魏王曹操薨三月改元延康冬十月乙卯皇帝遜帝魏王丕稱天子奉帝爲山陽公公奏事不稱臣左傳君子曰頴考叔純孝也注曰純猶篤也傳又云君子曰石碏純臣也兩都秋色皆喬木二祖恩波在細民班固作兩都賦辝曰有西都賓問東都主人云云孟子曰所謂故國者非謂有喬木之謂也二祖謂髙祖丗祖杜詩莫恠恩波隔又云恩波錦帕舒駕馭英雄雖有術杜詩君王自神武駕馭必英雄又云君王無所措駕馭英雄材力扶宗社可無人􅄂詩古風䔥索不言歸貧賤交情冨貴非下邽翟公爲廷尉賓客填門及廢門外可設雀羅後復爲廷尉客欲往翟公大書其門曰一死一生乃知交情一貧一冨乃知交態一貴一賤交情乃見見鄭當時傳丗祖本無天下量子陵何慕釣魚磯後漢嚴光傳光字子陵與光武同遊學及光武即位変姓名􅀮身不見帝令以物色求之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車聘之三反而後至竟不屈子陵髙抗皆丗祖之量有以客之也􅀂丗祖有貧冨交情之異則嚴光豈慕此哉此語必有爲而發同謝公定携書浴室院汶師置飯作此竹林風與日俱斜細草猶開一兩花天上歸來對書客一作卷愧勤僧飯更煎茶謝人恵茶一規蒼玉作蜿蜒此言龍團退之南海神碑云蜿蜿蜒蜒來享飲食藉有佳人錦叚鮮張平子四愁詩云美人贈我錦綉叚莫􅀏持㱕淮海去爲君重試大明泉唐張又新水記云水之與茶冝者凡七品淮南路揚州大明寺水第五暮到張氏園和壁間舊題邵平不見見園􅀲三徑還㝷二仲家莫道暫來無所得未秋先見碧蓮華邵平二仲見上髙僧傳求􅄼跋於别室入禪累日不出寺僧遣沙弥候之亘室弥漫生靑蓮花從人求花􅃕南􅃕北勃姑啼桞子厚聞黄鸝詩此時晴煙最􅀷處舎南巷北遥相語杜詩􅃕南舎北皆春水勃姑見上體中不佳隂雨垂晉王湛傳兄子濟嘗詣湛見牀頭有周易問何用此爲湛曰體中不佳脫復看耳欲向黄梅問消息背隂合有兩三枝傳燈録慧能大師傳智逺禅師謂曰西域菩提達磨傳心印於黄梅汝當往彼參决師辝决直造黄梅之東禅詩含此意李白詩聞道春還未相識走傍寒梅訪消息祖庭事􅁐曰經律異相云有噉人􅄦捉得一人日方欲出人謂􅄦曰君何以靣白背黒曰我􅄦性畏日也其人向日而走旣得脫因􅀃偈言勤學第一道勤問第一方道逢羅刹難背隂向太陽懋宗奉議有佳句詠冷庭叟野居庭堅於庭叟有十八年之舊故次韻贈之庭叟有佳侍児因早朝而逸去乃挿藩甚􅃊宻城西冷叟半忙閑湘山野録云楊大年爲閑忙令丗上何人最好閑丗上何人最好忙人道王陽得早還漢王吉字子陽爲諫議大夫謝病㱕琅邪四望楼䑓皆我有一原花竹住中間􅀄无狗盗偷籬落史記孟嘗君客最下坐有能爲狗盗者入秦宫藏中取狐白裘底事娥眉失鎻関毎爲朝天三十里時時驚枕夢催班杜詩汝陽三斗始朝天李濠州挽詩循吏功名两漢中平生風義最雍容魚遊濠上方云楽見上鵩在承塵忽告凶西漢雜記云賈誼在長沙鵩鳥集其承塵而鳴長沙俗以鵩鳥至人家主人死􅁩作鵩鳥賦齊死生等榮辱以遣􅁨累焉掛劒自知吾已許吴丗家季扎過徐君徐君好季扎劒口弗敢言季扎心知之爲使上囯未献還至徐徐君已死乃解其宝劒繫之徐君􅃁木而去曰始吾心已許之豈以死背吾心哉脫驂不爲涕無從檀弓云孔子之衛遇舊館人之䘮入而哭之哀出使子貢脫驂而賻之子貢曰於門人之䘮未有所脫驂脫驂於舊館無乃巳重乎夫子曰予向者入而哭之遇於一哀而岀涕予惡夫涕之無從也小子行之百年窮逹都㱕盡淮水空圍墓上松禮数最優徐孺子見上風流不减謝宣城見上那知此别成千古未信斯言隔九京禮記晉献文子曰從先大夫於九京注謂晉卿大夫之墓地在九原京盖字之誤落日松楸隂隧道西風簘鼔送銘旌善人報施今如此隴水長寒嗚咽聲史記伯夷傳或曰天道無親常與善人若伯夷叔齊可謂善人者非􅁘積仁潔行而餓死天之報施善人何如哉楽府有隴頭歌古詞云隴頭流水鳴聲幽咽遥望秦川心肝断絶寄家近别幾日客愁生固知逺别難爲情文選王昭君詩傳語後丗人逺嫁難爲情退之詩人間有累不可住依然離别難爲情夢回官燭不􅄹把後漢巴祗與客暗坐不然官燭杜詩浩歌淚􅄹把又云􅄹把那須滄海珠檀道鵉續晉陽秋曰陶潜九月九日無酒於宅边菊叢中摘􅄹把見白衣人送酒猶聽嬌兒索乳聲退之詩嬌女未絶乳念之不能忘忽如在我前耳若聞啼聲衛南今年畚鍤棄春耕折葦枯荷繞壞城杜詩菱荷枯折隨風濤陸􅀛蒙鵁鶄詩不似閑棲折葦秋白烏自多人自少嘗聞東坡知登州有一主簿白事不巳公頗倦謾云晚可見過主簿不測其意至晚獨入公強出見之因閱杜詩問云江湖多白烏天地足靑蠅白烏鷗鷺之属耶主簿曰白烏乃蚊蚋以况贓吏江湖之間去朝廷逺多贓吏耳天地之間君子少而小人多公即改􅀚厚待之按月令群烏養羞注云羞謂所食也夏小正曰九月丹烏羞白烏􅀃曰丹烏謂丹良也白烏謂閩蚋也又按金楼子云白烏蚊也齊􅁊公卧栢寢謂仲父曰一物失所寡人悒悒今白烏營營是必飢耳閩音文人少字蓋用杜詩䔥條四海内人少豺虎多也汙泥終濁水終淸杜詩濁河終不汙淸濟退之詩清溝映汙渠沙􅂣旗鼔千人集漁戸風煙一笛横唯有鴟鴞古祠栢對人猶是向時情酒江形圜似阮家盆丗􅀃阮仲容至宗人間共集以大盆盛酒山势岺如北海樽孔融傳樽中酒不空戸有浮蛆春盎盎奴松一路醉郷門唐王績有醉郷記楞嚴經頌云十方薄伽梵一路􅄺槃門急雪􅀉王立之問梅紅梅雪裏與蓑衣莫遣寒侵鶴􅂰枝吴都賦家有鶴􅂰户有犀渠借此以言梅友之瘦也老子此中殊不淺􅁃亮在武昌諸佐吏乗秋夜共登􅀯楼俄而亮至諸人將起避之亮曰老子於此處興復不浅尚堪何遜作同時杜詩東閣􅀚梅動詩興還如何遜在揚州按三輔决録何遜在揚州見官梅乱發賦四言詩人得傳冩司馬相如傳朕獨不得與此人同時哉又􅀉王立之南人羇旅不成歸夢遶􅀯枝與北枝安得􅀌根連夜發要當雪月並明時花湏連夜發􅀯北枝並見上歳寒知松栢此詩效進上躰元祐間作有两篇其一見前集松栢天生獨青靑貫四時禮記曰其在人也如竹箭之有筠也如松栢之有心也貫四時而不改柯易葉莊子受命於地唯松栢獨也在冬􅁨靑靑心藏後凋節歳有大寒知論語歳寒然後知松栢之後凋也慘淡氷霜晚輪囷澗壑姿輪囷見上或容蝼蟻穴老杜古栢行苦心豈免容蝼蟻未見斧斤遲揺落千秋静婆娑萬􅄜悲鄭公扶正􅀚已不見封彛唐魏證傳帝曰此證􅂆我行仁義旣効矣惜不令封德彞見之效進士作􅀚成都石經成都記孟蜀時僞宰相母昭裔以俸金刻九經於石成都九經石歳乆麝煤寒麝煤寒見上字畫參工拙文章可鍳􅀚危􅀖猶􅂆講後漢楊秉傳以明尚書徴入􅂆講注云猶侍講也相國校凋刋羣盗煙塵後諸生竹帛殘劉向典校書籍皆先書竹改易刋定可繕冩者以上帛見御覽簡門王春尊孔氏孔子作春秋首書春王正月乙夜詔甘盤漢官儀中黄門持五夜謂甲夜至戊夜杜陽雜編文宗視朝後即閱群書謂左右曰􅀂不甲夜視事乙夜􅀚書則何以爲人君􅁘􅀃命舊學于甘盤願比求諸野漢蓺文志仲尼有言禮失求諸野成書學上官尚書序悉上送官藏之書府漢文翁爲蜀郡守起學官於成都市中學官謂學􅃕也送徐景道尉武寕李苦少人摘見上酒醇無巷深古語美酒無曲巷當官莫避事左傳當官而行爲吏要清心淸心見上葛藟松千尺國風綿綿􅁑藟寒泉綆百㝷莊子綆短者不可以汲深公朝有汲引漢劉向云禹稷皐陶轉相汲引吾子茂徽音詩大姒嗣徽音黄綬􅀘一尉朱博傳刺史不察黄綬注丞尉職卑皆黄綬還依水竹居身隨南渡馬退之詩一馬􅀯渡開新主此摘其字書􅀉北來魚風俗諳鄰並艱難試事􅀄官閑莫歌舞教子誦詩書鄰並事􅀄使俗語所謂以俗爲雅也杜似吟院兩首日長吟院無公事燕入花開必有詩莫道南風吹鴈去春来亦有北風時吟院虚明如畫舫想成檻外是長冮杜郎忽作揚州夢雨帶風沙打夜䆫唐杜牧之詩十年一斍揚州夢嬴得靑楼薄行名奉送劉君昆仲游子㱕心日夜流漢髙祖紀謂沛父兄曰游子悲故郷南陔香草可晨羞束廣微補亡詩云循彼南陔言採其蘭又云馨爾夕饍絜爾晨羞平原曉雨半槐夏汾上午風􅀄麥秋歐陽詩話云趙學士師民詩思光精如麥天晨氣潤槐夏午隂清前丗名流皆所未到也鴻鴈要須翔集早脊鴒無憾急難求詩鴻鴈于飛集于中澤常棣云脊鴒在原兄弟急難論語翔而後集欲因行李傳家信姑射山前是晉州劉君兄弟當自德州㱕晉故稱平原汾上時山谷在德平也按寰宇記晉州所治臨汾縣有平山一名壷口禹貢所謂壷口治梁及歧也今名姑射山在縣西八里莊子藐姑射之山有神人焉即此􅂆交代張和父酒風流五日張京兆漢張敞傳敞使賊曹􅁺絮舜有所按験舜以敞奏當免不肯爲敞竟事曰吾爲是公盡力多矣今五日京兆耳安能復案事今日諸孫困小官作尹大都如廣漢趙廣漢張敞皆京兆尹所爲大略相似畫眉仍復近長安敞爲婦畫眉長安人傳張京兆眉憮欲得官近長安唐人語也三人成虎事多有孔融臨終詩三人成市虎浸漬解膠􅃮衆口鑠金君自寛鄒陽書云衆口鑠金積毁銷骨酒興情親俱不淺賤生何取罄交歡楊朴墓三尺􅀌墳一布衣人言無復似當時千秋萬􅀊來還此千秋萬歳見第一卷末注月笛煙莎丗不知元注云􅀭朴喜吹笛嘗作莎詩極工按范文正公詩話云楊朴字契玄鄭州人善爲詩不仕少與畢相同學薦之大宗召見面賦莎衣詩云狂脫酒家春醉後乱堆漁舎晩晴時除官不受聽歸山以其子從政爲長水尉東坡云昔年過洛見李公簡言真宗東封訪天下隠者聞鄭人楊朴能爲詩召對自言不能上問臨行有人作詩送卿否朴曰唯臣妻有一首云更休落魄躭盃酒且莫猖狂愛詠詩今日捉將官裏去這囬断送老頭皮上大􅀏放還山次韻李士雄子飛獨逰西園折牡丹憶弟子竒絶二首西園春色才扽李蜂巳成圍蝶作團更欲開花比京洛放教姚魏接山丹歐陽公花品云姚黄魏紫以姓著􅂫門下種山丹詩云淮陽千葉花到此三百里城中衆名園㘽接比桃李乗秋種山丹得兩生可喜山丹非佳花老圃有深意􅀫根巳得土絶品皆可􅀉又種花詩云山丹得春雨艷色照庭除末品何曽数群芳自不如今秋接千葉試取洛人餘桃李隂中五兄弟扶將白髪共傳盃風吹一鴈忽南去空得平安書信囬扶將傳盃見上戯和􅃕弟船􅂣探春二首雨餘禽語摧天曉月上棃花放夜䦨莫聽遊人待妍暖十分傾酒對春寒百舌解啼泥滑滑梅聖俞禽言四首其一竹雞云泥滑滑苦竹岡雨蕭蕭馬上郎泥滑滑蜀人号爲雞頭鶻東坡詩泥深厭聽雞頭鶻忽成風雨落花天城南一叚春如錦喚取詩人到酒邊戲荅李子眞河上見招來詩頗誇河上風物􅂓以當嘲云渾渾舊水無新意漫漫黄塵涴白鷗安得江湖忽當眼卧聽禽語信船流同景文丈詠蓮塘塘上鈎簾對晚香半斜紅日已侵床江妃羞出凌波韈長在髙荷扇影凉吴都賦江妃於是往來洛神賦凌波微歩羅韈生塵從丘十四借韓文二首六言吏部文章萬丗吾求善本徧窺散帙雲䆫棐几同安得見丘遲謝靈運詩散帙問所知太白詩得憇雲䆫眠王羲之傳詣門生家見棐几滑浄因書之南史丘靈鞠傳子遲詞采麗逸同安今舒州也中有先君手澤禮玉藻父没而不能讀父之書手澤存焉耳丹鈆􅀧勘書詩退之秋懷詩不如覷文字丹鈆事􅀧勘莫惜借行千里他日還君一鴟一鴟見第三卷聞胡朝請多藏書借書目詩注次韻題粹老客亭詩後客亭長短路南北長亭短亭見哀江南賦衮衮行人那得知惟有相逢即相别一杯成喜只成悲古樂府木蘭歌父母見木蘭喜極成悲傷次韻寅菴四首寅菴山谷兄大臨元明也其詩序云􅀟井弊廬之東得勝地結茅菴居命曰寅菴喜成四詩􅀉魯直可同魏都士人共和之可見山谷時在北京也四詩􅀃盡菴前事􅀉逺如開水墨圗略有生涯如谷口楊子法言云谷口鄭子真耕乎巖石之下而名震于京師非無卜肆在成都漢書蜀有嚴君平卜筮於成都市旁籬榛栗供賓客满眼雲山奉宴居禮記仲尼燕居閑與老農歌帝力帝王丗紀帝尭之時天下大和老人擊壌於道􅀚者歎曰大哉帝之德也老人曰吾日岀而作日入而息鑿井而飮耕田而食帝何力於我哉年豐村落罷追胥周禮小司徒之職乃㑹萬民之卒伍而用之以比追胥注追逐㓂也胥伺捕盗賊也又云凡起徒役毋過家一人以其餘爲羡唯田與追胥竭作兄作新菴接舊居一原風物萃庭隅陸機招隠方傳洛陸機有招隠詩張翰思㱕正在吴晉張翰呉郡呉人齊王囧辟爲東曹􅁺見秋風起思呉中菰菜蓴羹鱸魚遂命駕而㱕五斗折腰慚僕妾見陶潜傳幾年合眼夢郷閭樂天詩春来夢何處合眼到東川白雲行處應垂淚唐狄仁傑授并州法曹參軍親在河陽仁傑登太行山反顧曰白雲􅀌飛謂左右曰吾親􅃕其下瞻悵乆之雲移乃去黄犬㱕時早􅀉書見上大􅀂塘邊擉網魚莊子則陽篇冬則擉鼈于江擉􅀄角切小桃源口帶經鋤漢児寛傳帶經而鋤詩催孺子成雞栅老杜有催宗文樹雞柵詩茶約鄰翁掘芋區􅀲疇芋區見蜀都賦苦楝狂風寒徹骨黄梅細雨潤如酥楝風梅雨並見上注退之詩天街小雨潤如酥此時睡到日三丈南齊天文志永明五年日出三竿盧仝詩日髙丈五睡正濃杜牧之詩白頭扶不起三丈日還髙自起開関招酒徒史記酈食其叱使者曰走復入言沛公吾髙陽酒徒耳未怪窮山寂寞居此中常與丗情踈誰家生計無閑地太半㱕来已白須不用看雲眠永日老杜云看雲莫悵望又云時獨靑雲淚橫臆㑹思臨水􅀉􅀟魚見上公私逋􅀒田園薄未至妨人作楽無見上送楊􅗕鴈門省親二首從予學易業未成辝㱕執㦸老翁年七十人看生理亦無􅂓草玄事業窺周易作賦聲名動漢朝楊雄事見上本傳無執㦸字文選曹子建與楊得祖書云楊子雲先朝執㦸之臣耳注云爲郎皆執㦸今見逺孫勤翰墨還持遺藁困簞瓢見論語三年郷校趍晨鼓入北京郡庠也一日邊城聽夜刁李廣傳不擊刀斗自衛邊城謂代州鴈門也野飯􅄹盤厭葱韭莊子徐無􅄦篇徐無􅄦見武侯武侯曰先生居山林食芋栗厭葱韭以賓寡人春風半道解狐貂楊子舉丗寒貂狐不亦燠乎㱕時定倒迎門屣問鴈安能學度遼後漢王符傳度遼將軍皇甫規解官㱕安定郷人有以貨得鴈門大守者亦去職還家刺謁規規卧不迎旣入而問卿前在郡食鴈美乎有頃又白王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎退之後漢三賢賛云皇甫度遼聞至乃驚衣不及帶屣履出迎豈􅀂鴈門問鴈呼卿蜀客出衰丗蜀客謂楊子雲蜀人也而客於京師獨升鄒魯堂言其學孔孟如論語所言由也升堂矣未入於室也蚊虻觀得失莊子云蚊虻􅏐膚淮南子云毁譽之於已也猶蚊虻之一過也子雲於得失亦然虎豹擅文章易革卦九五大人虎変象曰其文炳也上六君子豹変其文蔚也吾子已強學儒行云夙夜強學以待問草玄冝不忘江河須畎澮書益稷禹曰予决九川距四海濬畎澮距川此言積畎澮而成江河􅂆其博學松栢要氷霜馬䇿路千里鴈門書数行㫖甘君有婦内則云慈以㫖甘玉䑓新詠使君自有婦尺壁爱分光見上次韻謝公定王丗弼贈荅二絶句何用苦吟肝腎愁退之贈崔立之云􅂆君韜飬待徴招不用雕􅅣愁肝腎但知把酒更無􅁨聲名本不関人事看取青門一故侯曹參傳載邵平平東陵􅀲事三輔黄圗長安城東門曰靑門昔邵平種􅀲靑門􅀲美云云酒因咀嚼還知味詩就呻吟不要工王謝風流看二妙病夫直欲卧墻東後漢逸民逄萌傳與同郡王君公相友善君公遭乱儈牛自隠時人爲之語曰辟丗墻東王君公次韻公定丗弼登北都東楼四首此詩及前後数詩皆北京作日著䦨干角風吹濯澣衣詩葛覃服澣濯之衣喜同王季哲文選謝玄暉和王主簿怨情一首注云王主簿名季哲更得謝玄暉淸興俱不淺興復不淺見上注長吟無用㱕月明南北道猶見驛塵飛杜詩使塵来驛道真皇多廟勝仁祖用功深景德元年契丹舉國來㓂遂䧟德清以犯天雄真宗用㓂凖計决䇿親征旣次澶渊兵始接射殺其驍將撻覧虜懼請和時諸將皆請以兵㑹界河上邀其㱕以精甲躡其後殱之虜懼求哀於上上曰契丹幽薊皆吾民也何多以殺爲遂詔諸將按兵勿伐縱契丹㱕國自是通好守約三十有九年及元昊叛兵乆不决契丹之臣教其主投詞以動我欲得晉髙祖所與関南十縣慶曆二年聚重兵境上遣使聘宰相舉知制誥冨弼報聘増幣二十萬而契丹平孫子曰夫未􅀾而廟筭勝者得勝筭多也退之書云用功深者其収名也逺卜宅遷九鼎史記太史公曰學者皆稱周伐紂居洛邑綜其實不然武王營之成王使召公卜居居九鼎焉而周復都豊鎬破胡藏萬金此卷先有河朔謾成八首其一云萬金􅂢費物皆春盖指歳幣也破胡藏萬金藏疑作􅂢百年休戰士當日縱前禽欲断匈奴臂不如留此心張騫傳是断匈奴臂也文選沈休文詩命師誅後服授律緩前禽注云易曰王用三驅失前禽也王弼注易云三驅之禮禽逆来􅃐已則舎之背已而走則射之愛於来而惡於去也故其所施常失前禽都城礙飛烏軍幕卧􅆛貅曲禮曰前有鷙獸則載􅆛貅杜詩大城鐡不如小城萬丈餘連雲列􅀾格飛烏不能踰此所謂礙飛烏也柴葚知􅅙老衛國風氓云于嗟鳩兮无食桑葚釋音云葚亦作椹音甚桑實也柳子厚詩西林紫椹行當熟黄雲見麥秋接天双闕起伏地九河流耆老深望幸銮輿不好遊司馬相如封禅書云大山梁父設壇􅂣望幸元稹連昌宫辝老翁此意􅀷望幸老杜江陵望幸云望幸歘威神相如上林賦乗法駕建華旗鳴玉鵉禮經解云升車則有和鵉之音注鵉與和皆鈴也杜詩鵉輿駐鳯翔漢皇勤逺略晚節相千秋見車千秋傳不足中原地猶思一􅀾収杜詩胡虜三年入乾坤一􅀾収聖朝方北頋斜日􅀝東楼廟筭知無敵寒儒浪自愁廟筭見上李右司以詩送梅花至潞公予雖不接右司想見其人用老杜和元次山詩例次韻潞公時留守北京老杜有和元結舂陵行兼賊退示官吏作二首其序云簡知我者不必示之凡花俗草敗人意俗物已復來敗人意見王戎傳晚見瓊􅅋不恨遲江左風流尚如此春功終到歳寒枝次韻張祕校喜雪三首落月煙沙静渺然好風吹雪下平田瓊瑶萬里酒増價桂玉見上一炊人少錢學子已占秋食麥廣文何憾客無氈才名四十年坐客寒無氈此老杜贈鄭廣文山谷以自况睡餘強起還詩債臘裏春􅀄未隔年巷深朋友稀来往日晏兒童不掃除雪裏正當梅臘盡民飢可待麥秋無杜詩梅蘃臘前破月令孟夏麥秋至寒生短棹誰乗興晉王徽之傳嘗居夜雪􅀄霁月色淸㓪忽憶戴逵逵時在剡便夜乗小舡詣之經􅀫方至造門不前而反人問其故徽之曰本乗興而来興尽而反何必見安道耶光入踈櫺我讀書宋齊語曰孫康家貧映雪讀書文選曹子建詩流焱激軒注軒䆫間也官冷無人供美酒杜詩廣文先生官獨冷何時却得歩兵厨阮籍聞歩兵厨人善醸求爲歩兵校尉满城楼􅀚玉䦨干小雪晴時不共寒潤到竹根肥臘筍杜詩宻竹復冬筍暖開􅂼甲助春盤杜詩自鋤稀菜甲眼前多事􅀚游少􅀚游見上胷次無憂酒量寛聞􅀃壓沙棃巳動㑹須鞭馬蹋泥看退之詩走馬來看立不正呻吟齋睡起五首呈丗弼棐几坐淸晝博山凝妙香棐几博山見上杜詩心淸聞妙香蘭牙依客土栁色過鄰墻巷僻過從少官閑氣味長江􅀯一枕夢髙卧聽鳴桹文選潘安仁西征賦鳴桹厲響學省非簿領文選沈休文學省愁卧一首注云梁書齊明帝即位沈約遷國子􅀕酒學省國子也山谷時爲北京國子監教授故得稱學省卧痾常閉関謝靈運詩卧痾對空林雨餘楼閣静風晩鳥烏還賞逐四時改沈休文詩山中咸可恱賞逐四時移心安一味閑古人雖已往不廢仰髙山詩髙山仰止􅂼食吾猶飽曲肱哦古今論語子曰飯􅂼食飮水曲肱而枕之樂亦在其中矣酒傾因好事揚雄傳好事者載酒肴從之絃絶爲知音楊雄解難云鍾期死伯牙絶絃破琴而不肯與衆鼓詳見上妬蘖長春木争巢喧暮禽長懷阮校尉北望首陽岑文選阮嗣宗詩歩出上東門北望首陽岑已把社公酒退之憶昨行社公禮罷元侯廻春寒那得嚴厭聽鵶啄雪喜有燕穿簾璞玉深藏器孟子今有璞玉於此易君子藏器於身嚢錐立見尖史記平原君謂毛遂曰賢士之處丗􅀂錐之處囊中其末立見先生不能毛遂曰使遂蚤得處囊中乃頴脫而出非特其末見而已兒時爱談道衛玠談道見上注今日口如箝退之苦寒云口角如衘箝墻下蓬蒿地児童課剪除蔓萵隨分種􅂎菊未須鉏河水傳烽火交州報捷書交趾入㓂盖熈寕八年連歳進討至十年乃降時山谷未離北京也無能落閑處唐司空圖耐辱居士歌云頼是長交閑處着退之詩如今到死得閑處遂有詩賦歌康哉慙愧飽春􅂼送蛤䖽與李明叔諸公雪屋吹燈然豆萁煑豆然豆萁用曹子建語詳見上古来壯士亦長飢廣文不得載酒去且詠大玄庖蛤䖽退之聮句庖霜鱠玄鯽摘庖字戲贈丗弼用前韻盗跖人肝常自飽莊子盗跖篇膾人肝而餔之首陽薇蕨向来飢見史記伯夷傳誰能著意知許事且爲元長食蛤䖽南史王融字元長嘗遇沈昭略昭略曰主人是何年少融殊不平謂曰僕出於扶桑入於陽谷照耀天下孰云不知而發此問昭略曰不知許亊且食蛤䖽融曰物以羣分方以􅀋聚君長隅居然應嗜此族丗弼病方家不善論蛤䖽之功戲荅伯樂無傳􅂹空老伯樂見上重華不見士長飢渊明詩重華去我乆賢士丗相㝷從来萬事乖名實豈但薬翁論蛤䖽次韻師厚萱草從来占北堂衛國風伯兮云焉得諼草言樹之背毛云諼草令人忘􅁨背北堂也釋音云諼本作萱雨露借恩光文選江淹大王恵以恩光與菊乱佳色渊明詩秋菊有佳色裛露掇其英共葵傾太陽文選曹子建表􅀂葵藿之傾葉太陽雖不爲􅅆光然向之者誠也人生真苦相物理忌􅀌芳顔延年􅀕屈原文物忌堅芳人諱明絜退之詩異質忌處群􅀌芳難􅀉林不及空庭草榮衰可兩忘次韻師厚雨中晝寝憶江南餅麹酒雨砌無車馬風簾洒静便老杜詩秋風洒静便字本出謝康樂詩忽思江外酒凖擬醉時眠退之北湖詩凖擬醉時來􅀮几唯􅀚也化莊子齊物篇南郭子綦隠几而坐仰天而嘘云云篇末言莊周夢爲胡蝶周與胡蝶則必有分矣此之謂物化開書屡絶編漢儒林傳序孔子晚而好易讀之韋編三絶遥知煙渚夢遣騎唤漁船遣騎見上和師厚郊居示里中諸君籬邊黄菊関心事杜詩幽事頗相関䆫外靑山不丗情羅鄴詩年年􅀧檢人間事唯有春風不丗情施肩吾詩冮神也丗情爲我風色好太白詩相看兩不厭只有敬亭山江橘千頭供歳計三國志注李衡種橘千株臨終勑其子曰吾有千頭木奴可以不貧秋蛙一部洗朝酲兩部鼓吹見上㱕鴻往燕競時節􅀫草新墳多友生檀弓上曽子曰朋友之墓有􅀫草而不哭焉身後功名空自重眼前樽酒未冝輕晉張翰傳使我有身後名不如即時一盃酒太白詩且楽生前一盃酒何須身後千載名和師厚秋半時復官分司西都實録熈寕十年詔復都官郎中謝景􅀄權藩郡通判和師厚詩皆北京作遥知得謝分西洛曲禮大夫七十而致仕若不得謝注云謝聽也盖師厚丐閑故分司西京無復肯弹冠上塵漢王吉傳吉字子陽與貢爲友丗􅁛王陽在位貢禹弹冠園地除􅀲猶入市老杜有除架詩又云靑門􅀲地皆凍裂水田収秫未全貧陶潜傳在縣公田悉令種秫杜詩錦里先生烏角巾園収芋栗未全貧杜陵白髮垂垂老一缾一鉢垂垂老貫休詩也張翰黄花句句新張翰字季鷹晉書有傳文選有雜詩一首云莫春和氣應白日照園林靑條若揔翠黄花如散金還與老農争坐席莊子寓言篇其往也舎者避席煬者避竈其反也舍者與之争席矣青林同社賽田神退之賽神絶句云麥苗貪穟桑生葚且向田頭楽社神又南溪始泛云願爲同社人雞豚燕春秋和外舅夙興三首寓大雲寺作􅀲蔓巳除壟苔痕猶上墻蓬蒿貪雨露松竹見氷霜卷幔天垂斗披衣日在房退之詩惟時月􅅎死冬日朝在房無詩歎不遇千古一潜郎董仲舒有士不遇賦文選司玄賦云尉厖眉而郎潜兮逮三葉而遘武注云漢武故事顔駟漢文時爲郎至武帝輦過郎署見駟厖眉皓髪上問曰叟何時爲郎荅曰文帝時爲郎文帝好文而臣好武至景帝好美而臣貌醜陛下好少而臣已老是以三丗不遇上感其言擢拜㑹稽都尉風烈僧魚響霜􅃊郡角悲短童疲洒掃落葉故分披水凍食鮭少食鮭見上甕寒浮蟻遟文選曹子建七啓云盛以翠樽酌以彫觴浮蟻鼎沸酷烈馨香李善曰釋名云酒有泥齊浮蟻在上汎汎然朝陽烏鳥楽安穩記禅枝烏鳥聲楽見上杜詩禅枝􅀫衆鳥漂轉暮㱕愁孟浩然東寺詩禅枝悕鴿栖暑逐池蓮盡寒隨塞鴈来月令孟春仲秋皆曰鴻鴈来而孟春注曰鴈自南方来將北反其居詩言暑尽當是仲秋也衣裘雖得暖狐貉正相哀論語衣敝緼􅂁與衣狐貉者立而不耻僧汲轆轤曉車鳴関鏁開不因朝鼓起来帙乱書堆杜詩書乱誰能帙杯乾自可添陪師厚遊百花洲槃礴范文正公祠下道羊曇哭謝安石事因讀生存華屋處零落㱕山丘爲十詩此詩及前篇併後七八篇皆在鄧州作盖百花洲萊公范公祠皆在鄧而師厚家南陽山谷自北京解罷改官回至南陽見師厚也憶在昭陵日仁宗葬永昭陵傾心用老成功㱕仁祖廟政得一書生謂文正公羊生但着鞭勿哭西州門故有不亡者南山相與存羊曇事在謝安傳着鞭見劉琨傳莊子曰凡之亡也不足以䘮吾存慶州自不惡籍甚載聲華忠義可無憾公今有丗家仁宗時元昊反文正公自請守鄜延徙知慶州又以爲環慶路經略安抚使决䇿取横山復靈武而元昊􅁛臣請和文正仲子忠宣公純仁字堯夫熈寕七年十月知慶州所謂丗家者此也哲宗即位又自河中徙慶州此詩未也不惡見上公歸未百年􅔏巢荒古屋我吟殄瘁詩悲風韻喬木詩人之云亡􅀖國殄瘁傷心祠下亭在時公燕處臨水不相猜江鷗㑹人語公有一杯酒與人同醉醒遺民能記憶欲語涕飄零委徑問謡俗髙丘省佃作昔游非苟然今花幾開落在昔實方枘成功見圎機離騷經云不量鑿而正枘兮固前修以菹醢九辯云圜鑿而方枘兮吾固知其鉏鋙而難入文正平生鉏鋙不合多矣參知政事亦以不合出而其臨邊隨宜制变未始不圎也文中子曰安得圓機之士與之言九流哉九原尚友心見上白首要同㱕潘安仁詩投分􅀉石友白首同所㱕文正公岳陽楼記其末云其必曰先天下之􅁨而􅁨後天下之楽而楽乎噫微斯人吾誰與㱕詩意端指此人去洲渚在春回花草班杜詩重岩細菊班又云春風花草香清談值渊對發興如江山落日衘城壁太白詩靑山猶衘半邊日祠東更一游文正守鄧三年後人祠之悲来惜酒少安得董糟丘南史陳暄與兄子秀書曰速營糟丘吾將老焉和師厚接花妙手從心得接花如有神根株穣下土鄧州治穣縣顔色洛陽春雍也本犂子史記仲尼弟子傳冉雍字仲弓子曰雍也可使南面仲弓父賤人子曰犂牛之子騂且角雖欲勿用山川其舎諸仲由元鄙人仲由字子路性鄙好勇力冠雄雞佩貑豚陵􅁀孔子孔子設禮稍誘子路後儒服委質升堂與入室只在一揮斤論語子曰由也升堂矣未入於室也莊子匠石揮斤成風見上注言以洛陽牡丹接鄧州所種花如化犂牛子鄙人爲良士也和師厚栽竹大􅀮在城市文選王康琚詩大􅀮􅀮朝市此君真友生根須辰日斸蓺􅁐雌黄云種竹多用辰日山谷所謂根須辰日斸也筍要上畨成杜詩無数春笋滿林生柴門宻掩断人行㑹須上畨看成竹客至從嗔不出迎畨字元注云去聲盖用蜀人方言也山谷始作平聲龍化􅁑陂去用費長房竹化爲龍事見上鳯吹阿閣鳴漢律暦志黄帝伶倫自大夏之西昆侖之隂取竹之解谷断兩節間而吹之以爲黄鍾之宮制十二筩以聽鳯之鳴其雄鳴六雌鳴亦六帝王丗紀黄帝時鳯巢阿閣草荒三徑断歳晚見交情用翟公書門事見上次韻外舅喜王正仲三丈奉詔相南兵回至㐮陽捨驛馬就舟見過三首漢上思見龐德公龐德公㐮陽人以况師厚王正仲見第一卷末注别来悲歎事无窮聲名籍甚漫前日湏鬢索然成老翁並見上注家醸已隨刻漏下晉何充字次道劉惔云見次道飲令人欲傾家釀園花更開三四紅相逢不飲未爲得唐李敬方詩相逢不飲空㱕去洞口桃花也􅀏人見復齋謾録聽取百烏啼怱忽能来問疾見維摩經好音傳蹇歩昏花當日痊烹鯉得書增目力烹鯉見上孟子旣竭目力焉呼兒扶立候門前師厚首唱云倒着衣裳迎户外尽呼兒女拜燈前見第一卷末注㱕去来詞云稚子候門游談取重慙犀首犀首公孫衍也史記有傳居物多贏昧計然史記貨殖傳越王勾踐困於㑹稽乃用范蠡計然注計然范蠡師也漢張湯傳居物致冨與湯分之惟有交情等金石金石交見韓信傳白頭忘義復忘年忘年忘義見莊子齊物篇語言少味無阿堵馬援傳過是恐少味矣阿堵見上冰雪相看有此君燈火詩書如夢寐麒麟圖畫屬浮雲漢單于入朝上思肱股之美圖畫功臣於麒麟閣平章息女能爲婦息女見漢髙紀老杜送封主簿詩序余與主簿平章鄭氏女子垂欲納采書至女子巳許他族􅂬喜兒曹解綴文漢劉韻賛綴文之士憂楽同科唯石友見上别離空復数朝曛韓詩吾徒幸無事庻以窮朝曛百花洲雞題文正公集中有荅王源叔憶百花洲見􅀉云芳洲名冠古南都又献百花洲圗上陳州晏相公云穣下勝游少此洲聊入詩百花争窈窕一水漣漪鄧州南陽郡東漢爲南都也范公種竹水边亭漂泊来遊一客星老杜上漢中王云西漢親王子成都老客星老杜以自喻山谷亦用此意客星本出嚴光傳神理不應從此尽百年草樹至今青用老杜齊魯靑未了之意竹下把酒竹下傾春酒愁隂爲我開不知臨水語更得幾回来砌䑓晚思目極江南千里春誰今洒筆可招魂宋玉有招魂一篇向人猶作故時面翠竹蒼煙一萬根此卷先有衛南詩落句云唯有鳴鴟古祠栢對人猶是向時倩與此同意晉劉惔傳惔字真長禇裒謂孫悼曰真長生平何嘗相比数而卿今日作此面向人􅁘山谷外集詩注卷十二
