  text: 山谷外集詩註卷第十一
  hash: sha256:6a972a3b76b28450817345183364ee31a65e56b372a51da3ea95eb4d17533c34
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_011-1a}
body:
  text: 徐孺子祠堂喬木幽人三畒宅寰宇記洪州南昌縣徐孺子宅在州東北三里孺子羙梅福之德於福宅東立宅芻一束向誰論後漢徐穉傳郭林宗有母憂穉徃弔之置生芻一束於廬前而去藤蘿得意干雲日後漢丁鴻傳干雲蔽日之木起於葱青蕭皷何心進酒樽白屋可能無孺子文選樂府云周公下白屋吐哺不及餐黄堂不是欠陳蕃本傳陳蕃爲大守不接賔客唯穉來特設一榻後漢郭丹傳以丹事編署黄堂以爲後法注黄堂大守㕔事古人冷淡今人􅀏湖水年年到舊痕杜詩江流復舊痕送徐隱父宰餘干餘干􅀠饒州地方百里諸侯國飜手氷霜覆手炎漢陸賈謂尉佗曰越殺王降漢如反覆手耳老杜詩飜手作雲覆手雨贅壻得牛庭少訟舊唐書張允濟傳大業中爲武陽令元武縣鄰接人有以牸牛依其婦家者八九年牛孳生十餘頭及將異居婦家不與累政不能决其人詣武陽質於允濟允濟令左右縳牛主以衫蒙其頭將至村中云捕盗牛賊召村中牛悉集問所從來妻家不知其故指其所訴牛曰此女婿家牛也非我所知允濟發􅂪曰此即女婿以牛歸之妻家叩頭伏罪長官齋馬吏爭廉舊唐書馮元淑傳則天時歴浚儀始平二縣令未嘗以妻子之官所乗馬午後不蒭云令其作齋身及奴僕日一食而已邑中丞􅁺隂桃李案上文書略米鹽米塩見上治狀要湏聞豈弟此行端爲霽威嚴漢魏相傳爲霽威嚴天上麒麟來下瑞南史徐陵傳陵年數􅀊釋寳誌摩其頂曰天上石麒麟也韓詩黄至行生祥下瑞無時期江南橘柚間生賢玉臺書在猶騷雅玉臺新詠徐陵所編也孺子亭荒只草煙見上半丗功名􅀄墨綬後漢志千石六百石墨綬同兄文字敵靑錢同兄疑舛誤唐張薦傳祖鷟字文成貟半千稱鷟文詞猶靑銅錢萬選萬中時号靑錢學士割雞不合庖丁手割雞焉用牛刀也家傳風流更著鞭著鞭見上家傳言其家丗也詩中皆用徐姓事答德甫弟鳥啼花發獨愁思楊太真傳明皇云鳥啼花落水緑山青憐子三章怨慕詩孟子曰怨慕也鴻鴈􅀟飛彈射下脊令同病急難時詩常棣鹡鴒在原兄弟急難功名所在猶爭死意􅂔相湏尚不移文選輕死重􅂔結黨連群意氣相湏當是相傾大白扶風豪上歌意氣相傾山可移何况極天無以報詩欲報之德昊天罔極林囬投璧􅀒嬰兒見上元注云時以父事兄弟俱在縲紲何造誠作浩然堂陳義甚髙然頗喜度丗飛曻之􅀃築屋飯方士願乗六氣遊天地間故作浩然詞二章贈之公欲輕身上紫霞黄庭經上清紫霞虚皇尊瓊糜玉饌厭豪奢瓊糜見上呉都賦珠服玉饌百年丗路同朝菌莊子朝菌不知晦朔九鑰天関守夜义夜义守門見上霜檜左紉空白鹿寰宇記譙縣太淸宫有檜樹鹿跡存焉范文正公太淸宫九詠序左紉檜其一也石蔓卿詩引太清記云老子手植此檜根株枝幹皆左紉金鑪同契漫丹砂魏伯陽撰參同契其書論丹砂秘訣要令心地閑如水萬物浮沉共我家心地見上萬物浮沉共我家淸明心水徧河沙傳灯録張拙頌云光明寂照徧河沙凡聖含靈共我家無鈎狂象聽人語佛遺教經汝等當好制心心之可畏甚於毒虵􅁖獸怨賊太火越逸未足喻也譬如狂象無鈎猨猴得樹騰躍踔躑難可禁制當急挫之無令放逸縱此心者䘮人善事露地白牛㸔月斜見第二卷注小雨呼兒蓻桃李踈簾幃客轉琵琶塵塵三昧開門户不用丹田飬素霞華嚴經有刹刹塵塵第十㑹祖庭事苑三昧者三之曰正昧之曰定亦云正受謂正定不亂能受諸法黄庭經廻紫抱黄入丹田詩意勸以釋氏三昧勿學道家修飬之法題前定録贈李伯牗五賊追奔十二宮維摩經云樂離五欲樂觀五隂如怨賊五隂即心經五藴皆空也色受想行識是爲五隂東坡詩君知五藴都是賊十二宮即十二辰也白頭寒士黒頭公􅀳王珣與謝玄俱爲􅁊温所重温曰王􅁺當作黒頭公明朝一飯先書籍前定録韓􅀳公滉在中書嘗召一吏不時至將撻之吏曰某不幸兼属隂司主三品以上食料公曰􅀂然吾明日當何食吏請䟽於帋明旦旣對適太官進餻麋上以半賜公食之羙又賜焉退而腹脹進橘皮湯夜㗖漿水粥及旦視其書皆如其說因問以人間所食皆有籍􅁘對曰然三品以上日支五品旬支六品至九品季支庶人􅀊支安用研桑作老翁班固賔戯研桑心計許見第四卷注萬般盡􅀍􅄦神戯看取人間傀儡棚樂府雜録傀儡起漢平城之圍陳平訪知閼氏妬忌造木偶運機関舞墠間閼氏望見謂是生人慮下城冐頓必納之遂退軍後飜爲戯舊唐書樂志云又有窟儡子等戯煩惱自無安脚處從他鼓笛弄浮生傳灯録梁寳誌丁讃云衆生身同大虚煩惱何處安脚駐輿遣人㝷訪後山陳德方家江雨濛濛作小寒雪飄五老髮毛斑五老峯見上城中咫尺雲横棧獨立前山望後山池口風雨留三日􅀌城三日風吹雨小市人家只菜􅂼水逺山長􅀟屬玉上林賦鴻鷫鵠鴇鴐鵝屬玉注云屬玉似鴨而大長頸赤目身閑心苦一舂鋤爾雅鷺舂鋤翁從旁􅃕來収網漢髙紀髙祖適從旁舎來我適臨淵不羡魚薫仲舒策臨渊羡魚不如退而結網俛仰之間巳陳迹王逸少蘭亭禊飲序向之所斦俛仰之間以爲陳迹莫䆫歸了讀殘書首句盖用杜詩小市常爭米􅀌城早閉門楊州戯題巳見前集思親汝州作此詩與第一卷還家呈伯氏同意巳注其􅀊月􅀊晚寒侵遊子衣遊子身上衣見上抅留幕府报官移呈伯氏詩云強移手板汝陽城更責愆期􅀍訶詬此事獨見於此兩詩五更歸夣三百里一日思親十二時復齋謾録云唐朱晝詩曰一别一千日一日十二憶苦心無閑時今日見玉色乃知山谷五更歸夣三百里一日思親十二時之句􅂑此車上􅄍茵元不逐漢丙吉傳吉為丞相馭吏嗜酒數歩蕩嘗從吉出醉􅄍丞相車上西曺主吏白欲斥之吉曰以醉飽失之去士使此人將復何所容西曺第忍之此不過汙丞相車茵耳遂不去也時冨韓公以前宰相判汝州詩意謂丞相􅀄不以此爲罪而或讒之三人成虎耳市中有虎竟成疑見第一卷注秋毫得失関何事揔爲平安書到遟次韵戯荅彦和元注云彦和年四十弃官杜門不出本不因循老鏡春江湖歸去作閑人天於万物定貧我莊子大宗師篇子桑曰吾思夫使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈貧我哉智効一官全爲親莊子逍遥篇云知効一官行比一郷後漢毛義家貧以孝行稱張奉慕其名徃候之坐定而府檄適至以義守令義奉檄喜動顔色奉心賎之辭去及義母死去官行服數辟公府公車徴不至奉乃歎曰賢者固不可測徃日之喜乃爲親屈也布袋形骸増碨磊傳灯録明州奉化縣布袋和尚形裁腲脮蹙額皤腹腲烏罪反脮奴罪反錦嚢詩句愧淸新李賀小傳毎旦日出常􅀙小奚奴􅀐距虚背古錦囊遇有所得投囊中暮歸足成詩杜門絶俗无行跡相憶猶當遣化身維摩詰經云維摩詰不起于座居衆㑹前化作菩薩时化菩薩昇于上方到衆香界礼彼佛足願得丗尊所食之余施作佛事彼諸大士見化菩薩歎未曾有即以問佛佛告之曰下方有丗界名娑婆佛号釋迦牟尼有菩薩名維摩詰爲諸菩薩説法故遣化來釋氏有法身化身报身衝雪􅀫新寨忽忽不楽縣北縣􅀯何日了又來新寨觧征鞍山衘斗柄三星沒雪共月明千里寒小吏有時須束帶用渊明應束帶見督郵事巳見上注故人頗問不休官唐僧靈徹詩相逢盡道休官去林下何曾見一人見集古録江􅀯長盡稍雲竹歸及春風斬釣竽刪去詩中有新寨餞南歸客詩乃葉縣尉时作郭明甫作西齋于潁尾請于賦詩食貧自以官爲業詩三􅀊食貧聞説西齋意凛然万卷藏書冝子弟十年種木長風煙史記貨殖傳十􅀊樹之以木未嘗終日不思潁歐陽公有思頴􅀉常処士詩想見先生多好賢安得雍容一樽酒杜詩何时一樽酒重与細論文女郎臺下水如天寰宇記頴州治汝隂縣女郎䑓在縣西北一里古老云昔胡之女嫁魯昭侯爲夫人築䑓以賔之故俗謂之女郎䑓東京望重兩并州郭丹郭伋皆為并州牧後漢書有傳遂有汾陽整綴旒唐郭子儀封汾陽郡王賛曰唐祚若贅斿而能輔太子􅂯造王室翁伯入関傾意氣唐郭觧傳解姊曰以翁伯时人殺吾子賊不得師古曰翁伯解字也傳又云觧入関関中賢豪聞声爭交驩林宗異丗想風流郭泰字林宗事見後漢書君家旧事皆靑史今日髙才未白頭莫􅀝西齋好風月長隨三逕古人遊􅂆之仕也三逕見上汝頴鄰州此亦葉縣尉时作睡起彷拂江南一夢中虚堂尽日轉温風月令孟夏之月温風始至春風稍斍裌衣重潘岳秋㒷賦藉莞蒻御祫衣注祫衣无絮也杜詩地一􅀄衣裌昼永不知樽酒空孔融云樽中酒不空戯詠江南十風十月江南未得霜髙林殘水下寒塘飯香獵户分熊白酒熟漁家擘蟹黄橘摘金苞隨驛使文選笙賦披黄苞以授柑荆州記陸凱与范曄詩折花逢驛使禾㫪玉粒送官倉洪範惟辟玉食杜牧之阿房宫賦釘頭磷磷多於在􅁃之粟粒踏歌夜結田神社踏歌近代曲也張􅀃劉禹錫皆有踏歌行續仙傳藍采和常醉踏歌云踏踏歌藍采和退之詩麥苗含穟桑生椹且向田頭樂社神遊女多隨陌上郎劉夢得詩盪舟遊女滿中央採菱不顧馬上郎和荅孫不愚見贈詩比淮􅀯似小山文選有劉安招隱士一首注云淮南小山之所作也稱大山小山猶詩有大雅小雅酒名麴米岀雲安杜詩聞道雲安麹米春纔傾一盞便醺人且憑詩酒勤春事莫愛児郎作好官劉知幾史通云師人有兒􅀰之稱簿領侵㝷漢郊祀志侵㝷於㤗山矣台相筆台相當謂冨韓公風埃蓬勃使星鞍文選呉都賦歊霧漨浡漨音蓬浡音勃潘安仁笙賦鬱蓬勃以氣岀此謂困於將迎使星見後漢李郃傳小臣才力堪爲􅁺敢學前人便掛冠此數語必有爲次韻裴仲謀同年交蓋春風汝水邊客牀相對卧僧氊舞陽去葉纔百里裴官于潁昌之舞陽山谷尉汝州葉縣賤子與公皆少年山谷時年二十四白髮齊生如有種青山好去坐無錢唐符戴乞買山錢於于頔見雲溪友議煙沙篁竹江南岸輸與鸕鶿取自眠次韻􅀉滑州舅氏舫齋聞有小溪山便是壷公謫處天後漢費長房傳長房爲市􅁺市有老翁賣藥縣一壷市罷跳入壷中市人莫見唯長房見之因徃􅄪拜翁與俱入壷中唯見玉堂嚴麗旨酒甘肴􅄹衍其中翁後曰我神仙之人以過見責事畢當去子能相隨乎想聽􅃈䆫􅀷夜雨景福殿賦靑􅃈銀鋪注云靑􅃈䆫也以青畫爲􅃈文似看葉水上江船瞻想白馬津亭路退之讀東方朔雜事詩瞻相北斗柄兩手自相挼滑州治白馬縣有􅀺陽津亦曰白馬津酈食其云守白馬之津是也寂寞雙鳬古縣前明帝時王喬爲葉令毎月望乘􅀟入朝今有墓在汝州葉縣汝滑皆頴京西北路舅氏知甥最踈􅂴杜詩舊諳踈􅂴叔湏汝故相携折腰塵土解哀憐時方作尉故用淵明五斗米折腰事病起次韻和稚川進叔倡酬之什池塘夜雨聽明蛙老境侵尋見上毎憶家白髮生來驚客鬢黄􅆝炊熟又春華黄粱見第一卷下注百年不􅀒膠投􅃮後漢陳重雷義同郡爲友郷里爲之語曰膠􅃮自謂堅不如雷與陳萬事相依葛與􅀲見上勝日見䘙玠傳主人如有酒猶堪扶病見鸎花盧仝詩鸎花爛熳君不來稚川約晚過進叔次前韻贈稚川并呈進叔人􅀐一馬鈍如蛙行向城東小隱家文選王康琚詩小隠隱陵藪大隱隱朝市道上風埃迷皂白皂白見第一卷下堂前氷竹湛清華文選謝叔源詩水木湛清華我歸河曲定寒食公到江南應削􅀲禮記爲天子削􅀲者副之樽酒光隂俱可惜端湏連夜發園花明朝遊後苑火急報春知花湏連夜􅀤莫待暁風吹武后語也見唐人小􅀃首句盖用􅀳祖傳幽兾之士鈍如椎和答登封王晦之登樓見􅀉縣樓三十六峯寒見第四卷注王粲登臨獨􅀝欄文選有王仲宣登樓賦清坐一畨春雨歇相思千里夕陽殘詩來嗟我不同醉别後喜君能自寛列子第一篇善乎能自寛者也杜詩老去悲秋喜自寛舉目盡妨人作樂􅀳向秀傳欲注莊周書嵇康曰此書詎復湏注正是妨人作楽耳幾時歸得釣鯢􅁊莊子應帝王篇鯢􅁊之審爲淵止水之審爲渊流水之審爲淵淵有九名此處三焉音義云鯢􅁊二魚名又云鯢鯨也􅁊盤也審處也伯氏到濟南􅀉詩頗言太守居有湖山之勝同韻和西來黄犬傳佳句知是陸機思陸雲陸機傳機寓京師乆無家問有犬名黄耳乃爲書繫其頸犬􅀯走至其家得報還洛歴下樓臺追把酒済南府治歴城韓信襲破齊歴下軍即此舅家賔客厭論文老杜贈太白云重與細論文山椒欲雨好雲氣湖靣逆風生水紋謝叔源詩悲猿響山椒想得爭棊飛鳥上行人不見只聽聞同丗弼韻作􅀉伯氏在濟􅀯兼呈六舅祠部山光掃黛水挼藍樂天樂府憶江􅀯云春來江水緑如藍聞􅀃樽前愜􅀏談伯氏淸修如舅氏濟􅀯蕭灑似江南屡陪風月乾吟筆北史隋文令李德林作詔復鄭譯爵髙熲戯謂譯曰筆乾不解笙篁醉舞衫只恐使君乘傳去拾遺今日是前衘漢髙紀云乘傳􅍗洛陽樂天詩十年不改舊官衘唐陳子昻杜甫皆左拾遺豈比之二子􅁘丗弼恵詩求舜泉􅂺欲以長安酥共泛一盃次韻戲答舜泉河北酒名當是北京教授時作寒韲薄飯留佳客杜詩一飯未曾留俗客蠧簡殘編作近鄰簡編見上避地梁鴻真好學後漢逸民梁鴻作五噫之歌粛宗聞而非之乃易其名居斉魯之間著書楊子未全貧楊子謂楊雄杜詩園収芋栗未全貧玉酥錬得三危露見上石火燒成一片春樂天詩石火光中􅀉此身沙鼎探湯供夘飲探湯見論語樂天詩午茶能破睡夘酒善消􅁨不􅁨問字絶無人見楊雄傳伯父祖善耆老好學於所居紫陽溪後小馬鞍山爲放隠齋逺􅀉詩句意欲庭堅和之幸師友同賦率尓上呈樵入千岩靜松􅍭萬􅄜寒兒童給行李藜篠對衣冠莊子徐無􅀑篇逃空者藜藋拄乎之徑藋徒弔反藋蓧同音小檻聊防虎時來即觧鞍阿翁吹笛罷懷昔淚相㸔倉後酒正㕔昔唐林夫謫官所作十一月己夘余納秋租隔墻芙蓉盛開攀檻朱雲頭未白朱雲請上方斬馬剱斬張禹上大怒御史將雲下獄雲攀殿㩜折見本傳不知流落向何州空餘前日學書地小閣紅蕖取意秋元注云林夫喜作􅀠字自咸平至太康鞍馬間得十小詩􅀉懷晏叔原并問王稚川行李鵝兒黄似酒對酒変新鵝此他日醉時與叔原所詠因以爲韻咸平大康二邑皆􅀠開封府詩入雞林市唐白居易傳最工詩時人爭傳雞林行賈售其囯相率篇易一金書邀道士鵝羲之傳山隂道士好飬鵝羲之固求市之道士云爲冩道德經當舉鵝相贈羲之欣然冩畢籠鵝而歸雲間晏公子風月興如何晋陸雲傳雲間陸士龍荀隠曰日下筍鳴鶴春風馬上夢樽酒故人持猶作狂時語鄰家乞侍兒元注云稚川醉時在傍知狀侍兒婢也見􅀽盎傳憶同嵇阮軰醉卧酒家牀今日壚边客􅀄無人姓黄王戎傳甞經黄公酒壚下顧謂後車客曰吾昔與嵇叔夜阮嗣宗酣暢於此今日視之雖近邈􅀂山河阮藉傳婦有羙色當壚沽酒籍嘗􅀻婦飲醉便卧其側對酒誠獨難論詩良不易人生如草木臭味要相似並見上春色挾曙來惱人似官酒酬春無好語懷我文章友紅梅定自開有酒無人對歸時應好在常恐風雨晦定自好在並見上東􅀯萬里江緑凈一盃酒王孫江􅀯去更得消息否退之詩水容與天色此処皆緑淨又云瞰臨􅄅空闊緑浄不可唾獻􅀏果不情莊子大宗師篇造􅃴不及􅀏獻􅀏不及排唐魚朝恩傳釋菜執易􅂛坐言鼎有覆餗象以侵􅌠相王縉怒元載怡然朝恩曰怒者常情􅀏者不可惻也貌親􅀄不愛礼記情踈而貌親在小人則穿窬之盗也與誰言百年交投分一傾蓋投分傾蓋並上注四十垂垂老山谷生於慶暦五年乙酉至元豐七年甲子盖四十矣時自太和移監德平鎮集中有代其母􅀕陳氏女云我徂江􅀯三年揺摇元豐甲子汝兄還朝可見是􅀊過汴京故在咸平太康之間作此詩文章豈更新鼻端如可斵猶擬為揮斤莊子徐無􅄦篇郢人堊漫其鼻端􅀂蠅翼使匠石斵之匠石揮斤成風聽而斵之盡堊而鼻不傷郢人立不失容土氣昏風日人􅅝極鴈鵝衆口極鵝鴈見上㝷河著斫繩墨詩思略無多次韻蓋郎中率郭郎中休官二首仕路風波􅀟白髮閑曹􅀏傲兩詩流故人相見自青眼見阮籍傳新貴即今多黑頭黒頭見此卷注杜詩舊交新貴音書絶熈豐多擢用新進少年桃葉栁花明暁市荻牙蒲笋上春洲定知聞徤休官去楽天詩放慵長飽睡聞徤且聞行文云林園亦要聞閑置筯力應湏及徤囬酒户家園得自由元注云郭文時御道中野服過親黨飲頗爲分䑓御史所訶故有此句杜詩送客逢花可自由退之詩我云以病歸此巳頗自由唐人以酒量為酒户楽天詩户大嫌甜酒丗態巳更千変盡心源不受一塵侵一作險阻艱難親得力是非􅁨患飽經心四十二章經断欲去爱識自心源逹佛深理青春白日無公亊紫鷰黄鸝俱好音杜詩隔葉黄鸝空好音付與兒孫知伏臘聽教魚烏逐飛沉黄公壚下曽知味前篇巳注定是逃禅入少林杜詩醉中徃徃爱逃禅傳燈録菩提逹磨届于洛陽寓止嵩山少林寺面壁而坐和張沙河招飲張侯耕稼不逢年史記侫幸傳諺曰力田不如逢年善仕不如遇合過午未炊児女煎退之詩有時未朝飱得米日巳晏隔墻聞誰呼衆口極鵝鴈腹裏雖􅄹五車讀杜詩男児湏讀五車書囊中能有幾錢穿後漢趙壹傳爲詩曰文籍雖滿腹不如一囊錢杜詩囊空恐羞􅧣留得一錢㸔况聞緼素尚黄葛可怕雪花鋪白氊大白北風行云燕山雪花大如席老杜詩糝徑揚花鋪白氊誰料丹徒布衣得丹徒布衣見上今朝忽有酒如川左昭十二穆子曰有酒如淮齊侯曰有酒如澠閠月訪同年李夷伯子真於河上子真以詩謝次其韻十年不見猶如此自治平丁未同唱第至熈寕乙夘十年矣山谷時在北京故􅁛河上未斍斯人歎滯留司馬談六家指要云大史公留滯周􅀯白璧明珠多按剱見墨竹賦注濁涇清渭要同流杜詩濁涇清渭何當分日晴花色自􅀷淺風軟烏聲相應酬唐杜荀鶴詩風暖烏聲碎談􅀏一樽非俗物對公無地可言愁􅀳王戎與阮籍為竹林之遊戎嘗後至籍曰俗物復來敗人意乞猫秋來䑕軰欺猫死退之詩立召賊曹與五伯盡取䑕軰尸諸市窺甕翻盤攪夜眠聞道貍奴將数子傳燈録第十卷僧曰狸奴白牯為什麽却有知􅀯史何承天云鳯凰將九子此摘其字買魚穿柳娉衘蟬衘蟬用俗語也後山詩話云乞猫詩雖滑稽而可喜千􅀊之下讀者如新書扇魯公筆法屋漏雨未减右軍錐畫沙可惜團團新月面故教零亂黒雲遮法書苑云顔魯公與懐素斈草書於鄔兵曹或問曰張長史見公孫大娘舞劒得􅊠昻囬翔之狀兵曹有之乎懷素以古􅁫脚為對魯公曰何如屋漏痕懐素曰老賊得之矣如印印泥錐畫沙見墨竹賦注次韻郭右曹閱丗行將老斵輪潘安仁歎逝賦川閱水以成川水滔滔而日度丗閱人而爲丗人冉冉而行暮莊子行年七十而老斵輪詳見第一卷下注那能不朽見仍雲見墨竹賦注􅀊中日月又除盡聖處工夫無半分退之感春詩惜哉此子巧言語不到聖處寜非癡秋水寒沙魚得計見上􅀯山濃霧豹成文見上古心自有著鞭地退之詩孟生江海士古貌又古心着鞭見祖逖傳尺璧分隂未當勤文子曰聖人不貴尺璧而重寸隂淮南子曰禹之趍時掛冠不顧故曰不貴尺璧而重寸隂次韻元日㑹朝四海登圖籍東都賦春王三朝㑹同漢京是日也天子受四海之圖籍絳闕清都想盛容列子周穆王篇王實以淸都紫微帝之所居春色巳知囬寸草孟郊詩誰言寸草心報得三春輝霜威從此霽寒松霽威見上飲如嚼蠟􅀄忘味楞嚴經云於横陳時味如嚼蠟事與浮雲去絶蹤選詩雨絶無還雲又云風流雲散一别如雨李善曰鸚鵡賦云何今以􅀨絶陳琳檄吴將校曰雨絶于天諸人同有此言未詳其始四十九年蘧伯玉聖人門户見重重莊子則陽篇蘧伯玉行年六十而六十化未嘗不始於是之而卒詘之以爲非也未知今之所謂是之非五十九非也和荅李子真讀陶􅁃詩楽易陶彭澤陶潜淵明爲彭澤令憂思􅁃義城􅁃信子山封義城公風流掃地盡唐祝欽明授太子經帝與群臣宴欽明自言能八風舞帝大􅀏盧藏用歎曰是舉五經掃地矣杜詩豪傑誰人在文章掃地無太白詩春光掃地盡碧葉成黄􅅺本出漢魏豹等賛上古遺烈掃地盡矣詩句識餘情徃者不可作檀弓云趙文子曰死者如可作也吾誰與歸前賢畏後生杜詩􅁃信文章老更成凌雲健筆意縱横今人嗤􅀧流傳賦不斍前賢畏後生君言得意處此意少人明次韻答栁通叟求田問舎之詩少曰心期轉謬悠心期見上莊子末篇以謬悠之􅀃荒唐之言蛾眉見妬且障羞離騷經衆女嫉余之娥眉兮謡諑謂余以善滛􅀯史劉穆之曽孫祥齊建元中為正貟郎司徒禇彦回入朝以腰扇障日祥從側曰作如此㪯止羞見人靣扇障何益玉臺新詠云㪯扇且障羞但令有婦如康子列女傳魯黔婁先生之妻先生死曽子徃弔之曰何以為謚其妻曰以康為謚曽子曰先生食不充口衣不盖躰何楽於此而謚為康乎妻曰昔君嘗欲以為囯相辝而不為是有餘貴也君嘗賜之粟三十鍾辝而不受是有餘冨也甘天下之淡味安天下之卑位求仁而得仁求義而得義其謚為康不亦冝乎曽子曰唯安用生兒似仲謀吴志孫􅁠字仲謀曹公歎曰生子當如孫仲謀劉景􅂛兒子􅀂㹠大耳横笛牛羊歸晩徑杜詩牛羊歸徑險鳥雀聚枝深卷簾􅀲芋熟西疇蜀都賦云􅀲疇芋區歸去來詞云將有事於西疇功名可致猶囬首何况功名不可求催公靜碾茶雪裏過門多􅁖客元注不飲者爲􅁖客出元次山集中有絶句云有時逢􅁖客注非酒徒即爲􅁖客春隂只惱有情人睡魔正仰茶料理徽之傳卿在府日乆比當相料理急遣溪童碾玉塵幽恠録橘中四老人云君輸我玉塵九斛楽天詩新茶碾玉塵同前韻戯公静偶逢携酒便與飲竟别我爲何䓁人退之歸彭城詩遇酒即酩酊君知我爲誰兎月龍團不當惜長卿消渴肺生塵司馬相如傳常有消渴病盧仝詩渴心歸去生塵埃和謝公定河朔謾成八首急雨長風溢两河欣然河伯順風歌行觀東海方寸少不以黄流更自多注見弟一卷下直渠殺势煩才吏分殺水力穿直渠皆見漢溝洫志機器爬沙聚水兵機器謂鐡龍􅀲濬川杷也見第一卷下同尭民遊靈源廟詩注爬沙字見退之月蝕詩爬沙脚手鈍誰使汝解縁青􅁳河面常從天上落金堤千里護都城溝洫志云史酸􅀥護金堤直令􅀯粤還歸帝漢􅀯越王趙佗傳妄􅀼帝聊以自娯改号不敢為帝矣誰謂匈奴不敢王願見推財多卜式未湏筭賦似桑羊卜式傳時洪方亊匈奴式上書願輸家財半助边上以語丞相洪洪曰此非人情不􅁤之臣乃罷式歳餘㑹渾􅁘等降縣官費衆倉府空式復持錢三十万与河􅀯太守食貨志以東郭咸陽孔僅領塩鐡而桑弘羊貴幸弘羊賈人之子以心計三人言利亊析秋毫矣萊公廟畧傳􅂄傳韓令風流在井疆安用鳴鼛増漢壘不妨羅拜不諸羗此皆河朔亊宼萊公力請真宗幸澶州克敵􅂄旧談之未巳韓忠献公相州安陽人熈寕八年殁於相州此盖八年以後作時教授北京也井疆言其井邑疆畔所在書殊厥井疆漢時水占十万頃官寺民居皆濁河溝洫志成帝時河決於舘陶及東郡凢􅈅四郡三十二縣水居也十五万餘頃深者三丈壞敗官庭民居四万所又按孝元帝紀敗壞官寺民室注凢府庭所在皆謂之寺豈必九渠亡故道直縁穿鑿用功多溝洫志是􅀊河水湓溢敗官庭民舎四万許啇以為可决平原金隄開通大河至海五百餘里又乾三郡水地得羙田且二十餘万頃許啇又云古􅀃九河之名自鬲以北至徒駭相去二百餘今河雖数徙不離此域膚庭数遣林牙使羗種來窺鴈塞耕壯士看天思上策月邊鳴笛為誰横林牙契丹翰林斈士也見实録江鄰幾雜志云兾州城􅀯有張耳墓在送客亭北戎使林牙者由翰林斈士出使問知州王仲平不知張耳何代人大使􅁘律防謝曰契丹家翰林斈士名目而巳蛛蒙黄􅀞屏􅀄暗塵澁金門鎻不開六十餘年望琱輦赭􅂁曽是映宫槐此言澶渊行宫也自景德元年歳甲辰与北虜通好息兵至熈寕元年戊申盖六十五年百里棄疆王自直熈寕七年九月契丹遣使來言代北對境有侵地帝以手詔問故老韓冨文等皆言不可与王荆公􅄪入相曰將欲取之必固予之以筆畫地圖至八年九月分畫地界弃地五百餘里此詩盖婉其詞也万金􅂢費物皆春當謂歳幣湏令牧馬甘踰幕更遣彎弓不射人漢匈奴傳云匈奴益北絶幕又云匈奴逺遁􅀯无王庭詩意謂令北虜絶幕北去不復近塞而引弓之民不相射也杜詩云射人莫射馬此反其意武陵武陵樵客出桃源自許重遊不作難白詩廻山轉海不作難傾情倒意无所惜却覔洞門煙鎻断歸舟風月夜深寒詳見渊明集中桃花源記上巳注其略過平輿懐李子先時枉并州平輿􅀠蔡州嘉祐四年升并州為太原府前日幽人佐吏曹我行堤草認青􅂁􅁃信哀江􅀯賦云青􅂁如草白馬如練杜詩汀草乱青􅂁心隨汝水春波動㒷与并門夜月髙丗上豈无千里馬人中難得九方臯列子􅀃符篇秦穆公謂伯楽曰子之年長矣子姓有可使求馬者乎對曰臣之子皆下材可告以良馬不可告以天下之馬也臣有所与共檐纆薪菜者有九方皐請見之公使求馬三月而反報曰巳得之矣牝而黄使人取之壯而驪公謂伯楽曰敗矣子之所使求馬者色物牝壯尚不能知又何馬之能知也伯楽曰臯之所􅀚天機也云云酒船魚網帰來是花落故溪􅀷一篙謝暁純送衲韈剗草曽􅂛馬祖堂傳燈録江西一禅師姓馬氏六祖能和尚謂曰向後佛法從汝边去馬駒蹋殺天下人厥後江􅀯法嗣布於天下時号馬祖又丹霞禅師投􅀯岳石頭和尚石頭告衆來日剗佛殿前草至日各備鍬钁剗草獨師以盆盛水水浄頭於和尚前胡跪石頭􅀏為剃髮暖䆫接􅂰話還郷贈行百衲兠羅韈楞􅃊經云我今示汝兠羅綿手摘此二字處處相隨入道􅂣避暑李氏園二首李侯别舘鎻春隂花徑吹香可細㝷杜詩花徑不首縁客掃迸笋侵堦藤倒架盧仝詩攅迸溢林薮主人重為費千金荷氣竹風冝永日冰壷凉簟不能囬題詩未有驚人句㑹喚謫仙􅂫二來主立之詩話曰山谷嘗避暑城西李氏園題两詩其一云題詩未有驚人句喚取謫仙􅂫二來秦少游言於東坡曰以先生為􅂫二大似相薄少章為予言戯題大年防禦蘆鴈揮毫不作小池塘蘆荻江村落鴈行雖有珠簾藏翡翠不忘煙雨􅇁鴛鴦詩話又云宗室大年名令穣喜微行而善􅀞小景山谷詩云雖有珠簾籠翡翠不忘煙􅀨􅇁鴛鴦盖有所譏也大白詩玉楼巢翡翠金殿鎻鴛鴦平原宴坐二首平原郡德州也山谷元豐七年在大和移監德州德平鎮此詩題下注公擇二字詩意殊不相渉盖本注於後篇謝送宣城筆而後人誤寘於此今去之詳見後注老作儒生不解事文選楊德祖牋脩家子雲老不解亊強著一書唐婁師德傳云解亊僕射江􅀯有田歸荷鋤北䆫風來㪯書葉猶自􅂆人勤讀書謂風吹葉子􅁽如􅂆人讀書也黄落委庭􅀚九州虫聲日夜戒衣裘謂促織金錢滿地无人費謂黄落一斛明珠薏苡秋以薏苡比明珠盖馬援傳帝方薏苡实大援欲以為種軍還載一車譛之者以為所載皆明珠文犀次韻舎弟題牛氏園春与園林共晚人將蜂蝶俱來樽前鳥歌花舞歸路星翻漢囬明月清風良霄㑹同星河易翻􅂬娱不終此廣記所載􅀑詩也􅂫黄皆喜為人書之字本出文選鮑明逺舞鶴賦云星翻漢囬暁月將落春事欲了鸎催主人雖貧燕來玉燭傳盃未厭尓雅囬氣和謂之玉燭此借使其字杜傳盃不放盃金吾静夜驚囬本或作晝夜或作尽夜今定爲静夜唐十六衛有左右金吾衛盖循漢執金吾之名掌京城廵警杜詩醉歸應犯夜可怕李金吾謝送宣城筆山谷草書此詩又跋云李公擇左宣城令諸葛生作雞距法題云草玄筆以􅀉孫莘老宣城変樣蹲雞距諸葛名家捋䑕􅂡一束喜從公處得千金求買市中无漫投墨客摹科斗勝与朱門飽蠧魚愧我􅀄非草玄手不將閑寫吏文書王彦祖恵其祖黄州制草書其後脫略㸔時軰詣君等􅀤蒙董狐常直筆左宣元孔子曰董狐古之良史也書法不􅀮修汲黯少居中黯傳黯数切諌不得乆留内􅀽盎傳盎以直諌不得乆居中鵩入遷臣舎賈􅁩有鵩鳥賦烏號厭丗弓封禅書有烏號弓云云平生有嘉樹猶起九原風檀弓趙文子与叔譽􅀚乎九原云云􅀉懷公夀山谷甞有跋云余與宗室越宫有葭莩故􅇮时與宣州院公壽景珍嘗共文酒之楽好賦梁王在日边司馬相如傳以此言爲郎㑹景帝不好辝賦是时梁孝王來朝從游􅀃之士邹陽枚乘之徒相如見而􅀃之因病免客游梁重簾􅃨幕鎻神仙退之詩黄簾緑幕朱户閉莫因病酒踈桃李且把春愁付管絃愚智相懸三十里見第四卷注榮枯同有百余年文選曹子建詩積善令余慶榮枯立可湏及身強健及健見上且行楽漢陽惲傳人生行楽耳湏冨貴何时一􅀏端湏直万錢太白玉盤玲羞直万錢以金沙酴醿送公壽天遺酴醾玉作花紫綿揉色染金沙憑君着意樽前㸔便与春工立等差退之李花詩縞裙練恱无等差金沙見上沈立海棠記云唯紫帛者謂之海棠余乃棠棃花耳此摘其字同刘景文逰郭氏西園因留􅀫人居塵丗虚華舘秋入園林著晩花落日臨池見科斗必知清夜有鳴蛙元符三年七月山谷自戎州至靑神省其姑有和青神士人蒲志同字㤗亨詩其序云伏承㤗亨仙軰和示東坡之友刘景文同不肖􅀫城西郭氏園七言小詩且推不肖當與嶺南數公同時鵬蹇鳯舉非所擬倫􅂺用元韻上答并叙東坡伯仲方來之意其詩云我巳人間無所用􅁂飄霜雪眼生花東坡兄弟来雖晚折箭堪除蝕月蛙東坡海上無消息想見鶩帆出浪花三十年來丗三変幾人能不化鶉蛙玉座天開旋北斗清班鳥散落餘花有人難立百官上不爲廟中羔莵蛙㘽竹飬松人去尽空聞道士種桃花昨來一夜驚風雨滿地残紅噪莫蛙又謝㤗亨送酒云風掃三峩山外雨霜催五桞宅边花非君送酒添秋睡可耐東池到暁蛙此詩真本尚存而遺文不載因附見於此城西郭園不知何處案前集有次韻刘景文登鄴王䑓見思五首云何時郭池晚照影冩閑情時正在德平也按徽宗實録元符三年九月上謂輔臣韓忠彦曰章悙求去朕不欲以定䇿貶悙秪縁護哲宗靈駕不聀累有弹章悙於是遂出故和章云有人難立百官上不爲廟中羔莵蛙霍光傳霍山曰丞相擅减宗廟羔莵蛙可以此罪也言章丞相之罪不独如此耳張仲謀家堂前酴醾委地沉水衣籠白玉笛急就章注云篝一名笿亦以爲薫籠玉笛用種玉事不􅂪湔沸苦無聊煩君斫􅂑西莊栁扶起春風十萬條贈陳元輿詞部武城園木鎻中秋乆得汀州刺史遊招喚丁寕方邂逅誰言天網漏吞舟實録元祐二年八月祠部郎中陳軒爲主客郎中元輿軒字也武城王廟即考試院陳祠部與山谷試幃中同事前集亦有戯荅陳元與詩云平生所聞陳汀州此詩亦同時作漢酷吏傳叙号爲網漏吞舟之魚曹子建牋設天網以該之頓八紘以掩之和陳君儀讀太真外傳五首朝廷無事君臣樂花柳多情殿閣春栁公權聮句薫風自南來殿閣生微凉不􅁴胡雛心暗動一作付與山河買忠義綺羅飜作墜楼人外傳云􅀄禄山於上前應對􅄂以諧謔而妃嘗在坐禄山心動及聞焉嵬之死数日歎惋晋石崇傳崇有妓緑珠孫秀求之不與秀勸趙王倫誅崇介士到門緑珠自􅄬於楼下而死扶風喬木夏隂合斜谷鈴聲秋夜􅀷外傳云上至斜谷霖雨渉旬棧道雨中聞鈴聲因採之爲雨霖鈴曲考之史及諸書明皇自陳倉入散開出河池􅀄不由斜谷今梓橦有上亭驛古今詩刻皆以爲明皇聞鈴之地當不妄也人到愁來無處㑹不関情處揔傷心大白詩何許最関情梁州一曲當時事當時事一作開元夢按開元傳信記凉州獻新曲曰凉州寕王聞之以爲恐有播越之禍楽府詩集凉州歌序亦􅁛凉州曲云云􅀄無區别記得曾拈玉笛吹外傳云妃子􅀼寕玉笛吹故張祐詩云小花静院无人見閑把寕王玉笛吹端正楼空春昼永小桃猶學淡燕支華淸宫有端正樓貴妃梳洗之所髙䴡條脫琱紅玉條脫釧也髙䴡所貴真誥蕚緑華降羊􅁠家遺以金條脫一邏逤琵琶橪緑􅁝一作一双條脫玻瓈玉三尺琵琶緑蠒􅁝妃子琵琶邏逤檀也寺人白秀真使蜀還献木􅃳如玉光可鍳有金縷紅文蹙成双鳯絃乃末訶弥羅囯所貢緑水蚕􅁝也蛛網屋煤昏故物昏故物一作脂澤歇此生唯有夢來時上皇曾御昭儀傳鏡裏觀形只眼前上賢漢成帝内傳見飛燕身輕欲不勝風帝爲製七寳避風上曰爾則任吹多少妃曰霓裳一曲可掩千古杜詩聽􅀃開元亊分明在目前退之詩聽􅀃兩京亊分明皆眼前飬得禄兒傾四海禄山恩遇最􅀷上及貴妃皆呼以爲兒千秋更有一伶玄趙飛燕外傳漢江東都尉伶玄所撰也玄自叙云伶玄字子于歴刺史州郡爲淮􅀯相哀帝時老休買妾樊通德有才色知書能言飛燕姊弟亊通德曰斯人俱􅁅㓕矣當時疲精力馳􅕽蠱惑寕知終歸荒田野草乎通德顧視燭影以手擁䯻悽然泣下於是撰趙后列傳詩意謂以古為鉴㒷壞在目前而明皇不知戒為可歎也山谷外集詩注卷十一
