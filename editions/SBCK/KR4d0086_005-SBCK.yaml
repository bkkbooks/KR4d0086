  text: 山谷外集詩註卷第五
  hash: sha256:c01f1e276ef2b57d5584ff51a8fcd92c6bf68bf3e950ae948381bcfc82afa42b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_005-1a}
body:
  text: 答王道濟寺丞觀許道寕山水圗徃逢醉許在長安郭若虚圖􅀞見聞録云許道寕河間人學李成山水筆墨簡快峯峦峭拔自成一家蠻溪大硯磨松煙山谷有帖云嘉州峨眉縣中正寨之蛮溪出研石青緑宻緻而冝筆墨忽呼絹素翻硯水杜詩詔謂將軍拂絹素乆不下筆或經年異時踏門闖白首退之詩闖然入其户又聮句云儒門雖大啓姦首不敢闖注馬出門貌巾冠欹斜更索酒杜詩指􅀧銀瓶索酒嘗舉盃意氣欲翻盆倒卧虚樽將八九張籍詩酒盡卧空瓶醉眠枯筆墨淋浪杜詩戯拈秃筆掃驊騮勢􅀂山崩不停手數尺江山萬里遥南史竟陵王傳其孫賁字文煥善􅀞於扇上圗山水咫尺之内便斍萬里爲遥杜詩咫尺應湏論萬里滿堂風物冷䔥蕭杜詩滿堂動色嗟神妙退之詩䔥蕭風景寒山僧歸寺童子後杜詩貌得山僧及童子漁伯欲渡行人招莊子漁父篇孔子鼓琴奏曲未半有漁父下船而來曲終而招子貢此反而用之先君􅀏指溪上宅盧鷀白鷺如相識許生􅄪拜謝不能項籍傳陳嬰謝不能元是天機非筆力老杜山水障􅁔云刘侯天機精爱􅀞入骨髓自言年少眼明時手揮八幅錦江􅁝贈行卷送張京兆京兆不知謂誰而言錦江􅁝疑是乖崖盖比之張敞云心知李成是我師圗昼見聞録云李成字咸熈家營丘志尚冲寂􅀶渉經史尤善昼山水寒林開寳中都下貴人王公貴戚争馳書延請成多不答子斍職踐館閣贈光禄丞張公身逐銘旌去流落不知今主誰大梁􅀞肆閱水墨我君槃礴忘揖客槃礴見下注蛛􅁝煤尾意昏昏集中有答郭英發書云蛛􅁝所謂蠨蛸在戸者煤尾屋塵屋塵合墨醫方謂之烏龍尾杜詩頭白昏昏足醉眠幾年風動人家壁雨雪涔涔滿寺庭老杜秦州􅄂詩涔涔塞雨繁四圗冷落譲丹青􅀏詶肆翁十萬錢卷付􅀐奴見上市盡傾司馬相如傳一坐盡傾王丞來􅀚皆失席指􅀧如見􅀄􅀞日四時風物入句圗楊大年談苑云李昉以司空致仕畜五禽皆以客爲名各爲詩一章􅀞爲圗傳於好事者句圗盖此􅀋也信知君家有摩詰王維字摩詰唐書有傳我持此圗二十年眼見緑髮皆華㒹緑髮見上後漢崖駰傳駰作逹旨云唐且華㒹以悟秦甘羅童牙而報趙許生縮手入黄泉衆史弄筆摩青天莊子田子方傳宋元君將􅀞圗衆史皆至受揖而立䑛筆和墨有一史後至者儃儃然不趍受揖不立因之舎公使人視之則解衣槃礴臝君曰可矣是真昼者也君家枯松岀老翟圗昼見聞録云翟院深北海人斈李成山水但自創意者格下臨摹者奪真風煙枯枝􅀝崩石蠧穿風物君爱惜不誣方將有人識言此昼雖蠧而他日有識之者按文選謝靈運擬鄴中詩其序言建安末在鄴宮䆒􅌚愉之極古无此娛何者楚襄王有宋玉唐景梁孝王有邹枚􅃊馬其主不文漢武時徐楽諸才備應對之能而雄猜多忌豈􅀗晤言之適不誣方將庶必賢扵今日耳靈運之意謂他日人必以今日之楽爲賢扵昔人不誣之義如嵇叔夜飬生論云一漑之益不可誣也五臣注詞不逹故爲箋云過家自此以下皆吉州大和所作有􅀉李公擇詩序云元豊庚申得邑大和庚申元豊三年也泊舟大􅀌山詩自注云庚申十二月則到官當是四年春絡緯声轉急炙轂子􅄂録云莎雞古今注一名促織一名絡緯一名蟋蟀促織謂其声鳴如急織也絡緯謂其鳴如紡績織緯也田車寒不運兒時手種栁上与雲雨近舎傍舊傭保司馬相如傳与庸保􅄂作少換老欲尽宰木鬰倉倉公羊春秋秦伯謂蹇叔曰􅀂尓之年者宰上之木拱矣田園変畦畛周礼遂人溝上有畛招延屈父黨劳問走婚親歸來飜作客唐刘長卿詩旧業今巳无還郷反爲客顧影良自哂一生苹託水刘伶酒德頌俯􅀚万物擾擾焉如江海之載浮萍萬事雪侵􅁂夜䦨風隕霜隕霜見上乾葉落成陣燈花何故喜杜詩燈花何大喜酒渌正相親大是報書信親年當喜惧見語兒齒欲毀齓周礼未齓者不爲奴注毀齒也男八歳女七歳􅀄覲反繫船三百里去夢無一寸當是謁告獨歸不及將母分寕至大和水道三百里也上冢自公返蓬蓽詩自公退食礼記篳門圭竇蓬户甕牖稅駕上丘壟李斯傳吾未知所稅駕也霜露此日悲􅀕義曰霜露旣降君子履之必有悽愴之心松楸十年拱退之詩深思罷官去畢命依松楸飬雛數毛羽􅀄不及承奉康州断腸猿風枝割永痛山谷父庻字亜夫甞攝康州丗􅀃新語􅁊公至三峽有得猿子者其母縁號遂跳上船即絶破視其腹腸寸寸断李白贈武諤云余爱子伯禽在魯許爲冐胡兵致之其詩云爱子隔東魯空悲断腸猿少年不如人左僖三十年燭之武曰臣之壯也猶不如人今老矣無能爲也巳登仕無前勇髪踈齒牙揺韓文而髪蒼蒼而齒牙動摇鯨波怒號洶願爲保家子左昭二年非保家之主也敢議丗輕重􅁛觴太夫人魚菜贍庖供岑彭傳大長秋以朔望問太夫人起居退之詩呼奴具盤飡飣餖魚菜贍明叔知縣和示過家上冡二篇復次韻敝邑荷佳政文選曹子建書在彼自有佳政耕桑及時運渊明有時運詩令君平生􅂬逺別喜親近漢邹陽傳而求親近於左右吾友徐光禄死􅀾萬事盡徐禧熈寕五年與沈括等建議城永樂城北􅀐圍之禧及李舜舉李稷闔城俱没不見東陵侯唯見􅀲連畛文選阮嗣宗詩昔聞東陵􅀲近在青門外連畛距阡陌子母相鉤帯東陵事見上且當置是事椎牛㑹賔親百年共如此破涕作嘲哂文選刘越石詩序云破涕爲􅀏枯荷野塘水照影驚顔􅁂功名黃梁炊成敗白蟻陣吕公邯郸道上炊黄糧事巳見上第一卷餞楽道詩注此事與南柯事相􅀋皆出異聞集大槩言淳于棼夢入槐安國其王妻以女使爲南柯大守十年有檀蘿囯來伐王命棼征之敗績及覺見蟻穴云山谷多以此二事爲一事事雖不同其義一也南柯事詳見卷末注又按古今五行記後魏顕宗時有黒蟻與赤蟻􅀾赤蟻断頭而死東魏孝靖時鄴下有黃蟻與黒蟻闘黄盡死少時無老境身到乃盡信曲礼六十曰􅂄指使音義曰􅂄至也至老境也渊明詩嘗聞長者言掩耳不願听奈何五十年忽巳親此事盖用此意此來見抱子詩云亦旣抱子别日多未齓夜䦨如夢寐寒燭泣餘寸杜詩夜䦨更秉燭相對如夢寐女蘿上杉松尓雅唐蒙女蘿女蘿兔􅁝詩蔦與女蘿施于松栢文選古詩與君爲新婚菟絲附女蘿注引詩傳云女蘿松蘿也草木䟽曰今松蘿蔓松而生菟絲蔓聮草上與松蘿殊異野葛蔓畦壟詩葛生􅂪楚蘝蔓于野蛛􅁝網祠屋芝菌生畫拱去囯二十年雪涕夙􅃊奉更歴飽艱難左僖二十八楚子曰晋侯在外十九年矣而果得晋囯險阻艱難備嘗之矣抑搔知蛘痛内則問衣燠寒疾痛痒痾而敬抑搔之聞道下士􅀏老子云下士聞道大􅀏之轉物大人勇楞􅃊經一切衆生從無始來迷巳爲物失於本心爲物所轉若能轉物即同如來平生隨風波歸來夢猶洶持此寸草心孟郊詩誰言寸草心報得三春暉􅀒荷九鼎重史記平原君傳使趙重於九鼎大吕柔嘉無牛羊保身以爲供詩柔嘉維則又云旣明且哲以保其身供謂供飬其母也漢班倢伃傳求供飬大后長信宫退之作歐陽詹哀辝云以志爲飬􅀆何有牛羊又按晋周顗母絡秀傅嘗置酒舉觴賜三子曰吾本渡江託足無所不謂尓等並貴列吾目前嵩起曰恐不如尊㫖伯仁志大而才短非自全之道嵩性抗直不容於丗唯阿奴碌禄當在母目下耳保身蓋用此事次韻叔父聖謨詠鸎迁谷鴉舅頗強䀨莊子天下篇強䀨而不舎者也陸􅀛􅂪挑菜詩云行歇毎依鴉舅影挑頻時見䑕姑心按牡丹一名䑕姑用之去心以􅀋推之則鴉舅亦當是一種草木之名山谷特借鴉舅字以名鴉耳僕姑嘗勃磎歐公詩云病識隂晴似勃姑又云天􅀨止鳩呼婦還鳴且喜勃姑僕姑皆鳩也米元章畫史又􅁛勃鳩莊子曰室無空虚則婦姑勃磎黄鳥懷好音詩黄鳥于飛注搏􅁰也陸機䟽云黄鳥黄􅕢留也或謂之黄栗留幽州人謂之黄鸎一名倉庚一名啇庚一名黧黄一名楚雀齊人謂之􅅮􅁰匪風云懷之好音秋菊染春衣西漢雜記黄鵠下太液池上爲􅁔曰黄鵠飛兮下建章金爲衣兮菊爲裳嚶嚶求朋友詩伐木丁丁鳥鳴嚶嚶又曰嚶其鳴矣求其友聲􅁨患同一枝莊子逍遥篇鷦鷯巢於􅀷林不過一枝提壷要酤我杜宇賦式微梅聖俞四禽言子規云不如歸去春山云暮提壷云提壷蘆沽羙酒子規一名杜䳌蜀王本紀杜宇爲望帝亡去化爲此鳥伐木云有酒湑我無酒沽我衛囯風式微式微胡不歸黄鳥在幽谷見上韜光飬羽儀易曰鴻漸于飛其羽可用爲儀晴風曜桃李退之􅀉盧仝詩云偶逢明月曜桃李言語自知時先生丘中隠喬木見雄雌引子迁緑隂相戒防禍機文選鮑明逺苦􅀬行生軀蹈死地昌志登禍機李善注引莊子曰其發􅀂機括司馬彪曰禍敗之來􅀂機栝之發班固漢書述曰禍如發機李杜死刀鋸後漢李固杜喬皆爲梁兾所害死獄中李膺杜宻死於黨錮時人亦􅁛李杜焉陳張怨棄遺前漢張耳陳餘相與爲刎頸交後有􅂩餘相趙漢遣耳與韓信破趙斬餘詩將安將樂汝轉棄予不如听黄鳥永晝客爭棋􅀃清水岩呈郭明叔并序清水岩號爲天下勝處去縣庭才二十里一山空洞如覆青玉盎也寒泉在其間甚壯急至岩口伏流入石鼻中岩下有石鍾鼔磬其聲清越不敞衮衮跑跑能警動人丗間金革聲不足道也岩前平􅄛略可坐千人不審旌斾嘗因公事一游否山海經河水其源渾渾泡泡注云水濆湧之聲交泡两音嘗聞清水岩空洞極明好虎狼僲部曲仙傳拾遺郭文字文舉隠餘杭天柱山虎常馴􅅰於左右亦可撫而牽之文出山虎必随焉梚首隨行如羊犬耳晋書有傳事亦略同李廣傳行無部曲行陳鍾鼔天擊考唐囯風子有鍾鼔弗鼔弗考注考擊也釋文鼔本或作擊雲生卧龍石水入煉丹竈有意携􅃹弦山祇應洒掃䨇鳬謂郭令也事見上詩豈弟君子來游來􅁔老杜雨過􅂫端云諸家憶所歴一飯跡便掃次韻章禹直開元寺觀􅀞壁兼簡李德素丹素古藏壁風雨飽侵食拂塵開藻鍳老杜云持衡留藻鍳志士淚霑臆老杜云人生有情淚沾臆靈山逺飛來不可以智測臨安靈隠山有飛來峯晏元献輿地志云晋咸和元年西天僧慧理曰此是中天竺囯靈鷲山之小嶺不知何年飛來龍神湛囬向楞􅃊經有十囬向擁衛立剱㦸依稀呉生手旌斾略可識老杜云畫手㸔前軰呉生逺擅塲又曰冕旒俱秀發旌斾尽飛楊又云依稀橘奴跡鴻濛揷楼殿老杜靈湫作云東山氣􅂪鴻宮殿近上頭又嶽麓山道林二寺行云殿脚揷入赤沙湖毫髪数動植周礼大司徒其動物冝毛物其植物冝皁物廣牀瞻二聖有衆拱萬億詩云萬億及秭飛行湊六合莊子六合之内聖人論而不議六合之外聖人存而不論􅄃取着一席人人開生面老杜丹青引凌雲功臣少顔色將軍下筆開生面絶妙推心得丗􅀃曹娥碑題云絶妙好辝李侯天機淺荘子大宗師篇其嗜欲深者其天機淺指􅀧目所及杜詩指􅀧虚無是征路三生石上夢甘澤謡記圎澤事云圎澤􅁔曰三生石上旧精䰟賞月吟風不要論慙愧情人逺相訪此身雖異性長存天楽鳴我側大白登瓦官閣詩漫漫雨花落嘈嘈天楽鳴齒㝷前日事退之詩幽㝷事隨去晦明忽復易章生􅀯溟鵬莊子北溟有魚化而爲鳥其名爲鵬海運則將徙於􅀯溟也籠檻鎻六翮韓詩外傳鴻鵠一㪯千里所恃者六翮耳能同寂寞遊濁酒聊放適文選嵇叔夜書濁酒一盃弹琴一曲志願畢矣西風葉䔥䔥蟋蟀依墻壁月令季夏蟋蟀居壁家無萬金産退之詩指渠相賀言此是萬金産四鄰碪声急藜羮傲鼎食見上退之送恵師云囊无一金資飜謂冨者貧藍􅈁亦山立左宣十二篳路藍􅈁楽記㧾干而山立玉藻山立時行言雖貧而不動如山也並船有􅁔姝粉白眉黛黒淮􅀯子云粉白黛黒韓文云粉白黛緑期公開顔􅀏醉語雜翰墨不湏談俗事祇令人氣塞淳化帖王羲之書云而艱疾􅀂此令人短氣此言熈豊之政听崇德君鼔琴前集有姨母李夫人墨竹詩外集十一卷有􅀚崇德墨竹􅁔其序云姨母崇德君贈新墨竹圗且令作􅁔米元章畫史云朝議大夫王之才妻􅀯昌縣君李氏尚書公擇之妹能臨松竹木石等畫見本即爲之卒難辨月明江静寂寥中大家歛􅃑抚􅀌桐後漢列女傳扶風曹丗叔妻同郡班彪之女数召入宫令皇后諸貴人師事焉號曰大家禹貢嶧陽􅀌桐古人巳矣古楽在孟子云今楽猶古楽彷彿雅頌之遺風妙手不昜得杜詩􅀞師亦無数好手不可遇善听艮独難猶如􅄖曇華時一出丗間法華經云如是妙法諸佛如來時乃􅀃之如􅄖曇鉢花時一現耳䟽云􅄖曇鉢花名瑞應現則金輪王岀两忘琴意與巳意迺似不著十指弹孟郊妾薄命云不惜十指弦爲君千萬弹禅心黙默三渊静莊子應帝王篇鯢􅁊之審爲渊止水之審爲渊流水之審爲渊渊有九名此處三焉注云渊者静黙之謂耳幽谷清風淡相應􅁝声誰道不如竹晋孟嘉傳􅁝不如竹竹不如肉我巳忘言得真性罷琴窗外月沉江万􅄜俱空七絃定杜詩罷琴惆悵月照席次韻答楊子聞見贈金盤厭飫五侯鯖見上注玉壷澆潑郎官清囯史􅀘云酒則郢之冨水烏程之􅀂下滎陽之土窟春剱南之燒春京城之蝦蟇陵郎官清長安市上醉不起老杜云李白一㪷詩百篇長安市上酒家眠左右明粧奪目精退之李花詩云静濯明粧有所奉目精見上結交賢豪多杜陵班孟堅西都賦云郷曲豪舉遊俠之雄連交合衆馳騖乎其中若乃􅀚其四郊浮游近縣則南望杜覇北眺五陵英俊之域紱冕所興注云宣帝葬杜陵文帝葬覇陵挑李成蹊見上卧落英上林賦垂條扶䟽落英憣纚黄綬今爲白下令元注云大和縣古白下漢朱􅀶傳云刺史不察黄綬師古曰丞尉聀卑皆黄綬蒼顔只使故人驚督郵小吏皆趍版晋陶潜傳潜爲彭澤令素簡貴不私亊上官郡郵至邑吏白應束􅅁見之潜嘆曰吾不能爲五斗米折腰拳拳亊郷里小人解印去縣趍版謂執手版而趍手版見上退之詩勿慊法官未登朝猶勝赤縣長趍尹趍字盖取此義陽春白雪分吞聲江淹恨賦莫不飲恨而吞聲杜詩吞聲躑躅涕淚零楊君青雲貴公子刘伶酒德頌云貴介公子歎嗟簿領困書生贈我新詩甚髙妙淚斑枯笛月边横述異記舜葬蒼梧之野二妃淚下沾竹文悉爲之斑文章不直一杯水大白云吟詩作賦北窗裏萬言不直一杯水老矣忍與時人爭江城􅁔舞聊得醉但願数有美酒傾莫要朱金􅆞􅅞我陸沉丗上貴無名楊子法言紆朱懷金之楽老子曰無名萬物之始又曰道常無名食笋十韻前集上子瞻書云聞燕坐東坡心醉六經又云比以聀事在山中食笋得小詩輙上􅀉一􅀏旁州士大夫和詩時有佳句要自不滿人意莫如公待我厚願爲落筆思得申紙疾讀如老杜所謂一洗萬古凡馬空者按坡集和篇乃將去黄州時作山谷至太和盖元豐四年春庚申歳七年甲子歳春移監德平鎮坡亦以七年春移汝州此詩當是六年作洛下斑竹笋花時壓鮭菜􅁃􅀰貧食鮭巳見上注杜詩云自愧無鮭菜空煩卸馬鞍鮭戸佳切韻曰魚名岀吴志一束酬千金掉頭不肯賣杜詩巢父掉頭不肯住我來白下聚此族冨庖􅌠退之闘雞詩義􅁏恥庖􅌠蠒栗戴地翻觳觫觸墻壞退之詠笋云見角牛羊没又云穣穰疑翻地天地之牛角蠒栗見記觳觫見孟􅋾􅋾入中厨詩尓羊來思其角濈濈如償食竹債楞􅃊經云身爲畜生酬其􅀫債詩意謂牛羊食竹及死爲笋爲人所食若償債然又用傳燈録死爲菌令人食之之意按第十五祖那提婆傳尊者旣得法後至毗羅囯有長者園樹生大耳如菌味甚羙惟長者與第二子羅㬋羅取而食之尽而復生餘皆不得見時尊者知其􅀫因長者問其故尊者曰汝家昔供飬一比丘然此比丘道眼未明以虚霑信施故報爲木菌惟汝與子得享甘􅉁和菌耳􅉁酢菜也菌耳即上注辛膳胹姜芥左宣二年使宰夫胹熊蹯烹鵝􅄂股掌炮鱉乱群介江􅀯别録云僧謙明好詩酒烈祖問其所求曰惟願鵝生四个腿鱉生两重裙陶岳五代史􅀘亦云詩韓奕云炰鱉鮮魚小児哇不羙孟子出而哇之注􅄍也䑕壌有餘嘬莊子䑕壌有餘􅂼孟蝇蚋蛄嘬之可貴生於少古來食共噫尚想髙將軍五溪無人采明皇􅄂録髙力士謫黔州山谷多薺而人不食力士作詩曰两京作斤賣五溪無人采夷夏雖有殊氣味都不改蕭巽葛敏修二斈子和予食笋詩次韻答之吴氏漫録云山谷􅀯還至􅀯葉竹軒令侍史誦詩板戒勿言姓名一絶句云不用山僧供帳迎丗間無此竹風凊獨拳一手支頥卧偷眼㸔雲生未生徐視姓名曰果吾斈子葛敏修也此篇言二妙各能詩果不誣北饌厭羊酪􅀯庖豐笋菜自北初落􅀯幾爲児所賣史記越丗家陶朱公中男殺人事莊生羞爲児子所賣習知價廉平史記吴起傳起廉平能得士心此摘其字百態事烹宰􅐭晞枯腊瘦􅁡漬真味壞就根煨茁羙茁出也見上豈念炮烙債史記周紀西伯請紂去炮烙之刑咀吞千畒餘退之􅀯食詩咀吞面汗騂史記貨殖傳渭川千畒竹胷次不蠆芥子虚賦其於胸次曽不蠆芥二妙各能詩才名動江介楚詞長江介之遺風魏都賦與江介之湫湄注云韓詩章句曰介界也詩論多佳句膾灸甘我嘬孟膾炙與羊􅀥孰羙言其詩膾炙人口也曲礼母嘬灸註嘬謂一㪯尽脔因君思飬竹萬􅄜听秋噫莊子齊物篇汝聞地􅄜而未聞天􅄜又云大塊噫氣其名爲風從此繕藩籬下令禁漁菜韭黄照春盤菰白媚秋菜本草菰根蔣草也江􅀯人呼為茭草圗經云又名茭白惟此蒼竹苗市上三時賣江􅀯家家竹剪伐誰主􅌠詩勿剪勿伐半以苦見踈不言甘昜壞表記君子之接如水小人之接如醴君子淡以成小人甘以壞莊子山木篇亦云云葛陂雕龍睡未索兒孫債後漢費長房傳長房辝歸翁与一竹杖曰􅀐此任所之則自至矣旣至可以杖投葛陂中也房乘扙湏􅁷來歸即以扙投陂顧視則龍也莊子千金之珠必在驪龍頷下子能得之必遭其睡也􅆩膽能分杯虎魄妙拾芥本草序例云礠石引針虎珀拾芥戎塩累􅆑􅆩膽分杯此物於食殽如客得儐介漎食貨志夫塩食肴之將思入帝鼎烹忍遭飢涎嘬􅂴林供翰墨碪杵風號噫每下歎枯株焚如落樵采􅂴林疑字誤詩意謂其始也思入大烹以享上帝之鼎其次為筆以供翰墨最下枯槁而為樵夫所采頗合箴規之意焚如見昜离卦每下愈况見莊子知北遊篇胡朝請見和復次韻人􅀏􅁃郎貧滿胸飯寒菜見上春盤食指動左宣上云子公之食指動曰他日我如此必嘗異味笋茁入市賣囬首万錢厨不羡廊廟􅌠晋何曽日食万錢文選李陵答蘇武書聞子之歸无尺士之封而親戚貪佞之􅀋悉為廊廟􅌠民生暫神竒見上胞雋伐性壊枚叔七發云皓齒蛾眉命曰伐性之斧甘脆肥醲命曰腐膓之薬盖取呂氏春秋靡曼皓齒命曰伐性之斧肥肉厚酒命曰爛膓之食雋永見上注謂肥􅁏胞當作肥又疑是庖字東方朔傳館陶公主胞人師古曰胞与庖同忍持芭蕉身見上多􅀒牛羊債楞􅃊經云以人食羊羊死爲人人死爲羊死死生生互來相取汝􅀒我命我還汝債籜龍不稱􅁈盧仝􅀉男抱孫詩云竹林吾㝡惜新笋好㸔守万籜包龍兒攅迸溢林薮又云籜龍正􅁛􅁈莫殺入汝口丁寕嘱託汝汝活籜龍否昜致等拾芥夏侯勝傳如俯拾地芥䔥䔥煙雨姿壯士持戈介駢頭沸鼎烹易貫魚以宫人寵注云貫魚謂五隂駢頭相次似貫魚也退之义魚詩駢首􅀋同條可口垂涎嘬莊子云其味相反而皆可於口杜道逢麴車口流涎霜叢􅀒後凋玉食香餘噫書惟辟玉食晋王濬玉食錦服續詩无全功列子天地无全功葑菲倘可采詩采葑采菲􅀉李次翁雨断山川明老杜詩楚天不断四時雨花深鳥烏楽見上枯骨不霑名列子曰死後餘名豈足􅃳枯骨古今同一壑漢楊惲傳古与今如一丘之壑注云言其同􅀋也惟有在丗時聊厚不為薄文選古詩斗酒聊相娱聊厚不為薄􅀯箕与北斗親友多離索􅀯箕北斗見一卷注記檀弓離羣而索居斯文如舊􅂬李侯極磊落頗似元魯山用心抚疲弱元德秀字紫芝為魯山令有德政天下髙其行不名謂之元魯山詳見唐書卓行傳前集有贈別李次翁四言詩其畧云􅀚物慈哀蒞民爱莊而此詩又比之元魯山此人當是作邑張方囬家本編四言詩於太和詩中此詩亦在太和作不以民為梯俯仰无所作胸中種妙斍圜斍經由彼妙斍性徧滿故根性塵性无壞无􅄂歳晚期必穫然膏夜讀書見聖冝有作書君陳未見聖若不克見聖文字􅀉我來官郵逺飛橐橐謂置筒也白楽天云与徽之唱和來去常以竹筒貯丗縁心巳死倘得万金薬万金良薬見灌夫傳題髙君正適軒至静在平氣至神惟順心道非貴与賤逹者古猶今見上功名屬廊廟間暇歸山林巳見廊廟等山林注畜魚􅀚群嬉籠鳥听好音詩晛晥黄鳥載好其音文選潘岳秋㒷賦曰池魚籠鳥有江湖山薮之思不如一丘壑隨願得飛沉前漎叙傳云漁釣於一壑則万物不奸其志栖遲於一丘則天下不昜其楽開門納日月選詩璇題納明月呼客解纓􅆪詩書抚塵迹􅁔舞送光隂妖􅈺傾囯􅀏上林賦妖治間都史記作妖治􅈺都陽城下蔡傾城傾囯見上􅁝竹感人深楽記曰物之感人无窮而人之好􅁖无節豁然開􅅐次風至獨披襟宋玉風賦楚襄王有風颯然而至者王乃披襟而當之曰快哉此風樊籠鎻形質物外有幽㝷退之詩幽㝷亊隨去孰能量近逺又云物外日月本不忙奉送周元翁鎻吉州司法厅赴礼部試按山谷跋尾元翁名壽江南江北木葉黄楚詞洞庭波兮木葉下五湖歸鷹天雨霜後漢隗􅅝傳范蠡乘扁舟於五湖杜詩青楓葉赤天雨霜繫船湓城秣髙馬湓城江州也言自此陸行文選馬賦旦刷幽燕晝秣荆越退之云膏吾車兮秣吾馬客丁結束女縫裳詩可以縫裳貢書登名徹未央退之復志賦豈不登名於一科􅀆曽不補其遺餘髙帝紀蕭何治未央宫不此長卿薄游梁司馬長卿病免客游梁見本傳梁即汴京也南山霧豹出文章見上去取公卿昜驅羊杜牧示阿冝云願汝出門去取官如驅羊與君􅀄無一日雅漎谷永傳永奏書謝王鳯曰永無一日之雅左古之介傾盖許子如班楊家語孔子之郯遭程子於塗傾盖而語邹陽傳語曰白頭如新傾盖如故班謂固楊謂雄也囚拘官曹少相見服鳥賦愚士繫俗僒􅀂囚拘忽忽嵗晚稼滌􅂣詩十月滌􅂣一盃僚友喜多在謝守不見空澄江澄江如練明橘柚謝朓元暉詩云餘霞散成綺澄江浄如練元暉爲宣城守南中榮橘柚亦元暉詩也萬峯相􅀝摩清蒼莫堂醺醺客􅀍酒漎髙祖􅀍酒夜徑宅中艶􅁔䀨醉燭生光前集听宋宗儒摘阮􅁔云促弦䀨醉驚客起两用此字按春明退朝録云大宗嘗謂侍臣曰後唐莊宗湛飲以鄭聲與胡部合奏謂之䀨帳自昏逹旦不息山谷盖取此意椎皷發船星斗白杜詩􅀒塩出井此溪女打鼔發船何郡􅀰明日各在天一方杜云我行山川異各在天一方寒鴉滿枝二橋宅樽前顧曲憶周􅀰吴志周瑜傳時年二十四吴中皆呼爲周􅀰從孫䇿攻皖城㧞之得橋公二女囯色䇿自納大橋瑜納小橋瑜少精意於音楽雖三爵之後其有闕誤瑜必知之知之必頋故時人謡曰曲有誤周􅀰頋寰宇記云橋公亭在舒州懷寕縣北隔皖水一里同安志有橋公亭記云聞之耆耋橋公之旧居也鱸魚斫膾蔗爲漿後漢左慈在曹操坐操曰今日髙㑹珍羞略備所欠吴松江鱸魚耳元放曰此可得也因求銅盤貯水以竹竿餌釣於盤中湏􅁷引出一鱸魚又餌釣沉之湏􅁷復引出皆長三尺餘操使目前鱠之周浹㑹者蔗漿見上恨君不留誰與嘗殿前春風君射䇿漢庭諸公必動色杜詩滿堂動色嗟神妙射䇿見上故人􅀂問黄􅀄平將作金華牧羊客大白詩金華牧羊迺是紫煙客葛洪神仙傳黄􅀄平年十五家使牧羊有道士將至金華山四十餘年其兄初起求得之問羊何在􅀄平言叱叱羊起於是白石皆起成羊数萬頭􅀉晁元忠十首囯工裁白璧考工記輪人曰可規可矩謂之囯工巧冶鑄干將王褒云巧冶鑄千將之璞吴越春秋云千將吴人也能爲剱作二枚一曰干將二曰莫􅁘莫耶干將之妻成爲萬乘器白日􅄍寒光漢邹陽傳云荆軻慕燕丹之義白虹貫日又云蟠木根柢而爲萬乘器其誰湔沸汝歳月海生桑神仙傳王逺字方平過蔡經家麻姑亦至麻姑自􅀃接待以來見東海三爲桑田蛛網連城玉史記藺相如傳趙得和氏璧秦頋以十五城請易璧苔生百錬剛文選刘越石詩何意百練剛化爲繞指柔子雲賦逐貧楊雄逐貧賦見本傳退之文送窮退之此文盖擬逐貧而筆力逺過之二作雖􅀋俳漢枚乘傳其孽子皐詼􅀏􅀋俳倡又云皐賦辝中自言爲賦不如相如又言爲賦迺俳見視如倡自悔􅀋倡也頗見壯士􅅐晁子行問津語使子路問津欲濟無山窮山窮事見左宣下著書蓬蒿底端有古人風古人風見上文選􅄂擬詩顧念張仲蔚蓬蒿滿中園注引三輔決録云張仲蔚隠身不仕明天官􅀶物所居蓬蒿没人沙擁大江水韓信傳龍且与信夾維水陳信乃夜令人為万餘囊盛沙以壅水上流引兵半度擊龍且陽不勝還走龍且追度水信使决壅囊水大至龍且軍大半不得度即急擊殺龍且泥封函谷閞隗􅅝傳􅅝將王元􅀃􅅝曰臣請以一丸泥為大王封凾谷閞此万丗一時也古來丗上雄􅌠木風雨寒見上魯儒守一經亦有澗谷槃漎韋賢傳遺子黄金滿籝不如一經賢號􅁛邹魯大儒詩考槃在澗何亊窮愁極江􅀯􅁃子山史記虞卿傳云虞郷非窮愁亦不能著書以自見於後丗云􅁃信字子山作哀江􅀯賦後周書具載其詞河清无人待見上蘭芳无人采退之琴操云蘭之猗猗􅀭揚其香不採而佩於蘭何傷山空露􅇛團詩零露􅇛兮􅇛作漙葛蔓石磊磊楚詞石磊磊葛蔓蔓丗有傾囯媒一􅀏珠百琲吴都賦金溢珠琲注金二十四兩為溢珠十貫為一琲傾囯見上徃時祢處士㒹倒孔北海見後漢祢衡傳楚宮細腰死長安眉半額馬援傳子廖上䟽長楽宫云傳曰吴王好剱客百姓多創瘢楚王好細腰宮中多餓死長安語曰城中好髙髻四方髙一尺城中好廣眉四方且半額城中好大䄂四方全匹帛斯言如戯有切亊实比來翰墨􅂣文選謝宣逺詩粲粲翰墨􅂣爛熳多此色文章本心術万古无轍迹老子善行章善行无轍迹吾嘗期斯人隠􅀂一敵囯漎劇孟傳大將軍得之􅀂一敵囯云後漎吴漎傳帝歎曰吴公􅏔強人意隠􅀂一敵囯矣北書來无期鴈不到梅嶺杜詩短日行梅嶺盖謂大􅁃嶺上梅也衡山有囬鴈峯子厚過衡山詩云正是峯前囬鴈時欲之双鯉魚之字誤遺我双鯉魚見上楓葉江路永平生中心願􅄶短不􅀗騁冨貴安可為吾亦有岑鼎韓非子云齊伐魯索讒鼎魯以其鴈徃齊人曰鴈也魯人曰真也齊人曰使楽正子春來吾將听子魯君請楽正子春子春曰胡不以其真徃君曰吾爱之答曰臣亦爱臣之信又按新序云齊攻魯求岑鼎魯載鼎徃齊不信而反之使人告魯君桞下恵以為是則請受之魯君請於下恵對曰君之欲以爲岑鼎也以免囯也臣亦有囯於此破臣之囯以免君之囯此臣所難也魯君乃以真岑鼎往桞下恵可謂守信矣信之於人重矣言不可以冨貴而易其素守也濟岱有佳人漢外戚北方有佳人絶丗而獨立肌膚􅀂氷雪莊子逍遥篇藐姑射之山有神人焉肌膚􅀂氷雪婥約􅀂處子我願從之遊􅀘我黥與刖莊子大宗師篇庸詎知夫造物之不息我黥而􅀘我刖了不解人嗔真成一癡絶見上櫟社定頽然聊用神吾拙神拙見上山公懷涇渭濬冲遭鍳賞山濤傳濤所奏甄拔人物各爲題目時􅁛山公啓事王戎傳戎有人倫鍳識常目山濤如渾金璞玉人皆欽其寳莫知名其器弟敦有髙名戎􅁖之後果逆乱其鍳賞􅀋如此濬冲戎字也代豈無若人吹嘘青雲上念君如済水抱清伏泉壌文選謝泉暉詩濁河􅁾凊済注引􅀾囯䇿張儀􅀃秦王曰清済濁河足以爲阻尚注曰済水入河並流数十里而􅀯截河又並流数里溢爲榮澤行潦酌尊彜吾猶恃源往大雅浻酌彼行潦書作㑹宗彛注宗庿彛樽蛾眉在蒿萊衛囯風云螓首蛾眉以羙人比君子也金玉千里音詩無金玉尓音遥思甑生塵後漢范丹傳丹字史雲閭里􅁔之曰甑中生塵范史雲釡中生魚范萊蕪汗漫􅀚古今沉􅁳驚人句楊子法言蜀莊沉􅁳老杜詩句不驚人死不休摹寫詠時禽無爲愁肝腎君子要刳心元稹作老杜墓誌云擺去拘束摹冩􅂆象退之贈崔立之云􅂆君韜飬待徴招不用彫琢愁肝腎莊子天地篇君子不可以不刳心焉臨川往長懷神交可心晤論語子罕篇子在川上曰逝者如斯夫不舎晝夜此段􅀃者不一獨景迂講義云江熈曰人非山立俛仰而過臨川興懷能不􅁣然山谷意恐或近此文章不經丗文選應休璉百一詩云文章不經囯筐篋無尺書風期􅀯山霧見上化䖝哦四時退之詩化䖝枯挶莖悲喜各有故吾獨無間然子規􅂆歸去子規云不如歸去苐二卷有次韻晁元忠十詩與此詩同是元豐己未作巳注其詳次韻周法曹游青原寺即周元翁市聲故在耳􅀃苑孔子謂弟子曰違山千里蟪蛄之聲猶在耳一原謝塵埃乳竇響鍾磬選詩􅀯鄰擊鍾磬翠峯麗昭囬詩倬彼雲漢昭囬于天俯㸔行磨蟻晋天文志日月實東行而天牽之以西没如蟻行磨石之上磨左旋而蟻右去車馬度城隈水猶曹溪味山自思公開傳燈録行思禅師傳􅁻州安城人聞曹溪法席乃徃􅂙礼問曰當作何所務即不落階級云云祖深器之師旣得法住吉州清源山净居寺有沙弥希迁問曰曹溪大師還識和尚否師曰汝今識吾否曰識又爭能識得師曰衆角雖多一麟足矣浮圗湧金碧浮圗塔也杜詩􅃳聚金碧氣文選陸機連珠曰金碧之岩必辱鳯舉之使廣廈構瓌材蝉蛻三百年史記屈原傳蝉蛻於􅁾濁至今猿鳥哀祖印平如水傳燈録􅀄祖逹磨傳師曰􅁏傳法印以契證心外付袈裟以定宗旨有句非險崖心花照十方圜斍經丗尊告普斍菩薩云心花發明照十方利􅀄不落梯堦不落階級見此篇注歩歩踏佛階梯見傳燈録法融禅師傳我行暝託􅀫夜雨滴華榱殘僧四五軰法筵歎塵埋石頭麒一角見上本傳云師付法石頭道價直九垓相如封禅書云上暢九垓庐陵米貴賤傳與後人猜本傳云僧問如何是佛法大意師曰庐陵米作麽價暁躋上方上上方見維摩經杜詩上方楼閣晚秋塍乱箕荄寒藤上老木龍蛇委筋骸記礼運元肌膚之㑹筋骸之束魯公大字石筆势欲崩摧德人􅇮來游頗有嘉客陪憶當擁旌旗千􅀐相排豗且復􅁔舞隨􅁝竹冩煩哇亊如飛鴻去名與􅀯斗偕松竹吟髙丘何時更能來顔真卿貶吉州司馬大字當是紀遊也囬首翠微合尓雅山未及上翠微于役王亊催詩君子于役又王亊靡盬猿鶴一日雅重來尚徘􅆦孔德璋北山移文云蕙帳空􅀆夜鶴怨山人去􅀆暁猿驚詩意謂猿鶴旣有一日之雅􅄪來尚可從容也一日之雅見漢書谷永傳答永新宗令􅀉石耳永新与太和皆􅁻州屬邑飢欲食首山薇史記伯夷傳義不食周粟隠於首陽山采薇而食之渴欲飲頴川水莊子譲王篇故許由娯於頴陽後漢逸民傳序云尭􅁛則天不屈頴陽之髙注云頴陽謂巢許陸士衡猛虎行渴不飲盗泉水热不息􅁖木隂太白詩有耳莫洗頴川水有口莫食首陽蕨嘉禾令尹清如氷文選白頭吟清如玉壷氷寰宇記永新縣西北有禾山􅀉我􅀯山石上耳筠籠動浮煙雨姿杜詩西蜀櫻桃也自紅野人相贈滿筠籠瀹湯磨沙光陸離莊子䟽瀹而心澡雪而精神上林賦牢落陸離爛漫逺迁竹萌粉餌相發揮尓雅笋竹萌礼記内則糗餌粉酏刘夢得楊桞枝詞云桃紅李白皆誇好湏得􅂷楊相發揮芥薑作辛和味冝礼記王制中囯夷蛮戎狄皆有安居和味冝服公庭退食飽下筯詩退食自公晋書無下筯処杞菊避席遺萍虀陸亀􅂪有􅂎菊賦韭萍虀見石崇傳借使孝經避席字鴈門天花不復憶代州鴈門郡五臺山有天花蕈沉乃桑鵝與猪雞桑鵝未詳東坡和陶詩云老豬生樹雞當是黄耳菌屬小人藜􅃵亦易足嘉􅂼遣餉荷眷􅀻吾聞石耳之生常在蒼崖之絶壁老杜桂君髙堂之絶壁此用其句律苔衣石􅃾風日炙苔衣石髮見上注捫蘿挽葛採萬仞文選謝靈運詩薜蘿􅀂在眼又云葛弱豈可捫仄足委骨􅉘虎宅莊子側足而墊之及黄泉佩刀買犢剱買牛漎龔遂傳民有帯持刀剱者使賣剱買牛賣刀買犢曰何爲帯牛佩犢作民父母今得聀漎趙廣漎傳盛制豪強小民得聀注云聀常也閔仲叔不以口腹累安邑後漎書太原閔仲叔丗􅁛節士客居安邑日買豬肝一片屠者或不肯與安邑令聞敕吏常給焉仲叔曰閔叔豈以口腹累安邑􅁘我其敢用鮭菜煩嘉禾鮭菜見上願公不復甘此鼎免使射利登嵯峨文選呉都賦冨中之䇇貨殖之選乗時射利財豐巨万司馬相如賦分工入曽宫之嵳峩喜知命弟自青原歸爲吏困米􅐭漎黄伯傳米塩靡宻􅀄􅀂煩碎注米塩言􅄂而且細曲肱夢靈泉諒非調鼎手正斍荷鋤便選詩王生和鼎實渊明詩帯月荷鋤歸在公雖勤苦詩夙夜在公歸喜叔山禅莊子德充符篇魯有兀者叔山無趾踵見仲尼知命山谷弟也足蹇故比之叔山去我忽数日草䖝傍牀煎詩十月蟋蟀入我牀下屋角鳥烏楽見上行輿響檐肩退之聮句刘熟檐肩頳包解分柿栗老杜北征詩粉黛亦解包兒女閙樽前白紵繞祖塔知命布衣也故􅁛白紵鮑照集有白紵􅁔沈約有四時白紵􅁔青原山思公塔詳見上注香携青原煙玄珠一百八莊子象罔得玄珠以言数珠也夜紉湘􅈁穿内則紉箴請􅀘綴紉女陳反湘當作緗按􅀃文緗帛淺黄色也髙林風落子老僧選霜堅杜詩葉裏松子僧前落䄂中岀新詩山水含碧鮮五言吾老矣佳句付惠連謝靈運詩山水含清暉恵連靈運弟也亊見􅀯史本傳􅀉張冝父建德之囯有佳人莊子山木篇市􅀯冝僚謂魯君曰􅀯越有邑名為建德之囯云云文選江文通􅄂擬詩云幸逰建德郷亦用此亊而池州有建德縣冝父乃此縣人􅁘明珠為佩玉為衣去囯三歳阻音徽詩思齊大姒嗣徽音箋徽羙也所種桃李民爱之􅀃苑簡子謂陽虎曰樹桃李者夏得休息秋得食焉樹蒺藜者夏不得休息秋得其刺焉射陽城边春爛熳楚州山陽縣本漢射陽縣地張冝父當是建德人而仕於山陽時巳解去桞暗斈宫鳥相喚追隨裘馬多少年老杜壯遊詩放蕩斉趙間裘馬頗清狂退之云從兹冨裘馬寕復茹蔾蕨肥馬輕裘本出論語獨忍長飢把書卷讀書萬卷不直錢一作筆有神杜詩讀書破萬卷下筆如有神漢灌夫傳夫曰平生毀程不識不直一錢此用其字太白詩吟詩作賦北牎裏萬言不直一杯水此用其意逐貧不去與忘年一作交親逐貧賦見上莊子忘年忘義􅀯史江揔傳輿張纉䓁爲忘年友虎豹文章􅀍禽􅅞易大人虎変其文炳也君子豹変其文蔚也何如逹生自娱楽莊子有逹生篇髙至言築亭於家圃以奉親㧾其􅀚覧之冨退之南山詩﨑嶇上軒昴始得􅀚覧冨命曰溪亭乞余賦詩余先君之弊庐望髙子所築不過十牛鳴耳釋氏書五里爲一牛鳴故余未嘗登臨而得麒処逸人生長在林泉更築亭皐名意在上林賦亭皐千里靡不􅀍築明月清風共一家傳燈録張拙頌云凡聖含靈共我家南史謝譓傳入吾室者但有淸風對吾飲者惟當明月全以山川爲眼界多心經无眼界无意識界鳥度雲行閱古今太白詩人行明鏡中鳥度屏風裏昜雲行雨施溪濵木末听竽􅄜杜詩万􅄜真笙竽本出髙唐賦纎條悲鳴聲似竽􅄜老夫平生行楽處只今許公分一􅂀東坡集中文与可畫竹記云余為徐州与可以書遺余曰近語士大夫吾墨竹一􅂀近在彭城可徃求之彫陂彫陂之水清且泚老杜云蛟之横岀清泚屈為印文三百里呼船載過七十餘褰裳乱流初不記鄭風子恵思我蹇裳渉溱彫亦作雕韻書云琢文也乘舟七十餘渡徒渉者不可復記竹輿嘔唖見上山徑凉僕姑呼婦聲相􅀝見上篁中見上猶道泥滑滑泥滑滑蜀中號雞頭鶻僕夫惨惨耕夫喜窮山為吏如漫郎漫郞唐元結自謂也見本傳安能為人作嚆矢莊子在宥篇知曽史之不為桀跖之嚆史也老僧迎謁喜我來吾以王亊篤行李鮑明逺詩手迹可傳心願尓篤行李知民虚实應縣官我寕信目不信耳霍光傳縣官非我家將軍不得至是如淳曰縣宮謂天子東平王宇傳縣官年少張晏曰不敢指斥成帝謂之縣官髙士傳孔子曰吾之信顔囬非獨今日所信者目目猶不可信僧言生長八十餘縣令未曽身到此幾復􅀉㯽榔且答詩􅂆予同種次韻􅀉之少來不食蟻丘漿莊子則陽篇孔子之楚舎於蟻丘之漿詞多不録老去得意􅃮園方見上鑑中巳失児時靣忍能乞與賔作􅀰傳燈録云認奴作􅀰此摘其字獨未知其意所指也元翁坐中見次元􅀉到和孔四飲王䕫玉家長韻因次韻率元翁同作􅀉湓城雨罷山澤明日長花桞困老杜春光􅂴困􅀝㣲風游􅁝上天衢老杜落花游􅁝白日静􅀚物得無悶易遯丗無悶酒德頌云俯􅀚萬物時從顧曲人周瑜傳曲有誤周􅀰顧以言周元翁笋饌酌春醖季子未識面想見眉目俊新詩如鳴絃快讀開鄙吝後漢黄憲傳時月之間不見黄生鄙吝之萌復存乎心銅官魯諸生事道三無愠語三巳無愠色比來工五字句法妙何遜梁記室兼水部􅀰何遜字仲言有詩集枯棊覆吴圗王逢云別後竹窗風雪夜一燈明㓕覆吴圖齊書曰能棊人琅邪王抗爲苐一品关郡禇思荘㑹稽夏赤松第二品宋文帝丗羊玄保戯因製局圗還於帝前覆之青簡玩秦烬後漢吴祐傳殺青簡以冩書葉暗黄鳥時見上風號報花信東皐雜録云江􅀯自初春至初夏有二十四風信梅花風最先㨂花風最後唐人詩曰棟花開後風光老梅子黄時雨意濃晏元献詩亦曰二十四畨花信風是也遥仰吟思􅀂江錦割向盡南史江淹傳夢一人自􅁛張景陽謂曰前以一疋錦相借今可見還探懷中得数尺與之此人大恚曰那得割截都尽頋見丘遲曰餘此数尺無所用以遺君自是淹文章躓矣應煩王公子又破黄封印宫酒以黄羅帕封之􅄪次孔四韻􅀉懷元翁兄弟并致問毅甫書帙蠧魚乾退之云豈殊蠧書䖝生死文字間爐香眠鴨困李義山云舞鸞鏡匣収殘黛睡鴨香爐換夕薫佳人來无期選詩佳人殊未來詩句且排悶杜詩排悶強裁詩遥知烏衣游刘夢得金陵五題云朱雀橋边野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入㝷常百姓家盖江左諸王多居烏衣巷建康圗經云在上元縣東􅀯四里㭟局具肴醖爭道嘲不恭漎吴王濞傳吴太子入見得侍皇太子飲􅀶呉太子素驕􅀶争道不巷鏖兵勞得俊漎霍去病傳合短兵鏖皐蘭下師古曰鏖謂苦擊而多殺也左傳云得雋曰克頗㝷文獻盟文獻見論語不落市井吝楊子云市井相与言則以財与利四月明朱夏􅀯風解人愠帝王丗紀曰舜弹五絃琴􅁔􅀯風曰􅀯風之薫兮可以解吾民之愠􅀆風前懷二陸家法窺抗遜晋陸機傳祖遜吴丞相父抗呉大司馬太康未与弟雲俱入洛范陽盧志於衆中問機曰陸遜陸抗於君近逺機曰如君於盧毓盧班志黙然身有三尺桐㸑下得餘烬焦尾琴見上端可張洞庭莊子黄帝張楽於洞庭之野家闊丗未信為我謝孔君㪯酒取快盡丗故安足存文選潘正叔詩丗故尚未夷青天飛鳥印退之聮句云沙􅂐印廻平盖言鳥跡印沙今言印青天山谷外集詩註卷之五
