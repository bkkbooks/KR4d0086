front:
  text: 山谷外集詩注卷之四
  hash: sha256:e7d4318445dc5c6e9ac58730b5e518dfcb30644ef602b95ea90540517276cb77
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_004-1a}
body:
  text: 送劉道純東坡與鮮于子駿簡云故人劉格字道純劉恕道原之親弟讀書強記辨博文詞粲然而立莭強鯁吏事亦健君實頗知之而餘人未識也欲告子駿與一差遣收置門下敢保稱職也旦夕歸南康軍待闕軾非私之為時惜才耳五松山下古銅官大白逰五松山詩自注云山在南陵銅井西五里按南陵縣今為銅陵縣隸池州在唐亦嘗為銅官縣邑居褊小水府寬文選四都賦名都對郭邑居相承杜詩吳吞水府寬民安蒲魚少嚚訟周禮聀方氏兖州其利蒲魚簿領未減一丘槃文選劉公幹雜詩云沉迷薄領書李善曰簿領謂文簿而記録之道純是銅陵簿胸中峥嶸書萬卷簸弄日月江湖間退之詩婆娑海水南簸弄明月珠稠人廣衆自神王灌夫傳云稠人廣衆薦寵後輩莊子飬生主篇神雖王不善也丗説新語司馬太傳多名士一時雋異庾文康云見子蒿在其中常自神王按剱之眼白相看按剱相眄白眼視之並見上老身風波諳丗味退之詩吾老丗味薄如食橘柚知甘酸麒麟圗畫偶然耳漢書甘露三年單于始入朝上思股肱之美圗畫其人於麒麟閣後漢劉昆傳帝問前在江陵反風滅火後守弘農虎北渡河何以致之昆對曰偶然耳半枕百年夢邯鄲見第一卷餞薛樂道詩注平生樽爼宮亭上宫亭湖屬江州及南康軍荆州記曰宫亭湖即彭蠡澤涉丗忘味皆朱顔此時阿翁尚無恙何翁謂劉渙凝之也廬山記云凝之筠州人天聖八年擢進士第居官有直氣不屑輒棄去卜居落星渚常乘黃犢往來廬山中追琢秀句酬江山堂堂今為蟬蛻去史記屈原傳蟬蛻於穢濁五老偃蹇無往還寰宇記五老峯在江州德化縣懸崖突出如五人相對大梁城中笏柱頰大梁城汴京也笏柱頰用王徽之顧西山言爽氣事頷髭今成雪點斑退之云若摘頷底髭青雲何必出公右漢田叔傳上召見與語漢廷臣無能出其右者亨衢在天無由攀椎鼓轉船如病已杜詩打鼓發船何郡郎夢想樓臺落星灣寰宇記落星石在江州廬山東周廽一百五步髙文許圗經云昔有星墜水化為石當彭蠡灣中故云落星灣子政諸兒喜文史阿稱亦聞有筆端子政謂劉恕道原也外集第五卷有過致政屯田劉公隱廬山詩亦云憶昔子政在為翁數解顔元祐八年改葬道原山谷志之曰𥘉凝之忿丗不容棄官老於廬山至道原而莭愈髙又自以源出歆向務追配前人則子政云者比道原於劉向也其志又云生三男羲仲和叔稱才器皆過人和叔以文鳴而稱篤行不幸相繼死韓詩外傳君子避三端避文士之筆端丹徒布衣未可量南史劉穆之傳謂所親曰貧賤常思冨貴冨貴必踐危機今日思為丹徒布衣不可得也此亦用劉家事詩書且對藜藿盤穴中生涯識隂雨木末牖户知風寒見上我今四壁戀微祿知公未能長挂冠後漢逢萌傳王莽殺其子萌即解冠挂東城門歸將家浮海次韻子瞻春菜按實録熙寧十年二月軾知徐州又按頴濵集詩序云熙寧十年二月始會于澶淵相從赴彭城山谷時在北京始通書并二詩書云竊食於魏會閣下開幕府在彭門魏即北京彭門徐州也按東坡集次韻魯直見贈古風二首乃在春菜之後蓋未通問時先和此詩也北方春𬞞嚼氷雪北方地寒春𥘉猶食淹菜及寒𦵔妍暖思采南山蕨詩陟彼南山言采其蕨韭苗水餅姑置之南史何尚之傳帝好水引餅史記趙奢傳王曰母置之苦菜黃雞羮糝滑見上蓴絲色紫菰首白齊民要術云四月蓴生莖而未葉名曰稚尾蓴第一肥美葉舒長足名絲蓴五六月用絲蓴周禮魚冝苽注雕胡也內則蝸醢而苽食注雕胡也苽亦菰蔞蒿芽甜蔊頭辣齊民要術蔊菜味辛音罕盱江志云蔊菜生麻姑山及麻源生𦵔入湯翻手成芼以薑橙誇縷抹文選枚乘七發云肥狗之和芼以山膚注引禮記注云芼菜也謂以菜調和之也驚雷菌子出萬釘傳燈録百文問黃蘖甚麼處來曰大雄山下采菌子來此摘其字隋楊素傳賜萬釘寶帶借使其字白鵝截掌鱉解甲琅玕森深未飄蘀軟炊香粳煨短茁禹貢球琳琅玕今以喻竹召南騶虞云彼茁者葭注茁出也今言笋𥘉出土老杜云軟炊香飯緣老翁飯一作粳萬錢自是宰相事日食萬錢見上注一飯且從吾黨説公如端為苦笋歸明日青衫誠可脫六舅以詩來覔銅犀用長短句持送舅氏學古之餘復味禪説故篇末及之海牛壓𥿄寫銀鈎海牛犀也前集有詩云海牛壓簾風不開蓋用張君房脞説蕭學士夢中賦曉寒歌云海牛壓薕風不入前注偶不及此晉索靖傳作草書狀曰婉若銀鈎阿雅元注師奴僧號守之索自收長防玩物敗兒性書玩物喪志得歸老成散百憂先生古心治金鐡退之孟先生詩云孟生江海士古貌又古心皮日休云余常慕宋廣平鐡腸石心堂堂一角誰能折犀一角獸也漢朱雲傳云五鹿嶽嶽朱雲折其角兒言觳觫持贈誰外家子雲乃翁師子雲蓋比之楊雄也不著鼻繩袖兩手古犀牛兒好看取傳燈録撫州石鞏慧藏禪師一日在厨下作務馬祖問曰作什麼曰牧牛祖曰作麼生牧曰一回入草去便把鼻孔拽來福州大安禪師曰安在溈山三十年只看一頭水牛牯若落路入草便牽出若犯人苗稼即鞭撻調伏既久可憐生如今變作露地白牛常在面前露逈逈地趕亦不去也次韻子瞻與舒堯文禱雪霧豬泉唱和老農年飢望人腹莊子無聚祿以望人之腹想見四溟森雨足文選張景陽雜詩雲根臨八極雨足􅎈四溟李善曰四溟四海也又詩森森散雨足林回投壁負嬰兒莊子林回棄千金之璧負赤子而趨豈聞烹兒翁不哭未論萬户無炊煙蛛絲蝸涎經杼軸詩杼軸其空使君閔雪無肉味煮餅青蒿下􅐭菽豈云剪瓜冝侵肌文選應休璉與廣川長書言禱雨不應其略云昔夏禹之解陽肝殷湯之禱桑林辭未卒而澤滂沛今者雲積而復散得無割髮冝及膚剪爪冝侵肌乎李善注云吕氏春秋曰湯克夏而大旱五年乃身禱於桑林剪其髮􅽏其手自以為牲雨乃大至􅽏音􅐱霜不殺草仍故緑春秋隕霜不殺草幽靈奰贔西山霧文選西京賦臣靈贔屓髙掌逺跖吳都賦巨鼇贔屓首冠靈山贔音備屓音虛器切奰字乃詩所謂內奰於中國蓋誤寫耳贔字又倒寫當改正牲肥酒香神未瀆退之南海神碑云牲肥酒香樽爵淨潔得微往從董父餐左昭二十九年蔡墨對魏獻子曰昔有飂叔安有裔子曰董父實甚好龍能求其嗜欲以飲食之龍多歸之乃畜龍以服事舜寧當罪繫葛陂淵後漢費長房傳東海君見葛陂君淫其夫人長房劾繫之三年東海大旱長房曰東海君有罪吾前繫於葛陂今出之使作雨於是雨立注卜擇祠官齊博士漢武紀其令祠官修山川之祠漢儒林傳五經博士多是齊人舒堯文時為教授故云暴露致告蒼崖顚請天行澤不汲汲爾亦枯魚過河泣樂府古詞云枯魚過河泣何時悔復及作書與魴鱮相教謹出入生鵝斬頸血未乾莊子説剱篇上斬頸領下決肝肺退之詩一夫斬頸群雛枯風馬雲車坐相及漢禮樂志房中歌云靈之車結玄雲靈之下若風馬百里旌旗􅎈玉花唐舒元輿序重雪終日玉花攪空使君義動龍蛇蟄老杜云意鍾老柏青義動修蛇蟄老農歡喜有春事呼兒飯牛理蓑笠吕氏春秋百里奚未遇時飯牛於秦博士勿歎從公疲明年麥飯滑流匙老杜云嘗稻雪翻匙又云滑憶雕胡飯香聞錦帶羮溜匙兼暖腹誰欲致杯罌見子瞻粲字韻詩和答三人四返不困而愈竒輒次韻寄彭門按東坡集乃熙寧七年冬除夜病中贈假屯田時在密州山谷和章乃元豐𥘉公材如洪河灌注天下半文選吳都賦嶔碒乎數州之間灌注乎天下之半風月未嘗攖終上句洪河之義莊子徐無鬼篇故曰風之過河也有損焉日之過河也有損焉請只風與日相與守河而河以為未始有攖也晝夜聖所歎見論語名丗二十年窮無歌舞玩入宮又見妬女無美惡入宫見妬見鄒陽傳徒友飛鳥散莊子山木篇孔子問於子桑雩曰吾再逐於魯伐樹於宋削迹於衛窮於啇周圍於陳蔡之間吾犯此數患親親交益疏徒友益散何歟李陵傳各鳥獸散猶有得脫一飽事難諧事不諧矣見宋弘傳五車書作伴莊子惠施多方其書五車風雨暗樓臺雞鳴自昏旦詩風雨如晦雞鳴不巳雖非錦繍贈欲報青玉案文選張平子四愁詩美人贈我錦繍假何以報之青玉案文似離騷經詩窺關雎亂語師摯之始關雎之亂賤生恨學晚曽未奉巾盥內則盥卒授巾昨蒙雙鯉魚雙鯉事見東坡在彭門答山谷書見集中逺託鄭人緩莊子列禦寇篇鄭人緩也呻吟裘氏之地三年而緩為儒風義薄秋天謝靈運傳論云髙義薄雲天老杜云髙義薄曽雲神明還舊貫法書要録庾兾與羲之書云忽見足下答家兄書煥若神明頓還舊貫更磨薦禰墨後漢孔融上疏薦禰衡推挽起疲懦忽忽未嗣音微陽歸候炭漢天文志冬至短極縣土炭孟康曰先冬至三日懸土炭於衡兩端輕重適均冬至日陽氣至則炭重夏至日隂氣至則土重仁風從東來拭目望齋館鳥聲日日春桞色弄晴暖漫有酒盈樽何因見此粲歸去來詞云携幼入室有酒盈樽詩子兮子兮此粲者何人生等尺捶豈耐日取半莊子篇末云一尺之捶日取其半萬丗不竭辨者以此與惠施相應終身無窮誰能如秋蟲長夜向壁嘆朝四與暮三適為狙公玩臭腐暫神竒莊子知北篇臭腐復化為神竒神竒復化為臭腐喑噫即飄散我觀萬丗中獨立無介伴小黠而大癡退之送窮文曰子知我名凡我所為驅使令去小黠大薿夜氣不及旦孟子云云低首甘豢飬尻脽登爼案見前食驢腸詩注所以終日飲醉眠朱碧亂醉眠當是醉眠玉臺新詠夜愁詩云誰知心眼亂看朱忽成碧仰看朱飛雲只使衣帶緩文選古詩相去日巳逺衣帶日巳緩先生古人學百氏一以貫見義勇必為少作衰俗懦忠言願回天唐張玄素傳魏徴歎曰張公論事有回天之力不忍斆吞炭讓吞炭還從股肱郡漢季布傳上曰河東吾股肱郡故特召君耳待詔圗書館東壁二星天子圗書之祕府也東坡為郡仍直史館投壷得賜金杜詩能畫毛廷壽投壷郭舍人西京雜記郭舍人善投壷每為武帝投壷輒賜金帛侏儒餘飽暖寧令東方公但索長安粲東方朔傳上召問朔何恐侏儒為對曰侏儒飽欲死臣朔飢欲死臣言可用幸異其禮不可用罷之無令但索長安米惠帝紀曰為鬼薪白粲注取薪給宗廟為鬼薪坐擇米使正白為白粲郭舍人及侏儒以比當時附會而進者東方朔比東坡元龍湖海士毀譽略相半下床卧許君上床自永嘆魏志季布傳陳登者字元龍卒後許汜與劉備並在荆州牧劉表坐與表共論天下人汜曰陳元龍湖海之士豪氣不除備謂表曰許君論是非表曰欲言非此君為善士不冝虛言欲言是元龍名重天下備問汜君言豪寧有事耶汜曰昔遭亂過下邳見元龍元龍無客主之意久不相與語自上大床卧使客卧下床備曰君有國士之名今天下大亂帝王失所望君憂國忘家有救丗之意而君求田問舍言無可采是元龍所諱也表大笑丈夫屬有念鮑明逺集中詩云幽居屬有念含意未連詞退之秋懷詩丈夫屬有念事業無窮年人物非所玩書玩人喪得玩物喪志坐令結歡客化為煙霧散武功有大略元和姓纂蘇氏自武功徙焉亦復寡朋伴詠歌思見之長夜鳴渴旦禮坊記詩云相彼盍旦尚猶惡之注夜鳴求旦之鳥人猶惡其反晝夜盍音渴東南望彭門官道平如案老杜云東屯大江北百頃平若案簡書束縳人一水不能亂詩公劉涉渭為亂注正絶流曰亂斯文螕秬鬯可用圭瓉盥書平王錫晉文侯秬鬯圭瓉作文侯之命盥即灌論語注酌鬱鬯於大廟以降神也東坡和此篇云於我如既盥古字通用誠求活國醫何忍棄和緩左成十年晉侯有疾求醫於秦秦使醫緩視之昭元年晉侯求醫於秦秦使醫和視之文子曰醫及國家乎對曰上醫醫國其次醫人開疆日百里詩日闢國百里都內錢朽貫史記平凖書云京師之錢纍巨萬貫朽而不可校銘功甚俊偉乃見儒生懦且當置是事勿使氷作炭熙寧五年收復熙州十年交址納欵銘功當是此等事鹽鐡論氷炭不可以同器淵明詩孰若當丗士氷炭滿懷抱退之聽潁師琴云潁乎尓誠能無以氷炭置我腸上帝群玉府穆天子傳群玉之山先王之所謂䇿府道家蓬萊館後漢書學者稱東觀為老氏藏室道家蓬萊曲肱夏簟寒炙背冬屋暖嵇康絶交書野人有快炙背而美芹子者欲獻之至尊只令文字垂萬丗星斗粲次韻答堯民君開蘇公詩疾讀思過半譬如聞韶耳三月忘味歎見論語班孟堅幽通賦云虞韶美而鳯儀兮孔忘味於千載我詩豈其朋組麗等俳玩楊子霧榖之組麗女工之蠧矣司馬遷書云文史星曆近乎卜祝之間固主上所戲弄倡優畜之漢書枚皋言為賦乃俳見視如倡不聞南風絃禮記舜作五弦之琴以歌南風同調廣陵散嵇康傳康將刑東市索琴彈之曰昔袁孝尼嘗從吾學廣陵吾每靳固之廣陵散於今絶矣鶴鳴九天上肯作家雞伴詩鶴鳴于九皋南史王僧虔傳小兒輩賤家雞借用之朝子但愛我品藻私月旦後漢許劭傳劭與兄靖好核論鄉黨人物每月輒更其品題故汝南有月旦評焉官間樂相從梨栗供杯案淵明責子詩但覔梨與栗前漢貢禹傳見賜杯案盡文畫金銀飾後漢董卓傳偃轉杯案間門靜鳥雀嬉花深蜂蝶亂忽蒙加禮貌齋戒事搢盥問大心更小杜詩成王功大心轉小此摘其字意督辭反緩君材於用多舞選弓矢貫齊國風舞則選兮射則貫兮聰明回自照傳燈録靈居義能曰回光返照看身心是何物勝巳果非懦我如相繪事素質施朽炭見論語古來得道人非獨大庭館列子黃帝篇退而間居大庭之館齋心服形晝寢而夢遊於華胥氏之國朝子巳不疑冬寒春自暖繫表知藥言擇友得荀粲魏志荀彧傳注云粲字奉倩諸兄並儒術論議而粲獨好言道常以為子貢稱夫子之言性與天道不可得聞然則六藉雖存固聖人之粳粃粲兄侯難曰易亦曰聖人立象以盡意繫辭為以盡言則微言胡為不可得而聞見哉粲曰蓋理之微者非物象之所舉也今稱立象以盡意此非通乎意外者也繫辭焉以盡意此非言乎繫表者也斯則象外之意繫表之言固藴而不出矣當時能言者不能屈也再和寄子瞻聞得湖州天下無相知得一巳當半桃僵李為仆古歌詩曰桃生露井上李樹生桃傍蟲來囓桃根李樹代桃僵見藝文類聚芝焚蕙增歎文選歎逝賦云信松茂而柏恱嗟芝焚而蕙歎佳人在江湖照影自娛玩一朝入漢宮掃除備冗散漢申屠嘉傳冗官居其中注云冗謂散輩也如今散官何如終流落長作朝雲伴文選髙唐賦妾在巫山之陽髙丘之阻旦為朝雲暮為行雨相思欲靣論坐起雞五旦身慙尸廩祿有罪未見案後漢孔融傳丁零盜蘇武牛羊可并案也公文雄萬夫皎皎不自亂藏榖皆亡羊莊子駢拇篇臧與榖二人相與牧羊而俱亡其羊問臧奚事則挾策讀書問榖奚事則博塞以遊二人者事業不同其於亡羊均也要以道湔盥傳聲向東南王事不可緩孟子民事不可緩也春波下數州快若七札貫左傳成十六年鄢陵之戰飬由基蹲甲而射之徹枇焉椎鼓張風帆相見激衰懦空文不傳心千古付煨炭安得垂天雲莊子翼若垂天之雲飛就吳興館吳興郡湖州也魚饜桞絮肥孔毅甫雜記云永叔稱聖俞河豚詩云春洲生荻牙春岸飛楊花河豚於是時貴不數魚蝦以謂河豚食桞絮而肥聖俞破題兩句便説盡河豚好處乃永叔褒譽之詞也其實不尓此魚盛於二月至桞絮時魚巳過矣石林詩話所言略同筍煮溪沙暖解歌使君詞撙前有三粲國語周語曰三女奔密康公公母曰必致之王夫粲美物也衆以美物臨而何得以堪之用明發不寐有懷二人為韻寄李秉彛得叟秦少遊作李公擇行狀云兄布早卒拊其子秉彛如巳子秉彛蓋山谷伯舅之子竹貫四時清一作竹節晚逾緑月通雲氣明一作月華寒更明外弟有佳質一作處妙年推老成後凋對霜雪一作到氷霜不昧處隂晴盛德當如此一作觀物憶相見古人畏後生一作契闊難為情禮器云如竹箭之有筠也如松柏之有心也二者居天下之大端矣故貫四時而不改柯昜葉文選石季倫詩傳語後丗人逺嫁難為情通典代稱姑子為外兄弟舅子為內兄弟非典言也異姓之親通謂之外在昔授子書髧彼垂兩髮詩髧彼兩髦注髦者髮至眉子事父母之飾乖離今十年樹立映先逹退之詩乖離坐難慿丗説云共啇略先往名逹清燈哦妙句一作誦佳句如酌春酒滑把書念携手惆悵至明發李陵詩携手上河梁人生不如意十事恆八九晉羊祐傳祐上疏乞伐吳而議者不同祐曰天下事不如意恆十居七八未見歷下人徒傾歷城酒秉彛南康軍建昌人時仕於濟南前有寄李六弟詩即此人也巳見前注從來親骨肉不免相可不退之寄嶽鄂李大夫詩云少年樂新知衰暮思故友譬如親骨肉寧免相可否但願崇事實虛名等箕斗見上蚤知鵲山亭李杜發佳思彌年聽傳誇登覽通夢寐遙憐坐淸曠落筆冨新製尚因賔客集瀝酒使我醉往在舅氏旁獲拚堂上帚記汜掃曰掃掃席前曰拚拚席不以鬛執箕膺擖六經觀聖人明如夜占斗索居廢舊聞獨學無新有羡子𣏌梓材左傳聲子説楚曰如𣏌梓皮革自楚往也雖楚有材晉實用之未曽離矯揉昜説卦云坎為矯輮釋音云輮如九反又如又反宋忠王廙本作揉宋云使曲者直直者曲為揉荀子勸學篇木直中繩輮以為輪安詩無恙時學行超輩㑪山谷集中有李攄字説云豫既字舅弟李攄曰安詩而安詩請其説云云華屋落丘山文選曹子建箜篌引云生存華屋處零落歸丘山百憂滿人懷此士如不亡仲子抱竒材不獨典刑在仲一作叔詩雖無老成人尚有典刑神明還觀來集中又有評李得叟詩云孫莘老嘗以得叟詩一軸示豫曰子試為我評之豫曰再過普惠七言石人道中表字韻國朝以來能者不過一二人而巳退之所謂橫空蟠硬語妥帖力排奡惟此詩足以當之神明還觀見上少時誦詩書貫穿數萬字司馬遷貫穿經傳爾來窺陳編記一忘三二桞子厚寄許京兆書云往時讀書自以不至抵滯今皆頑然無復省録每讀古人一傳數𥿄以後則再三伸卷復觀姓氏旋又廢失山谷蓋用此意光隂如可玩老境翻手至良醫曽折足説病乃真意左傳齊髙強曰三折肱知為良醫桃李春成徑見上本自不期人桃李成蹊非與人期而人自至耳歷下兩寒士簞飄能恱親恥蒙伐國問董仲舒傳為江都事易王王問曰粵王勾踐與大夫泄庸種蠡謀伐吳遂滅之孔子稱殷有三仁寡人亦以為越有三仁桓公決疑於𬋩仲寡人決疑於君舒對曰昔魯君問桞下惠吾欲伐齊何如惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至於我哉徒見問耳且猶羞之况設詐以伐吳乎王曰善肯卧覆車塵子既得此友從之日求新賦未見君子憂心靡樂八韻寄李師載同升吏部曹往在紀丁未山谷治平四年登第歲在丁未别離感寒暑歲星行十二歲星十二歲一周天丁未至戊午十二年蓋熙寧元年也山谷時在北京我慚雞藎榖大玄第四卷雞藎榖注藎榖進也進食其谷也子歎天且劓易睽六三其人天且劓䆁文天剠也剠鑿其額曰天空餘山梁期山梁見語尚不昧𥘉志會合良難期繫匏各異縣上見語文選樂府云他鄉各異縣展轉不相見千里共明月文選月賦歌曰美人邁兮音塵濶隔千里兮共明月如披故人面晉樂廣傳衛􅗕見廣曰此人之水鏡見之瑩然若披雲霧而覩青天浮雲蔽髙秋此豈中心願霧重豹成文古列女傳陶答子治陶三年名譽不聞家冨三倍其妻諌曰南山有玄霧雨七日而不下食欲以澤其毛成文章也犬彘不擇食以肥其身坐而須死耳水清魚自見古樂府艷歌行曰語卿且勿眄水清石自見齊地榖翔貴前漢食貸志云榖價翔貴排門無爨饙詩浻酌可以饙饎二仲有甘旨奉親亦良勤原田水洸洸韻書云洸水涌光也何時稼如雲無民願歲豐政自不忘君無民無字誤疑是庶民劉向傳忠臣雖在畎畒猶不忘君古人有成言歲暮於吾子真誥愕緑華贈羊權詩云所期豈朝華歲暮於吾子斧揮郢人鼻莊子徐無鬼篇莊子送葬過惠子之墓顧謂從者曰郢人堊漫其鼻端若蠅翼使匠石斫之匠石運斤成風聽而斫之盡堊而鼻不傷郢人立不失容宋元臣聞之召匠石曰嘗試為我為之匠石曰臣則嘗能斫之雖然臣之質死久矣自夫子之死也吾無以為質矣吾無與之言矣琴即鍾期耳見上新詩凌建安魏志王粲傳粲卒於建安二十二年始文帝為五官將及平原侯植皆好文學粲與徐幹偉長陳琳孔章阮瑀元瑜應瑒得璉劉楨公幹並見友善髙論到正始晉衛玠傳大將軍鎮豫章長史謝鯤雅重玠相見欣然言論彌日大將軍謂鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表微言之緒絶而復續不意永嘉之末復聞正始之音徒言參隔辰楊子吾不覩參辰之相比也左傳昭元年子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯於啇丘主辰啇人是因故辰為啇星遷實沈于大夏主參唐人是因以服事夏啇故參為晉星未負石投水吕氏春秋精喻篇白公問於孔子曰人可微言乎孔子不應白公曰若以石投水奚若孔子曰沒人能取之白公曰若以水投石奚若孔子曰淄澠之合易牙能知之白雪非衆聽文選宋玉答楚王問云客有歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽阿薤露國中屬而和者數百人其為陽春白雪屬而和者數十人而巳其曲彌髙其和彌寡夜光忌暗投見上古來不識察文選古詩一心抱區區懼君不識察浪自生百憂三月楚國淚卞和巳見上注以言夜光之璧千年郢中樓以言陽春白雪無因杭一葦詩一葦杭之濁水拍天流退之詩海氣昏昏水拍天河南李茂彥內藴邁俗心濬沖有涇渭一顧重千金文選任彥升詩濬沖得茂彥注云傳暢贊曰王戎宇濬沖為選官時江夏李重字茂曽汝南李毅字茂彥二人俱處要職戎以識會待之各得其用彥升此詩又云伊人有涇渭非余揚濁清向秀别傳云秀與嵇康吕安為支康傲丗不羈安放逸邁俗而秀雅好讀書事親知色難勝巳又勇沉見上外物既難必求之首陽岑莊子外物篇外物不可必故龍逢誅比干戮論語夷齊餓于首陽之下飄風從東來雨足盡西靡説苑上之化下猶風之靡草東風則草靡而西西風則草靡而東老杜云雨聲巳先風散足盡西靡萬物逐波流金石終自止説苑叢談云水浮萬物玉石留止渭因涇使濁菲以葑故毀並見毛詩智所無奈何誰能為樗里史記樗里子傳滑稽多智號曰智囊秦人諺曰力則任鄙智則樗里紛紛車馬客如集市人博彼雖有求來我但快一噱文選陳孔璋書必大噱也忽逢媚學子退之詩蹮蹮媚學子墻屏日有徒時亦撼關鑰何當携手期濠上得魚樂見上以同心之言其臭如蘭為韻寄李子先往日三語掾解道將無同我觀李校書超邁有古風晉阮瞻傳見司徒王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良久即命辟之人謂之三語掾談道屢入微衛玠傳勝日親友時請一言莫不咨嗟以為入微又云衛玠談道平子絶倒閉門長蒿蓬蓬蒿繞宅見上注誰能賞逺韻大守似安豐晉庾凱雅有逺韻王戎傳進爵安豐縣侯流水鳴無意白雲出無心歸去來詞雲無心而出岫水得平淡處渺渺不厭深雲行不能雨還歸碧山岑斯人似雲水廊廟等山林文選曹子建詩朝雲不歸山霖雨成川澤前漢贊山林之士往而不能反朝廷之士入而不能出俗士得失重舍龜觀朵頥昜舍尓靈龜觀我朵頥六經成市道駔儈以為師史記廉頗傳客曰天下以市道交漢貨殖傳莭駔儈漢書吏道以法令為師吾學淡如水載行欲安之莊子君子之交淡如水左傳襄二十四年子産寓書告范宣子曰夫令名德之輿也恕思以明德則令名載而行之楊子法言或問孔子知其道之不用也則載而惡乎之曰之後丗君子惟有無心子白雲相與期摧藏裭冠冕文選扶風歌抱膝獨摧藏昜訟卦或錫之鞶帶終朝三裭之後漢鄧禹贊裭龍章於終朝左昭九年伯父裂冠毀冕寂寞歸丘園一瓢俱好學伯仲吹箎塤政以此易彼韓文桞子厚墓志以彼易此孰得孰失髙車擇朱門得失固有在難為俗人言司馬遷書云悲夫事未易一二與俗人言也又云此可與智者道難與俗人言也携手力不足七年坐乖離此詩乃元豐二年歲巳未北京解官後作也在北京首尾跨七年選詩乖離即長衢愁思不能眠起視夜何其殘月挂破鏡古樂府云破鏡飛上天謂月半也寒星滿天垂明明故人心維斗終不移見上窮閻蒿蔓羶冨屋酒肉臭禮記冨潤屋漢霍去病傳重車餘棄粱肉而士有飢肉杜詩朱門酒肉臭路有凍死骨酒肉令人肥蒿蔓令人瘐欲從鍾鼎食家語子路曰親沒之後纍茵而坐列鼎而食史記貨殖傳洗削薄投也而郅氏鼎食馬醫淺方張里擊鍾鮑照詩擊鍾陳鼎食方駕自相求復恐憂患構秦時千户侯寂寞種瓜後肖何傳召平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故丗稱東陵瓜客從濟南來李子先及前篇李得叟皆在濟南山谷母黨也遺我故人書墨淡字踈行杜詩墨淡字欹傾故人情有餘上言猶健否次問意何如只今意何有思食故溪魚古樂府詩云客從逺方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書中意何如上言加餐飯下言長相思吾子有嘉得譬如含薰蘭清風不來過歲晚蒿文間淵明飲酒詩云幽蘭生前庭含薰待清風清風脫然至見别蒿艾中古來百夫雄白首在澗槃詩百夫之特又考槃在澗非閞自取重杜詩云非閞足無力又云非閞故安排直為知人難書在知人惟帝其難之次韻朝元忠西歸十首我田失耕耘歲暮拾枯其枯其不可食日晏抱長飢漢楊惲傳其詩曰田彼南山蕪穢不治種一頃豆落而為其猛虎依山林眼有百步威退之猛虎行正晝當谷眠眼有百步威一從梁鴦食風月何時歸列子云周宣王之牧正有役人梁鴦能飬禽獸虎狼無不柔馴者梁鴦曰飬虎之法順之則喜逆之則怒夫食虎者不敢以生物與之為其殺之之怒也虎與人異而媚飬已者聖莫如東家長年困行路公飬為淹留豈不以食故邴原别傳曰原逰學詣孫嵩嵩曰君捨鄭君所謂以鄭君為東家丘也原曰君謂僕以鄭為東家丘必以僕為西家愚夫耶孟子万章下云孔子有公飬之仕林薄鳥遷巢水寒魚不聚老杜詩林茂鳥有歸水深魚知聚孤士似無家轉蓬何由住説苑魯哀侯棄國而走齊對齊侯曰是猶秋蓬惡其本根而美其枝葉秋風一起根且拔矣曹子建詩轉蓬離本根飄飄隨長風老杜云飄零似轉蓬前有熊羆咆後有虎豹號文選劉安招隱士云虎豹鬪兮熊羆咆杜詩空荒咆熊羆巳出澗谷底更陟山板髙五日一併食儒行云儒有昜衣而出并日而食十年一緼𫀆語衣弊緼𫀆兼用檀弓所云晏子一狐裘三十年之意未知歸宿處豈憚鞍馬勞退之病中贈張藉詩言籍之詞云從此識歸處東流水淙淙麗姬封人子弄影愛朝日文選疊霜毛而弄影晉國始得之涕泣甘首疾詩甘心首疾憂危與安樂一生誰能必同床食芻豢乃悔沾襟失麗姬事見上怨句識之推史記晉丗家文公賞從亡者介子推不言祿祿亦不及隱不復見子推從者懸書宫門曰龍欲上天五蛇為輔龍巳升雲四蛇各入其宇一蛇獨怨終不見處所文公見之曰此介子推也啇歌知寧戚琴操曰寧戚飯牛車下叩牛角而啇歌曰南山粲白石爛生不逢堯與舜禪短布單衣裁至骭長夜冥冥何時旦齊桓公聞之舉以為相我占朝氏賢乃在賦行役詩父曰嗟豫子行役同遊羿彀中莊子得充符篇云遊於羿之彀中儻免非爾力孟子其中非爾力也滔滔今如此去邦將安適論語桀溺曰滔滔者天下皆是也退之古風云一邑之水可走而違天下滔滔曷其而歸熱避惡木隂渴辭盜泉水文選陸士衡詩渴不飲盜泉水熱不息惡木隂惡木豈木隂志士多苦心曽回勝母車鄒陽書里名勝母曽子不入邑號朝歌墨子回車不落抱玉淚鄒陽書玉人獻寶楚王誅之注云卞和抱其璞哭於郊詳見上注大白詩抱玊入楚國朝氏猛虎行繳繳壯士意人生髙唐觀髙唐之觀見文選宋玉賦有情何能已腰垂九井璜文選顔延年詩有懷誰能已元注云朝詩云安得龍山潮駕回實河水水從樓前來中有美人淚尚書中候曰吕尚釣于磻溪得玉璜云云見文選注山谷琴銘云釣魚而得九井之璜蓋用山海經事經云海內崑崙墟在西北帝之下都高九仭有九井以玉為檻耳著明月璫文選洛神賦贈江南之明璫注云耳珠曰璫蘭蓀結襟帶芰荷製衣裳沈休文和謝宣城詩昔賢侔時雨今守馥蘭蓀離騷經製芰荷以為衣兮集芙蓉以為裳其人雖甚逺其室大道傍當身不著意千載永相望鄭國風其室則邇其人甚逺古語築室道旁三年不成太白詩遮莫親姻連帝城不如當身自簪纓當字作去聲讀風雨去家行手龜面黧黑屠龍非丗賢莊子宋人有善不龜手之藥者韓非子晉文公反國及河令籩豆捐之席蓐捐之手足胼胝面目黧黑者後之列子年老力弱面目黧黑杜詩會面嗟黧黑屠龍見上學問求自得孟子君子深造之以道欲其自得之也我思脊令詩同飛復同息兄弟無相逺急難要羽翼小雅常棣云脊令在原兄弟急難角弓云兄弟昏姻無胥逺矣唐元宗賜讓皇帝兄弟天生之羽翼人言貧在家殊勝冨作客樂天詩始知為客苦不及在家貧唐戎昱詩逺客歸去來在家貧亦好雞棲牛羊下見上君子亦安息千里求明師營糧從事役莊子胠篋篇延頸舉踵曰某所有賢者贏糧而趣之南溪始泛云誰謂非事役學問非物外室虛生純白見上前集贈桞某詩云歸來坐虛室夕陽在吾西與此同意蓋謂道在邇而求諸逺也開田望食麥春隴無秀色深耕不償勤牛耳徒濕濕見詩豐凶誰主張坐令愁煎迫河清會有時左傳周詩有之涘河之清人壽幾何注逸詩也得酒灑胸臆集中有答朝元忠書云未識足下之面因諸昆弟得足下之詩興托深逺不犯丗之鋒永懷善怨鬱然類騷故追韻寫意於無能之詞又云南來拘窘吏事雖江山映發心不在焉又云十詩聊報盛意又云承去歲不利秋官可見詩中之意矣其言南來拘窘吏事可見在大和作追韻寫意即此詩也十詩聊報盛意見第三卷山谷外集詩注卷之四
