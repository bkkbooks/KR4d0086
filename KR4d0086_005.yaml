  text: 山谷外集詩注卷第五
  hash: sha256:9bb5ebcb4a80e22db1c1d132265c4f0621b65c61e5fc3ad90e17e9d494e76519
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_005-1a}
body:
  text: 答王道濟寺丞觀許道寧山水圗往逢醉許在長安郭若虛圖畫見聞録云許道寧河間人學李成山水筆墨簡快峯巒峭拔自成一家蠻溪大硯磨松煙山谷有帖云嘉州峨眉縣中正寨之蠻溪出研石青緑密緻而冝筆墨忽呼絹素翻硯水杜詩詔謂將軍拂絹素久不下筆或經年異時踏門闖白首退之詩闖然入其户又聮句云儒門雖大啓姦首不敢闖注馬出門貌巾冠欹斜更索酒杜詩指點銀瓶索酒嘗舉杯意氣欲翻盆倒卧虛樽將八九張籍詩酒盡卧空瓶醉眠枯筆墨淋浪杜詩戲拈秃筆掃驊騮勢若山崩不停手數尺江山萬里遙南史竟陵王傳其孫賁字文煥善畫於扇上圗山水咫尺之內便覺萬里為遙杜詩咫尺應須論萬里滿堂風物冷蕭蕭杜詩滿堂動色嗟神妙退之詩蕭蕭風景寒山僧歸寺童子後杜詩貌得山僧及童子漁伯欲渡行人招莊子漁父篇孔子鼓琴奏曲未半有漁父下船而來曲終而招子貢此反而用之先君笑指溪上宅盧鷀白鷺如相識許生再拜謝不能項籍傳陳嬰謝不能元是天機非筆力老杜山水障歌云劉侯天機精愛畫入骨髓自言年少眼明時手揮八幅錦江絲贈行卷送張京兆京兆不知謂誰而言錦江絲疑是乖崖蓋比之張敞云心知李成是我師圗晝見聞録云李成字咸熙家營丘志尚沖寂博涉經史尤善晝山水寒林開寶中都下貴人王公貴戚爭馳書延請成多不答子覺職踐館閣贈光祿丞張公身逐銘旌去流落不知今主誰大梁畫肆閲水墨我君槃礴忘揖客槃礴見下注蛛絲煤尾意昏昏集中有答郭英發書云蛛絲所謂蠨蛸在戶者煤尾屋塵屋塵合墨醫方謂之烏龍尾杜詩頭白昏昏足醉眠幾年風動人家壁雨雪涔涔滿寺庭老杜秦州雜詩涔涔塞雨繁四圗冷落讓丹青笑酬肆翁十萬錢卷付騎奴見上市盡傾司馬相如傳一坐盡傾王丞來觀皆失席指點如見𥘉畫日四時風物入句圗楊大年談苑云李昉以司空致仕畜五禽皆以客為名各為詩一章畫為圗傳於好事者句圗蓋此類也信知君家有摩詰王維字摩詰唐書有傳我持此圗二十年眼見緑髮皆華顛緑髮見上後漢崖駰傳駰作逹旨云唐且華顛以悟秦甘羅童牙而報趙許生縮手入黃泉衆史弄筆摩青天莊子田子方傳宋元君將畫圗衆史皆至受揖而立舐筆和墨有一史後至者儃儃然不趍受揖不立因之舍公使人視之則解衣槃礴裸君曰可矣是真晝者也君家枯松出老翟圗晝見聞録云翟院深北海人學李成山水但自創意者格下臨摹者奪真風煙枯枝倚崩石蠧穿風物君愛惜不誣方將有人識言此晝雖蠧而他日有識之者按文選謝靈運擬鄴中詩其序言建安末在鄴宮究􅌚愈之極古無此娛何者楚襄王有宋玉唐景梁孝王有鄒枚嚴馬其主不文漢武時徐樂諸才備應對之能而雄猜多忌豈獲晤言之適不誣方將庶必賢于今日耳靈運之意謂他日人必以今日之樂為賢于昔人不誣之義如嵇叔夜飬生論云一溉之益不可誣也五臣注詞不逹故為箋云過家自此以下皆吉州大和所作有寄李公擇詩序云元豐庚申得邑大和庚申元豐三年也泊舟大孤山詩自注云庚申十二月則到官當是四年春絡緯聲轉急炙轂子雜録云莎雞古今注一名促織一名絡緯一名蟋蟀促織謂其聲鳴如急織也絡緯謂其鳴如紡績織緯也田車寒不運兒時手種栁上與雲雨近舍傍舊傭保司馬相如傳與庸保雜作少換老欲盡宰木鬱倉倉公羊春秋秦伯謂蹇叔曰若尓之年者宰上之木拱矣田園變畦畛周禮遂人溝上有畛招延屈父黨勞問走婚親歸來翻作客唐劉長卿詩舊業今巳無還鄉反為客顧影良自哂一生蘋託水劉伶酒德頌俯觀万物擾擾焉如江海之載浮萍萬事雪侵鬢夜闌風隕霜隕霜見上乾葉落成陳燈花何故喜杜詩燈花何大喜酒渌正相親大是報書信親年當喜懼見語兒齒欲毀齓周禮未齓者不為奴注毀齒也男八歲女七歲𥘉覲反繫船三百里去夢無一寸當是謁告獨歸不及將母分寧至大和水道三百里也上冢自公返蓬蓽詩自公退食禮記篳門圭竇蓬户甕牖稅駕上丘壟李斯傳吾未知所稅駕也霜露此日悲祭義曰霜露既降君子履之必有悽愴之心松楸十年拱退之詩深思罷官去畢命依松楸飬雛數毛羽𥘉不及承奉康州斷腸猿風枝割永痛山谷父庶字亜夫嘗攝康州丗説新語桓公至三峽有得猿子者其母緣號遂跳上船即絶破視其腹腸寸寸斷李白贈武諤云余愛子伯禽在魯許為冒胡兵致之其詩云愛子隔東魯空悲斷腸猿少年不如人左僖三十年燭之武曰臣之壯也猶不如人今老矣無能為也巳登仕無前勇髮踈齒牙搖韓文而髮蒼蒼而齒牙動搖鯨波怒號洶願為保家子左昭二年非保家之主也敢議丗輕重稱觴太夫人魚菜贍庖供岑彭傳大長秋以朔望問太夫人起居退之詩呼奴具盤餐飣餖魚菜贍明叔知縣和示過家上冡二篇復次韻敝邑荷佳政文選曹子建書在彼自有佳政耕桑及時運淵明有時運詩令君平生歡逺別喜親近漢鄒陽傳而求親近於左右吾友徐光祿死戰萬事盡徐禧熙寧五年與沈括等建議城永樂城北騎圍之禧及李舜舉李稷闔城俱沒不見東陵侯唯見瓜連畛文選阮嗣宗詩昔聞東陵瓜近在青門外連畛距阡陌子母相鉤帶東陵事見上且當置是事椎牛會賔親百年共如此破涕作嘲哂文選劉越石詩序云破涕為笑枯荷野塘水照影驚顔鬢功名黃梁炊成敗白蟻陳吕公邯鄲道上炊黃糧事巳見上第一卷餞樂道詩注此事與南柯事相類皆出異聞集大槩言淳于棼夢入槐安國其王妻以女使為南柯大守十年有檀蘿國來伐王命棼征之敗績及覺見蟻穴云山谷多以此二事為一事事雖不同其義一也南柯事詳見卷末注又按古今五行記後魏顯宗時有黑蟻與赤蟻戰赤蟻斷頭而死東魏孝靖時鄴下有黃蟻與黑蟻鬪黃盡死少時無老境身到乃盡信曲禮六十曰耆指使音義曰耆至也至老境也淵明詩嘗聞長者言掩耳不願聽奈何五十年忽巳親此事蓋用此意此來見抱子詩云亦既抱子别日多未齓夜闌如夢寐寒燭泣餘寸杜詩夜闌更秉燭相對如夢寐女蘿上杉松尓雅唐蒙女蘿女蘿兔絲詩蔦與女蘿施于松柏文選古詩與君為新婚菟絲附女蘿注引詩傳云女蘿松蘿也草木疏曰今松蘿蔓松而生菟絲蔓聮草上與松蘿殊異野葛蔓畦壟詩葛生蒙楚蘝蔓于野蛛絲網祠屋芝菌生畫拱去國二十年雪涕夙嚴奉更歷飽艱難左僖二十八楚子曰晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣抑搔知蛘痛內則問衣燠寒疾痛癢痾而敬抑搔之聞道下士笑老子云下士聞道大笑之轉物大人勇楞嚴經一切衆生從無始來迷巳為物失於本心為物所轉若能轉物即同如來平生隨風波歸來夢猶洶持此寸草心孟郊詩誰言寸草心報得三春暉負荷九鼎重史記平原君傳使趙重於九鼎大吕柔嘉無牛羊保身以為供詩柔嘉維則又云既明且哲以保其身供謂供飬其母也漢班倢妤傳求供飬大后長信宫退之作歐陽詹哀辝云以志為飬兮何有牛羊又按晉周顗母絡秀傅嘗置酒舉觴賜三子曰吾本渡江託足無所不謂尓等並貴列吾目前嵩起曰恐不如尊旨伯仁志大而才短非自全之道嵩性抗直不容於丗唯阿奴碌祿當在母目下耳保身蓋用此事次韻叔父聖謨詠鶯遷谷鴉舅頗強䀨莊子天下篇強䀨而不舍者也陸龜蒙挑菜詩云行歇每依鴉舅影挑頻時見鼠姑心按牡丹一名鼠姑用之去心以類推之則鴉舅亦當是一種草木之名山谷特借鴉舅字以名鴉耳僕姑嘗勃磎歐公詩云病識隂晴似勃姑又云天雨止鳩呼婦還鳴且喜勃姑僕姑皆鳩也米元章畫史又稱勃鳩莊子曰室無空虛則婦姑勃磎黃鳥懷好音詩黃鳥于飛注搏黍也陸機疏云黃鳥黃鸝留也或謂之黃栗留幽州人謂之黃鶯一名倉庚一名啇庚一名黧黃一名楚雀齊人謂之搏黍匪風云懷之好音秋菊染春衣西漢雜記黃鵠下太液池上為歌曰黃鵠飛兮下建章金為衣兮菊為裳嚶嚶求朋友詩伐木丁丁鳥鳴嚶嚶又曰嚶其鳴矣求其友聲憂患同一枝莊子逍遙篇鷦鷯巢於深林不過一枝提壷要酤我杜宇賦式微梅聖俞四禽言子規云不如歸去春山云暮提壷云提壷蘆沽美酒子規一名杜鵑蜀王本紀杜宇為望帝亡去化為此鳥伐木云有酒湑我無酒沽我衛國風式微式微胡不歸黃鳥在幽谷見上韜光飬羽儀易曰鴻漸于飛其羽可用為儀晴風曜桃李退之寄盧同詩云偶逢明月曜桃李言語自知時先生丘中隱喬木見雄雌引子遷緑隂相戒防禍機文選鮑明逺苦熱行生軀蹈死地昌志登禍機李善注引莊子曰其發若機括司馬彪曰禍敗之來若機栝之發班固漢書述曰禍如發機李杜死刀鋸後漢李固杜喬皆為梁兾所害死獄中李膺杜密死於黨錮時人亦稱李杜焉陳張怨棄遺前漢張耳陳餘相與為刎頸交後有隙餘相趙漢遣耳與韓信破趙斬餘詩將安將樂汝轉棄豫不如聽黃鳥永晝客爭棋説清水岩呈郭明叔并序清水岩號為天下勝處去縣庭才二十里一山空洞如覆青玉盎也寒泉在其間甚壯急至岩口伏流入石鼻中岩下有石鍾鼓磬其聲清越不敞衮衮跑跑能警動人丗間金革聲不足道也岩前平衍略可坐千人不審旌斾嘗因公事一遊否山海經河水其源渾渾泡泡注云水濆湧之聲交泡兩音嘗聞清水岩空洞極明好虎狼僲部曲仙傳拾遺郭文字文舉隱餘杭天柱山虎常馴優於左右亦可撫而牽之文出山虎必隨焉梚首隨行如羊犬耳晉書有傳事亦略同李廣傳行無部曲行陳鍾鼓天擊考唐國風子有鍾鼓弗鼓弗考注考擊也釋文鼓本或作擊雲生卧龍石水入煉丹竈有意携𬋩弦山祇應灑掃雙鳬謂郭令也事見上詩豈弟君子來遊來歌老杜雨過蘇端云諸家憶所歷一飯迹便掃次韻章禹直開元寺觀畫壁兼簡李德素丹素古藏壁風雨飽侵食拂塵開藻鑒老杜云持衡留藻鑒志士淚霑臆老杜云人生有情淚沾臆靈山逺飛來不可以智測臨安靈隱山有飛來峯晏元獻輿地志云晉咸和元年西天僧慧理曰此是中天竺國靈鷲山之小嶺不知何年飛來龍神湛回向楞嚴經有十回向擁衛立剱戟依稀吳生手旌斾略可識老杜云畫手看前輩吳生逺擅場又曰冕旒俱秀發旌斾盡飛楊又云依稀橘奴迹鴻濛插樓殿老杜靈湫作云東山氣蒙鴻宮殿近上頭又嶽麓山道林二寺行云殿腳插入赤沙湖毫髮數動植周禮大司徒其動物冝毛物其植物冝皂物廣牀瞻二聖有衆拱萬億詩云萬億及秭飛行湊六合莊子六合之內聖人論而不議六合之外聖人存而不論攬取著一席人人開生面老杜丹青引凌雲功臣少顔色將軍下筆開生面絶妙推心得丗説曹娥碑題云絶妙好辝李侯天機淺莊子大宗師篇其嗜欲深者其天機淺指點目所及杜詩指點虛無是征路三生石上夢甘澤謡記圎澤事云圎澤歌曰三生石上舊精魂賞月吟風不要論慙愧情人逺相訪此身雖異性長存天樂鳴我側大白登瓦官閣詩漫漫雨花落嘈嘈天樂鳴齒尋前日事退之詩幽尋事隨去晦明忽復易章生南溟鵬莊子北溟有魚化而為鳥其名為鵬海運則將徙於南溟也籠檻鎖六翮韓詩外傳鴻鵠一舉千里所恃者六翮耳能同寂寞遊濁酒聊放適文選嵇叔夜書濁酒一杯彈琴一曲志願畢矣西風葉蕭蕭蟋蟀依墻壁月令季夏蟋蟀居壁家無萬金産退之詩指渠相賀言此是萬金産四鄰砧聲急藜羮傲鼎食見上退之送惠師云囊無一金資翻謂冨者貧藍縷亦山立左宣十二篳路藍縷樂記㧾干而山立玉藻山立時行言雖貧而不動如山也並船有歌姝粉白眉黛黑淮南子云粉白黛黑韓文云粉白黛緑期公開顔笑醉語雜翰墨不須談俗事祇令人氣塞淳化帖王羲之書云而艱疾若此令人短氣此言熙豐之政聽崇德君鼓琴前集有姨母李夫人墨竹詩外集十一卷有觀崇德墨竹歌其序云姨母崇德君贈新墨竹圗且令作歌米元章畫史云朝議大夫王之才妻南昌縣君李氏尚書公擇之妹能臨松竹木石等畫見本即為之卒難辨月明江靜寂寥中大家斂𬒮撫孤桐後漢列女傳扶風曹丗叔妻同郡班彪之女數召入宫令皇后諸貴人師事焉號曰大家禹貢嶧陽孤桐古人巳矣古樂在孟子云今樂猶古樂倣佛雅頌之遺風妙手不昜得杜詩畫師亦無數好手不可遇善聽艮獨難猶如優曇華時一出丗間法華經云如是妙法諸佛如來時乃説之如優曇鉢花時一現耳疏云優曇鉢花名瑞應現則金輪王出兩忘琴意與巳意乃似不著十指彈孟郊妾薄命云不惜十指弦為君千萬彈禪心默默三淵靜莊子應帝王篇鯢桓之審為淵止水之審為淵流水之審為淵淵有九名此處三焉注云淵者靜默之謂耳幽谷清風淡相應絲聲誰道不如竹晉孟嘉傳絲不如竹竹不如肉我巳忘言得真性罷琴窗外月沉江万籟俱空七絃定杜詩罷琴惆悵月照席次韻答楊子聞見贈金盤厭飫五侯鯖見上注玉壷澆潑郎官清國史輔云酒則郢之冨水烏程之若下滎陽之土窟春剱南之燒春京城之蝦蟇陵郎官清長安市上醉不起老杜云李白一斗詩百篇長安市上酒家眠左右明粧奪目精退之李花詩云靜濯明粧有所奉目精見上結交賢豪多杜陵班孟堅西都賦云鄉曲豪舉遊俠之雄連交合衆馳騖乎其中若乃觀其四郊浮遊近縣則南望杜霸北眺五陵英俊之域紱冕所興注云宣帝葬杜陵文帝葬霸陵挑李成蹊見上卧落英上林賦垂條扶疏落英憣纚黃綬今為白下令元注云大和縣古白下漢朱博傳云刺史不察黃綬師古曰丞尉聀卑皆黃綬蒼顔只使故人驚督郵小吏皆趍版晉陶潛傳潛為彭澤令素簡貴不私事上官郡郵至邑吏白應束帶見之潛嘆曰吾不能為五斗米折腰拳拳事鄉里小人解印去縣趍版謂執手版而趍手版見上退之詩勿慊法官未登朝猶勝赤縣長趍尹趍字蓋取此義陽春白雪分吞聲江淹恨賦莫不飲恨而吞聲杜詩吞聲躑躅涕淚零楊君青雲貴公子劉伶酒德頌云貴介公子歎嗟簿領困書生贈我新詩甚髙妙淚斑枯笛月邊橫述異記舜葬蒼梧之野二妃淚下沾竹文悉為之斑文章不直一杯水大白云吟詩作賦北窗裏萬言不直一杯水老矣忍與時人爭江城歌舞聊得醉但願數有美酒傾莫要朱金纏縛我陸沉丗上貴無名楊子法言紆朱懷金之樂老子曰無名萬物之始又曰道常無名食笋十韻前集上子瞻書云聞燕坐東坡心醉六經又云比以聀事在山中食笋得小詩輒上寄一笑旁州士大夫和詩時有佳句要自不滿人意莫如公待我厚願為落筆思得申紙疾讀如老杜所謂一洗萬古凡馬空者按坡集和篇乃將去黃州時作山谷至太和蓋元豐四年春庚申歲七年甲子歲春移監德平鎮坡亦以七年春移汝州此詩當是六年作洛下斑竹笋花時壓鮭菜庾郎貧食鮭巳見上注杜詩云自愧無鮭菜空煩卸馬鞍鮭戶佳切韻曰魚名出吳志一束酬千金掉頭不肯賣杜詩巢父掉頭不肯住我來白下聚此族冨庖宰退之鬪雞詩義肉恥庖宰繭栗戴地翻觳觫觸墻壞退之詠笋云見角牛羊沒又云穰穰疑翻地天地之牛角繭栗見記觳觫見孟􅋾􅋾入中厨詩尓羊來思其角濈濈如償食竹債楞嚴經云身為畜生酬其宿債詩意謂牛羊食竹及死為笋為人所食若償債然又用傳燈録死為菌令人食之之意按第十五祖那提婆傳尊者既得法後至毗羅國有長者園樹生大耳如菌味甚美惟長者與第二子羅㬋羅取而食之盡而復生餘皆不得見時尊者知其宿因長者問其故尊者曰汝家昔供飬一比丘然此比丘道眼未明以虛霑信施故報為木菌惟汝與子得享甘𦵔和菌耳𦵔酢菜也菌耳即上注辛膳胹薑芥左宣二年使宰夫胹熊蹯烹鵝雜股掌炮鱉亂群介江南别録云僧謙明好詩酒烈祖問其所求曰惟願鵝生四個腿鱉生兩重裙陶嶽五代史輔亦云詩韓奕云炮鱉鮮魚小兒哇不美孟子出而哇之注吐也鼠壤有餘嘬莊子鼠壤有餘𬞞孟蠅蚋蛄嘬之可貴生於少古來食共噫尚想髙將軍五溪無人采明皇雜録髙力士謫黔州山谷多薺而人不食力士作詩曰兩京作斤賣五溪無人采夷夏雖有殊氣味都不改蕭巽葛敏修二學子和豫食笋詩次韻答之吳氏漫録云山谷南還至南葉竹軒令侍史誦詩板戒勿言姓名一絶句云不用山僧供帳迎丗間無此竹風凊獨拳一手支頥卧偷眼看雲生未生徐視姓名曰果吾學子葛敏修也此篇言二妙各能詩果不誣北饌厭羊酪南庖豐笋菜自北初落南幾為兒所賣史記越丗家陶朱公中男殺人事莊生羞為兒子所賣習知價廉平史記吳起傳起廉平能得士心此摘其字百態事烹宰􅐭晞枯臘瘦蜜漬真味壞就根煨茁美茁出也見上豈念炮烙債史記周紀西伯請紂去炮烙之刑咀吞千畒餘退之南食詩咀吞面汗騂史記貨殖傳渭川千畒竹胸次不蠆芥子虛賦其於胸次曽不蠆芥二妙各能詩才名動江介楚詞長江介之遺風魏都賦與江介之湫湄注云韓詩章句曰介界也詩論多佳句膾灸甘我嘬孟膾炙與羊棗孰美言其詩膾炙人口也曲禮母嘬灸注嘬謂一舉盡臠因君思飬竹萬籟聽秋噫莊子齊物篇汝聞地籟而未聞天籟又云大塊噫氣其名為風從此繕藩籬下令禁漁菜韭黃照春盤菰白媚秋菜本草菰根蔣草也江南人呼為茭草圗經云又名茭白惟此蒼竹苗市上三時賣江南家家竹剪伐誰主宰詩勿剪勿伐半以苦見踈不言甘昜壞表記君子之接如水小人之接如醴君子淡以成小人甘以壞莊子山木篇亦云云葛陂雕龍睡未索兒孫債後漢費長房傳長房辝歸翁與一竹杖曰騎此任所之則自至矣既至可以杖投葛陂中也房乘扙須臾來歸即以扙投陂顧視則龍也莊子千金之珠必在驪龍頷下子能得之必遭其睡也獺膽能分杯虎魄妙拾芥本草序例云礠石引針虎珀拾芥戎鹽纍卵獺膽分杯此物於食殽如客得儐介漎食貨志夫鹽食肴之將思入帝鼎烹忍遭飢涎嘬懶林供翰墨砧杵風號噫每下歎枯株焚如落樵采懶林疑字誤詩意謂其始也思入大烹以享上帝之鼎其次為筆以供翰墨最下枯稿而為樵夫所采頗合針規之意焚如見昜離卦每下愈况見莊子知北遊篇胡朝請見和復次韻人笑庾郎貧滿胸飯寒菜見上春盤食指動左宣上云子公之食指動曰他日我如此必嘗異味笋茁入市賣回首万錢厨不羡廊廟宰晉何曽日食万錢文選李陵答蘇武書聞子之歸無尺士之封而親戚貪佞之類悉為廊廟宰民生暫神竒見上胞雋伐性壞枚叔七發云皓齒蛾眉命曰伐性之斧甘脆肥醲命曰腐腸之藥蓋取呂氏春秋靡曼皓齒命曰伐性之斧肥肉厚酒命曰爛腸之食雋永見上注謂肥肉胞當作肥又疑是庖字東方朔傳館陶公主胞人師古曰胞與庖同忍持芭蕉身見上多負牛羊債楞嚴經云以人食羊羊死為人人死為羊死死生生互來相取汝負我命我還汝債籜龍不稱冤盧同寄男抱孫詩云竹林吾最惜新笋好看守万籜包龍兒攢迸溢林藪又云籜龍正稱冤莫殺入汝口丁寧囑託汝汝活籜龍否昜致等拾芥夏侯勝傳如俯拾地芥蕭蕭煙雨姿壯士持戈介駢頭沸鼎烹易貫魚以宫人寵注云貫魚謂五隂駢頭相次似貫魚也退之義魚詩駢首類同條可口垂涎嘬莊子云其味相反而皆可於口杜道逢麴車口流涎霜叢負後凋玉食香餘噫書惟辟玉食晉王濬玉食錦服續詩無全功列子天地無全功葑菲倘可采詩采葑采菲寄李次翁雨斷山川明老杜詩楚天不斷四時雨花深鳥烏樂見上枯骨不霑名列子曰死後餘名豈足潤枯骨古今同一壑漢楊惲傳古與今如一丘之壑注云言其同類也惟有在丗時聊厚不為薄文選古詩斗酒聊相娛聊厚不為薄南箕與北斗親友多離索南箕北斗見一卷注記檀弓離羣而索居斯文如舊歡李侯極磊落頗似元魯山用心撫疲弱元德秀字紫芝為魯山令有德政天下髙其行不名謂之元魯山詳見唐書卓行傳前集有贈別李次翁四言詩其略云觀物慈哀蒞民愛莊而此詩又比之元魯山此人當是作邑張方回家本編四言詩於太和詩中此詩亦在太和作不以民為梯俯仰無所作胸中種妙覺圜覺經由彼妙覺性遍滿故根性塵性無壞無雜歲晚期必穫然膏夜讀書見聖冝有作書君陳未見聖若不克見聖文字寄我來官郵逺飛橐橐謂置筒也白樂天云與徽之唱和來去常以竹筒貯丗緣心巳死倘得万金藥万金良藥見灌夫傳題髙君正適軒至靜在平氣至神惟順心道非貴與賤逹者古猶今見上功名屬廊廟間暇歸山林巳見廊廟等山林注畜魚觀群嬉籠鳥聽好音詩晛晥黃鳥載好其音文選潘嶽秋興賦曰池魚籠鳥有江湖山藪之思不如一丘壑隨願得飛沉前漎敘傳云漁釣於一壑則万物不姦其志栖遲於一丘則天下不昜其樂開門納日月選詩璇題納明月呼客解纓簪詩書撫塵迹歌舞送光隂妖􅈺傾國笑上林賦妖治間都史記作妖治􅈺都陽城下蔡傾城傾國見上絲竹感人深樂記曰物之感人無窮而人之好惡無節豁然開胸次風至獨披襟宋玉風賦楚襄王有風颯然而至者王乃披襟而當之曰快哉此風樊籠鎖形質物外有幽尋退之詩幽尋事隨去孰能量近逺又云物外日月本不忙奉送周元翁鎖吉州司法廳赴禮部試按山谷跋尾元翁名壽江南江北木葉黃楚詞洞庭波兮木葉下五湖歸鷹天雨霜後漢隗囂傳范蠡乘扁舟於五湖杜詩青楓葉赤天雨霜繫船湓城秣髙馬湓城江州也言自此陸行文選馬賦旦刷幽燕晝秣荆越退之云膏吾車兮秣吾馬客丁結束女縫裳詩可以縫裳貢書登名徹未央退之復志賦豈不登名於一科兮曽不補其遺餘髙帝紀蕭何治未央宫不此長卿薄遊梁司馬長卿病免客遊梁見本傳梁即汴京也南山霧豹出文章見上去取公卿昜驅羊杜牧示阿冝云願汝出門去取官如驅羊與君𥘉無一日雅漎谷永傳永奏書謝王鳯曰永無一日之雅左古之介傾蓋許子如班楊家語孔子之郯遭程子於塗傾蓋而語鄒陽傳語曰白頭如新傾蓋如故班謂固楊謂雄也囚拘官曹少相見服鳥賦愚士繫俗僒若囚拘忽忽嵗晚稼滌埸詩十月滌埸一杯僚友喜多在謝守不見空澄江澄江如練明橘柚謝朓元暉詩云餘霞散成綺澄江淨如練元暉為宣城守南中榮橘柚亦元暉詩也萬峯相倚摩清蒼莫堂醺醺客𬒳酒漎髙祖𬒳酒夜徑宅中艷歌䀨醉燭生光前集聽宋宗儒摘阮歌云促弦䀨醉驚客起兩用此字按春明退朝録云大宗嘗謂侍臣曰後唐莊宗湛飲以鄭聲與胡部合奏謂之䀨帳自昏逹旦不息山谷蓋取此意椎鼓發船星斗白杜詩負鹽出井此溪女打鼓發船何郡郎明日各在天一方杜云我行山川異各在天一方寒鴉滿枝二橋宅樽前顧曲憶周郎吳志周瑜傳時年二十四吳中皆呼為周郎從孫䇿攻皖城拔之得橋公二女國色䇿自納大橋瑜納小橋瑜少精意於音樂雖三爵之後其有闕誤瑜必知之知之必顧故時人謡曰曲有誤周郎顧寰宇記云橋公亭在舒州懷寧縣北隔皖水一里同安志有橋公亭記云聞之耆耋橋公之舊居也鱸魚斫膾蔗為漿後漢左慈在曹操坐操曰今日髙會珍羞略備所欠吳松江鱸魚耳元放曰此可得也因求銅盤貯水以竹竿餌釣於盤中須臾引出一鱸魚又餌釣沉之須臾復引出皆長三尺餘操使目前鱠之周浹會者蔗漿見上恨君不留誰與嘗殿前春風君射䇿漢庭諸公必動色杜詩滿堂動色嗟神妙射䇿見上故人若問黃𥘉平將作金華牧羊客大白詩金華牧羊乃是紫煙客葛洪神仙傳黃𥘉平年十五家使牧羊有道士將至金華山四十餘年其兄初起求得之問羊何在𥘉平言叱叱羊起於是白石皆起成羊數萬頭寄朝元忠十首國工裁白璧考工記輪人曰可規可矩謂之國工巧冶鑄干將王褒云巧冶鑄千將之璞吳越春秋云千將吳人也能為剱作二枚一曰干將二曰莫耶莫耶干將之妻成為萬乘器白日吐寒光漢鄒陽傳云荆軻慕燕丹之義白虹貫日又云蟠木根柢而為萬乘器其誰湔沸汝歲月海生桑神仙傳王逺字方平過蔡經家麻姑亦至麻姑自説接待以來見東海三為桑田蛛網連城玉史記藺相如傳趙得和氏璧秦顧以十五城請易璧苔生百錬剛文選劉越石詩何意百練剛化為繞指柔子雲賦逐貧楊雄逐貧賦見本傳退之文送窮退之此文蓋擬逐貧而筆力逺過之二作雖類俳漢枚乘傳其孽子皋詼笑類俳倡又云皋賦辝中自言為賦不如相如又言為賦乃俳見視如倡自悔類倡也頗見壯士胸朝子行問津語使子路問津欲濟無山窮山窮事見左宣下著書蓬蒿底端有古人風古人風見上文選雜擬詩顧念張仲蔚蓬蒿滿中園注引三輔決録云張仲蔚隱身不仕明天官博物所居蓬蒿沒人沙擁大江水韓信傳龍且與信夾維水陳信乃夜令人為万餘囊盛沙以壅水上流引兵半度擊龍且陽不勝還走龍且追度水信使決壅囊水大至龍且軍大半不得度即急擊殺龍且泥封函谷閞隗囂傳囂將王元説囂曰臣請以一丸泥為大王封函谷閞此万丗一時也古來丗上雄宰木風雨寒見上魯儒守一經亦有澗谷槃漎韋賢傳遺子黃金滿籝不如一經賢號稱鄒魯大儒詩考槃在澗何事窮愁極江南庾子山史記虞卿傳云虞鄉非窮愁亦不能著書以自見於後丗云庾信字子山作哀江南賦後周書具載其詞河清無人待見上蘭芳無人采退之琴操云蘭之猗猗揚揚其香不採而佩於蘭何傷山空露團團詩零露團兮團作漙葛蔓石磊磊楚詞石磊磊葛蔓蔓丗有傾國媒一笑珠百琲吳都賦金溢珠琲注金二十四兩為溢珠十貫為一琲傾國見上往時你處士顛倒孔北海見後漢你衡傳楚宮細腰死長安眉半額馬援傳子廖上疏長樂宫云傳曰吳王好剱客百姓多創瘢楚王好細腰宮中多餓死長安語曰城中好髙髻四方髙一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實比來翰墨埸文選謝宣逺詩粲粲翰墨埸爛熳多此色文章本心術万古無轍迹老子善行章善行無轍迹吾嘗期斯人隱若一敵國漎劇孟傳大將軍得之若一敵國云後漎吳漎傳帝歎曰吳公差強人意隱若一敵國矣北書來無期鴈不到梅嶺杜詩短日行梅嶺蓋謂大庾嶺上梅也衡山有回鴈峯子厚過衡山詩云正是峯前回鴈時欲之雙鯉魚之字誤遺我雙鯉魚見上楓葉江路永平生中心願𥚹短不獲騁冨貴安可為吾亦有岑鼎韓非子云齊伐魯索讒鼎魯以其鴈往齊人曰鴈也魯人曰真也齊人曰使樂正子春來吾將聽子魯君請樂正子春子春曰胡不以其真往君曰吾愛之答曰臣亦愛臣之信又按新序云齊攻魯求岑鼎魯載鼎往齊不信而反之使人告魯君桞下惠以為是則請受之魯君請於下惠對曰君之欲以為岑鼎也以免國也臣亦有國於此破臣之國以免君之國此臣所難也魯君乃以真岑鼎往桞下惠可謂守信矣信之於人重矣言不可以冨貴而易其素守也濟岱有佳人漢外戚北方有佳人絶丗而獨立肌膚若氷雪莊子逍遙篇藐姑射之山有神人焉肌膚若氷雪婥約若處子我願從之遊輔我黥與刖莊子大宗師篇庸詎知夫造物之不息我黥而輔我刖了不解人嗔真成一癡絶見上櫟社定頽然聊用神吾拙神拙見上山公懷涇渭濬沖遭鑒賞山濤傳濤所奏甄拔人物各為題目時稱山公啓事王戎傳戎有人倫鑒識常目山濤如渾金璞玉人皆欽其寶莫知名其器弟敦有髙名戎惡之後果逆亂其鑒賞類如此濬沖戎字也代豈無若人吹噓青雲上念君如濟水抱清伏泉壤文選謝泉暉詩濁河穢凊濟注引戰國䇿張儀説秦王曰清濟濁河足以為阻尚注曰濟水入河並流數十里而南截河又並流數里溢為榮澤行潦酌尊彜吾猶恃源往大雅浻酌彼行潦書作會宗彛注宗庿彛樽蛾眉在蒿萊衛國風云螓首蛾眉以美人比君子也金玉千里音詩無金玉尓音遙思甑生塵後漢范丹傳丹字史雲閭里歌之曰甑中生塵范史雲釡中生魚范萊蕪汗漫觀古今沉冥驚人句楊子法言蜀莊沉冥老杜詩句不驚人死不休摹寫詠時禽無為愁肝腎君子要刳心元稹作老杜墓志云擺去拘束摹寫勸象退之贈崔立之云勸君韜飬待徴招不用雕琢愁肝腎莊子天地篇君子不可以不刳心焉臨川往長懷神交可心晤論語子罕篇子在川上曰逝者如斯夫不舍晝夜此段説者不一獨景迂講義云江熙曰人非山立俯仰而過臨川興懷能不慨然山谷意恐或近此文章不經丗文選應休璉百一詩云文章不經國筐篋無尺書風期南山霧見上化蟲哦四時退之詩化蟲枯挶莖悲喜各有故吾獨無間然子規勸歸去子規云不如歸去苐二卷有次韻朝元忠十詩與此詩同是元豐己未作巳注其詳次韻周法曹遊青原寺即周元翁市聲故在耳説苑孔子謂弟子曰違山千里蟪蛄之聲猶在耳一原謝塵埃乳竇響鍾磬選詩南鄰擊鍾磬翠峯麗昭回詩倬彼雲漢昭回于天俯看行磨蟻晉天文志日月實東行而天牽之以西沒如蟻行磨石之上磨左旋而蟻右去車馬度城隈水猶曹溪味山自思公開傳燈録行思禪師傳吉州安城人聞曹溪法席乃往參禮問曰當作何所務即不落階級云云祖深器之師既得法住吉州清源山淨居寺有沙彌希遷問曰曹溪大師還識和尚否師曰汝今識吾否曰識又爭能識得師曰衆角雖多一麟足矣浮圗湧金碧浮圗塔也杜詩潤聚金碧氣文選陸機連珠曰金碧之岩必辱鳯舉之使廣廈構瓌材蟬蛻三百年史記屈原傳蟬蛻於穢濁至今猿鳥哀祖印平如水傳燈録𥘉祖逹磨傳師曰肉傳法印以契證心外付袈裟以定宗旨有句非險崖心花照十方圜覺經丗尊告普覺菩薩云心花發明照十方利𥘉不落梯階不落階級見此篇注步步踏佛階梯見傳燈録法融禪師傳我行暝託宿夜雨滴華榱殘僧四五輩法筵歎塵埋石頭麒一角見上本傳云師付法石頭道價直九垓相如封禪書云上暢九垓廬陵米貴賤傳與後人猜本傳云僧問如何是佛法大意師曰廬陵米作麼價曉躋上方上上方見維摩經杜詩上方樓閣晚秋塍亂箕荄寒藤上老木龍蛇委筋骸記禮運元肌膚之會筋骸之束魯公大字石筆勢欲崩摧德人曩來遊頗有嘉客陪憶當擁旌旗千騎相排豗且復歌舞隨絲竹寫煩哇事如飛鴻去名與南斗偕松竹吟髙丘何時更能來顔真卿貶吉州司馬大字當是紀遊也回首翠微合尓雅山未及上翠微于役王事催詩君子于役又王事靡盬猿鶴一日雅重來尚徘徊孔德璋北山移文云蕙帳空兮夜鶴怨山人去兮曉猿驚詩意謂猿鶴既有一日之雅再來尚可從容也一日之雅見漢書谷永傳答永新宗令寄石耳永新與太和皆吉州屬邑飢欲食首山薇史記伯夷傳義不食周粟隱於首陽山采薇而食之渴欲飲頴川水莊子讓王篇故許由娛於頴陽後漢逸民傳序云堯稱則天不屈頴陽之髙注云頴陽謂巢許陸士衡猛虎行渴不飲盜泉水熱不息惡木隂太白詩有耳莫洗頴川水有口莫食首陽蕨嘉禾令尹清如氷文選白頭吟清如玉壷氷寰宇記永新縣西北有禾山寄我南山石上耳筠籠動浮煙雨姿杜詩西蜀櫻桃也自紅野人相贈滿筠籠瀹湯磨沙光陸離莊子疏瀹而心澡雪而精神上林賦牢落陸離爛漫逺遷竹萌粉餌相發揮尓雅笋竹萌禮記內則糗餌粉酏劉夢得楊桞枝詞云桃紅李白皆誇好須得垂楊相發揮芥薑作辛和味冝禮記王制中國夷蠻戎狄皆有安居和味冝服公庭退食飽下筯詩退食自公晉書無下筯處杞菊避席遺萍虀陸龜蒙有𣏌菊賦韭萍虀見石崇傳借使孝經避席字鴈門天花不復憶代州鴈門郡五臺山有天花菌沉乃桑鵝與豬雞桑鵝未詳東坡和陶詩云老豬生樹雞當是黃耳菌屬小人藜羹亦易足嘉𬞞遣餉荷眷私吾聞石耳之生常在蒼崖之絶壁老杜桂君髙堂之絶壁此用其句律苔衣石腴風日炙苔衣石髮見上注捫蘿挽葛採萬仞文選謝靈運詩薜蘿若在眼又云葛弱豈可捫仄足委骨豺虎宅莊子側足而墊之及黃泉佩刀買犢剱買牛漎龔遂傳民有帶持刀剱者使賣剱買牛賣刀買犢曰何為帶牛佩犢作民父母今得聀漎趙廣漎傳盛制豪強小民得聀注云聀常也閔仲叔不以口腹纍安邑後漎書太原閔仲叔丗稱節士客居安邑日買豬肝一片屠者或不肯與安邑令聞敕吏常給焉仲叔曰閔叔豈以口腹纍安邑耶我其敢用鮭菜煩嘉禾鮭菜見上願公不復甘此鼎免使射利登嵯峨文選吳都賦冨中之氓貨殖之選乘時射利財豐巨万司馬相如賦分工入曽宫之嵳峩喜知命弟自青原歸為吏困米􅐭漎黃伯傳米鹽靡密𥘉若煩碎注米鹽言雜而且細曲肱夢靈泉諒非調鼎手正覺荷鋤便選詩王生和鼎實淵明詩帶月荷鋤歸在公雖勤苦詩夙夜在公歸喜叔山禪莊子德充符篇魯有兀者叔山無趾踵見仲尼知命山谷弟也足蹇故比之叔山去我忽數日草蟲傍牀煎詩十月蟋蟀入我牀下屋角鳥烏樂見上行輿響簷肩退之聮句劉熟簷肩頳包解分柿栗老杜北征詩粉黛亦解包兒女閙樽前白紵繞祖塔知命布衣也故稱白紵鮑照集有白紵歌沈約有四時白紵歌青原山思公塔詳見上注香携青原煙玄珠一百八莊子象罔得玄珠以言數珠也夜紉湘縷穿內則紉針請輔綴紉女陳反湘當作緗按説文緗帛淺黃色也髙林風落子老僧選霜堅杜詩葉裏松子僧前落袖中出新詩山水含碧鮮五言吾老矣佳句付惠連謝靈運詩山水含清暉惠連靈運弟也事見南史本傳寄張冝父建德之國有佳人莊子山木篇市南冝僚謂魯君曰南越有邑名為建德之國云云文選江文通雜擬詩云幸逰建德鄉亦用此事而池州有建德縣冝父乃此縣人耶明珠為佩玉為衣去國三歲阻音徽詩思齊大姒嗣徽音箋徽美也所種桃李民愛之説苑簡子謂陽虎曰樹桃李者夏得休息秋得食焉樹蒺藜者夏不得休息秋得其刺焉射陽城邊春爛熳楚州山陽縣本漢射陽縣地張冝父當是建德人而仕於山陽時巳解去桞暗學宫鳥相喚追隨裘馬多少年老杜壯遊詩放蕩齊趙間裘馬頗清狂退之云從兹冨裘馬寧復茹藜蕨肥馬輕裘本出論語獨忍長飢把書卷讀書萬卷不直錢一作筆有神杜詩讀書破萬卷下筆如有神漢灌夫傳夫曰平生毀程不識不直一錢此用其字太白詩吟詩作賦北窗裏萬言不直一杯水此用其意逐貧不去與忘年一作交親逐貧賦見上莊子忘年忘義南史江揔傳輿張纘等為忘年友虎豹文章𬒳禽縛易大人虎變其文炳也君子豹變其文蔚也何如逹生自娛樂莊子有逹生篇髙至言築亭於家圃以奉親㧾其觀覽之冨退之南山詩﨑嶇上軒昴始得觀覽冨命曰溪亭乞余賦詩余先君之弊廬望髙子所築不過十牛鳴耳釋氏書五里為一牛鳴故余未嘗登臨而得麒處逸人生長在林泉更築亭皋名意在上林賦亭皋千里靡不𬒳築明月清風共一家傳燈録張拙頌云凡聖含靈共我家南史謝譓傳入吾室者但有淸風對吾飲者惟當明月全以山川為眼界多心經無眼界無意識界鳥度雲行閲古今太白詩人行明鏡中鳥度屏風裏昜雲行雨施溪濵木末聽竽籟杜詩万籟真笙竽本出髙唐賦纎條悲鳴聲似竽籟老夫平生行樂處只今許公分一派東坡集中文與可畫竹記云余為徐州與可以書遺余曰近語士大夫吾墨竹一派近在彭城可往求之雕陂雕陂之水清且泚老杜云蛟之橫出清泚屈為印文三百里呼船載過七十餘褰裳亂流初不記鄭風子惠思我蹇裳涉溱雕亦作雕韻書云琢文也乘舟七十餘渡徒涉者不可復記竹輿嘔啞見上山徑涼僕姑呼婦聲相倚見上篁中見上猶道泥滑滑泥滑滑蜀中號雞頭鶻僕夫慘慘耕夫喜窮山為吏如漫郎漫郎唐元結自謂也見本傳安能為人作嚆矢莊子在宥篇知曽史之不為桀跖之嚆史也老僧迎謁喜我來吾以王事篤行李鮑明逺詩手迹可傳心願尓篤行李知民虛實應縣官我寧信目不信耳霍光傳縣官非我家將軍不得至是如淳曰縣宮謂天子東平王宇傳縣官年少張晏曰不敢指斥成帝謂之縣官髙士傳孔子曰吾之信顔回非獨今日所信者目目猶不可信僧言生長八十餘縣令未曽身到此幾復寄檳榔且答詩勸豫同種次韻寄之少來不食蟻丘漿莊子則陽篇孔子之楚舍於蟻丘之漿詞多不録老去得意􅃮園方見上鑑中巳失兒時靣忍能乞與賔作郎傳燈録云認奴作郎此摘其字獨未知其意所指也元翁坐中見次元寄到和孔四飲王夔玉家長韻因次韻率元翁同作寄湓城雨罷山澤明日長花桞困老杜春光懶困倚微風遊絲上天衢老杜落花遊絲白日靜觀物得無悶易遁丗無悶酒德頌云俯觀萬物時從顧曲人周瑜傳曲有誤周郎顧以言周元翁笋饌酌春醖季子未識面想見眉目俊新詩如鳴絃快讀開鄙吝後漢黃憲傳時月之間不見黃生鄙吝之萌復存乎心銅官魯諸生事道三無愠語三巳無愠色比來工五字句法妙何遜梁記室兼水部郎何遜字仲言有詩集枯棊覆吳圗王逢云別後竹窗風雪夜一燈明滅覆吳圖齊書曰能棊人琅邪王抗為苐一品關郡禇思莊會稽夏赤松第二品宋文帝丗羊玄保戲因製局圗還於帝前覆之青簡玩秦燼後漢吳祐傳殺青簡以寫書葉暗黃鳥時見上風號報花信東皋雜録云江南自初春至初夏有二十四風信梅花風最先㨂花風最後唐人詩曰棟花開後風光老梅子黃時雨意濃晏元獻詩亦曰二十四畨花信風是也遙仰吟思若江錦割向盡南史江淹傳夢一人自稱張景陽謂曰前以一匹錦相借今可見還探懷中得數尺與之此人大恚曰那得割截都盡顧見丘遲曰餘此數尺無所用以遺君自是淹文章躓矣應煩王公子又破黃封印宫酒以黃羅帕封之再次孔四韻寄懷元翁兄弟并致問毅甫書帙蠧魚乾退之云豈殊蠧書蟲生死文字間爐香眠鴨困李義山云舞鸞鏡匣收殘黛睡鴨香爐換夕薰佳人來無期選詩佳人殊未來詩句且排悶杜詩排悶強裁詩遙知烏衣遊劉夢得金陵五題云朱雀橋邊野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家蓋江左諸王多居烏衣巷建康圗經云在上元縣東南四里㭟局具肴醖爭道嘲不恭漎吳王濞傳吳太子入見得侍皇太子飲博吳太子素驕博爭道不巷鏖兵勞得俊漎霍去病傳合短兵鏖皋蘭下師古曰鏖謂苦擊而多殺也左傳云得雋曰克頗尋文獻盟文獻見論語不落市井吝楊子云市井相與言則以財與利四月明朱夏南風解人愠帝王丗紀曰舜彈五絃琴歌南風曰南風之薰兮可以解吾民之愠兮風前懷二陸家法窺抗遜晉陸機傳祖遜吳丞相父抗吳大司馬太康未與弟雲俱入洛范陽盧志於衆中問機曰陸遜陸抗於君近逺機曰如君於盧育盧班志默然身有三尺桐㸑下得餘燼焦尾琴見上端可張洞庭莊子黃帝張樂於洞庭之野家闊丗未信為我謝孔君舉酒取快盡丗故安足存文選潘正叔詩丗故尚未夷青天飛鳥印退之聮句云沙篆印回平蓋言鳥迹印沙今言印青天山谷外集詩注卷之五
