  text: 山谷外集詩注卷第十一
  hash: sha256:3f996cc5782494d5e2df990e8ecfd5bdebf6d0b8e626bc19fec50e353c8b4e71
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_011-1a}
body:
  text: 徐孺子祠堂喬木幽人三畒宅寰宇記洪州南昌縣徐孺子宅在州東北三里孺子美梅福之德於福宅東立宅芻一束向誰論後漢徐稚傳郭林宗有母憂稚往弔之置生芻一束於廬前而去藤蘿得意干雲日後漢丁鴻傳干雲蔽日之木起於蔥青蕭鼓何心進酒樽白屋可能無孺子文選樂府云周公下白屋吐哺不及餐黃堂不是欠陳蕃本傳陳蕃為大守不接賔客唯稚來特設一榻後漢郭丹傳以丹事編署黃堂以為後法注黃堂大守廳事古人冷淡今人笑湖水年年到舊痕杜詩江流復舊痕送徐隱父宰餘干餘干隸饒州地方百里諸侯國翻手氷霜覆手炎漢陸賈謂尉他曰越殺王降漢如反覆手耳老杜詩翻手作雲覆手雨贅壻得牛庭少訟舊唐書張允濟傳大業中為武陽令元武縣鄰接人有以牸牛依其婦家者八九年牛孳生十餘頭及將異居婦家不與纍政不能決其人詣武陽質於允濟允濟令左右縳牛主以衫蒙其頭將至村中云捕盜牛賊召村中牛悉集問所從來妻家不知其故指其所訴牛曰此女壻家牛也非我所知允濟發蒙曰此即女壻以牛歸之妻家叩頭伏罪長官齋馬吏爭廉舊唐書馮元淑傳則天時歷浚儀始平二縣令未嘗以妻子之官所乘馬午後不芻云令其作齋身及奴僕日一食而已邑中丞掾隂桃李案上文書略米鹽米鹽見上治狀要須聞豈弟此行端為霽威嚴漢魏相傳為霽威嚴天上麒麟來下瑞南史徐陵傳陵年數歲釋寶志摩其頂曰天上石麒麟也韓詩黃至行生祥下瑞無時期江南橘柚間生賢玉臺書在猶騷雅玉臺新詠徐陵所編也孺子亭荒只草煙見上半丗功名𥘉墨綬後漢志千石六百石墨綬同兄文字敵靑錢同兄疑舛誤唐張薦傳祖鷟字文成貟半千稱鷟文詞猶靑銅錢萬選萬中時號靑錢學士割雞不合庖丁手割雞焉用牛刀也家傳風流更著鞭著鞭見上家傳言其家丗也詩中皆用徐姓事答德甫弟鳥啼花發獨愁思楊太真傳明皇云鳥啼花落水緑山青憐子三章怨慕詩孟子曰怨慕也鴻鴈雙飛彈射下脊令同病急難時詩常棣鶺鴒在原兄弟急難功名所在猶爭死意氣相須尚不移文選輕死重氣結黨連群意氣相須當是相傾大白扶風豪上歌意氣相傾山可移何况極天無以報詩欲報之德昊天罔極林回投璧負嬰兒見上元注云時以父事兄弟俱在縲紲何造誠作浩然堂陳義甚髙然頗喜度丗飛曻之説築屋飯方士願乘六氣遊天地間故作浩然詞二章贈之公欲輕身上紫霞黃庭經上清紫霞虛皇尊瓊糜玉饌厭豪奢瓊糜見上吳都賦珠服玉饌百年丗路同朝菌莊子朝菌不知晦朔九鑰天關守夜義夜義守門見上霜檜左紉空白鹿寰宇記譙縣太淸宫有檜樹鹿迹存焉范文正公太淸宫九詠序左紉檜其一也石蔓卿詩引太清記云老子手植此檜根株枝幹皆左紉金爐同契漫丹砂魏伯陽撰參同契其書論丹砂祕訣要令心地間如水萬物浮沉共我家心地見上萬物浮沉共我家淸明心水遍河沙傳燈録張拙頌云光明寂照遍河沙凡聖含靈共我家無鈎狂象聽人語佛遺教經汝等當好制心心之可畏甚於毒蛇惡獸怨賊太火越逸未足喻也譬如狂象無鈎猿猴得樹騰躍踔躑難可禁制當急挫之無令放逸縱此心者喪人善事露地白牛看月斜見第二卷注小雨呼兒蓻桃李踈簾幃客轉琵琶塵塵三昧開門户不用丹田飬素霞華嚴經有剎剎塵塵第十會祖庭事苑三昧者三之曰正昧之曰定亦云正受謂正定不亂能受諸法黃庭經回紫抱黃入丹田詩意勸以釋氏三昧勿學道家修飬之法題前定録贈李伯牗五賊追奔十二宮維摩經云樂離五欲樂觀五隂如怨賊五隂即心經五藴皆空也色受想行識是為五隂東坡詩君知五藴都是賊十二宮即十二辰也白頭寒士黑頭公晉王珣與謝玄俱為桓溫所重溫曰王掾當作黑頭公明朝一飯先書籍前定録韓晉公滉在中書嘗召一吏不時至將撻之吏曰某不幸兼屬隂司主三品以上食料公曰若然吾明日當何食吏請疏於紙明旦既對適太官進糕麋上以半賜公食之美又賜焉退而腹脹進橘皮湯夜啖漿水粥及旦視其書皆如其説因問以人間所食皆有籍耶對曰然三品以上日支五品旬支六品至九品季支庶人歲支安用研桑作老翁班固賔戲研桑心計許見第四卷注萬般盡𬒳鬼神戲看取人間傀儡棚樂府雜録傀儡起漢平城之圍陳平訪知閼氏妬忌造木偶運機關舞墠間閼氏望見謂是生人慮下城冒頓必納之遂退軍後翻為戲舊唐書樂志云又有窟儡子等戲煩惱自無安腳處從他鼓笛弄浮生傳燈録梁寶志丁讃云衆生身同大虛煩惱何處安腳駐輿遣人尋訪後山陳德方家江雨濛濛作小寒雪飄五老髮毛斑五老峯見上城中咫尺雲橫棧獨立前山望後山池口風雨留三日孤城三日風吹雨小市人家只菜𬞞水逺山長雙屬玉上林賦鴻鷫鵠鴇鴐鵝屬玉注云屬玉似鴨而大長頸赤目身間心苦一舂鋤爾雅鷺舂鋤翁從旁舍來收網漢髙紀髙祖適從旁舍來我適臨淵不羡魚薰仲舒策臨淵羡魚不如退而結網俯仰之間巳陳迹王逸少蘭亭禊飲序向之所斦俯仰之間以為陳迹莫窗歸了讀殘書首句蓋用杜詩小市常爭米孤城早閉門楊州戲題巳見前集思親汝州作此詩與第一卷還家呈伯氏同意巳注其歲月歲晚寒侵遊子衣遊子身上衣見上抅留幕府報官移呈伯氏詩云強移手板汝陽城更責愆期𬒳訶詬此事獨見於此兩詩五更歸夢三百里一日思親十二時復齋謾録云唐朱晝詩曰一别一千日一日十二憶苦心無間時今日見玉色乃知山谷五更歸夢三百里一日思親十二時之句取此車上吐茵元不逐漢丙吉傳吉為丞相馭吏嗜酒數步蕩嘗從吉出醉吐丞相車上西曺主吏白欲斥之吉曰以醉飽失之去士使此人將復何所容西曺第忍之此不過汙丞相車茵耳遂不去也時冨韓公以前宰相判汝州詩意謂丞相𥘉不以此為罪而或讒之三人成虎耳市中有虎竟成疑見第一卷注秋毫得失關何事揔為平安書到遲次韻戲答彥和元注云彥和年四十棄官杜門不出本不因循老鏡春江湖歸去作間人天於万物定貧我莊子大宗師篇子桑曰吾思夫使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈貧我哉智效一官全為親莊子逍遙篇云知效一官行比一鄉後漢毛義家貧以孝行稱張奉慕其名往候之坐定而府檄適至以義守令義奉檄喜動顔色奉心賎之辭去及義母死去官行服數辟公府公車徴不至奉乃歎曰賢者固不可測往日之喜乃為親屈也布袋形骸增碨磊傳燈録明州奉化縣布袋和尚形裁腲脮蹙額皤腹腲烏罪反脮奴罪反錦囊詩句愧淸新李賀小傳每旦日出常從小奚奴騎距虛背古錦囊遇有所得投囊中暮歸足成詩杜門絶俗無行迹相憶猶當遣化身維摩詰經云維摩詰不起于座居衆會前化作菩薩時化菩薩升于上方到衆香界禮彼佛足願得丗尊所食之余施作佛事彼諸大士見化菩薩歎未曾有即以問佛佛告之曰下方有丗界名娑婆佛號釋迦牟尼有菩薩名維摩詰為諸菩薩説法故遣化來釋氏有法身化身報身衝雪宿新寨忽忽不樂縣北縣南何日了又來新寨解征鞍山銜斗柄三星沒雪共月明千里寒小吏有時須束帶用淵明應束帶見督郵事巳見上注故人頗問不休官唐僧靈徹詩相逢盡道休官去林下何曾見一人見集古録江南長盡稍雲竹歸及春風斬釣竽刪去詩中有新寨餞南歸客詩乃葉縣尉時作郭明甫作西齋于潁尾請于賦詩食貧自以官為業詩三歲食貧聞説西齋意凛然万卷藏書冝子弟十年種木長風煙史記貨殖傳十歲樹之以木未嘗終日不思潁歐陽公有思頴寄常處士詩想見先生多好賢安得雍容一樽酒杜詩何時一樽酒重與細論文女郎臺下水如天寰宇記頴州治汝隂縣女郎臺在縣西北一里古老云昔胡之女嫁魯昭侯為夫人築臺以賔之故俗謂之女郎臺東京望重兩并州郭丹郭伋皆為并州牧後漢書有傳遂有汾陽整綴旒唐郭子儀封汾陽郡王贊曰唐祚若贅斿而能輔太子再造王室翁伯入關傾意氣唐郭解傳解姊曰以翁伯時人殺吾子賊不得師古曰翁伯解字也傳又云解入關關中賢豪聞聲爭交歡林宗異丗想風流郭泰字林宗事見後漢書君家舊事皆靑史今日髙才未白頭莫倚西齋好風月長隨三徑古人遊勸之仕也三徑見上汝頴鄰州此亦葉縣尉時作睡起倣拂江南一夢中虛堂盡日轉溫風月令孟夏之月溫風始至春風稍覺夾衣重潘嶽秋興賦藉莞蒻御祫衣注祫衣無絮也杜詩地一𥘉衣夾晝永不知樽酒空孔融云樽中酒不空戲詠江南十風十月江南未得霜髙林殘水下寒塘飯香獵户分熊白酒熟漁家擘蟹黃橘摘金苞隨驛使文選笙賦披黃苞以授柑荆州記陸凱與范曄詩折花逢驛使禾㫪玉粒送官倉洪範惟辟玉食杜牧之阿房宫賦釘頭磷磷多於在庾之粟粒踏歌夜結田神社踏歌近代曲也張説劉禹錫皆有踏歌行續仙傳藍采和常醉踏歌云踏踏歌藍采和退之詩麥苗含穟桑生椹且向田頭樂社神遊女多隨陌上郎劉夢得詩蕩舟遊女滿中央採菱不顧馬上郎和答孫不愚見贈詩比淮南似小山文選有劉安招隱士一首注云淮南小山之所作也稱大山小山猶詩有大雅小雅酒名麴米出雲安杜詩聞道雲安麴米春才傾一盞便醺人且憑詩酒勤春事莫愛兒郎作好官劉知幾史通云師人有兒郎之稱簿領侵尋漢郊祀志侵尋於泰山矣台相筆台相當謂冨韓公風埃蓬勃使星鞍文選吳都賦歊霧漨浡漨音蓬浡音勃潘安仁笙賦鬱蓬勃以氣出此謂困於將迎使星見後漢李郃傳小臣才力堪為掾敢學前人便挂冠此數語必有為次韻裴仲謀同年交蓋春風汝水邊客牀相對卧僧氊舞陽去葉才百里裴官于潁昌之舞陽山谷尉汝州葉縣賤子與公皆少年山谷時年二十四白髮齊生如有種青山好去坐無錢唐符戴乞買山錢於于頔見雲溪友議煙沙篁竹江南岸輸與鸕鷀取自眠次韻寄滑州舅氏舫齋聞有小溪山便是壷公謫處天後漢費長房傳長房為市掾市有老翁賣藥縣一壷市罷跳入壷中市人莫見唯長房見之因往再拜翁與俱入壷中唯見玉堂嚴麗旨酒甘肴盈衍其中翁後曰我神仙之人以過見責事畢當去子能相隨乎想聽瑣窗深夜雨景福殿賦靑瑣銀鋪注云靑瑣窗也以青畫為瑣文似看葉水上江船瞻想白馬津亭路退之讀東方朔雜事詩瞻相北斗柄兩手自相挼滑州治白馬縣有黎陽津亦曰白馬津酈食其云守白馬之津是也寂寞雙鳬古縣前明帝時王喬為葉令每月望乘雙入朝今有墓在汝州葉縣汝滑皆頴京西北路舅氏知甥最踈懶杜詩舊諳踈懶叔須汝故相携折腰塵土解哀憐時方作尉故用淵明五斗米折腰事病起次韻和稚川進叔倡酬之什池塘夜雨聽明蛙老境侵尋見上每憶家白髮生來驚客鬢黃粱炊熟又春華黃粱見第一卷下注百年不負膠投􅃮後漢陳重雷義同郡為友鄉里為之語曰膠􅃮自謂堅不如雷與陳萬事相依葛與瓜見上勝日見衛玠傳主人如有酒猶堪扶病見鶯花盧同詩鶯花爛熳君不來稚川約晚過進叔次前韻贈稚川并呈進叔人騎一馬鈍如蛙行向城東小隱家文選王康琚詩小隱隱陵藪大隱隱朝市道上風埃迷皂白皂白見第一卷下堂前氷竹湛清華文選謝叔源詩水木湛清華我歸河曲定寒食公到江南應削瓜禮記為天子削瓜者副之樽酒光隂俱可惜端須連夜發園花明朝遊後苑火急報春知花須連夜發莫待曉風吹武后語也見唐人小説首句蓋用晉祖傳幽兾之士鈍如椎和答登封王晦之登樓見寄縣樓三十六峯寒見第四卷注王粲登臨獨倚欄文選有王仲宣登樓賦清坐一畨春雨歇相思千里夕陽殘詩來嗟我不同醉别後喜君能自寬列子第一篇善乎能自寬者也杜詩老去悲秋喜自寬舉目盡妨人作樂晉向秀傳欲注莊周書嵇康曰此書詎復須注正是妨人作樂耳幾時歸得釣鯢桓莊子應帝王篇鯢桓之審為淵止水之審為淵流水之審為淵淵有九名此處三焉音義云鯢桓二魚名又云鯢鯨也桓盤也審處也伯氏到濟南寄詩頗言太守居有湖山之勝同韻和西來黃犬傳佳句知是陸機思陸雲陸機傳機寓京師久無家問有犬名黃耳乃為書繫其頸犬南走至其家得報還洛歷下樓臺追把酒濟南府治歷城韓信襲破齊歷下軍即此舅家賔客厭論文老杜贈太白云重與細論文山椒欲雨好雲氣湖靣逆風生水紋謝叔源詩悲猿響山椒想得爭棊飛鳥上行人不見只聽聞同丗弼韻作寄伯氏在濟南兼呈六舅祠部山光掃黛水挼藍樂天樂府憶江南云春來江水緑如藍聞説樽前愜笑談伯氏淸修如舅氏濟南蕭灑似江南屢陪風月乾吟筆北史隋文令李德林作詔復鄭譯爵髙熲戲謂譯曰筆乾不解笙篁醉舞衫只恐使君乘傳去拾遺今日是前銜漢髙紀云乘傳詣洛陽樂天詩十年不改舊官銜唐陳子昻杜甫皆左拾遺豈比之二子耶丗弼惠詩求舜泉輒欲以長安酥共泛一杯次韻戲答舜泉河北酒名當是北京教授時作寒韲薄飯留佳客杜詩一飯未曾留俗客蠧簡殘編作近鄰簡編見上避地梁鴻真好學後漢逸民梁鴻作五噫之歌肅宗聞而非之乃易其名居齊魯之間著書楊子未全貧楊子謂楊雄杜詩園收芋栗未全貧玉酥錬得三危露見上石火燒成一片春樂天詩石火光中寄此身沙鼎探湯供卯飲探湯見論語樂天詩午茶能破睡卯酒善消憂不憂問字絶無人見楊雄傳伯父祖善耆老好學於所居紫陽溪後小馬鞍山為放隱齋逺寄詩句意欲庭堅和之幸師友同賦率尓上呈樵入千岩靜松􅍭萬籟寒兒童給行李藜篠對衣冠莊子徐無鬼篇逃空者藜藋拄乎之徑藋徒弔反藋蓧同音小檻聊防虎時來即解鞍阿翁吹笛罷懷昔淚相看倉後酒正廳昔唐林夫謫官所作十一月己卯余納秋租隔墻芙蓉盛開攀檻朱雲頭未白朱雲請上方斬馬剱斬張禹上大怒御史將雲下獄雲攀殿攬折見本傳不知流落向何州空餘前日學書地小閣紅蕖取意秋元注云林夫喜作隸字自咸平至太康鞍馬間得十小詩寄懷晏叔原并問王稚川行李鵝兒黃似酒對酒變新鵝此他日醉時與叔原所詠因以為韻咸平大康二邑皆隸開封府詩入雞林市唐白居易傳最工詩時人爭傳雞林行賈售其國相率篇易一金書邀道士鵝羲之傳山隂道士好飬鵝羲之固求市之道士云為寫道德經當舉鵝相贈羲之欣然寫畢籠鵝而歸雲間晏公子風月興如何晉陸雲傳雲間陸士龍荀隱曰日下筍鳴鶴春風馬上夢樽酒故人持猶作狂時語鄰家乞侍兒元注云稚川醉時在傍知狀侍兒婢也見袁盎傳憶同嵇阮輩醉卧酒家牀今日壚邊客𥘉無人姓黃王戎傳嘗經黃公酒壚下顧謂後車客曰吾昔與嵇叔夜阮嗣宗酣暢於此今日視之雖近邈若山河阮藉傳婦有美色當壚沽酒籍嘗私婦飲醉便卧其側對酒誠獨難論詩良不易人生如草木臭味要相似並見上春色挾曙來惱人似官酒酬春無好語懷我文章友紅梅定自開有酒無人對歸時應好在常恐風雨晦定自好在並見上東南萬里江緑淨一杯酒王孫江南去更得消息否退之詩水容與天色此處皆緑淨又云瞰臨渺空闊緑淨不可唾獻笑果不情莊子大宗師篇造適不及笑獻笑不及排唐魚朝恩傳釋菜執易升坐言鼎有覆餗象以侵宰相王縉怒元載怡然朝恩曰怒者常情笑者不可惻也貌親𥘉不愛禮記情踈而貌親在小人則穿窬之盜也與誰言百年交投分一傾蓋投分傾蓋並上注四十垂垂老山谷生於慶曆五年乙酉至元豐七年甲子蓋四十矣時自太和移監德平鎮集中有代其母祭陳氏女云我徂江南三年搖搖元豐甲子汝兄還朝可見是歲過汴京故在咸平太康之間作此詩文章豈更新鼻端如可斫猶擬為揮斤莊子徐無鬼篇郢人堊漫其鼻端若蠅翼使匠石斫之匠石揮斤成風聽而斫之盡堊而鼻不傷郢人立不失容土氣昏風日人囂極鴈鵝衆口極鵝鴈見上尋河著斫繩墨詩思略無多次韻蓋郎中率郭郎中休官二首仕路風波雙白髮間曹笑傲兩詩流故人相見自青眼見阮籍傳新貴即今多黑頭黑頭見此卷注杜詩舊交新貴音書絶熙豐多擢用新進少年桃葉栁花明曉市荻牙蒲笋上春洲定知聞健休官去樂天詩放慵長飽睡聞健且聞行文云林園亦要聞間置筯力應須及健回酒户家園得自由元注云郭文時御道中野服過親黨飲頗為分臺御史所訶故有此句杜詩送客逢花可自由退之詩我云以病歸此巳頗自由唐人以酒量為酒户樂天詩户大嫌甜酒丗態巳更千變盡心源不受一塵侵一作險阻艱難親得力是非憂患飽經心四十二章經斷欲去愛識自心源逹佛深理青春白日無公事紫燕黃鸝俱好音杜詩隔葉黃鸝空好音付與兒孫知伏臘聽教魚烏逐飛沉黃公壚下曽知味前篇巳注定是逃禪入少林杜詩醉中往往愛逃禪傳燈録菩提逹磨屆于洛陽寓止嵩山少林寺面壁而坐和張沙河招飲張侯耕稼不逢年史記侫幸傳諺曰力田不如逢年善仕不如遇合過午未炊兒女煎退之詩有時未朝飱得米日巳晏隔墻聞誰呼衆口極鵝鴈腹裏雖盈五車讀杜詩男兒須讀五車書囊中能有幾錢穿後漢趙一傳為詩曰文籍雖滿腹不如一囊錢杜詩囊空恐羞􅧣留得一錢看况聞緼素尚黃葛可怕雪花鋪白氊大白北風行云燕山雪花大如席老杜詩糝徑揚花鋪白氊誰料丹徒布衣得丹徒布衣見上今朝忽有酒如川左昭十二穆子曰有酒如淮齊侯曰有酒如澠閠月訪同年李夷伯子真於河上子真以詩謝次其韻十年不見猶如此自治平丁未同唱第至熙寧乙卯十年矣山谷時在北京故稱河上未覺斯人歎滯留司馬談六家指要云大史公留滯周南白璧明珠多按剱見墨竹賦注濁涇清渭要同流杜詩濁涇清渭何當分日晴花色自深淺風軟烏聲相應酬唐杜荀鶴詩風暖烏聲碎談笑一樽非俗物對公無地可言愁晉王戎與阮籍為竹林之遊戎嘗後至籍曰俗物復來敗人意乞貓秋來鼠輩欺貓死退之詩立召賊曹與五伯盡取鼠輩尸諸市窺甕翻盤攪夜眠聞道貍奴將數子傳燈録第十卷僧曰狸奴白牯為什麼却有知南史何承天云鳯凰將九子此摘其字買魚穿柳娉銜蟬銜蟬用俗語也後山詩話云乞貓詩雖滑稽而可喜千歲之下讀者如新書扇魯公筆法屋漏雨未減右軍錐畫沙可惜團團新月面故教零亂黑雲遮法書苑云顔魯公與懷素學草書於塢兵曹或問曰張長史見公孫大娘舞劒得低昻回翔之狀兵曹有之乎懷素以古叉腳為對魯公曰何如屋漏痕懷素曰老賊得之矣如印印泥錐畫沙見墨竹賦注次韻郭右曹閲丗行將老斫輪潘安仁歎逝賦川閲水以成川水滔滔而日度丗閲人而為丗人冉冉而行暮莊子行年七十而老斫輪詳見第一卷下注那能不朽見仍雲見墨竹賦注歲中日月又除盡聖處工夫無半分退之感春詩惜哉此子巧言語不到聖處寧非癡秋水寒沙魚得計見上南山濃霧豹成文見上古心自有著鞭地退之詩孟生江海士古貌又古心著鞭見祖逖傳尺璧分隂未當勤文子曰聖人不貴尺璧而重寸隂淮南子曰禹之趍時挂冠不顧故曰不貴尺璧而重寸隂次韻元日會朝四海登圖籍東都賦春王三朝會同漢京是日也天子受四海之圖籍絳闕清都想盛容列子周穆王篇王實以淸都紫微帝之所居春色巳知回寸草孟郊詩誰言寸草心報得三春輝霜威從此霽寒松霽威見上飲如嚼蠟𥘉忘味楞嚴經云於橫陳時味如嚼蠟事與浮雲去絶蹤選詩雨絶無還雲又云風流雲散一别如雨李善曰鸚鵡賦云何今以雨絶陳琳檄吳將校曰雨絶于天諸人同有此言未詳其始四十九年蘧伯玉聖人門户見重重莊子則陽篇蘧伯玉行年六十而六十化未嘗不始於是之而卒詘之以為非也未知今之所謂是之非五十九非也和答李子真讀陶庾詩樂易陶彭澤陶潛淵明為彭澤令憂思庾義城庾信子山封義城公風流掃地盡唐祝欽明授太子經帝與群臣宴欽明自言能八風舞帝大笑盧藏用歎曰是舉五經掃地矣杜詩豪傑誰人在文章掃地無太白詩春光掃地盡碧葉成黃泥本出漢魏豹等贊上古遺烈掃地盡矣詩句識餘情往者不可作檀弓云趙文子曰死者如可作也吾誰與歸前賢畏後生杜詩庾信文章老更成凌雲健筆意縱橫今人嗤點流傳賦不覺前賢畏後生君言得意處此意少人明次韻答栁通叟求田問舍之詩少曰心期轉謬悠心期見上莊子末篇以謬悠之説荒唐之言蛾眉見妬且障羞離騷經衆女嫉余之娥眉兮謡諑謂余以善淫南史劉穆之曽孫祥齊建元中為正貟郎司徒禇彥回入朝以腰扇障日祥從側曰作如此舉止羞見人靣扇障何益玉臺新詠云舉扇且障羞但令有婦如康子列女傳魯黔婁先生之妻先生死曽子往弔之曰何以為諡其妻曰以康為諡曽子曰先生食不充口衣不蓋躰何樂於此而諡為康乎妻曰昔君嘗欲以為國相辝而不為是有餘貴也君嘗賜之粟三十鍾辝而不受是有餘冨也甘天下之淡味安天下之卑位求仁而得仁求義而得義其諡為康不亦冝乎曽子曰唯安用生兒似仲謀吳志孫權字仲謀曹公歎曰生子當如孫仲謀劉景升兒子若豚大耳橫笛牛羊歸晚徑杜詩牛羊歸徑險鳥雀聚枝深卷簾瓜芋熟西疇蜀都賦云瓜疇芋區歸去來詞云將有事於西疇功名可致猶回首何况功名不可求催公靜碾茶雪裏過門多惡客元注不飲者為惡客出元次山集中有絶句云有時逢惡客注非酒徒即為惡客春隂只惱有情人睡魔正仰茶料理徽之傳卿在府日久比當相料理急遣溪童碾玉塵幽怪録橘中四老人云君輸我玉塵九斛樂天詩新茶碾玉塵同前韻戲公靜偶逢携酒便與飲竟别我為何等人退之歸彭城詩遇酒即酩酊君知我為誰兔月龍團不當惜長卿消渴肺生塵司馬相如傳常有消渴病盧同詩渴心歸去生塵埃和謝公定河朔謾成八首急雨長風溢兩河欣然河伯順風歌行觀東海方寸少不以黃流更自多注見弟一卷下直渠殺勢煩才吏分殺水力穿直渠皆見漢溝洫志機器爬沙聚水兵機器謂鐡龍瓜濬川杷也見第一卷下同堯民遊靈源廟詩注爬沙字見退之月蝕詩爬沙腳手鈍誰使汝解緣青冥河面常從天上落金堤千里護都城溝洫志云史酸棗護金堤直令南粵還歸帝漢南越王趙他傳妄竊帝聊以自娛改號不敢為帝矣誰謂胸奴不敢王願見推財多卜式未須算賦似桑羊卜式傳時洪方事胸奴式上書願輸家財半助邊上以語丞相洪洪曰此非人情不軌之臣乃罷式歲餘會渾耶等降縣官費衆倉府空式復持錢三十万與河南太守食貨志以東郭咸陽孔僅領鹽鐡而桑弘羊貴幸弘羊賈人之子以心計三人言利事析秋毫矣萊公廟略傳耆傳韓令風流在井疆安用鳴鼛增漢壘不妨羅拜不諸羌此皆河朔事寇萊公力請真宗幸澶州克敵耆舊談之未巳韓忠獻公相州安陽人熙寧八年殁於相州此蓋八年以後作時教授北京也井疆言其井邑疆畔所在書殊厥井疆漢時水占十万頃官寺民居皆濁河溝洫志成帝時河決於館陶及東郡凡灌四郡三十二縣水居也十五万餘頃深者三丈壞敗官庭民居四万所又按孝元帝紀敗壞官寺民室注凡府庭所在皆謂之寺豈必九渠亡故道直緣穿鑿用功多溝洫志是歲河水湓溢敗官庭民舍四万許啇以為可決平原金隄開通大河至海五百餘里又乾三郡水地得美田且二十餘万頃許啇又云古説九河之名自鬲以北至徒駭相去二百餘今河雖數徙不離此域膚庭數遣林牙使羌種來窺鴈塞耕壯士看天思上策月邊鳴笛為誰橫林牙契丹翰林學士也見實録江鄰幾雜志云兾州城南有張耳墓在送客亭北戎使林牙者由翰林學士出使問知州王仲平不知張耳何代人大使耶律防謝曰契丹家翰林學士名目而巳蛛蒙黃畫屏𥘉暗塵澀金門鎖不開六十餘年望雕輦赭𫀆曽是映宫槐此言澶淵行宫也自景德元年歲甲辰與北虜通好息兵至熙寧元年戊申蓋六十五年百里棄疆王自直熙寧七年九月契丹遣使來言代北對境有侵地帝以手詔問故老韓冨文等皆言不可與王荆公再入相曰將欲取之必固豫之以筆畫地圖至八年九月分畫地界棄地五百餘里此詩蓋婉其詞也万金捐費物皆春當謂歲幣須令牧馬甘踰幕更遣彎弓不射人漢胸奴傳云胸奴益北絶幕又云胸奴逺遁南無王庭詩意謂令北虜絶幕北去不復近塞而引弓之民不相射也杜詩云射人莫射馬此反其意武陵武陵樵客出桃源自許重遊不作難白詩回山轉海不作難傾情倒意無所惜却覔洞門煙鎖斷歸舟風月夜深寒詳見淵明集中桃花源記上巳注其略過平輿懷李子先時枉并州平輿隸蔡州嘉祐四年升并州為太原府前日幽人佐吏曹我行堤草認青𫀆庾信哀江南賦云青𫀆如草白馬如練杜詩汀草亂青𫀆心隨汝水春波動興與并門夜月髙丗上豈無千里馬人中難得九方臯列子説符篇秦穆公謂伯樂曰子之年長矣子姓有可使求馬者乎對曰臣之子皆下材可告以良馬不可告以天下之馬也臣有所與共簷纆薪菜者有九方皋請見之公使求馬三月而反報曰巳得之矣牝而黃使人取之壯而驪公謂伯樂曰敗矣子之所使求馬者色物牝壯尚不能知又何馬之能知也伯樂曰臯之所觀天機也云云酒船魚網歸來是花落故溪深一篙謝曉純送衲襪剗草曽升馬祖堂傳燈録江西一禪師姓馬氏六祖能和尚謂曰向後佛法從汝邊去馬駒踏殺天下人厥後江南法嗣布於天下時號馬祖又丹霞禪師投南嶽石頭和尚石頭告衆來日剗佛殿前草至日各備鍬钁剗草獨師以盆盛水水淨頭於和尚前胡跪石頭笑為剃髮暖窗接膝話還鄉贈行百衲兜羅襪楞嚴經云我今示汝兜羅綿手摘此二字處處相隨入道埸避暑李氏園二首李侯别館鎖春隂花徑吹香可細尋杜詩花徑不首緣客掃迸笋侵階藤倒架盧同詩攢迸溢林藪主人重為費千金荷氣竹風冝永日冰壷涼簟不能回題詩未有驚人句會喚謫仙蘇二來主立之詩話曰山谷嘗避暑城西李氏園題兩詩其一云題詩未有驚人句喚取謫仙蘇二來秦少遊言於東坡曰以先生為蘇二大似相薄少章為豫言戲題大年防禦蘆鴈揮毫不作小池塘蘆荻江村落鴈行雖有珠簾藏翡翠不忘煙雨罩鴛鴦詩話又云宗室大年名令穰喜微行而善畫小景山谷詩云雖有珠簾籠翡翠不忘煙雨罩鴛鴦蓋有所譏也大白詩玉樓巢翡翠金殿鎖鴛鴦平原宴坐二首平原郡德州也山谷元豐七年在大和移監德州德平鎮此詩題下注公擇二字詩意殊不相涉蓋本注於後篇謝送宣城筆而後人誤置於此今去之詳見後注老作儒生不解事文選楊德祖箋修家子雲老不解事強著一書唐婁師德傳云解事僕射江南有田歸荷鋤北窗風來舉書葉猶自勸人勤讀書謂風吹葉子册如勸人讀書也黃落委庭觀九州蟲聲日夜戒衣裘謂促織金錢滿地無人費謂黃落一斛明珠薏苡秋以薏苡比明珠蓋馬援傳帝方薏苡實大援欲以為種軍還載一車譛之者以為所載皆明珠文犀次韻舍弟題牛氏園春與園林共晚人將蜂蝶俱來樽前鳥歌花舞歸路星翻漢回明月清風良霄會同星河易翻歡娛不終此廣記所載鬼詩也蘇黃皆喜為人書之字本出文選鮑明逺舞鶴賦云星翻漢回曉月將落春事欲了鶯催主人雖貧燕來玉燭傳杯未厭尓雅回氣和謂之玉燭此借使其字杜傳杯不放杯金吾靜夜驚回本或作晝夜或作盡夜今定為靜夜唐十六衛有左右金吾衛蓋循漢執金吾之名掌京城巡警杜詩醉歸應犯夜可怕李金吾謝送宣城筆山谷草書此詩又跋云李公擇左宣城令諸葛生作雞距法題云草玄筆以寄孫莘老宣城變樣蹲雞距諸葛名家捋鼠鬚一束喜從公處得千金求買市中無漫投墨客摹科斗勝與朱門飽蠧魚愧我𥘉非草玄手不將間寫吏文書王彥祖惠其祖黃州制草書其後脫略看時輩詣君等發蒙董狐常直筆左宣元孔子曰董狐古之良史也書法不隱修汲黯少居中黯傳黯數切諌不得久留內袁盎傳盎以直諌不得久居中鵩入遷臣舍賈誼有鵩鳥賦烏號厭丗弓封禪書有烏號弓云云平生有嘉樹猶起九原風檀弓趙文子與叔譽觀乎九原云云寄懷公夀山谷嘗有跋云余與宗室越宫有葭莩故曩時與宣州院公壽景珍嘗共文酒之樂好賦梁王在日邊司馬相如傳以此言為郎會景帝不好辝賦是時梁孝王來朝從遊説之士鄒陽枚乘之徒相如見而説之因病免客遊梁重簾復幕鎖神仙退之詩黃簾緑幕朱户閉莫因病酒踈桃李且把春愁付管絃愚智相懸三十里見第四卷注榮枯同有百余年文選曹子建詩積善令余慶榮枯立可須及身強健及健見上且行樂漢陽惲傳人生行樂耳須冨貴何時一笑端須直万錢太白玉盤玲羞直万錢以金沙酴醿送公壽天遺酴醾玉作花紫綿揉色染金沙憑君著意樽前看便與春工立等差退之李花詩縞裙練恱無等差金沙見上沈立海棠記云唯紫帛者謂之海棠余乃棠梨花耳此摘其字同劉景文逰郭氏西園因留宿人居塵丗虛華館秋入園林著晚花落日臨池見科斗必知清夜有鳴蛙元符三年七月山谷自戎州至靑神省其姑有和青神士人蒲志同字泰亨詩其序云伏承泰亨仙輩和示東坡之友劉景文同不肖宿城西郭氏園七言小詩且推不肖當與嶺南數公同時鵬蹇鳯舉非所擬倫輒用元韻上答并敘東坡伯仲方來之意其詩云我巳人間無所用鬢飄霜雪眼生花東坡兄弟來雖晚折箭堪除蝕月蛙東坡海上無消息想見鶩帆出浪花三十年來丗三變幾人能不化鶉蛙玉座天開旋北斗清班鳥散落餘花有人難立百官上不為廟中羔莵蛙栽竹飬松人去盡空聞道士種桃花昨來一夜驚風雨滿地殘紅噪莫蛙又謝泰亨送酒云風掃三峩山外雨霜催五桞宅邊花非君送酒添秋睡可耐東池到曉蛙此詩真本尚存而遺文不載因附見於此城西郭園不知何處案前集有次韻劉景文登鄴王臺見思五首云何時郭池晚照影寫間情時正在德平也按徽宗實録元符三年九月上謂輔臣韓忠彥曰章悙求去朕不欲以定䇿貶悙秪緣護哲宗靈駕不聀纍有彈章悙於是遂出故和章云有人難立百官上不為廟中羔莵蛙霍光傳霍山曰丞相擅減宗廟羔莵蛙可以此罪也言章丞相之罪不獨如此耳張仲謀家堂前酴醾委地沉水衣籠白玉笛急就章注云篝一名笿亦以為薰籠玉笛用種玉事不蒙湔沸苦無聊煩君斫取西莊栁扶起春風十萬條贈陳元輿詞部武城園木鎖中秋久得汀州刺史遊招喚丁寧方邂逅誰言天網漏吞舟實録元祐二年八月祠部郎中陳軒為主客郎中元輿軒字也武城王廟即考試院陳祠部與山谷試幃中同事前集亦有戲答陳元與詩云平生所聞陳汀州此詩亦同時作漢酷吏傳敘號為網漏吞舟之魚曹子建箋設天網以該之頓八紘以掩之和陳君儀讀太真外傳五首朝廷無事君臣樂花柳多情殿閣春栁公權聮句薰風自南來殿閣生微涼不覺胡雛心暗動一作付與山河買忠義綺羅翻作墜樓人外傳云𥘉祿山於上前應對雜以諧謔而妃嘗在坐祿山心動及聞焉嵬之死數日歎惋晉石崇傳崇有妓緑珠孫秀求之不與秀勸趙王倫誅崇介士到門緑珠自投於樓下而死扶風喬木夏隂合斜谷鈴聲秋夜深外傳云上至斜谷霖雨涉旬棧道雨中聞鈴聲因採之為雨霖鈴曲考之史及諸書明皇自陳倉入散開出河池𥘉不由斜谷今梓橦有上亭驛古今詩刻皆以為明皇聞鈴之地當不妄也人到愁來無處會不關情處揔傷心大白詩何許最關情梁州一曲當時事當時事一作開元夢按開元傳信記涼州獻新曲曰涼州寧王聞之以為恐有播越之禍樂府詩集涼州歌序亦稱涼州曲云云𥘉無區别記得曾拈玉笛吹外傳云妃子竊寧玉笛吹故張祐詩云小花靜院無人見間把寧王玉笛吹端正樓空春晝永小桃猶學淡燕支華淸宫有端正樓貴妃梳洗之所髙麗條脫雕紅玉條脫釧也髙麗所貴真誥蕚緑華降羊權家遺以金條脫一邏逤琵琶橪緑絲一作一雙條脫玻璃玉三尺琵琶緑繭絲妃子琵琶邏逤檀也寺人白秀真使蜀還獻木潤如玉光可鑒有金縷紅文蹙成雙鳯絃乃末訶彌羅國所貢緑水蠶絲也蛛網屋煤昏故物昏故物一作脂澤歇此生唯有夢來時上皇曾御昭儀傳鏡裏觀形只眼前上賢漢成帝內傳見飛燕身輕欲不勝風帝為製七寶避風上曰爾則任吹多少妃曰霓裳一曲可掩千古杜詩聽説開元事分明在目前退之詩聽説兩京事分明皆眼前飬得祿兒傾四海祿山恩遇最深上及貴妃皆呼以為兒千秋更有一伶玄趙飛燕外傳漢江東都尉伶玄所撰也玄自敘云伶玄字子于歷刺史州郡為淮南相哀帝時老休買妾樊通德有才色知書能言飛燕姊弟事通德曰斯人俱灰滅矣當時疲精力馳􅕽蠱惑寧知終歸荒田野草乎通德顧視燭影以手擁髻悽然泣下於是撰趙后列傳詩意謂以古為鑒興壞在目前而明皇不知戒為可歎也山谷外集詩注卷十一
