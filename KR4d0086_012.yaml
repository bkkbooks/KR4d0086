front:
  text: 山谷外集詩注卷之十二
  hash: sha256:27c3850606ee98f15f6203df6106349c46157cd9065ff4a6d5d6d3f8e3eeac75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_012-1a}
body:
  text: 讀曹公傳并序曹公自以勳髙宰衡文對西伯蟬蛻揖讓之中而用漢室於家巷離騷經云五子用失乎家巷後漢延篤傳篤以病免歸教授家巷更黨錮之災義士忠臣耘除略盡獻靈之間北面朝者拱而觀變漢魏何擇焉彼見宗廟社稷之無與也執大阿而用其頴以司一丗之命左右無不得意引後宫於鈇銊如刈蒲茅後漢獻帝伏皇后紀政在曹操操求董貴人殺之帝以貴人有􅗖纍為請不得后懷懼與父書言操殘逼狀令密圖之事露操逼帝廢后令華歆勒兵入宫收后后閉戶藏壁中歆就牽后出時帝在後殿后𬒳髮徒跣行泣過訣曰不能復相活耶帝曰我亦不知命在何時遂將后下暴室以憂崩夫匹婦婢使得罪家人猶為謝過而親北面受命之君自以為未知死所嗚呼癘憐王其誰曰過言戰國策楚語云或説春申君曰孫子天下賢人也君何辭之春申君於是使人請孫子於趙孫子為書謝曰癘人憐王此不恭之語也雖然不可不審察也此為劫弒死亡之主言也夫人主年少而矜材無法術以知姦則大臣主斷楚王子圍以冠纓絞王殺之因自立也齊崔杼攻莊公射中其股遂殺之近代李兊用趙餓主父於沙丘淖齒用齊擢閔王之筋縣於其廟梁夫癘雖癰腫抱疾上比前丗未至絞纓射股下比近代未至擢筋而餓死也由此觀之癘雖憐王可也注云續韓非子諺曰癘憐王雖然終已恭讓腹毒而色取仁任丕以易漢姓者何也漢之末造雖得罪於社稷骨鯁之臣而猶不得罪於民故猶愛其名耳余聞曰道揆以上惠不足而明有餘不在社稷而數有功粢盛殆其不繼哉感之作曹公詩一章南征北伐報功頻劉氏親為魏國賓畢竟以丕成霸業豈能於漢作純臣獻帝紀建安二十五年正月庚子魏王曹操薨三月改元延康冬十月乙卯皇帝遜帝魏王丕稱天子奉帝為山陽公公奏事不稱臣左傳君子曰頴考叔純孝也注曰純猶篤也傳又云君子曰石碏純臣也兩都秋色皆喬木二祖恩波在細民班固作兩都賦辝曰有西都賓問東都主人云云孟子曰所謂故國者非謂有喬木之謂也二祖謂髙祖丗祖杜詩莫怪恩波隔又云恩波錦帕舒駕馭英雄雖有術杜詩君王自神武駕馭必英雄又云君王無所措駕馭英雄材力扶宗社可無人雜詩古風蕭索不言歸貧賤交情冨貴非下邽翟公為廷尉賓客填門及廢門外可設雀羅後復為廷尉客欲往翟公大書其門曰一死一生乃知交情一貧一冨乃知交態一貴一賤交情乃見見鄭當時傳丗祖本無天下量子陵何慕釣魚磯後漢嚴光傳光字子陵與光武同遊學及光武即位變姓名隱身不見帝令以物色求之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車聘之三反而後至竟不屈子陵髙抗皆丗祖之量有以客之也若丗祖有貧冨交情之異則嚴光豈慕此哉此語必有為而發同謝公定携書浴室院汶師置飯作此竹林風與日俱斜細草猶開一兩花天上歸來對書客一作卷愧勤僧飯更煎茶謝人惠茶一規蒼玉作蜿蜒此言龍團退之南海神碑云蜿蜿蜒蜒來享飲食藉有佳人錦假鮮張平子四愁詩云美人贈我錦繡假莫笑持歸淮海去為君重試大明泉唐張又新水記云水之與茶冝者凡七品淮南路揚州大明寺水第五暮到張氏園和壁間舊題邵平不見見園瓜三徑還尋二仲家莫道暫來無所得未秋先見碧蓮華邵平二仲見上髙僧傳求那跋於别室入禪纍日不出寺僧遣沙彌候之亘室彌漫生靑蓮花從人求花舍南舍北勃姑啼桞子厚聞黃鸝詩此時晴煙最深處舍南巷北遙相語杜詩舍南舍北皆春水勃姑見上體中不佳隂雨垂晉王湛傳兄子濟嘗詣湛見牀頭有周易問何用此為湛曰體中不佳脫復看耳欲向黃梅問消息背隂合有兩三枝傳燈録慧能大師傳智逺禪師謂曰西域菩提達磨傳心印於黃梅汝當往彼參決師辝決直造黃梅之東禪詩含此意李白詩聞道春還未相識走傍寒梅訪消息祖庭事苑曰經律異相云有噉人鬼捉得一人日方欲出人謂鬼曰君何以靣白背黑曰我鬼性畏日也其人向日而走既得脫因説偈言勤學第一道勤問第一方道逢羅剎難背隂向太陽懋宗奉議有佳句詠冷庭叟野居庭堅於庭叟有十八年之舊故次韻贈之庭叟有佳侍兒因早朝而逸去乃插藩甚嚴密城西冷叟半忙間湘山野録云楊大年為間忙令丗上何人最好間丗上何人最好忙人道王陽得早還漢王吉字子陽為諫議大夫謝病歸琅邪四望樓臺皆我有一原花竹住中間𥘉無狗盜偷籬落史記孟嘗君客最下坐有能為狗盜者入秦宫藏中取狐白裘底事娥眉失鎖關每為朝天三十里時時驚枕夢催班杜詩汝陽三斗始朝天李濠州挽詩循吏功名兩漢中平生風義最雍容魚遊濠上方云樂見上鵩在承塵忽告凶西漢雜記云賈誼在長沙鵩鳥集其承塵而鳴長沙俗以鵩鳥至人家主人死誼作鵩鳥賦齊死生等榮辱以遣憂纍焉挂劒自知吾已許吳丗家季扎過徐君徐君好季扎劒口弗敢言季扎心知之為使上國未獻還至徐徐君已死乃解其寶劒繫之徐君冡木而去曰始吾心已許之豈以死背吾心哉脫驂不為涕無從檀弓云孔子之衛遇舊館人之喪入而哭之哀出使子貢脫驂而賻之子貢曰於門人之喪未有所脫驂脫驂於舊館無乃巳重乎夫子曰豫向者入而哭之遇於一哀而出涕豫惡夫涕之無從也小子行之百年窮逹都歸盡淮水空圍墓上松禮數最優徐孺子見上風流不減謝宣城見上那知此别成千古未信斯言隔九京禮記晉獻文子曰從先大夫於九京注謂晉卿大夫之墓地在九原京蓋字之誤落日松楸隂隧道西風簘鼓送銘旌善人報施今如此隴水長寒嗚咽聲史記伯夷傳或曰天道無親常與善人若伯夷叔齊可謂善人者非耶積仁潔行而餓死天之報施善人何如哉樂府有隴頭歌古詞云隴頭流水鳴聲幽咽遙望秦川心肝斷絶寄家近别幾日客愁生固知逺别難為情文選王昭君詩傳語後丗人逺嫁難為情退之詩人間有纍不可住依然離别難為情夢回官燭不盈把後漢巴祗與客暗坐不然官燭杜詩浩歌淚盈把又云盈把那須滄海珠檀道鵉續晉陽秋曰陶潛九月九日無酒於宅邊菊叢中摘盈把見白衣人送酒猶聽嬌兒索乳聲退之詩嬌女未絶乳念之不能忘忽如在我前耳若聞啼聲衛南今年畚鍤棄春耕折葦枯荷繞壞城杜詩菱荷枯折隨風濤陸龜蒙鵁鶄詩不似間棲折葦秋白烏自多人自少嘗聞東坡知登州有一主簿白事不巳公頗倦謾云晚可見過主簿不測其意至晚獨入公強出見之因閲杜詩問云江湖多白烏天地足靑蠅白烏鷗鷺之屬耶主簿曰白烏乃蚊蚋以况贓吏江湖之間去朝廷逺多贓吏耳天地之間君子少而小人多公即改觀厚待之按月令群烏養羞注云羞謂所食也夏小正曰九月丹烏羞白烏説曰丹烏謂丹良也白烏謂閩蚋也又按金樓子云白烏蚊也齊桓公卧柏寢謂仲父曰一物失所寡人悒悒今白烏營營是必飢耳閩音文人少字蓋用杜詩蕭條四海內人少豺虎多也汙泥終濁水終淸杜詩濁河終不汙淸濟退之詩清溝映汙渠沙埸旗鼓千人集漁戶風煙一笛橫唯有鴟梟古祠柏對人猶是向時情酒江形圜似阮家盆丗説阮仲容至宗人間共集以大盆盛酒山勢岺如北海樽孔融傳樽中酒不空戶有浮蛆春盎盎奴松一路醉鄉門唐王績有醉鄉記楞嚴經頌云十方薄伽梵一路涅槃門急雪寄王立之問梅紅梅雪裏與蓑衣莫遣寒侵鶴膝枝吳都賦家有鶴膝户有犀渠借此以言梅友之瘦也老子此中殊不淺庾亮在武昌諸佐吏乘秋夜共登南樓俄而亮至諸人將起避之亮曰老子於此處興復不淺尚堪何遜作同時杜詩東閣觀梅動詩興還如何遜在揚州按三輔決録何遜在揚州見官梅亂發賦四言詩人得傳寫司馬相如傳朕獨不得與此人同時哉又寄王立之南人羇旅不成歸夢繞南枝與北枝安得孤根連夜發要當雪月並明時花須連夜發南北枝並見上歲寒知松柏此詩效進上躰元祐間作有兩篇其一見前集松柏天生獨青靑貫四時禮記曰其在人也如竹箭之有筠也如松柏之有心也貫四時而不改柯易葉莊子受命於地唯松柏獨也在冬憂靑靑心藏後凋節歲有大寒知論語歲寒然後知松柏之後凋也慘淡氷霜晚輪囷澗壑姿輪囷見上或容螻蟻穴老杜古柏行苦心豈免容螻蟻未見斧斤遲搖落千秋靜婆娑萬籟悲鄭公扶正觀已不見封彛唐魏證傳帝曰此證勸我行仁義既效矣惜不令封德彞見之效進士作觀成都石經成都記孟蜀時偽宰相母昭裔以俸金刻九經於石成都九經石歲久麝煤寒麝煤寒見上字畫參工拙文章可鑒觀危邦猶勸講後漢楊秉傳以明尚書徴入勸講注云猶侍講也相國校凋刋羣盜煙塵後諸生竹帛殘劉向典校書籍皆先書竹改易刋定可繕寫者以上帛見御覽簡門王春尊孔氏孔子作春秋首書春王正月乙夜詔甘盤漢官儀中黃門持五夜謂甲夜至戊夜杜陽雜編文宗視朝後即閲群書謂左右曰若不甲夜視事乙夜觀書則何以為人君耶説命舊學于甘盤願比求諸野漢藝文志仲尼有言禮失求諸野成書學上官尚書序悉上送官藏之書府漢文翁為蜀郡守起學官於成都市中學官謂學舍也送徐景道尉武寧李苦少人摘見上酒醇無巷深古語美酒無曲巷當官莫避事左傳當官而行為吏要清心淸心見上葛藟松千尺國風綿綿葛藟寒泉綆百尋莊子綆短者不可以汲深公朝有汲引漢劉向云禹稷皋陶轉相汲引吾子茂徽音詩大姒嗣徽音黃綬輔一尉朱博傳刺史不察黃綬注丞尉職卑皆黃綬還依水竹居身隨南渡馬退之詩一馬南渡開新主此摘其字書寄北來魚風俗諳鄰並艱難試事𥘉官間莫歌舞教子誦詩書鄰並事𥘉使俗語所謂以俗為雅也杜似吟院兩首日長吟院無公事燕入花開必有詩莫道南風吹鴈去春來亦有北風時吟院虛明如畫舫想成檻外是長冮杜郎忽作揚州夢雨帶風沙打夜窗唐杜牧之詩十年一覺揚州夢嬴得靑樓薄行名奉送劉君昆仲遊子歸心日夜流漢髙祖紀謂沛父兄曰遊子悲故鄉南陔香草可晨羞束廣微補亡詩云循彼南陔言採其蘭又云馨爾夕膳潔爾晨羞平原曉雨半槐夏汾上午風𥘉麥秋歐陽詩話云趙學士師民詩思光精如麥天晨氣潤槐夏午隂清前丗名流皆所未到也鴻鴈要須翔集早脊鴒無憾急難求詩鴻鴈于飛集于中澤常棣云脊鴒在原兄弟急難論語翔而後集欲因行李傳家信姑射山前是晉州劉君兄弟當自德州歸晉故稱平原汾上時山谷在德平也按寰宇記晉州所治臨汾縣有平山一名壷口禹貢所謂壷口治梁及歧也今名姑射山在縣西八里莊子藐姑射之山有神人焉即此勸交代張和父酒風流五日張京兆漢張敞傳敞使賊曹掾絮舜有所按驗舜以敞奏當免不肯為敞竟事曰吾為是公盡力多矣今五日京兆耳安能復案事今日諸孫困小官作尹大都如廣漢趙廣漢張敞皆京兆尹所為大略相似畫眉仍復近長安敞為婦畫眉長安人傳張京兆眉憮欲得官近長安唐人語也三人成虎事多有孔融臨終詩三人成市虎浸漬解膠􅃮衆口鑠金君自寬鄒陽書云衆口鑠金積毁銷骨酒興情親俱不淺賤生何取罄交歡楊朴墓三尺孤墳一布衣人言無復似當時千秋萬歲來還此千秋萬歲見第一卷末注月笛煙莎丗不知元注云揚朴喜吹笛嘗作莎詩極工按范文正公詩話云楊朴字契玄鄭州人善為詩不仕少與畢相同學薦之大宗召見面賦莎衣詩云狂脫酒家春醉後亂堆漁舍晚晴時除官不受聽歸山以其子從政為長水尉東坡云昔年過洛見李公簡言真宗東封訪天下隱者聞鄭人楊朴能為詩召對自言不能上問臨行有人作詩送卿否朴曰唯臣妻有一首云更休落魄耽杯酒且莫猖狂愛詠詩今日捉將官裏去這回斷送老頭皮上大笑放還山次韻李士雄子飛獨逰西園折牡丹憶弟子竒絶二首西園春色才扽李蜂巳成圍蝶作團更欲開花比京洛放教姚魏接山丹歐陽公花品云姚黃魏紫以姓著蘇門下種山丹詩云淮陽千葉花到此三百里城中衆名園栽接比桃李乘秋種山丹得兩生可喜山丹非佳花老圃有深意宿根巳得土絶品皆可寄又種花詩云山丹得春雨艷色照庭除末品何曽數群芳自不如今秋接千葉試取洛人餘桃李隂中五兄弟扶將白髮共傳杯風吹一鴈忽南去空得平安書信回扶將傳杯見上戲和舍弟船埸探春二首雨餘禽語摧天曉月上梨花放夜闌莫聽遊人待妍暖十分傾酒對春寒百舌解啼泥滑滑梅聖俞禽言四首其一竹雞云泥滑滑苦竹岡雨蕭蕭馬上郎泥滑滑蜀人號為雞頭鶻東坡詩泥深厭聽雞頭鶻忽成風雨落花天城南一假春如錦喚取詩人到酒邊戲答李子真河上見招來詩頗誇河上風物聊以當嘲云渾渾舊水無新意漫漫黃塵涴白鷗安得江湖忽當眼卧聽禽語信船流同景文丈詠蓮塘塘上鈎簾對晚香半斜紅日已侵床江妃羞出凌波襪長在髙荷扇影涼吳都賦江妃於是往來洛神賦凌波微步羅襪生塵從丘十四借韓文二首六言吏部文章萬丗吾求善本遍窺散帙雲窗棐几同安得見丘遲謝靈運詩散帙問所知太白詩得憩雲窗眠王羲之傳詣門生家見棐几滑淨因書之南史丘靈鞠傳子遲詞采麗逸同安今舒州也中有先君手澤禮玉藻父沒而不能讀父之書手澤存焉耳丹鉛點勘書詩退之秋懷詩不如覷文字丹鉛事點勘莫惜借行千里他日還君一鴟一鴟見第三卷聞胡朝請多藏書借書目詩注次韻題粹老客亭詩後客亭長短路南北長亭短亭見哀江南賦衮衮行人那得知惟有相逢即相别一杯成喜只成悲古樂府木蘭歌父母見木蘭喜極成悲傷次韻寅菴四首寅菴山谷兄大臨元明也其詩序云雙井弊廬之東得勝地結茅菴居命曰寅菴喜成四詩寄魯直可同魏都士人共和之可見山谷時在北京也四詩説盡菴前事寄逺如開水墨圗略有生涯如谷口楊子法言云谷口鄭子真耕乎巖石之下而名震于京師非無卜肆在成都漢書蜀有嚴君平卜筮於成都市旁籬榛栗供賓客滿眼雲山奉宴居禮記仲尼燕居間與老農歌帝力帝王丗紀帝堯之時天下大和老人擊壤於道觀者歎曰大哉帝之德也老人曰吾日出而作日入而息鑿井而飮耕田而食帝何力於我哉年豐村落罷追胥周禮小司徒之職乃會萬民之卒伍而用之以比追胥注追逐寇也胥伺捕盜賊也又云凡起徒役毋過家一人以其餘為羡唯田與追胥竭作兄作新菴接舊居一原風物萃庭隅陸機招隱方傳洛陸機有招隱詩張翰思歸正在吳晉張翰吳郡吳人齊王囧辟為東曹掾見秋風起思吳中菰菜蓴羹鱸魚遂命駕而歸五斗折腰慚僕妾見陶潛傳幾年合眼夢鄉閭樂天詩春來夢何處合眼到東川白雲行處應垂淚唐狄仁傑授并州法曹參軍親在河陽仁傑登太行山反顧曰白雲孤飛謂左右曰吾親舍其下瞻悵久之雲移乃去黃犬歸時早寄書見上大若塘邊擉網魚莊子則陽篇冬則擉鱉于江擉𥘉角切小桃源口帶經鋤漢兒寬傳帶經而鋤詩催孺子成雞柵老杜有催宗文樹雞柵詩茶約鄰翁掘芋區瓜疇芋區見蜀都賦苦楝狂風寒徹骨黃梅細雨潤如酥楝風梅雨並見上注退之詩天街小雨潤如酥此時睡到日三丈南齊天文志永明五年日出三竿盧同詩日髙丈五睡正濃杜牧之詩白頭扶不起三丈日還髙自起開關招酒徒史記酈食其叱使者曰走復入言沛公吾髙陽酒徒耳未怪窮山寂寞居此中常與丗情踈誰家生計無間地太半歸來已白須不用看雲眠永日老杜云看雲莫悵望又云時獨靑雲淚橫臆會思臨水寄雙魚見上公私逋負田園薄未至妨人作樂無見上送楊􅗕鴈門省親二首從豫學易業未成辝歸執戟老翁年七十人看生理亦無聊草玄事業窺周易作賦聲名動漢朝楊雄事見上本傳無執戟字文選曹子建與楊得祖書云楊子雲先朝執戟之臣耳注云為郎皆執戟今見逺孫勤翰墨還持遺藁困簞瓢見論語三年鄉校趍晨鼓入北京郡庠也一日邊城聽夜刁李廣傳不擊刀斗自衛邊城謂代州鴈門也野飯盈盤厭蔥韭莊子徐無鬼篇徐無鬼見武侯武侯曰先生居山林食芋栗厭蔥韭以賓寡人春風半道解狐貂楊子舉丗寒貂狐不亦燠乎歸時定倒迎門屣問鴈安能學度遼後漢王符傳度遼將軍皇甫規解官歸安定鄉人有以貨得鴈門大守者亦去職還家刺謁規規卧不迎既入而問卿前在郡食鴈美乎有頃又白王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎退之後漢三賢贊云皇甫度遼聞至乃驚衣不及帶屣履出迎豈若鴈門問鴈呼卿蜀客出衰丗蜀客謂楊子雲蜀人也而客於京師獨升鄒魯堂言其學孔孟如論語所言由也升堂矣未入於室也蚊虻觀得失莊子云蚊虻噆膚淮南子云毁譽之於已也猶蚊虻之一過也子雲於得失亦然虎豹擅文章易革卦九五大人虎變象曰其文炳也上六君子豹變其文蔚也吾子已強學儒行云夙夜強學以待問草玄冝不忘江河須畎澮書益稷禹曰豫決九川距四海濬畎澮距川此言積畎澮而成江河勸其博學松柏要氷霜馬䇿路千里鴈門書數行旨甘君有婦內則云慈以旨甘玉臺新詠使君自有婦尺壁愛分光見上次韻謝公定王丗弼贈答二絶句何用苦吟肝腎愁退之贈崔立之云勸君韜飬待徴招不用雕琢愁肝腎但知把酒更無憂聲名本不關人事看取青門一故侯曹參傳載邵平平東陵瓜事三輔黃圗長安城東門曰靑門昔邵平種瓜靑門瓜美云云酒因咀嚼還知味詩就呻吟不要工王謝風流看二妙病夫直欲卧墻東後漢逸民逄萌傳與同郡王君公相友善君公遭亂儈牛自隱時人為之語曰辟丗墻東王君公次韻公定丗弼登北都東樓四首此詩及前後數詩皆北京作日著闌干角風吹濯浣衣詩葛覃服浣濯之衣喜同王季哲文選謝玄暉和王主簿怨情一首注云王主簿名季哲更得謝玄暉淸興俱不淺興復不淺見上注長吟無用歸月明南北道猶見驛塵飛杜詩使塵來驛道真皇多廟勝仁祖用功深景德元年契丹舉國來寇遂陷德清以犯天雄真宗用寇凖計決䇿親征既次澶淵兵始接射殺其驍將撻覽虜懼請和時諸將皆請以兵會界河上邀其歸以精甲躡其後殱之虜懼求哀於上上曰契丹幽薊皆吾民也何多以殺為遂詔諸將按兵勿伐縱契丹歸國自是通好守約三十有九年及元昊叛兵久不決契丹之臣教其主投詞以動我欲得晉髙祖所與關南十縣慶曆二年聚重兵境上遣使聘宰相舉知制誥冨弼報聘增幣二十萬而契丹平孫子曰夫未戰而廟算勝者得勝算多也退之書云用功深者其收名也逺卜宅遷九鼎史記太史公曰學者皆稱周伐紂居洛邑綜其實不然武王營之成王使召公卜居居九鼎焉而周復都豐鎬破胡藏萬金此卷先有河朔謾成八首其一云萬金捐費物皆春蓋指歲幣也破胡藏萬金藏疑作捐百年休戰士當日縱前禽欲斷胸奴臂不如留此心張騫傳是斷胸奴臂也文選沈休文詩命師誅後服授律緩前禽注云易曰王用三驅失前禽也王弼注易云三驅之禮禽逆來趣已則舍之背已而走則射之愛於來而惡於去也故其所施常失前禽都城礙飛烏軍幕卧貔貅曲禮曰前有鷙獸則載貔貅杜詩大城鐡不如小城萬丈餘連雲列戰格飛烏不能踰此所謂礙飛烏也柴椹知蠶老衛國風氓云于嗟鳩兮無食桑椹釋音云椹亦作椹音甚桑實也柳子厚詩西林紫椹行當熟黃雲見麥秋接天雙闕起伏地九河流耆老深望幸鑾輿不好遊司馬相如封禪書云大山梁父設壇埸望幸元稹連昌宫辝老翁此意深望幸老杜江陵望幸云望幸歘威神相如上林賦乘法駕建華旗鳴玉鵉禮經解云升車則有和鵉之音注鵉與和皆鈴也杜詩鵉輿駐鳯翔漢皇勤逺略晚節相千秋見車千秋傳不足中原地猶思一戰收杜詩胡虜三年入乾坤一戰收聖朝方北顧斜日倚東樓廟算知無敵寒儒浪自愁廟算見上李右司以詩送梅花至潞公豫雖不接右司想見其人用老杜和元次山詩例次韻潞公時留守北京老杜有和元結舂陵行兼賊退示官吏作二首其序云簡知我者不必示之凡花俗草敗人意俗物已復來敗人意見王戎傳晚見瓊𬎼不恨遲江左風流尚如此春功終到歲寒枝次韻張祕校喜雪三首落月煙沙靜渺然好風吹雪下平田瓊瑶萬里酒增價桂玉見上一炊人少錢學子已占秋食麥廣文何憾客無氈才名四十年坐客寒無氈此老杜贈鄭廣文山谷以自况睡餘強起還詩債臘裏春𥘉未隔年巷深朋友稀來往日晏兒童不掃除雪裏正當梅臘盡民飢可待麥秋無杜詩梅蘃臘前破月令孟夏麥秋至寒生短棹誰乘興晉王徽之傳嘗居夜雪𥘉霽月色淸㓪忽憶戴逵逵時在剡便夜乘小船詣之經宿方至造門不前而反人問其故徽之曰本乘興而來興盡而反何必見安道耶光入踈櫺我讀書宋齊語曰孫康家貧映雪讀書文選曹子建詩流焱激軒注軒窗間也官冷無人供美酒杜詩廣文先生官獨冷何時却得步兵厨阮籍聞步兵厨人善釀求為步兵校尉滿城樓觀玉闌干小雪晴時不共寒潤到竹根肥臘筍杜詩密竹復冬筍暖開𬞞甲助春盤杜詩自鋤稀菜甲眼前多事觀遊少觀遊見上胸次無憂酒量寬聞説壓沙梨巳動會須鞭馬踏泥看退之詩走馬來看立不正呻吟齋睡起五首呈丗弼棐几坐淸晝博山凝妙香棐几博山見上杜詩心淸聞妙香蘭牙依客土栁色過鄰墻巷僻過從少官間氣味長江南一枕夢髙卧聽鳴桹文選潘安仁西征賦鳴桹厲響學省非簿領文選沈休文學省愁卧一首注云梁書齊明帝即位沈約遷國子祭酒學省國子也山谷時為北京國子監教授故得稱學省卧痾常閉關謝靈運詩卧痾對空林雨餘樓閣靜風晚鳥烏還賞逐四時改沈休文詩山中咸可恱賞逐四時移心安一味間古人雖已往不廢仰髙山詩髙山仰止𬞞食吾猶飽曲肱哦古今論語子曰飯𬞞食飮水曲肱而枕之樂亦在其中矣酒傾因好事揚雄傳好事者載酒肴從之絃絶為知音楊雄解難云鍾期死伯牙絶絃破琴而不肯與衆鼓詳見上妬蘖長春木爭巢喧暮禽長懷阮校尉北望首陽岑文選阮嗣宗詩步出上東門北望首陽岑已把社公酒退之憶昨行社公禮罷元侯回春寒那得嚴厭聽鴉啄雪喜有燕穿簾璞玉深藏器孟子今有璞玉於此易君子藏器於身囊錐立見尖史記平原君謂毛遂曰賢士之處丗若錐之處囊中其末立見先生不能毛遂曰使遂蚤得處囊中乃頴脫而出非特其末見而已兒時愛談道衛玠談道見上注今日口如箝退之苦寒云口角如銜箝墻下蓬蒿地兒童課剪除蔓萵隨分種𣏌菊未須鉏河水傳烽火交州報捷書交趾入寇蓋熙寧八年連歲進討至十年乃降時山谷未離北京也無能落間處唐司空圖耐辱居士歌云賴是長交間處著退之詩如今到死得間處遂有詩賦歌康哉慙愧飽春𬞞送蛤䖽與李明叔諸公雪屋吹燈然豆萁煮豆然豆萁用曹子建語詳見上古來壯士亦長飢廣文不得載酒去且詠大玄庖蛤䖽退之聮句庖霜鱠玄鯽摘庖字戲贈丗弼用前韻盜跖人肝常自飽莊子盜跖篇膾人肝而餔之首陽薇蕨向來飢見史記伯夷傳誰能著意知許事且為元長食蛤䖽南史王融字元長嘗遇沈昭略昭略曰主人是何年少融殊不平謂曰僕出於扶桑入於陽谷照耀天下孰云不知而發此問昭略曰不知許事且食蛤䖽融曰物以羣分方以類聚君長隅居然應嗜此族丗弼病方家不善論蛤䖽之功戲答伯樂無傳驥空老伯樂見上重華不見士長飢淵明詩重華去我久賢士丗相尋從來萬事乖名實豈但藥翁論蛤䖽次韻師厚萱草從來占北堂衛國風伯兮云焉得諼草言樹之背毛云諼草令人忘憂背北堂也釋音云諼本作萱雨露借恩光文選江淹大王惠以恩光與菊亂佳色淵明詩秋菊有佳色裛露掇其英共葵傾太陽文選曹子建表若葵藿之傾葉太陽雖不為回光然向之者誠也人生真苦相物理忌孤芳顔延年祭屈原文物忌堅芳人諱明潔退之詩異質忌處群孤芳難寄林不及空庭草榮衰可兩忘次韻師厚雨中晝寢憶江南餅麴酒雨砌無車馬風簾灑靜便老杜詩秋風灑靜便字本出謝康樂詩忽思江外酒凖擬醉時眠退之北湖詩凖擬醉時來隱几唯觀也化莊子齊物篇南郭子綦隱几而坐仰天而噓云云篇末言莊周夢為胡蝶周與胡蝶則必有分矣此之謂物化開書屢絶編漢儒林傳序孔子晚而好易讀之韋編三絶遙知煙渚夢遣騎唤漁船遣騎見上和師厚郊居示里中諸君籬邊黃菊關心事杜詩幽事頗相關窗外靑山不丗情羅鄴詩年年點檢人間事唯有春風不丗情施肩吾詩冮神也丗情為我風色好太白詩相看兩不厭只有敬亭山江橘千頭供歲計三國志注李衡種橘千株臨終勑其子曰吾有千頭木奴可以不貧秋蛙一部洗朝酲兩部鼓吹見上歸鴻往燕競時節宿草新墳多友生檀弓上曽子曰朋友之墓有宿草而不哭焉身後功名空自重眼前樽酒未冝輕晉張翰傳使我有身後名不如即時一杯酒太白詩且樂生前一杯酒何須身後千載名和師厚秋半時復官分司西都實録熙寧十年詔復都官郎中謝景𥘉權藩郡通判和師厚詩皆北京作遙知得謝分西洛曲禮大夫七十而致仕若不得謝注云謝聽也蓋師厚丐間故分司西京無復肯彈冠上塵漢王吉傳吉字子陽與貢為友丗稱王陽在位貢禹彈冠園地除瓜猶入市老杜有除架詩又云靑門瓜地皆凍裂水田收秫未全貧陶潛傳在縣公田悉令種秫杜詩錦里先生烏角巾園收芋栗未全貧杜陵白髮垂垂老一瓶一鉢垂垂老貫休詩也張翰黃花句句新張翰字季鷹晉書有傳文選有雜詩一首云莫春和氣應白日照園林靑條若揔翠黃花如散金還與老農爭坐席莊子寓言篇其往也舍者避席煬者避竈其反也舍者與之爭席矣青林同社賽田神退之賽神絶句云麥苗貪穟桑生椹且向田頭樂社神又南溪始泛云願為同社人雞豚燕春秋和外舅夙興三首寓大雲寺作瓜蔓巳除壟苔痕猶上墻蓬蒿貪雨露松竹見氷霜卷幔天垂斗披衣日在房退之詩惟時月魄死冬日朝在房無詩歎不遇千古一潛郎董仲舒有士不遇賦文選司玄賦云尉厖眉而郎潛兮逮三葉而遘武注云漢武故事顔駟漢文時為郎至武帝輦過郎署見駟厖眉皓髮上問曰叟何時為郎答曰文帝時為郎文帝好文而臣好武至景帝好美而臣貌醜陛下好少而臣已老是以三丗不遇上感其言擢拜會稽都尉風烈僧魚響霜嚴郡角悲短童疲灑掃落葉故分披水凍食鮭少食鮭見上甕寒浮蟻遲文選曹子建七啓云盛以翠樽酌以雕觴浮蟻鼎沸酷烈馨香李善曰釋名云酒有泥齊浮蟻在上泛泛然朝陽烏鳥樂安穩記禪枝烏鳥聲樂見上杜詩禪枝宿衆鳥漂轉暮歸愁孟浩然東寺詩禪枝悕鴿栖暑逐池蓮盡寒隨塞鴈來月令孟春仲秋皆曰鴻鴈來而孟春注曰鴈自南方來將北反其居詩言暑盡當是仲秋也衣裘雖得暖狐貉正相哀論語衣敝緼𫀆與衣狐貉者立而不耻僧汲轆轤曉車鳴關鎖開不因朝鼓起來帙亂書堆杜詩書亂誰能帙杯乾自可添陪師厚遊百花洲槃礴范文正公祠下道羊曇哭謝安石事因讀生存華屋處零落歸山丘為十詩此詩及前篇併後七八篇皆在鄧州作蓋百花洲萊公范公祠皆在鄧而師厚家南陽山谷自北京解罷改官回至南陽見師厚也憶在昭陵日仁宗葬永昭陵傾心用老成功歸仁祖廟政得一書生謂文正公羊生但著鞭勿哭西州門故有不亡者南山相與存羊曇事在謝安傳著鞭見劉琨傳莊子曰凡之亡也不足以喪吾存慶州自不惡籍甚載聲華忠義可無憾公今有丗家仁宗時元昊反文正公自請守鄜延徙知慶州又以為環慶路經略安撫使決䇿取橫山復靈武而元昊稱臣請和文正仲子忠宣公純仁字堯夫熙寧七年十月知慶州所謂丗家者此也哲宗即位又自河中徙慶州此詩未也不惡見上公歸未百年􅔏巢荒古屋我吟殄瘁詩悲風韻喬木詩人之云亡邦國殄瘁傷心祠下亭在時公燕處臨水不相猜江鷗會人語公有一杯酒與人同醉醒遺民能記憶欲語涕飄零委徑問謡俗髙丘省佃作昔遊非苟然今花幾開落在昔實方枘成功見圎機離騷經云不量鑿而正枘兮固前修以菹醢九辨云圜鑿而方枘兮吾固知其鉏鋙而難入文正平生鉏鋙不合多矣參知政事亦以不合出而其臨邊隨宜制變未始不圎也文中子曰安得圓機之士與之言九流哉九原尚友心見上白首要同歸潘安仁詩投分寄石友白首同所歸文正公嶽陽樓記其末云其必曰先天下之憂而憂後天下之樂而樂乎噫微斯人吾誰與歸詩意端指此人去洲渚在春回花草班杜詩重岩細菊班又云春風花草香清談值淵對發興如江山落日銜城壁太白詩靑山猶銜半邊日祠東更一遊文正守鄧三年後人祠之悲來惜酒少安得董糟丘南史陳暄與兄子秀書曰速營糟丘吾將老焉和師厚接花妙手從心得接花如有神根株穰下土鄧州治穰縣顔色洛陽春雍也本犂子史記仲尼弟子傳冉雍字仲弓子曰雍也可使南面仲弓父賤人子曰犂牛之子騂且角雖欲勿用山川其舍諸仲由元鄙人仲由字子路性鄙好勇力冠雄雞佩貑豚陵暴孔子孔子設禮稍誘子路後儒服委質升堂與入室只在一揮斤論語子曰由也升堂矣未入於室也莊子匠石揮斤成風見上注言以洛陽牡丹接鄧州所種花如化犂牛子鄙人為良士也和師厚栽竹大隱在城市文選王康琚詩大隱隱朝市此君真友生根須辰日斸藝苑雌黃云種竹多用辰日山谷所謂根須辰日斸也筍要上畨成杜詩無數春笋滿林生柴門密掩斷人行會須上畨看成竹客至從嗔不出迎畨字元注云去聲蓋用蜀人方言也山谷始作平聲龍化葛陂去用費長房竹化為龍事見上鳯吹阿閣鳴漢律曆志黃帝伶倫自大夏之西昆侖之隂取竹之解谷斷兩節間而吹之以為黃鍾之宮制十二筒以聽鳯之鳴其雄鳴六雌鳴亦六帝王丗紀黃帝時鳯巢阿閣草荒三徑斷歲晚見交情用翟公書門事見上次韻外舅喜王正仲三丈奉詔相南兵回至襄陽捨驛馬就舟見過三首漢上思見龐德公龐德公襄陽人以况師厚王正仲見第一卷末注别來悲歎事無窮聲名籍甚漫前日須鬢索然成老翁並見上注家釀已隨刻漏下晉何充字次道劉惔云見次道飲令人欲傾家釀園花更開三四紅相逢不飲未為得唐李敬方詩相逢不飲空歸去洞口桃花也笑人見復齋謾録聽取百烏啼匆忽能來問疾見維摩經好音傳蹇步昏花當日痊烹鯉得書增目力烹鯉見上孟子既竭目力焉呼兒扶立候門前師厚首唱云倒著衣裳迎户外盡呼兒女拜燈前見第一卷末注歸去來詞云稚子候門遊談取重慙犀首犀首公孫衍也史記有傳居物多贏昧計然史記貨殖傳越王勾踐困於會稽乃用范蠡計然注計然范蠡師也漢張湯傳居物致冨與湯分之惟有交情等金石金石交見韓信傳白頭忘義復忘年忘年忘義見莊子齊物篇語言少味無阿堵馬援傳過是恐少味矣阿堵見上冰雪相看有此君燈火詩書如夢寐麒麟圖畫屬浮雲漢單于入朝上思肱股之美圖畫功臣於麒麟閣平章息女能為婦息女見漢髙紀老杜送封主簿詩序余與主簿平章鄭氏女子垂欲納采書至女子巳許他族歡喜兒曹解綴文漢劉韻贊綴文之士憂樂同科唯石友見上别離空復數朝曛韓詩吾徒幸無事庶以窮朝曛百花洲雞題文正公集中有答王源叔憶百花洲見寄云芳洲名冠古南都又獻百花洲圗上陳州晏相公云穰下勝遊少此洲聊入詩百花爭窈窕一水漣漪鄧州南陽郡東漢為南都也范公種竹水邊亭漂泊來遊一客星老杜上漢中王云西漢親王子成都老客星老杜以自喻山谷亦用此意客星本出嚴光傳神理不應從此盡百年草樹至今青用老杜齊魯靑未了之意竹下把酒竹下傾春酒愁隂為我開不知臨水語更得幾回來砌臺晚思目極江南千里春誰今灑筆可招魂宋玉有招魂一篇向人猶作故時面翠竹蒼煙一萬根此卷先有衛南詩落句云唯有鳴鴟古祠柏對人猶是向時倩與此同意晉劉惔傳惔字真長禇裒謂孫悼曰真長生平何嘗相比數而卿今日作此面向人耶山谷外集詩注卷十二
