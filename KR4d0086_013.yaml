  text: 山谷外集詩注卷第十三
  hash: sha256:29c106de725029ed1f7533aa1812b4c86edc20e7ffb4644465e8d352bd3e52e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_013-1a}
body:
  text: 叔父釣亭檻外溪風拂面涼四圍春草自鉏荒杜詩草茅無徑欲教鉏又云葵荒欲自鉏沉霜髮為鈎直陸沉見上楚詞曰以直針而為鈎維河魚之能得柳貫錦鱗緣餌香桞貫魚見上吕氏春秋善釣者漁于十仞之下餌香也影落華亭千尺月東坡答文與可詩云丗間亦有千尋竹月落亭空影許長見集中篔簹谷偃竹記華亭乃秀州屬邑釣亭當在此夢通歧下六州王太公釣於渭濵而遇文王帝王丗紀曰諸侯歸周者六州文王不失臣節合六州之諸侯以朝紂史記周紀曰自歧下而徙都豐麒麟卧笑功名骨不道山林日月長夜發分寧寄杜澗叟山谷居雙井隸分寧縣陽關一曲水東流渭城微雨浥輕塵客舍青青栁色新勸君更盡一杯酒西出陽關無故人此王維送元二使安西詩遂為歌曲燈火旌陽一釣舟寰宇記旌陽山在分寧縣東一里旌陽許君曽逰故名我自只如常日醉歐陽公别滁州云我欲祗如常日醉莫教弦𬋩作離聲滿川風月替人愁杜牧詩蠟燭有心還惜别替人垂淚到天明元豐癸亥經行石潭寺見舊和栖蟾詩甚可笑因削柎滅藁别和一章癸亥乃元豐六年是歲十二月自大和移德平自此以後皆赴德平經塗所作千里追奔兩蝸角莊子則陽篇有國於蝸之左角者觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反百年得意大槐宫見第三卷宿觀音院詩注空餘祗夜數行墨涅槃經云因本經以偈頌名祇夜譯𣑽祗夜此云重頌不見伽梨一臂風譯𣑽僧伽梨三衣也俗眼止如當日白我顔非復向來紅言俗人猶以白眼相視而吾亦老矣白眼見阮藉傳浮生不作遊絲上即在塵沙逐轉蓬遊絲轉蓬見上題馬當山魯望亭四首元注云彭澤舊治所馬當一曲孤煙桉尋陽志馬當山在江州彭澤縣西四十里髙二十丈其下無底有廟封為上元水府陸龜蒙字魯望有馬當山銘大槩言太行吕梁馬當合是三險而為一未敵小人方寸之苞藏名亭曰魯望以此故也因晝陶元亮等四人歟人物于今渺然當今人物渺然王逸少帖中語也不見繞籬黃菊陶潛詩采菊東籬下誰收種秫圭田一作有地自荒粳稻無人更與酒錢晉書陶潛傳潛字元亮為彭澤令在縣公田悉令種秫谷曰令吾常醉於酒足矣妻子固請種粳乃使二頃五十畒種秫五十畒種粳圭田見孟子老杜贈鄭虔云賴有蘇司業時時與酒錢右元亮鯨波橫流砥柱劉夢得詩丗道劇頽波我心如砥柱禹貢底柱在陜州硤石縣熙寧廢縣為鎮隸陜縣河水分流包山而過若柱然唐大宗勒銘於此虎口活國宗臣漢叔孫通傳通自言幾不免虎口唐狄仁傑傳力勸武后迎廬陵王曰立廬陵王則千秋萬歲後常享宗廟三思立廟不祔姑后感悟即日迎王於房州漢蕭曹贊為一代之宗臣小屈弦歌百里仁傑嘗為來俊臣所誣捕送制獄巳成反減死貶彭澤令人為置生祠不誣天下歸仁小屈一作少日不誣一作莫言論語一日克巳復禮天下歸仁焉右狄梁公不見魯公斷石誰家為礎為杠魯公當是貶吉州司馬時經行此地有紀行碑石而不存疑其為礎以薦枉或為橋梁也孟子云十一月徒杠成注疏引説文云石矼石橋也俗作杠從木筆法錐沙屋漏見第六卷題扇注心期曉月秋霜心期見上右顔魯公笠澤道人髙古吳郡圗經曰松江一名笠澤陸魯望居甫里號所注書曰笠澤叢書文章白髮蕭條一作文章歲寒後凋欲問勒銘遺墨即馬當銘應書水府蛟綃吳都賦泉室潛織而卷綃淵客慷慨而泣珠注云俗傳鮫人從水中出曽寓人家積日賣綃綃即孚俞也臨去索器泣而出珠滿盤以遺主人右陸魯望次韻胡彥明同年羇旅京師寄李飛三章一章道其窮困二章勸之歸三章言我亦欲歸耳胡李相甥也故有檳榔之句看除日月坐中銓言坐待銓選閲歲月之除去也唐制三銓選士尚書為尚書銓侍郎二人分為中銓東銓見德宗實録今銓法有尚書左右選侍郎左右選胡彥明隸侍郎左選故曰中銓文選禇淵碑云轉吏部郎執銓以平注云韋昭漢書注曰銓稱錘也聲類曰銓所以稱物一歲應無官九遷文選任彥升代范雲謝表云千秋之一日九遷荀爽之十旬逺至方之微臣未為速逹注云千秋自寢園郎論戾大子事一日超九級至大鴻臚退之上張建封書雖日受千金之賜一日九遷其官蔥韭盈盤市門食市門見上詩書滿枕客床氊杜詩坐客寒無氊留連節物孤朋酒豳七月朋酒斯饗惱亂鄰翁謁子錢漢貨殖傳吳楚兵之起長安中列侯封君行從軍旅齎貸子錢家子錢家以為關東成敗未決莫肯豫唯母鹽氏出捐千金貸其息豫之誰料丹徒布衣得困窮且忍試新年南史劉穆之傳曰今日思為丹徒布衣不可得也穆之少時家貧好往妻兄家乞食食畢求檳榔江氏兄弟戲之按爾雅妻之晜弟為甥詩序相甥蓋謂此丁未同升鄉里賢丁未治平四年同登第别離寒暑未推遷賈誼鵬賦萬物變化固無休息斡流而遷或推而還太白詩百齡何蕩漾萬化相推遷淵明詩序云日月推遷蕭條羇旅深窮巷蚤挽聲名上細氊漢王吉傳諌昌邑王疏曰廣厦之下細旃之上注云旃與氊同碧嶂清江元有宅白魚黃雀不論錢杜詩白魚如切玉朱橘不論錢檳榔一斛何須得李氏弟兄佳少年穆之為丹陽尹召妻兄弟及醉令厨人以金柈貯檳榔一斛進之大白詩何時黃金盤一斛薦檳榔畏人重祿難堪忍文選魏文帝詩棄置勿復道客子常畏人閲丗浮雲易變遷徐步當車飢當肉戰國䇿齊語云齊宣王見顔蠋云云蠋辭去曰蠋願得歸晚食以當肉安步以當車無罪以當貴東坡答畢仲舉書云偶讀戰國䇿見處士顔蠋之語晚食以當肉欣然而笑若蠋者可謂巧於居貧者也菜羮菽黍飢而食其味與八珍等而既飽之後芻豢滿前唯恐其不持去也鋤頭為枕草為氊元無馬上封侯骨見上安用人間使鬼錢杜恕體論曰可以使鬼者錢魯褒錢神論曰錢無耳可以使鬼不使朱門爭底事清溪白石可忘年杜詩爾輩可忘年上蕭家峽玉笥峯前幾百家山明松雪水明沙文選顔延年詩庭昏見野隂山明望松雪趂虛人集春𬞞好桑菌竹萌煙蕨芽栁子厚桞州詩云青箬褁鹽歸洞客緑荷包飯趂虛人元注云虛市也寰宇記吉州廬陵縣玉笥山道書福地詩云此山地肥美冝榖辟兵桑菌桑椹也詩食我桑椹爾雅笋竹萌山谷嘗有詩云蕨芽已作小兒拳何蕭二族西漢功名相國多南朝人物數諸何相國謂蕭何也南史何尚之傳廬江灊人子孫弟姪附傳者八人向來冨貴喧天地亦有文章在澗阿澗阿見上魏夫人壇獨掃娥眉作逺山杜詩淡掃娥眉朝至尊春風瑶草照朱顔我來欲問許玉斧二十四峯如髻鬟寰宇記撫州臨川縣西北六里二百步有魏夫人壇神仙內傳夫人晉司徒舒之女傳法于護軍長史許穆穆子玉斧皆升仙隱梅福處吳門不作南昌尉上疏歸來朝市空淵明詩一丗異朝市笑拂巖花問塵丗故人子是國師公漢書梅福字子真九江壽春人寰宇記洪州南昌縣有梅福池福嘆曰生為我酷仕為我梏形為我辱智為我毒於是棄南昌尉去妻子入洪崖山得道為神仙代代有人或於玉笥山中逢見詩意謂梅福與劉向皆仕元成間數上疏直諌亦略相似而向之子歆改名秀王莽篡位歆為國師後事皆在莽傳蕭子雲宅郁木坑頭春鳥呼雲迷帝子在時居風流掃地無尋處只有寒藤學草書南史齊髙帝孫子雲字景喬善草隸自云效鍾元常王逸少而微變字體為東陽太守百濟國使人至建鄴求書逢子雲為郡維舟將發望船三十許步行拜行前子雲遣問之答曰侍中尺牘之美逺流海外今日所求唯在名迹子雲停船三日書三十紙與之獲金貨數百万玉笥山記曰蕭子雲來棲止有人謂曰東北有洞曰都木坑水自東注可以久居子雲遂徙家居之後全家隱洞中不知所之其地名都木岩也大曆𥘉有道士謝修通居此山四十年後遇人引行見宅基遂結庵居之長慶𥘉入都木坑見一宅重扉須臾有青衣童子招修通入見一人紫綬峩冠佩剱立堂之左一人碧綬素簡立堂之右童子曰左者蕭君右者梅君即梅福也此記詳見太平御覽郁木坑頭當作都木坑掃地見上避秦十人九真承詔上龍湖史記封禪書有龍垂胡髯下迎黃帝黃帝上騎群臣從者七十餘人按漢金日磾傳捽胡投莾何羅殿下注胡頸也尚書序云承詔作傳盡是驪山所送徒唯有鄧公留不去松根榰鼎煮菖蒲漢髙紀為縣送徒􅌐山黃雀牛大垂天且烹割莊子逍遙篇其翼若垂天之雲以割烹要湯見孟子細微黃雀莫貪生頭顱雖復行万里卿頭顱方行万里見袁紹王荆公嘗用此事作二十字送吕望之赴臨江云黃雀有頭顱長行万里餘想因君出守暫得免苞苴猶和鹽梅傳説羮到官歸志浩然二絶句到官謂𥘉至大和縣也此後皆大和所作雨洗風吹桃李淨劉夢得詩桃花淨盡菜花開松聲䀨盡鳥聲春滿船明月從此去本是江湖寂寞人鳥烏未覺常先曉笋蕨登盤始見春曉鴉未鳴而先起因見笋蕨始知春深言作邑之勞如此也㰸手還他能者作從來刀筆不如人漢曹參傳起秦刀筆吏師古曰刀所以削書古者用簡牒故吏皆以刀筆自隨也陳湯傳挫於刀筆師古曰刀筆謂吏出迎使客質明放船自瓦窑歸鼓吹喧江雨不開丹楓落葉放船回謝靈運詩曉霜楓葉丹杜詩送客蒼溪縣山寒雨不開直愁騎馬滑故作泛舟回風行水上如雲過易風行水上渙地近嶺南無鴈來衡陽有回鴈峯詳見上注樓閣人家捲簾幕杜牧之詩深秋簾幕千家雨落日樓臺一笛風菰蒲鷗鳥樂灣洄惜無陶謝揮斤手見上詩句縱橫付酒杯送酒與畢大夫淺色官醅昨夜篘一樽聊付卯時投卯酒見上甕邊吏部應歡喜殊勝平原老督郵晉畢卓字茂丗為吏部郎官比舍郎釀熟卓夜至其甕間盜飲之為掌酒者所縛明旦視之乃畢吏部也丗説桓公有主簿善别酒好者謂青州從事惡者謂平原督郵青州有齊郡言至齊也平原有革縣言至革上住也次元明韻寄子由按當時山谷兄大臨字元明寄子由詩云鍾鼎功名淹管庫朝廷翰墨寫風煙管庫謂監筠州鹽酒稅也子由在筠州有東軒記實元豐三年十二月作是歲庚申山谷得邑太和辛酉到官半丗交親隨逝水論語子在川上曰逝者如斯夫幾人圖畫入凌煙唐貞觀功臣圖形凌煙閣春風春雨花經眼江北江南水拍天拍天見上欲解銅章行問道欲解銅章可見太和將滿時作四首同時銅章見第三卷末注定知石友許忘年石友忘年並見上脊令各有思歸恨日月相催雪滿顚言彼此皆有兄弟之思如脊令在原也再次韻奉答子由蠆尾銀鈎謂索靖書見上寫珠玉剡藤蜀繭照松煙唐舒元輿有弔剡藤文繭紙見上似逢海若談秋水莊子秋水篇見上始覺醯雞守甕天莊子田子方篇孔子曰丘之於道其猶醯雞歟微夫子之發吾覆也吾不知天地之大全也何日清揚能覿靣鄘國風君子偕老云子之清揚揚且之顔也注云清視清明也揚廣揚而頭角豐滿魯國風猗嗟云抑若揚兮注揚廣揚又云猗嗟名兮美目清兮注上為名目下為清又云清揚婉兮只今黃落又凋年月令季秋草木黃落漢武帝秋風辭草木黃落兮鴈南歸文選舞鶴賦窮隂殺節急景凋年萬錢買酒從公醉杜詩左相日興費萬錢飲如長鯨吸百川一鉢行歌聽我顚傳燈録道吾和尚有一鉢歌再次韻寄子由想見蘇耽携手仙神仙傳蘇仙公桂陽人漢文帝時得道仙去後有白鶴來上郡城東北樓上人或挾彈彈之鶴以爪攫樓板以􅃮書云城郭是人民非三百甲子一來歸吾是蘇君彈何為又一説蘇耽者桂陽人也少以至孝著稱𥘉去時云今年大疫死者略半家中井水飲之無恙果如所言出洞仙傳所載鄉里及行事大槩皆同可見仙公即蘇耽也青山桑柘冒寒煙麒麟墮地思千里韻書曰麒麟白馬黑脊傳玄豫章行云男兒當門戶墮地自生神虎豹憎人上九天宋玉招魂云歸來君無上天些虎豹九閞啄害下人些風雨極知雞自曉鄭國風風雨凄凄雞鳴喈喈雪霜寧與菌爭年莊子逍遙篇朝菌不知晦朔蟪蛄不知春秋此小年也詩意謂松柏冒霜雪豈與朝菌較修短耶何時確論傾樽酒醫得儒生自聖顚元注云出素問今按難經五十九難曰在顚之病何以别之自髙賢也自辨智也自貴倨也妄笑好歌樂也次韻寄上七兄學得屠龍長縮手屠龍見上練成五色化蒼煙列子湯問篇天地亦物也物有不足故昔者女蝸氏練五色石以輔其闕誰言遊刃有餘地恢恢乎其於遊刃必有餘地矣此莊子言庖丁解牛今以言屠龍自信無功可輔天言練石也啼鳥笑歌追暇日飽牛耕鑿望豐年帝王丗紀老人擊壤于道曰吾鑿井而飲耕田而食帝何力於我哉荷鋤端欲相隨去邂逅青雲恐疾顚髙位實疾憤厚味實醋毒見國語周語下吉老受秋租輒成長句吉老太和丞也後篇云播粳眯眼丞良苦黃花事了緑叢霜黃花事了蓋倣退之杶李事巳退也蟋蟀催寒夜夜牀蟋蟀見上愛日捃收如盜至漢食貨志力耕數耘收獲如寇盜之至失時鞭撲奈民瘡田夫田婦肩頳簷退之聮句刈熟擔肩頳江北江南稼滌埸豳七月云十月納禾稼又云十月滌埸毛云滌掃也埸功畢入也少忍飛粳瞇君眼要令私廪上公倉莊子天運篇播粳瞇目則天地易位矣再次韻和吉老今日僕姑晴自語僕姑見上愁隂前日雪鋪床三冬一雨禾頭濕朝野僉載云秋雨甲子禾頭生耳百斛幾痕牛領瘡白樂天官牛詩云官牛駕官車滻水岸邊般載涉載向丑門官道西緑槐隂下鋪沙堤馬蹄踏沙雖淨潔牛領牽車欲流血但能濟人治國調隂陽官牛領穿亦無妨民欲與翁歸作臘漢嚴延年傳延年母從東海來欲從延年臘又云母畢正臘遂去師古曰建丑之月為臘祭因會飲若今蠟節公方無事可開埸相勤凍坐真成惡愧我偷間飽大倉大倉見上招吉老子範觀梅花播粳瞇眼丞良苦鳴鼓連村尉始歸後魏李崇徙兖州刺史兖土舊多劫盜崇命村置一樓樓皆縣鼓盜發之處亂擊之聲布百里皆發人守險由是盜發無不獲諸州皆效之及取江梅來一醉明朝花作玉塵飛玉塵眯目見上寄黃從善故人千里隔談經想見牛刀刃發硎見上渴雨芭蕉心不展文選謝靈運詩折麻心莫展此借用未春楊柳眼先青白樂天楊柳枝詞云葉含濃露如啼眼枝嫋輕風似舞腰鳬飛葉縣見上郎官宰後漢書郎官出宰百里虹貫江南處士星晉隱逸謝敷傳𥘉月犯少微少微一名處士星占者以隱士當之譙國戴逵有美才或憂之俄而敷死此語不知謂誰天子文思求逆耳杜牧詩文思天子復河隍漢張良諌髙祖云忠言逆耳利於行吾宗一為試雷霆漢賈山傳人主之威非特雷霆也登快閣怏閣在太和山谷送吕知常赴太和丞云我去太和欲期矣吕君𥘉得太和官又云快閣六月江風寒此篇載在古詩中癡兒了却公家事生子癡了官事官事未易了也了事正作癡為快耳見晉傅咸傳快閣東西倚晚晴唐李涉感興隋氏造宫闕峨峨倚雲煙落木千山天逺大澄江一道月分明老杜天河詩常時任顯晦秋至輒分明朱弦巳為佳人絶用鍾期伯牙事不知謂誰青眼聊因美酒橫萬里歸船弄長笛此心吾與白鷗盟題息軒僧開小檻籠沙界金剛經以恆河沙數三千大千丗界文選頭陀寺碑演勿照之明而鑒窮沙界李善注亦引金剛經欎鬱參天翠竹叢老杜古柏行黛色參天二千尺萬籟參差寫明月一家寥落共淸風萬籟一家並見上蒲團禪板無人付過禪板來過蒲團來見上注茶鼎薰爐與客同文選雪賦燎薰爐兮炳明燭萬水千山尋祖意歸來笑殺舊時翁僧貫休詩萬水千山得得來傳燈録南嶽讓禪師問嵩山安如何是祖師西來意安曰如何不問自巳意從時中乞蒲團撲屋隂風雪作團織蒲投我最冝寒君當自致青雲上見上快取金狨覆馬鞍國朝皆跨狨鞍答余洪範二首道在東西祖傳燈録天竺有二十七祖逹磨西來為中華𥘉祖贊寧僧史以中國為東夏僧寶傳玄沙禪師傳云師曰逹磨不來東土二祖不往西天又按傳燈録大同禪師傳師問僧什麼處來曰東西山禮祖師來師曰祖師不在東西山疑或用此意詩如大小山小山巳見上注按許子解淮南鴻烈其敘云安襲封淮南山方術之士多往歸焉遂與蘇飛李尚左吳田由雷𬒳毛披伍𬒳晉昌等八人及諸儒大山小山之徒共講論道德總統仁義而著此書一家同雪月萬事廢機關天上麒麟閣山中虎豹間何時得丘壑明鏡失朱顔並見上注懸罄齋厨數米炊室如懸罄見左傳簡髮而櫛數米而炊見莊子庚桑楚篇文貧中氣味更相思可無昨日黃花酒又是春風栁絮時題安福李令朝華亭安福縣隸吉州丹楹刻桷上峥嶸春秋莊二十三年三月丹桓宫楹二十四年三月刻桓宫桷表裏江山路一作略眼平表裏山河必無恙也見左傳僖二十八年晉子犯云曉日成霞張錦綺此卷有快閣詩一張紅錦夕陽斜巳注青林多露綴珠纓謝靈運詩云花上露猶泫法華經普門品云無盡意白佛言我當供飬觀丗音菩薩即解頸衆寶珠纓絡以與之文選王明君詞云泣淚濕珠纓人如旋磨觀群蟻見上田似圍碁據一枰文選博奕論一枰之上李善本從木音平五臣本作一抨輔萌切對案昏昏迷簿領暫來登覽是髙明寄舒申之户曹吉州司戶官雖小曽屈詩人杜審言唐杜審言傳恃才髙以傲丗見疾嘗語人曰吾文章當得屈宋作衙官遷洛陽丞坐事貶吉州司戶參軍審言生子間間生甫字子美今日宣城讀書客還趨手板見上傍轅門江山依舊歲時改桃李欲開煙雨昏公退但呼紅袖飲詩自公退食剩傳歌曲教新翻元稹連昌宫詞云偷得新翻數般曲劉禹錫楊柳枝詞聽唱新翻楊柳枝次韻吉老十小詩十襲發硎刀見上無名自貴髙秋衣猶葛製重裘兼味飬大賢氷食葛製神所憐退之苦寒歌也午飯厭溪毛澗溪沼沚之毛見左傳萬木霜搖落見上山呈斧鑿痕退之詩徒觀斧鑿痕不矚治水航癡蠅思附尾史記伯夷傳顔淵雖篤學附驥尾而行益顯索隱曰蒼蠅附驥而致千里驚鶴畏乘軒衛懿公好鶴鶴有乘軒者見左閔二年日短循除廡溪寒出􅍫科為我量度掘􅍫科見退之石鼓歌官居圖畫裏小鴨睡枯荷謂薰爐也李義山詩云睡鴨香爐換夕薰眼看人換丗文選歎逝賦川閲水以成川水滔滔而日度丗閲人而為丗人冉冉而行暮人何丗而弗新丗何人之能故歐公夢中詩碁罷不知人換丗手種木成隂藏拙無三窟見上談禪劇七禽談禪問答之間譬若孔明之於孟獲七縱七禽也詳見第一卷寄謝外舅詩注寒氷幾䀶落秋山萬竅號莊子齊物篇大塊噫氣其名為風是唯無作作則萬竅怒號紅梨啄烏鵲殘菊挂蠨蛸詩東山云蠨蛸在戶佳人斗南北第一卷有詩云故人南箕與北斗言離别也美酒玉東西酒杯名夢鹿分真鹿事見列子巳見上注無雞應木雞莊子逹生篇紀渻子為王飬鬪雞曰望之似木雞矣異雞無敢應者反走矣斫鼻昔常尓絶弦知者稀無人與爭長唯有釣魚磯並見上注茵席絮剪繭枕囊收決明杜詩階下決明顔色鮮南風入晝夢起坐是松聲夢中聞風起及覺乃松聲也如楞嚴經云如重睡人其家有人搗練舂米其人夢中聞舂搗聲别作他物或為擊鼓或為撞鍾宋玉髙唐賦云俯視峥嶸不見其底虛聞松聲半菽一瓢飲項籍傳卒食半菽語顔子一瓢飲懸鶉百結衣荀子曰子夏家貧衣若懸鶉杜詩弊衣何啻聮百結蕭條鬼不瞰楊雄解嘲賦云髙明之家鬼瞰其室聊可與同歸楊雄逐貧賦末云貧遂不去與我遊息此用其意學似斫輪扁見上詩如飯顆山李白嘲杜甫詩飯顆山頭逢杜甫頭戴笠子日卓午即問年來太瘦生揔為從前作詩苦見本事詩室中餘一剱無氣斗牛間見上歐陽從道許寄金橘以詩督之元注云從道參禪常有言句來頗聞數從歌舞飲故及之禪客入秋無氣息想依紅袖醉毰毸射雉賦敷藻翰之陪鰓霜枝搖落黃金彈許送筠籠殊未來西京雜記韓嫣好彈以黃金為丸筠籠見上黃幾復自海上寄惠金液三十兩且曰唯有德之士冝享將以排蕩隂邪守衛真火幸不以凡物畜之戲答皺面黃須巳一翁楞嚴經迫於衰顔髮白面皺巳成老翁見上樽前猶發少年紅金丹乞與煩真友只恐無名帝籍中禮記月令藏帝籍之收於神倉今借使以言挂名仙籍也樂天詩但恐長生須有籍仙臺試為檢名看和七兄山蕷湯厨人清曉獻瓊糜見上正是相如酒渴時相如傳常有消渴病杜詩酒渴愛江清能解飢寒勝湯餅束晳餅賦玄冬猛寒淸晨之會涕凍鼻中霜凝口外充虛解戰湯餅為最略無風味笑蹲鴟漢貨殖傳下有蹲鴟至死不飢注謂芋也打窗急雨知然鼎亂眼晴雲看上匙巳覺塵生雙井碗濁醪從此不須持杜詩濁醪有妙理奕棊二首呈任公漸偶無公事負朝暄韓文丞廳記云吾方有公事子姑去負暄見列子三百枯棊共一樽枯棊三百見文選博奕論坐隱不知巖穴樂手談勝與俗人言語林曰王中郎以圍棊是坐隱支公以棊為手談馬子長報任少卿云此可與智者道難為俗人言簿書堆積塵生案嵇康書人間多事堆案盈几車馬淹留客在門戰勝將驕疑必敗果然終取敵兵翻羽傳宋義諌曰戰勝而將驕卒惰者敗今少惰矣偶無公事客休時席上談兵較一作角兩碁心似珠絲遊碧落樂天詩上窮碧落下黃泉身如蜩甲化枯枝退之聮句化蠱枯梮枝言蟬也蟬亦曰蜩五月鳴蜩湘東一目誠甘死南史王偉為侯景謀主偉作檄云項羽重瞳尚有烏江之敗湘東一目寧為赤縣所歸天下中分尚可持項與漢王約中分天下割洪溝此謂持碁白黑不可動誰謂吾徒猶愛日見法言參橫月落不曽知月落參橫見子厚龍城録次韻幾復答豫所贈三物三首誰憐湖海士見上白髮夜窗檠退之短檠歌夜書細字綴語言兩眼眵昏頭雪白風雨雞不巳見毛詩詩書眼尚明禪枝安宿鳥禪枝見第六卷和外舅夙興詩注僧粥吼華鯨東都賦發鯨魚鏗華鍾以言木魚呼粥也但滿五車讀見上行看一座傾一座盡傾見相如傳右石燈檠絶域薔薇露嶺南有薔薇露楊文公談苑金陵宫中人挼此水染生帛言其香也他山􅔽蓞爐西漢雜記丁緩作九層博山香爐鏤為竒禽怪獸今刻蓮花也尓雅荷芙蕖其花􅔽蓞薰衣作家想伏枕夢閨姝遊子宦蟻穴見上謫仙居匏壷用費長房傳壷公事當時有憂樂回首亦成無一作稍薰衣一莞似慰客心孤遊子夢蟻穴謫仙居匏壷霏霏麗絲網清興可能無右石博山九原誰復起死者可作見上糟魄未傳心見上不取丁儀米晉陳壽傳丁儀丁􅘙有盛名於魏壽謂其子曰可覔千斛米見與當為尊公作佳傳丁不與竟不立傳疑成校尉金曹操特置發兵中郎將模金校尉見文選陳琳傳名從髙位借德有下僚沉選詩英俊沉下僚筆削多瑕點孔子丗家筆則筆削則削退之詩指摘困瑕玷猶希畏友針一本筆從髙位曲陸有德人沉救俗規如此慵踈廢古今右石刻靜居寺上方南入一徑有釣臺氣象甚古而俗傳謬妄意嘗有隱君子漁釣其上感之作詩吉州青原山靜居寺行思禪師道埸見下注避丗一丘壑漁釣於一壑栖遲於一丘班固敘傳似漁非丗漁子厚饒娥碑丗漁鄱水獨吟嘉橘頌屈原九章有嘉橘頌不遺子公書漢陳咸傳豫陳湯書曰即蒙子公力得入帝城死不恨笋蕨瑶琳晚絲緡歲月除詩其釣伊何維絲伊緡安知冶容子昜冶容誨淫紅袖泣前魚文選阮嗣宗詩昔日繁華子安陵與龍陽主云説苑曰安陵纒得幸於楚恭王云云戰國茦云龍陽君釣十余魚而泣下王問之對曰臣始得魚甚喜後得益多而不欲棄前所得也今臣得拂枕席爵至人君從人於庭避人於途四海之內美人甚多矣聞臣得幸於王褰裳而趨王臣亦曩之所得魚也亦將棄矣陸韓卿詩云子瑕矯後駕安陵泣前魚注云泣魚是龍陽非安陵侯尉之吉水覆按未歸三日泥雨戲成寄之歎息侯嬴老史記魏公子無忌傳封為信陵君魏有隱士侯嬴年七十家貧為大梁夷門監者公子往請欲厚遺之不肯受乃置酒大會賓客坐定公子從車騎虛左自迎侯生云云尉曹鞍馬疲山花迷部曲江雨壓旌旗越鳥勸沽酒謂提壷盧鳥也竹雞憂踏泥謂泥滑滑鳥也不知何處醉遙寄解酲詩劉伶五斗解酲侯尉家聽琵琶舫齋蒼竹雨聲中一曲琵琶酒一鍾恰似潯陽江上聽只無明月與丹楓白樂天琵琶引其略云潯陽江頭夜送客楓葉荻花秋索索主人下馬客在船舉酒欲飲無管弦醉不成歡慘將别别時茫茫江浸月云云次韻吉老寄君庸何郎生事四立壁見上心地髙明百不憂杜詩願聞第一義回向心地𥘉心地本出佛書杜詩又云吾知徐公百不憂白眼醉來思阮籍見上碧雲吟罷對湯休文選江文通擬休上人詩日暮碧雲合佳人殊未來沙門慧丘本妵湯諸公著力書交上尺璧深藏價未酬空使君如巢幕燕將雛處處度春秋左傳燕巢於幕上樂府有鳯將雛寄袁守寥獻卿公移猥甚叢生笋退之詩戢戢巳多如束笋集中有符移官移與公移皆檄也訟諜紛如蜜分窠訟諜即北山移文所謂諜訴倥偬也少得曲肱成夢蝶見上不堪衙吏報鳴鼉詩鼉鼓逢逢巳荒里社田園了可奈春風桃李何想見冝春賢太守無書來問病維摩見上廖袁州次韻見答并寄黃靖國再生傳次韻寄之春去懷賢感物多飛花髙下罥絲窠退之聮句絲窠掃還成傳聞治境無戾虎戰國䇿秦語云陳軫曰有兩虎爭人而鬪者管莊子將刺之管與止之曰虎者戾蟲人者甘餌也注云戾貪也虎渡江見上更道豐年鳴白鼉唐張籍詩天欲雨有東風南溪白鼉鳴窟中史筆縱橫窺寶鉉元注云干寶作搜神記徐鉉作稽神録當時謂寶鬼之董孤詩才清壯近隂何隂鏗何遜見上寄聲千萬相勞苦如倚胡床得按摩趙廣漢傳界上亭長戲曰至府為我多謝問趙君師古曰多厚也言殷勤若今人言千萬問訊據胡床見晉桓伊傳禮記內則問衣燠寒疾痛苛癢而敬抑搔之注云抑按搔摩之袁州劉司法亦和豫摩字詩因次韻寄之袁州司法多兼局日暮歸來印幾窠詩罷春風榮草木歸去來詞木欣欣以向榮書成快劒斫蛟鼉退之石鼓歌快劒斫斷生蛟鼉遙知吏隱清如此杜詩吏隱適情性兹焉其窟宅汝南先賢傳鄭欽吏隱於蟻陂之陽應問卿曹果是何王徽之傳為桓沖騎兵參軍沖問卿署何曹對曰似是馬曹頗憶病餘居士否在家無意食蘿摩本草枸𣏌注曰諺云去家千里不食蘿摩枸𣏌次韻奉答吉老并寄何君庸傾懷相見開城府文選于令升晉紀總論云宣皇帝性深阻有如城府而能寬綽以容納取意間談投􅍫窠􅍫窠見上但使吏曹無狡兔春秋後語馮歡謂孟嘗君曰聞狡兔有三窟任呼舞女伐靈鼉見上屢中甕面酒幾聖釭面即甕頭見上注魏志徐邈傳時科禁酒而邈私飲至沉醉校事趙逹問以曹事邈曰中聖人逹白之太祖太祖怒鮮于輔曰平日醉客謂酒清者為聖人濁者為賢人偶醉言耳坐得免後文帝踐祚問曰頗復中聖人不對曰時復中之苦憶樽前人姓何願得兩公俱助我不維朱墨要漸摩非特治簿書朱出墨入亦欲漸仁摩義也聞吉老縣丞按田在萬安山中苦雨𥘉聞喚婦鳩歐公詩天將隂鳴鳩逐婦鳴中林鳴婦怒啼無好音天雨止鳩呼婦歸鳴且喜婦不亟還呼不巳紅粧滿院木蕖秋木蕖即木芙蓉也亦名拒霜花韓桞皆有木芙蓉詩芙蓉亦曰芙蕖韓詩又云平鋪紅蕖蓋明鏡此言水芙蓉即荷花也樽前不記崔思立應在諸山最上頭韓文有藍田縣丞廳壁記云博陵崔思立黜官再轉而為丞兹邑次韻喜陳吉老還家二絶公庭無事吏人休日至休吏見上垂箔寒廳對奕秋奕秋見孟子催織青籠篘白酒竹爐煨栗煮雞頭夜寒客枕多歸夢歸得黃柑紫蔗秋小雨對談揮麈尾麈尾見上青燈分坐寫蠅頭南史齊衡陽王巾箱五經蠅頭細書再次韻答吉老二首水宿風餐甚勞苦文選升天行云風餐委松宿雲卧恣天行謝靈運詩客遊倦水宿風朝難具論勉旃吾子冨春秋漢楊惲書願勉旃毋多談漢書帝冨春秋又云冨於春秋也我愧疲民欲歸去麥田春雨把鋤頭傳燈録傳大士頌云空手把鋤頭步行騎水牛山谷屢寫此頌賢勞三事一歸休見孟子霜落園林失九秋想得君家烏鵲喜蛛絲縈繞玉搔頭玉搔頭見上西漢雜記目瞤得酒食燈火花得錢財乾鵲噪而行人至蜘蛛集而百事喜雙澗寺二水奔奔鳴屋除韓文藍田丞廳記水㶁㶁循除鳴松林落日吼烏菟左傳楚人謂虎為烏菟老僧更有百歲母白髮身為反哺烏爾雅純黑而反哺者烏也杜詩林烏反哺聲山狹江深屋翠崖夜鍾聲自甕中來長松偃蹇蒼龍卧六月澗泉轟怒雷酴醾漢宫嬌額半塗黃後漢馬廖傳城中好廣眉四方且半額幽怪録橘中四老一叟曰君輸我智瓊額黃十二枝入骨濃薰賈女香晉賈謐傳母賈午充少女也父韓壽與女通家中莫知時西域貢竒香一著人則經月不歇帝以賜充女密盜以遺壽充寮屬與壽燕處聞其芬馥稱之於充云云日色漸遲風力細倚欄偷舞白霓裳楊太真外傳進見日奏霓裳羽衣曲奉答李和甫代簡二絶句山色江聲相與淸卷簾待得月華生歐公歌曲云欄干倚遍待得月華生可憐一曲並船笛説盡故人離别情夢中往事隨心見醉裏繁華亂眼生太白詩不知繁華子優優何所迫長為風流惱人病不知天性總無情次韻奉答廖袁州懷舊隱之詩詩題怨鶴與驚猿文選北山移文蕙帳空兮夜鶴怨山人去兮曉猿驚一幅溪藤照麝煙聞道省郎方結綬溪藤見上後漢黃香為尚書郎不離省闥白樂天集有賀楊十二新拜省郎詩杜詩省郎京尹必俯拾蕭朱結綬見漢蕭育傳可容名士乞歸田淵明詩云守拙歸園田文選張子有歸田賦嚴安召見天嗟晚主父偃傳上書朝奏暮召時徐樂嚴安亦俱上書上召見三人謂曰公等何相見之晚也賈誼歸來席更前誼為長沙傅帝思誼檄之至入見至夜分文帝前席何况班家有超固應封定逺勒燕然班超封定逺侯班固勒燕然銘各有傳觀王主簿家酴醾肌膚冰雪薰沉水莊子逍遙篇藐姑射之山有神人居焉肌膚若冰雪百草千花莫比芳楊文公談苑稱鄭文寶詩百草千花路斜風細雨天露濕何郎試湯餅語林曰何平叔美姿儀而絶白魏文帝疑其著粉夏月與熱湯餅既啖大汗出隨以朱衣自拭色轉皎然平叔何晏也魏𥘉尚主日烘荀令炷爐香襄陽記劉季和性愛香常如厠還輒過香爐上主簿張坦曰人名公作俗人不虛也季和曰荀令君至人家坐席三日香與我如何坦曰醜婦效顰見者必走公欲遁走耶季和大笑詩人詠花多比美女山谷賦酴醾獨比美丈夫見冷齋夜話風流徹骨成春酒夢寐宜人入枕囊宜人見上前集酴醾詩名字因壷酒風流付枕幃與此句意同輸與能詩王主簿瑶臺影裏據胡床見上社日奉寄君庸主簿花發社公雨社公見上隂寒殊未開𥘉聞燕子語似報玉人來元稹作張君傳崔氏詩曰待月西廂下迎風戶半開拂拂桃花樹疑是故人來遮眼便書册傳燈録僧問藥山為什麼經師曰只圗遮眼挑聾欺酒杯李氏談録李相濤小字社公為兵部時文公昉為翰林學士月給內醖兵部因春社寄昉詩云社公今日沒心情為乏持聾酒一瓶俗云社日酒治聾治音持挑當作治欺當作欠傳聲習主簿勤為撥春醅晉習鑿齒傳為桓溫西曹主簿溫曰三十年看儒書不如一詣習主簿大白詩恰似蒲萄新撥醅北窗已見前集洪範以不合俗人題廳壁二絶句次韻和之寂寥吾道付萬丗忍向時人覔賞音臨博而企竦聞樂而竊抃者或有賞音而識道也見曹子建求自試表聞弦賞音見吳志周瑜傳第一卷答明略云枯桐滿腹生蛛網忍向時人覔清賞皆用鍾期伯牙事搔首金城西萬里樽前從此嘆人琴元注云德占最知洪範徐德占死事見上注晉王徽之傳獻之卒徽之奔喪不哭直上靈床取獻之琴彈之久而不調嘆曰嗚呼子敬人琴俱亡埋沒髙才築釣聞杜牧詩築釣乘時用言傳説大公也風雲未會要鯢桓南康郡下參軍耳付與紅塵白眼看鯢桓青白眼見上次韻杜仲觀二絶鳥啼花動却春寒雨壓青旗卷畫干多事今年廢詩酒煩君傳語問平安重簾復幕和風雨無奈催沽鳥喚人鳥名提壷蘆見上注只是樽前欠狂客舞娃􅖅雪酒磷磷退之詩黃簾緑幕朱戶閉唐賀知章自號四明狂客莊子云肌膚若氷雪詩楊之水白石鄰鄰注淸徹也翻石亦作磷再次韻矩舞朱裙愜醉看陶嶽零陵記長沙王發於上前自為短舞人笑其拙惜公官守隔江干遙憐得句無人賞走馬城東覔道安習鑿齒傳時有桑門釋道安俊辨有髙才與習𥘉相見道安曰彌天釋道安當為遊寺詩家二杜審言及甫見仍雲見上詩句風流照映人青眼向來同醉醒白頭相望不緇磷杜詩但取不緇磷山谷外集詩注卷第十三
