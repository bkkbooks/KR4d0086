front:
  text: 山谷外集詩注卷之十
  hash: sha256:86fdcc5bb7890fcc037e0e89f8fd4c23fbe16d6467a296740e807de46e3f23c0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_010-1a}
body:
  text: 庭堅得邑太和六舅按節岀同安邂逅於皖公溪口風雨阻留十日對榻夜語因詠誰知風雨夜復此對床眠别後更覺斯言可念列置十字字爲八句寄呈十首同安郡舒州也有皖公山六舅謂李常字公擇也提點淮南西路刑獄提刑司在舒州鵠白不以烏莊子天運篇鵠不日浴而白烏不日黔而黒蘭香端爲誰家語蘭生深林不以無人而不香外家秉明德晩與丗參差退之詩豈敢尚幽獨與丗實參差乖離歳十二乖離見上㑹面卒卒期杜詩主称會面難司馬迁傳卒卒無須史之間何言灊丘底玉稻同一炊舒州有灊山一名天柱滄江渺無津同済共安危書微子云若渉大水其無津涯孫子曰同舟済而遇風其相救也如左右手言丗路風波也四海非不廣舅甥自相知孔鵉在榛梅上林賦遒孔鵉促鵕儀退之詩明庭集孔鵉以喻公擇言處非其地鷦鷯亦一枝莊子鷦鷯巢於深林不過一枝此以自喻千里同明月月賦見上相期不磷緇杜詩但取不磷緇磷緇字出論語少小長母家拊憐軰諸童食貧走八方衛囯風氓三歳食貧略巳一老翁見上不能成宅相晋魏舒傳少孤爲外家寗氏所養寗氏起宅相宅者云當出貴甥外祖母以盛氏甥小而慧意謂應之舒曰當爲外氏成此宅相頗似舅固窮論語君子固窮似舅見上何以報嘉德取琴作南風禮記舜作五絃之琴以歌南風一作皷琴歌南風德人心寂寥立朝寳莊語莊子天下篇以天下爲沉濁而不可與莊語公擇熈寕𥘉自太常博士改右正言論新法通判滑州知鄂湖斉三州徙淮西提刑虎節坐山城周禮地官掌節云凡邦囯之使節山囯用虎節孤雲猶能兩文章𬒳甥姪孝友諧婦女偃息一畒宫植梅當歌舞儒行云儒有一畒之宫江都克家才萬卷書揷架見上願言渠岀仕從舅問耕稼誰云瀕老境曲禮曰耆指使釋文耆至也至老境也此子即長夜杜詩短褐即長夜㱕歟淼前期蒔橘鉏甘蔗元注云江都尉李攄字安詩曩窺渉丗方白駒且場榖小雅皎皎白駒食我場榖平生漫歳晩志尚向山木莊子有山木篇言山中之木以不材得終其天年返身觀小醜孟子反身而誠樂莫大焉眞成覆車犢晋書石季龍傳快牛爲犢子時多能破車汝當小忍之否臧太磊磊從此更三復漢鄭當時不敢甚斥臧否詩意盖悔其有所評品欲三復白圭也負薪反羊裘爱表只傷裏魏志明帝破諸葛亮露布曰亮反裘負薪裏尽毛殚事本出新序其辝曰魏文侯岀游見路人反裘而負芻問之對曰臣爱其毛文侯曰若不知其裏尽而毛無所恃耶明年東陽上計錢布十倍文侯曰此無異夫路人反裘而負芻也民不加衆而錢十倍必取之民也𥙷紉雖云工歳晏安可恃洗心如秋天易繫辞云聖人以此洗心退藏於密六合無塵滓莊子岀入六合遊乎九州浮雲風去來在彼不在此此篇有所諷阿髯斈升堂德叟幹母思靡悔蠱九二幹母之蠱文成蓻桃李不言行道兊大雅緜曰行道兊矣兊成蹊也此用李廣賛桃李不言下自成蹊阿蘇妙言語機警欲無對無對見上子姪何預人蘭玉要可珮阿蘇舅氏㓜子晋謝玄傳叔父安甞戒約子姪因曰子弟何預人事而正欲其佳玄曰如芝蘭玉樹欲其生於堦庭耳解衣卧相語濤波夜掀床十年身百憂険阻心巳降詩我心則降渉旬風更雨宿昔燭生光衾幬無端冷明月一船霜詩小星抱衾與禂注衾𬒳也禂單𬒳也鄭云禂牀帳也尓雅幬謂之帳楚詞蒻阿拂壁羅禂張又云翡帷翠幬飾髙堂杜詩邂逅無端岀餞遟親依爲日淺左傳僖五年臣聞鬼神非人實親惟德是依爱不舍我眠退之示爽詩座中悉親故誰肯捨汝眠教我如牧羊更著後者鞭莊子逹生篇善飬生者若牧羊然視其後者而鞭之得邑迩梅嶺開花向春妍嶺梅見上碌碌幸苟免称觴大人前晋周顗母李氏字絡秀顗等並列顯位甞置酒絡秀㪯觴曰吾本渡江託足無所不謂爾等並貴列吾目前嵩起曰伯仁志大而才短名重而識暗非自全之道嵩性抗直亦不容於丗唯阿奴碌碌當在阿母目下耳阿奴謨小字也後果如其言大人自言其母也韓文栁子厚墓誌播非人所居而夢得親在堂吾不忍夢得之窮無詞以白其大人漢淮陽王欽傳正遇大人見解注云自称其母也同蘇子平李德叟登擢秀閣同安志曰擢秀閣在舒州彰法寺乃陳瑩中讀書處自此登第黄魯直名而書之城中楼觀與城北山水凭欄尽見築屋皖公城木末置曲欄歳晚對煙景人家橘柚間獨秀司命峯同安志司命峯至皖山二里有九天司命真君祠衆丘譲髙寒退之作劉統軍碑云仍丗北边楽其髙寒松竹二橋宅同安志孫䇿周瑜得橋公二女今郡城東有佛廬丗傳爲公故宅雪雲三祖山山谷寺在懐寕縣西有三祖僧璨大師塔衰懷造勝境轉斍落筆難蘇李工五字属聮不當慳文選李陵蘇武相贈荅詩皆五字句以比二子取其同姓書石牛溪旁大石上同安志云石牛洞在三祖山山谷寺之西北其石狀若伏牛因以爲名𥘉李伯時畫魯直坐石牛上因此号山谷道人題詩石上所謂靑牛駕我山谷路也欎欎窈窈天官宅黄庭經云欎欎窈窈真人墟真人即天官也諸峯排霄帝不隔六時謁天開関鑰我身金華牧羊客見上羊眠野草我丗間髙真衆靈思我還石盆之中有甘露靑牛駕我山谷路劉向列仙傳李耳字伯陽陳人也生於殷時爲周柱下史轉爲守藏吏積八十餘年後周德衰乃乗靑牛車去入大秦西過䦕関令尹喜知其真人也乃強使著書作道德上下經題山谷大石畏畏音委佳佳音觜石谷水莊子斉物篇山林之畏佳注云大風之所扇動也釋音云畏於鬼反佳醉癸反鼛鼛隆隆山木風楊雄解嘲云炎炎者㓕隆隆者絶注云隆隆雷聲也炉香四百六十載開山者誰梁寳公謂寳誌也同安志云飛錫泉在三祖山後寳公自金陵飛錫而至以相山谷寺基泉爲之湧岀遂寓此山今資壽殿有寳公遺像靈龜泉上同安志載此詩注云靈龜泉在皖口中路去州七十里大靈壽日月化石皖公陂偶無斧斤㝷左傳文七年諺所謂庇焉而縱㝷斧焉者也不作宰上碑王建詩澗厎盤陁石漸稀尽向墳前作羊虎靈龜泉銘有序其略云發皖口而西四十里泉淙淙行山徑乱石間坎甃清澈頂有大石如龜引氣云云宰上巳見上注傾首若有謂指泉來自西泉甘崖木老坐笑欲忘㱕風流裴通直一作裴髯喜幽事商略從我嬉丗說商略先往名逹蒔梅盈百科洗石岀崛竒退之詩心跡兩崛奇更约聘石工鑱我靈龜詩舅弟妙斈古元注云舅弟李德叟按韓文桞子厚墓誌云葬子厚於万年之墓者舅弟盧遵舅弟之称盖岀於此亦復古須眉卿家北海公謂李邕也筆法可等夷張良傳諸將皆陛下故等夷爲我書斯文要與斗牛垂發舒州向皖口道中作寄李德叟同安志云皖口鎮去州八十里黒雲平屋簷一作崔嵬雲壓空李賀詩黒雲壓城城欲摧晨夜隔星月暁裝商旅前冰底泥活活野人譲畔耕一作侵畔耕史記帝紀舜耕歴山歴山之人皆譲畔文選注云朝子曰歴山農者侵畔舜往而耕者譲河濱漁者争坻舜往而漁者譲蹇馬不能滑駝裘惜蒙茸左傳狐裘蒙茸俱落水塘缺孤村小蝸舎乞火乾履韈漢蒯通傳束緼乞火崔浩女儀冬至進履韈於舅姑見𥘉斈記前登極峥嶸一作髙寒他日飛鳥没寒花委乱草耐凍鳴風葉一作耐凍風葉間梅莟零乱發江形篆平沙退之聮句沙篆印廻平分派囬勁筆髯弟不俱來得句漫剞􅕻一作謾得句竒崛甘泉賦般倕弃其剞劂注云剞曲刀也劂曲鑿也􅕻劂同音居衛切亦見楚詞却望同安城唯有松欎欎選詩欎欎澗底松遥知浦口晴諸峯見明雪一作松雪選詩山明望松雪豊城元注云亭上有李衛公剱池賦丗父長善石隄記豊城乃洪州属邑洪今爲隆興府豊城邑岩岩詩云太山岩岩水種六萬戸石隄眠長虹輟棹日沉霧杜詩翳翳月沉霧暉暉星近楼令君政有聲新亭延客歩淚落丗父碑心傾文饒賦李德𥙿字文饒憶昔兩神兵見上埋玉思武庫晋庾亮傳埋玉樹於土中武庫見上寒光射漢津尓雅析木謂之津箕斗之間漢津也兩賢紆一顧張公拆中台木拱孔章墓不能從兒嬉退之送張道士詩又不選笑語不能伴兒嬉歳晚龍虵去空餘寒泉泓因兩長蛙鮒鈆刃藏寳室万丗同此度張華傳斗牛之間常有紫氣華邀豫章雷煥問之煥曰寳剱之精上徹於天在豫章豊城即𥙷煥爲豊城令煥到縣掘獄基入地四丈餘得一石函中有双剱並刻題一曰龍泉一曰太阿送一與華留一自佩華誅失剱所在煥卒子華持剱行經延平津剱忽於腰間躍出墮水使人没水㝷之但見两龍各長数丈華少子韙以中合星拆勸華遜位華不從而難作雷煥字孔章見水經贛水注篇末用賈誼賦莫耶爲鈍鈆刀爲銛之意離騷經云何不改此度也與胡彦明處道飮融師竹軒井寒茶鼎甘竹宻午隂好文選謝靈運詩宻竹使徑迷瓜嘗邵平種見上酒爲何侯倒晋何充字次道能飲酒雅爲劉惔所貴惔每云見次道飮令人欲傾家醸言其能温克也倦須槃礴臝㱕可倒著帽欲去更少留道人談薬草槃礴臝見上晋山簡云日夕倒戴㱕茗艼無所知時時能騎馬倒著白接籬法華經有薬草喻何氏恱亭詠栢澗底長松風雨寒岡頭老栢顔色恱澗底松見上文選歎逝賦信松茂而栢悅嘆芝焚而蕙歎天生草木臭味同見上同盛同衰見冰雪君莫爱淸江百尺船刀鋸來謀歳寒節千林无葉草根黄蒼髯龍吟送日月東坡樂府詠松云双龍對起白甲蒼髯煙雨裏薄薄酒二章并引蘇宻州爲趙明叔作薄薄酒二章憤丗疾邪其言甚髙以予觀趙君之言近乎知足不辱有馬少游之餘風故代作二章以終其意東坡熈寕七年冬知宻州除夜作半字韻詩山谷和章乃元豊𥘉作此篇當在半字韻詩以後作也薄酒可與忘憂晋頋榮傳唯酒可以忘憂醜婦可與白頭徐行不必駟馬稱身不必狐裘无禍不必受福荀子福莫善於無禍甘餐不必食肉文選七發云甘餐毒藥戦囯策王蠋云晚食以當肉安歩以當車冨貴於我如浮雲見論語卜者譴訶大戮辱賈誼傳聞譴何則白冠氂纓又云𬒳戮辱者不太迫乎山谷手冩本作譴何俗本誤耳一身畏首復畏尾左傳畏首畏尾身其餘幾門多賔客飽僮僕美物必甚惡左傳昭二十八年叔向之母曰甚美必有甚惡厚味生五兵囯語周語云髙位實疾僨厚味實腊毒五兵見上匹夫懐璧死左傳匹夫無罪懐璧其罪百鬼瞰髙明見上醜婦千秋万歳同室万金良薬不如无疾漢灌夫傳呉楚反時夫馳入呉軍身中大創十餘適有万金良薬故得无死薄酒一談一笑勝茶万里封侯不如還家太白詩錦城雖云楽不如早還家後漢班超傳當封侯万里之外薄酒終勝飲茶醜婦不是无家醇醪奍牛等刀鋸深山大澤生龍虵㐮二十一年叔向之母曰深山大澤實生龍虵彼美余惧其生龍虵以禍女秦時東陵千戸食何如青門五色瓜見上傳呼皷吹擁部曲何如春雨一池蛙傳呼甚寵見䔥望之傳南史孔珪傳云門庭之內草莱不剪中有蛙鳴或問之曰欲爲陳蕃乎答曰我以此當兩部皷吹王晏嘗鳴皷吹候之聞蛙鳴曰此殊聒人耳珪曰我聽皷吹殆不及此晏甚有慙色性剛太傅促和薬䔥望之傳天子方倚欲以爲丞相㑹望之子伋上書訟望之前事弘恭石顯建白望之前欲排退許史專權擅朝幸得不坐深懐怨望教子上書非頗屈望之於牢獄塞其怏怏心則圣朝亡以施恩厚上曰䔥太傅素剛安肯就吏顕等曰望之所坐語言薄罪必亡所憂上乃可其奏望之欲自殺其夫人止之以問門下生朱雲雲勸望之自裁望之乃謂雲曰游趣和薬来无乆留我死竟飲鴆自殺何如羊裘釣煙沙後漢嚴光傳光武即位光変姓名隠身帝令以物色求之後斉囯上言有男子披羊裘釣澤中綺席象床琱玉枕太白詩龍駒琱鐙白玉鞍象牀綺食黄金盤重門夜皷不停撾何如一身无四壁滿船明月卧蘆花吾聞食人之肉可隨以鞭朴之戮乗人之車可加以鈇鉞之誅刘向列女傳老萊子妻云妾聞之可食以酒肉者可隨以鞭箠可授以官禄者可隨以斧鉞不如薄酒醉眠牛背上醜婦自能搔背痒神仙傳王逺字方平過蔡經家麻姑手瓜似鳥瓜蔡經心中私言若背癢時得此瓜以爬背當佳否方平巳知其意即使人牽經鞭之曰吾鞭不可妄得也牛背上見上注岩下放言五首文選陸士衡有連珠五十首山谷効其躰而更其名曰放言也文選注云連珠者假託衆物以諷諭漢章帝時班固賈逵巳有此作林居野處而貫万事花落鳥啼而成四時物有才德木有不材驥称其德若此類也水爲官師書云官師相規工執蓺事以諫言水如官師有相規正之義也荀子曰孔子觀於東流之水子貢問於孔子所以見大水必觀焉何也孔子曰夫水柔而无爲也似德其浩浩乎不屈似有道其赴百仭之谷不俱似勇主量必平似法盈不求槪似正發源必東似志是以君子見大水必觀焉大戴礼及家語皆有此叚空明湛群木之影退之祭李使君文航北湖之空明搏擊下諸峯之巇言鷹隼之属游魚净而知機君子楽而忘㱕釣䑓水嬉者遊魚林楽者啼鳥文選西京賦命舟牧爲水嬉莊子天運篇林楽而无形志士仁人觀其大薪翁笱婦利其小詩魚䴡于罶毛云寡婦之笱也有美一人獨燕居万物之表池亭石生涯於寒藤藤耈造於崖樹鼇挿翼而成鵬列子㱕墟中有五山帝使巨鼇十五戴之且用莊子鵾化爲鵬之意隘六合而未翥文選曹子建七啓云若狹六合而隘九州我來兮自東豳風東山云我來自東零雨其濛攀桂枝兮容與九歌云聊逍遥兮容與招隠士云攀援桂枝聊淹留倚嵌岩兮頋同來謂公等其皆去冠鼇䑓漢髙紀公等皆去吾亦從此逝矣石藴嶼嶓山得其來之澤文選文賦石韞玉而山輝魏文帝書魯之璠璵其來疑字誤木无犠象天開不材之祥莊子曰百年之木破爲犠樽靑黄而文之其断在溝中比犠樽於溝中之断則美悪有間矣其於失性一也礼記犠象周樽也左傳犧象不岀門不材之木亦見莊子屹金炉之突兀其山海之來翔謂飛來峰也然以明哲之火熏以忠信之香俯仰一時非智所及付與万丗其存者長博山䑓蒼苔古木相依澗壑之濱黄葛女蘿詩頗弁蔦與女蘿施于松栢尓雅唐蒙女蘿女蘿兎絲自致風雲之上史記范睢傳不意君能自致靑雲之上人就隂而息迹見上鳥投暮而來㱕水影林光常相助發溪聲斧響直下称提靈椿䑓題章和甫釣亭放言斬木開亭却倚石壁寒灘百雷文選西京賦複陸重閣轉石成雷古木千尺觀魚楽而相忘魚楽見莊子聽鳥啼而自得去而之京洛之間数年猶常夢嶄岩之石家語孔子謂弟子曰違山千里蟪蛄之聲猶在耳贈元發第放言虧功一簣未成丘山論語子曰譬如爲山未成一簣止吾止也譬如平地雖覆一簣進吾往也鑿井九階不次水澤孟子曰有爲者譬若掘井掘井九軔而不及泉猶為弃井也行百里者半九十戦囯䇿詩云行百里者半於九十此言末路之難小狐汔済濡其尾易未済亨小狐汔済濡其尾注云小狐不能渉大川須汔然後乃能済釋音汔許訖反說文云水涸也史記春申君傳易曰狐渉水濡其尾此言始之易終之難故曰時乎時不再來終終始始是謂君子史記李斯傳趙髙曰時乎時乎間不及謀贏粮躍馬唯恐後時囯語范蠡曰得時无怠時不再來淮隂侯傳時乎時乎不再來定交詩效鮑明逺躰呈晁无咎以建除滿平定執破危成収開閉十二字冠爲句首建除躰八音歌二十八宿歌皆北京教授時作巳見第一卷注李淑詩苑類格云鮑照爲此躰十二韻建酉金爲政謂八月左傳云今日之事我爲政揺落草木衰宋玉九辯䔥瑟兮草木摇落而変衰除瓜隴畒浄邵平无米炊見上滿家色藜藿春秋外傳云始見夫子有菜色今有芻豢之色詩書不賙飢平生眺公子政用此時來後漢劉玄傳正用此時持事來乎定交无一物秋月以為期詩氓將子无怒秋以爲期執持荆山璧即和氏之玉要我雕琢之破斧不能柯豳風有破斧伐柯二詩况乃玉无疵危冠論百揆舜典纳于百揆百揆時叙備楽奏四時成功彼有命用舎君自知収身見上渺江湖歳晚白鳥嬉列子海上有人從鷗鳥游詳見上開徑蒲葦中江淹擬渊明詩開徑望三益倚鉏望君㱕閉塞乃非道不才當尓爲月令閉塞而成冬詩意謂深閉固拒而不岀非道也頋我不才自當如此耳文選王仲宣詩惜哉空尓爲建皷求亡子莊子天道萹又何偈偈乎揭仁義若擊皷而求亡子焉天運萹又奚傑然若負建皷而求亡子者耶元非入耳歌李陵荅蘇武書云左右之人見陵如此以爲不入耳之歡退之秋懐詩夜半偏入耳除去緑綺塵緑綺琴見第二卷放言注水深山峩峩伯牙鍾期事見上滿堂恱秦聲史記李斯上書曰擊甕叩缻弹筝搏髀而歌呼嗚嗚者真秦聲也洪楊惲傳报孫會宗書曰家本秦也能爲秦聲仰天拊缶而呼嗚嗚君獨用此何平分感秋莭宋玉九辯云皇天平分四時兮竊獨悲此凜秋空闊湛金波洪礼楽志歌詞云月穆穆以金波定夜百䖝息髙論聽懸河晋郭象傳王衍云聽象語如懸河㵼水注而不竭執揽北斗柄斟酌四時和洪天文志北斗建四時破屋仰見星神仙董奉傳大旱縣令見董君求雨君曰雨易耳貧家屋皆見天如何令曰但祈雨當爲架屋乃運竹木起屋屋成是夜大雨得子喜且多危柱无安弦栁子厚文云心怦怦若危柱之弦野水自盈科盈科而後進見孟子成道在礼楽成山在丘阿収此桑榆景見上相從寄琢磨詩云如切如磋如琢如磨開懐溟海闊百怪岀蛟鼉杜詩蛟鼉好爲祟閉藏頋自爱月令云以助天地之閉藏驚人取讉訶驚人見史記譴訶及㣲細見洪薛宣傳碾建溪苐一奉邀徐天隠奉議并效建除体与晁无咎贈荅詩雖同是建除体而非同時作當是徽宗𥘉即位時作也見下注天隠不知何人苐三卷有以十扇送徐天隱詩乃在太和詩中建溪有靈草能蛻詩人骨北苑貢茶録以建溪所産爲靈芽陳无巳云斈詩如斈仙時至骨自換除草開三徑爲君碾玄月滿甌泛春風詩味生牙舌平斗量珠玉刘夢得詩斗量明珠鳥傳意今以比詩句也以救風雅渴定知胷中有璀璨非外物執虎探虎穴呉志吕蒙傳不探虎穴安得虎子斬蛟入蛟室呉氏春秋荆有佽飛者得宝劒還渉江蛟夾繞其舡佽飛拔剱赴江斬蛟殺之文選海賦其垠則有天琛水怪鮫人之室以鮫爲蛟借使其字耳破鏡挂西南見上夜䦨清興發危言諸公上殊勝弄翰墨成仁冐鼎鑊謂殺身以成仁聞巳㱕諌列此語當謂邹志完按实録元苻三年正月徽宗即位二月巳未上謂輔臣曰邹浩敢言旦夕當与召還癸亥除名勒停人鄒浩爲宣德郎三月辛未宣德郎添差袁州酒稅鄒浩爲右正言收汝救月弓蛙腹當拆裂周礼庭氏掌射囯中之夭鳥若不見其鳥獸則以救日之弓救月之矢夜射之開元遺事長安城中毎當月蝕即士女取鑑向日擊之盖云救月退之月食詩臣有一寸刃可刳凶蟇腸開雲照四海黄道行堯日晋天文志黄道日之所行閉門斵車輸岀門同軌轍傳燈録潭州鹿苑和尚僧問如何是閉門造車師曰南嶽石橋又問如何是出門合轍師曰拄杖頭鞋言時政更新不謀於衆而皆合於人心也再作荅天隠建德眞楽囯建德之囯見第三卷注万里渺中州除蕩俗氛尽心如九天秋滿船載明月見上乃可与同游平生期斯人共挾風雅輈左傳隱十一年潁考叔挾輈以走注輈車轅也定知詩客來夜虹貫斗牛白虹貫日見鄒陽傳執斧修月輪酉陽雜爼大和中有二人遊嵩山迷路見一人布衣枕一袱物方眠二人問其所自其人笑曰君知有月七宝合成乎月势如丸其影日爍其亞処也常有八万二千戸修之予即一数開幞有斤鑿数事言訖不見錬石𥙷天陬列子曰天地亦物也物有不足故女媧錬五色石以𥙷其闕破的千古下乃可泣曹刘子建公幹也老杜寄李白云筆落驚風雨詩成泣鬼神危柱鳴哀筝知音𥘉見求危柱見上注自喻其詩也時以吏部郎召故云𥘉見求成功在漏刻堯舜去共吺共工驩兠也古文尚書驩兠作吺言去章子厚蔡卞也収此文章戯往作活囯謀文選孫楚与孫浩書爱民活囯開納傾万方皇極運九疇見洪範閉姦有要道新旧隨才収王立之詩話云山谷元祐𥘉詩云人材包新旧王度済寛猛至建中𥘉復有句云閉姦有要道新旧隨宜収又云不須要出我門下实用人材即至公重贈徐天隠建極臨万邦洪範皇建其有極當謂改元建中靖囯有合前萹新日隨才収之意故尤欣然因再賡韻稽古陛下垩退之詩曷不薦䝨殿下垩除書日日下有耳家相慶書攸徂之民室家相慶滿意見升平晋五行志哀帝隆和𥘉童謡曰升平不滿斗隆和那得乆此摘其字父老扶杖听洪賈山傳云山東吏布詔令民雖老羸癃疾扶杖而往听之平生所傳聞似仁祖德性定鼎百丗長左傳王孫滿對楚子曰成王定鼎于郟鄏卜丗三十卜年七百櫜弓四夷静詩載櫜弓矢执事當在朝官冷殊未称杜詩廣文先生官獨冷破帽風欹欹簡易不騎乗史記商鞅傳趙良曰五羖大夫勞不坐乗暑不張盖危顛相扶持見論語泉石供嘲詠成楽澗阿中衛囯風考槃在澗考槃在阿毛云考成槃楽也傲丗似未敬収潦下秋船楚詞潦収而水淸期公拜嘉命開元正觀事杜詩憶昔開元全盛日又云眇然正觀𥘉身得見全盛閉門長蓬蒿或許老夫病三輔决録張仲蔚隠身不仕所居蓬蒿没人文選詩頋念張仲蔚蓬蒿滿中園此詩具言朝廷進賢黜姦人心欣快庶幾復見盛治如咸平景德間不啻唐之正觀開元也八音歌贈眺堯民詩苑類格云陳沈烱爲此体秦少游集中與黄魯直簡云李端叔過此斗野詩八音二十八舎歌皆和了今録其副寄上可見此詩與斗野亭同時作斗野詩庚申年和見此卷金生塞沙中見别㑹有時渊明詠蘭云清風脫然至見别䔥艾中石上千年栢退之詩栢生两石間万歳終不大材髙用苦遲杜詩古来材大難爲用絲乱猶可理杜詩得君乱絲爲君理心乱不可治竹斎聞履聲漢鄚崇傳我識鄚尚書履聲廼是故人來匏苦只多葉水深難爲渉邶囯風匏有苦葉済有深渉深則厉淺則掲土床不安席象牀卧燁燁戦囯策孟甞君至楚楚献象牀革與井同功井革二卦相連井言不改革言革而當雖若異而實同功守道非関怯非関見上左傳守道不如守官木直常先伐莊子山木萹直木先伐甘井先竭子其飾知以驚愚修身以明汚昭昭乎如掲日月而行故不免也樗檪万丗業莊子逍遥篇恵子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠石不頋云云人間丗篇匠石之斉至乎曲轅見檪社樹其大蔽牛匠石不頋遂行曰是不材之木也无所可用云云八音歌贈眺堯民金荷酌美酒李適之有酒器九品有慢卷荷金焦葉岀逢原記山谷在戎州作長短句云共倒金荷其序云以金荷葉酌客夫子莫留殘庾信詩飲酒那得留殘石有𥙷天材見上虎豹守九関見上絲窠將栁花退之聮句云絲窠掃還成入户撲衣冠竹風揺永日思與子盤桓㱕去來詞抚孤松而盤桓匏瓜豈无匹洛神賦歎匏瓜之无匹詠牽牛之獨処注云史記曰四星在危南匏瓜牽牛爲犧牲其北織女阮瑀止欲賦曰傷匏瓜之无偶悲織女之獨勤俱有此言然无匹之義未詳其始自古同心難繫辝同心之言其臭如蘭革急而韋緩韓非子云西門豹之性急故佩韋以緩巳革乃皮之未熟者也只在揉化間揉而九反又音柔見考工記木桃終報汝薬石理予顔衛囯風投我以木桃報之以瓊瑶亡土字一聮古意贈鄭彦能金欲百錬剛不欲繞指柔劉越石詩何意百錬剛化爲繞指柔石羊卧荒草一丗如蜉蝣石羊塚間物也王建詩澗厎盤陁石漸稀尽向墳前作羊虎蜉蝣朝生夕死詩云蜉蝣之羽注渠略也絲成蠶自縛智成龜自囚竹箭天與美尓雅東南之美者有㑹稽之竹箭焉豈頋作蒿矢莊子在宥萹不爲桀跖蒿矢匏枯中笙竽不用繫墻隅匏瓜繫而不食見論語土偶與木偶未用相賢愚孟嘗君傳孟嘗君將入秦蘇代謂曰今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子將敗矣土偶人曰我生於土敗則㱕土今天雨流子而行未知所止息也今秦虎狼之囯而君欲往有如不得還君得无爲土偶人所笑乎乃止未用相賢愚退之語也第一卷巳有詩云未須相賢愚革轍要合道覆車還不好木訥赤子心百巧令人老論語剛毅木訥近仁孟子曰大人者不失其赤子之心者也注謂人能不失其赤子時心則爲貞正大人贈无咎金馬避丗客談諧玩漢朝史記滑稽傳禇先生曰有東方生名朔酒酣據地歌曰陸沉於俗避丗金馬門漢書朔賛云應諧似優又云依隠玩丗石門抱関人長往閉寂寥論語憲問篇子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而爲之者與注云晨門閽人後漢逸民傳長往之軌未殊杜詩知君此計成長往絲蟲日夜織勞苦則以食符子曰公子重耳游於大澤之中見蜘蛛布網曵繩執豸而食之頋咎犯曰此蟲也德薄矣而猶役其智竹生罹斧斤髙林乃其賊匏樽酌吾子雖陋意不淺土德貴重遟水德貴深逺革能談鯤鵬晚乃得莊周列子湯問萹言殷湯問於夏革大槩皆語怪也莊子首篇云湯之問棘也是巳窮髮之北有冥海者天池也有魚焉其廣数千里其名爲鯤有鳥焉其名爲鵬背若太山翼若垂天之雲詩意謂先有夏革之言而後莊周有鯤鵬之論棘即革也木鴈兩不居相期无待游莊子曰山中之木以不材得終其天年主人之鴈以不材死詳見上莊子逍遥篇列子御風而行冷然善也此雖免乎行猶有所待者也若夫乗天地之正而御六氣之和彼且悪乎待哉二十八宿歌贈别无咎類格不言二十八宿誰爲此体得非始於山谷耶虎剥文章犀觧角文子曰虎豹之文來射猨狖之捷來格犀亦有文戦囯䇿張儀說楚云献駭雞之犀食未下亢竒禍作娄敬傳與人闘不搤其亢拊其背注亢喉嚨也音岡薬材根氐罹斸掘蟠木根柢見鄒陽傳蜜䖝奪房抱飢渇有心无心材慧死人言不如龜曵尾莊子秋水篇楚有神龜死巳三千歳矣王巾笥而藏之此龜者寕其死爲留骨而貴乎寕其生而曵尾於塗中乎衛平哆口无南箕斗柄指日江使噫史記龜策傳江使神龜於河至於泉陽漁者豫且得之龜見夢於宋元王曰我爲江使而豫且得我元王召博士衛平而問之平曰南風新至江使先來斗柄指日使者當囚退之詩我生之辰月宿南斗牛奮其角箕張其口言衛平張口如箕也小雅巷伯哆兮哆兮成是南箕注哆大貌昌者反狐腋牛衣同一燠趙丗家簡子曰千羊之皮不如一狐之腋漢王章傳疾病无𬒳卧牛衣中髙丘无女甘獨宿離騷經忽反頋以流涕兮哀髙丘之无女虚名挽人受實禍累棊旣危安處我荀息累十二棊子加九卵于上晋平公曰危哉見魏都賦注室中凝塵散髮坐唐楊綰凝塵滿席文選張茂先詩云散髮重隂下注引鍾㑹遺榮賦云散髮抽簮四壁矗矗見天下奎蹄曲隈取脂澤莊子徐无鬼篇有濡需者豕虱也奎蹄曲隈乳間股脚自以爲安室利処娄豬艾豭彼何擇左傳旣定尓娄豬盍㱕吾艾豭傾腸倒胃得相知貫日食昴終不疑漢鄒陽書昔荆軻慕燕丹之義白虹貫日太子畏之衛先生爲秦畫長平之策太白食昴昭王疑之古來畢命黄金䑓曹子建表云量能而受爵者畢命之臣也文選放歌行將起黄金䑓注云上谷郡圖經曰黄金䑓易水東南十八里燕昭王置千金於䑓上以延天下之士佩君一言䓁觜觹尓雅二曰靈龜注即今觜􅏲龜也月没參横惜相違栁子厚龍城録開皇中趙師雄迁羅浮天寒日暮憇於松間酒肆見一女人淡粧素服岀迓師雄与共飲醉寢但斍風寒相襲起視乃在大梅花樹下月落參横但惆悵而巳秋風金井梧桐落太白詩梧桐落金井一葉飛銀床故人過半在鬼録文選魏文帝書徐陳應利一時俱逝觀其姓名巳爲鬼録栁枝贈君當馬筞見上歳晏星囬觀盛德月令星囬於天歳且更始張弓射雉武且力晋陸雲傳荀􅪫字鳴鶴与雲㑹張華坐雲抗手曰雲間陸士龍荀曰日下荀鳴鶴雲又曰旣開青雲覩白雉何不張尓弓挾尓矢隠曰本謂是雲龍騤騤乃是山鹿野麋獸微弩強是以發遟華大笑白鷗之翼没江波杜詩白鷗波浩蕩抽弦去軫君謂何韓詩外傳孔子南遊有処子佩瑱而浣者孔子抽琴去其軫以授子貢曰善爲之詞云云壽垩觀道士黄至明開小隠軒太守徐公爲題曰快軒庭坚集句詠之洪斍範冷斎夜話云山谷在星渚賦道士快軒詩點筆立就其略曰吟詩作賦北窗裏万言不及一杯水頋得青天化作一張𥿄想見其髙韻氣摩雲霄也斍範安知此爲何人語而遽評品耶星渚即落星湾巳見上注山谷以集句爲百家衣而此萹専取太白一家略間以它人数言以成章也太白古風云金華牧羊児乃是紫煙客㐮陽歌云鸕鷀杓鸚鵡盃百年三万六千日一日須傾三百盃清風明月不用一錢買玉山自倒非人推蜀道難云砯崖轉石万壑雷寒夜獨酌云吟詩作賦北䆫裏万言不直一杯水山中對酌云兩人對酌山花開一杯一杯復一杯廬山謡云廬山秀出南斗傍銀河倒挂三石梁送竇明府云登髙送逺形神開楽府云有長鯨白歯若雪山選詩云挂水日千里因之平生懐古楽府羅敷行使君東南来五馬立踟蹰吕洞賓詩云一粒粟中藏丗界二升鉎内煑乾坤金華牧羊児一粒粟中藏丗界使君從南来清風明月不用一錢買鸕鷀杓鸚鵡杯一杯一杯復一杯玉山自倒非人推廬山秀岀南斗傍登髙送逺形神開銀河倒挂三石梁砯崖轉石万壑雷吟詩作賦北䆫裏安得青天化作一張𥿄有長鯨白歯若雪山我願因之寄千里銅官縣望五松山元注云集句西清詩話云集句自囯𥘉有之至石曼卿始大著下第詩云一生不得文章力欲上青雲未有因垩主不勞千里召常娥何惜一枝春鳯凰詔下雖霑命豺虎叢中也立身啼得血流无用処着朱騎馬是何人至元豊間王荆公益工於此人言起自公非也北風无時休退之詩十月隂氣盛北風无時休老杜詩烈風无時休崩浪聒天響渊明詩崩浪聒天響長風无息時蛟鼉好爲祟老杜詩舟楫无根蔕蛟鼉好爲祟此物俱神王老杜詩天寒大羽獵此物俱神王我來五松下太白遊五松詩我来五松下白髮三千丈太白云白髮三千丈縁愁似箇長松門閉青苔太白詩惜哉不得往退之詩惜哉不得往豈謂吾无能今日天氣佳渊明詩今日天氣佳淸吹与鳴弹清絶心有向老杜云殊姿各独立淸絶心有向子雲性嗜酒渊明云子雲性嗜酒家貧无由得况乃氣淸爽老杜八哀詩此人已成灰太白詩吟詠思管楽此人巳成灰懷賢盈夢想太白詩日夕聽猿愁懐賢盈夢想衣食當須幾渊明詩衣食當須幾力耕不吾欺吾得終踈放老杜詩中原未解兵吾得終踈放弱女雖非男渊明詩弱女雖非男慰情良勝無盖山谷時未有男也按遺文有乞奏𥙷姪檏狀云今遇明堂大礼臣子相纔六歳明堂乃元祐四年逆数至元豊七年歳申子相始生前一年十二月自太和移德平集句蓋經塗所作出處同丗網老杜八哀詩搔背牧雞豚太白詩閑時田野中搔背牧雞豚相見得無恙退之詩憐我竄逐㱕相見得無恙荆州即事薬名詩八首類格云王融爲此躰文選沈休文詩即事旣多美注即此山中之事四海無逺志一溪甘遂心牽牛避洗耳卧著桂枝隂薬名逺志甘遂牽牛子葈耳桂枝丗說桓温問謝安逺志又名小草何以一物而有二名郝隆曰処則爲逺志岀則為小草蜀志姜維傳但有逺志不在當歸前湖後湖水𥘉夏半夏凉夜䦨郷夢破一鴈度衡陽前胡半夏蘭香杜衡千里及歸鴻半天河影東家人森戸外笑擁白頭翁半天河人參白頭翁天竺黄卷在人中白髮侵客至獨掃榻自然同此心天竹黄人中白自然銅天竺黄卷謂佛書垂空靑幕六一一排風開石友常思我預知子能来空靑預知子屈原逺遊云經營四荒兮周流六漠𥙷注云漢楽歌作六幕謂六合也漢楽歌見上注幽澗泉石緑閉門聞啄木運柴胡奴㱕車前挂生鹿石緑啄木柴胡車前雨如覆盆来平地没牛膝回望無夷陵天南星斗濕覆盆子牛膝蕪荑天南星峽州治夷陵与江陵接境自界首至夷陵七十里言回首不見夷陵也使君子百姓請雨不旋復守田意飽滿髙壁挂龍骨使君子旋復花半夏一名守田龍骨前集詩云壁挂蒼龍骨意謂得雨應祈不復車水漑田也東南呼水車爲龍骨車山谷外集詩注卷十
