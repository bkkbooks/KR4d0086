front:
  text: 山谷外集詩注卷之八
  hash: sha256:315bc3afcbed5aa1e5ddb4d30f165f914a44cfb2c7cd362a351c46983a64df48
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_008-1a}
body:
  text: 送昌上座歸成都昭覺堂中有道人昭覺寺在成都道人當是圜悟禪師克勤也崇寧𥘉歸蜀住昭覺一時叢林之盛無與為此山谷崇寧元年夏罷太平州寓居鄂州二年冬謫冝州此詩當在鄂渚作龍吟虎嘯隨風雨花經席冷如鐡雲杜詩布衾多年冷似鐡一縢日轉十二輪法華經化城品丗尊轉法輪尓時大通智勝如來受十方諸𣑽天王及十六王子請即時三轉十二行法輪寶勝蓬蒿荒小院按成都記寶勝院在成都蓋大悲寺諸院之數元豐間改作十方昌上座必住此院也埋沒醯羅三隻眼傳燈録鄂州岩頭全豁禪師曰吾教意如摩醯首羅劈開靣門豎亞一隻眼梵語摩醯首羅此云大自在又威靈帝魔王按本行經云太子𥘉生西國之法合禮天神其名摩醯首羅極惡而有靈抱太子至神所神自離坐下階先禮太子蓋禪家以此惜喻也箇是江南五味禪廣語云有僧辝歸宗云諸方學五味禪去宗云我這裏有一味禪為甚不學僧云如何是一味禪宗便打更往參尋莫擔板傳燈録趙州從諗傳云只是箇擔板漢送彥孚主簿斯文當兩都江夏丗無雙後漢黃香傳京師號曰天下無雙江夏黃童叔度𥘉不言漢庭望風降黃憲傳憲字叔度論曰黃憲言論風旨無所傳聞然士君子見之者靡不服深逺去玼吝中間眇人物王逸少帖云當今人物眇然而艱疾若此令人短氣潛伏老崆谾元注云許江切本朝開典禮易係辝云觀其會通以行其典禮棫朴作株椿大雅棫朴文王能官人也芃芃棫朴薪之槱之詩人謂小木可為薪山谷以為可作株樁皆言無棄材也莊子吾處也若橛株拘退之詩窙豁􅓯株橛又云斬伐枿與椿丗父盛文藻第五卷豐城詩自注云有丗父長善石隄記韓退之薦士詩云國朝盛文章本出宋玉神女賦其盛飾也則羅紈綺績盛文章如陸海潘江鍾嶸詩品云陸才如海潘才如江三戰士皆北韔弓錦轁杠檀弓下射之斃一人韔弓詩采緑云之子于狩言韔其弓尓雅素錦綢杠注旗之竿白衣受傳詔短命終螢窗論語顔回不幸短命晉車胤傳家貧不常得油綀囊盛數十螢火以照書退之詩安居守窗螢夢升卧南陽耆舊無兩龐謂龐德公及其從子士元也見後漢德公傳及蜀志龐統傳空鑱歐陽銘松風悲隴瀧雙韓退之詩藉乃隴頭瀧又有瀧吏詩亦音閭江切歐陽文忠集有黃夢升墓志銘云諱注四海群從問爾來頗琤士耕切淙士江切退之聮句泉音玉淙琤淙兩音主簿吾宗秀其能任為邦軀幹雖眇小勇沉鼎可扛項籍傳力扛鼎擇師别陳許孟子云陳相見許行而大恱盡棄其學而學焉取友觀羿逢孟子離婁下逢蒙學射於羿盡羿之道思天下惟羿為愈巳於是殺羿孟子曰是亦羿有罪焉云云其取友必端矣折腰佐髯令陶潛傳不能為五斗米折腰邑訟銷吠尨詩無使尨也吠時邀府中飲下箔蠟燒釭杜詩銅盤燒蠟光吐日紅裳笑千金異聞實録楊績於昭應寺讀書每見一紅裳女子驗之乃經幢中燈列女傳楚成王夫人鄭瞀𥘉成王登臺瞀直行不顧王曰顧吾與汝千金瞀不一顧鮑明逺詩千金雇笑買芳年太白詩美人一笑千黃金淸夜酒百釭同僚有惡少嘲謔語亂哤𬋩子曰四民雜處則其言哤注哤亂也退之詩子言得無哤君但隱几笑莊子隱几而坐諸老嘆敦厖左傳成十六年傳曰民生敦厖况乃工朱墨見上氣和信甚矼莊子德厚信矼注云慤實貌持此應時須杜詩竇氏檢察應時須十年擁麾幢退之詩不令見麾幢相逢常鞅掌詩北山或王事鞅掌衙鼓趍詩靈臺鼉鼓逢逢簿書敗清談王戎傳阮籍曰俗物巳復來敗人意此摘其字汗顔吏摐摐子虛賦摐金鼓退之詩扶機導之言曲莭𥘉摐音窗臨分何以贈退之云臨分不汝誑有路即歸田要我賦蘭茫子虛賦茳蘺蘪蕪黃華雖衆笑莊子天地篇大聲不入於里耳折揚皇華則嗑然而笑白雪不同腔文選宋玉對楚王問曰客有歌於郢中者其始曰下里巴人國人屬而和者數千人其為陽阿薤露屬而和者數百人其為陽春白雪屬而和者數十人而巳引商刻羽雜以流徴屬而和者不過數人其曲彌髙其和彌寡野人甘芹味文選嵇叔夜絶交書云野人有快炙背而美芹子者欲獻之至尊亦巳疏矣事見列子敢饋厭羊羫退之云酒壷綴羊羫顧豫百短拙百出見此卷首答魏道輔詩注飽腹戇胮音龐肛許江切退之詩連日挾所有形軀頓胮肛唯思解官去一丘事耕堫音窗集韻云不耕而種君當取冨貴鍾鼓羅擊撞漢田蚡傳前堂羅鍾鼓立曲旃退之詩金石日擊撞伏藏鼪鼯徑莊子徐無鬼篇逃虛空者藜藋柱乎鼪鼬之徑聞人足音跫然而喜矣猶想足音跫莊子音義云跫巨恭曲恭反又苦江反寄朱樂仲故人昔在國北門鄰舍杖藜見上對樽酒十五餘年乃一逢黃塵急流語馬首文選恨賦云黃塵匝地注引山陽公載記云鳴鼓雷震黃塵蔽天急流蓋用後漢馬后紀車如流水馬如龍也左傳唯豫馬首是瞻懶書愧見南飛鴻君居三十六峯東李太白贈嵩山焦練師序云余訪道少室盡登三十六峯按河南志河南府永安縣少室山在縣西南七十里有三十六峯具列其名我心想見故人靣曉雨垂虹到望嵩洛陽嵩山嵩亦作嵩從王都尉覔千葉梅云巳落盡戲作嘲吹笛侍兒若為可耐昭華得駙馬都尉王晉卿家吹笛妓名昭華脫帽看髮巳微霜杜詩脫帽露頂王公前催盡落梅春巳半樂府詩集漢橫吹曲有梅花落其序云梅花落本笛中曲唐大角曲亦有大梅花小梅花等曲今其聲猶有存更吹三弄乞風光晉桓伊傳王徽之泊舟靑溪側伊於岸上過令人謂伊曰聞君善吹笛為我一奏伊鋸胡床為作三調弄杜詩風光草際浮又云傳語風光共流轉此詩乃元祐中在史局時作此篇巳前皆太和所作也次韻子瞻書黃庭經尾付蹇道士東坡書黃庭經跋云成都道士蹇拱辰翊之葆光法師將歸廬山東坡居士蘇軾子瞻為書黃庭內景經一卷龍眠居士李公麟伯時為畫經相贈之元祐三年九月二十二日時山谷正在史局山谷和篇其序云十月四日琅函絳簡蘂珠篇黃庭經云玉書絳簡赤丹文又云間居蘂珠作七言注曰祕要經云仙宫中有陽廖之殿蘂珠之闕寸田尺宅可蘄仙經云寸田尺宅可理生注謂三丹田之宅各方一寸尺宅謂靣也髙真接手玉宸前經云燒香接手玉華前又云太上大道玉宸君女丁來謁粲六妍經云神華執巾六丁謁注云六丁隂神玉女也又引六甲苻圗言六丁名金鑰閉欲形完堅經云結珠固精奍神根玉􅙞金籥常完堅万物蕩盡正秋天使形如是何塵緣楞嚴經有六塵謂地火水風空見又有三緣謂丗界衆生業果也蘇李筆墨妙自然万靈拱手書巳傳漢郊祀志黃帝接万靈於明庭傳非其人恐飛騫當付􅌐龍藏九淵賈誼賦襲九淵之神龍蹇侯奉告請周旋緯蕭探手我不眠左傳奉以周旋莊子河上有家貧恃緯蕭而食者其子沒於淵得千金之珠其父謂其子曰取石來煆之夫千金之珠必在九重之淵而驪龍頷下子能得之必遭其睡也莊子釋音緯織也蕭萩蒿也織蕭以為畚而賣之次韻叔父夷仲送夏君玉赴零陵主簿黃廉字夷仲終於給事中田竇堂上酒未醉巳變態太白詩田竇相傾奪賔客云盈虧竇嬰田蚡事見漢書本傳子虛賦覽將帥之變態又云殫覩衆物之變態何如東陵瓜子母相鈎帶阮嗣宗詩巳見上注冨賞席未暖班固賔戲孔席不暖珠玉作災怪文選阮嗣宗詩多財為患害茅茨雖長貧終有懿親在左傳封建親戚以藩屏周不廢懿親也文人困州縣短髮餘會撮莊子曰支離疏者頥隱於齊肩髙於頂會撮指天會古外反撮子外反詩言髮脫僅餘髻耳居然枳棘棲居然見上後漢仇覽傳一名香考城令王渙署為主薄謝遣曰枳棘非鵉鳯所捿坐閲歲月代青雲巳迷津太白詩迷津覺路失託勢隨風翻濁酒未割愛杜詩割愛酒如黽自注云平生所愛消渴止之簿領能無休飣餖喚魚菜退之云呼奴具槃飱飣餖魚菜贍羈旅䒷地偏淵明詩心逺地自偏江湖見天大万里一帆檣長風可倚賴樂府詩云象牙作帆檣南史宗慤云願乘長風破万里浪因行訪幽禪頭陀煙雨外王立之詩話云山谷有送零陵主簿夏君玉詩末云因行訪幽禪頭陀煙雨外蓋君玉頭甚大故以此戲之梵語頭陀此言斗藪斗藪惱頭也謝曹子方惠二物二首飛來海上峯地理書云錢塘縣郭下有靈隱山昔梵僧云自天竺鷲山飛來琢出華隂碧華嶽三峯也注香上裊又映我鼻端白楞嚴經丗尊教我觀鼻端白我𥘉諦觀經三七日見鼻中氣出入如煙身心內明圎洞丗界偏成虛淨猶如琉璃煙相漸銷鼻息成白心開漏盡諸出入息化為光明照十方界得阿羅漢聽公談昨夢沙暗雨矢石今此非夢耶煙寒巳無迹博山爐短喙可候煎枵腹不停塵莊子言魏王大瓠非不呺然大也注云呺然虛大貌嵇康飬生論終朝未餐則囂然思食呺囂皆言空腹山谷屢用此皆作枵字桞子厚祭裴令文云枵然其量廓尓其宇蟹眼時探穴龍文巳碎身茶録云候湯最難未熟則沫浮過熟則茶沉前世謂之蟹眼者過熟湯也龍又謂龍團茗碗有何好孟嘉傳酒有何好而卿嗜之此摘其字煮瓶𬒳寵珍茶録又云瓶中煮之不可辨故曰候湯難文選劉公幹詩北靣自寵珍言茶瓶亦為人所貴也石交諒如此湔祓長日新煎茶瓶蘇秦曰此所謂棄仇讎而得石交者也湔袚見上送曹子方福建路運判兼簡運使張仲謀此詩及前雨詩後四五詩皆是元祐三年作案實録元祐三年九月太僕寺丞曹輔權發遣福建路轉運判官輔字子方曹侯黃須便弓馬魏志任城王彰太祖之子大破烏桓歸功諸將太祖喜持彰鬚曰黃鬚兒竟大竒也從軍賦詩橫槊間南史垣榮祖傳榮祖曰曹操曹丕上馬橫槊下馬談論此可不負飲食矣元稹作老杜墓志云曹氏父子往往橫槊賦詩阿瞞文武如兕虎魏志帝紀注云太祖一名吉利小字阿瞞詩云匪兕匪虎奕彼曠野逺孫風氣猶斑斑上林賦𬒳斑文昨解弓刀退之送鄭尚書序大帥府或道過其府府帥必戎服左握刀右屬弓矢迎于郊丞太僕坐看收駒十二間杜詩伊昔太僕張景順監牧收駒閲清峻一作考牧攻駒周禮校人天子十有二間邦國六間逺方不異輦轂下司馬遷傳待罪輦轂下詔遣中使哀恫鰥康誥王曰嗚呼小子封恫鰥乃身注恫痛瘝病吾聞斯民病鹽䇿見上天有雨露東南乾謝君論河秉禹貢用左傳魯秉周禮之義平當以明禹貢行河詳見上注詰難蜂起安如山老郎不作患失計論語苟患失之無所不至矣凛然冝著侍臣冠願公不落謝君後江湖以南尚少寬百城閲人如閲馬泛駕亦要知才難漢武紀五年詔曰泛駕之馬跅弛之士亦在御之而巳泛方勇切鹽車之下有絶足戰國策云汗明見春申君曰驥之齒長矣服鹽車上大行中坂遷延負轅不能上伯樂遭之下車攀而哭之解紵衣而羃之於是俯而噴仰而鳴欣伯樂之知巳也魏文帝與孫權書中國雖多馬其知名絶足亦少敗群勿縱為民殘卜式傳式言牧羊曰非獨羊也治民亦猶是矣以時起居惡者輒去母令敗群左傳政寬則民慢猛則民殘官焙薦壁天解顔官焙謂建安北苑所造茶也瀹湯試春聊加餐樂府詩上言加餐食下言長相憶子魚通印蠔破山遁齋間覽云莆陽通印子魚名天下蓋有通印侯庿庿前有港其魚最佳今人必求其大可容印者謂之通印子魚荆公云長魚爼上涌三印此傳聞之誤也退之𥘉南食云蠔相粘為山百十各自生嶺表録異云蠔即牡蠣也𥘉生海島邊如拳石漸長有髙一二丈者雜爼云介蟲中惟牡蠣是鹹水結成不但蕉黃荔子丹退之羅池庿碑荔子丹兮蕉葉黃雜肴𬞞兮進侯堂道􅑮使者漢郎官謂張仲謀清溪弭節問平安屈原九歌云朝騁騖兮江皋夕弭莭兮北渚天子命我參卿事晉孫楚傳為石苞參軍𥘉至曰天子命我參卿軍事奮髯相對亦可歡回波一醉嘲栲栳本事詩中宗朝裴談為御史大夫妻悍妬談畏之內宴玄唱回波詞有優人唱云回波尓時栲栳怕婦也是大好外間只有裴談內裏無過李老韋后意色自得此句當有為山驛官梅破小寒杜詩梅蘂臘前破又云東閣官梅動詩興戲贈曹子方家鳯兒柬芽入湯師子吼按北苑貢茶録一槍一旗號柬芽上品柬芽蠟茶名也維摩經云演法無畏猶師子吼此借用荔子新剝女兒頰鳯郎但喜風土樂不解生愁山疊疊目如點􅃮射清揚晉杜乂傳王羲之目之曰膚若凝脂眼如點􅃮此神仙人也詩云子之清揚正義曰眉之上下皆曰楊目之上下皆曰清歸時定自能文章莫隨閩嶺三年語轉却中原万籟簧閩嶺一作阿囝通典樂門凡簫一名籟禮明堂位女媧之笙簧閩人謂父為郎罷謂子為囝唐顧况囝哀閩曰郎罷别囝吾悔生汝囝别郎罷心摧血下隔地絶天及至黃泉不得在郎罷前題老鸖万里心老杜遣興云蟄龍三冬卧老鶴万里心仙人駕飛騎朝會白雲衢文選别賦駕鶴上漢莊子乘彼白雲至于帝鄉老驥不服乘曹孟德樂府云老驥伏櫪志在万里係辝服牛乘馬引重致逺清唳徹九虛太白詩淸如淸唳蟬野田篁竹底淮南王書云越處溪谷之間篁竹之中毰毸伴雞鳬文選射雉賦敷藻翰之陪鰓時因長風起尤欲試南啚莊子而後乃今將啚南題韋偃馬韋侯常喜作群馬杜陵詩中如見畫老杜戲為壁畫馬歌自注云韋偃畫忽開短卷六馬啚想見詩老醉騎驢杜詩騎驢三十載龍眠作馬晚更妙謂李伯時至今似覺韋偃少老杜雙松啚歌天下幾人畫古松畢宏巳老韋偃少言晚歲茟畫老蒼視韋偃如少年也一洗万古凡馬空句法如此今誰工老杜丹青引須臾九重真龍出一洗万古凡馬空子曕題狄引進雪林石屏要同作東坡集有狄詠石屏考其歲月蓋元祐元年作時山谷在館中翠屏臨研滴西漢雜記廣川王發晉靈公冡唯玉蟾蜍腹空容五合水取以成書滴明窗玩寸隂帝王丗紀禹不重徑尺之璧而愛日之寸隂吳都賦責千里於寸隂意境可千里意境如劉夢得詩腰斧上髙山意行無曰路也搖落江上林百醉歌舞罷四郊風雪深將軍貂狐暖見上士卒多苦心選詩志士多苦心和曹子方雜言前集有次韻答曹子方雜言此萹亦次韻也而不言次韻詩意略同不應再出又不稱再和疑是先作此萹後復竄昜故兩存耳正月尾垂雲如覆盂鴈作斜行書三十六陂浸煙水想對西江彭蠡湖三十六陂在揚州天長縣此據實録蔣之竒傳天長今屬盰眙軍彭蠡湖在江州人言春色濃如酒楊文公談苑載鄭文寶詩杜曲花光濃似酒灞陵春色老於人不見插秧吳女手老杜輔稻畦水詩云插秧適云巳令卿小塢頗藏春前集雜言云往時盡醉冷卿酒舊注謂冷卿如冰聽之類恐未必然外集第六卷有冷庭叟詩其序云庭堅於庭叟有十八年之舊庭叟有佳侍兒因早朝而逸去前集詩云往時盡醉冷卿酒侍兒琵琶春風手又云誰憐相逢十載後其事迹及歲月皆相似疑庭叟即冷卿也張侯官居桞對門張侯謂閩漕張仲謀見上注當風橫笛留三弄見上燒蠋圍棊覆九軍莊子德充苻篇舅士一人雄入於九軍盡是向來行樂事每見琵琶憶朝雲洛陽伽藍記言河間王有婢名朝雲善吹箎諸羌叛令朝雲假為老嫗吹箎羌皆流涕復降語曰快馬健兒不如老婢吹箎只今不舉蛾眉酒紅牙捍撥網蛛塵曹侯束書丞太僕見上試説相馬猶可人莊子徐無鬼見魏文侯曰嘗語君吾相狗也吾相狗又若吾相馬也武侯大恱而笑徐無鬼出女啇曰先生何以説吾君使吾君恱若此呼日吾直告之吾相狗馬耳照夜白真乘黃老杜觀曹將軍畫馬啚云將軍得名三十載人間又見真乘黃曽貌先帝照夜白龍池十日飛霹靂万馬同秣隨低昂一矢射落皂雕雙杜詩皂雕寒始急漢李廣傳是必射雕者也北齊書斛律光傳嘗從丗宗校獵見一大鳥雲表飛揚光引弓射之形如車輪旋轉而下乃大雕也張侯猶思在戎行橫山虎北開漢疆橫山隸西夏虎北隸契丹御史中丞吕誨上奏云种丗衡有復橫山之意而後保安軍宋迪言招橫山之居執政深信其説歐陽文忠公集中有論塞垣云晉髙祖得戎主為援乃以幽薊山後為耶律之壽故契丹有幽陵遂絶虎北之隘冷卿智多髮蒼浪牛刀發硎思一邦並見上政成十綴舞紅粧樂記云其治民逸者其舞行綴逺兩侯不如曹子方朵頥論詩蝟毛張昜頥卦觀我朵頥魏志蘇則傳則鬚髯悉張欲正論以對傳巽搯則乃止退之書張巡傳後云巡怒鬚髯輒張龜藏六用中有光祖庭事苑曰雜阿含云有龜𬒳野干所得藏六不出野干怒而捨去佛告諸比丘汝當如龜藏六自藏六根魔不得便楞嚴經云塵既不緣根無所偶反流全一六用不行何時端能俱過我掃除北寺讀書堂北寺即前集雜言所謂酺池寺也山谷入館後寓居於此讀書堂上見莊子菊苗煮餅深注湯更碾盤龍不入香蔡君謨茶録云茶有真香而入貢者微以龍腦和膏欲助其香建安民間試茶皆不入香恐奪其真送張材翁赴秦簽金沙酴醾春縱橫荆公詩云酴醾一架最先來夾水金沙次第栽又有詩云故作酴醾架金沙秪謾裁似矜顔色好飛度雪前開提壷栗留催酒行歐陽公啼鳥詩云獨有花上提壷蘆勸我酤酒花前傾詩兼義陸璣疏云黃烏黃鸝留也或謂之黃栗留公家諸父酌我醉橫笛送晚延月明此時諸兒皆秀發杜詩平公今詩伯秀發吾所羡酒門乞書藤𥿄滑北門相見後十年謂北京教授時醉語十不省七八吏事衮衮談趙張廣漢敞乃是樽前緑髮郎緑髮見上風悲松丘忽三歲言其居憂也更覺緑竹能風霜前漢嚴助傳不能其水土師古曰能堪也去作將軍幕下士退之云水北山人得聲名去年去作幕下士猶聞防秋屯虎兕唐陸贄傳西北邊歲調河南江淮兵謂之防秋杜詩聞道君牙帳防秋近赤霄虎兕見上只今陛下思保民所要邊頭不生事此語可見元祐𥘉作短長不登四万日如太白云百年三万六千日人壽短長多不及此數也南史袁峻傳抄書自課日五十𥿄𥿄數不登則不止此摘其字愚智相去三十里丗説云魏武過曹娥碑下楊修見碑背上題作黃絹幼婦外孫虀臼八字魏武謂修曰解否答曰解魏武曰卿未可言侍我思之行三十里曰吾已得之令修别記所知修曰黃絹色絲也於字為絶幼婦少女也於字為妙外孫女子也於字為好虀臼受辛也於字為辝所謂絶妙好辝也魏武亦記之與修同乃歎曰我才不及卿乃較三十里百分舉酒更若為古樂府隔谷歌食糧乏盡若為活太白詩桃李今若為當窗發光采千户封侯倘來尓莊子繕性扁軒冕在身非性命也物之倘來寄也寄之其來不可圉其去不可止摩詰畫丹青王右轄詩句妙九州唐王維傳維字摩詰遷尚書右丞畫思入神至山水平逺雲勢石色繪工以為天機所到學者不及也别墅在輞川賦詩為樂物外常獨往物外見上淮南子江海之上山谷之人輕天地細万物而獨往人間無所求袖手南山雨輞川桑柘秋胸中有佳處涇渭看同流詩谷風注云涇渭相入而有清濁杜詩濁涇清渭何當分和劉景文劉季孫字景文父平與西夏戰於三川口死焉景文篤學能詩文為兩浙兵馬都監東坡知杭州薦其才除知濕州追隨城西園殘暑欲退席傳燈録云六祖慧能答洪州法逹云若不肯信者從它退席借使此二字夜涼雨新休城譙挂蒼璧譙樓見陳勝傳譙門注佳人携手嬉調笑忘日夕樂天詩打嫌調笑易飲訝卷波遲自注云拋打曲有調笑飲酒有卷白波劉侯本將家今為讀書客詩名二十年風雅自推激杜詩陶謝不枝梧風騷共推激牛鐸調黃鍾晉荀勗傳𥘉勗於路􅑮趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下邵國悉送牛鐸果得諧者薪餘合琴瑟蔡雍傳吳人燒桐以㸑雍聞火烈之聲因而裁為琴果有美音而尾猶焦故時人名曰焦尾琴食無千戶封漢貨殖傳此其人皆與千户侯等句有万人敵項羽傳學万人敵耳兼用老杜白也詩無敵之意頗類鄴侯家連墻架書册退之詩鄴侯家多書插架三万軸退之送石洪序云戒行李載書册殘編汲縣冡杜預經傳集解後序云太康元年汲縣有發其界內臼冡者大得古書皆柬編科斗文字半隸鴻都壁漢靈帝元和元年二月始置鴻都門學法書要録載王逸少筆陳啚云蔡尚書入鴻都觀碣十旬不反嗟其出群退之石鼓歌云觀經鴻都尚填咽蓋熹平四年三月詔諸儒正五經文字命議郎蔡雍為古文篆隸三體書之刻石于太學門外使後生晚學咸取正焉碑始立其觀覽及摹寫者車乘日千兩填塞街陌退之所云蓋出於此按漢書𥘉無鴻都字山谷所引用又出於韓詩也半隸謂三體書隸居其半渠成亦秦利漢溝洫志韓聞秦之好興事欲罷之無令東伐使水工鄭國間説秦令鑿涇水以溉田中作而覺秦欲殺鄭國鄭國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠願公多購獲意須卜比鄰左傳匪宅是卜唯鄰是卜漢孫寶傳祭竈請比鄰勞苦相飲食身有小醜女諸葛亮擇婦得阿承醜女巳自喜翰墨要傳未見書見上遮眼差有益傳燈録僧問藥山為什麼香經師曰只啚遮眼人生但安樂國語云人生安樂孰知其他劵外豈吾力莊子劵內者行乎無名劵外者志乎期費注云劵分也分鹿誰覺夢列子曰鄭人有薪於野者遇駭鹿御而擊之斃之恐人見之也遽而藏諸隍中覆之以蕉俄而遺其所藏之處遂以為夢焉順詠其事傍人有聞者用其言而取之薪者之歸不厭失鹿其夜真夢藏之之處又夢得之之主爽旦案所夢而尋得之遂訟而爭之歸之士師士師請二分之亡羊路南北列子曰楊子之鄰人亡羊既率其黨又請楊子之豎追之楊子曰嘻亡一羊何追者之衆鄰人曰多𡵨路既反問獲羊乎曰亡之矣𡵨路之中又有𡵨焉吾不知所之所以反也公今百寮底杜詩有才無命百寮底雪髮不勝幘愛公欲湔拂顧我巳頭白文選絶交論剪拂使其長鳴注云與湔祓同寄忠王提刑市骨蘄千里戰國䇿郭隗對燕昭王曰古之人君有以千金求千里馬者三年不能得涓人言於君曰請求之君遣之三月得千里馬馬巳死買其首五百金反以報君君大怒曰安用死馬而捐五百金涓人對曰死馬且買之况生者乎馬今至矣於是不能期年千里之馬至者三量珠買娉婷朝野僉載喬知之有婢碧玉武承嗣借而不還知之作緑珠怨曰百家金谷重新聲明珠十斛買娉婷嶺表録異梁氏女有容貌石季倫為交址採訪使以真珠三斛買之即緑珠也駑駘參逸駕西子泣深屏杜牧詩西子下姑蘇一舸逐鴟夷吾人材髙秀胸次列渭涇嚴能喜劇部持莭按祥刑書監于兹祥刑萑蒲稍衰息左傳昭二十年鄭子産卒子太叔為政不忍猛而寬鄭國多盜取人於萑苻之澤太叔悔之興徒兵以攻萑苻之盜盡殺之盜少止郡縣或空囹王褒得賢臣頌故有圉空之隆讀書頭愈白見士眼終青杜詩别來頭併白相對眼終青王立之詩話云讀書頭欲白見士眼終靑身更万事巳頭白相對百年終眼青看鏡白頭知我老平生青眼為君明故人相見尚青眼新貴如今多白頭江山万里將頭白骨肉十年終眼靑此東坡詩也用靑眼對白頭非一而工拙有差今時斤斧地虛次待發硎莊子刀刃若新發於硎漢賈誼傳上疏云屠牛坦一朝解十二牛而芒刃不頓者所排擊剝割皆衆理解也至於髖髀之所非斤即斧夫仁義恩厚人主之芒刃也權勢法制人主之斤斧也今諸侯王皆衆髖也釋斤斧之用而欲嬰以芒刃臣以為不缺則折早晚紫微禁占來有使星唐中書省開元中改曰紫微省禁即省也蔡雍獨斷云門户有森故曰禁中孝元皇后父名禁當時避之故曰省中詩意謂省中人占星而知其召歸也使星蓋後漢李郃傳郃漢中南鄭人為幕門候吏和帝分遣使者微服單行觀采風謡使者二人到益部投郃候舍郃問曰二君發京師時寧知朝廷遣二使耶二人驚相視問何以知之郃指星示云有二使星向益部分野故知之送吕知常赴太和丞我去太和𣣔期矣山谷在太和三年至元豐七年移監德州德平鎮是年三月過泗州僧伽塔有發願文八年四月以校書郎召今言去太和欲期猶在德平也吕君𥘉得太和官邑中亦有文字樂韓詩不解文字飲惟能醉紅裙此反其意惜不同君澗谷槃見上觀山千尺夜泉落快閣六月江風寒第七卷有登快閣詩在太和作往尋佳境不知處掃壁覔我題詩看退之詩曲江山水聞來久恐不知名訪倍難願借啚經將入境亦逢佳處便開看漸入佳境見晉書顧愷之傳和答莘老見贈往歲在辛丑嘉祐六年辛丑山谷時年十七有溪上呤春江引二詩從師海瀕州外家有行役外家謂母家見漢書拜公古𨝍溝𨝍溝謂楊州也唐曰𨝍州左傳吳城𨝍溝以通江淮取此義也兒曹𬒳鑒賞晉王戎傳鑒賞先見如此許以綜九流見上仍許歸息女采蘋助春秋後集黃氏二室墓銘云庭堅之𥘉室曰蘭溪縣君孫氏故龍啚閣直學士孫公覺莘老之女初庭堅年十七從舅氏李公擇學於淮南始識孫公孫公憐其少立以蘭溪歸之息女見漢髙祖紀采蘋見詩斯文開津梁丗説庾公見卧佛曰此子疲於津梁盛德見虛舟莊子山木萹方舟而濟於河有虛船來觸舟雖𥚹心之人不怒杜詩對君疑是泛虛舟離合略十年文選陸士衡詩離合非有常譬彼弦與栝杜詩人生有離合豈擇貴賤端每見仰清修魏志陳登曰清修疾惡有識有義吾敬趙元逹久次不進遷楊雄贊以耆老久次轉為大夫此言莘老天祿勤校讐文武修衮聀諌垣始登收實録治平四年正月丙子祕書丞館閣校勘孫覺直集賢院為昌王府記室參軍熙寧元年四月癸亥太常博士直集賢院孫覺為右正言楊雄贊雄校書天祿閣上詩衮聀有缺唯仲山甫輔之身趍鄴公城鄴當作葉轉寫誤耳山谷𥘉仕為汝州葉縣尉葉本楚地楚惠王以封沈諸梁謂之葉公逐臣既南浮實録熙寧元年入月癸卯以太子中允直集賢院同知諌院孫覺通判越州以言事得罪也詩意自言方之葉縣而莘老巳為逐臣南征矣到官與莘老竄逐同是元年辨其到官歲月詩見第一卷注漢髙祖紀云南浮江漢以下孌彼丞中饋詩泉水云孌彼諸姬昜家人無攸遂在中饋家庭供百羞周禮天官內饔選百羞醬物珍物以俟饋堂堂來問寢忽為雲霧休遺玩猶在篋汝水繞墳丘二室墓志云孫氏年二十而卒殯於葉縣者二十二年文選潘安仁悼亡云流芳未及歇遺挂猶在壁南箕與北斗日月行置郵速於置郵見孟子相􅑮輦轂下存沒可言愁元豐八年四月山谷以校書郎召時莘老為祕監當年小兒女杜詩遙憐小兒女未解憶長安生子欲勝裘勝衣見上甌越委琴瑟江湖拱松楸文選謝靈運遊方山詩云指期憩甌越越州春秋時為越國所都史記東甌王徐廣曰今之永寧也當是莘老在越州悼亡返葬於江南墓木拱矣故有存沒可言愁之句詩云妻子好合如鼓琴瑟按秦少遊集中與參寥簡云莘老壽安君竟不起子實遂丁憂逺方罹此禍故殊可傷也莘老悼亡於此可見越州今為紹興府持莭轉七郡莘老自越倅徙知通州召還修起居注又以言事黜知廣德軍踰年徙湖州又徙廬州持祖母喪服除知蘇州徙福州徐州又南京召為太常少卿昜祕書少監哲宗即位兼侍講遷右諌議大夫故言七郡治功無全牛見上還朝蒙嗟識明月豈暗投見上抱𬒳直延閣劉歆七略云武帝廣獻書之路書積如丘山外有太常博士之藏內則延閣廣內祕室之府退之送殷侑序云持𬒳入直三省丁寧踈簾近奎鈎書斷曰蒼頡仰觀奎星圎曲之勢合而為字孝經援神契云奎主文章蒼頡文字㧾而為言晉天文志鈎陳後宫也大帝之正妃也時宣仁后御簾三生石上夢葛洪川畔牧童扣牛角而歌曰三生石上舊精魂賞月吟風不要論慙愧情人逺相訪此身雖異性長存此乃僧圎澤事見於甘澤謡東坡刪改作圎澤傳見遺文記是復疑不隱几付天籟莊子齊物篇南郭子綦隱几而坐仰天而噓云云又曰汝聞地籟而未聞天籟閲人如海鷗列子云海上之人有好鷗鳥者每旦之海上從鷗鳥遊鷗鳥之至者以百數而不止其父曰吾聞鷗鳥從汝遊取來吾玩之明日之海上鷗鳥舞而不下襟懷俯万物顔鬢與百憂長歌可當泣短生等蜉蝣古樂府王融悲歌云悲歌可以當泣逺望可以當歸短生見第一卷注詩蜉蝣之羽毛云渠略也朝生夕死悲歡令人老文選任彥升詩悲歡不自持万丗略同流書畢命万丗同流軒冕來逼身軒冕見上白蘋晚滄洲履拂知道肥杜詩巾拂香餘搗藥塵階除灰死燒丹火詩意言學道蕭散也子夏戰勝故肥見上淵明詩貧冨常交戰道勝無戚顔淨室見天遊莊子外物萹室無空虛則婦姑勃豀心無天遊則六鑿相攘小人樂蛙井莊子井蛙不可以語於道癡甚顧虎頭晉書顧愷之癡絶才絶畫絶或曰小字虎頭或曰虎頭將軍丗緣真嚼蠟楞嚴經於橫陳時味如嚼蠟骨相謝封侯後漢班超傳相曰此万里侯相也松根養伏苓杜詩知子松根養伏苓遲暮有意來同煮歲晏望華輈考工記輈人為輈注車轅也謝玄暉詩疊鼓送華輈老杜浣花溪啚引拾遺流落錦宫城杜詩花重錦宫城故人作尹眼為青故人嚴武也眼青見上碧雞坊西結茅屋杜詩時出碧雞坊坊名取碧雞金馬之義百花潭水濯冠纓杜詩万里橋西宅百花潭北莊百花潭事蓋莭度使崔寧妻兾國夫人家于浣花溪上夫人𥘉為兒童有異僧過其家遍身瘡穢夫人奉之甚謹僧持弊衣謂曰為我濯此夫人即就溪浣之蓮花隨出潭中及貴俗呼百花潭故衣未輔新衣綻禮記內則衣裳綻裂綛針請輔綴空蟠胸中書万卷杜詩讀書破万卷探道欲度羲皇前陶淵明與子􅌂等疏云五六月中北窗下卧遇涼風至自謂羲皇上人南史王僧虔傳駸駸常欲度驊驑前摘此二字論詩未覺國風遠干戈崢嶸一作終風霾暗宇縣文選謝玄暉詩霸功興宇縣注引説文曰宇籕文宇字杜詩宇縣復小康杜陵韋曲無雞犬老杜贈韋七詩云時論同歸尺五天自注云俚語云城南韋杜去天尺五老妻稚子且眼前杜詩老妻畫𥿄為棊局稚子敲針作釣鈎弟妹飄零不相見杜詩干戈猶未定弟妹各何之又云喪亂聞吾弟飢寒傍濟州人稀吾不到兵在見何由此公樂易真可人蜀志費禕傳君信可人字本出禮記園翁溪友肯卜鄰杜詩溪友得錢留白魚又園人送瓜詩共少及溪老鄰家有酒邀皆去杜詩田父要皆去鄰家問不違要邀義同得意魚鳥來相親丗説簡文入華林園顧謂左右曰會心處不必在逺翳然林水不覺鳥獸禽魚自來親人浣花酒船散車騎野墻無主看桃李杜詩手種桃李非無主野老墻低還是家又云桃花一簇開無主宗文守家宗武扶老杜云熊兒幸無恙驥子最憐渠又有示宗文宗武兩詩宗武生日詩注云宗武小字驥子陳無巳和饒莭詠周昉畫李白真詩云君不見浣花老翁醉騎驢熊兒捉轡驥子扶金華仙伯哦七字好事不復千金摸謂此詩也金華謂山谷落日蹇驢馱醉起願聞解鞍脫兜鍪書太甲惟甲胄起戎注甲鎧胄兜鍪也漢韓延壽傳𬒳甲鞮鞪注即兜鍪也退之詩邊封脫兜鍪老儒不用千户侯老杜憶昔云老儒不用尚書郎樂府木蘭歌木蘭不用尚書郎中原未得平安報杜詩夕烽來不近每日報平安醉裏眉攢万國愁一作清揚之間廬阜雜記逺法師結白蓮社以書招淵明淵明造焉逺因勉以入社陶攢眉而去生銷鋪墻粉墨落平生忠義今寂寞兒呼不蘇驢失腳尤恐醒來有新作常使詩人拜畫啚煎膠續絃千古無東万朔十洲記煮鳯喙麟角合煎作膠名為續絃膠博物志漢武時西海國獻膠五兩以付外庫余半兩使者佩以自隨後從帝射於甘泉帝弓絃斷西使乞以所余膠續之絃遂相著使力士各引一頭終不相離因名續弦膠杜詩麟角鳯觜丗莫卞煎膠續絃竒自見杜牧之讀韓杜云杜詩韓茟愁來續似倩麻姑癢處抓天外鳯凰誰得髓無人解合續絃膠奉謝劉景文送團茶劉侯惠我大玄璧上有雌雄雙鳯迹鵝溪水練落春雪蔡君謨茶録云茶羅以絶細為佳羅底用蜀東川鵝溪畫絹之密者投湯中揉洗以羃之詩意謂以白練為羅茶如雪落也粟靣一杯增目力粟靣蓋茗花也劉侯惠我小玄璧自裁半璧煮瓊糜離騷經云精瓊靡以為粻爢音糜借此以喻點茶如茶録所謂湯少茶多則粥靣聚收藏殘月惜未碾直待阿衡來説詩匡衡傳無説詩匡鼎來絳囊團團余幾璧因來送我公莫惜因來見苐一卷末注箇中渴羌飽湯餅拾遺記晉有羌人姚馥字丗芬充圉人但言渴於酒群輩呼為渴羌湯餅見上雞蘇胡麻煮同喫本草水蘇一名雞蘇胡麻一名巨勝今油麻謝景文惠浩然所作廷圭墨廷圭贋墨出蘇家韓非子云齊伐魯索讒鼎魯人以其鴈往齊人曰鴈也魯人曰真也麝煤􅃮澤紋烏鞾桞枝瘦龍印香字十襲見上一日三摩莏劉侯愛我如桃李揮贈要我書万𥿄不意神禹治水圭禹貢禹錫玄圭忽然入我懷袖裏吾不能手抄五車書杜詩男兒須讀五車書亦不能寫論付官奴周越法書苑云王獻之字子敬羲之第七子五六歲時學書右軍從後掣其筆不脫歎曰此兒後當有大名遂書樂毅論一篇與之後題云書賜官奴官奴子敬小字也便當閉門學水墨􅎈作江南驟雨啚李成有驟雨啚山谷跋郭熙山水云熙因為蘇才翁家摹六幅李成驟雨從此筆法大進按名畫記李成營丘人奉和公擇舅氏送吕道人研長韻奉身玉壷冰立朝朱絲絃文選白頭呤云直如朱絲絃清如玉壷冰妙質寄郢匠郢人堊漫其鼻端使匠石斫之見莊子巳見上注素心乃林泉力耕不罪歲孟子王無罪歲嘉榖有􅑮年史記侫奉傳力田不如逢年善仕不如遇合校書天祿閣見楊雄傳藝竹老風煙携提寒泉泓退之毛頴傳謂硯為淘泓松媒厭磨研後漢蘇竟傳以磨研編削之才籍甚在臺省六經勤傳箋毛氏注詩曰詁訓傳鄭氏曰箋公擇有詩傳十卷諌草蠧穿穴江湖渺歸船公擇熙寧𥘉為右正言論新法謫通判滑州元豐六年召為太常少卿遷禮部侍郎哲宗立進吏侍春官酌典禮典禮見上日月麗秋天昜離卦日月麗乎天按實録元豐八年四月黃庭堅為祕書省校書郎是年十二月禮部侍郎李常為吏部侍郎此時未遷吏侍也少也長母家學海頗尋沿楊子學行萹百川學海而至于海丘陵學山而不至于山是故惡夫畫也諸公許似舅晉何無忌傳桓玄曰何無忌劉牢之之甥酷似其舅賤子豈能賢杜詩賤子請具陳左傳云豈曰能賢轅駒蒙推挽漢竇嬰田蚡傳云今日廷論局趣若轅下駒山谷除校書郎時孫莘老李公擇皆在朝故最先諸公收召信推挽之力也及元祐五年二月丁酉公擇卒戊戍莘老卒六年三月山谷除右史中書舍人韓川有言至六月遂居母憂自此不復振矣山谷遺文有祭莘老文云二月丁酉公擇去化厥明戊戍公亦命駕官次奉丹鉛退之秋懷詩丹鉛事點勘言作校書也左傳襄二十三閔子馬謂公鉏曰若能孝敬冨倍季氏可也公鉏然之敬共朝夕恪居官次新詩先舊物包送比靑氊晉王獻之傳青氊我家臼物言以詩先研也左傳僖末年弦髙以乘韋先牛十二犒師注云古者將獻遺於人必有以先之襄十九年享晉六卿于蒲圃贈荀偃束錦加璧先吳壽夢之鼎注古之獻物必有以先之桞子厚送濬上人序云古之贈禮必以輕先重故鄭啇之犒先乘韋魯侯之贈後吳鼎繆傳黃梅鉢未印少林禪少林謂逹磨也自南天竺國來寓止干嵩山少林寺靣璧而坐終日默然後傳法與慧可且付袈裟慧可傳僧璨僧璨傳弘忍弘忍大師靳州黃梅人也黃梅傳盧行者慧能有道明者聞五祖密付衣法與盧行者即率同意數十人追逐至大庾嶺盧行者擲衣鉢於盤石曰此衣表信可力爭耶任君將去道明舉之如山不動乃曰我來求法非為衣也願行者開示祖曰不思善不思惡正恁麼時阿那個是明上坐本來靣目明當下大悟遍體汗流汲井滌敗墨謝靈運詩激澗待汲井蒼圭謝磨鐫蓋以所送研比衣鉢以墨比蒼圭也玉蟾㵼明滴玉蟾蜍見上要須筆如椽見上眷求盡耆德元祐𥘉多用故老舅氏且進遷山龍用輔衮書益稷帝曰子欲觀古人之象日月星辰山龍華蟲作會輔衮見上注舟楫功濟川説命云若濟巨川用汝作舟楫當身任百世當字去聲見上注舊學不虛捐私持殺青簡見上緝綴報餐錢漢髙后紀列侯幸得賜餐錢奉邑屢書願無愧倘繼麟趾篇詩麟之趾關雎之應也退之答元稹書云嗣德有繼將大書特書屢書不一書而巳也自當身任百世至篇末皆言身為史官書傳百世殺青屢書皆史官事而關雎之應言宣仁后也後漢郭太傳林宗卒同志者共刻石立碑蔡雍為其文曰吾為碑銘多矣皆有慙德唯郭有道無愧耳再和公擇舅氏雜言外家有金玉我躬之道術莊子天下篇道術將為天下裂又云古之道術有在於是者有衣食我家之德心使我蟬蛻俗學之市後漢竇融傳論蟬蛻王侯之尊莊子繕性篇俗學而求復其𥘉烏哺仁人之林尓雅純黑而反哺者烏也文選輔亡詩嗷嗷林烏受哺於子山谷有母在也飬生事親汔師古炊玉㸑桂能至今見上歲莫三十裘食口三百指寒不緝江南之落毛昭明太子作淵明集序云或貨海東之藥草或紡江南之落毛蓋用列女傳楚老萊妻曰烏獸之解毛可緝而衣之其遺粒可食也庾信詩云蒙史觀秋水萊妻紡落毛飢不拾徂公之橡子莊子齊物篇狙公賦芧音義云芧音序橡子也平生荆雞化黃鵠莊子庚桑楚篇奔蜂不能化藿蠋越雞不能伏鵠卵今日江鷗作樊雉江鷗見上莊子飬生生篇澤雉十步一啄百步一飲不鄿畜乎樊中人言無忌似牢之見上挽入書林覷文字長楊賦并包書林退之詩文字覷天巧又云不如覷文字更蒙著鞭翰墨埸選詩粲粲翰墨埸晉祖逖傳先我著鞭贈研水蒼圭玉方玉藻云大夫佩水蒼玉蓬門係馬晚色淨拉詩水花晚色淨茅簷垂虹秋氣涼湔拂見上垢靣生寒光漢隸書吕規其陽東坡云吕道人沉泥硯其首有吕字非刻非書堅緻可以試金吕翁之冶與天通不但澄埿燒鉛黃𥘉疑蠻溪水中骨蠻溪見上不見鸜鵒目突兀端石有鸜鵒眼但見受墨無聲松花發頗似龍尾琢紫煙歐陽公硯譜歙石出於龍尾溪端溪以北品為上龍尾以深溪為上不見羅縠紋𥻘𥻘唐積歙硯圗譜有羅紋石出羅紋山但見含羅不泄如寒淵往在海瀕時前篇云從師海瀕州晨夕親几杖恪居有官次恪居官次見前萹遣吏問無恙戰國䇿齊語云齊王使使者問趙威后書未發問使者歲無恙耶民無恙耶王無恙耶撫摩寶泓置道山寶泓謂陶泓也見前篇注後漢竇章傳是時學者稱東觀為老氏藏室道家蓬萊山遂薦章入東觀為校書郎􅓹􅓹秀氣似舅眉宇間唐元德秀傳見紫芝眉宇使人名利之心都盡其重可以回進躁之首其溫可以解橫逆之顔橫逆見孟子烏呼端是万乘器漢鄒陽傳蟠木根柢輪囷離竒而為万乘器紅絲潭石之際知才難歐陽硯譜云紅絲石硯君謨贈余云此青州石也得之唐彥猷云須飲以水使足乃可用次韻答王四病懶百事廢不惟書問踈新詩苦招喚是日鎖直廬文選陸士衡詩朝遊遊曽城夕息旋直廬潢汙深一尺左傳潢汙行潦之水大道覆行車賈誼書前車覆後車戒枚乘七發車覆能起之晴夜遙相似秋堂對望舒離騷前望舒使先軀兮注月御也題畫鵝鴈鴐鵝引頸回子虛賦弋白鵠連鴐鵝似我胸中字右軍數能來杜詩鄰家送魚鱉問我數能來不為口腹事王立之詩話云古人有詩鴐鵝引頸回似我胸中字右軍數能來不為口腹事或曰山谷詩非也王羲之傳性愛鵝會稽有孤居姥養一鵝善鳴携親臼就觀姥聞羲之將至烹以待之羲之歎惜彌日後漢書閔仲叔豈以口腹纍安邑哉水國鴻鴈秋煙沙風日麗莫遣角弓鳴驚飛不成字送六十五弟賁南歸風驚鴻鴈行吹落秋江上為掃碧岩邊問叔今無恙史記范雎傳須賈曰范叔固無恙乎贈陳師道元祐元年二年陳無巳在京師寓居陳州門按實録二年四月乙巳徐州布衣陳師道充徐州州學教授贈此詩時未得官也陳侯學詩如學道王立之詩話稱潘邠老云陳三學詩如學仙時至骨自換自謂此語得意然山谷有學詩如學道之句陳三所得豈其苗裔耶今按張良傳乃學道欲輕舉學道即學仙也陳無巳此語乃印山谷之言此篇論詩固非王立之所及苟非陳無巳山谷亦未嘗向人説此也故云十度欲言九度休万人叢中一人曉又似秋蟲噫寒草如蟋蟀俟秋吟也噫見上日晏腸鳴不俯眉盧同月蝕詩飢腸徹死無由鳴楊雄解嘲云群卿不揖客將相不俯眉得意古人便忘老君不見向來河伯負兩河觀海乃知身一蠡莊子秋水篇秋水時至百川灌河兩涘渚涯之間不辨牛馬河伯欣然自喜順流而東行至于北海不見水端河北望洋向若而歎曰野語有之聞道百以為莫巳若者我之謂也吾非至於子之門則殆矣長見笑於大方之家按東方朔傳語曰以𬋩窺天以蠡測海注云蠡瓠瓢也來奚切今作河字韻乃蚌屬也疑别有所出然山谷集中又有詩云在公每懷歸安得借明駝畏塗失無鄉酌海持一蠡則是用東方朔語也蓋文選以蠡測海音力禾切旅床爭席方歸去莊子寓言萹其往也舍者避席其反也與之爭席也秋水黏天不自多退之祭文洞庭汗漫粘天無壁秋水萹又云北海若曰天下之水莫大於海吾末嘗以此自多春風吹園動化鳥霜月入户寒皎皎十度欲言九度休雲居膺示衆云知有底人終不取次十度擬發言九度却休去見祖庭事苑万人叢中一人曉貧無置錐人所憐窮到無錐不屬天莊子云堯舜有天下子孫無置錐之地張良傳無立錐之地傳燈録溈山傳香嚴頌曰去年貧未是貧今年貧始是貧去年貧尚有卓錐之地今年錐也無呻吟成聲可𬋩絃能與不能安足言莊子呻吟裘氏之地檀弓云彈琴而不成聲詩意謂吟詠之際而自成聲音可𬒳之𬋩絃不復有能否之念如東坡南行集敘夫昔之為文者非能為之為工乃不能不為之為工也松下淵明此詩在前集巳有注畫本今藏眉山陳氏與板本小異今録於此南渡誠草草長沙濟艱難夜半舟移岸今無晉衣冠松風自度曲我絃不須彈惠逺香火社遺民文字禪雖非老翁事幽尚亦可歡客來欲開説觴至不得言十四弟歸洪州賦莫如兄弟四章贈行惱人自作樂休休莫莫莫司空圗集休休亭記謂其才一冝休揣其分二冝休且耆而瞶三冝休因為耐辱居士歌咄諾休休莫莫伎倆雖多性靈惡賴是長教間處著相看將白頭止有不如昨樂天詩今既不如昔後當不如今北來哺慈烏南歸護尓雛束晢輔亡詩云嗷嗷林烏受哺於子注尓雅純黑而返哺者烏也退之詩那暇更護雞窠雛昨夜雲飛鴈相隨我不如退之詩青青水中蒲長在水中居寄語浮萍草相隨我不如志欲收九族莊子列禦寇萹澤及九族本出堯典别離乃同生同生謂親弟兄淵明送從弟詩禮服名群從恩愛若同生淳化帖王逸少書云吾有七兒一女皆同生誰能成此意惟有孔方兄言以貧而仕兄弟相别也晉魯褒傳著錢神論云云親之如兄字曰孔方大夫無恙時刻意教子弟莊子刻意篇云刻意尚行離丗異俗歸掃松楸下灑我万里涕退之詩深思罷官去畢命依松楸題李夫人偃竹李夫人山谷之姨母公擇之妹善臨松竹木石見米芾畫史孤根偃蹇非傲丗唐杜審言傳恃才髙以傲丗徑莭癯枝万壑風閨中白髮翰墨手落筆乃與天同功唐李賀詩筆輔造化天無功贈吳道士吳仙十二棊一擊玄關應探人懷中事如月入清鏡劉存事始云丗本曰烏曹作六博説文曰十二棊也御覽方術部異苑曰十二棊卜出自張文成受法於黃石公行師用兵万不失一至東方朔密以占衆事後祕不傳晉寧康中襄城寺法味道人遇一老公著黃皮衣竹筒盛此以授法味無何失所在遂復傳於丗山谷稱十二棊蓋異苑所言者非博也張文成蓋張良諡文成侯文選王簡栖碑云玄關幽鍵陸龜蒙詩幽憂拂長剱憔悴慙清鏡戲答仇夢得承制仇侯能騎矍鑠馬後漢馬援傳武威將軍劉向擊武陵五溪蠻夷深入軍沒援因請代時年六十二帝愍其老未許援自請曰臣尚能𬒳甲上馬帝令試之援據鞍顧眄以示可用帝笑曰矍鑠哉是翁也席上亦賦競病詩南史曹景宗傳梁武帝宴連句令沈約賦韻唯景宗不得韻意色不平詔約與韻時韻巳盡唯有競病二字景宗操茟便成曰去時兒女悲歸來笳鼓競借問行路人何如霍去病玄冬未雷蒼蛇卧玉山無年天馬飢山海經崑崙亦名玉山上有玉禾其修百尋退之詩稱騏驥云飢食玉山禾鮑明逺詩誠不及青鳥逺食玉山禾三年荷戈對搖落十倍乞弟亦可縛乞弟事見秦少遊所作任師中墓表甚詳其大略云元豐中朝廷治西南乞弟之罪至於斬將帥絀監司兩蜀騷然四年而後定實部使者為之裔夷何足責也何如万騎出河西捕取弄兵黃口兒西夏自陷永樂城後為邊患及秉常卒子乾順立元祐二年遣使册乾順夏人以地界為詞不入謝且犯涇原鎮戎軍又侵德靖寨又犯塞門寨黃口兒謂乾順也家語孔子見羅雀者所得皆黃口小雀弄兵潢池見龔遂傳和任夫人悟道夫亡子幼如月魄書武成旁死魄疏云魄形也月之輪郭無光之處朔後明生而魄死望後明死而魄生退之詩維時月魄死冬日朝在房摧盡蛾眉作詩客二十餘年刮地寒見兒成人乃禪寂杜詩豫亦師粲可身猶縛禪寂万事新新不留故瘦藤六尺持門户玉臺新詠健婦持門戶勝一大丈夫煩惱林中即是禪更向何門覔重悟山谷外集詩注卷之八
