front:
  text: 山谷外集詩註卷之八
  hash: sha256:dae56d3e4ebc12447a7634f75861b1ac6a99e12d0114593522b4950d561c90a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_008-1a}
body:
  text: 送昌上座㱕成都昭斍堂中有道人昭覺寺在成都道人當是圜悟禅師克勤也崇寕𥘉㱕蜀住昭斍一時叢林之盛无与爲此山谷崇寕元年夏罷太平州寓居鄂州二年冬謫冝州此詩當在鄂渚作龍吟虎嘯隨風雨花經席冷如鐡雲杜詩布衾多年冷似鐡一縢日轉十二輪法華經化城品丗尊轉法輪尓時大通智勝如來受十方諸𣑽天王及十六王子請即時三轉十二行法輪宝勝蓬蒿荒小院按成都記宝勝院在成都盖大悲寺諸院之数元豊間改作十方昌上座必住此院也埋没醯羅三隻眼傳燈録鄂州岩頭全豁禅師曰吾教意如摩醯首羅劈開靣門豎亞一隻眼梵語摩醯首羅此云大自在又威靈帝魔王按本行經云太子𥘉生西囯之法合礼天神其名摩醯首羅極悪而有靈抱太子至神所神自離坐下階先礼太子盖禅家以此惜喻也箇是江南五味禅廣語云有僧辝㱕宗云諸方斈五味禅去宗云我這裏有一味禅爲甚不斈僧云如何是一味禅宗便打更往叅㝷莫擔板傳燈録趙州從諗傳云只是箇擔板漢送彦孚主簿斯文當两都江夏丗无双後漢黄香傳京師号曰天下无双江夏黄童叔度𥘉不言漢庭望風降黄憲傳憲字叔度論曰黄憲言論風旨无所傳聞然士君子見之者靡不服深逺去玼吝中間眇人物王逸少帖云當今人物眇然而艱疾若此令人短氣潜伏老崆谾元注云許江切本朝開典礼易係辝云觀其㑹通以行其典礼棫樸作株椿大雅棫樸文王能官人也芃芃棫樸薪之槱之詩人謂小木可爲薪山谷以爲可作株樁皆言无弃材也莊子吾処也若橜株拘退之詩窙豁􅓯株橜又云斬伐枿与椿丗父盛文藻第五卷豊城詩自注云有丗父長善石隄記韓退之薦士詩云囯朝盛文章本出宋玉神女賦其盛飾也則羅紈綺績盛文章如陸海潘江鍾嵘詩品云陸才如海潘才如江三戦士皆北韔弓錦轁杠檀弓下射之斃一人韔弓詩采緑云之子于狩言韔其弓尓雅素錦綢杠注旗之竿白衣受傳詔短命終螢䆫論語顔回不幸短命晋車胤傳家貧不常得油綀囊盛数十螢火以照書退之詩安居守䆫螢夢升卧南陽耆旧无兩龐謂龐德公及其從子士元也見後漢徳公傳及蜀志龐統傳空鑱歐陽銘松風悲隴瀧双韓退之詩藉乃隴頭瀧又有瀧吏詩亦音閭江切歐陽文忠集有黄夢升墓誌銘云諱注四海群從問尔來頗琤士耕切淙士江切退之聮句泉音玉淙琤淙两音主簿吾宗秀其能任爲邦軀幹雖眇小勇沉鼎可扛項籍傳力扛鼎擇師别陳許孟子云陳相見許行而大恱尽弃其斈而斈焉取友觀羿逢孟子離婁下逢蒙斈射於羿尽羿之道思天下惟羿爲愈巳於是殺羿孟子曰是亦羿有罪焉云云其取友必端矣折腰佐髯令陶潜傳不能爲五斗米折腰邑訟銷吠尨詩无使尨也吠時邀府中飲下箔蠟燒釭杜詩銅盤燒蠟光吐日紅裳笑千金異聞实録楊績於昭應寺讀書毎見一紅裳女子験之乃經幢中燈列女傳楚成王夫人鄭瞀𥘉成王登䑓瞀直行不頋王曰頋吾与汝千金瞀不一頋鮑明逺詩千金雇笑買芳年太白詩美人一笑千黄金淸夜酒百釭同僚有悪少嘲謔語乱哤𬋩子曰四民雜処則其言哤注哤乱也退之詩子言得无哤君但隱几笑莊子隠几而坐諸老嘆敦厖左傳成十六年傳曰民生敦厖况乃工朱墨見上氣和信甚矼莊子德厚信矼注云慤实貌持此應時湏杜詩竇氏檢察應時湏十年擁麾幢退之詩不令見麾幢相逢常鞅掌詩北山或王事鞅掌衙鼔趍詩靈䑓鼉皷逢逢簿書敗清談王戎傳阮籍曰俗物巳復來敗人意此摘其字汗顔吏摐摐子虚賦摐金皷退之詩扶机導之言曲莭𥘉摐音䆫臨分何以贈退之云臨分不汝誑有路即歸田要我賦蘭茫子虚賦茳蘺蘪蕪黄華雖衆笑莊子天地篇大声不入於里耳折揚皇華則嗑然而笑白雪不同腔文選宋玉對楚王問曰客有歌於郢中者其始曰下里巴人囯人属而和者數千人其爲陽阿薤露属而和者數百人其爲陽春白雪属而和者數十人而巳引商刻羽雜以流徴属而和者不過數人其曲弥髙其和弥寡野人甘芹味文選嵇叔夜絶交書云野人有快炙背而羙芹子者欲献之至尊亦巳䟽矣事見列子敢饋厭羊羫退之云酒壷綴羊羫頋予百短拙百出見此卷首答魏道輔詩注飽腹戇胮音龐肛許江切退之詩連日挾所有形軀頓胮肛唯思解官去一丘事耕䎫音䆫集韻云不耕而種君當取冨貴鍾皷羅擊撞漢田蚡傳前堂羅鍾皷立曲旃退之詩金石日擊撞伏藏鼪鼯徑莊子徐无鬼篇逃虚空者藜藋柱乎鼪鼬之徑聞人足音跫然而喜矣猶想足音跫莊子音義云跫巨恭曲恭反又苦江反寄朱樂仲故人昔在囯北門鄰舎杖藜見上對樽酒十五餘年乃一逢黄塵急流語馬首文選恨賦云黄塵匝地注引山陽公載記云鳴皷雷震黄塵蔽天急流盖用後漢馬后紀車如流水馬如龍也左傳唯予馬首是瞻懶書愧見南飛鴻君居三十六峯東李太白贈嵩山焦練師序云余訪道少室尽登三十六峯按河南志河南府永安縣少室山在縣西南七十里有三十六峯具列其名我心想見故人靣曉雨垂虹到望崧洛陽嵩山嵩亦作崧從王都尉覔千葉梅云巳落尽戯作嘲吹笛侍児若爲可耐昭華得駙馬都尉王晋卿家吹笛妓名昭華脫帽看髮巳微霜杜詩脫帽露頂王公前催尽落梅春巳半楽府詩集漢横吹曲有梅花落其序云梅花落本笛中曲唐大角曲亦有大梅花小梅花等曲今其声猶有存更吹三弄乞風光晋桓伊傳王徽之泊舟靑溪側伊於岸上過令人謂伊曰聞君善吹笛爲我一奏伊鋸胡床爲作三調弄杜詩風光草際浮又云傳語風光共流轉此詩乃元祐中在史局時作此篇巳前皆太和所作也次韻子瞻書黄庭經尾付蹇道士東坡書黄庭經跋云成都道士蹇拱辰翊之葆光法師將㱕廬山東坡居士蘇軾子瞻爲書黄庭内景經一卷龍眠居士李公麟伯時爲畫經相贈之元祐三年九月二十二日時山谷正在史局山谷和篇其序云十月四日琅凾絳簡蘂珠篇黄庭經云玉書絳簡赤丹文又云閑居蘂珠作七言注曰秘要經云仙宫中有陽廖之殿蘂珠之闕寸田尺宅可蘄仙經云寸田尺宅可理生注謂三丹田之宅各方一寸尺宅謂靣也髙真接手玉宸前經云燒香接手玉華前又云太上大道玉宸君女丁來謁粲六妍經云神華执巾六丁謁注云六丁隂神玉女也又引六甲苻圗言六丁名金鑰閉欲形完坚經云結珠固精奍神根玉􅙞金籥常完坚万物蕩尽正秋天使形如是何塵縁楞嚴經有六塵謂地火水風空見又有三縁謂丗界衆生業果也蘇李筆墨妙自然万靈拱手書巳傳漢郊祀志黄帝接万靈於明庭傳非其人恐飛騫當付􅌐龍藏九渊賈誼賦襲九渊之神龍蹇侯奉告請周旋緯䔥探手我不眠左傳奉以周旋莊子河上有家貧恃緯䔥而食者其子没於渊得千金之珠其父謂其子曰取石來鍜之夫千金之珠必在九重之渊而驪龍頷下子能得之必遭其睡也莊子釋音緯織也䔥萩蒿也織䔥以爲畚而賣之次韻叔父夷仲送夏君玉赴零陵主簿黄廉字夷仲終於給事中田竇堂上酒未醉巳変態太白詩田竇相傾奪賔客云盈虧竇嬰田蚡事見漢書本傳子虚賦覧將帥之変態又云殚覩衆物之変態何如東陵瓜子母相鈎帶阮嗣宗詩巳見上注冨賞席未暖班固賔戯孔席不暖珠玉作災怪文選阮嗣宗詩多財爲患害茅茨雖長貧終有懿親在左傳封建親戚以藩屏周不廢懿親也文人困州縣短髮餘㑹撮莊子曰支離䟽者頥隠於斉肩髙於頂㑹撮指天㑹古外反撮子外反詩言髮脫僅餘髻耳居然枳棘棲居然見上後漢仇覧傳一名香考城令王渙署爲主薄謝遣曰枳棘非鵉鳯所捿坐閱歳月代青雲巳迷津太白詩迷津斍路失託势随風翻濁酒未割爱杜詩割爱酒如黽自注云平生所爱消渇止之簿領能无休飣餖喚魚菜退之云呼奴具槃飱飣餖魚菜贍羈旅䒷地偏淵明詩心逺地自偏江湖見天大万里一㠶檣長風可倚頼楽府詩云象牙作㠶檣南史宗慤云願乗長風破万里浪因行訪幽禅頭陀煙雨外王立之詩話云山谷有送零陵主簿夏君玉詩末云因行訪幽禅頭陀煙雨外盖君玉頭甚大故以此戯之梵語頭陀此言斗薮斗薮惱頭也謝曹子方惠二物二首飛來海上峯地理書云錢塘縣郭下有靈隠山昔梵僧云自天竺鷲山飛來琢出華隂碧華岳三峯也注香上褭又映我鼻端白楞嚴經丗尊教我觀鼻端白我𥘉諦觀經三七日見鼻中氣出入如煙身心内明圎洞丗界偏成虚浄猶如琉璃煙相漸銷鼻息成白心開漏尽諸出入息化爲光明照十方界得阿羅漢聽公談昨夢沙暗雨矢石今此非夢耶煙寒巳无迹博山爐短喙可候煎枵腹不停塵莊子言魏王大瓠非不呺然大也注云呺然虚大貌嵇康飬生論終朝未餐則囂然思食呺囂皆言空腹山谷屢用此皆作枵字桞子厚祭裴令文云枵然其量廓尓其宇蟹眼時探穴龍文巳碎身茶録云候湯最難未熟則沬浮過熟則茶沉前世謂之蟹眼者過熟湯也龍又謂龍團茗椀有何好孟嘉傳酒有何好而卿嗜之此摘其字煑缾𬒳寵珎茶録又云缾中煑之不可辯故曰候湯難文選刘公幹詩北靣自寵珎言茶缾亦爲人所貴也石交諒如此湔祓長日新煎茶缾蘇秦曰此所謂弃仇讎而得石交者也湔袚見上送曹子方福建路運判兼簡運使張仲謀此詩及前雨詩後四五詩皆是元祐三年作案实録元祐三年九月太僕寺丞曹輔權發遣福建路轉運判官輔字子方曹侯黄湏便弓馬魏志任城王彰太祖之子大破烏桓㱕功諸將太祖喜持彰鬚曰黄鬚兒竟大竒也從軍賦詩横槊間南史垣荣祖傳荣祖曰曹操曹丕上馬横槊下馬談論此可不負飲食矣元稹作老杜墓誌云曹氏父子往往横槊賦詩阿瞞文武如兕虎魏志帝紀注云太祖一名吉利小字阿瞞詩云匪兕匪虎弈彼曠野逺孫風氣猶斑斑上林賦𬒳斑文昨解弓刀退之送鄭尚書序大帥府或道過其府府帥必戎服左握刀右属弓矢迎于郊丞太僕坐看収駒十二閑杜詩伊昔太僕張景順监牧収駒閱清峻一作考牧攻駒周礼校人天子十有二閑邦囯六閑逺方不異輦轂下司馬迁傳待罪輦轂下詔遣中使哀恫鰥康誥王曰嗚呼小子封恫鰥乃身注恫痛瘝病吾聞斯民病塩䇿見上天有雨露東南乾謝君論河秉禹貢用左傳魯秉周礼之義平當以明禹貢行河詳見上注詰難蠭起安如山老郎不作患失計論語苟患失之无所不至矣凛然冝着侍臣冠願公不落謝君後江湖以南尚少寛百城閱人如閱馬泛駕亦要知才難漢武紀五年詔曰泛駕之馬跅㢮之士亦在御之而巳泛方勇切塩車之下有絶足戦囯策云汗明見春申君曰驥之齒長矣服塩車上大行中坂迁延負轅不能上伯楽遭之下車攀而哭之解紵衣而羃之於是俯而噴仰而鳴欣伯楽之知巳也魏文帝与孫權書中囯虽多馬其知名絶足亦少敗群勿縱爲民殘卜式傳式言牧羊曰非独羊也治民亦猶是矣以時起居悪者輙去母令敗群左傳政寛則民慢猛則民殘官焙薦壁天解顔官焙謂建安北苑所造茶也瀹湯試春聊加飡楽府詩上言加飡食下言長相憶子魚通印蠔破山遁齋閑覧云莆陽通印子魚名天下盖有通印侯庿庿前有港其魚㝡佳今人必求其大可容印者謂之通印子魚荆公云長魚爼上涌三印此傳聞之誤也退之𥘉南食云蠔相粘爲山百十各自生嶺表録異云蠔即牡蛎也𥘉生海島边如拳石漸長有髙一二丈者雜爼云介虫中惟牡蛎是鹹水結成不但蕉黄茘子丹退之羅池庿碑茘子丹兮蕉葉黄雜肴𬞞兮進侯堂道􅑮使者漢郎官謂張仲謀清溪弭節問平安屈原九歌云朝騁騖兮江皐夕弭莭兮北渚天子命我参卿事晋孫楚傳爲石苞参軍𥘉至曰天子命我参卿軍事奮髯相對亦可歡回波一酔嘲栲栳本亊詩中宗朝裴談爲御史大夫妻悍妬談畏之内宴玄唱廻波詞有優人唱云廻波尓時栲栳怕婦也是大好外間只有裴談内裏无過李老韋后意色自得此句當有爲山驛官梅破小寒杜詩梅蘂臘前破又云東閣官梅動詩㒷戯贈曹子方家鳯兒柬芽入湯師子吼按北苑貢茶録一槍一旗号柬芽上品柬芽䗶茶名也維摩經云演法无畏猶師子吼此借用茘子新剥女兒頰鳯郎但喜風土楽不解生愁山疊疊目如點􅃮射清揚晋杜乂傳王羲之目之曰膚若凝脂眼如點􅃮此神仙人也詩云子之清揚正義曰眉之上下皆曰楊目之上下皆曰清㱕時定自能文章莫隨閩嶺三年語轉却中原万籟簧閩嶺一作阿囝通典楽門凡簫一名籟礼明堂位女媧之笙簧閩人謂父爲郎罷謂子爲囝唐頋况囝哀閩曰郎罷别囝吾悔生汝囝别郎罷心摧血下隔地絶天及至黄泉不得在郎罷前題老鸖万里心老杜遣㒷云蛰龍三冬卧老鶴万里心仙人駕飛騎朝㑹白雲衢文選别賦駕鶴上漢莊子乗彼白雲至于帝郷老驥不服乗曹孟徳楽府云老驥伏櫪志在万里係辝服牛乗馬引重致逺清唳徹九虚太白詩淸如淸唳蝉野田篁竹底淮南王書云越処溪谷之間篁竹之中毰毸伴雞鳬文選射雉賦敷藻翰之陪鰓時因長風起尤欲試南啚莊子而後乃今將啚南題韋偃馬韋侯常喜作群馬杜陵詩中如見畫老杜戲爲壁畫馬歌自注云韋偃畫忽開短卷六馬啚想見詩老醉騎驢杜詩騎驢三十載龍眠作馬晚更妙謂李伯時至今似斍韋偃少老杜双松啚歌天下幾人畫古松畢宏巳老韋偃少言晚歳茟畫老蒼視韋偃如少年也一洗万古凢馬空句法如此今誰工老杜丹青引湏臾九重真龍出一洗万古凢馬空子曕題狄引進雪林石屏要同作東坡集有狄詠石屏考其歲月盖元祐元年作時山谷在館中翠屏臨研滴西漢雜記廣川王發晋靈公冡唯玉蟾蜍腹空容五合水取以成書滴明䆫翫寸隂帝王丗紀禹不重徑尺之璧而爱日之寸隂呉都賦責千里於寸隂意境可千里意境如刘夢得詩腰斧上髙山意行无曰路也揺落江上林百醉歌舞罷四郊風雪深將軍貂狐暖見上士卒多苦心選詩志士多苦心和曹子方雜言前集有次韵荅曹子方雜言此萹亦次韵也而不言次韵詩意畧同不應再出又不称再和疑是先作此萹後復竄昜故两存耳正月尾垂雲如覆盂鴈作斜行書三十六陂浸煙水想對西江彭蠡湖三十六陂在揚州天長縣此據实録蔣之竒傳天長今属盰眙軍彭蠡湖在江州人言春色濃如酒楊文公談苑載鄭文宝詩杜曲花光濃似酒㶚陵春色老於人不見挿秧呉女手老杜𥙷稻畦水詩云挿秧適云巳令卿小塢頗藏春前集雜言云往時尽醉冷卿酒旧注謂冷卿如冰听之類恐未必然外集第六卷有冷庭叟詩其序云庭坚於庭叟有十八年之旧庭叟有佳侍兒因早朝而逸去前集詩云往時尽醉冷卿酒侍兒琵琶春風手又云誰憐相逢十載後其事跡及歳月皆相似疑庭叟即冷卿也張侯官居桞對門張侯謂閩漕張仲謀見上注當風横笛留三弄見上燒蠋圍棊覆九軍莊子德充苻篇舅士一人雄入於九軍尽是向來行楽事每見琵琶憶朝雲洛陽伽蓝記言河間王有婢名朝雲善吹箎諸羗叛令朝雲假爲老嫗吹箎羗皆流涕復降語曰快馬徤兒不如老婢吹箎只今不㪯蛾眉酒紅牙捍撥網蛛塵曹侯束書丞太僕見上試說相馬猶可人莊子徐无鬼見魏文侯曰甞語君吾相狗也吾相狗又若吾相馬也武侯大恱而笑徐无鬼出女啇曰先生何以說吾君使吾君恱若此呼日吾直告之吾相狗馬耳照夜白真乗黄老杜觀曹將軍畫馬啚云將軍得名三十載人間又見真乗黄曽皃先帝照夜白龍池十日飛霹靂万馬同秣隨低昂一矢射落皂鵰双杜詩皂鵰寒始急漢李廣傳是必射鵰者也北斉書斛律光傳甞從丗宗校獵見一大鳥雲表飛颺光引弓射之形如車輪旋轉而下乃大鵰也張侯猶思在戎行横山虎北開漢疆横山隷西夏虎北隷契丹御史中丞吕誨上奏云种丗衡有復横山之意而後保安軍宋迪言招横山之居执政深信其說歐陽文忠公集中有論塞垣云晋髙祖得戎主爲援乃以幽薊山後爲耶律之壽故契丹有幽陵遂絶虎北之隘冷卿智多髮蒼浪牛刀發硎思一邦並見上政成十綴舞紅粧楽記云其治民逸者其舞行綴逺两侯不如曹子方朶頥論詩蝟毛張昜頥卦觀我朶頥魏志蘇則傳則鬚髯悉張欲正論以對傳巽搯則乃止退之書張廵傳後云廵怒鬚髯輒張亀藏六用中有光祖庭事苑曰雜阿含云有亀𬒳野干所得藏六不出野干怒而捨去佛告諸比丘汝當如亀藏六自藏六根魔不得便楞嚴經云塵旣不縁根无所偶反流全一六用不行何時端能俱過我掃除北寺讀書堂北寺即前集雜言所謂酺池寺也山谷入館後寓居於此讀書堂上見莊子菊苗煮餅深注湯更碾盤龍不入香蔡君謨茶録云茶有真香而入貢者㣲以龍腦和膏欲助其香建安民間試茶皆不入香恐奪其真送張材翁赴秦簽金沙酴醾春縱横荆公詩云酴醾一架最先來夾水金沙次第㘽又有詩云故作酴醾架金沙秪謾裁似矜顔色好飛度雪前開提壷栗留催酒行歐陽公啼鳥詩云獨有花上提壷蘆勸我酤酒花前傾詩兼義陸璣䟽云黄烏黄鸝留也或謂之黄栗留公家諸父酌我醉横笛送晩延月明此時諸兒皆秀發杜詩平公今詩伯秀發吾所羡酒門乞書藤𥿄滑北門相見後十年謂北京教授時醉語十不省七八吏事衮衮談趙張廣漢敞乃是樽前緑髮郎緑髮見上風悲松丘忽三歳言其居憂也更斍緑竹能風霜前漢嚴助傳不能其水土師古曰能堪也去作將軍幕下士退之云水北山人得声名去年去作幕下士猶聞防秋屯虎兕唐陸贄傳西北边歳調河南江淮兵謂之防秋杜詩聞道君牙帳防秋近赤霄虎兕見上只今陛下思保民所要边頭不生事此語可見元祐𥘉作短長不登四万日如太白云百年三万六千日人壽短長多不及此数也南史袁峻傳抄書自課日五十𥿄𥿄数不登則不止此摘其字愚智相去三十里丗說云魏武過曹娥碑下楊脩見碑背上題作黄絹㓜婦外孫虀臼八字魏武謂脩曰解否荅曰解魏武曰卿未可言侍我思之行三十里曰吾已得之令脩别記所知脩曰黄絹色絲也於字爲絶㓜婦少女也於字爲妙外孫女子也於字爲好虀臼受辛也於字爲辝所謂絶妙好辝也魏武亦記之与脩同乃歎曰我才不及卿乃較三十里百分㪯酒更若爲古楽府隔谷歌食粮乏尽若爲活太白詩桃李今若爲當䆫發光采千户封侯倘來尓莊子繕性扁軒冕在身非性命也物之倘來寄也寄之其來不可圉其去不可止摩詰畫丹青王右轄詩句妙九州唐王維傳維字摩詰迁尚書右丞畫思入神至山水平逺雲势石色繪工以爲天機所到斈者不及也别墅在輞川賦詩爲楽物外常独往物外見上淮南子江海之上山谷之人輕天地細万物而独往人間无所求䄂手南山雨輞川桑柘秋胸中有佳処涇渭看同流詩谷風注云涇渭相入而有清濁杜詩濁涇清渭何當分和劉景文劉季孫字景文父平与西夏戦於三川口死焉景文篤斈能詩文爲两浙兵馬都监東坡知杭州薦其才除知湿州追隨城西園殘暑欲退席傳燈録云六祖慧能荅洪州法逹云若不肯信者從它退席借使此二字夜凉雨新休城譙掛蒼璧譙楼見陳勝傳譙門注佳人携手嬉調笑忘日夕楽天詩打嫌調笑易飲訝卷波遟自注云抛打曲有調笑飲酒有卷白波劉侯本將家今爲讀書客詩名二十年風雅自推激杜詩陶謝不枝梧風騷共推激牛鐸調黄鍾晋荀勗傳𥘉勗於路􅑮趙賈人牛鐸識其声及掌楽音韵未調乃曰得趙之牛鐸則諧矣遂下邵囯悉送牛鐸果得諧者薪餘合琴瑟蔡邕傳呉人燒桐以㸑邕聞火烈之声因而裁爲琴果有美音而尾猶焦故時人名曰焦尾琴食无千戸封漢貨殖傳此其人皆与千户侯等句有万人敵項羽傳斈万人敵耳兼用老杜白也詩无敵之意頗類鄴侯家連墻架書冊退之詩鄴侯家多書挿架三万軸退之送石洪序云戒行李載書冊殘編汲縣冡杜預經傳集解後序云太康元年汲縣有發其界内臼冡者大得古書皆柬編科斗文字半隷鴻都壁漢靈帝元和元年二月始置鴻都門斈法書要録載王逸少筆陣啚云蔡尚書入鴻都觀碣十旬不反嗟其出群退之石皷歌云觀經鴻都尚填咽盖熹平四年三月詔諸儒正五經文字命議郎蔡邕爲古文篆隷三体書之刻石于太斈門外使後生晩斈咸取正焉碑始立其觀覧及摹冩者車乗日千两填塞街陌退之所云盖出於此按漢書𥘉无鴻都字山谷所引用又出於韓詩也半隷謂三体書隷居其半渠成亦秦利漢溝洫志韓聞秦之好㒷事欲罷之无令東伐使水工鄭囯間說秦令鑿涇水以漑田中作而斍秦欲殺鄭囯鄭囯曰始臣爲間然渠成亦秦之利也秦以爲然卒使就渠願公多購獲意湏卜比鄰左傳匪宅是卜唯鄰是卜漢孫宝傳祭竈請比鄰劳苦相飲食身有小醜女諸葛亮擇婦得阿承醜女巳自喜翰墨要傳未見書見上遮眼差有益傳燈録僧問薬山爲什麽香經師曰只啚遮眼人生但安楽囯語云人生安楽孰知其他劵外豈吾力莊子劵内者行乎无名劵外者志乎期費注云劵分也分鹿誰斍夢列子曰鄭人有薪於野者遇駭鹿御而擊之斃之恐人見之也遽而藏諸隍中覆之以蕉俄而遗其所藏之処遂以爲夢焉順詠其事傍人有聞者用其言而取之薪者之歸不厭失鹿其夜真夢藏之之処又夢得之之主爽旦案所夢而㝷得之遂訟而争之歸之士師士師請二分之亡羊路南北列子曰楊子之鄰人亡羊既率其黨又請楊子之豎追之楊子曰嘻亡一羊何追者之衆鄰人曰多𡵨路既反問獲羊乎曰亡之矣𡵨路之中又有𡵨焉吾不知所之所以反也公今百寮底杜詩有才无命百寮底雪髮不勝幘爱公欲湔拂頋我巳頭白文選絶交論剪拂使其長鳴注云与湔祓同寄忠王提刑市骨蘄千里戦囯䇿郭隗對燕昭王曰古之人君有以千金求千里馬者三年不能得㳙人言於君曰請求之君遣之三月得千里馬馬巳死買其首五百金反以報君君大怒曰安用死馬而捐五百金㳙人對曰死馬且買之况生者乎馬今至矣於是不能期年千里之馬至者三量珠買娉婷朝野僉載喬知之有婢碧玉武承嗣借而不還知之作緑珠怨曰百家金谷重新声明珠十斛買娉婷嶺表録異梁氏女有容皃石季倫爲交阯採訪使以真珠三斛買之即緑珠也駑駘參逸駕西子泣深屏杜牧詩西子下姑蘇一舸逐鴟夷吾人材髙秀胷次列渭涇嚴能喜劇部持莭按祥刑書监于兹祥刑萑蒲稍衰息左傳昭二十年鄭子産卒子太叔爲政不忍猛而寛鄭囯多盗取人於萑苻之澤太叔悔之㒷徒兵以攻萑苻之盗尽殺之盗少止郡縣或空囹王褒得䝨臣頌故有圉空之隆讀書頭愈白見士眼終青杜詩别來頭併白相對眼終青王立之詩話云讀書頭欲白見士眼終靑身更万事巳頭白相對百年終眼青看鏡白頭知我老平生青眼爲君明故人相見尚青眼新貴如今多白頭江山万里將頭白骨肉十年終眼靑此東坡詩也用靑眼對白頭非一而工拙有差今時斤斧地虚次待發硎莊子刀刃若新發於硎漢賈誼傳上䟽云屠牛坦一朝解十二牛而芒刃不頓者所排擊剥割皆衆理解也至於髖髀之所非斤即斧夫仁義恩厚人主之芒刃也權势法制人主之斤斧也今諸侯王皆衆髖也釋斤斧之用而欲嬰以芒刃臣以爲不缺則折早晚紫㣲禁占來有使星唐中書省開元中改曰紫㣲省禁即省也蔡邕独断云門户有森故曰禁中孝元皇后父名禁當時避之故曰省中詩意謂省中人占星而知其召㱕也使星盖後漢李郃傳郃漢中南鄭人爲幕門候吏和帝分遣使者㣲服单行觀采風謡使者二人到益部投郃候舎郃問曰二君發京師時寕知朝廷遣二使耶二人驚相視問何以知之郃指星示云有二使星向益部分野故知之送吕知常赴太和丞我去太和𣣔朞矣山谷在太和三年至元豊七年移监德州德平鎮是年三月過泗州僧伽塔有發願文八年四月以校書郎召今言去太和欲朞猶在徳平也吕君𥘉得太和官邑中亦有文字楽韓詩不解文字飲惟能醉紅裙此反其意惜不同君澗谷槃見上觀山千尺夜泉落快閣六月江風寒第七卷有登快閣詩在太和作往㝷佳境不知処掃壁覔我題詩㸔退之詩曲江山水聞來乆恐不知名訪倍難願借啚經將入境亦逢佳処便開看漸入佳境見晋書頋愷之傳和荅莘老見贈往歳在辛丑嘉祐六年辛丑山谷時年十七有溪上呤春江引二詩從師海瀕州外家有行役外家謂母家見漢書拜公古䢴溝䢴溝謂楊州也唐曰䢴州左傳呉城䢴溝以通江淮取此義也兒曹𬒳鉴賞晋王戎傳鉴賞先見如此許以綜九流見上仍許㱕息女采蘋助春秋後集黄氏二室墓銘云庭坚之𥘉室曰蘭溪縣君孫氏故龍啚閣直斈士孫公斍莘老之女初庭坚年十七從舅氏李公擇斈於淮南始識孫公孫公憐其少立以蘭溪㱕之息女見漢髙祖紀采蘋見詩斯文開津梁丗說庾公見卧佛曰此子疲於津梁盛徳見虚舟莊子山木萹方舟而済於河有虚船來觸舟雖𥚹心之人不怒杜詩對君疑是泛虚舟離合畧十年文選陸士衡詩離合非有常譬彼弦与栝杜詩人生有離合豈擇貴賤端毎見仰清脩魏志陳登曰清脩疾悪有識有義吾敬趙元逹乆次不進迁楊雄賛以耆老乆次轉爲大夫此言莘老天禄勤校讐文武脩衮聀諌垣始登収实錄治平四年正月丙子秘書丞館閣校勘孫斍直集䝨院爲昌王府記室参軍熈寕元年四月癸亥太常博士直集䝨院孫斍爲右正言楊雄賛雄校書天禄閣上詩衮聀有缺唯仲山甫𥙷之身趍鄴公城鄴當作葉轉冩誤耳山谷𥘉仕爲汝州葉縣尉葉本楚地楚恵王以封沈諸梁謂之葉公逐臣旣南浮实録熈寕元年入月癸夘以太子中允直集䝨院同知諌院孫斍通判越州以言事得罪也詩意自言方之葉縣而莘老巳爲逐臣南征矣到官与莘老竄逐同是元年辨其到官歳月詩見第一卷注漢髙祖紀云南浮江漢以下娈彼丞中饋詩泉水云娈彼諸姬昜家人无攸遂在中饋家庭供百羞周礼天官内饔選百羞醬物珎物以俟饋堂堂來問寢忽爲雲霧休遺玩猶在篋汝水遶墳丘二室墓誌云孫氏年二十而卒殯於葉縣者二十二年文選潘安仁悼亡云流芳未及歇遺掛猶在壁南箕与北斗日月行置郵速於置郵見孟子相􅑮輦轂下存没可言愁元豊八年四月山谷以校書郎召時莘老爲秘监當年小兒女杜詩遥憐小兒女未解憶長安生子欲勝裘勝衣見上甌越委琴瑟江湖拱松楸文選謝靈運游方山詩云指期憇甌越越州春秋時爲越囯所都史記東甌王徐廣曰今之永寕也當是莘老在越州悼亡返葬於江南墓木拱矣故有存没可言愁之句詩云妻子好合如鼔琴瑟按秦少游集中与参寥簡云莘老壽安君竟不起子实遂丁憂逺方罹此禍故殊可傷也莘老悼亡於此可見越州今爲紹㒷府持莭轉七郡莘老自越倅徙知通州召還修起居注又以言事黜知廣德軍踰年徙湖州又徙廬州持祖母䘮服除知蘇州徙福州徐州又南京召爲太常少卿昜秘書少监哲宗即位兼侍講迁右諌議大夫故言七郡治功无全牛見上還朝蒙嗟識明月豈暗投見上抱𬒳直延閣刘歆七畧云武帝廣献書之路書積如丘山外有太常博士之藏内則延閣廣内秘室之府退之送殷侑序云持𬒳入直三省丁寕踈簾近奎鈎書断曰蒼頡仰觀奎星圎曲之势合而爲字孝經援神契云奎主文章蒼頡文字㧾而爲言晋天文志鈎陳後宫也大帝之正妃也時宣仁后御簾三生石上夢葛洪川畔牧童扣牛角而歌曰三生石上旧精魂賞月吟風不要論慙愧情人逺相訪此身雖異性長存此乃僧圎澤事見於甘澤謡東坡刪改作圎澤傳見遺文記是復疑不隠几付天籟莊子斉物篇南郭子綦隠几而坐仰天而嘘云云又曰汝聞地籟而未聞天籟閱人如海鷗列子云海上之人有好鷗鳥者毎旦之海上從鷗鳥游鷗鳥之至者以百数而不止其父曰吾聞鷗鳥從汝游取來吾玩之明日之海上鷗鳥舞而不下襟懷俯万物顔鬢与百憂長歌可當泣短生等蜉蝣古楽府王融悲歌云悲歌可以當泣逺望可以當㱕短生見第一卷注詩蜉蝣之羽毛云渠略也朝生夕死悲歡令人老文選任彦昇詩悲歡不自持万丗畧同流書畢命万丗同流軒冕來逼身軒冕見上白蘋晚滄洲履拂知道肥杜詩巾拂香餘搗薬塵階除灰死燒丹火詩意言斈道䔥散也子夏戦勝故肥見上渊明詩貧冨常交戦道勝无慼顔淨室見天游莊子外物萹室无空虚則婦姑勃豀心无天游則六鑿相攘小人楽蛙井莊子井蛙不可以語於道癡甚頋虎頭晋書頋愷之癡絶才絶畫絶或曰小字虎頭或曰虎頭將軍丗縁真嚼蠟楞嚴經於横陳時味如嚼蠟骨相謝封侯後漢班超傳相曰此万里侯相也松根养伏苓杜詩知子松根养伏苓遟暮有意來同煑歳晏望華輈考工記輈人爲輈注車轅也謝玄暉詩疊鼔送華輈老杜浣花谿啚引拾遺流落錦宫城杜詩花重錦宫城故人作尹眼爲青故人嚴武也眼青見上碧雞坊西結茅屋杜詩時出碧雞坊坊名取碧雞金馬之義百花潭水濯冠纓杜詩万里橋西宅百花潭北㽵百花潭事盖莭度使崔寕妻兾囯夫人家于浣花溪上夫人𥘉爲兒童有異僧過其家徧身瘡穢夫人奉之甚謹僧持弊衣謂曰爲我濯此夫人即就溪浣之蓮花随出潭中及貴俗呼百花潭故衣未𥙷新衣綻礼記内則衣裳綻裂綛箴請𥙷綴空蟠胷中書万卷杜詩讀書破万卷探道欲度羲皇前陶渊明与子􅌂等䟽云五六月中北䆫下卧遇凉風至自謂羲皇上人南史王僧䖍傳駸駸常欲度驊驑前摘此二字論詩未斍囯風遠干戈崢嵘一作終風霾暗㝢縣文選謝玄暉詩覇功㒷㝢縣注引說文曰㝢籕文宇字杜詩宇縣復小康杜陵韋曲无雞犬老杜贈韋七詩云時論同㱕尺五天自注云俚語云城南韋杜去天尺五老妻稚子且眼前杜詩老妻畫𥿄爲棊局稚子敲針作釣鈎弟妹飄零不相見杜詩干戈猶未定弟妹各何之又云喪乱聞吾弟飢寒傍済州人稀吾不到兵在見何由此公楽易真可人蜀志費禕傳君信可人字本出礼記園翁溪友肯卜鄰杜詩溪友得錢留白魚又園人送瓜詩共少及溪老鄰家有酒邀皆去杜詩田父要皆去鄰家問不違要邀義同得意魚鳥來相親丗說簡文入華林園頋謂左右曰㑹心処不必在逺翳然林水不斍鳥獸禽魚自來親人浣花酒船散車騎野墙无主看桃李杜詩手種桃李非无主野老墻低還是家又云桃花一簇開无主宗文守家宗武扶老杜云熊兒幸无恙驥子最憐渠又有示宗文宗武两詩宗武生日詩注云宗武小字驥子陳无巳和饒莭詠周昉畫李白真詩云君不見浣花老翁醉騎馿熊児捉轡驥子扶金華仙伯哦七字好亊不復千金摸謂此詩也金華謂山谷落日蹇馿䭾醉起願聞解鞍脫兠鍪書太甲惟甲胄起戎注甲鎧胄兠鍪也漢韓延壽傳𬒳甲鞮鞪注即兠鍪也退之詩边封脫兠鍪老儒不用千户侯老杜憶昔云老儒不用尚書郎楽府木蘭歌木蘭不用尚書郎中原未得平安報杜詩夕烽來不近毎日報平安醉裏眉攅万囯愁一作清揚之間庐阜雜記逺法師結白蓮社以書招渊明渊明造焉逺因勉以入社陶攅眉而去生銷鋪墙粉墨落平生忠義今寂寞兒呼不蘇馿失脚尤恐醒來有新作常使詩人拜畫啚煎膠續絃千古无東万朔十洲記煑鳯喙麟角合煎作膠名爲續絃膠博物志漢武時西海囯献膠五两以付外庫余半两使者佩以自隨後從帝射於甘泉帝弓絃断西使乞以所余膠續之絃遂相着使力士各引一頭終不相离因名續弦膠杜詩麟角鳯觜丗莫卞煎膠續絃竒自見杜牧之讀韓杜云杜詩韓茟愁來續似倩麻姑癢処抓天外鳯凰誰得髓无人解合續絃膠奉謝刘景文送團茶刘侯惠我大玄璧上有雌雄双鳯跡鵝溪水練落春雪蔡君謨茶録云茶羅以絶細爲佳羅底用蜀東川鵝溪畫絹之宻者投湯中揉洗以羃之詩意謂以白練爲羅茶如雪落也粟靣一杯増目力粟靣蓋茗花也刘侯惠我小玄璧自裁半璧煑瓊糜離騷經云精瓊靡以爲粻爢音糜借此以喻點茶如茶録所謂湯少茶多則粥靣聚収藏殘月惜未碾直待阿衡來說詩匡衡傳无說詩匡鼎來絳囊團團余幾璧因來送我公莫惜因來見苐一卷末注箇中渴羗飽湯餅拾遺記晋有羗人姚馥字丗芬充圉人但言渇於酒群軰呼爲渇羌湯餅見上雞蘇胡麻煑同喫本草水蘇一名雞蘇胡麻一名巨勝今油麻謝景文恵浩然所作廷珪墨廷珪贗墨出蘇家韓非子云斉伐魯索谗鼎魯人以其鴈往斉人曰鴈也魯人曰真也麝煤􅃮澤紋烏鞾桞枝瘦龍印香字十襲見上一日三摩莏劉侯爱我如桃李揮贈要我書万𥿄不意神禹治水圭禹貢禹錫玄圭忽然入我懐䄂裏吾不能手抄五車書杜詩男兒湏讀五車書亦不能冩論付官奴周越法書苑云王献之字子敬羲之第七子五六歳時斈書右軍從後掣其筆不脫歎曰此兒後當有大名遂書楽毅論一篇与之後題云書賜官奴官奴子敬小字也便當閉門斈水墨􅎈作江南驟雨啚李成有驟雨啚山谷跋郭熈山水云熈因爲蘇才翁家摹六幅李成驟雨從此筆法大進按名畫記李成营丘人奉和公擇舅氏送吕道人研長韵奉身玉壷冰立朝朱絲絃文選白頭呤云直如朱絲絃清如玉壷冰妙質寄郢匠郢人堊漫其鼻端使匠石斵之見莊子巳見上注素心乃林泉力耕不罪歳孟子王无罪歳嘉榖有􅑮年史記侫奉傳力田不如逢年善仕不如遇合校書天禄閣見楊雄傳蓺竹老風煙携提寒泉泓退之毛頴傳謂硯爲淘泓松媒厭磨研後漢蘇竟傳以磨研編削之才籍甚在䑓省六經勤傳箋毛氏注詩曰詁訓傳鄭氏曰箋公擇有詩傳十卷諌草蠧穿穴江湖渺㱕船公擇熈寕𥘉爲右正言論新法謫通判滑州元豊六年召爲太常少卿迁礼部侍郎哲宗立進吏侍春官酌典礼典礼見上日月䴡秋天昜離卦日月䴡乎天按实録元豊八年四月黄庭坚爲秘書省校書郎是年十二月礼部侍郎李常爲吏部侍郎此時未迁吏侍也少也長母家斈海頗㝷㳂楊子斈行萹百川斈海而至于海丘陵斈山而不至于山是故悪夫畫也諸公許似舅晋何无忌傳桓玄曰何无忌劉牢之之甥酷似其舅賤子豈能䝨杜詩賤子請具陳左傳云豈曰能䝨轅駒蒙推挽漢竇嬰田蚡傳云今日廷論局趣若轅下駒山谷除校書郎時孫莘老李公擇皆在朝故最先諸公収召信推挽之力也及元祐五年二月丁酉公擇卒戊戍莘老卒六年三月山谷除右史中書舎人韓川有言至六月遂居母憂自此不復振矣山谷遺文有祭莘老文云二月丁酉公擇去化厥明戊戍公亦命駕官次奉丹鈆退之秋懐詩丹鈆事點勘言作校書也左傳㐮二十三閔子馬謂公鉏曰若能孝敬冨倍季氏可也公鉏然之敬共朝夕恪居官次新詩先旧物包送比靑氊晋王献之傳青氊我家臼物言以詩先研也左傳僖末年弦髙以乗韋先牛十二犒師注云古者將献遺於人必有以先之㐮十九年享晋六卿于蒲圃贈荀偃束錦加璧先呉壽夢之鼎注古之献物必有以先之桞子厚送濬上人序云古之贈礼必以輕先重故鄭啇之犒先乗韋魯侯之贈後呉鼎繆傳黄梅鉢未印少林禅少林謂逹磨也自南天竺囯來寓止干嵩山少林寺靣璧而坐終日黙然後傳法与慧可且付袈裟慧可傳僧璨僧璨傳弘忍弘忍大師靳州黄梅人也黄梅傳盧行者慧能有道明者聞五祖宻付衣法与盧行者即率同意数十人追逐至大庾嶺盧行者擲衣鉢於盤石曰此衣表信可力争耶任君將去道明㪯之如山不動乃曰我來求法非爲衣也願行者開示祖曰不思善不思悪正恁麽時阿那个是明上坐本來靣目明當下大悟徧体汗流汲井滌敗墨謝靈運詩激澗待汲井蒼珪謝磨鐫盖以所送研比衣鉢以墨比蒼珪也玉蟾㵼明滴玉蟾蜍見上要湏筆如椽見上眷求尽耆徳元祐𥘉多用故老舅氏且進迁山龍用𥙷衮書益稷帝曰子欲觀古人之象日月星辰山龍華蟲作㑹𥙷衮見上注舟楫功済川說命云若済巨川用汝作舟楫當身任百世當字去声見上注舊斈不虚捐私持殺青簡見上緝綴報餐錢漢髙后紀列侯幸得賜餐錢奉邑屡書願无愧倘継麟趾篇詩麟之趾関雎之應也退之荅元稹書云嗣德有継將大書特書屡書不一書而巳也自當身任百世至篇末皆言身爲史官書傳百世殺青屡書皆史官事而関雎之應言宣仁后也後漢郭太傳林宗卒同志者共刻石立碑蔡邕爲其文曰吾爲碑銘多矣皆有慙徳唯郭有道无愧耳再和公擇舅氏雜言外家有金玉我躬之道術莊子天下篇道術將爲天下裂又云古之道術有在於是者有衣食我家之徳心使我蟬蛻俗斈之市後漢竇融傳論蟬蛻王侯之尊莊子繕性篇俗斈而求復其𥘉烏哺仁人之林尓雅純黒而反哺者烏也文選𥙷亡詩嗷嗷林烏受哺於子山谷有母在也飬生事親汔師古炊玉㸑桂能至今見上歳莫三十裘食口三百指寒不緝江南之落毛昭明太子作淵明集序云或貨海東之薬草或紡江南之落毛盖用列女傳楚老萊妻曰烏獸之解毛可緝而衣之其遺粒可食也庾信詩云蒙史觀秋水萊妻紡落毛飢不拾徂公之橡子莊子斉物篇狙公賦芧音義云芧音序橡子也平生荆雞化黄鵠莊子庚桑楚篇奔蜂不能化藿蠋越雞不能伏鵠卵今日江鷗作樊雉江鷗見上莊子飬生生篇澤雉十歩一啄百步一飲不鄿畜乎樊中人言无忌似牢之見上挽入書林覷文字長楊賦并包書林退之詩文字覷天巧又云不如覷文字更蒙著鞭翰墨埸選詩粲粲翰墨埸晋祖逖傳先我著鞭贈研水蒼珪玉方玉藻云大夫佩水蒼玉蓬門係馬晚色淨拉詩水花晚色净茅簷垂虹秋氣凉湔拂見上垢靣生寒光漢隷書吕規其陽東坡云吕道人沉泥硯其首有吕字非刻非書堅緻可以試金吕翁之冶与天通不但澄埿燒鈆黄𥘉疑蛮溪水中骨蛮溪見上不見鸜鵒目突兀端石有鸜鵒眼但見受墨无声松花發頗似龍尾琢紫煙歐陽公硯譜歙石出於龍尾溪端溪以北品爲上龍尾以深溪爲上不見羅縠紋𥻘𥻘唐積歙硯圗譜有羅紋石出羅紋山但見含羅不泄如寒渊往在海瀕時前篇云從師海瀕州晨夕親几杖恪居有官次恪居官次見前萹遣吏問无恙戦囯䇿斉語云斉王使使者問趙威后書未發問使者歳无恙耶民无恙耶王无恙耶抚摩宝泓置道山宝泓謂陶泓也見前篇注後漢竇章傳是时斈者称東觀爲老氏藏室道家蓬萊山遂薦章入東觀爲校書郎􅓹􅓹秀氣似舅眉宇間唐元徳秀傳見紫芝眉宇使人名利之心都尽其重可以回進躁之首其温可以解横逆之顔横逆見孟子烏虖端是万乗器漢鄒陽傳蟠木根柢輪囷離竒而爲万乗器紅絲潭石之際知才難歐陽硯譜云紅絲石硯君謨贈余云此青州石也得之唐彦猷云湏飲以水使足乃可用次韻荅王四病懶百事廢不惟書問踈新詩苦招喚是日鎻直庐文選陸士衡詩朝游游曽城夕息旋直庐潢汙深一尺左傳潢汙行潦之水大道覆行車賈誼書前車覆後車戒枚乗七發車覆能起之晴夜遥相似秋堂對望舒離騷前望舒使先軀兮注月御也題畫鵝鴈鴐鵝引頸回子虚賦弋白鵠連鴐鵝似我胸中字右軍数能來杜詩鄰家送魚鼈問我数能來不爲口腹事王立之詩話云古人有詩鴐鵝引頸回似我胸中字右軍数能來不爲口腹事或曰山谷詩非也王羲之傳性爱鹅㑹稽有孤居姥养一鵝善鳴携親臼就觀姥聞羲之將至烹以待之羲之歎惜弥日後漢書閔仲叔豈以口腹累安邑哉水囯鴻鴈秋煙沙風日䴡莫遣角弓鳴驚飛不成字送六十五弟賁南㱕風驚鴻鴈行吹落秋江上爲掃碧岩边問叔今无恙史記范雎傳湏賈曰范叔固无恙乎贈陳師道元祐元年二年陳无巳在京師寓居陳州門按实録二年四月乙巳徐州布衣陳師道充徐州州斈教授贈此詩時未得官也陳侯斈詩如斈道王立之詩話称潘邠老云陳三斈詩如斈仙時至骨自換自謂此語得意然山谷有斈詩如斈道之句陳三所得豈其苗裔耶今按張良傳乃斈道欲輕㪯斈道即斈仙也陳无巳此語乃印山谷之言此篇論詩固非王立之所及苟非陳无巳山谷亦未甞向人說此也故云十度欲言九度休万人叢中一人曉又似秋䖝噫寒草如蟋蟀俟秋吟也噫見上日晏膓鳴不俛眉盧仝月蝕詩飢膓徹死无由鳴楊雄解嘲云群卿不揖客將相不俛眉得意古人便忘老君不見向來河伯負两河觀海乃知身一蠡莊子秋水篇秋水時至百川灌河两涘渚涯之間不辨牛馬河伯欣然自喜順流而東行至于北海不見水端河北望洋向若而歎曰野語有之聞道百以爲莫巳若者我之謂也吾非至於子之門則殆矣長見笑於大方之家按東方朔傳語曰以𬋩窺天以蠡測海注云蠡瓠瓢也來奚切今作河字韵乃蚌属也疑别有所出然山谷集中又有詩云在公毎懷㱕安得借明駞畏塗失无郷酌海持一蠡則是用東方朔語也盖文選以蠡測海音力禾切旅床爭席方㱕去莊子寓言萹其往也舎者避席其反也与之爭席也秋水黏天不自多退之祭文洞庭汗漫粘天无壁秋水萹又云北海若曰天下之水莫大於海吾末甞以此自多春風吹園動化鳥霜月入户寒皎皎十度欲言九度休雲居膺示衆云知有底人終不取次十度擬發言九度却休去見祖庭事苑万人叢中一人曉貧无置錐人所憐窮到无錐不属天莊子云堯舜有天下子孫无置錐之地張良傳无立錐之地傳燈録潙山傳香嚴頌曰去年貧未是貧今年貧始是貧去年貧尚有卓錐之地今年錐也无呻吟成声可𬋩絃能与不能安足言莊子呻吟裘氏之地檀弓云弹琴而不成声詩意謂吟詠之際而自成声音可𬒳之𬋩絃不復有能否之念如東坡南行集叙夫昔之爲文者非能爲之爲工乃不能不爲之爲工也松下渊明此詩在前集巳有注畫本今藏眉山陳氏与板本小異今録於此南渡誠草草長沙済艱難夜半舟移岸今无晋衣冠松風自度曲我絃不湏弹恵逺香火社遺民文字禅雖非老翁事幽尚亦可歡客來欲開說觴至不得言十四弟㱕洪州賦莫如兄弟四章贈行惱人自作楽休休莫莫莫司空圗集休休亭記謂其才一冝休揣其分二冝休且耆而瞶三冝休因爲耐辱居士歌咄諾休休莫莫伎俩雖多性靈悪頼是長教閑処着相看將白頭止有不如昨楽天詩今旣不如昔後當不如今北來哺慈烏南㱕護尓雛束晢𥙷亡詩云嗷嗷林烏受哺於子注尓雅純黒而返哺者烏也退之詩那暇更護雞窠雛昨夜雲飛鴈相隨我不如退之詩青青水中蒲長在水中居寄語浮萍草相随我不如志欲収九族莊子列禦㓂萹澤及九族本出堯典别離乃同生同生謂親弟兄渊明送從弟詩礼服名群從恩爱若同生淳化帖王逸少書云吾有七兒一女皆同生誰能成此意惟有孔方兄言以貧而仕兄弟相别也晋魯褒傳著錢神論云云親之如兄字曰孔方大夫无恙時刻意教子弟莊子刻意篇云刻意尚行離丗異俗㱕掃松楸下洒我万里涕退之詩深思罷官去畢命依松楸題李夫人偃竹李夫人山谷之姨母公擇之妹善臨松竹木石見米芾畫史孤根偃蹇非傲丗唐杜審言傳恃才髙以傲丗勁莭癯枝万壑風閨中白髮翰墨手落筆乃与天同功唐李賀詩筆𥙷造化天无功贈呉道士呉仙十二棊一擊玄関應探人懷中事如月入清鏡刘存事始云丗本曰烏曹作六博說文曰十二棊也御覧方術部異苑曰十二棊卜出自張文成受法於黄石公行師用兵万不失一至東方朔宻以占衆事後秘不傳晋寕康中㐮城寺法味道人遇一老公着黄皮衣竹筒盛此以授法味无何失所在遂復傳於丗山谷称十二棊盖異苑所言者非博也張文成盖張良謚文成侯文選王簡栖碑云玄関幽鍵陸亀蒙詩幽憂拂長剱憔悴慙清鏡戯荅仇夢得承制仇侯能騎矍鑠馬後漢馬援傳武威將軍刘向擊武陵五溪蛮夷深入軍没援因請代時年六十二帝愍其老未許援自請曰臣尚能𬒳甲上馬帝令試之援據鞍頋眄以示可用帝笑曰矍鑠哉是翁也席上亦賦競病詩南史曹景宗傳梁武帝宴連句令沈約賦韵唯景宗不得韵意色不平詔約与韵時韵巳尽唯有競病二字景宗操茟便成曰去時兒女悲㱕來笳皷競借問行路人何如霍去病玄冬未雷蒼虵卧玉山无年天馬饑山海經崑崙亦名玉山上有玉禾其脩百㝷退之詩称騏驥云飢食玉山禾鮑明逺詩誠不及青鳥逺食玉山禾三年荷戈對揺落十倍乞弟亦可縛乞弟事見秦少游所作任師中墓表甚詳其大畧云元豊中朝廷治西南乞弟之罪至於斬將帥絀监司两蜀騷然四年而後定实部使者爲之裔夷何足責也何如万騎出河西捕取弄兵黄口兒西夏自䧟永楽城後爲边患及秉常卒子乾順立元祐二年遣使冊乾順夏人以地界爲詞不入謝且犯涇原鎮戎軍又侵德靖砦又犯塞門砦黄口兒謂乾順也家語孔子見羅雀者所得皆黄口小雀弄兵潢池見龔遂傳和任夫人悟道夫亡子㓜如月魄書武成旁死魄䟽云魄形也月之輪郭無光之処朔後明生而魄死望後明死而魄生退之詩維時月魄死冬日朝在房摧尽蛾眉作詩客二十餘年刮地寒見兒成人乃禅寂杜詩予亦師粲可身猶縛禅寂万事新新不留故瘦藤六尺持門户玉䑓新詠健婦持門戸勝一大丈夫煩惱林中即是禅更向何門覔重悟山谷外集詩註卷之八
