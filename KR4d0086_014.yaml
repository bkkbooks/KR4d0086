front:
  text: 山谷外集詩注卷第十四
  hash: sha256:893d236083326de6c9ff067ac84414d5bc6bed97322112da234b73e60ffc6f8f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_014-1a}
body:
  text: 次韻元翁從王夔玉借書為吏三年弄文墨文選劉公幹詩職事相填委文墨紛消散注云漢書功臣皆曰蕭何文墨顧居臣上草萊心徑失耕鋤孟子今茅塞子之心矣常思天下無雙祖得讀人間未見書後漢黃香傳京師號曰天下無雙江夏黃童肅宗詔香詣東觀讀書所未嘗見者公子藏山真冨有言其藏書如老氏藏室道家蓬萊山也繫辭冨有之謂大業小兒捫腹正空虛退之詩詩書勤乃有不勤腹空虛何時管鑰入吾手為理籖題撲蠧魚杜詩書籖映隙曛蠧魚見上奉和孫奉議謝送菜春𬞞照映庾郎貧南史庾杲之傳庾郎貧食鮭遣騎持籠佐茹葷杜詩遣騎問所須莊子人間丗篇不飲酒不茹葷却得齋厨厭滋味白鵝存掌鱉留裙江南别録云僧謙明好詩酒烈祖問其所求曰惟願鵝生四箇腿鱉生兩重裙陶嶽五代史輔亦云學元翁作女兒哺口詩五老峰見上前萬頃江女兒哺口鴛鴦雙女兒浦隸江州德化驚飛何處沙上宿夜雨釣船燈照窗去歲和元翁重到雙澗寺觀余兄弟題詩之篇揔忘收録病中記憶成此詩素琴聲在時能聽陶潛傳蓄素琴一張白鳥盟寒久末尋左傳盟可尋也不可寒也眼見野僧垂雪髮飬親元不顧朱金史記聶政傳嚴仲子具酒聶政母前奉黃金百鎰為母壽聶政固謝曰家貧飬親親供飬備不敢當仲子之賜列女傳秋胡子之妻曰妾採桑奉二親不願人之金法言曰紆朱懷金之樂開泉浸稻雙澗水煨笋充盤春竹林安得一門里吾欲老君聽莊舄病時吟史記陳軫傳軫至秦惠王曰子去寡人之楚亦思寡人否對曰王聞夫越人莊舄乎莊舄仕楚執圭有頃而病楚王曰舄故越之鄙人也今仕楚執圭貴冨矣亦思越不對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人往聽之猶越聲也今臣雖棄逐之楚豈能無秦聲哉次韻知命入青原山口坑路羊腸繞魏武苦寒行羊腸坂詰曲車輪為之摧注太行羊腸在太原稻田棋局方林間塔餘寸風外竹斜行吠客犬反走驚人鳥坌忙山形與祖印岑絶兩相當傳燈録中華𥘉祖逹磨傳慧可曰諸佛法印可得聞乎又云內傳法印以契證心次韻吉老知命同遊靑原洗鉢尋思去傳燈録行思禪師傳師得法於曹溪住吉州青原山靜居寺六祖將示滅有沙瀰希遷問曰和尚百年後希遷當依附何人祖曰尋思去及祖順丗遷每於靜處端坐第一坐曰汝有師兄行思和尚今住吉州汝因緣在彼師言甚直汝自迷耳遷便禮辭去直詣靜居論詩匡鼎來見上鴉窺錫處井如羅浮山卓錫泉也梁景泰禪師居此山病無水師卓錫於地泉涌數尺自是得井唐子西作記又如舒州三祖山飛錫泉寶公自金陵飛錫而至以相山谷寺基泉為之湧出見同安志魚泳釣時臺垂足收親子師既付法希遷垂一足遷禮拜尋辭往南嶽即南嶽石頭和尚也存身亘劫灰漢武帝穿昆明池悉是灰有外國胡僧曰此天地劫灰之餘見髙僧傳僧雛手金鑰一為道人開杜詩不寢聽金鑰至人來有會吾道本無家閲丗魚行水遺書鳥印沙退之聮句云沙篆印回平言鳥迹印沙如篆文也齋盂香佛飯法席雨天花並見維摩經時有清談勝還同歎永嘉晉書不意永嘉之末復聞正始之音次韻十九叔父臺源聞道桃源境鋤荒三徑通杜詩葵荒欲自鋤三徑見上人曽夢蟻穴見上鶴亦怕雞籠用晉嵇紹鶴處雞群意萬壑秋聲别千江月體同須知有一路不在白雲中心珠道埸儀千江同一月萬户盡皆春以言賔頭尊者應四天下供次韻曽都豐喜雨水旱國代有左傳僖十三天災流行國家代有人神理本通遍雩祠小大春秋書大雩敢指霓雌雄南史王筠傳沈約製郊居賦示筠草筠讀雌霓五的反連蜷約撫掌曰僕恐人呼為霓五兮反地厭焚惔極詩如惔如焚天回顧盻中蛟龍起乖卧星斗䀲澄空雲挾雷聲走西京雜記淮南王著鴻烈自言字中皆挾風霜江翻電腳紅寵光歸稼穡老杜江雨詩寵光蕙葉與多碧點注桃花舒小紅滴瀝在梧桐詖訟猶相及時霖恐未豐潔齋蘄得歲同病託諸公和李才甫先輩快閣五首山寒江冷丹楓落唐文蓻傳崔信詩云楓落吳江冷爭渡行人簇晚沙庾信詩河橋爭渡喧孟浩然詩漁梁渡頭爭渡喧菰葉蘋花飛白鳥一張紅錦夕陽斜杜牧之題韋家亭子云蔫紅半落平地晚曲渚飄成錦一張赤欄終日倚西風山色挼藍小雨中雪浪齋日記荆公小詞云揉藍一水縈花草寂寞小橋千嶂抱人不到柴門自有淸風掃唐人詩但言水如藍挼藍字始於荆公將老鬢毛秋著木相思親舊水連空長江淡淡吞天去甲子隨波日日流萬事轉頭同墮甑郭林宗傳後孟敏荷甑墯地不顧而去一身隨丗作虛舟莊子山木篇方舟而濟於河有虛船來觸舟雖有𥚹心之人不怒人能虛巳以遊丗其孰能害之雲橫章貢二水雨翻盆杜詩白帝城下雨翻盆寺下深江水到門落日荷鉏人著本漢食貨志理民之道地著為本注謂安土也音直略反西風滿地葉歸根鮑明逺詩别葉早辝風注引翼氏風角云木落歸本水流向東西風嘉氣浮馬祖山也東北祥風繞靜居靜居寺即青原山山邑豐年人少訟身來訪道得齋魚幾道復覔檳榔蠻煙雨裏紅千樹逐水排痰肘後方見上莫道忍飢窮縣令陸龜蒙𣏌菊賦序云我幾年來忍飢誦經豈不知屠沽兒有酒肉耶煩君一斛寄檳榔用劉穆之事巳見上注發贑上寄余洪範二川來集南康郡虔州治贑縣唐武德曰虔州天寶曰南康郡二川謂章水貢水皆北流合于贑縣流入大江紹興改作贑州氣味相似相和流木落山明數歸鴈欎孤欄楯繞深秋􅓹孤臺在虔州虔吉鄰郡當是解大和往德平也胸中淳于吞一石史記淳于髠一石亦醉塵下庖丁解十牛莊子音義庖人丁其名也管子有屠牛坦一朝解九牛塵下疑是筆下它日欲言人不解西風散髮掉扁舟嵇叔夜詩散髮巗岫同韻和元明兄知命弟九日相憶革囊南渡傳詩句摹寫相思意象真九日黃花傾壽酒幾回青眼望歸塵蚤為學問文章誤杜詩紈褲不餓死儒冠多誤身晚作東西南北人記孔子曰丘也東西南北之人也此亦是往德平時作安得田園可溫飽長拋簪紱褁頭巾後漢皇甫規傳退不得溫飽以全命萬里千山厭問津芭蕉林裏自觀身維摩經是身如芭蕉中無有又云又復觀身身不離病鄰田雞黍留熊也風雨閞河走阿秦熊也阿秦當是山谷兄弟小字山谷兄弟五人大臨庭堅叔獻叔逹仲熊仲熊即墓志所謂非熊代書一篇所謂阿熊而今詩所謂熊也阿秦蓋可類推鴻鴈池邊照雙影春令原上憶三人兄弟中兩人相聚而三人别去也年年獻壽須歡喜白髮黃花映角巾晉羊祜傳與從弟琇書曰既定邊事當角巾東路歸故里題吉州承天院清涼軒菩薩清涼月遊於畢竟空維磨經法無戲論故楞嚴經若離明暗見畢竟空我觀諸境盡心與古人同僧髮侵眉白桃花映竹紅倘來尋祖意展手似家風祖師西來意見上題槐安閣并序東禪僧進文結小閣於寢室東飬生之具取諸左右而足彼雖聞中天之臺百常之觀蓋無慕嫪之心豫為題曰槐安閣而賦詩夫據功名之會以嫭姱一丗其與蟻丘亦有卞乎雖然陋蟻丘而仰泰山之崇崛猶未離乎俗觀也淳于棼夢大槐安國詳巳見上曲閣深房古屋頭病僧枯几過春秋垣衣本草垣衣一名昔邪又云在墻垣謂之垣衣在水中石上謂之陟釐蛛網蒙窗牖萬象縱橫不繫留賈誼服鳥賦泛乎若不係之舟白蟻戰酣千里血檀羅國來伐王命棼征之敗績亦槐安國事也晉楚戰於鄢陵戰酣之時子反渴而求飲見淮南子黃粱炊熟百年休炊黃粱未熟見上功成事遂人間丗人間丗莊子篇名欲夢槐安向此遊老子功成名遂天之道大和奉呈吉老縣丞山擁鳩民縣左隱八年君釋三國之圗以鳩其民注鳩集也江橫決事廳土風尊健訟吏道要繁刑觟􅚞今無種觟胡瓦切􅚞除倚切此兩姓今無人矣按後漢儒林窪丹傳時中山觟陽鴻亦以孟氏易教授有名又按姓氏書裭姓古有善聽者􅚞俞汲黯傳公以此無種矣蒲盧教未形事詳見中庸里多齊􅗎氏元注云􅗎氏漢書音間面今濟南田家有此姓音諌材謝宋庖丁庖丁莊子不言宋當考令尹三年課斯人萬物靈書惟人萬物之靈吾方師豈弟僚友助丹青丹青謂緣飾吏事也立春韭苗香煮餅崔實四民月令曰立秋無食煮餅野老不知春看鏡道如咫倚樓梅照人退之春雪間早梅詩寒光助照人趙嘏詩長笛一聲人倚樓子範徼巡諸鄉捕逐群盜幾盡輒作長句勞行李白髮尉曹能挽弓著鞭跨馬欲生風乃兄本是文章伯杜詩每語見許文章伯此老真成矍鑠翁馬援傳矍鑠哉是翁也枹鼓諸村宵警報漢張敞傳云枹鼓稀鳴市無偷盜牛羊幾處暮牢空得公萬户開門卧萬夫爭處首先處胸中元有不病者傳燈録德山宣鑒禪師傳師因疾僧問還有不病者無師曰有如何是不病者師曰阿邪阿邪記得陶潛歸去來山谷志畢守之墓云吉州大守以元豐五年冬沒於理所其銘云公疾卧牖上章請老戲贈南安倅桞朝散桞侯風味晚相見衣𬒮頗薰荀令香見此卷酴醾詩注桃李能言妙歌舞借使李廣傳桃李不言樽前一曲斷人腸劉禹錫於李司空坐上賦詩曰髮􆁖梳頭宫樣粧春風一曲杜韋娘司空見慣渾間事斷盡江南刺史腸因贈以妓洞庭歸客有佳句玉臺新詠有梁栁惲江南曲云洞庭有歸客瀟湘逢故人亦見文選庾嶺梅花如小棠庾嶺見上詩蔽芾甘棠箋云召伯舍小棠之下乘興髙帆少相待淮湖秋月要傳觴文選南都賦儇才齊敏授爵傳觴睡起柿葉鋪庭紅顆秋董爐沉水度衣篝説文曰篝落也可董衣松風夢與故人遇同駕飛鴻跨九州文選郭璞遊仙詩赤松臨上仙駕鴻乘紫煙次韻君庸寓慈雲寺待韶惠錢不至主簿看梅落雪中閨人應賦首飛蓬詩伯兮自伯之東首如飛蓬問安兒女音書少破笑壷觴夢寐同歸去來詞引壷觴以自酌文選劉越石詩序云破涕為笑排終身之積憤求數刻之暫歡馬祖峰前靑未了鬱孤臺下水如空馬祖鬱孤見上杜詩齊魯靑未了江山信美思歸去文選登樓賦雖信美非吾土兮曽何足以少留聽我勞歌亦欲東文選謝叔源詩誤彼蟋蟀唱信此勞者歌注引韓詩曰朋友之道缺勞者歌其事漢書髙祖曰吾亦欲東耳次韻奉答存道主簿主簿朝衣如敗荷髙懷千尺上松蘿小雅頍辨蔦與女蘿施于松柏毛云蔦寄生也女蘿兔絲松蘿也旅人爭席方歸去莊子寓言篇其往也舍者避席其返也舍者與之爭席秋水黏天不自多莊子秋水篇吾未嘗以此自多退之祭文洞庭汗漫粘天無壁學到會時忘粲可僧粲惠可傳燈録皆有傳杜詩余亦師粲可身猶縛禪寂詩留别後見羊何文選謝靈運詩序云登臨海嶠𥘉發強中作與惠連可見羊何共和之大白詩别後遙傳滄海作可見羊何共和之向來四海習鑿齒今日期君不啻過四海習鑿齒彌天釋道安見晉書習鑿齒傳此用主簿事題神移仁壽塔十二觀音無正面僧伽至臨淮嘗卧賀跋氏家現十二面觀音形其家欣慶遂捨宅焉即今寺也見宋僧傳問十二面觀音阿那面正見傳燈録義玄禪師傳誰令塔户向東開定知四𣑽神通力阿含經曰丗尊説四𣑽福若能輔理故寺是謂二𣑽之福見𥘉學記曽借六丁風雨推退之詩天官勑六丁雷電下取將蠅説冰霜如夢寐莊子秋水篇井蛙不可以語於海夏蟲不可以語於冰鷃聞鍾鼓亦驚猜逹生篇譬之若載鼷以車馬樂鷃以鍾鼓也彼又烏能無驚乎哉從今不信維磨詰斷取三千丗界來維摩經斷取三千大千丗界如陶家輪著右掌中擲過恆沙丗界之外題海首座壁騎虎度諸嶺天台豐于禪師居天台山國清寺嘗誦唱道歌乘虎入松門衆僧驚畏見傳燈録入鷗同一波王立之詩話云方時敏言荆公云鷗鳥不驚之類如何作語則好故山谷有云入鷗同一波香寒明鼻觀楞嚴經云丗尊教我觀鼻端白日永稱頭陀文選頭陀寺碑李善曰天笁言頭陀此言斗藪蓋斗藪煩惱也題仁上座畫松偃蹇松枝隔煙雨知儂定是歲寒材百年根莭要老硬傳燈録岩頭云德山老人一條脊骨硬如鐡將恐崩崖倒石來大白詩崩崖轉石萬壑雷次韻漢公招七兄白髮霏霏雪點斑朱櫻匆忽鳥銜殘傳燈録溈山與仰山遊行次烏銜一紅柿落前祐將與仰山仰山接得以水洗了却與祐云云介甫詩云鳥殘紅柿昔曽分公庭休吏進湯餅漢薛宣傳日至休吏語燕無人窺井欄詩句多傳知有暇道人相見不應難老郎親屈延處士風味依稀如姓桓元注云桓沖禮處士劉之鄭粲甚厚按晉桓沖傳云命處士南陽劉之為長史驎之不屈親往迎之禮之甚厚又辟處士長沙鄭粲為别駕備禮盡恭粲感其好賢乃起應命送髙士敦赴成都鈐轄二首東坡集中亦有此詩乃元祐三年也自此以前皆大和作此後元祐間作玉鈐金印臨參井淮南子云通許由之論金縢豹韜廢矣注云金藤豹韜周公太公隂謀圗王之書也國朝置功轄曰鈐曰滕曰韜皆取祕密之義太白蜀道難云捫參歷井仰歇息控蜀通秦四十州日下書來望鴻鴈江頭花發醉貔貅禮記曲禮前有鷙獸則載貔貅注亦鷙獸也巴滇有馬駒空老漢有巴郡治江州今重慶府所治巴縣也後漢末分而為三巴西郡治閬中令閬州所治縣也巴東郡治魚復令夔州所治奉郎也與巴郡為三巴蜀馬皆取之西南夷史記西南夷傳云西南夷君長以什數夜郎為大其西靡莫之屬以什數滇為大如淳曰滇音顛顛馬出其國駒空老言不用兵也林箐無人葉自秋能為將軍歌此曲鳴機割錦與纒頭開元中冨人王元寶會賔客明日或問曰昨來有何髙談寶曰但費錦纒頭耳杜詩樽前還有錦纏頭捧日髙宣事東京四姓候後漢紀顯宗九年為四姓小侯開立學校置五經師注外戚樊氏郭氏隂氏馬氏也髙蓋宣仁后家軍中聞爼豆語爼豆之事則常聞之廟勝脫兜鍪退之詩邊封脫兜鍪燒燭海棠夜香衣藥市秋君平識行李嚴君平見漢書河漢接天流次韻子瞻元夕扈從三首此詩見秦少遊集非山谷語次韻子瞻送穆父二絶錢協字穆父元社𥘉知開封府遷給事中復以龍圗閣待制知開封以係囚别所遷就圄空出知越州越今為紹興府渺然今日望人材當今人物渺然見上每見紫芝眉宇開唐元德秀字紫芝房琯每見歎曰見紫芝眉宇使人名利之心都盡又觸惠文江海去快帆誰與挽令回漢張敞傳弟武拜為梁相曰梁國大都吏民凋敝當以柱後惠又彈治之秦時獄法吏柱後惠文武意欲以刑法治梁謫官猶得住蓬萊越州有蓬萊館抱牘人稀書卷開牘謂案牘退之藍田丞廳記云文書行吏抱成案詣丞張敞憮眉應急召此用尹京事也張敞治京兆為婦畫眉長安中傳張京兆眉憮有司以奏上問之云云董宣強項莫低回強項令見墨竹賦和子瞻內翰題公擇舅中丞山房幽人八座復中臺東坡遷端明翰林侍讀二學士守禮部尚書時公擇為御史中丞想見書堂山杏開四十餘年僧屈指時因秋鴈寄聲來東坡集有李氏山房藏書記其略云余友李公擇少時讀書於廬山五老峯下白石庵之僧舍公擇既去而山中之人思之指其所居為李氏山房藏書其後元豐七年東坡自黃移汝因往筠自筠遊廬山書李公擇白石山房云偶尋流水上崔嵬五老蒼顔一笑開若見謫仙煩寄語匡山頭白早歸來山谷和章乃元祐七年作蓋東坡是年自楊州召為兵部尚書也屈指字見漢陳湯傳詘指計其日曰不出五日以潞公所惠揀芽送公擇次舊韻前集有謝公擇分賜茶三絶句今次前韻慶雲十六升龍樣前漢志若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲國老元年密賜來左傳國老皆賀子文北苑貢茶録云慶曆中蔡君謨造小鳯團自小團出而龍鳯遂為次元豐有旨造密雲龍其品又加於小團之上披拂龍紋射牛斗外家英鑒似張雷東坡是年自楊州召為兵部尚書也屈指字見漢陳湯傳詘指計其日曰不出五日以潞公所惠揀芽送公擇次舊韻前集有謝公擇分賜茶三絶句今次前韻慶雲十六升龍樣前漢志若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲國老元年密賜來左傳國老皆賀子文北苑貢茶録云慶曆中蔡君謨造小鳯團自小團出而龍鳯遂為次元豐有旨造密雲龍其品又加於小團之上披拂龍紋射牛斗外家英鑒似張雷謂張華雷煥吏部蘇尚書右選胡侍郎皆和鄙句次韻道謝不待烹茶喚睡回天官兩宰和詩來清如接筧以竹通水通春溜快似揮刀斫怒雷天官吏部也冡宰以喻尚書其屬有太宰卿一人比侍郎奉同公擇作揀芽詠貢茶録云茶芽最上曰小芽如雀舌鷹爪次曰中芽乃一芽帶一葉者號一槍一旗號揀芽最為竒特赤囊歲上雙龍壁元注云囊貢小團亦單疊唯揀芽雙疊曽見前朝盛事來想得天香隨御所延春閣道轉輕雷元注云元豐未作延春閣今歲官茶極妙而難為賞音者戲作兩詩用前韻雞蘇狗虱難同味煎茶賦云或濟以􅐭勾賊破家滑竅走水又况雞蘇之與胡麻雞蘇俗呼紫蘇胡麻一名狗虱皆見本草懷取君恩歸去來青箬湖邊尋顧陸箬溪在湖州顧陸謂顧野王陸羽按寰宇記湖州長興縣箬溪在縣南一名顧渚顧野王輿地志云夾溪悉生箭箬南岸曰上箬北岸曰下箬村人取下箬水釀酒醇美俗稱箬下酒陸鴻漸名羽有顧渚山記二篇盛言顧渚茶之美為江左第一張彥逺名畫記有論顧陸張吳用筆一篇謂顧愷之陸探微與此詩不相涉山谷特借使顧陸二字顧野王有傳白蓮社裏覔宗雷白蓮社在江州廬山晉慧逺法師故事也同社十八人宗炳字少文雷次宗字仲倫與焉乳花翻碗正眉開時苦渴羌衝熱來拾遺記晉有羌人姚馥但言渴於酒群輩呼為渴羌𥘉學記程曉伏日詩云今丗褦襶子觸熱到人家搖扇髀中疼流汗正滂沱褦襶謂不曉事渴羌亦此流也知味者誰心巳許維摩雖默語如雷時維摩詰默然無言文殊師利嘆曰善哉善哉乃至無有文字語言是真入不二法門公擇用前韻嘲戲雙井萬仞峯前雙井塢山谷所居雙井隸洪之分寧婆娑曽占早春來如今摸索蒼龍壁沉井銅瓶漫學雷老杜銅瓶詩亂後碧井廢時清瑶泉深銅瓶未失水百丈有哀音又戲雙井解嘲山芽落磑風回雪曽為尚書破睡來勿以姬薑棄鷦􅷑逢時瓦釡亦鳴雷左雖有姬薑無棄鷦􅷑文選屈平卜居云黃鍾毀棄瓦釜雷鳴奉同六舅尚書詠茶碾煎烹三首要及新香碾一杯不應傳寶到雲來見上碎身粉骨方餘味莫厭聲喧萬壑雷萬壑雷見上碎身粉骨如老杜詠丁香云晚墮蘭麝中休懷粉身念也風爐小鼎不須催魚眼長隨蟹眼來深注寒泉收第一亦防􅑎腹爆乾雷蟹眼􅑎腹並見上乳粥瓊糜霧腳回色香味觸映根來六根眼耳鼻舌身意即色香聲味觸法見楞嚴經茶録有色香味瓊糜見上睡魔有耳不及掩唐李靖傳兵機事以速為神震霆不及掩耳直拂繩宋過疾雷王立之以小詩送並蒂牲丹戲答分送香紅惜折殘春隂醉起薄羅寒不如王謝堂前燕曽見新粧並倚欄劉夢得詩舊時王謝堂前燕飛入尋常百姓家露稀風晚别春叢柫掠殘粧可意紅多病廢詩仍止酒可憐雖在與誰同玉臺新詠有歌詞云東飛百勞西飛燕其末云空留可憐與誰同題子瞻書詩後詩就金聲玉振書成蠆尾銀鈎見上巳作青雲直上何時散髮滄州北山移文云干青雲而直上散髮見上注戲贈髙述江湖心計不淺翰墨風流有餘相期乃千載事要須讀五車書見上與李公擇道中見兩客布衣班荆而坐對戲奕秋因作一絶兩客班荆覆局圗左襄二十六年楚伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故魏志王粲傳觀人圍棊局壞粲覆之不誤一道看人車馬溷泥塗文昌八座鄰樞極唐劉洎疏云八座比於文昌六曹尚書及令僕為八座見晉聀官志後漢梁統傳論宰相運動樞極天上歸來愧不如題歸去來圗二首曰日言歸真得歸迎門兒女笑牽衣太白詩兒女歌笑牽人衣宅邊猶是舊時桞漫向丗人言昨非詞云覺今是而昨非人間處處猶崔子語猶吾大夫崔子豈忍更令三徑荒誰與老翁同避丗桃花源裏捕魚郎桃花源見上注題陽閞圗二首斷腸聲裏無形影畫出無聲亦斷腸想得陽閞更西路北風低草見牛羊髙歡玉壁之會使斛律金作勑勒歌其詞曰山蒼蒼天茫茫風吹草低見牛羊歡自和之哀感流涕人事好乖當語離淵明答龐參軍詩序云人事好參便當語離龍眠貌出斷腸時李伯時畫也杜詩貌得山僧及童子渭城桞色閞何事自是離人作許悲渭城桞色見上漢書陽閞去長安二千五百里唐人送客西出都門三十里曰渭城今有渭城館劉夢得詩舊人惟有何戡在更與殷勤唱渭城次韻答少章聞雁聽雞二首平生絶少分甘處司馬遷傳與士大夫絶甘分少師古曰自絶旨甘而與人共其多少身要從師萬事忘霜鴈呌群傾半枕退之詩一一呌群猿夢回兄弟綵衣行禮王制父之齒隨行兄之齒雁行綵衣用老萊子事朝士聞雞常半途朱門擁𬒳不閞渠秦郎五起聽三唱殘燭貪傳未見書見上題王居士所藏王友畫桃杏花二首山谷元符三年五月復宣德郎自戎泝江省其姑於青神尉廨十一月復還戎過加州至樂山王朴子厚題桃杏花草書超逸今藏於洪雅楊氏戎今為敘州堎雲一笑見桃花三十年來始到家從此春風春雨後亂隨流水到天涯傳燈録福州靈雲志勤禪師𥘉在溈山因桃花悟道有偈曰三十年來尋剱客幾逢落葉幾抽枝自從一見桃花後直至如今更不疑凌雲見桃萬事無我見杏花心亦如從此華山圗籍上更添潘浪倒騎驢潘閬詩髙愛三峰插大虛回頭仰望倒騎驢傍人大笑從他笑終擬移家向此居戲答仇夢得承制二首結髮從征聽鼓􅎏李廣傳謂其麾下曰廣結髮與胸奴大小七十餘戰禮君子聽鼓􅎏之聲則思將帥未曽一展胸中竒退之代張籍書開口一吐胸中之竒彎弓如月落霜雁誰道將軍能賦詩橫槊見上不為萬騎先傳杯把筆過年年杜牧之詩自説江湖不歸去阻風中酒過年年懷中黃石間三略兵書有黃石公三略三卷道上青旗謾百篇青旗謂置筒上加旗也元白號詩筒題李十八知常軒身心如一是知常老子知常曰明事不驚人味久長史記淳于髠傳齊威王喜隱髠説之以隱曰國中有大鳥三年不飛不鳴王知此鳥何也王曰此鳥不鳴則巳一鳴驚人蓋丗功名棊一局幽間鼓吹云令孤相擬李逺為杭州宣宗曰李逺云長日惟能一局棊豈可臨郡藏山文字紙千張司馬遷自序云整齊百家雜語藏之名山副在京師坡詩云功名半幅紙兒女浪苦辛無心海燕窺金屋漢武故事金屋貯阿嬌有意江鷗傍草堂驚破南柯少時夢見上新晴鼓角報斜陽次韻奉答吉鄰機冝黠虜乘秋屢合圍禮記王制天子不合圍諸侯不掩羣上書公獨請偏師庭中子弟芝蘭秀見上塞上威名草木知唐張萬福傳德宗以萬福為濠州刺史召謂曰先帝改爾名正朕謂江淮草木亦知爾威名若從所改恐賊不知是鄉也復賜舊名千里折衝深寄此晏子春秋范昭謂晉平公曰齊未可并吾欲試其君晏子知之吾欲犯其樂大師知之於是輟伐齊謀孔子聞之曰不出樽爼之間而折衝千里之外晏子之謂也三衙虛席看除誰三衙謂殿前都指揮使侍衛馬軍都指揮使侍衛步軍都指揮使與君相見清班在仁祖重來築舊基送曹黔南口號按實録紹聖元年十二月甲午黃庭堅謫涪州別駕黔州安置二年四月二十三日到黔州見謝裴寓開元寺寺有摩圍閣黔守曹譜字伯逹摩圍山色醉今朝試問歸程指斗杓荔子隂成棠棣愛詩甘棠美召伯也蔽芾甘棠勿翦勿伐箋云思其人敬其樹今以甘棠為棠棣竹枝歌是去思謡山谷嘗云竹枝歌本出三巴其流在湖湘耳漢何武傳所居無赫赫名去後嘗見思陽關一曲悲紅袖巫峽千波怨畫橈歸去天心承雨露雙魚來報舊賔僚題劉氏所藏展子虔感應觀音二首張彥逺歷代名畫記云展子虔歷北齊周隋為朝散大夫帳內都督觸物留情悉皆絶妙尤善臺閣人馬人間猶有展生筆佛事蒼茫煙景寒退之詩蕭蕭風景寒常恐花飛蝴蝶散明窗一日百回看恐歲久化為蝴蝶也杜陽雜編穆宗殿前千葉牡丹始開宫中夜有黃白蛺蝶萬數飛集花間輝光照耀逹旦乃去上令張密網於空中遂得數百皆金玉也後開寶厨覩金屑玉屑錢內將有化為蝶者乃覺馬杜詩自今以後知人意一日須看一百回郡盜挽弓江簸船杜詩浪簸船應拆丹青當在普通前普通梁武帝年號時未有侯景之亂也誰能與作赤挽板當是護衛之物赤挽恐是赤欄第三卷有詩云橫溪赤欄橋晏元獻類要云台州有赤欄橋在州城臨江老筆猶堪壽百年以虎臂杖送李任道二首走送書堂倚絳紗後漢馬融傳常坐髙堂施絳紗帳前授生徒後列女樂瘦藤七尺走驚蛇晴沙每要交頭拄尋遍漁翁野老家未衰筋力先扶杖曲禮云老者不以筋力為禮漢賈山傳雖老羸癃疾扶杖而往聽之能救衰年十二三漢髙祖紀士卒墯指者十二三注謂十人之中二三墯指今以言十分救得二三分也八百老彭嗟杖晚可憐矍鑠馬征南神仙傳彭祖姓籛名鏗至殷末已七百六十七歲而不襄論語竊比於我老彭矍鑠見後漢馬援傳謝周文之送貓兒飬得狸奴立戰功將軍細柳有家風用周亞夫細柳營事一簞未厭魚餐薄四壁能令鼠穴空戲呈田子平元符三年十二月山谷發戎州明年改建中靖國四月至荆南乞知太平州留荆南待命遂踰冬有戲簡田子平詩此詩蓋同時作茸割即非茸割肥羊自是肥羊老杜詩云禮遇宰肥羊愁當置青醥老夫才堪一筯諸生贊詠甘香却歎佳人纎手晚來應廢紅粧此言田家庖婢或其內子如老杜所云喚婦出房親自撰也荆州衣冠千户厚意獨有田郎三輔決録云田鳯為尚書郎容儀端正帝目送之題柱云堂堂乎張京兆田郎今以子平比田鳯太平州作二首崇寧元年春自荆南歸洪州分寧因往袁州萍鄉省其兄元明還至江州與其家相會六月赴太平州九日而罷歐靚腰艾栁一渦小梅催拍大梅歌此皆太平州官妓舞餘片片梨花雨言其泣下也樂天詩梨花一枝春帶雨奈此當途風月何太平治當途縣千古人心指下傳楊姝煙月過年年過年年見上不知心向誰邊􅋀彈盡松風欲斷絃吳氏漫録云豫章先生守當塗日會上作木蘭花贈故人庾元規曰庾郎三韭常安樂使有萬錢無處著徐熙小鴨水邊花明月清風都占却朱顔老盡心如昨萬事休事休莫莫樽前健在不饒人歐舞梅歌君更酌自注云歐梅當時二妓也山谷評書云按欲入木彈欲斷絃此用筆法也長沙留别崇寧二年謫冝州三年二月過洞庭歷潭衡永桂夏至貶所長沙即潭州也折腳鐺中同淡粥傳燈録汾州無業禪師曰古得道人得意之後茅茨石室向折腳鐺中煮飯喫過三十二十年曲腰桑下把離杯大白集中有魯城北郭曲腰桑下送張子還嵩陽一首小鴨水邊花明月清風都占却朱顔老盡心如昨萬事休事休莫莫樽前健在不饒人歐舞梅歌君更酌自注云歐梅當時二妓也山谷評書云按欲入木彈欲斷絃此用筆法也長沙留别崇寧二年謫冝州三年二月過洞庭歷潭衡永桂夏至貶所長沙即潭州也折腳鐺中同淡粥傳燈録汾州無業禪師曰古得道人得意之後茅茨石室向折腳鐺中煮飯喫過三十二十年曲腰桑下把離杯大白集中有魯城北郭曲腰桑下送張子還嵩陽一首知君不是南遷客魑魅無情須早回左文十八舜臣堯流四凶族投諸四裔以禦魑魅注山林異氣所生為人害者贈花光老浙江衲子靜無塵衲子見傳燈録箇箇莊嚴服飾新何似乾明能效古渠知北斗裏藏身傳燈録慧清禪師傳僧問北斗裏藏身意智如何師曰九九八十一題花光為曽公卷作水邊梅梅蘂觸人意樂天榴花詩香塵擬觸坐禪人冒寒開雪花遙憐水風晚片片點汀沙冷齋夜話衡州花光仁老以墨為梅魯直觀之曰如嫩寒春曉行孤山離落間但欠香耳清明佳節清明桃李笑本事詩博陵崔護清明獨遊都城南得居人莊酒渴扣門求飲有女子以盂水至倚小桃佇立而意屬殊厚來歲清明往尋之門庭如故而扃欽之因題詩曰去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風云云野田荒壠只生愁雷驚天地龍蛇蟄謂巳過驚蟄莭雨足郊原草木柔人乞祭餘驕妾婦孟子所稱齊人乞墦間之祭歸而驕其妻妾以言清明上冢士甘焚死不公侯陸劌鄴中記寒食斷火起於子推據左傳史記無介推𬒳焚事周禮司炟仲春以木鐸修火禁則禁火蓋周之舊制賢愚千載知誰是滿眼蓬蒿共一丘漢陽惲傳古與今同一丘之貉師古曰言其同類也山谷外集詩注卷之十四終
