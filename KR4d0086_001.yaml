front:
  text: 山谷外集詩注卷之一
  hash: sha256:3a746fb69d3795a1ce59065cc197f25bab50787f77a6ec48f52e5a4b8930b656
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_001-1a}
body:
  text: 青神史容撰注賦劉明仲墨竹賦子劉山山川之英骨毛粹清晉元帝紀嵇紹曰琅邪王毛骨非常老杜詩衆中見毛骨猶是麒麟兒用意風塵之表晉王戎傳王衍自然是風塵表物如秋髙月明文選謝靈運詩野曠沙岸淨天髙秋月明遊戲翰墨龍蛇起陸隂符經曰天發殺機龍蛇起陸嘗其餘巧檀弓云爾以人之母嘗巧顧作二竹其一枝葉條逹莊子至樂篇此之謂條逹而福持戰國䇿張儀説魏王云魏地四平諸侯四通條逹輻湊東坡嘗以是語記文與可畫云與可之於竹石枯木真可謂得其理者矣如是而生如是而死如是而攣拳瘠蹙如是而條逹遂茂惠風舉之蘭亭序惠風和暢瘦地筍笴古我反箭莖也杜詩瘦地翻宜粟夏篁解衣三河少年史記貨殖傳昔唐都河東殷人都河內周人都河南夫三河在天下之中若鼎足稟生勦剛退之詩稟生肖勦剛勦輕捷也鋤交切春服楚楚語春服既成詩衣裳楚楚俠遊專場史記有遊俠傳選詩京華遊俠客東都賦云秦政利觜長距終得擅場注云擅專也鮑明逺雉朝飛云專場挾兩恃強力王謝子弟生長見聞文獻不足猶超人羣梁武帝評書云王僧虔書如揚州王謝家子弟縱復不端正皆有一種風氣文獻出語莊子以馭人羣老杜云殊俗自人羣其一折幹偃蹇斫頭不屈蜀志張飛傳飛破巴郡生獲太守嚴顔飛呵顔曰大軍至何不降而敢拒戰顔曰我州但有斷頭將軍無降將軍也飛怒令左右牽去斫頭顔色不變曰斫頭便斫頭何為怒耶飛壯而釋之拔老葉硬強項風雪後漢董宣傳宣為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出以奴驂乘宣大言數主罪叱奴下車格殺之主訴帝帝召宣使叩頭謝主宣不從強使頓之宣兩手據地終不肯俯帝笑因勑強項令出賜錢三十萬廉藺之骨成塵凛凜猶有生氣丗説庾道季曰廉頗藺相如之骨雖千載尚凛凜有生氣曹蜍李志雖在厭厭如九泉下人鮑明逺云彭韓及廉藺疇昔巳成灰雖汲黯之不學挫淮南之鋒於千里之外汲黯傳上曰人果不可以無學觀黯之言日益甚矣又曰淮南王謀反憚黯曰黯好直諌至説公孫弘等如發蒙耳子劉子陵雲自許司馬相如傳飄飄有陵雲氣按劒者多鄒陽傳明月之珠夜光之璧以暗投人於道衆莫不按劒相眄者故以歸我請觀謂何黃庭堅曰吾子於此可謂能矣猶有修篁之歲晚枯枿之發春枿牙葛切西漢敘傳三枿之起注詩云苞有三枿木斫而枿生也亦作蘖孟子云非無萌蘖之生焉少者骨梗梗當作鯁陳平傳項王骨鯁之臣杜周傳朝骨鯁之臣注鯁即鯁字老而日新附之以傾崖礜石謝靈運云崖傾光難留丘希範云崖傾嶼難傍唐李白云崖傾月難圎摧之以冰霜斧斤第其曾髙昭穆至于來昆仍雲尓雅玄孫之子為來孫來孫之子為晜孫晜孫之子為仍孫仍孫之子為雲孫組練十幅左襄三年帥組甲三百𬒳練三千此借用其字文選謝玄暉詩西戡收組練煙寒雨昏乃為能盡之蓋陽虎有若之似夫子市人識之陽虎見孔子丗家有若見仲尼弟子傳顔回之具體門人不知孟子云子夏子遊子張皆有聖人之一體冉牛閔子顔淵則具體而微蘇子曰丗之工人或能曲盡其形至於其理非髙人逸才不能辨此語見東坡集中淨因院畫記意其在斯故藉外論之梓人不以慶賞成虛莊子云梓慶削木為鐻鐻成見者驚猶鬼神魯侯問焉對曰臣將為鐻必齋三日而不敢懷慶賞爵祿齋七日忘吾有四肢形體也痀僂不以萬物易蜩莊子云仲尼見痀僂者承蜩猶掇之也仲尼曰子巧乎有道邪曰吾處身也若橛株拘雖万物之多而唯蜩之知吾不反不仄不以万物易蜩之翼何為而不得及其至也禹之喻於水仲尼之妙於韶禹行水行其所無事孔子聞韶不知肉味蓋得其妙也蓋因物而不用吾私焉若夫燕荆南之無俗氣山谷作道臻師墨竹序云往時天章閣待制燕肅始作生竹超然免於流俗近丗集賢校理文同遂能極其變態郭若虛圗畫見聞録云燕肅字穆之位龍圗閣直學士以尚書禮部侍郎致仕善畫山水寒林大堂寺有畫屏風玉堂刑部景寧坊居第及許洛佛寺皆有畫壁所畫近百軸皆取入禁中故丗所傳無幾庖丁之解牛進技以道者也莊子庖丁為文惠君解牛奏刀騞然莫不中音文惠君曰技蓋至此乎庖丁釋刀而對曰臣之所好者道也進乎技矣文湖州之得成竹於胸中坡集文與可畫偃竹記其略云畫竹必先得成竹於胸中執筆熟視乃見其所欲畫者急起從之振筆直遂以追其所見如兔起鶻落少縱則逝矣王會稽之用筆如印印泥者也書訣墨藪載顔魯公記張長史筆法云長史日聞於禇河南云用筆當如印印泥錐畫沙𥘉不言出於會稽內史王逸少也當考詩云鶴鳴于九皋聲聞于天妙万物以成象繫辝曰神也者妙万物而為言也必其胸中洞然好學者天不能掣其肘劉子勉旃家語云宓子賤為單父宰辝去請近史二人與俱二史書子賤掣肘書不善則怒之楊惲傳勉旃無多談放目亭賦走馬承受丁君作亭於其廨東北吾友宋楙宗以為盡表裏江山之勝名其亭曰放目而黔江居士為之賦山谷以紹聖二年安置黔州歷三歲以黔江自號丁君廨當在夔州按前集附載知命詩有行次巫山宋楙宗送折花厨醖詩云喚得巫山強項令插花傾酒對陽臺又有宋楙宗寄夔州五十詩三首蓋楙宗時宰巫山為丁君求作此賦楙宗名肇放心者逐指而喪背孟子放心而不知求又云養其一指而失其肩背放口者招尤而速纍退之感二鳥賦祗以招尤而速纍自作訿訿詩翕翕訿訿注毀也自增憒憒莊子彼又惡能憒憒然丗説王丞相末年不復省事自嘆曰人言我憒憒後人當思此憒憒登髙臨逺唯放目可以無悔防心以守國之械墨子曰公輸般為雲梯之械以攻宋墨子解帶為城以牒為械公輸般之攻械盡墨子之守固有餘防口以挈瓶之智左傳雖有挈瓶之智守不假器山谷與一僧簡云持心如城守口如瓶必有相應者以此放目焉墨丈尋常而見万里之外國語其察色也不過墨丈尋常之間注五尺為墨倍墨為丈八尺為尋倍尋為常後漢竇融傳天子明見万里之外古詩溪上吟并序山谷生於慶曆五年乙酉至嘉祐六年辛丑年十七春山鳥啼新雨天霽汀草怒長竹篠交隂黃子觀漁於塘下尋春于小桃源從以溪童稚子畦丁三四輩茶鼎酒瓢淵明詩編雖不命戒未嘗不取諸左右臨滄波拂白石詠淵明詩數篇清風為我吹衣好鳥為我勸飲當其漻然無所拘係而依依規矩凖繩之間自有佳處乃知白蓮社中人不逹淵明詩意者多矣過酒肆則飲亦無量也然未始甚醉蓋其所遇與畢卓劉伶輩同而自謂所得與二子異人亦殊未能知之也酒酣得紙書之為溪上吟短生無長期靈運豫章行短生旅長丗恆覺白日欹天台賦嗟人生之短期孰長年之能執聊暇日婆娑王粲登樓賦聊假日以消憂李善本作暇注云暇或作假離騷經聊假日以偷樂輔注云顔師古曰日中心愁悶假延目月苟為娛樂耳今俗猶言借時度日言暇者非國風宛丘云婆娑其下出門望髙丘拱木漫春蘿左秦繆謂蹇叔尓墓之木拱矣試為省鬼録魏文帝與吳質書云觀其姓名巳為鬼録不飲死者多安能如南山千歲保不磨送窮文吾立子名百丗不磨在丗崇名節飄如赴燭蛾漢婁護傳論議常依名節選詩努力崇名德南史傳亮傳直宿禁中睹夜蛾赴燭作感物賦以寄意及汝知悔時万事蓬一窠太白詩昔日万乘墳今成一科蓬又蓬科馬鬛今巳平青青陵陂麥妍暖亦巳花莊子儒以詩禮發冢小儒曰詩固有之青青之麥生於陵陂長煙淡平川孟浩然詩微雲淡河漢輕風不為波無人按律吕好鳥自和歌杖藜山中歸莊子原憲杖黎而出牛羊在坡陀本自無廊庿王羲之傳報殷浩書曰吾素無廊庿政尓樂澗阿淵明詩御冬足大布麁絺以應陽政尓不能得哀哉亦可傷洪駒父詩話稱山谷云淵明詩云政賴古人書政尓不能得政冝委運去皆當時語而或者改作上賴古人書止尓不能得甚失句法詩考槃在澗考槃在阿念昔揚子雲刻意師孟軻狂夫移九鼎深巷考四科亦有好事人時能載酒過無疑舉尓酒定知我為何揚雄字子雲其贊云雄三丗不徙官及王莽篡位談説之士用符命稱功德獲封爵者甚衆雄復不侯人希至其門時有好事者載酒肴從遊學四科謂德行言語政事文學而四科字見論語正義退之詩遇酒即酩酊君知我為誰莊子云刻意尚行離丗異俗清江引時年十七江鷗搖蕩荻花秋老杜詩搖蕩菊花期樂天詩楓葉荻花秋索索八十漁翁百不憂杜詩吾知徐公百不憂清曉采蓮來蕩槳樂府有采蓮曲老杜詩不有小舟能蕩槳百壷那送酒如泉夕陽收網更橫舟羣兒學漁亦不惡晉謝道藴傳王郎逸少子不惡老妻白頭從此樂全家醉著蓬底眠唐韓渥詩漁翁醉著無人喚過午醒來雪滿船南唐近事史虛白詩風雨揭却屋渾家醉不知舟在寒沙夜潮落還家呈伯氏元注云葉縣作山谷年二十三治平四年丁未登進士第授汝州葉縣尉明年改元熙寧去日櫻桃𥘉破花歸來著子如紅豆四時驅迫少須臾兩鬢飄零成老醜老杜云親故傷老醜永懷往在江南日原上急難風雨後私田苦薄王稅多諸弟號寒諸妹瘦退之云冬暖而兒號寒扶將白髮渡江來漢孝景王皇后傳云女逃匿扶將出拜樂府木蘭歌爺娘聞女來出郭相扶將吾二人如左右手韓信傳如失左右手晉邵續傳續諫成都王討長沙王云兄弟如左右手苟從祿仕我邅田屈原九歌云邅吾兮洞庭注邅轉也陟連切惜誦云欲儃佪以干傺兮注儃知然切且慰家貧兄孝友強趍手板汝陽城晉輿服志古者貴賤皆執笏主書君上之教令後惟八座執笏其餘卿士但執手板示非記事官也退之贈張籍詩上馬插手板和盧郎中詩行抽手板付丞相祭文云朱衣象板蓋唐人以笏為板𥘉無分別也更責愆期𬒳訶詬詩匪我愆期法官毒螫草自搖西都賦蕩亡秦之毒螫螫舒亦切丞相霜威人避走丞相謂冨文忠公也按實録熙寧元年二月判河陽冨弼判汝州明年二月冨公復拜相山谷之官當是熙寧元年戊申蓋外集有詩其序云巳酉二月按鬪死者於舞陽壁間得往歲書拂塵落筆之時觀者左右去歲即戊申也賤貧孤逺蓋如此此事端於我何有一囊粟麥七千錢東方朔傳侏儒長三尺余奉一囊粟錢二百四十臣朔長九尺余亦奉一囊粟錢二百四十五人兄弟二十口官如元亮且折腰晉書云陶潛字元亮宋書云陶潛字淵明或云淵明字元亮南史云陶潛字淵明或云字深明名元亮昭明大子作傳云陶淵明字元亮或云潛字淵明諸書皆云為彭澤令郡遣督郵至縣吏白應束帶見之潛嘆曰吾不能為五斗米折腰事鄉里小人解印去縣心似次山羞曲肘元結次山集有惡曲一篇古人有惡曲者不曲臂以取物不曲膝以便坐北窗書册久不開筐篋黃塵生鎖鈕賈誼疏云俗吏之所務在於刀筆筐篋而不知大體師古筐篋所以盛書何當略得共討論論語丗叔討論之况乃雍容把杯酒意氣敷腴貴壯年鮑昭行路難云意氣敷腴在盛時老杜兩公壯藻思得我色敷腴不早計之且衰朽安得短船万里隨江風養魚去作陶朱公斑衣奉親伯與儂陶朱公養魚法見齊民要術其略云以六畒地為池池中有九洲六谷求鯉魚納池中列女傳老萊子養二親行年七十著五色采衣為小兒啼大業拾遺記帝嘲羅娘云幸好留儂伴成夢不留儂住意如何帝自逹廣陵多效吳語故稱儂云四方上下相依從退之詩四方上下逐東野雖有離別無由逄用舍由人不由己語為仁由己而由人乎哉乃是伏轅駒犢耳田蚡傳今日廷論局趣效轅下駒流民嘆按實録熙寧二年正月判汝州冨弼言唐鄧襄汝地廣不耕河北流民至者日衆若盡給以間田使獲生養實兩得其便云云此詩言河北災傷流民至襄葉間可見在葉縣作朔方頻年無好雨杜好雨知時節五種不入虛春秋漢伍𬒳傳秦時徐福入海多齎五種而行注五谷之種也月令首種不入邇來后土中夜震有似巨鰲復戴三山逰列子五山之根不得暫峙帝使巨鰲十五舉首而戴之二山流於北極傾墻摧棟壓老弱冤聲未定隨洪流地文劃劙水觱沸退之祭神文劃劙隂雲卷日月也劙力支切詩觱沸檻泉沸音弗十戶八九生魚頭南史康絢傳淮水暴漲堰壞奔流于海殺數万人怪物隨流而下或人頭魚身或龍形馬首退之月蝕詩堯呼大水浸十日不惜万國赤子生魚頭蓋效玉川子詩天髙日走沃不及但見万國赤子生魚頭也稍聞澶淵渡河日數万河北不知虛幾州纍纍襁負襄葉間問舍無所耕無牛三國志劉備謂許汜云君求田問舍言無可采此借使其字𥘉來猶自得曠土嗟尓後至將何怙退之桃源詩𥘉來猶自念鄉邑歲久此地還成家詩無父何怙刺史守令真分憂老杜同元使君春陵詩序曰當天子分憂之地明詔哀痛如父母前漢西域傳武帝末年遂棄輪臺之地而下哀痛之詔廟堂已用伊周徒謂冨公巳拜相也何時眼前見安堵杜詩何時眼前突兀見此屋田單傳即墨即降願無虜掠吾族家妻子令安堵漢髙祖紀吏民皆安堵如故踈逺之謀未易陳市上三言或成虎韓非子云魏使龐蔥與太子質於邯鄲謂魏王曰今一人言市有虎王信之乎曰否兩人言王信之乎王曰寡人疑之矣三人言王信之乎王曰寡人信之矣蔥曰市亦無虎明矣然三人言而成虎今邯鄲去大梁也逺於市而議臣者過於三人願王察之禍災流行固無時堯湯水旱人不知左傳天災流行國家代有漢食貨志堯有九年之水湯有七年之旱桓侯之疾𥘉無證扁鵲入秦始治病史記扁鵲傳鵲過齊謂桓侯曰君有疾在腠理不治將深桓侯曰寡人無疾後五日復見曰疾在血脈桓侯不應後五日復見望見桓侯而走投膠盈掬俟河淸抱朴子云寸膠不能理黃河之濁左傳曰周詩有之俟河之清人壽幾何一簞豈能續民命南史劉懷珍族弟善明靑州飢善明有積粟開倉以賑鄉里多獲全濟百姓呼其家田為續命田雖然猶願及此春略講周公十二政周禮地官司徒以荒政十有二聚萬民云云詩意謂扁鵲巳去而始治病固無及矣以一簞食一瓢飲而欲救民死言賑濟無益也雖如此而及今春講荒政猶庶幾風生羣口方出竒史記白起贊料敵合變出竒無窮老生常談幸聽之三國志𬋩輅傳鄧揚曰此老生常談次韻答張沙河知邢州沙河縣此以下皆北京教授時作此詩云古人已悲銅雀上銅雀臺在相州相魏鄰境也葉縣詩多刪去僅存兩首及律詩數篇餘見內集十四卷蓋刪去也張侯堂堂身八尺老大無機如漢隂莊子曰子貢過漢隂見一丈人方將為圃畦鑿隧而入井抱甕而出灌子貢曰有械於此鑿木為機後重前輕挈水若抽其名為槹夫子不欲乎為圃者曰吾聞有機械者必有機事有機事者必有機心吾非不知羞而不為也猛摩虎牙取吞噬法言云茅焦雖辨摩虎牙矣此語必有謂自嘆日月不照臨詩日居月諸照臨下土策名日已汙軒冕左傳策名委質莊子繕性篇非軒冕之謂也逃去未必焚山林琴操曰介子推作龍蛇之歌而隱文公求之不肯出乃燔木子推抱木而死魏志太祖聞阮瑀名辟之不應逃入山中太祖使人焚山得之我評君才甚髙妙孤竹截管空桑琴漢律曆志黃帝使伶倫自太夏之西昆侖之隂取竹之解谷生其竅厚均者斷兩莭間而吹之以為黃鍾之宮周禮曰孤竹之管雲和之琴瑟雲門之舞又曰孫竹之管空桑之琴瑟咸池之舞四十未曽成老翁文選魏文帝與吳質書曰已成老翁但未白頭耳老杜丈夫蓋棺事如定君今幸未成老翁紫髯垂頥鬱森森獻帝春秋曰張遼問吳降人向有紫髯將軍是誰降人答曰是孫會稽眉宇之間見風雅文選枚叔七發云陽氣見於眉宇之間侵淫而上杜詩眉宇真天人藍田煙霧生球琳李商隱詩藍田日暖玉生煙司空圗集云詩家之景如藍田日暖良玉生煙禹貢云厥貢惟球琳琅玕胸中碨磊政須酒丗説阮籍胸中礨隗故須澆之東海可攬北斗斟詩維北有斗不可以挹酒漿楚詞九歌云援北斗兮酌桂漿古人巳悲銅雀上不聞向時清吹音文選弔魏武帝文曰吾婕好妓人著銅雀臺月朝十五日輒向帳作妓文選謝玄暉銅雀臺詩云欎欎西陵樹詎聞歌吹聲鮑明逺集行路難云不見柏梁銅雀上寧聞古時清吹音百年毀譽付誰定取醉自可結舌瘖杜詩乘舟取醉非難事退之詩三杯取醉不復論晉假灼傳云智直之不用皆杜口結舌使公繫腰印如斗晉周顗傳顧左右曰今年殺諸賊奴取金印如斗大繫肘駟馬髙蓋驅駸駸漢于定國傳少髙大閭門令容駟馬髙蓋車詩載驟駸駸親朋改觀婢僕敬成都男子寧異今孟郊詩云親賔改舊觀僮僕生新敬漢蕭望之傳蕭育杜陵男子何詣曹也又言屋底甚懸罄屋底見上左傳室如垂罄兒婚女嫁取千金後漢向長傳男女娶嫁古來聖賢多不飽誰能獨無父母心白樂天詩遂令天下父母心不重生男重生女衆雛墯地各有命強為百草憂春霖佛書云朝生王子一日墮地便勝凡人傳玄樂府云男兒當門戶墯地自生神前集書贈俞清老其略云男女婚嫁渠儂墮地自有衣食分齊今蹙眉終日者正為百草憂春雨耳艾封人子暗目睫與王同床悔沾襟莊子曰麗之姫艾封人之子也晉國之始得之也涕泣沾襟及其至於王所與王同床食芻豢而後悔其泣也史記齊使者至越日幸也越之不亡也吾不責其智之如目見毫毛而不見其睫也隴鳥入籠左右啄文選鷦鷯賦鸚鵡惠而入籠鸚鵡賦命虞人於隴抵南方異物志廣管雷羅等州多鸚鵡但稍小不及隴山者終日思歸碧山岑韓詩遙岑出寸碧一生能幾開口笑莊子盜跖篇其中開口而笑者一月之中不過四五日何忍更遣百慮侵昜云一致而百慮忽投雄篇寫逸興仰占乾文動奎參孝經援神契云奎主文章詳見第四卷答莘老詩注參與奎皆西万七宿故云自陳使酒嘗罵坐漢書季布使酒難近灌夫罵坐不敬惜豫不與朋合簪君材蜀錦三千丈要在刀尺成衣衾文選郭泰機詩衣工秉刀尺棄我忽若遺南朝例有風流癖楚地俗多詞賦淫用晉書杜預左傳癖皇甫謐書淫之義言耽惑也屈原離騷豈不好只今漂骨滄江潯屈原作懷沙之賦於是懷石自投汨羅以死見史記本傳正令夷甫開三窟晉王衍傳衍字夷甫雖居宰輔而為自全之計乃以弟澄為荆州族弟敦為青州謂曰卿二人在外而吾留此足為三窟矣獵以我道皆成禽楊子云獵德而得德前集有詩云安得八紘罝以道獵衆智文選張平子思玄賦績典藉以為罟兮驅儒墨以為禽取此意也溫恭忠厚神所勞於魚得計豈厭深莊子云於蟻棄智於魚得計又云魚鱉不厭深丈夫身在要勉力退之詩身在則有餘豈有吾子終陸沉莊子云方且與丗違而不屑與之俱是陸沉者也鄙人相士蓋多矣漢髙紀臣少好相人相人多矣無如季相勿作蔡澤笑噤吟楊雄解嘲云蔡澤雖噤吟而笑唐舉噤音巨錦反吟魚錦反史記蔡澤傳澤從唐舉相曰吾聞先生相李兊曰百日之內當持國秉政有之乎唐舉熟視而笑曰先生曷鼻巨肩魋顔蹙齃膝攣吾聞聖人不相殆先生乎次韻時進叔二十六韻時子河上園竹間開棟宇繫辭云上棟下宇大兒勝衣冠小兒豐頰輔後漢禰衡傳大兒孔文舉小兒楊德祖史記三王丗家皇子賴天能勝衣趍拜檀弓云如不勝衣万石君傳云子孫勝冠者韓文始任戴冠易咸其輔頰舌左傳穀也豐下必有後於魯國嫁女與朱公伏臘可稱舉謂稱觴舉酒也漢楊惲傳歲時伏臘烹羊炮羔斗酒自勞髮踈雖蒼浪張鷟僉載輔遺云王熊為洛陽令判婦人阿孟狀云阿孟身年八十鬢髮早巳滄浪齒嚼未齟齬楚詞云吾固知其齟齬而難入雞棲牛羊下見國風詩各自有室處四墻規摹小易守若滕莒舍前花木深唐常建詩竹徑通幽處禆房花木深春物麗觀覩舍後曲池蛙楚詞坐堂伏檻臨曲池齋堂風月苦盧同詩使君池亭風月苦此豈不足歟退之詩擺頭笑且言我豈不足歟歎歲不我與見論語客宦孤雲耳未知秦吳楚向來千駟公果愧一丘土千駟見論語選詩昔為萬乘君今為丘山土寧當損軒昂退之聽琴詩劃然變軒昻聊欲效俯傴左傳正考父三命兹益共故其鼎銘曰一命而僂再命而傴三命而俯時子聽然笑子虛賦亡是公聽然而笑吾巳悟倉鼠史記李斯傳斯年少時為郡小吏見吏舍厠中鼠食不潔近人大數驚恐之斯入倉觀倉中鼠食積粟居大廡之下不見人犬之憂斯嘆曰人之賢不肖如鼠矣在所自處耳乃從荀卿學帝王之術少猶守章句晚實愛農圃農圃見論語鵲巢最知風蟻穴識隂雨漢翼奉傳巢居知風穴處知雨文選張茂先詩巢居知風寒穴處識隂雨丗網事諳委文選詩丗網嬰我身退之與桞中丞書與賊不相諳委醉鄉俗淳古唐王績醉鄉記末云醉鄉之俗豈古華胥之國乎何其淳寂也坐忘兩家説肉堅與腸腐晉孔羣傳羣嗜酒王導戒之曰卿不見酒家覆瓿布日月久糜爛耶答曰公不見肉糟淹更堪久耶酒至即使傾杜詩每過得酒傾客來敢辝窶曲禮客啜醢主人辝以窶時邀五桞陶陶潛有五桞先生傳共過三徑詡漢書鮑宣傳後載自成帝至王莽時清名之士十二人蔣詡元卿為兖州刺史以廉直為名王莽居攝以病免官歸鄉里卧不出户淵明有聖賢集録云求仲羊仲皆挫廉逃名蔣元卿之去兖州還杜陵荆棘塞門舍中有三徑惟二人從之遊時人謂之二仲見嵇康髙士傳往在少年場漢尹賞傳賞守長安令雜舉輕薄少年惡子殺數百人瘞寺門桓東長安中歌之曰安所求子死桓東少年場生時諒不謹枯骨後何葬豪氣壓頴汝晉周顗傳汝頴固多竒士祖納傳汝頴之士利如錐借令今尚爾真復難共語晉石勒傳勒笑曰胡人正自難與言稍知憐麴蘖退之詩髙士例須憐麴蘖丈夫終莫生畦畛字本出書説命云云漸解等灉濋元注云水自河出為灉自濟出為濋見爾雅釋水朋友半山阿光隂共行旅人故義當親衣故義當輔古艷歌曰焭焭白兔東走西顧衣不如新人不如故飛鳬至令尹後漢王喬傳為葉令有神術每月朔望常自縣詣臺朝顯宗怪其來數而不見車騎密令伺之言其臨至輒有雙鳬從東南來於是候鳬至舉羅張之但得一隻舄乃詔尚方侯視則四年中所賜官屬履也期我向君所君為拂眠床南史魚弘傳有眠床一張皆是蹙柏淹留莫城阻唐歐陽詹𥘉發太原途中寄太原所思云高城巳不見况復城中人二月丁卯喜雨吳體為北門留守文潞公作按實録熙寧七年判河陽文彥博判大名府乘輿齋祭甘泉宮甘泉本秦離宮漢武帝增廣之自武帝至西漢末皆上甘泉祠祭遣使駿奔河嶽中書武成云丁未祀于周庿邦甸侯衛駿奔走執邊豆誰與至尊分旰食仲舒傳制曰朕承至尊休德左傳伍奢曰楚君大夫其旰食乎北門卧鎮司徒公唐裴度傳度節度河東帝諭意曰為朕卧護北門可也微風不動天如醉庾信哀江南賦云天何為而此醉元注云時聞太母閔雨勤甚故有微風不動之句蓋言憂勤如此而天不聞有若醉焉潤物無聲春有功老杜詩云潤物細無聲三十餘年霖雨手見書説命淹留河外作時豐古風次韻答𥘉和甫飢思河鯉與河魴並見毛詩渴思蔗漿玉碗涼楚詞招魂云胹鱉炮羔有柘漿冬願純綿對隂雪王褒頌云荷旃𬒳毳者難與道純綿之麗密夏願皺絺度盛陽國風蒙彼皺絺萬端作計身愁苦王莽傳所以誑事大后下至旁測方故萬端一事不諧鬢蒼浪後漢宋弘傳帝顧謂主曰事不諧矣蒼浪見上調笑天街吟海燕文選詩調笑輒酬答嘲謔無慙沮晉天文志昴畢之間謂之天街梁吳筠燕詩一燕海上來一燕髙堂息藜羮脫粟非公狂王褒頌云羮藜􅍭糗者不足與論大牢之滋味脫粟見孫洪傳君吟春風花草香杜詩春風花草香我愛春夜璧月涼陳書后妃傳其曲云璧月夜夜滿美人美人隔湘水杜詩美人胡為隔秋水其雨其雨怨朝陽阮藉其雨怨朝陽蘭荃盈懷報瓊玖左聲伯夢涉河或與巳瓊玖食之泣而為瓊瑰盈其懷歌曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎又見毛詩冠纓自潔非滄浪見孟子及楚詞道人四十心如水孟子我四十不動心漢鄭崇傳臣門如市臣心如水那得夢為蝴蝶狂莊子齊物篇莊周夢為胡蝶栩栩然胡蝶也自喻適志與不知周也俄而覺則蘧蘧然周也不知周之夢為胡蝶與胡蝶之夢為周與次韻答和甫盧泉三首并序𥘉虞丗字和甫善醫有必用方行於丗盧其所居也時在河北和甫作盧泉之水不求於古樂府而規摹暗合余為和成三疊自余官河外罕得逆耳之言於朋交和甫愛我也居有藥言吾不欲其思盧泉也故作其一父母之邦有如仲尼桞下惠而懷安之以吾之樂雙井知和甫之不忘盧泉也故作其二坐進此道者於物無擇清漳之波濁河之流盧泉之水求其異味而不得也親樂之身安之斯可矣故作其三夫三言者雖不同唯知言者領其不異也𥘉侯不能六尺長史記晏氏傳云其御之妻謂其為之晏子長不滿六尺身相齊國顯名諸侯少日結交皆老蒼杜詩脫略小時輩結交皆老蒼勢利不可更炎涼漢張耳陳餘贊勢利之交古人羞之老杜詩且復過炎涼大白詩榮枯異炎涼解纓從我濯滄浪解纓見上與君論心松柏香取後凋之義何為獨憶盧泉之上多緑楊盧泉如練照秋陽謝玄暉詩澄江淨如練泉上之人猶謗傷退之詩不知羣兒愚那用故謗傷此邦雖陋有佳士勿厭風沙吹茫茫願君不負上池水史記扁鵲傳長桑君呼扁鵲與語曰我有禁方年老欲傳與公乃出其懷中藥子扁鵲曰飲是以上池之水三十日當知物矣其後扁鵲過虢虢太子死扁鵲能生之故天下盡以扁鵲為能生死人扁鵲曰越人非能生死人也此自當生者越人能使之起耳囊中探丸起人死漢尹賞傳長安閭里少年相與探丸為彈得赤丸者斫武吏得黑者斫文吏借此以言丸藥詩意謂藥石之言也盧泉之木百尺長下蔭泉色如木蒼蘋風荷雨灑面涼倒影搖蕩天滄浪杜詩影動倒景搖瀟湘網登錦鱗蒲荇香杜詩渚蒲牙白水荇青何以貫之桞與楊石鼓文其魚維何維鱮維鯉何以貫之維楊與桞古來希價入咸陽史記吕不韋傳不韋著呂氏春秋布咸陽市門懸千金其上有能增損一字者子千金貪功害能相中傷文選李陵答蘇武書妨功害能之臣盡為萬戶侯白樂天詩自賢誇智慧相紏鬪功能君今巳出紛爭外但思煙波春渺茫奉親安樂一杯水李白詩萬言不直一杯水此摘其字盧泉之濵可忘死説苑楚昭王欲之荆臺司馬子棊諌曰荆臺之遊左洞庭右彭蠡其樂使人遺老而忘死舍後鍾𣑽爐煙長杜詩𣑽放時出寺鍾殘仍殷床舍前簾影竹蒼蒼事親暖席扇枕涼東觀漢記曰黃香躬勤苦盡心供飬冬無𬒳袴而親極滋味暑即扇枕寒即以身溫席陶淵明黃香贊其序云九歲失母思慕骨立事父竭力以致飬暑則扇床枕寒即以身溫席本傳不載中有一士鬢蒼浪見上同心之言蘭麝香繫辝同心之言其臭如蘭與遊者誰似姓楊朝發枉渚夕辰陽屈原九章云朝發枉渚兮夕宿辰陽懷瑾握瑜祗自傷九章又云懷瑾握瑜兮窮不知所示東有濁河西清漳漢髙祖紀田肯曰夫齊西有濁河之限胡為搔頭盧泉思茫茫李固傳搔頭弄姿注引西漢雜記武帝過李夫人就取玉簮搔頭清明在躬不在水禮清明在躬志氣如神此曹狡獪可心死神仙傳王逺謂麻姑曰吾老矣不復作此狡獪變化也列子云心死形廢招子髙二十二韻兼簡常甫丗弼我行向厭次厭次棣州所治縣也夏扇日在搖甘瓜未除壟髙桞尚鳴蜩詩小辨菀彼桞斯鳴蜩嘒嘒駕言聊攝歸詩駕言出遊聊攝博州所治聊城縣也即左傳所謂聊攝以東飛霜曉封條文選雜擬詩嘉樹生朝陽凝霜封其條負薪泣裘褐公子御狐貂王孫子曰昔衛君重裘纍禋而坐見路有負薪而哭者問其故對曰雪下衣薄是以哭也見藝文類聚王褒頌云襲狐裘之暖者不憂至寒之悽慘法言云舉丗寒貂狐不亦燠乎歲月坐晼晚選詩思君令人老歲月忽已晚宋玉九卞曰日晼晚其將入兮鬢顔颯然凋道德千古事斯文非一朝杜詩文章千古事得失寸心知往者我不及離騷云往者不可及兮來者猶可待後生多見超退之詩只見有不如不見有所超吾黨二三子士林聳孤標小謝抱周易忘言獨參寥莊子玄冥聞之參寥參寥聞之疑始崔郎楚左史楚左史倚相二典考舜堯王生風雅學談辨秋江潮釋氏所謂海潮音也灑筆驚有司小敵謂可驕光武紀諸部喜曰劉將軍平生見小敵怯今見大敵勇可怪也安知樗蒱局臨開敗三梟李翶有五木經云樗蒱五木玄白判又云王采四氓采六白二玄三曰梟又曰馬出𥘉開疊行非王采不出閞二生數步隔屢赴茗埦邀陸羽茶經四之器曰碗越州上明州次婺州次嶽州次小謝殊未來選詩日暮碧雲合佳人殊未來我覺百里遙問之憂菽水見孟子心慮極無聊賈誼傳一二指慉心慮無聊父憐母不訶日以濁酒澆酒澆見上此道如鼎實念子羮未調文選潘安仁詩王生和鼎實書曰若作和羮爾惟鹽梅古來有親飬回也樂一瓢不田鶉生宎在物乃為妖莊子曰吾未嘗為牧而羊生於奧未嘗好田而鶉生於宎吾言有師承後漢儒林傳序師資所承可信如斗杓斗杓招遙星也詩以解子憂亦以當子招此詩言三子者舉進士不中選謝治易崔習書王習詩不為不至而譬之於博有勝負也小謝懟而不出自言無以奉菽水之歡故為言顔子事親一簞食一瓢飲不改其樂以解其憂也王純亮字丗弼山谷妹壻山谷至自厭次蓋以檄考試進士也外集刪去詩中有一詩其敘云次韻答常甫丗弼二君不利秋官鬱鬱不平故豫詩多及君子處得失事與此篇同時林為之送筆戲贈閻生作三副規畫宣城葛三副栗尾棗核散卓皆筆名東坡云宣城諸葛氏筆擅天下其間不甚佳者終有家法如北苑茶內庫酒教坊樂雖弊精神欲強學之而草野氣終不可脫外貌雖銑澤毫心或粗糲尓雅絶澤謂之銑注云美金光澤也蜀志張裔傳張府君如瓠壷外雖澤而內實粗杜詩百年粗糲腐儒餐功將希栗尾拙乃成棗核李慶縳散卓東坡云散卓筆惟諸葛能之他人學者皆得其形似而無其法反不如常筆含墨能不泄退之毛頴傳頴為人強記無不愛重又善隨人意後雖見廢棄終默不泄病在惜白毫往往半巧拙小字亦周旋大字難曲折時時一毛亂乃似逆梳髮張鼎徒有表明皇雜録上欲相蘇頲夜艾召直宿舍人蕭嵩草詔既成其詞曰國之瓌寶上曰頲瓌之子不欲斥其父名當為刋削久之復進唯改曰國之珍寶上擲其草曰虛有其表耳此借喻也徐偃元無骨後漢東夷傳注云徐君宮人娠而生卵棄之有犬名鵠蒼銜卵以歸遂生小兒生而偃因以名尸子曰偃生而有筋無骨故曰偃東坡云魯直出衆工筆使僕歷試筆鋒如著鹽曲蟺詰曲𥿄上魯直云此徐偃筆也有筋無骨可謂名不虛得如東坡之言則徐偃有筋無骨非獨山谷借喻亦當時固有此語耶模畫記姓名項籍傳書足記姓名而已亦可應倉卒為之街南居時通鈴下謁晉羊祐傳鈴閣之下侍衛不過數人楊方傳𥘉為郡鈴下威儀晴軒坐風涼怪我把枯筆開囊撲蠧魚遣奴送一束洗硯磨松煤揮􅎈至日沒蚤年學屠龍莊子朱泙漫學屠龍於支離益彈千金之家技成無所用其巧適用固踈闊自言所學不同流俗若屠龍之技無所用之如退之書云凡所辛苦而僅有之者皆符於空言而不適於實用故學成而道益窮年老而身愈困也廣文困虀鹽唐增國子學置廣文館以鄭虔為博士山谷時為大名府國子監教授故以自况退之送窮文云太學四年朝虀暮鹽烹茶對秋月略無人問字况有客投轄楊雄傳劉棻常從雄學作竒字陳遵傳遵嗜酒每大飲賔客滿堂輒閞門取客車轄投井中雖有急不得去文章寄呻吟講授費頰舌間無用心處雌黃到筆墨晉王衍傳丗號口中雌黃時不與人遊即歲不我與意也巳見上孔子尚愛日楊子法言或曰孔子之道不可小歟曰小則敗聖如何曰若是則何為去乎曰愛日曰愛日而去何也曰由羣婢之故也作詩當鳴鼓聊自攻短闕用論語鳴鼓而攻之自攻其短也退之詩還家雖闕短指日親晨餐此摘其字再和答為之君莫嘲廣文沍寒𬒳絺葛左傳其藏冰也深山窮谷固隂沍寒北史袁充傳年十餘歲父黨至門時冬𥘉充尚求葛衫客戲曰絺兮葛兮凄兮以風充應聲曰唯絺唯綌服之無斁杜詩焉知南鄰客九月猶絺綌君勿嘲廣文窮年飯粢糲列子云食則粢糲居則蓬室常恐爼豆子與丗充肴核莊子云老𥅆之役有庚桑楚者居畏壘之山三年而畏壘大壤畏壘之民相與言曰胡不尸而祝之社而稷之庚桑子聞之曰畏壘之細民而竊竊然欲爼豆子於賢人之間小雅邊豆有楚殽核惟旅凡木不願材退之祭子厚文凡木之生不願為材大折小枝泄檪依曲轅社聊用神其拙莊子曰匠石之齊至于曲轅見檪社樹其大蔽牛觀者如市匠石顧曰散木也無所可用故能若是之壽匠石歸櫟社見夢曰汝將烏乎比豫哉若將比豫於文木耶夫柤黎橘柚果蓏之屬實熟則剝則辱大枝折小枝泄吾家本江南一丘藏曲折杜詩一丘藏曲折緩步有躋攀瀕溪蔭蒼筤係辝震為蒼筤竹蕭􅎈可散髮文選嵇叔夜詩散髮岩岫既無使鬼錢晉魯褒錢神論云錢無耳可使鬼又無封侯骨漢翟方進傳從蔡父相蔡父大竒其形貌謂曰小史有封侯骨當以經術進薄祿庇間曹且免受逼卒為此懶出門徒弊懷中謁漢髙祖紀乃紿為謁曰賀錢萬師古曰為謁者書刺自言爵里若今參見通名也後漢禰衡傳隂懷一刺既無所之至於刺字漫滅直齋賔客退風物供落筆詩成著牀頭晉王湛傳牀頭有周易不知今幾束君何向豫勤見詩歎埋沒嗣宗須酒澆見上未信胸懷闊自狀一片心唐裴度自贊曰一片靈臺丹青莫狀碧潭浸寒月寒山子詩我心似秋月碧潭清皎潔令德感來教為君賦車轄小雅門閞車之轄兮此篇又云令德來教君思揚雄吒吒當為吃本傳口吃不能劇談何似張儀舌史記張儀傳儀云視吾舌尚在否此意恐太狂願為引繩墨此語蓋答其和章之意望其規正如木從繩也政使此道非改過從今日報章望瓊琚見毛詩勿使音塵闕文選月賦美人邁兮音塵闕謝靈運詩各勉日新志音塵慰寂滅再和答為之林君維閩英數面成瓜葛淵明集答龐參軍詩序云俗諺曰數面成親况情過此者乎晉王導傳導與其子恱奕碁爭道導笑曰相與有瓜葛那得為尓耶鄰居接扙藜過飯厭踈糲漢鮑宣傳俱過宣一飯去後漢苐五倫傳不過從兄飯杖藜見上大雅云彼疏斯稗箋云疏粗也謂糲米也退之詩疏糲亦足飽我飢讀書飽工夫論事極精核南史王僧虔傳文帝書天然勝羊欣工夫少於欣漢書孝宣之治綜核名實政事文學法理之士咸精其能奮身君子場勇若怒未泄東都賦云馬踠餘足士怒未泄窮年棲旅巢易旅卦鳥焚其巢由命非由拙王良驅八駿左傳哀二年郵無恤御簡子注王良也左傳又稱子良又曰郵良穆天子傳云八駿之乘盜􅌐赤驥曰義渠黃騮緑耳方駕度九折九折阪在漢蜀郡嚴道縣王尊叱馭處學堂踈雨餘退之秋懷詩學堂日無事石砌長苔髮尓雅藫石衣注云水答也一名石髮弟子肥如瓠漢張蒼傳肥白如瓠先生瘦唯骨元注云林君在朱氏講授朱氏兒皆面白豐肥林君如刻削北門一都會一都會也史記貨殖傳多有此語塵埃人卒卒司馬遷書卒卒無須臾之間霍光傳見雲家卒卒髙蓋如秋荷勢利相奔謁勢利之交見上惟君尚寂寞來觀草玄筆揚雄傳雄作大玄自言寂寞為尸斯文未易陳政當高閣束退之詩春秋五傳束髙閣字本出庾翼傳金馬事陸沉史記滑稽傳東方朔歌曰陸沉於俗避丗金馬門市門逐乾沒貨殖傳刺繡文不如倚市門張湯傳始為小吏乾沒未須相賢愚退之别趙子云冝各從所務詎用相賢愚聊自嘲迂濶憶昨戲贈詩乃辱報明月鄒陽傳明月之珠夜光之璧極知推挽意左傳或推之或挽之我車君欲轄見前篇車轄注屠龍真狂言屠龍見前篇奔馬不及舌語駟不及舌自悔出屠龍之語也第二篇固云此意恐大狂顧為引繩墨賜書盈五車莊子曰惠施多方其書五車直舍方二墨見上會意便欣然淵明集五桞先生傳云好讀書不求甚解每有會意便欣然忘食餘事過窗日尚恐素餐錢諸生在城闕詩不素餐兮又云挑兮逹兮在城闕兮髙祖紀賜餐錢奉邑贈趙言饒陽趙方士眼如九秋鷹釋氏書云舍利弗此言鶖鷺子以其母眼如鶖鷺也此用其意學書不成不學劒項籍傳學書不成去學剱又不成去心術妙解通神明醫如府身拾地芥夏侯勝傳取青紫如俯拾地芥耳相如仰面觀天星劉向傳夜觀天星自言方術雜鬼怪萬種一貫皆天成一貫見語大梁卜肆傾賔客二十餘年聲籍籍得錢滿屋不經營寒山子詩丈夫莫守困無錢即經營散與市人還寄食韓信寄食於漂母北門塵土滿衣襟廣文直舍官槐隂杜詩廣文到官舍白雲勸酒終日醉紅燭圍碁清夜深大車駟馬不回首史記范騅傳須賈曰吾非大車駟馬不出強項老翁來見尋強項見上向人忠信去表襮詩素衣朱襮尓雅黼領謂之襮退之云襮順而裏方可喜正在無機心機心見上輕談禍福邀重糈史記貨殖傳諸食技術之人為重糈也司馬季主傳卜而有不審不見奪糈注云騷經曰懷椒糈以要之王逸云糈精米所以享神所在多於竹葦林維摩經云譬如甘蔗竹葦稻麻叢林翁言此輩無足聽見葉知根論才性飛騰九天沉九泉漢郊祀志九天巫祠九天師古曰九天謂中央鈞天東方蒼天東北旻天北方玄天西北幽天西方造天西南朱天南方炎天東南陽天其説見淮南子九淵有九名見莊子應帝王篇晉胡奮傳聞女為貴人哭曰老奴不死唯有二兒男入九地之下女上九天之上自種自收皆在行班固奕旨曰博懸於投不必在行先期出語駭傳聞事至十九中時病輪囷離竒惜老大成器本可千萬乘鄒陽傳蟠木根柢輪囷離竒而為萬乘器自歎輕霜白髮新又去驚動都城人都城逹官老於事退之詩中朝大官老於事嫌翁出言不嫵媚唐魏徴傳帝曰人言徴舉止踈慢我但見其嫵媚耳前集元師此君軒詩云神人傳書道人命死生禍福如看鏡晚知直語觸憎嫌深藏幽寺聽鍾磬與此同意有手莫炙權門火杜詩炙手可熱勢絶倫唐崔鉉傳曰鄭楊假薛炙手可熱有口莫辨荆山玉新序曰荆人卞和得玉璞而獻之荆厲王王使玉尹相之曰石也以和為謾而斷其左足武王即位和復奉璞而獻之武王使玉尹相之曰石也又斷其右足共王即位和乃奉璞而哭於荆山三日三夜泣盡而繼之以血共王使人問之對曰寶玉而名之以石貞士而戮之以謾此臣之所以悲也王乃使人理其璞而得寶玉焉名之曰和氏之璧吳宫火起燕焚巢此語謂上句權門火越絶書吳西宫在長秋門秦始皇十一年守宮者照燕失火燒也鮑照空城雀云猶勝吳宫燕無罪得焚巢李白野田黃雀行遊莫逐炎洲翠棲莫近吳宮燕吳宮火起焚尓巢炎洲逐翠遭網羅當時卞和斫兩足此語謂上句荆山玉千里辝家却入門韓詩二十辝家來射䇿三春榮木會歸根歸去來詞木欣欣以向榮老子云夫物藝藝各復歸其根歸根曰靜我有江南黃篾舫隋書煬帝紀上御龍舟幸江都文武官五品以上給樓船九品以上給黃篾與公長入白鷗羣莊子曰入獸不亂羣入烏不亂行次韻朝輔之廖正一贈答詩按朝無咎集云及第東歸將赴調寄李成季又云復用前篇韻答明略并呈魯直按登科記巳未元豐二年朝輔之廖正一同榜朝字無咎廖字明略無咎集中又有建除體詩答魯直教授時教授北京也朝子抱材耕谷口楊子曰谷口鄭子真耕乎岩石之下丗有髙賢踐台斗杜詩及乎貞觀𥘉尚書踐台斗頃入計吏西入閞漢朱買臣隨上計吏為卒將重車至長安閞夫數日傳車還漢終軍傳𥘉軍從濟南當詣博士步入閞閞吏豫軍繻曰為復傳軍曰大丈夫西遊終不復傳還退之詩屈指數日憐嬰孩字本左傳行則數日而返封侯半屬妄校尉射虎猛將猶行間李廣傳廣與王朔語曰自漢擊胸奴廣未嘗不在其中而妄校尉以下材能不及中以軍功取侯者數十人廣不為後人然終無尺寸功以得封邑何也廣出獵見草中石以為虎而射之中石沒矢視之石也老杜贈司空王思禮云未甚拔行間犬戎大充斥字本出漢吳王濞傳諸客皆得為將校尉行間候司馬無因自致青雲上史記范睢傳須賈曰不意君能自致於青雲之上浪説諸公見嗟賞張文潛志無咎之墓云年十三從王安國於常州學官安國名重天下一見公大竒之公從皇考於杭之新城作七迷今端明蘇公試通判杭州讀之嘆曰吾可以閣筆矣延譽公如不及由此名籍甚驥伏鹽車不稱情賈誼弔屈原賦口驥垂兩耳服鹽車兮輕裘肥馬鳯凰城裘馬見論語鳯凰城謂汴京也劉夢得詩南山宿雨晴春入鳯凰城此言長安也建中靖國𥘉陳無巳在館中和謝公定雨行逢賣花云得知春入鳯凰城可見指帝城矣蓋兩人方賜第歸來也臨安雖有鳯凰山趙清獻詩云老來重守鳯凰城然與此不相涉前集詩亦借長安以言汴京歸來作詩謝同列句與桃李爭春榮十年山林廖居士今隨詔書稱舉子文章宏麗學西京新有詩聲似侯喜退之石鼎聮句序云侯喜新有能詩聲君不見古來良為知音難絶弦不為時人彈後漢景丹傳何意二郡良為我來此摘其字揚雄傳解嘲云鍾期死伯牙絶絃破琴而不肯與衆鼓巳喜瓊枝在我側楚詞折瓊枝以繼佩晉衛玠傳珠玉在側覺我形穢更恨桂樹無由攀淮南小山云桂樹叢生兮山之幽偃蹇連蜷兮枝相繚攀援桂枝兮聊淹留千里風期𥘉不隔杜詩風期終破浪獨憐形迹滯河山再次韻呈廖明略吾觀三江五湖口周禮聀方氏揚州其川三江其浸五湖湯湯誰能議升斗湯湯見書莊子外物篇鮒魚對曰君豈有斗升之水而活我耶物誠有之士則然司馬相如諌書曰人誠有之士亦冝然晚得廖子喜往還學如雲夢吞八九子虛賦吞若雲夢者八九文如壯士開黃間李廣傳廣以大黃射其禆將注黃肩弩也黃肩即黃間大黃其大者也十年呻吟江湖上青楓由鷗付心賞選詩心賞猶難恃又懷人去心賞未減北郭漢先生五府交書不到城元注云漢汝南廖扶按本傳州郡公府辟召皆不應時人號為北郭先生相者舉肥驥空老宋玉九辨云今之相者兮舉肥史記滑稽傳諺曰相馬失之瘐相士失之貧山中無人桂自榮楚詞麗桂樹之冬榮君既不能如鍾丗美匭函上書動天子按實録元豐元年十一月乙酉大學生鍾丗美為試校書郎睦州軍事推官大學正以內舍生上書稱首故也又按續通鑑長編云或刻丗美書印賣上批丗美所論有經制四夷等事傳播非便令開封禁之又按九朝通略云元豐二年先是大學生宣城鍾丗美欲上辟雍圗會得假歸寧既還而新學已成因再上書論學校云云又言前二府大臣見於政事其德彌邵而道藝足為後學之師者孰若以提舉大學今乃使之退託於山林無用之地良為可惜丗美所謂大臣蓋指王安石也其後擢丗美為中書習學公事又按黨事始末云建中靖國元年九月乙未詔中書省開具元符三年臣僚姓名正上六人丗美為首又云庚子中書省檢會元符三年宣德郎提舉福建路常平鍾丗美應詔上書當復熙寧元豐紹聖政事以銷天變可贈諌議大夫與一子郊社齊郎鍾丗美何足言山谷蓋戲語也正堪一笑耳而當時用事者之所升黜實係國之興替不可不記也羣書所紀始末皆不詳故具列於此按唐武后垂拱二年三月鑄銅為匭置之朝堂以受天下表疏退之詩匭函朝出開明光且向華隂郡下作參軍要令公怒令公喜晉郤超傳桓溫辟為掾時王珣為溫主簿皆為溫所重府中語曰髯參軍短主簿能令公喜能令公怒超髯珣短故也君不見朝家樂府可𬋩弦前集詩云朝子庿中雅歌自注云無咎樂府於今第一惜無傾城為一彈漢李夫人傳歌曰北方有佳人絶丗而獨立一顧傾人城再顧傾人國從軍輔掾百僚底老杜詩有材無命百僚底九閞虎豹何由攀楚詞招魂云虎豹九閞啄害下人男兒身健事未定且莫著書藏名山杜詩男兒功名遂亦在老大時又云丈夫蓋棺事始定司馬遷書云著書藏之名山傳之其人走答明略適堯民來相約奉謁故篇末及之君不見生不顧為牛後寧為雞口國策蘇素説韓王云鄙語曰寧為雞口不為牛後今西面交臂而事秦何異牛後乎吾聞向來得道人終古不忒如維斗莊子云維斗得之終古不忒終古猶言常也希價咸陽諸少年見盧泉詩注可推令往挽令還異乎汲黯招之不來麾之不去也管子書云推之而往引之而來俗學風波能自拔莊子云俗學以求復其𥘉我識廖侯眉宇間唐元德秀傳見紫芝眉宇使人名利之心都盡莊子云老子謂南榮趎曰吾見汝眉睫之間吾固以得汝矣省庭無人與爭長左隱十一年滕侯薛侯來朝爭長主司得之如受賞大白送人赴選詩云夫子有盛材主司得球琳蕭何傳進賢受上賞東家一笑市盡傾略無下蔡與陽城文選宋玉賦登徒子云臣里之美者莫若臣東家之子嫣然一笑惑陽城迷下蔡傾城見上漢司馬相如傳一坐盡傾生珠之水砂䃯潤生玉之山草木榮荀子曰玉在山而木潤淵生珠而崖不枯陸機文賦云石韞玉而山輝水懷珠而川媚觀君詞章亦如此諒知躬行有君子論語躬行君子則吾未之有得更約探囊閲舊文莊子云胠篋探囊蛛絲燈花助我喜西京雜記蜘蛛集而百事喜杜詩燈花何大喜退之燈花詩更頌將喜事來報主人翁盧同詩一片新茶破鼻香請君速來助我喜賢樂堂前竹影斑好鳥自語莫令彈退之竹徑詩無塵從不掃有鳥莫令彈北鄰著作相勞苦漢張耳傳勞苦如平生歡整駕謁子邀同攀漢王式傳歌􅌐駒注云逸詩篇名客欲去歌之其詞曰􅌐駒在路僕夫整駕應煩下榻煮茶藥文選沈休文詩賔至下塵榻王勃滕王閣記云徐稚下陳蕃之榻坐待月輪銜屋山退之詩每騎屋山下窺瞰答明略併寄無咎可以忘憂唯有酒漢東方朔傳銷憂者莫如酒晉顧榮傳嘗縱酒酣暢曰惟酒可以忘憂但無如作病何耳清聖濁賢皆可口三國徐邈傳平時醉客謂酒清者為聖人濁者為賢人莊子曰其猶柤梨橘柚邪其味相反而皆可於口前日過君飲不多明日解酲無五斗晉劉伶傳一飲一石五斗解酲古木清隂丹井欄大白詩絡緯秋帝金井欄夜來涼月屋頭還論交撥置形骸外淵明詩撥置且莫念一觴聊可揮莊子云申屠嘉兀者也而與鄭子産同師於伯昏無人申屠嘉曰今子與我遊於形骸之內而子索我於形骸之外不亦過乎得意相忘樽爼間氷壷不可與夏蟲饗莊子秋水篇夏蟲不可以語於氷者篤於時也秋月不可與俗士賞已得樽前兩友生更思一士濟陽城雖無四至九卿之規畫汲黯傳姊子司馬安善宦四至九卿猶有千秋萬歲之真榮淵明挽詩千秋萬歲後誰知榮與辱杜詩千秋萬歲名寂寞身後事空名未食大倉米史記平凖書大倉之粟陳陳今作斑衣老萊子斑衣見上卿家嗣宗望尓來不獨我聞足音喜晉阮籍字嗣宗以况堯民堯民蓋無咎諸父行如嗣宗之於阮咸也故其詩云巳得樽前兩友生更思一士濟陽城兩生謂堯民明略而無咎時在濟州濟州其所居也號濟陽郡莊子逃空谷者聞足音跫然而喜西風索寞葉新乾退之秋懷詩霜風侵梧桐衆葉著樹乾長鋏歸來亦罷彈史記孟嘗君傳馮彈其剱而歌曰長鋏歸來乎食無魚窮巷蓬蒿深一丈三輔決録張仲蔚所居蓬蒿沒人朱門廉陛髙難攀賈誼傳故陛九級上廉逺地則堂髙陛亡級亷近地則堂卑吾儕相逢置是事可丗之下仰髙山毛詩髙山仰止再次韻呈明略并寄無咎夏雲涼生土囊口陶潛詩夏雲多竒峯宋玉風賦盛怒於土囊之口周鼎湯盤見科斗禮記有湯之盤銘衛孔悝之鼎銘左傳有正考父鼎銘尚書序云皆科斗文字清風古氣滿眼前乃是户曹報章還只今書生無此語巳在貞元元和間韓愈贊正元和間愈遂以六經之文為諸儒唱一夫鄂鄂獨無望千夫唯唯皆論賞啇鞅傳趙良曰千羊之皮不如一狐之腋千夫之諾諾不如一士之諤諤趙丗家簡子曰吾聞千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舍之鄂鄂是以憂也野人泣血漫相明和氏之璧無連城和璧見上連城見藺相如傳參軍拄笏看雲氣晉王徽之傳為車騎桓沖騎兵參軍沖謂曰卿在府日久比當相料理徽之髙視以手板拄頰云西山朝來致有爽氣耳此中安知枯與榮我夢浮天波萬里扁舟去作鴟夷子史記范蠡浮海自謂鴟夷子兩士風流對酒樽四無人聲鳥聲喜退之履霜操云四無人聲誰與兒語夢回優優仍丗間心如傷弓怯虛彈國䇿曰有雁從東方來更嬴虛發而雁下魏王曰射可至此乎更嬴曰其飛徐其鳴悲飛徐者故瘡痛也鳴悲者失羣也故聞弦音而下不堪市井逐乾沒乾沒見張湯傳且顧朋舊相追攀寄聲小掾篤行李落日東面空雲山趙廣漢傳云亭長寄聲謝我鮑照詩顧尓篤行李再答明略二首挾䇿讀書計糊口莊子問臧奚事則挾册讀書左傳使糊其口於四方故人南箕與北斗詩維南有箕維北有斗言離别江南江北萬重山文選謝靈運詩江南倦歷覽江北曠周旋千里寄書聲不還當時朱弦寫心曲果在髙山深水間禮記清庿之瑟朱弦而疏越秦國風亂我心曲説苑曰伯牙子鼓琴鍾子期聽之方鼓而志在太山子期曰巍二乎若太山少選之間而志在流水子期復曰湯湯乎苦流水子期死伯牙破琴絶弦終身不復鼓琴枯桐滿腹生蛛網忍向時人覔清賞七卷律詩有云忍向時人覓賞音廖侯文字得我驚五嶽縱橫守嚴城萬夫之下不稱屈蕭何傳能詘於一人之下而信於萬乘之上此借使其字定知名滿四海非真榮冨於春秋巳如此曹參傳悼惠王冨於春秋髙五王傳皇帝春秋冨它日卜鄰長兒子一丘各自有林泉扶將白頭親宴喜扶將見上詩稱宴喜者再山谷所引蓋魯頌所謂魯侯宴喜令妻壽豈也秋風日暮衣裳單樂天詩如何為不念馬瘦衣裳單深巷落葉巳如彈數來會面復能幾六龍去人不可攀文選郭景純遊仙詩六龍安可頓運流有代謝注曰六龍日駕也李善曰楚詞云貫鴻以東朅兮維六龍於扶桑王逸曰結轡於扶桑以留日曹子建與吳季重書云思抑六龍之首頓羲和之轡短歌溷公更一和聊乞淮南作小山楚詞有劉安招隱士一首王逸云淮南小山之所作也廖侯言如不出口禮檀弓趙文子其言呐呐然如不出諸其口銓量古今膽如斗莊子銓才諷説之士音義云輇七全切輇量人也蜀志薑維膽大如斗度越崔張與二班崔張謂崔瑗張衡二班謂彪與固也楊雄贊則必度越諸子矣古風蕭蕭筆追還前日辝家來射䇿退之短檠歌大學儒生東魯客二十辝家來射䇿聲名籍甚諸公間陸賈傳名聲籍甚朝錯傳後鄧公其子章顯諸公間華隂白雲鎖千嶂勝日一談誰能賞晉衛玠傳遇有勝日親友時請一言無不咨嗟以為入微君不見曩時子産識然明左襄二十五年晉程鄭卒子産始知然明注前年然明謂程鄭將卒知音鬱鬱閉佳城西漢雜記滕公駕至東都門馬以足跑地得石槨銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室勿以匣中之明月計較糞上之朝榮漢鄒陽傳明月之珠夜光之璧朝榮謂朝菌也莊子音義云朝菌天隂生糞上見日則死文選樂府王明君辝昔為匣中玉今為糞上英我去丘園十年矣種桑可蠶犢生子使年七十今中半山谷年二十三治平四年擢進士第至熙寧丁巳七十將半矣寒山子詩飬得一牸牛生得五犢子犢子又生兒積數無窮巳安能朝四暮三浪憂喜莊子狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆恱據席談經只強顔不安時論取譏彈文選曹子建與楊德祖書僕嘗好人譏彈其文有不善者應時改定愛君草木同臭味頗似瓜葛相依攀左襄八年李武子曰今譬於草木寡君在君君之臭味也又二十二年鄭公孫僑對曰謂我敝邑邇在晉國譬諸吾臭味也瓜葛見上注我有仙方煮白石何時期君藍田山神仙傳白石先生常煮白石為糧杜詩云未試囊中餐玉法明朝且入藍田山李預居長安每羡古人餐玉之法躬往藍田掘得若環璧雜器者百餘椎為屑日服食之見魏書李先傳後次韻感春五首我與子桑友既往雨彌旬莊子曰子輿子桑友而淋雨十日子輿曰子桑殆病矣褁飯而往食之交情未曽改用漢書翟公書門之語而反其意所謂一死一生乃知交情一貴一賤交情乃見天地忽趍新東風無行迹佳氣滿城闉鮑明逺詩嚴車臨逈陌延瞰歷城闉麥苗生陂隴歎息不食陳麥生陵陂見上注左傳不食新矣今巳及麥故云不食陳誰能褁飯來定是寂寞人一曲古流水志在流水見上注試拂絃上塵古木少生意輪囷卧河濵慙愧桃與李相隨見陽春張侯脫朝衣兒褐多純緑禮記深衣具父母衣純以青聞道無米㫪煮术學辟榖神仙傳涓子齊人也好餌术張良傳即導引不食谷注服辟谷藥官吏但索錢退之嗟哉董生行云門外惟有吏日來徴租更索錢詔書哀惸獨小雅苛矣冨人哀此惸獨東方九尺長不得侏儒祿東方朔事見上屋中聲鵝鴈日暮攪心曲退日酬崔十云云有時未朝餐得米日巳晏隔墻聞歡呼衆口極鵝鴈心曲見上注窮巷無桃李緼𫀆非春服見論語我吟白駒詩知君在空谷祁寒不可怨天道自平分書冬祁寒小民亦惟曰怨咨宋玉九辨云皇天平分四時兮切獨悲此凛秋退之詩云皇天平分成四時春風誕謾最可悲及爾春風來四肢有餘溫丈夫力如虎詩簡兮有力如虎為人行灌園鄒陽書於陵仲子辝三公為人灌園椒蘭工壅蔽未可怨芳蓀離騷經云余以葌為可恃兮羌無實而容長椒專侒以慢慆兮榝又欲充夫佩愇又云覽椒蘭其若兹兮又况揭車與江離注云蘭懷王少弟司馬子蘭也椒楚大夫子椒也寒魚守窮轍蒙詬一沫恩莊子泉涸魚相與處於陸相詬以濕相濡以沫窮轍見後篇枯魚注一朝𬒳湔祓吹毛見瘢痕國䇿汙明説春申君曰君獨無湔祓僕也文選廣絶交論云剪拂使其長鳴注云與湔祓同吹毛求疵見前漢中山靖王勝傳君面有瘢美玉可以滅瘢注云瘢瘡痕也見王莽傳鳥聲春漸長煙雨春薄暮風光不長妍如客暫時寓藝藝物爭時老子曰大物藝藝各復歸其根天地有常度東方朔客難曰天有常度地有常形君子有常行我行覩大河黃流日東騖退之感二鳥賦出國門而東鶩喟然欲乘桴見語莽不見洲渚張侯但飲酒無用恨羇旅十年冨貴子今作一丘土文選七哀詩昔為萬乘君今為丘山土茶如鷹瓜拳湯作蟹眼煎時邀草玄客北苑修貢録茶有小芽有中芽小芽者其小如鷹瓜蔡君模茶録云候湯最難未熟則沫浮過熟則茶沉前丗謂之蟹眼者過熟湯也揚雄傳云時雄方草大玄有以自守泊如也晴明坐南軒笑談非丗故嵇康書云丗故繁其慮七不堪也獨立萬物先春風引車馬隱隱何闐闐蜀都賦車馬雷駭轟轟闐闐髙蓋相磨戞騎奴爭道喧史記田仁任安傳曰平陽主家令兩人與騎奴同席而食漢霍光傳兩家奴爭道杜詩瑶池氣鬱律羽林相摩戞吾人撫榮觀宴處自超然老子曰雖有榮觀燕處超然城中百年木有鵲巢其顛鳲鳩來相宅日暮更謀遷書洛誥云召公既相宅詩維鵲有巢維鳩居之聖柬將寓于衛行乞食於齊有可憐之色再次韻感春五首贈之溫氣冰底歸忽忽六過旬易曰過旬災也園林改柯葉禮器云如竹葥之有筠也如松柏之有心也故貫四時而不改柯易葉鳥聲日日新耕稼百年外四郊無短闉曲禮四郊多壘此卿大夫之辱也髙丘試顧望俯仰迹巳陳蘭亭禊飲序云俯仰之間巳為陳迹信陵松鬱鬱不見曩時人史記魏公子無忌封為信陵君大名府即魏也空懷負暄賞列子宋國有田夫謂其妻曰負日之暄人莫知者以獻吾君將有重賞莫望屬車塵司馬相如諌獵書云犯屬車之清塵詩意言雖不忘君而無因自進也腹中書萬卷阽死溝壑濵騷經云阽余身而危死兮漢文紀云阽於危亡注云近邊欲墮之意音簷一音反坫之坫東方朔傳先狗馬填溝壑投壷與射覆一笑物皆春東方朔傳上嘗使諸數家射覆置守宮盂下射之皆不能中朔自贊曰臣嘗受易請射之乃别蓍布封而對曰臣以為龍又無角謂之為蛇又有足跋跋脈脈善緣壁是非守宮即蜥蝪上曰善賜帛十匹復使射他物連中輒賜帛朔平原厭次人厭次今棣州所治縣也與大名相近神異經曰王女投壷天為之笑則為電種萱欲遣憂叢薄空自緑嵇康飬生論云合歡蠲忿萱草忘憂洗心日三省易聖人以此洗心語吾日三省吾身人亦不我穀詩此邦之人不我肯榖誰能書窗下草玄抱幽獨太白詩誰能書閣下白首大玄經抱獨見陶詩白首官不遷校書漢天祿三丗不徙官校書天祿閣見雄傳身當萬户侯見此篇上谷注鼓吹擁部曲解佩著犀渠吳都賦家有鶴膝户有犀渠注鶴膝矛也犀渠楯也張弓插雕服周禮司弓中秋獻矢蔔韓文弓韔服矢插房何時李將軍射獵出上谷李廣傳數從射獵文帝曰令當髙祖時萬户侯何足道哉景帝時為上谷太守春風鳴布榖尓雅鳲鳩鴶鵴注今布谷也杜詩云布谷處處催春種天道似勸分左僖二十一年務穡勸分持飢望路人誰能顔色溫笑憶枯魚説詼諧老􅃮園莊子曰莊周貸粟於監河侯監河侯曰我將得邑金貸子三百金可乎周曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之對曰我東海之波臣君豈有斗升之水而活我哉周曰我且南遊吳越之王激西江之水而迎子可乎鮒魚忿然作色曰吾得斗升之水然活耳君乃言此曽不如索我於枯魚之肆詼諧見東方朔贊􅃮園見上注湘纍不得祿哀怨寫荃蓀楊雄弔屈原文曰因江潭而淮記兮敬弔楚之湘纍千年澗谷松慚愧兩露恩思為萬乘器萬乘器見上注顧掩斧鑿䀶退之詩徒觀斧鑿痕風雨桃李華佳人來何暮後漢廉范傳廉叔度來何暮詩日暮碧雲合佳人殊未耒安齊果未安寓衛豈所寓庾信集中詠懷詩云寓衛非所寓安齊獨未安按左傳晉公子重耳出奔及齊齊桓公妻之有馬二十乘公子安之從者以為不可國風式微黎侯寓于衛張侯室縣磬見上注得酒美無度詩彼其之子美無度常憂腐腸死三國陳思王傳注云丁儀父沖過諸將飲醉爛腸死文選枚乘七發云命曰腐腸之藥須我嫁阿騖三國朱建平傳𥘉荀攸鍾繇相親善攸先亡子幼繇與人書曰吾與公逹曽共使朱建平相建平曰荀君雖少然當以後事付鍾君吾時啁之曰惟當嫁卿阿騖耳何意戲言遂驗乎今欲嫁阿騖使得善處雙魚傳尺素何處迷春渚文選詩客從逺方來遺我雙鯉魚呼童烹鯉魚中有尺素書啼鳥勸不歸曉鞍逐行旅遙知登樓興信美非吾土王粲登樓賦雖信美而非吾土兮曽何足以少留魯公但食粥百口常憂煎顔魯公帖云拙於生事舉家食粥巳數月今又罄竭秪益憂煎惠及少米實濟艱勤金張貴席寵張安丗傳功臣之丗惟有張氏親近貴顯比於外戚劉向傳産祿席大后之寵注席因也奴􅊢乘朱軒鮑照詩奕奕朱軒馳丈夫例寒餓萬丗無後先風霾天作惡詩終風且霾羲之傳輒作數日惡雷亦怒闐闐俄傾花桞靜煙暖谷鳥喧司空圗集戴容州云詩家之景如藍田日暖良玉生煙人事每如此翻覆不常然杜萬事反覆何所無下流多謗議司馬遷答任安書貧下未易居下流多謗議髙位又疾顛國語髙位實疾僨厚味實醋毒空餘壯士志不逐四時遷選詩賞逐四時移山谷外集詩注卷一
