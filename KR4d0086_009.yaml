front:
  text: 山谷外集詩注卷第九
  hash: sha256:fa154a1aa656581cf209cd768b4887e85fa52bef1012ae11ea6e678e41344c70
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_009-1a}
body:
  text: 題落星寺四首四詩非同時作後人類聚於此故詩語有重復不可指其歲月星宫遊空何時落寰宇記落星石在江州廬山東周回一百五步髙丈許著地亦化為寶坊華嚴合論云安立寶坊集諸天人落星寺在彭蠡湖中詩人晝吟山入座醉客夜愕江撼牀蜂房各自開牖戶魏志管輅射覆卦成曰家室倒縣門戶衆多此蜂窠也蟻穴或夢封侯王用異聞集淳于棼夢入大槐安國事見上注不知靑雲梯幾級文選謝靈運詩共登靑雲梯更借瘦藤尋上方見上岩岩正俗先生廬後漢郡國志廬江郡尋陽注云釋慧逺廬山記曰尋陽南濵宫亭湖有匡俗先生者出殷周之際隱遁潛居時人謂其所止為仙人之廬而命焉匡俗字君平潯陽記匡俗先生廬在德化縣南三十里其下宫亭水所都荆州記宫亭即彭蠡澤也北辰九關隔雲雨尓雅北極謂之北辰九關見楚詞南極一星在江湖杜詩南極一星朝北斗相粘蠔山作居室蠔相粘為山見上注竅鑿混沌無完膚莊子應帝王篇倏與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死萬鼓舂撞夜濤湧退之瀧吏詩險惡不可狀船石相舂撞􅌐龍莫睡夫明珠見上落星開士深結屋楞嚴經云并其同伴十六開士杜詩獨在深崖結茅屋龍閣老翁來賦詩元注云寺僧擇隆作宴坐小軒為落星之勝處龍閣老翁當謂李公擇公擇南康軍建昌人廬山亦在南康境內必有賦詠按元祐三年八月丙子御史中丞李常充龍圗直學士其賦詩當在此前而山谷詩當在元祐以後作小雨藏山客坐久莊子大宗師篇藏舟於壑藏山於澤長江接天帆到遲宴寢清香與丗隔韋應物詩宴寢凝清香畫圖妙絶一作絶筆無人知元注云僧隆畫甚冨而寒山拾得畫最妙蜂房各自開户牗處處煮茶藤一枝北風吹倒落星寺吾與伯倫俱醉眠晉劉伶字伯倫以况劉道純螟蛉蜾螺但癡坐劉伶酒德頌云二豪侍側焉如蜾螺之與螟蛉夜寒南北斗垂天元注云戲題落星寺壁時與劉道純俱在玉京軒元注云玉京山在爐峯下落星寺僧開軒對之蒼山其下白玉京五城十二樓史記封禪書方士有言黃帝時為五城十二樓以候神人命曰迎年太白詩云天上白玉京十二樓五城欎儀結鄰常杲杲黃庭經云欎儀結鄰善相保注云欎儀奔日之仙結鄰奔月之仙紫雲黃霧鎖玄關文選王簡栖碑云玄關幽鍵雷驅不祥電揮掃韓文鬼神守護兮呵禁不祥杜詩去秋群胡反不得無電掃上有千年來歸之白鶴續搜神記遼東華表柱有鶴歌曰有鳥有鳥丁令威去家千歲今來歸城郭猶是人民非何不學仙冢纍纍下有萬丗不凋之瑶草江淹香爐峯詩瑶草正翕赩注云玉芝也老杜詩方期拾瑶草野僧雲卧對開軒杜詩雲卧衣裳冷一鉢安巢若飛鳥傳燈録有道吾和尚一鉢歌北風卷沙過夜窗枕底鯨波撼蓬島太白詩白波連山倒蓬壺又云海鯨東蹙百川回箇中即是地行仙但使心間自難老楞嚴經第八卷有十仙種名地行仙其一也過致政屯田劉公隱廬劉煥字凝之筠州人舉進士為潁上令以剛直不屈棄官家于廬山之陽時年五十歐陽公為作廬山髙崇寧元年山谷自荆南經嶽鄂歸洪之分寧遂往袁州萍鄉省其兄元明見於萍鄉廳壁記還至江州與其家相會此詩當是自萍鄉往江州經塗所作蓋凝之家於南康軍也題落星寺四詩必有同此時作者兒時拜公牀後漢馬援傳嘗有疾梁松來候之獨拜牀下又龐公傳注諸葛孔明每至德公家獨拜牀下眼碧眉紫煙祖庭事苑𥘉祖逹磨眼有紺青之色故稱祖曰碧眼舍前架茅茨妒香坐僧禪女奴煮罌粟石盆㵼機泉退之聮句云機㫪潺湲力莊子天地篇鑿木為機後重前輕挈水若抽其名為槹今來掃門巷杜詩三年門巷空竹門翁蛻蟬退之謝自然詩入門無所見冠屨同蟬蛻堂空列五老寰宇記云五老峯在廬山東髙崖突出如五人相逐羅列之狀勝氣失江山石盆爛黃土茅齋薪壞椽女奴為民妻蒿里園漢武五子傳廣陵厲王歌曰蒿里召兮郭門閲注云死人里也當年笑語地華屋轉朱欄曹子建詩生存華屋處課兒種松子傘蓋上參天文選曹子建詩荆棘上參天投䇿數去日木行天再環尚書考靈耀云歲星木精也歲星十二歲一周天自兒時拜公寐至是二十四年矣先生古人風鐵膽石肺肝皮日休稱宋廣平鐵腸石心見日休桃花付序文選曹子建三良詩哀哉傷肺肝眼前不可意壯日挂其冠解衣廬君峯按丗説言逺公在廬山事引豫章舊志曰廬俗字君孝本姓匡夏禹苗裔野王助漢定天下野王亡軍中漢封俗鄢男食邑於兹印曰廬君故丗謂廬山又引逺法師廬山記有匡俗先生廬云云見下注洗耳瀑布源莊子堯讓天下於許由巢父聞之而洗其耳李白廬山瀑布詩云日照香妒生紫煙遙看瀑布挂長川飛流直下三千尺疑是銀河落九天霧豹藏文章驚丗時一斑注見上衆人𥘉昜之久逺乃見難退之答李翶書及之而後知履之而後難耳憶昔子政在為翁數解顔劉向字子政次比道原也道原名恕凝之子列子云老啇始一解顏而笑五兵森武庫晉杜預傳號曰杜武庫言其無所不有也道原博學強記裴楷傳目鍾會云如觀武庫森森但見矛戟在前河漢落舌端莊子第一篇肩吾問於連叔曰吾聞言於接輿吾驚怖其言猶河漢而無極也韓詩外篇君子避三端避文士之筆端避武士之鋒端避辨士之舌端王陽巳冨貴塵冠不肯彈漢書王吉字子陽與貢禹為友丗稱王陽在位貢禹彈冠道原與王介甫有舊介甫欲引道原修三司條例辝不就因言冝恢張堯舜之道不應以財利為先介甫不能用亦未之怒也及吕誨得罪知鄧州道原見介甫曰公所以致人言蓋亦有所未思因為條陳所更法令不合衆心者冝復其舊則議論自息介甫怒遂與之絶道原以親老遂告歸南康乞監酒稅以就飬呻吟刋十史凡例墨新乾道原著十國紀年四十二卷杜預春秋經傳集解序云其發凡以言例皆經國之常制又云修丘明之傳以釋經經之條貫必出於傳傳之義例揔歸諸凡老杜八哀詩贈李雍云各滿深望還森然起凡例宰木忽拱把莊子人間世云宋有荆氏者冝楸柏桑其拱把而上者求狙猴之杙者斬之宰木見上相望風隧寒左傳隱元年頴考叔曰若闕地及泉隧而相見其誰曰不然注云隧若今延道百楹書萬卷少子似翁賢少子謂道純也題杜槃澗叟冥鴻亭按詩中語亭在廬山少陵杜鴻漸頗薰知見香唐杜鴻漸傳以宰相兼成都尹性畏法無他逺略而溺浮啚道畏殺戮釋氏書有解脫知見香風流有諸孫結屋廬山陽藉交遊俠窟獵少年場漢遊俠傳郭解以驅藉友報仇尹賞傳安所求子死桓東少年場光怪驚鄰里收身反摧藏退之詩收身歸關東期不到死迷選詩扶風歌云抱膝獨摧藏江湖拍天流退之詩海氣昏昏水拍天羅網蓋稻梁安能衎衎飽昜漸卦飲食衎衎不素飽也遂欲冥冥翔鴻鴈冥冥見上畏影走萬里不如就隂涼莊子漁父篇人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影不離身不知處隂以休影愚甚矣亭東亭西渺煙水稻田衲子交行李稻田衲見上又按僧祗律云佛住王舍城帝釋石窟前經行見稻田畦畔分明語阿難言過去諸佛衣相如是從今依此作衣相王摩詰詩乞飯從香積裁衣學水田古靈庵下倚寒藤莫向明窗鑽故𥿄古靈禪師云鑽他故𥿄見上注宫亭湖尋陽志江州德化縣東四十五里有彭蠡湖荆州記曰宮亭湖即彭蠡澤又謂之彭澤匯澤左手作圎右手方史記龜策傳人雖賢不能左畫方右畫圎韓非子功名篇右手畫圎左手畫方不能兩成北史儒林傳劉炫少以聰敏見稱強記博識莫與為儔左畫圎右畫方口誦目數耳聽二事同舉無所遺失丗人機敏便可爾一風分送南北舟斟酌鬼神冝有此江津留同濟僧它日求我於宫亭吁嗟人蓋自有口獨為欒公不舉酒神仙傳曰時廬山廟有神於帳中與人言語飲酒能令宫亭湖中分風船行者舉帆相逢欒巴未到數日廟有神不復作聲髙僧傳安清字丗髙自言前身巳經出家有一同學多嗔髙與訣云卿命過當受惡形我若得道必當相度靈帝末行過宫亭湖廟廟甚靈能分風送客商旅三十餘船奉牲求福乃降祝曰船有沙門可呼上髙入廟請神出形乃出大蟒頭不知尾之長短髙向之胡語蟒悲淚如雨須臾還隱後人於山西澤中見一死蟒頭尾數里今潯陽郡蛇村名曰蛇岡山兩事相類故摘其大概兩存之欒公千歲湖冥冥白茅縮酒巫送迎左傳爾貢包茅不入王祭不供無以縮酒朱􅙲皂蓋來託宿杜詩東藩駐皂蓋後漢輿服志中二千石二千石皆皂蓋朱兩􅙲不聽靈吾專此屋雄鴨去隨鷗鳥飛尋陽記曰周訪與商人共入宫亭廟宿明起如厠見一白頭翁訪逐之化為雄鴨還船欲煮之商人爭奪遂飛去老巫莫歌望翁歸貝闕珠宫開水府九歌云紫貝闕兮珠宮靈何為兮水中文選海賦水府之內極深之處雨棟風簾豈來處平生來往湖上舟一官四十巳包羞山谷自言平生來往於此故經行詩難辨其歲月惟一官四十粗可考見山谷生於乙酉至元豐七年甲子恰四十歲時移監德平鎮易比卦六三包羞靈君如願倘可乞録異傳廬陵歐明從賈客道經彭澤湖每以舟中所有投湖中後忽見一人來候明云靑洪君感君前後有禮故要君必有重遺君勿取獨求如願爾明見靑洪君求如願使逐明去如願者青洪君婢也明將歸所願輒得數十年大冨收此桑榆老故丘後漢馮異傳云失之東隅收之桑榆泊大孤山作元注云庚申十二月作庚申蓋元豐三年也是年赴太和有寄李公擇詩序云元豐庚申得邑太和此詩當在宫亭湖詩之前大孤山在德化縣東四十五里大江中匯澤為彭蠡書禹貢東匯澤為彭蠡其容化鯤鵬見莊子第一篇中流擢寒山正色且無朋莊子天之蒼蒼其色正耶詩椒聊碩大無朋退之詩汝豈無朋匹其下蛟龍卧宫譙珠貝層屈原九歌紫貝闕兮珠宫譙城也見上朝雲與莫雨何處會髙陵髙唐賦旦為朝雲莫為行雨不見凌波襪洛神賦凌波微步羅襪生塵靚粧照澄凝上林賦靚粧刻飾退之詩凝澄閟隂嘼空餘血食地猿嘯枯楠藤髙帆駕天來退之詩髙浪駕天輸不盡落葉聚秋蠅幽明異禮樂忠信豈其慿風波浩平陸何况非履氷詩如履薄氷安得曠逹士霜晴嘗一登老杜登慈恩寺塔詩自非曠士懷登慈翻百憂貴池貴池池州所治縣也元注云池人祀昭明為郭西九郎時新覆大舟水死者十二人以為神之威也橫雲𥘉沫􅃮盧同月蝕詩云𥘉既猶朦朧既久如抹􅃮爛漫南紀黑詩滔滔江漢南國之紀老杜八哀詩相國生南紀不見九華峰如與親友隔池州青陽縣有九華山太白改九子山為九華山聮句其序云青陽縣南有九子山山髙數十丈上有九峰按圖徴名無所依據豫乃削其舊號加以九華之目憶當秋景明九老對几席何曽閉蓬窗卧聽寒雨滴不食貴池魚喜尋昭明宅寰宇記貴池在縣北七里按顧野王輿地志云梁昭明太子食此魚美遂立名焉筆硯鼠行塵丗説晉簡文為撫軍時所坐床上塵不聽拂見鼠行迹視以為佳芝菌生銅鬲史記蔡澤傳遇奪釡鬲於塗郭璞曰鼎曲腳音歷詩意謂無祀賽也思成佳句夢貽我錦數尺江淹夢人索錦見上注屬者浪吞舟漢李尋傳屬者頗有變注云近時也莊子云吞舟之魚退之詩黑沙白浪相吞屠風雹更附益論語而附益之老翁哭婦兒相將難再得漢外戚傳佳人難再得此摘其字存亡如日月薄蝕行道失流俗暗本原謂神吐其食左傳僖五年若晉取虞而明德以薦馨香神其吐之乎神理倘有私丘禱久以默見論語大雷口阻風庚寅按同安志大雷口屬舒州望江縣去縣三十里號櫓下滄江避風大雷口天與水模糊杜詩子章髑髏血模糊摘此二字不復知地厚杜詩坡陀因地厚誰家上江船杜詩百丈誰家上水船狂追雪山走孤村無十室杜詩孤村春水生論語十室之邑旅飯困三韭見上黃蘆麋鹿場豳風東山云町疃鹿場此地廣千肘譯梵云二尺成一肘四肘成一弓得離多文章當謂雉也肯顧魚貫桞石鼓文云其魚維何維鱮與鯉何以貫之維楊與栁莽蒼天物悲莊子適莽蒼者三餐而反音義云莽蒼皆平上二音雕弓故在手鹿鳴猶念群小雅􅊯􅊯鹿鳴食野之蘋注云鹿得萍􅊯􅊯然鳴而相呼家語夫子云關睢興於鳥而君子美之取其雌雄之有别鹿鳴興於獸而君子大之取其得食而相呼雉媒竟賣友文選潘安仁射雉賦序云習媒翳之事注曰媒者少飬雉子至長狎人能招引野雉也賣友見漢書酈啇傳贊曰當孝文時天下以酈寄為賣友夫賣友者謂見利而忘義也若寄父為功臣而又執劫雖摧吕祿以安社稷誼存君親可也啇人萬斛船挂席上牛斗杜詩挂席上南斗橫笛倚柁樓晉王廙倚柁樓長嘯神氣甚逸波深蒼龍吼失水不能神楚詞神龍失水而陸居為螻蟻之所裁退之三星行嗟汝牛與斗汝獨不能神伐葭作城守漢髙祖紀閉城城守注謂守其城也龍之自衛亦若守城焉欲寄大雷書鮑明遠文集中有登大雷岸與妹書即此地也太白秋浦寄內云結荷見水宿却寄大雷書往問長干婦古樂府有長干曲李太白有四首其間云十四為君婦羞顔未嘗開文選吳都賦長干延屬注云江東謂岡間為干池州隸江東何當楫迎汝玉臺新詠王獻之桃葉歌桃華復桃葉渡江不用楫但渡無所苦我自迎接汝一作楫迎汝秦淮緑如酒杜牧詩煙籠寒水月籠沙夜泊秦淮寄酒家劉禹錫詩淮水東邊舊時月夜深還過女墻來此金陵五題也按寰宇記秦淮乃秦所鑿在丹陽湖姑孰之界西北流經建康綿亘三百里庚寅乙未猶泊大雷口廣原嘷終風詩終風且霾發怒土囊口宋玉風賦盛怒於土囊之口萬艘萍無根文選吳都賦渾萬艘而既同杜詩舟楫無根蒂乃知積水厚莊子逍遙篇水之積也不厚則負大舟也無力龍鱗火熒熒子虛賦照爛龍鱗鞭笞雷霆走退之詩不如散仙鞭笞鸞鳯終日相追陪杜詩安得鞭雷公公私連檣休森如束春韭倚笻蒹葭灣垂楊欲生肘莊子至樂篇俄而栁生其左肘雄文酬江山惜無韓與栁退之子厚五言呻吟內杜詩作詩呻吟內墨淡字欹傾慚愧陶謝手杜詩焉得思如陶謝手令渠述作與同遊送菜煩鄰船杜詩園官送菜把買魚熟溪友杜詩溪友得錢留白魚兒童報晦冥正晝見箕斗杜詩兒童報急流易豐之九三日中見斗吾方廢書眠史記樂毅贊未嘗不廢書而泣也杜詩老困撥書眠鼻鼾韛囊吼韛韋囊吹火步拜切亦作排魏志韓暨作水排説文云鼾鼻息也音旱退之外集有嘲鼾睡詩二首猶防盜窺家嚴鼓申夜守冶城謝公墩寰宇記升州江寧縣開皇移於冶城唐武德移白下貞觀移還冶城六朝事迹謝安墩在半山報寧寺之後基址尚存太白詩冶城訪古迹猶有謝安墩介甫詩我名公字偶然同我屋公墩在眼中公去我來墩屬我不應墩姓尚隨公人言王介甫性好爭退居猶與謝安爭墩見詩話牛渚蕩子婦寰宇記太平州當塗縣有牛渚山望夫山皆在縣北昔人往楚纍歲不還其妻登此山望夫乃化為石文選古詩昔為倡家女今為蕩子婦蕩子遊不歸空牀難獨守何時快登臨篙師分牛酒文選吳都賦篙工楫師杜詩稽留篙師怒後漢耿弇傳擊牛釃酒乙未移舟出元注云畏風濤復入遂宿焉同行有劉三班善射沙夾遇盜劉手殺三人江湖吞天胸杜牧之詩大江吞天去一練橫坤抹今言江之吞天如人之胸量闊也子虛賦吞若雲夢者八九其於胸中曽不芥蒂吳都賦或吞江而納漢蛟龍垂涎口歐陽公乞致仕表上賴至仁脫臣於蛟鰐垂涎之口飬軀無千金沈約雜詩坐喪千金軀杜詩王孫善保千金軀特為親故厚自言此身不足惜而臨危憂恐為母在故耳本心非華軒選詩金張服貂冕許史乘華軒而與馬爭走荀子云郡子力如馬而不與馬爭走聘婦緝落毛見第四卷再和公擇雜言注教兒耨蔥韭莊子徐無鬼篇食芧栗厭蔥韭衣食端須幾淵明詩衣食當須幾將老猶掣肘此言作邑之難可見自太和移德平經行所作也家語宓子賤為單父宰辭行請君之近史二人與之俱至官令二史書輒掣其肘書不善則怒之二史辭歸魯報於君君太息曰寡人亂宓子之政而責其善者數矣遽發使告宓子曰自今單父非吾有也從子之制宓子得行其志於是單父治焉安能詭隨人曲折作𣏌栁詩民勞云無縱詭隨孟子云以𣏌栁為杯棬桓公甕盎癭見上楚國不龜手莊子第一篇宋人有善為不龜手之藥者客得其方以説吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之今曰楚國恐誤生涯但如此那用託婚友婚友見上久隂快夜晴天文若科斗村南鬼火寒杜詩隂房鬼火青壞道哀湍㵼村北風虎吼野人驅雞豚縛落堅纒守劉郎弓石八猛氣壓馮婦孟子曰晉人有馮婦者善搏虎虎負嵎莫之敢攖望見馮婦趣而迎之馮婦攘臂下車衆皆恱之其為士者笑之一試金僕姑左傳莊十一年公以金僕姑射南宫長万注矢石歸飲軟臂酒大唐稽疑云郭子儀自同州歸代宗詔大臣就宅作軟腳局今挽弓故曰軟臂丙申泊東流縣東流建德二邑皆隸池州元注云語曰東流速客驚動建德前日發大雷真成料虎頭莊子盜跖篇孔子曰丘所謂料虎頭編虎須幾不免虎口哉今日伐鼓出詩采芭伐鼓淵淵棹歌傲陽侯戰國策塞漏舟而輕陽侯之波則舟覆矣屈原哀郢云陵陽侯之汜濫兮忽翶翔之焉薄滄江百折來及此始東流東流會賔客建德椎羊牛野語尚信然小市黃蘆洲唯有采薪翁經營往來舟櫧櫪盡斤斧上林賦沙棠櫟櫧音歷諸山童煙雨愁阻風銅陵銅陵縣亦隸池州唐為銅官縣五代改銅陵頓舟古銅官晝夜風雨黑洪波崩奔去天地無限隔文選魏都賦巖岡潭淵限蠻隔夷船人謹維笮唐韻笮竹索也何暇思挂席見上慿江裂嵌空嵌口銜切太白詠山樽云擁腫寒山木嵌空成酒樽中有暗水滴洞視不敢前潭渾蛟龍宅網師登長鱣賈我腥釜鬲賈誼弔屈賦橫江潭之鱣鯨釡鬲見上斑斑𬒳文章突兀老杜畫鶻行𥘉驚無拘攣何得立突兀喙三尺見莊子言語竟不通噞喁亦何益吳都賦云噞喁浮沉魁梧類長者魁梧竒偉見張良贊杜詩泉出巨魚長比人卒以筌餌得莊子得魚而忘筌注積柴水中使魚依而食一云魚笱莊子魚鱉以江湖為淺而穴其中卒所以得之者餌也浮沉江湖中波友永相失有生甚苦相細大更噉食楞嚴經以人食羊羊死為人人死為羊死死生生互來相噉安得無垢稱對榻忘語默譯梵云維摩羅詰此云淨名又淨無垢稱按維摩經時維摩詰默無言文殊師利歎曰善哉乃至無有文字語言是真入不二法門阻水泊舟竹山下竹山蟲鳥朋友語朋友語如漢衡山王傳乃昆弟語除前隙也討論隂晴怕風雨論語丗叔討論之丁寧相教防禍機杜詩便覺鶯語太丁寧禍機見上草動塵驚忽飛去提壷歸去意甚真提壷見上栁暗花濃亦半春北風幾日銅官縣欲過五松無主人五松山在銅陵西五里金陵今建康府也治上元江寧二縣本楚邑楚威王以其地有王氣埋金以鎮之故曰金陵秦改曰秣陵吳改建業豪士阻江海瓜分域中權戰國策趙語云乘趙之弊而瓜分之唐書瓜分河北地老子域中有四大真人開關梁曽不費一弦開寶七年十月詔曹彬潘美等伐江南所至尅捷十一月以龍船數千艘為浮梁自采石磯以濟大軍八年十一月攻拔升州擒唐國主李煜江南平六朝妙人物吳都秣陵晉元帝渡江復都焉宋齊梁陳皆因之蔓草縈寒煙至今哀江南後周書庾信有哀江南賦一首宋玉招魂篇末云魂兮歸來哀江南庾信蓋取諸此詠歌在漁船窮山虎豹穴磨衲擁髙年謂法秀也按僧寶傳秀住法雲寺神宗遣中使賜香并磨衲青天行日月坐看磨蟻旋見上身將時共晚道與丗相捐莊子繕性篇丗喪道矣道喪丗矣丗與道交相喪也猶能攬壯觀史記封禪書云皇皇哉斯事天下之壯觀巨浸朝百川元注云時秀禪師在鍾山寺秀乃圜通禪師法秀也吕汲公銘其塔云元豐二年王荆公居金陵以禮邀師居鍾山之興國寺興國者公捐私財以治者也寺之事一聽於公而後行師至之日告於衆曰以財營寺則冝歸王氏以寺聽命則冝歸老僧一日公以所著佛書解義示師師曰文章之妙所不敢議然不可以智知殆非義學所能盡也公滋不恱師遂棄去按元豐二年歲巳未而山谷此行蓋三年庚申歲時秀師正在金陵莊子大浸稽天而不溺元祐間和東坡送李方叔詩又用此語云君看巨浸朝百川十月十三日泊舟白沙江口元注云真州唐永正縣之白沙鎮岸江倚帆檣見已專北風權飛霜挾月下西京雜記淮南王著鴻烈自云字中皆挾風霜百笮直如絃後漢末謡言直如弦死道邊摘其字以言引竹索纜船如弦直退之聮句云浮橋交萬笮渌水去清夜黃蘆搖白煙篙人持更柝易重門擊拆相語聞並船平生濯纓心滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足見於孟子離婁篇又見於文選屈原所作漁父篇鷗鳥共忘年言與鷗鳥為忘年之友也南史江揔傳張纘等雅相推重為忘年交風次落塵網歲星奔回旋歲星十二歲一周天險艱自得力左傳言晉文公險阻艱難備嘗之矣此其所以霸也故云得力孟子所謂生於憂患死於安樂也細故可棄捐漢文帝與胸奴書朕與單于皆捐細故俱蹈大道至令夢洶洶呼禹濟黃川元注云河出崑崙墟色白所渠并千七百一川黃色見爾雅釋水登白沙口次長蘆篙師救首尾孫子善用兵者如常山之蛇擊其首則尾至擊其尾則首至擊其中則首尾俱至我為制中權左傳宣十二年中權後徑挂席滿風力杜詩挂席窮海島如椎強弩絃曉放白沙口長蘆見炊煙一葉託秋雨滄江百尺船反觀丗風波誰能保長年杜詩冉冉征塗間誰是長年者念昔聲利區鮑明逺詩三川飬聲利與丗闕周旋大道甚間暇大道甚夷見上百物不廢捐易繫辭下云其道甚大百物不廢懼以終始其要無咎此之謂易之道也誰知目力淨改觀舊山川維摩經目淨修廣如青蓮孟郊詩親賔改舊觀阻風入長蘆寺長蘆寺屬真州福公開百室周頌云以開百窒按續燈録真州長蘆崇福禪院祖印禪師諱智福江州人四處住持勝緣畢集三十年間衆盈五百不借鄰國權法筵森龍象傳燈録逹磨傳云波羅提法中龍象智度論曰龍象言力大龍水中行力大象陸中行力大負荷大法者比之龍象天樂下管絃老杜道林嶽麓二寺詩云六時天樂朝香煙我來雨花地楞嚴經云即時天雨百寶蓮華青黃赤白間錯紛糅依舊薰爐煙金碧動江水子虛賦其土則錫碧金銀注云碧謂玉之青白色者也杜詩云潤聚金碧氣鍾魚到客船茗碗洗昏著退之詩茗碗鑯鑯捧經行數徂年歲寒風落山故鄉喜言旋左傳昭元年風落山謂之蠱小雅黃鳥云言旋言歸林回負赤子白璧乃可捐見上侍親如履氷意取孝經第三章云如臨深淵如履薄氷風雨渺暗川次韻伯氏長蘆寺下風從落帆休天與大江平僧坊晝亦靜鍾磬寒逾清淹留屬暇日植杖數連甍歸去來詞云或植杖而耘耔字本出論語頗與幽子逢退之詩幽子頗不無煮茗當酒傾携手霜木末朱欄見潮生檣移永正縣見泊舟白沙口題下注鳥度建康城薪者得樹雞退之有答道士寄樹雞詩云軟濕青黃狀可猜欲烹還喚木盤回煩君自入華陽洞直割乖龍左耳來東坡和陶詩黃嵩飬士羔者楮生樹雞未忍便烹煮繞觀日百回羮盂味南烹退之𥘉南食詩自冝味南烹香粳炊白玉退之聮句庖霜鱠玄鯽白玉次香粳飽飯愧間行叢祠思歸樂吟弄夕陽明思歸誠獨樂薇蕨漸春榮漢陳勝傳注叢祠謂草木岑蔚者元稹謫江陵有思歸樂詩云山中思歸樂盡作思歸鳴應緣此山路自古離人征云云白居易和云山中不棲鳥夜半聲嚶嚶似道東歸樂行人掩泣聽陶嶽零陵記云思歸樂狀如鳩而慘色三月則鳴其音云不如歸去别蔣頴叔蔣之竒字頴叔新法行為福建運判遷淮東運副母喪服除為江西運副改河北入奏計神宗奬喻之移陜西官制行移淮南轉運使擢江淮荆浙等路發運副使元豐六年五月奏計神宗勞問甚備賜三品服此據實録也此詩云三品衣魚人仰首當是六年以後作山谷移監德平鎮過泗州僧伽塔作發願文時元豐七年三月也别將頴叔當是此時金城千里要人豪張良傳此所謂金城千里天府之國理君亂絲須孟勞北史齊文宣帝紀神武嘗使諸子各理亂絲文宣獨抽刀斬之曰亂者當斬老杜大食刀歌云得君亂絲與君理孟勞者魯之寶刀也見穀梁僖元年文星合在天東壁杜詩北斗避文星晉天文志東壁二星主文章天子圖書之祕府也清都紫微醉雲璈列子曰穆王以為清都紫微鈞天廣樂帝之所居漢武帝內傳上元夫人自彈雲琳之璈荆溪居士傲軒冕胸吞雲夢如秋毫見上三品衣魚人仰首見題下注不見全牛可下刀見上秦川渭水森長戟言為陜西轉運也續本事詩韋蟾題驛亭云渭水秦川豁眼明方壷蓬萊冠巨鼇列子無底之谷有五山曰岱輿貟嶠方壷瀛洲蓬萊五山之根無所連著帝使巨鼇十五舉首而戴之五山始峙而不動詩意言其負荷重也萬釘寶帶雕狨席隋楊素傳賜萬釘寶帶國朝侍從跨狨鞍獻納論思近赭𫀆文選兩都賦序云朝夕論思日月獻納唐王建詩曰日色赭𫀆相似不著紅鸞扇遮連營貔虎湛如水開盡西河擁節旄謂移陜西漕也時巳復河湟何時出入諸公間漢鼂錯傳云顯諸公間淮湖閲船今二毛左傳不擒二毛鑿渠決策與天合頴叔在淮南始鑿泗州股渠以避長淮之險舟行自是無覆溺下詔褒賞之祈窘束縮怒濤異聞集載古嶽瀆經云禹治水至桐柏山獲淮渦水神曰巫之祁善應對辨淮之淺深源之逺近禹鎖于龜山之足淮乃安流至唐有漁者釣得一古鎖牽出其末有獼猴即支祁也衣食京師看上計漢武紀令與計偕注計者上計簿使也陛下文武收英髦退之詩三公盡是知哲人曷不薦賢陛下聖春風淮月動清鑒白拂羽扇隨輕舠詩誰謂河廣曽不容刀注小船曰刀下榻見賢傾禮數陳蕃下榻詳見上王勃滕王閣記云徐孺下陳蕃之榻後車載士回風騷文選魏文帝與吳質書云從者鳴笳以啓路文學託乘於後車斫鼻於郢郢人堊漫其鼻端使匠石斫之巳見上注又按楊子雲解難云鍾期死百牙絶紘破琴而不肯與俗人彈􅚽人亡則匠石輟斤而不敢妄斫服􅐚曰􅚽古之善塗墍者也施廣領大袖以仰塗而領袖不汙有小飛泥誤著其鼻因今匠石揮斤而斫知匠石之善斫也師古曰墍即今之仰泥也􅚽抆拭也故謂塗者為􅚽人􅚽乃髙反又音乃回反此假與莊子意同而事異又非寓言山谷喜用斫鼻事故具列之觀魚於濠濠梁見上小夫閲人蓋多矣唐房玄齡傳髙孝基曰僕觀人多矣未有如此郎者漢蓋寬饒傳此如傳舍所閲多矣幾成季咸三見逃莊子應帝王篇鄭有神巫曰季咸知人之死生禍福若神列子與之見壷子出曰子之先生死矣列子入涕泣以告壷子壷子曰是殆見吾杜德機也嘗又與來明日又與之見壷子出曰幸矣子之先生遇我也有瘳矣列子入以告壷子壷子曰是殆見吾善者機也嘗又與來明日又與之見壷子出曰子之先生不齊吾無得而見焉列子入以告壷子壷子曰是殆見吾衡氣機也嘗又與來明日又與之見壷子立未定自失而走贈别李端叔李之儀字端叔姑孰人舉進士元祐中為樞密院編修官東坡帥定武辟置幕下我觀江南山如目不受垢憶食江南薇子獨於我厚在北思江山如懷冰雪顔杜詩試看他時氷雪容千峯上雲雨列子周穆王篇化人之宫出雲雨之上岑絶何由攀當時喜文章各有兒子氣漢髙五王傳朱虛侯章嘗入侍燕飲髙后兒子畜之爾來頷須白有兒能拜起史記三王丗家皇子賴天能勝衣趨拜蜀志伊籍傳一拜一起未足為勞讀書洗湖海解意開春冰老子云渙若冰將釋成山更崇堀論語譬如為山未成一簣止吾止也顧我醜丘陵醜類也白玉著石中與物太落落老子不欲琭琭如玉落落如石涇渭相將流丗不名清濁文選曹子建詩山峰髙無極涇渭揚濁清注引毛萇詩注云涇渭相入而清濁異乞言既不易贈言良獨難晉桓伊傳為君既不易為臣良獨難古來得道人挂舌屋壁間牧羊金華道載酒太玄宅兩事見上支頥聽晤語陳國風云可與晤語傳燈録天台丰干禪師傳居國清寺厨中有二苦行寒山拾得二人執㸑終日晤語潛聽者都不解獨與師相親願君喙三尺見上我行風雨夜船窗聞遠雞故人不可見故人心可知汴岸置酒贈黃十七與後篇曉放汴舟同時作吾宗端居藂百憂長歌勸之肯出遊一作百文暮卷篙人休侵星爭前猶幾舟黃流不解涴明月碧樹為我生涼秋杜詩寒蟬碧樹秋𥘉平群羊置莫問叔度千頃醉即休一作詩吟吾黨夜來作酒買田翁社後篘黃𥘉平見上後漢黃憲字叔度郭林宗曰叔度汪汪若千頃陂黃𥘉平亦作黃山谷多用此事按楊文公談苑金華山乃黃𥘉平叱石之地有石如羊形者人爭求以為玩好有內侍掌市征於婺州輟巳俸募人求得耳角尾足皆具如真羊者數枚歸闕獻之太祖曰此墓田中物也杖其內侍神仙之説固多渺茫而黃𥘉平事信而有證此其彰彰者也誰倚柁樓次玉笛見上斗杓寒挂屋山頭見上王立之詩話山谷謂洪龜父云甥愛老舅何等篇龜父舉蜂房各自開户牗蟻穴或夢封侯王及黃流不解涴明月碧樹為我生涼秋深類老杜退之詩每騎屋山下窺瞰曉放汴舟山谷罷北京教授入京改京官得知吉州太和縣其秋自汴京歸江南實元豐三年秋聲滿山河行李在梁宋梁即汴京宋即南京川塗事雞鳴淵明詩目倦川塗異心念山澤居文選謝靈運詩豈伊川塗異注云周禮兩山之間必有川焉大川之間必有塗焉身亦逐羣動淵明詩云日入羣動息歸鳥趍林鳴霜清魚下流橘柚入包貢禹貢揚州厥包橘柚錫貢又持三十口去作江南夢杜詩兩京三十口雖在命如絲次盱眙同前韻盱眙泗州所治縣也紹興十二年升盱眙為軍以天長招信屬焉去此二十年持家西過宋起豫者白鷗論語起豫者商也歸興岌飛動宫殿明寶坊見上山川開禹貢破浪一帆風更占夢中夢南史宗慤傳願乘長風破萬里浪莊子齊物篇方其夢也不知其夢也夢之中又占夢焉外舅孫莘老守蘇州留詩斗野亭庚申十月庭堅和庚申元豐三年也謝公所築埭未歎曲池平晉謝安傳至新城築埭於城北後人追思之名為召伯埭在今揚州廣陵縣雍門周以琴見孟嘗君曰君百歲之後髙臺既巳傾曲池又巳平文選沈休文詩貴賤猶如此况乃曲池平蘇州來賦詩句與秋氣淸僧構擅空闊浮光飛棟甍杜詩江闊浮髙棟維斗天司南莊子維斗得之終古不忒漢天文志斗為帝車古有司南車也其下百瀆傾貝宫産明月含澤遍諸生槃礴淮海間解衣槃礴見莊子風煙侵十城屈原九歌云紫貝闕兮珠宫明月謂明月之珠也沈存中筆談云嘉祐中楊州有一珠甚大天晦多見𥘉出於天長縣陂澤中後轉入甓社湖後又在新開湖中九十餘年常常見之又文昌雜録云孫華老莊居在髙郵新開湖邊一夕莊客報湖中珠見因至水際光明如月忽見蚌蛤如蘆席大一殼浮水上一殼如張帆狀其疾如風飛小艇逐之不可及今以珠比莘老也元祐三年莘老丐祠得請山谷贈詩亦以珠為喻云甓社湖中有明月淮南草木借光輝籟簫吹木末通典樂門凡簫一名籟杜詩我僕猶木末浪波沸庖烹退之詩還家勑妻兒具此煎炮烹此用其字我來杪搖落霜清見魚行白鷗逺飛來得我若眼明杜詩二月六夜春水生門前小灘渾欲平鸕鷀溪鷘莫漫喜吾與汝曹俱眼明佳人歸何時解衣繞廂榮上林賦偓佺之倫暴於南榮注云屋南簷也佳人謂莘老也莘老在熙豐間以言事屢黜自蘇州徙福州徐州時猶未召還也歸何時者望其歸故里也題大雲倉逹觀臺二首池州泝流四十里至北岸蔣家沙又四十里至大雲食按同安志此詩注云大雲倉即今樅陽鎮去舒州一百四十里又云逹觀臺在樅陽鎮東永利寺載郎臺上鏡面平同安志獨無戴郎臺疑是流俗所呼山谷始昜名取賈誼賦逹人大觀也戴郎當是戴將軍將軍名珦仕南唐時多寇盜乃與鄉鄰嚴武備盜不敢犯死後鄉人祠之廟在樅陽鎮石鼎聮句下與鏡面平逹人大觀因我名逹人大觀見上何時燕爵賀新屋淮南子云大厦成而燕雀相賀湯沐具而蟣虱相弔喚取竹枝歌月明劉夢得竹枝詞引云余來建平里中兒聮歌竹枝吹短笛擊鼓以赴莭音中黃鍾之羽瘦藤拄到風煙上乞與遊人眼豁開不知眼界闊多少白鳥飛盡靑天回多心經無眼界無意識界山谷外集詩注卷之九
