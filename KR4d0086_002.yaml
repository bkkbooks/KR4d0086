  text: 山谷外集詩注卷第二
  hash: sha256:31d621c51c4c9687ac0809283ca46be6bd38c86fbcdc736e7b7afd29defa9bfc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_002-1a}
body:
  text: 古詩謝張泰伯惠黃雀鮓去家十二年黃雀慳下筯晉何曾傳日食萬錢猶曰無下筯處笑開張侯盤湯餅始有助束晳餅賦云湯餅為最蜀王煎藙法醢以羊彘兔自注云俗謂亥卯未餛飩內則三牲用藙注云藙煎茱茰也正義曰賀氏云今蜀郡作之三牲牛羊豕麥餅薄於紙􅍭漿和醎俗鹹字酢秋霜落埸穀詩云食我埸穀一一挾繭絮東坡詩披綿黃雀謾多脂飛飛蒿艾間入網輒萬數烹煎冝老稚罌缶煩愛護南包解京師老杜北征詩粉黛亦解包至尊所珍御文選西京賦侈靡踰乎至尊退之李花詩冰盤夏薦碧實脆斥去不御慙其花此御字之意玉盤登百十睥睨輕桂蠧漢陸賈傳尉他獻桂蠧二器注桂蠧桂樹蠧蟲五侯噦豢豹西漢雜記婁護傳會五侯間競致竒膳護合以為鯖丗稱五侯鯖文選枚叔七發云山梁之餐豢豹之胎退之南山詩思想甚􅍭噦見謂美無度見詩瀕河飯食漿瓜𦵔巳佳茹漢食貨志菜茹有畦誰言風沙中鄉味入供具漢荆王劉澤傳請張卿臨親修具注曰具供具也又敘傳云迎延滿堂日為供具坐令親饌甘更使客得與郭林宗傳茅容殺雞為饌林宗謂為巳設既而以供母自以草𬞞與客同飯山谷用此意而反其詞蒲隂雖窮僻蒲隂祁州所治縣也張泰伯官於此勉作三年住願公且安樂分寄尚能屢次韻謝子髙讀淵明傳枯木嵌空微暗淡老杜詩云嵌空大始雪嵌丘銜切古器雖在無古絃晉陶潛傳蓄素琴一張弦徽不具每朋酒之會則撫而和之曰但識琴中趣何勞弦上聲袖中政有南風手誰為聽之難為傳南風手謂舜作五弦之琴以歌南風司馬遷答任安書云諺曰誰為為之孰為聽之蓋鍾子期死伯牙終身不鼓風流豈落正始後晉衛玠傳不意永嘉之末復聞正始之音甲子不數義熙前南史陶潛傳所著文章義熙以前明書年號永𥘉以來惟云甲子一軒黃菊平生事無酒令人意缺然淵明九日時序云秋菊盈園而時醪靡至莊子吾自視缺然奉答子髙見贈十韻桞徑雨著綿竹齋風隕籜詩十月隕籜屏處人事少漢竇嬰傳謝病屏居南山下晴餘鳥聲樂左傳鳥烏之聲樂詩卷墯我前謂從天上落君有古人風詩如古人作魏志毛玠傳云大祖以素屏風素慿几賜玠曰君有古人之風故賜君以古人之服簞瓢謝膏梁簞飄見語孟子云所以不願人之膏梁之味也注膏梁細粱如膏者也翰墨化糟粕莊子曰桓公讀書於堂上輪扁斫輪於堂下問桓公曰敢問公之所讀者何言耶公曰聖人之言也曰聖人在乎公曰巳死矣曰然則孔之所讀者古人之糟粕而已誤蒙東海觀吾淺乃可酌真成聞道百自謂莫巳若杜詩真成浪出遊莊子云秋水時至兩涘渚涯之間不辨牛馬河伯欣然自喜順流而行至于北海東面而望不見水端河伯歎曰野語有之聞道百以為莫巳若者我之謂也謝生石藴玉陸機文賦云石韞玉而山輝志尚本丘壑雖無首陽粟飲水亦不惡史記伯夷叔齊傳二人義不食周粟餓死於首陽山晉謝道藴傳王郎逸少子不惡跫然何時來為我一發藥莊子曰列子謂伯昏瞀人曰先生既來曽不發藥乎跫然見上次韻孔著作早行棄置鉏犂就車馬選詩棄置勿重陳退之詩起身自犂鉏從來計出古人下退之詩之罘别我去計出柏馬下塵埃好在三尺桐不疑萬丗期子野琴操曰琴長三尺六寸六分象三百六十六日左傳昭八年石言于晉魏榆晉侯問於師曠對曰云云叔向曰子野之言君子哉注云子野師曠字晉成公綏琴賦云伯牙彈而駟馬仰秣子野揮而玄鶴鳴明經使者著書郎風雨乘馹忘夙夜左傳昭五年楚子以馹至於羅汭注馹傳也回車過門問無恙退之書云問無恙外不睱出一言何意深巷勤長者陳平傳家乃負郭窮巷以席為門然門多長者車轍聖師之後蓋多賢左昭七年吾聞將有逹者曰孔丘聖人之後也領略丗故有餘暇選詩領略歸一致又云丗故尚未夷白而長身雖不見好古發憤尚類也韓文孔戣墓志曰孔丗三十八吾見其孫白而長身寡笑與言其尚類也語信而好古又發憤忘食自然身好警露鶴李義山詩鶴應聞露警蜂亦為花忙每先鳴雞整𥘉駕選詩整駕肅時命北行河決所至郡此詩先言明經使者又言北行河決蓋比之漢平當也平當傳云以明經為博士又云以經明禹貢使行河行下更反肅肅王命哀鰥寡詩肅肅王命仲山甫將之力排滹沱避城郭後漢王霸傳光武南馳至下曲傳聞王郎兵在後及至呼沱河令霸往視之霸詭曰冰堅可渡下曲陽漢屬巨鹿郡今入祁州北城縣呼沱所在於此可見深澤疲民且田舍賈生三䇿藏胸中漢溝洫志賈讓奏言治河有上中下三䇿羿矢百中不虛捨羿射官也南宫適云羿善射孟子云逢蒙學射於羿此堯以前羿也寒浞虞羿于田殺而烹之此有窮后羿也詩云捨矢如破周紀飬由基去桞葉百步而射之百發而百中行歸定拜閞內侯但賜黃金恐非價平當傳又云至丞相以冬月賜爵閞內侯注云以冬月非封侯時且先賜爵也非價謂功大賞輕如市物之不當價次韻無咎閻子常携琴入村士寒餓古猶今列子曰五情好惡古猶今也四躰安危古猶今也丗事苦樂古猶今也變易治亂古猶今也向來亦有子桑琴莊子云子輿與子桑友而淋雨十日子輿曰子桑殆病矣褁飯而往食之至子桑門則若歌若哭鼓琴曰父耶母耶天乎人乎有不任其聲倚楹嘨歌非寓淫列女傳曰魯􅃮室女倚柱而嘨鄰人婦曰子欲嫁乎女曰吾憂魯君老而大子少也伯牙山髙水深深見上萬丗丘壟一知音即前篇不疑萬丗期子野閻君七絃抱幽獨見上朝子為之梁父吟粱父吟云步出城東門遙望蕩隂里里中有三墳纍纍正相似問是誰家墳田疆古冶氏力能排南山文可絶地紀一朝𬒳讒言二桃殺三士誰能為此謀相國齊晏子嘗見山谷寫此詩且跋云陳壽敘武侯躬耕隴畒好為梁父吟語勢既不盡其意又失載此詩此蓋好簡之過余觀武侯此詩乃以曹公專國殺楊修孔融荀彧耳既作此詩時時為客歌之故云尓乎天寒絡緯悲向壁謂蟋蟀居壁也蟋蟀一名絡緯見炙轂子雜録秋髙風露聲入林冷絲枯木拂蛛網十指乃能寫人心村村擊鼓如鳴鼉李斯書云建翠鳯之旗樹靈鼉之鼓豆田見角穀成螺晉石崇及衛􅗕傳皆言飯化為螺此借用以言穀成殼歲豐寒士亦把酒滿眼飣餖梨棗多退之詩飣餖魚菜贍朝家公子屢經過笑談與丗殊臼科退之石鼓歌為我度量掘臼科文章落落映朝董詩句往往妙隂何隂鏗何遜也杜詩頗學隂何苦用心閻夫子勿謂知人難使琴抑怨久不和明光晝開九門肅漢武帝大𥘉四年起明光宫師古曰三輔黃圖云在城中老杜詩汝翁草明光不令髙才牛下歌琴操曰寧戚飯牛車下叩牛角而啇歌曰南山粲白石爛生不􅑮堯與舜禪短布單衣才至骭長夜漫漫何時旦齊桓公聞之舉以為相贈答朝次膺次膺豪健如霜鶻空拳誤挂田犬牙漢李陵傳士張空拳音絭杜詩霜鶻不空拳山谷用少陵語當音權果輸司空城旦作漢轅固傳大后怒曰安得司空城旦書乎按刑法志云安為城旦舂付與步兵厨人家晉阮籍傳籍聞步兵厨營人善釀酒野馬橫郊作疑水莊子野馬也牽牛引竹上寒花無酒醉公不甚惜誦公五字使人嗟春遊終日桃李蹊李廣贊桃李不言下自成蹊春風不相識大白詩春風不相識何事入羅愇同我二三子承我作意力把酒忘味著看花了香寂楞嚴經云香嚴童子白佛言見諸比丘燒沉水香香氣寂然來入鼻中晴雲散長空曠蕩無限隔杜詩是身如浮雲安可限南北南都賦上平衍而曠蕩身為胡蝶夢見上本自不漁色禮坊記諸侯不下漁色春蟲勸人歸謂杜鵑今我誠是客淵明詩家為逆旅舍我如當去客文選詩人生天地間忽如逺行客歎逝賦云託末契於後生余將老而為客歸來翻故𥿄書尾見麟獲傳燈録古靈禪師傳其師在窗下看經蜂子投窗紙求出師曰丗界如許廣闊不肯出鑽他故紙驢年去此用其字左哀十有四年春西狩獲麟注云春秋絶筆於獲麟之一句文字非我名聊取二三䇿樂天詩黃𥿄除書非我名孟子武城取二三䇿同堯民遊靈源廖獻臣置酒用馬陵二字賦詩靈源廟前木我昔見拱把外集刪去詩中有會靈源廟下池亭詩云繫馬著桞堤置酒臨魏城魏即北京也孟子拱把之桐梓注拱合兩手也把以手把之也七年身屢到􅓹鬱蔭簷瓦退之聮句云紅皺曬簷瓦春風響馬銜文選海賦云海童邀路馬銜當蹊此借用以言馬口銜勒也並轡客瀟灑更願少尹賢置酒意傾寫齋堂有佳處花柳輕婭姹樽前集和凝詞云婭姹含情嬌不語蓮塘想舊葉稻畦識枯苴莊子曰其土苴以治天下釋文云土苴如糞草也開閞撫洪河黃流極天㵼憶昔武皇來繫璧沉白馬從官親土石襁負至鰥寡空餘瓠子詩哀怨逼騷雅漢溝洫志云孝武元光中河決於瓠子東南注巨野發卒數万人塞瓠子決河於是上以用事万里沙還自臨決河湛白馬玉璧令群臣從官自將軍以下皆負薪置決河上既臨河決悼功之不成乃作歌曰瓠子決兮將奈何云云白圭自聖禹今誰定真假孟子云白圭曰丹之治水也愈於禹孟子曰子過矣禹之治水云云退之詩古聲久埋滅無由見真濫朝子發讜言文選東都賦讜言引説注美言也音黨漢書敘傳上曰吾久不見班生今日復聞讜言注善言也聖功諒難亜排河著地中勢必千里下移民就寬間何地不耕稼此論似太髙張釋之傳卑之無甚髙論吾亦茫取舍有器可深川吾未之學也溝志云賈讓奏言治河有上中下三策今行上策徙兾州之民當水衝者決黎陽遮害亭放河入海河西簿太山東薄金堤藝不能逺泛濫期月自定今瀕河十郡治堤歲費且萬萬及其大決所殘無數如出數年治河之費以業所徙之民且以大漢方制萬里豈其與水爭咫尺之地哉此功一立河定民安千載無患故謂之上策禹貢隨山濬川注謂深其流此語蓋指時事按實録且參以諸書其大要云元豐元年知制誥熊本分司西京判大名府文彥博放罪𥘉選人李公義請為鐡龍瓜內侍黃懷信以為未盡更作濬川把謂禹所用濬川者也時王安石為相信其説乃置為濬川司以都水監丞范子淵制之既而子淵奏功未賞乃言疏導水勢悉歸故道出民田數萬頃朝廷下大名府保奏文彥博言小臣興利誣罔詔本行視坐附會彥博報不以實故謫洪河壯觀遊桞子厚天説云築為墻垣城郭臺謝觀遊又槖郭駝傳云長安豪冨人為遊觀又永州新堂記云乃作棟宇以為觀遊太府佳友朋春色挽我出東風如引繩退之張中丞傳後敘云引繩而絶之其絶必有處昏昏版築氣退之詩海氣昏昏水拍天孟子傳説舉於版築王事始繁興大堤如連山退之詩花艷大堤倡小堤如岡陵詩如岡如陵增卑更培薄賈讓又云若乃繕完故堤增卑培薄勞費無巳此最下䇿也萬杵何登登見詩憶昨河失道平原魚可罾漢陳勝傳置人所罾魚腹中退之詩有蛟寒可罾田萊人未復詩楚茨序田萊多荒注云田廢生草曰萊瘡大國方懲忽念耒耜間為民保丘塍百縣伐鼛出周禮鼓人以鼛鼓鼓役事夜半廢曲肱見語吾儕愧祿廪遊衍事鞍乘詩昊天曰旦及尓遊衍朝子漢公孫新去司馬丞出幹大農部漢食貨志桑弘羊請置大農部丞數十人分部主郡國才術見嗟稱鮑明逺白頭吟云周王日淪惑漢帝益嗟稱我坐廣文舍七年讀書燈結髮入埸屋肯謂河難慿語暴虎慿河尓來觸事短癡甚霜前蠅退之詩癡如遇寒蠅丗味極淡薄退之詩我老丗味薄不了人􅋢憎唯得一巵酒尚能别淄澠淮南子曰淄澠之水合易牙嘗而知之列子亦云水經曰淄水出泰山萊蕪縣原山澠水出營丘城東丗謂之漢湊水入于時水所以對樽爼未曽問斗升杜詩仍嗔問升斗酌我良巳多狂言恐侵陵漢蓋寬饒傳許伯入第丞相御史將軍中二千石皆賀寬饒不行許伯請之乃往許伯自酌曰蓋君後至寬饒曰無多酌我我乃酒狂丞相魏侯笑曰次公醒而狂何必酒也禮記經解倍畔侵陵之敗起矣漢李廣傳廣三子曰當戶椒敢敢男禹與侍中貴人飲侵陵之莫敢應暮雲吞落日歸鳥求其朋詩嚶其鳴矣求其友聲冷官僕馬瘦及門鼓騰騰杜詩廣文先生官獨冷退之詩擊鼓騰騰樹赤旗奉和王丗弼寄上七兄先生用其韻宫槐弄黃黃退之詩黃黃蕪菁花蓮葉緑婉婉退之元和聖德詩婉婉弱子今以新荷嫩緑也時同二三友竹軒涼夏晚駕言都城南太名府北京也故言都城以望征車返何知苦淹回及此秋景短愁思令人瘦文選古詩思君令人瘦杜逺遊令人瘦舉目道路逺西風脫一葉文選月賦洞庭始波木葉微脫杜詩風雨秋一葉薦士聞鄉選𬒳檄試鄉舉進士也簡書催渡河詩畏此簡書賔客不得展檀弓展墓而入注云展省視之親憂對萱叢詩焉得諼草言樹之背毛云諼草令人忘憂背北堂也釋音云諼本作萱嵇康飬生論合歡蠲忿萱草忘憂婦病廢巾盥內則婦事舅姑進盥少者奉槃長者奉水請沃盥盥卒授巾言趍厭次城厭次見上鞭馬倦長阪文選曹子建詩秋蘭𬒳長坂又陸韓鄉詩駿足思長阪棗林蔽天日交隂不容繖仰看實離離憶見花纂纂文選笙賦云詠園桃之夭夭歌棗下之纂纂歌曰棗下纂纂朱實離離宛其落矣化為枯枝注云古咄喑歌曰棗下何攢攢榮華各有時棗𥘉欲赤時人從四邊來棗適今日賜誰當仰視之異鄉懷節物不共斟酒盞舉埸下馬入深鎖嚴鑰𬋩諸生所程書捃束若秸稈後漢范丹傳捃拾自資禹貢三百里納秸服注秸藁也釋文秸本作秸工八反蜜燈坐回環庾信集中有燈賦云香燈燃蜜氣雜燒蘭桞子厚詩回環驅萬象丹硯精料柬披榛拔芝蘭文選趙景珍書披榛覔路斷石收琰琬上林賦朝采琬琰和氏出焉紛爭一日事聲實溷端窽六家指要其實中其聲者謂之端實不中其聲者謂之窽天球或棄遺顧命曰天球河圗在東序斗筲尚何算見論語西歸到官舍塵上昏案板寒窗穿碧疏文選天台賦􅊮雲斐舋於翼櫺皎日炯晃於綺疏注櫺窗間子也刻為綺文謂之綺疏鮑明逺詩朱雀文窗韜碧疏潤礎閙蒼蘚淮南子云山雲蒸柱礎潤詩書鵲巢翻帷幔蛛絲罥果知兄未來光隂坐晼晚宋玉九辨日晼晚其將入昨蒙叔父報亦歎音書簡叔父謂黃廉字夷仲也王介甫薦為司農寺幹當公事命同司農正程之才體量河北河東災傷道除知司農寺丞以荒政十二為科條自昨蒙叔父報至貂狐無余暖皆言體量賑濟辛勤之狀詳見山谷遺文夷仲行狀薄言使事重激切𬒳天遣髙僧傳僧嵬戒行嚴潔有一女子寄宿自稱天女以上人有德天遣我來嵬曰無以革囊見試此摘其字北史李元忠傳孫騰曰此君天遣來不可違也李長吉詩天遣裁詩作花骨逋流一方病責任嫓和扁左昭晉侯求醫於秦秦使醫和視之史記扁鵲姓秦名越人咨詢懷靡及詩皇華周爰咨諏又每懷靡及不皇暇息偃詩采薇不遑啓處北山或息偃在牀嚼冰進糜餐衝雪踏層巘嚴霜八月飛貂狐無餘暖見上念嗟叔母劉窮年寄甥館行狀又云娶劉氏屯田貟外郎致仕渙之女夷仲往河也而劉氏終年留其父母家也孟子曰帝館甥於二室注謂妻父曰外舅謂我舅者吾謂之甥堯以女妻舜故謂舜甥也尚憐公初黠誘掖到昭宛公𥘉昭宛疑是夷仲子姪小字如前集稱阿巽及相與睦也庭堅薄才資行又出畦町莊子彼且為無町畦亦與之為無町畦浮雲與丗踈短綆及道淺莊子褚小者不可以懷大綆短者不可以汲深退之詩級古得修綆匠伯首暫回大樗終偃蹇意謂雖受知諸公終無心進取莊子匠石之齊至乎曲轅見檪社樹其大蔽牛匠伯不顧遂行釋音曰匠伯石字也學宫尸廪入奉飬闕豐腆學徒日新聞孤陋猶舊典學記孤陋而寡聞時用王氏經學取士也小材時困我持斫問輪扁元注云復用此一韻事異似不害輪扁見上大材我屈渠越雞當蜀卵莊子奔蜂不能化藿蠋越雞不能伏鵠卵未能引分去戀祿幸苟免退之瀧吏詩官不自謹慎冝即引分往平生報一飽從事極黽勉老杜云常擬報一飯小雅云黽勉從事豈如不見收放身就間散退之進學解云投間置散思伯卧江南伯即七兄也無心趣軒冕軒冕見上龐公迹頗親黃蘖門屢欵居士黃蘖龐藴希運禪師傳燈録皆有傳齋餘佛飯香維摩經云有國名衆香佛號香積維摩詰問衆菩薩誰能致彼佛飯維摩詰不起于座化作菩薩到衆香界禮彼佛足於是香積如來以衆香鉢盛滿香飯與化菩薩化菩薩以滿鉢香飯與維摩詰茶沸甘露滿陸羽顧渚山記云豫章王子尚訪曇濟道人於八公山道人設茶茗子尚味之曰此甘露也何言茶茗􅑮人問進退餘事寄一莞論語夫子莞尓而笑仲父挾髙材甘為溝中斷元注云音短莊子云百年之木破為犧樽而文之其斷在溝中比犧樽於溝中之斷則美惡有間矣其於失性一也退之木居士詩為神詎比溝中斷遇賞還同㸑下餘青黃可犧樽退之犧樽青黃乃木之災薦廟配瑚璉語曰何器也曰瑚璉也注云黍稷之器季父有逸興未嘗入都輦文選潘安仁詩自我違京輦臨流呼釣船拂石弄琴阮唐元行沖傳有人破古冡得銅器似琵琶身正元行沖曰此阮咸所作器也命易以木絃之其聲清亮樂家謂之阮咸雍容從朋友林下追遊衍見上田園雖足樂及時思還返隂寒木嗚條論衡五日一風風不鳴條望損倚門眼國䇿王孫賈事閔王閔王出走失王之處其母曰汝朝出而晚來則吾倚門而望汝暮出而不還則吾倚廬而望汝今事王王出走汝不知其處汝尚何歸南枝喜鳴鵲魏武短歌行月明星稀烏鵲南飛繞樹三匝無枝可依尺素託黃犬晉陸機傳機有駿犬名曰黃耳羈寓京師久無家問笑語犬曰我家絶無書信汝能齎書取消息否犬搖尾作聲機乃為書以竹筒盛之而繫其頸犬尋路南走遂至其家得報還洛歲以為常文選樂府云呼童烹鯉魚中有尺素書又以窀穸留左襄十三春秋窀穸之事歸期指姑洗月令季春之月律中姑洗寄聲問僧護僧護當是子姪小字兒髮可以綰妙言對賔客稱渠万金産退之贈張籍詩云有兒雖甚憐教示不免簡君來好呼出踉蹡越門限懼其無所知見則先愧報昨因有緣事上馬插手版留君住廳食使立侍盤盞薄暮歸見君迎我笑而莞指渠相賀言此是万金産爾來弄筆硯墨水惡翻建大字如栖鴉巳不作肥軟劉禹錫詩小兒弄筆不能瞋涴筆書窗且賞勤盧同詩忽來案上翻墨汁塗抹詩書如老鴉漢髙紀云秦形勝之國也地勢便利其以下兵於諸侯譬猶居髙屋之上建瓴水也注云翻瓴水言其向下之勢易也魯論未徹章正苦諸叔懶新詩開纍𥿄自此以下皆言王丗弼詩如月明如柘漿如砧聲筧水聲也欲罷不能卷見語逺懷託孤髙别思盈繾綣詩以謹繾綣秋月明夜潮柘漿凍金碗見上踈杵韻寒砧幽泉流翠筧韻書云筧古典反以竹通水吟哦口垂涎杜詩道􅑮麴車口流涎嚼味有餘雋漢蒯通傳論戰國説士亦自序其説號雋永注肥肉也傳示同好人我家東床坦東床坦腹見羲之傳風煙意氣生揮毫寫藤繭唐朝舒元輿傳有悲剡溪古藤文言以剡藤為𥿄也法書要録王羲之蘭亭序用蠶繭𥿄鼠鬚筆北户録云晉宋間有一種𥿄長丈余就船抄之丗謂繭𥿄獵山窮鶉鴽鴽女居切鴿也月令田鼠化為鴽罩海極蝦蜆苐四卷代書云文章六經來汗漫十牛車譬如觀滄海細大極龍蝦即此詩之意也銀鈎亂眼膜晉索靖傳作草書狀曰草書之為狀也婉若銀鈎老杜云是時良醫即以金錍刮其眼膜嘉句濯肺脘且言伯在野書君子在野朋友必推挽五泰列清庿荀子蠶賦臣愚而不識請占之五泰注云五泰五帝也詩意以五帝比國朝列聖周云頌清庿祀文王也聖緒今皇纘真儒運斗樞言神宗繼統而荆公為相也法言云魯不用真儒後漢梁啇贊宰相運動樞機道化迪天顯書迪畏天顯小民注謂湯蹈道畏天明著小民朝論惜村難逸民大搜獮左隱五年春搜夏苗秋獮冬狩豈聞任方物書任土作貢又無有逺邇畢獻方物包貢遺羽簳書厥貢羽毛齒革又惟􅙪輅楛注楛牛矢幹招車必翹翹左莊二十二年敬仲曰詩云翹翹車乘招我以弓豈不欲往畏我友朋注逸詩也前席思謇謇易王臣謇謇王甥欲好懷王純字丗弼山谷妹壻也前云我家東牀坦亦指丗弼尓雅云姊妹之夫為甥髙意恐難轉詩我心匪石不可轉也自且言伯在野以下皆謂丗弼詩中稱伯兄雖在田野間而朋舊在朝必能援引舉逸民也丗弼此懷雖好而七兄之意不可轉也長篇題逺筒封寄淚空澘遙知雲際開灰飛黃鍾管大玄經曰調律者度竹為管蘆莩為灰漠然無動寂然無聲冬至夜半黃鍾以應贈張仲謀車如雞栖馬如狗後漢陳蕃傳陳留朱震字伯厚三府諺曰車如雞栖馬如狗疾惡如風朱伯厚閉門常多出門少去天尺五張公子老杜贈韋七贊善詩時論同歸尺五天自注曰俚語云城南韋杜去天尺五前漢外戚傳云童謡曰燕燕尾涏涏張公子時相見官居城南池館好杜詩宋公舊池館健兒快馬紫遊韁杜詩朔方健兒好身手洛陽伽藍記快馬健兒不如老婢吹箎杜詩右持腰間刀左牽紫遊韁自注云昔鄴下童謡曰青青御路楊白馬紫遊韁迎我不知沙路長髙榆老栁媚寒日枯荷小鴨凍野航津人刺船起應客陳平傳解衣裸而佐刺船遙知故人一水隔下馬索酒呼三遲杜詩馬上誰家白面郎當階下馬坐人牀不通姓字麁豪甚指點銀瓶索酒嘗盧同詩等間對酒呼三遲屠羊殺牛皆自在騎奴笑言客竟癡晉王述傳柏溫欲為子求婚子坦之言溫意述大怒曰汝竟癡耶向來情義比瓜葛萬事略不置町畦騎奴瓜葛町畦並見上追數存亡異憂樂燭如白虹貫酒巵白虹貫日見鄒陽傳開軒臨水弄長笛笛稱弄用晉柏溫傳三調弄也吹落殘月風凄凄城頭漏下四十刻破魔驚睡聽新詩楞嚴經云親見如來降伏諸魔今言睡魔也君詩清壯悲節物政與秋蟲同一律韓文由漢至今用一律尓來更覺苦語工思婦霜砧搗寒月曹子建七哀詩曰明月照髙樓流光正徘徊上有愁思婦悲歎有餘哀沈休文云髙樓切思婦蓋用子建語也謝玄暉有搗衣詩朱顔緑髮深誤人孟郊詩酒人皆倚春髮緑病叟獨藏秋髮白不似草木長青春文選潘尼詩豫涉素秋子登青春注云素秋謂老青春謂少潔身好賢君自有今日相看進於舊以兹敢傾一杯酒為大夫人千万壽後漢岑彭傳以朔望問大夫人起居注云漢法列侯之母方稱太夫人送薛樂道知鄖鄉此詩云謝公巳葬而與謝師厚和答詩乃在其後尤不倫當别詮次黃山葉縣連墻居汝州葉縣有黃成山山谷為葉尉同官也謝公席上對樗蒲雙鬟女弟知桃李蚤許歸我舍中雛詩何彼禯矣華如桃李箋云興王姬與齊侯之子顔色俱盛也漢張耳傳舍中人皆笑此摘其字平生同憂共安樂史記范蠡曰越王可與共患難不可與共樂歲晚相望青雲衢去年樽酒輦轂下司馬遷書云待罪輦轂下各喜身為反哺烏文選輔亡詩嗷嗷林為受哺於子注尓雅純黑而反哺者烏也城頭歸烏尾畢逋漢靈帝紀注云桓帝之𥘉京城童謡曰城上烏尾畢逋杜詩城頭烏尾訛春寒啄雪送行車解佩我無明月珠列仙傳二女步遊江濵鄭交甫挑之女解佩與之數十步空懷無珮女亦不見詩曰何以贈之瓊瑰王佩漢鄒陽書曰明月之珠折桞不對千里駒折桞贈行也古歌曲有折楊桞無玉佩以贈送而徒折桞與千里馬不相稱也千里駒見前漢宗室劉德傳念君胸中極了了作吏辦事猶詩書濁酒挽人作年少開防心地亦時須楞嚴經當平心地則丗界地一切皆平杜詩延州秦北户閞防猶未巳鄖鄉縣古民少訟但問自巳不閞渠民之治否在長吏之邪正尓登臨一笑雙白髮冝城凍笋供行厨鄖鄉屬均州冝城屬襄陽府人生此樂他事無行李道出漢南都寄聲諸謝今何如文選張平子南都賦李善曰南陽郡治宛在京之南故曰南都翰曰南都在南陽光武舊里以置都焉桓帝時議欲廢之故衡作是賦漢之南都今鄧州也山谷繼室南陽謝景𥘉師厚之女也自襄陽至鄖鄉必取道南陽故詩云尓左襄八亦不使一介行李告于寡君謝公書堂迷竹塢莊子云桓公讀書堂上手種竹今青青否我思謝公淚成雨屬公去􅎈壤下土鄧州治壤縣送張沙河逰薺魯諸邦張侯去沙河三食鄴下麥沙河屬邢州鄴今相州也筆力望朝董頗遭俗眼白晉阮籍溥能為青白眼見禮俗之士以白眼對之平生學經綸胸中負竒畫未論功活人後漢長沙大守張機仲景有南陽活人書飽飯不常得老杜但使殘年飽喫飯妻寒尚賔敬左傳𥘉曰季使過兾見兾鈌耨其妻饁之敬相待如賔兒餓猶筆墨側聞共伯城共城縣屬衛州魚稻頗冝客又持塵生甑後漢范丹字史雲里歌之曰甑中生塵范史雲釡中生魚范萊蕪欲往立四壁馬相如傳家徒四璧立平生貸米家十輩來簿責漢婁敬傳使者十輩來周亞夫傳吏簿責亜夫囊無孔方兄晉魯褒錢神論曰親愛如兄字曰孔方面有在陳色語在陳絶糧守株伺投兔韓非子曰宋人有耕者田中有株兔走觸折頭而死因釋耕守株兾復得兔為宋人笑歲晚將何獲廣道無人行春風轉沙石栖栖馬如狗語丘何為是栖栖者歟馬如狗見上去謁東侯伯布衣未可量蒼髯身八尺魚乾要斗水得斗升之水然活矣見上注士困易為德孟子飢者易為食渴者易為飲史記平原君傳士方其危困之時易德耳譬之舉大木人借一臂力吕氏春秋云今舉大木者前呼輿謣後亦應之此其於舉大木者善矣豈無鄭衛之音哉然不若此其冝也淮南子曰舉大木者前呼邪許後亦應之余同吕覽莊子曰吾終身與汝交一臂而失之此摘其字諸公感意氣鮑明逺詩意氣相傾死何有豈待故相識吾窮乏祖餞折桞當馬䇿左文十三繞朝贈之以䇿注䇿馬檛此詩蓋以張沙河往作遊士山谷以詩先焉庶幾諸人合力資之意氣相感不必舊相識也送吳彥歸番陽學省困齏鹽文選沈休文有直學省愁卧詩退之送窮文大學四年朝韲莫鹽人材任尊奬倥侗祝螟蛉楊子學行篇天降生民倥侗顓蒙又曰螟蛉之子殪而逢蜾裸祝之曰類我類我久則肖之矣小大器罌旊退之詩旊大瓶罌小諸生厭晚成老子云大器晚成躐學要儈駔學記曰學不躐等貨殖傳曰莭儈駔摹書説偏旁林罕有字源偏旁小説三卷其序云漢大尉祭酒許子取其形類作偏旁條例十五卷名之説文破義析名象此譏王氏字解九鼎奏簫韶爰居端不饗臧文仲祀爰居事見左傳莊子逹生篇云有鳥止於魯郊魯君恱之為具大牢以饗之奏九韶以樂之烏乃眩視憂悲不敢飲食今休欵啓寡聞之人吾告以至人之德譬之若載鼷以車馬樂鷃以鍾鼓也彼又烏能無驚乎此亦譏王氏之學前篇和王丗弼詩云學徒日新聞孤陋猶舊典亦此意青襟少到門庭除晝間敞詩子襟刺學校廢也青青子襟悠悠我心言學子競趍新學不至公堂也文選南都賦體爽塏以間敞竹風交槐隂三見秋氣爽時賴解事人載酒直心賞楊雄傳好事者載酒肴從之鮑昭詩心賞猶難恃謝玄暉詩懷人去心賞吳即楚國材左傳聲子説楚云雖楚有材晉實用之幽蘭秀榛莾彥國吐嘉言晉胡母輔之傳王澄曰彥國吐嘉言霏霏不絶輔之字彥國子將喜標榜後漢許劭字子將核論鄉黨人物每月輒更其品題故汝南俗有月旦評平生欽豪俊久客慕鄉黨文選不曽逺離别安知慕儔侣虛齋延灑掃薄飯薦腒鮝禮內則夏冝腒鱐注腒乾雉鱐乾魚唐韻鮝乾魚臘也音息兩反詩句唾成珠文選詩咳唾自成珠老杜詩汝身巳見唾成珠笑嘲愜爬蛘杜牧詩云杜詩韓筆忙時讀似倩麻姑􅑕處􅎲春夏頻謝除曽未厭來往歸鴈多喜聲寒蟬停哀響黃花滿籬落白蟻閙甕盎杜詩蟻浮仍臘味韓詩喧聒鳴甕盎留君待佳節忽忽戒徂兩文選謝玄暉詩優優整夜裝肅肅戒徂兩親戚傷離居檀弓吾離群而索居交遊念疇曩文選盧子諒詩借曰如昨忽為疇曩疇曩伊何逝者彌踈碁局無對曹樗蒲失朋長問君去為何雲物愁莾蒼莊子云適莾蒼者三餐而返莾莫浪反蒼七蕩反白樂天春雪詩寒消春莾蒼自注云二字上聲又翼城北原作云野色何莾蒼自注云去聲壽親髮斑斑千里勞夢想家雞藁頭肥藁禾稈也頭有餘粒雞食之而肥藁頭用禾頭生耳字又云史齊本紀曰時有童謡云一束藁兩頭然藁頭云者山谷摘字多此類寒魚受􅊻網甘旨蔌中厨內則云旨甘柔滑伊啞弄文襁東方朔傳伊優亜者辝未定也優一侯反亜烏加反劉夢得詩咿啞轉井車宣紀在襁褓注云褓小兒𬒳也襁小兒繃輔耕反史記趙丗家程嬰杵臼匿趙孤取他人嬰兒負之衣以文褓此行樂未央詩夜未央安知川塗廣淵明詩目倦川塗異深秋上滄江逺水平如掌杜詩秦川對月平如掌人生要得意壯士多曠蕩野鶴疲籠樊江鷗戀孤蔣子虛賦東蘠雕胡蓮藕觚盧張揖曰雕胡菰米也郭璞曰菰蔣也朱來丘壑姿不著芻豢飬孟子芻豢之恱我口寄聲謝鄉鄰為我具兩槳見上有路即歸田君其信非誑韓詩臨分不汝誑有路即歸田薛樂道自南陽來入都留宿會飮作詩餞行入都謂至北京京即都也後漢有五都明皇幸蜀改成都為南京杜詩云城闕秋生畫角哀自注云南京同兩都得云城闕薛侯本貴胄射䇿一矢中漢書儒林傳贊曰設科射策勸以官祿易旅之六五曰射雉一矢亡此倣其語左傳王召飬由基與之兩矢使射吕錡中項伏韜以一矢復命注云一發而中金蘭託平生易大傳二人同心其利斷金同心之言其臭如蘭瓜葛比諸從數回尚成親見上况乃居連棟交遊乃父子講學連伯仲奴人通使令孩稚接戲弄相憐負米勤家語子路見於孔子曰昔者由也事二親之時常食藜藿之實為親負米百里之外親殁之後南遊於楚從車百乘積粟萬鍾纍茵而坐列鼎而食願欲食藜藿為親負米不可復得也同力采蘭供文選束廣微輔亡詩南陔孝子相戒以飬也偱彼南陔言採其蘭眷戀庭闈心不遑安退之作孟先生詩云採蘭超幽念亦用此事蓋孟郊有母也供謂供飬其父母苐三卷過家上冡云保身以為供每持君家書平安覷欵縫顔師古匡俗正謬云今官曹文案於𥿄縫上記之曰欵縫何也答曰此語出魏晉律令字林本作刻也古者簿領皆用簡牘其編連之處於縫上刻記之呼為縫今𥿄縫上書名猶取舊語呼為秦人與吾炙憂樂一體共孟子曰耆秦人之炙無以異於耆吾炙釋之廷尉曹微過成繫訟從此張長公不肯為時用張釋之傳釋之為公車令劾太子不下司馬門不敬後拜廷尉景帝立釋之恐用王生計景帝不過也歲餘為淮南相猶以前過也其子摯字長公官至大夫免以不能取容當丗故終身不仕陶淵明集有張長公詩云逺哉長公蕭然何事丘阿無梧桐曲直不在鳯大雅卷阿云鳯皇鳴矣于彼髙岡梧桐生矣于彼朝陽生涯谷口耕鄭子真見上丗事邯鄲夢異聞集道者吕翁經邯戰道上邸舍中有少年盧生自歎其貧困言訖思寐時主人方炊黃梁為饌翁乃探其懷中枕以授生枕兩端有竅生夢中自竅入其家見其身冨貴五十年老病而卒欠伸而寤顧吕翁在傍主人炊黃梁尚未熟自君抱憂端杜詩憂端齊終南澒洞不可掇酒碗未忍嗅自注云借用髙秋自南歸意氣稍寬縱黃花尚滿籬白蟻方浮甕文選謝玄睴詩緑蟻方獨持注云釋名曰酒有泛齊浮蟻在上泛泛然私言助燕喜魯頌公魯侯燕喜令妻壽母詩意謂助其娛親之樂也且莫戒輜重漢李陵傳召陵欲使為二師將輜重霜風獵帷幕銀燭吐螮蝀郭璞山海經序云案汲郡竹書及穆天子傳穆王見西王母取其玉石珍瑰之器金膏銀燭之寶今考之穆王傳則云天子之寶玉果璿珠燭銀注云有精光如燭鮑明逺芙蓉賦潤蓬山之瓊膏輝蔥河之銀燭鄘國風蝃蝀在東莫之敢指注虹也密坐幸頗歡文選曹子建書云得為密坐李善曰曹大家欹器頌曰倚帝主之密坐劇飲寧辝痛杜詩痛飲真吾師踈鍾嗚曉撞小雨作寒霿廄馬蕭蕭鳴詩乘馬在廄又蕭蕭馬鳴征人稍稍動九衢槐桞中縱緩青絲鞚杜詩不反青絲鞚虛燒夜燭花朱樓豪士集謝玄暉詩迢遞起朱樓紅袖清歌送退之詩清歌緩送感行人河鯉獻鱠材江澄解包貢禹貢楊州厥包橘柚錫貢蟹擘鵝子黃老杜鵝兒黃似酒此借用酒傾琥珀凍杜詩春酒杯濃琥珀薄舉觴遙酌我發嚏知見頌邶國風云寤言不寐願言則嚔箋云今俗人嚏云人道我此古之遺語也蓋寬饒云母多酌我行行鞕箠倦短句煩屢諷次韻奉送公定謝師厚二子愔字公靜悰字公定去年君渡河君無渡河樂府篇名亦曰箜篌引棗下實離離今年君渡河剝棗詠豳詩文選笙賦歌曰棗下纂纂朱實離離豳七月八月剝棗直緣恩義重不憚鞍馬疲南史衛敬瑜妻詩故人恩義重不忍復雙飛詩書半行李道路費歲時親交歎存亡學問訪闕遺司馬遷書又不能拾遺輔闕故唐有輔闕拾遺之官我多後時悔君亦見事遲史記范雎傳云穰侯智士也而見事遲定非兒女知漢髙紀吕公曰此非兒女子所知虛名無用處北斗與南箕小雅大東維南有箕不可以簸揚維北有斗不可以挹酒漿文選古詩南箕北有斗牽牛不負軛民無盤石固虛名復何益燕趙遊俠子文選曹子建樂府云借問誰家子幽并遊俠兒郭景純詩京華遊俠客長安輕薄兒沈休文詩洛陽繁華子長安輕薄兒後漢書曰李寶勸劉嘉且觀成敗光武聞告鄧禹曰孝孫素謹當是長安輕薄兒誤之耳嘉字孝孫狂掉三寸舌張良傳良乃稱曰今以三寸舌為帝者師躐登九級墀杜詩翻手作雲覆手雨紛紛輕薄何須數立談光隂移歃血盟父子左陳五父及鄭伯盟歃如忘注志不在於歃血指天出肝脾退之作子厚墓志云握手出肺肝相示指天日泣涕誓生死不相背負真若可信從來國器重韓安國傳唯天子以為國器見謂骨相竒兒寬傳見謂不習事築岩發夢寐書云説築傳岩之野獵渭非熊螭史記齊大公丗家周西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之符注彲勑知反索隱曰余本亦作螭字百工改繩墨一丗擅文詞全人脰肩肩甕盎嫵且冝莊子德充符篇云闉跋支離無脤説衛靈公靈公恱之而視全人其脰肩肩甕盎大癭説齊桓公桓公恱之而視全人其脰肩肩注云偏情一􅒏則醜者更好而好者更醜也山谷詩意謂熙寧用人非賢而謂之賢賢則指為不肖也所謂遊俠子輕薄兒蓋言當時新進少年趍時苟合以口舌捷給躐等進用雖歃血而盟自謂披腹而出肝脾其言皆不足信也王介甫素有重名稱為國器其遇主得時如起於築岩釣渭而改制立法自眩文詞附已者超遷之語不合意輒擯斥不用所謂恱闉跋攴離甕盎大癭而視全人無疾者乃詆為醜惡也前集神宗挽詞固云築釣收賢輔此詩含譏諷非一過可了故詳言之大槐隂黃庭女蘿綿絡之莊子水中有火乃焚大槐大槐以喻用事者黃庭經注云黃庭以中得名今本云中庭詩云蔦與女蘿施于松桓以喻小人附離而進也昭陽兩兄弟還自妬娥眉工顰又冝笑楚詞九歌云既含睇兮又冝笑百輩來茹咨周頌王釐尓成來咨來茹義云咨謀茹度汝有事當來謀之來度之班姫輕鴻毛更合衆口吹漢成帝班倢妤傳始為少使俄而大幸後趙飛燕姊弟自微賤興寢盛於前譛告許皇后班倢妤挾媚道祝詛許后坐廢倢妤求供飬大后長信宫趙皇后傳云召入宫大幸有女弟復召入后既立後寵少哀而弟絶幸為昭儀居昭陽舍飛燕外傳云后怒以杯抵昭儀裙昭儀泣曰娣忘共𬒳苦寒時邪今幸貴其忍相搏乎此事以喻王吕𥘉為黨而後乖爭班姬以喻當時逐客也按實録熙寧七年三月王安石知江寧軍府八年正月祕閣校理王安國追毀出身以來文字放歸田里汀州編𬋩人鄭俠改英州𥘉王安石將罷相引吕惠卿執政惠卿素與安國有隙因俠獄抵安國罪是年二月安石復相自後王吕之交遂絶山谷時在北京韓非子云齊景公曰去仲尼如吹毛耳乃遺哀公女樂哀公怠於政仲尼之齊引繩痛排根自注云音䀶漢書灌夫傳竇嬰失藝亦欲倚夫引繩排根生平慕之後棄者蒙蔽枉成帷唯恐出巳上殺之如奕碁左傳襄二十八寧子視君不如奕碁塵埃百年琴絶絃為鍾期見上注落落虎豹文義難𬋩中窺晉王獻之傳𬋩中窺豹時見一斑至今楊子雲不與俗諧嬉歲晚草玄經覃思寫天維書序研精覃思退之詩白日座上傾天維脫身天祿閣危於剱頭炊晉顧愷之傳桓玄與愷之同在殷仲堪坐共作危語玄曰矛頭浙米剱頭炊卧聞䇿董賢閉門甘忍飢托言載秦韜玉貴公子行云却笑儒生把書卷學得顏回忍飢面五侯盛賔客騶轡交橫馳樓護傳云王氏方盛賔客滿門五侯兄弟爭名其客不得左右文選阮嗣宗詩走獸交橫馳時通問字人得酒未曽辝楊雄贊云為郎與王莽劉歆並又與董賢同官云云又云王莽時劉歆甄豐皆為上公莽既以符命自立欲絶其原以神前事而豐子尋歆子棻復獻之莽誅豐父子投棻四裔辝所連及便收不請時雄校書天祿閣上治獄使者來欲收雄雄從閣上自投下幾苑莽聞之問其故乃棻從雄學作竒字雄不知情有詔不問問字見上注董賢見倿幸傳近者君家翁天與脫馵鞿莊子馬蹄篇連之以羈􅎗丁立陟立兩切左傳云韓厥執􅎗離騷云余雖好修姱以鞿羈兮注韁在口曰韁革絡頭曰羈退之祭子厚文云子之中棄天脫􅎗羈巳為冥冥鴻矰􅗤尚安施楊子法言鴻飛冥冥弋人何篡焉張良傳戚夫人泣涕上曰為我楚舞吾為若楚歌歌曰鴻鵠髙飛一舉千里羽翼巳就橫絶四海橫絶四海又可奈何雖有矰􅗤尚安所施飬蘭尋僧圃愛竹到水湄北闕免朝請西都分保釐書畢命康王命作册畢以成周之衆命畢公保釐東郊律詩中有和師厚復官分司西京詩文章九鼎重史記平原君傳毛先生一至楚而使趙重於九鼎大吕冨貴一黍纍漢書律曆志度長短者不失豪釐量多少者不失圭撮權輕重者不失黍纍注云豪兔豪也十豪為釐六十黍為圭四圭為撮音倉括反十黍為絫十絫為一銖絫來戈反亦音纍繼之纍沈存中筆談云唐開元錢重二銖四絫今蜀中亦以十參為一銖參乃古絫字相傳誤耳趙良請灌園但為啇君嗤史記啇君鞅傳趙良見啇君曰君之危若朝露尚欲延年益壽乎則何不歸十五都灌園於鄙啇君弗從五月而秦孝公卒太子立公子虔之徒告啇君反發吏捕啇君棄甲尚文過兕多牛有皮左宣二年宋城華元為植巡功城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復來使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那役人曰從其有皮丹􅃮若何華元曰去之夫其口衆我寡出仕書掣肘見墨竹賦注歸來菊荒籬淵明歸去來詞云三徑就荒松菊猶存不為五斗折自無三徑資昭明太子作淵明傳云謂親朋曰聊欲絃歌以為三徑之資乎執事者聞之以為彭澤令歲餘郡遣督郵至縣吏請曰應束帶見之淵明嘆曰我豈能為五斗米折腰向鄉里小兒即日解印綬去聀勝箭洗蹀血老杜悲陳陶云群胡歸來血洗箭蹀血字見前漢書歸鞍懸月支漢張騫傳胸奴破月氏王以其頭為飲器王摩詰燕攴行云拔剱巳斷天驕臂歸鞍共飲月支頭文選曹子建詩控弦破左的右發摧月支注云月支射帖也邯鄲淳蓻經曰馬射左邊為月支三枚馬蹄二枚二説疑不能決故併列之斯人万户侯造物付爐錘莊子大宗師篇皆在爐錘之間耳我觀史臣篇疏略記糟醨史記屈原傳何不餔其糟而啜其醨借其字以言糟粕譬如官池蛙誰能問公私晉惠帝紀帝嘗在華林園聞蝦蟆聲謂左右曰此嗚者為官乎私乎或對曰在官地為官在私地為私君懷明月珠簸弄滄海涯退之詩婆娑海水南簸弄明月珠深房珮芳蘭固是王所姬退之詩處子窈窕王所妃苟有令德隱不腓南貢尚包橘包橘見前篇漢濵莫大隨左傳漢濵之國隨為大每來促談麈鹿之大者曰麈群鹿隨之視麈尾所轉故談者揮之見祖庭事宛風生庭竹枝骯髒得家法伊優不能為漢趙一傳有秦客者為詩曰文籍雖滿腹不如一囊錢伊優北堂上骯髒倚門邊但聽呼樗蒲便足解人頥漢康衡傳康説詩解人頥功成在漏刻漢光武紀王尋王邑圍昆陽城自以為功在漏刻意氣甚逸頴利處囊錐史記平原君傳平原君謂毛遂曰夫賢士之處丗也譬若錐之處囊中其末立見今先生處勝之門下三年於此矣左右未有所稱勝未有所聞是先生無所有也毛遂曰臣乃今日請處囊中耳使遂早得處囊中乃脫頴而出非特其末見而已失勢落坑穽退之詩失勢一落千丈強寒窀如愁鴟得馬折足禍淮南子曰近塞上之人有善術者馬無故亡入胡人皆弔之其父曰此何遽不為福平居數月其馬將胡駿馬而歸人皆賀之其父曰何遽不為禍乎家冨馬良其子好騎墮而折其髀人皆弔之其父曰何遽不為福乎居一年胡人入塞丁壯死者十九此獨以跛之故父子相保亡羊多歧悲列子云楊子之鄰人亡羊既率其黨又請楊子之竪追之楊子曰嘻亡一羊何追者之衆鄰人曰多歧路既反問獲羊乎曰亡之矣歧路之中又有歧焉吾不知所之所以反也心都子曰大道以多歧亡羊學者以多方喪生屢敵因心計屢當作慮食貨志桑私羊以心計伏兵幾面欺漢季布傳今噲面謾史記作面欺長戈仰閞來過秦論云仰閞而攻秦吐欵受羇縻南史范曄傳曄與孔熙先謀逆熙先望風吐欵辝氣不撓萬事只如此畢竟誰成虧莊子曰有成與虧故昭氏之鼓琴也無成與虧故昭氏之不鼓琴也自但聽呼樗蒲至誰成虧皆言樗蒲也援李翺集中有五木經其略云樗蒲五木玄白判厥二作雉背雉作牛王采四盧白雉牛氓采六開塞今秃撅全為王駁為氓又曰設閞二馬𥘉出閞疊行非王采不出閞不越坑入坑有謫行不擇策馬外一矢為坑愛君方寸間醇朴乃器師器師疑是吾師安得擺俗纏東岡並鉏犂由來在隂鶴不必振羽儀易中孚之九二鳴鶴在隂其子和之漸之上九鴻漸于陸其羽可用為儀送行傾車蓋載酒滿鴟夷漢陳遵傳自用如此不如鴟夷鴟夷滑稽腹大如壷天髙木葉下楚詞洞庭波兮木葉下潦退河流卑屯雲搴六幕退之詩夏槐作雲屯前漢禮樂志云紛云六幕浮大海師古曰六幕猶言六合新月吐半規韓詩前夕雖十五月圎未滿規人生會面難取醉聽狂癡杜詩主稱會面難一舉纍十觴取醉見上南史沈昭略謂張約曰汝張約耶何乃肥而癡約曰汝沈昭略耶何乃瘦而狂昭略大笑曰瘦巳勝肥狂又勝癡語穽發欺笑退之詩詰屈避語穽詩鋒犯嘲譏縣知履霜來易履霜堅冰至少别為不怡天津媚河漢爾雅析木謂之津箕斗之間津也注漢津也天漢之津梁闕角挂秋霓闕角見餞薛樂道詩題下注中有鬼與神赤舌弄隂機太玄云赤舌燒城吐水于瓶測曰赤舌吐水君子以解崇也王延壽夢鬼物賦云劓尖鼻踏赤舌退之雪詩譁譁弄隂機夜光但十襲闞子云宋之愚不汝瑕疵去去善逆旅凍醪約重持山藥倒藤架紅梨帶寒曦坐須騎奴還淹留歲恐期騎奴見上無為出門念牽衣嬰孺啼李曰詩兒女歡笑牽人衣短韻願成誦時時寄相思文選陸士衡文賦或托言於短韻退之祭文投義魚之短韻唐陸羽傳得南都賦不能讀危坐效羣兒囁嚅若成誦狀韓詩願寄相思字種決明后皇冨嘉種楚詞橘頌云后皇嘉樹橘來服兮決明著方術本草決明子注云俗方惟以療眼也道術時須耘鋤一席地老杜種蒿苣詩序云理小畦種一兩席許詩云破塊數席間荷鋤功易止時至觀茂密縹葉資芼羮內則芼羮注云芼菜也又云雉免皆有芼注云謂菜釀緗花馬蹄實緗謂淺黃色本草注云生子作角實似馬蹄俗名馬蹄決明霜叢風雨餘簸簸場功畢國語單襄子過陳川不梁野有庾積埸功未畢枕囊代曲肱甘寢聽芬苾莊子云孫叔敖甘寢秉羽而郢人投兵詩苾芬載祀老眼願力餘國策趙王曰秦之攻我也不遺餘力矣讀書真成癖晉杜預傳時王濟有馬癖和嶠有錢癖武帝謂預曰卿有何癖對曰臣有左傳癖都下喜見八叔父自此皆北京解官後所作雖編次稍失先後之序觀其大略可也一別七冬夏山谷官北京留守文潞公留再任遂跨七年故前詩云我坐廣文舍七年讀書燈又云七年身屢到欎欎蔭簷瓦幾書通置郵孟速於置郵冥鴻難借問江鯉多沉浮冥鴻用蘇武事江鯉用尺素事又晉殷羡所致書皆投水中曰沉者自沉浮者自浮殷洪喬不作書郵心因夢想去迹為山川留叔趍丹鳯闕身向卧龍洲詩意謂叔先入京而身往南陽巳乃會都下也閞中記云建章宫元闕臨北道鳯在上故曰鳯闕也卧龍州當在南陽謝師厚南陽人今鄧州也苐二卷次韻師厚五月十六日視田悼李彥深詩云南鴈傳尺素飛來卧龍城彥深亦南陽人時同在鄉里可見龍洲為南陽邂逅入閞馬同時解轡鞦考工記必緧其牛注閞東謂紂為緧緧亦作鞦別後事万端後漢吳漢傳帝責漢曰比勑公千條萬端向來身百憂咨嗟舊田園慟哭新松楸退之詩畢命依松楸稍詢耆舊間太半歸山丘小兒携婦子襁褓皆褁頭漢衛青傳臣子在襁褓中杜詩去時里正與褁頭青燈照逆旅呼酒濯亂愁破啼為笑語文選劉越石答盧諶詩并序曰相與舉觴對膝破啼為笑霜夜盡更籌歲寒叔舊莭况又髙春秋漢蘇武傳陛下春秋髙老松心梗槩緑竹氣和柔霍去病傳去病以和柔自媚於上張釋之傳馬賴和柔言如不出口體若不勝裘檀弓云趙文子其中退然如不勝衣其言呐呐然如不出諸其口德音潤九里河潤九里本出莊子後漢郭伋傳帝勞之曰河潤九里政事無全牛莊子云庖丁為文惠君解牛惠君曰技蓋至此乎庖丁曰始臣解牛之時所見無非全牛者三年之後未嘗見全牛也詩成戲筆墨清甚韋蘇州唐韋應物為蘇州刺史有詩集篆籕有志氣當於古人求漢藝文志史籕十五篇注云周宣王大史作大篆十五篇晉王戎傳當從古人中求耳杜詩似君須向古人求自悲聞道晚涉丗如虛無舟雖無觸物意倘亦遭罵咻莊子云方舟而濟於河有虛船來觸舟雖有扁心之人不怒孟子衆楚人咻之稍窺性命學未窮言行尤語言寡尤行寡悔息心待自信渺如大河流堤防小不密一決敗數州此言防心之難也傳燈録有僧亡名息心銘山谷嘗手寫安得心服禮不見為瘡疣退之隨事生瘡疣荆雞變化材鵠卵滯隂幽莊子曰奔蜂不能化藿蠋越雞不能伏鵠卵吾材小不能以化子願因啄抱力浩蕩碧雲遊退之詩鶴翎不天生變化在啄菢杜詩白鷗沒浩蕩萬里誰能馴次韻答叔原會寂照房呈稚川客愁非一種歷亂如蜜房杜詩天寒割蜜房食甘念慈母衣綻懷孟光內則云衣裳裂紉針請輔綴孟光乃後漢梁鴻妻我家猶北門時解北京教授至京師其家猶在北京母夫人無恙𥘉在北京喪偶殯於北京者十一年王子渺湖湘寄書無鴈來衰草漫寒塘故人哀王孫韓信傳哀王孫而進食交味耐久長唐魏元同與裴炎締交能保終始號耐久交置酒相暖熱元稹苦樂相倚曲猶得半年伴暖熱王荆公次程公闢韻云清明若覩蘭亭月暖熱應忘蕙帳秋吾儕癡絶處不減顧長康晉顧愷之俗傳愷之有三絶才絶畫絶癡絶長康其字得間枯木坐長沙石霜山釋慶諸衆議延請諸聞之更入深山無人之境長坐不卧屹若枯株天下謂之石霜枯木衆見僧寶傳冷日下牛羊見詩坐有稻田衲北山録曰稻畦為衣陶土為器稻畦袈裟也陶土瓦鉢也頗薰知見香釋氏書有解脫知見香勝談𥘉亹亹晉阮修傳王衍談易有所未了敦曰阮宣子可與言衍曰未知其亹亹之處定何如耳又謝安傳安弱冠詣王𪷟清言良久既去濛子修曰向客何如大人濛曰此客亹亹為來逼人修綆汲銀牀用退之汲古得修綆之意古詩後園鑿井銀作牀金瓶素綆汲寒漿杜詩露井凍銀牀太白詩梧桐落金井一葉飛銀牀聲名九鼎重見上文章九鼎重注冠蓋万夫望禮記君子知微知彰知柔知剛万夫之望老禪不挂眼退之詩餘事不挂眼看蝸書屋梁酉陽雜爼云睿宗為兾王時寢齋壁上蝸迹成天字上遽掃之經數日如𥘉及即位鑄金為蝸分置道釋像前韻與境俱勝意將言兩忘係辝子曰書不盡言言不盡意莊子云不若兩忘而化其道出門事衮衮斗柄莫昂昂月色麗雙闕三輔黃圗古歌詞云長安城西有雙闕雪雲浮建章文選謝玄暉詩金波麗鳷鵲玉繩低建章苦寒無處避唯欲酒中藏同王稚川晏叔原飯寂照房得房字髙人住寶坊華嚴論云安立寶坊集諸人天重客欵齋房漢髙帝紀豪傑聞令有重客又禮樂忘有齋房之歌元封二年芝生甘泉齋房作此借用其字市聲猶在耳左言猶在耳虛靜生白光莊子虛室生白幽子遺淡墨退之別趙子詩海中諸山中幽子頗不無窗間見瀟湘蒹葭落鳬鴈詩蒹葭蒼蒼秋色媚橫塘博山沉水煙淡與人意長西京雜記有五層金博山爐古詩云博山爐中百和香自携鷹爪芽來試魚眼湯鷹爪魚眼見上寒浴得溫湢內則云外內不共井不共湢浴釋音彼力切注湢浴堂體靜心凱康宋玉神女賦心凱康以樂歡尓雅釋詁第一云愷康樂盤餐取近市杜詩盤餐市逺無兼味厭飫謝羶羊莊子羊肉不慕蟻蟻慕羊肉羊肉羶也裂餅羞豚膾老杜詩浮瓜供老病裂餅常所愛包魚芰荷香平生所懷人詩嗟我懷人忽言共榻牀常恐風雨散韋蘇州詩何時風雨夜復此對床眠千里鬱𥘉望斯遊豈易得淵對妙濠梁莊子與惠子遊於濠梁之上詳見上雅雅王稚川晉劉惔傳洛中雅雅有三嘏易親復難忘右樂府君家甚易知易知復難忘晏子與人交風義盛激昂兩公盛才力宫錦麗文章鄙夫得秀句杜詩最傳秀句寰區滿成誦更懷藏成誦見次韻送公定詩注次韻叔原會寂照房得照字風雨思齊詩齊國風風雨思君子也草木怨楚調淵明有怨詩楚調一篇本無心擊排賈誼疏云所排擊剝割皆衆理解也勝日用歌嘨勝日見上僧窗茶煙底杜牧詩今日鬢絲禪榻畔茶煙輕揚落花風清絶對二妙晉衛􅗕傳一臺二妙俱含萬里情雪梅開嶺徼謂大庾嶺頭梅也我慙風味淺砌莎慕松蔦詩蔦與女蘿施于松柏中朝盛人物退之詩云國朝盛文物誰與開顔笑一公老諳事退之詩中朝大官老於事似解寂寞釣退之答崔立之書耕於寬間之野釣於寂寞之濱對之空歎嗟樓閣重晚照杜詩上方重閣晚百里見秋毫次韻稚川得寂字平生萬里興㰸退著寸尺退之詩㰸退就新懦趍營悼前猛向來類竊鈇列子曰人有亡鈇者意其鄰之子視其行步竊鈇也顔色竊鈇也言語竊鈇也動作態度無為而不竊鈇也俄而搜其谷而得其鈇他日復見其鄰人之子動作態度無似切鈇也鈇音斧少日巳爭席莊子曰其往也舍者避席其反也舍者與之爭席矣曩過招提飯老杜遊奉先寺詩巳從招提遊更宿招提境按僧輝記云招提者𣑽言拓鬪提奢唐言四方僧物後人傳寫之誤以拓為招又省去鬪奢二字止稱招提則今十方住持寺院也涅槃經云造僧招提則生不動國愜當易為適杜詩愜當久忘筌蓋用淵明詩人亦有言稱心易足也又云稱心固為好食鮭如舉士南史庾杲之傳任昉戲曰誰謂庾郎貧食鮭常有二十七種鮭户佳反名下無遺索閻立本見張僧繇畫曰名下定無虛士談餘天雨花楞嚴經云即時天雨百寶蓮花間錯紛糅茶罷風生腋盧同謝孟諌議寄新茶詩云七碗喫不得也唯覺兩腋習習清風生誰言塵土中有此坐上客謝安傳安既出桓溫問左右頗嘗見我有此客不言前傾許可後漢宣秉等傳語曰同言而信則信在言前胸次開堛塞退之南山詩逼塞生怐愗同是蠧魚癡退之詩豈殊蠧書蟲生死文字間癡謂書癡還歸理編册長安千門雪借長安以言汴京可見此四詩自北京解官至京師作蟹黃熊有白更約載酒行無為守岑寂竹軒詠雪呈外舅謝師厚并調李彥深此篇至卷終皆自汴京回至南陽作破臘春未融杜詩臘破思端綺土膏寒不發國語云自今至于𥘉吉土膏其動數聲鳴條風論衡五日一風風不鳴條一夜灑窗雪退之詠雪云灑急聽窗知開軒万物曉落勢良未歇退之齒落詩俄然落六七勢落殊未巳鏗鏗青琅玕閲此歲凛冽退之詩豈如秋霜雖凛冽摧埋頭槍地司馬遷書見獄吏則頭槍地千羊反意氣終自潔大白詩眼花耳熱後意氣素霓生君子謂此君全身斯明哲詩既明且哲以保其身屋頭維女貞顔色少澤恱琅玕此君皆謂竹以比師厚女貞木名以比李彥深稍能窺藩籬亦有固窮節語君子固窮淵明詩不賴固窮節百丗當誰傳又云深得固窮節佳興冉冉生門外無車轍漢書陳平以席為門然門外多長者車轍寫之朱絲絃清坐待明月文選詩直如朱絲絃清如玉壷氷丙寅十四首效韋蘇州并序二月丙寅率李原彥深謝愔公靜遊百花洲適為遊人所擅見拒於晨門因賦何人有酒身無事誰家多竹門可欵之句行係馬李氏園步至廣濟僧舍謁冦忠愍萊國公祠堂用吏部詩韻作雪霽草木動月令草木萌動春融煙景和嘉辰掩閞坐如此節物何同遊得二子晤對不在多詩彼美淑姬可與晤言箋云晤對也不知鞍馬倦想見洲渚春淸畫鎖芳園誰家停畫輪晉輿服志畫輪車駕牛以綵添畫輪轂故名曰畫輪車髙桞極有思向風招遊人退之詩楊花榆莢無才思此反而用之漸嘉樓外花嘉賞亭邊栁作者歸山丘曹子建詩生存華屋處零落歸丘山今春為誰有千秋万歲後還復來遊否元注云漸嘉樓陽夏謝希深作嘉賞亭范文正公作桓子新論云雍門周説孟嘗君曰千秋万歲後高臺既巳傾曲池又巳平城南有佳園王逸少帖云㒒近修小園子殊佳致山簡傳諸習氏荆土豪族有佳園池風物迎馬首左惟豫馬首是瞻但賞主人竹不飲主人酒王徽之傳吳中一士大夫家有好竹欲觀之便出坐輿造竹下諷嘨主人灑掃請坐徽之不顧將出主人乃閉門徽之便以此賞之紅日媚紫苔沈休文詩賔階緑錢滿客位紫苔生輕風泛春桞楚詞光風轉蕙泛崇蘭三公末白髮三公謂冦萊公范文正公謝希聲也十輩乘朱輪楊惲家方隆盛乘朱輪者十人只取人看好何益百年身杜詩長為万里客有愧百年身但願長今日清樽對故人淵明詩但願長如此躬耕非所歎江梅香冷淡開遍未全踈巳有耐寒蝶雙飛上花須今夜嚴城角肯留花在無樂府詩集云漢橫曲有梅花落本笛中曲也按唐大角曲亦有大梅花小梅花等曲今其聲猶有存者我思五桞翁解作一生事得錢送酒家便靜尋山寺念我還如此翁應會人意淵明傳云嘗著五桞先生傳以自况又云顔延之為始安郡過潯陽造淵明每往必酣飲致醉臨去留錢二万與淵明淵明悉送酒家稍就取酒謝靈運詩還得靜者便杜詩老來苦便靜庭空日色靜樓逈鍾聲遲李義山詩地寬樓巳逈人更逈於樓褐叟巳爭席左旨酒一盛兮余與褐之父晲之爭席見上馴鴉更不疑同來復同去竟別我為誰退之詩遇酒即酩酊君知我為誰謝甥有逸興李髯非不嘉蜀志閞羽傳馬超來降羽書與諸葛亮問超人村可誰比類亮知羽護前答之曰孟起當與益德並驅爭先猶未及髯之絶倫逸群也羽美髯故亮謂之髯苦思夢春草南史謝惠連傳族兄靈運嘗思詩竟日不就忽夢見惠連即得池塘生春草大以為工醉狂眠酒家杜詩李白斗酒詩百篇長安市上酒家眠斯遊無俗物傲睨至昏鴉晉王戎傳戎與阮籍為竹林之遊戎嘗後至籍曰俗物巳復來敗人意杜詩曰眼前無俗物又云有待至昏鴉寺古老僧靜亭隂修竹多萊公作州日部曲屢經過衆推識公面蒼石眠緑莎寇凖平仲贈萊國公諡忠愍始為參知政事罷知鄧州盛時衆吹噓謫去衆毀辱不為公存亡幽蘭春自緑欲書名相傳安得南山竹前漢公孫賀傳云南山之竹不足受我詞昔公調鼎實見上指顧九廟尊郡國冨士馬于今開塞垣杜詩一寄塞垣深誰能起公死為國守北門守比門見第一卷上注出身丗喪道莊子曰丗喪道矣道喪丗矣丗與道交相喪也解綬飢驅我淵明乞食詩云飢來驅我去不知竟何之杯中得醉鄉唐王績有醉鄉記去就不復果豈為俗人言司馬遷書可為智者道難為俗人言逹人儻余可賈誼鵬烏賦逹人大觀物無不可百花洲萊公祠堂皆在鄧州此詩云解綬飢驅我可見北京解官至汴京回過鄧也少小尚狷介退之詩少小聚嘻戲與人常不欵後漢光武幸章陵置酒作樂宗室諸母因酣恱相與語曰文叔少時謹信與人不欵曲唯直柔耳今乃能如此置身稍雍容遇酒輒引滿漢書序傳引滿舉白自是鶴足長難齊鳬脛短莊子鳬脛雖短續之則憂鶴脛雖長斷之則悲對酒歌答謝公靜我為北海飲後漢書孔北海云坐上客常滿樽中酒不空君作東武吟見上注看君平生用意處蕭灑定自知人心定自晉人語也丗説王敦曰家兄在郡定嘉又謝太傳曰定自佳定自佳南陽城邊雪三日愁隂不能分皂白晉天文志庾翼書云此天公憒憒無皂白之徴也摧輪踠蹄泥數尺退之朝賀歸詩緑槐十二街渙散馳輪蹄又贈元十八何人識章甫而知駿蹄踠魏武苦寒行曰車輪為之摧城門晝開眠賈客移人僵尸在旦夕誰能忍飢待食麥左成十年晉侯夢大厲覺召桑田巫巫言如夢公曰何如曰不食新矣又曰晉侯欲麥使甸人獻麥將食張如厠陷而卒此借使身憂天下自有人寒士何者愁填臆民生政自不願材晉謝安傳正自不能不尓退之祭子厚文凡木之生不顧為材可乘以車可鞭䇿列女傳老萊子妻云可食以酒肉者可隨以鞭捶可授以官祿者可隨以斧鉞君不見海南水流紫旃檀碎身百錬金博山本草沉香門白檀樹出海南又云真紫檀舊在下品又云扶南國人言衆香共是一木根是旃檀莭是沉水葉是藿香膠是薰陸選詩昔為百錬剛豈如不蒙斧斤賞老大絶崖霜雪間投身有用禍所集莊子匠石歸檪社見夢曰云云且子求無所可用久矣幾死乃今得之為豫大用使子也而有用且得有此大也邪何况四逹之衢井先汲尓雅四逹謂之衢莊子直木先伐甘井先竭昨日青童天上回手捧玉帝除書來列仙傳有青童君王莽傳是時爭為符命封侯其不為者相戲曰獨無天帝除書乎此借用一番通籍清都闕列子穆王以為清都紫微帝王之居樂天詩只恐長生須有籍仙臺試為檢名看百身書名赤城臺苑君傳云治赤城山飛升度丗無虛日怪我短褐趍塵埃顧謂彼童子退之秋懷詩顧謂汝童子置書且安眠此何預人事晉謝玄傳子弟亦何預人事而正欲使其佳但對淸樽即眼開一杯引人著勝地丗説新語曰王衛軍云酒正自引人著勝地傳聞官酒亦自清徑須沽取續吾瓶南山朝來似有意今夜倘放春月明戲贈彥深元注云李原字彥深厚之弟居南陽學髯家徒立四壁李髯見上漢司馬相如傳家徒四立壁未嘗一飯能留客老杜云一飯未曽留俗客春寒茅屋交相風淵明飲酒詩弊廬交悲風荒草沒前庭倚墻捫虱讀書䇿晉王猛傳桓溫入閞猛𬒳褐詣之捫虱而言傍若無人曲禮曰先坐書策琴瑟在前坐而遷之戒勿越老妻甘貧能飬姑寧剪髻鬟不典書晉陶侃傳侃早孤貧為縣吏鄱陽孝廉范逵嘗過侃時倉卒無以待賔其母乃截髮得雙髲以易酒肴樂飲極歡杜詩長者來在門荒年自糊口家貧無供給客位但箕帚俄傾羞頗珍寂寥人散後入怪鬢髮空吁嗟為之久自陳剪髻髮鬻市充杯酒大兒得餐不索魚小兒得禈不索𥜗晉韓康伯傳伯數歲母為作𥜗令捉尉斗而謂之曰且著𥜗尋當作復禈伯曰不復須火在斗中而柄尚熱今既著𥜗下亦當暖庾郎鮭菜二十七食鮭二十七種見上太常齋日三百餘後漢周澤傳為太常嘗卧疾齋宫其妻哀澤老病窺問所苦澤大怒以妻干犯齋禁遂收送詔獄謝罪時人為之語曰生丗不諧作太常妻一歲三百六十日三百五十九日齋一日不齋醉如泥上丁分膰一飽飯藏神夢訴羊蹴𬞞周禮大宗伯以脤膰之禮親兄弟之國左傳天子有事膰焉又云與執膰焉此言釋奠分胙也啓顔録云有人常食𬞞忽食羊肉夢五藏神曰羊踏破菜薗丗傳寒士有食籍一生當飯百甕𦵔詩疆埸有瓜是剝是𦵔新序楚惠王食寒𦵔而得蛭𦵔若今虀甕也又摘禮記醯醢百甕字以相謔也食籍見第六卷冥冥主張審如此莊子孰主張是附郭小圃冝勤鉏摘蘇秦傳附郭田二頃字蔥秧青青葵甲緑早韭晚菘羮糝熟南史齊周顒隱鍾山文思太子問菜食何味最勝曰春𥘉早韭秋末晚松莊子藜羮不糝充虛解戰賴湯餅晉束晢餅賦曰玄冬猛寒清晨之會涕凍鼻中霜凝口外充虛解戰湯餅為最芼以䓑虀與甘菊內則云雉免皆有芼注云菜釀也晉石崇傳云韭蓱虀是搗韭根雜以麥苗耳幾日憐槐巳著花一心呪笋莫成竹白樂天食笋詩且食勿踟蹰南風吹作竹群兒笑髯窮百巧我謂勝人飯重肉漢朱家傳食不重味公孫弘傳汲黯曰弘位在三公奉祿甚多然為布𬒳詐也上問弘弘曰有之臣聞管仲相齊有三歸侈擬於君桓公以霸晏嬰相景公食不重肉齊國亦治云云弘身食一肉脫粟飯群兒笑髯不若人我獨愛髯無事貧君不見猛虎即人厭麋鹿易曰則鹿無虞人還寢皮食其內左襄二十一年州綽曰二子者譬於禽獸臣食其肉而寢處其皮矣濡需終與豕俱焦莊子徐無鬼萹有暖姝者有濡需者濡需者豕虱是也擇疏鬛自以為廣宫大囿奎蹄曲隈乳間股腳自以為安室利處不知屠者之一旦鼓臂布草操煙火而巳與豕俱焦也飫肥擇甘果非福蟲蟻無知不足驚橫目之民万物靈莊子天地篇夫子無意於橫目之民乎書惟人万物之虛請食熊蹯楚千乘左文元年楚大子啇臣以宫甲圍成王王請食熊蹯而死弗聽立死山壁漢公卿後漢獻帝紀建安元年車駕至洛陽是時宫室燒盡百官披荆棘依牆壁間州郡各擁強兵而委輸不至群僚飢乏尚書郎以下自出採稆或飢死牆壁間或為兵士所殺李髯作人有佳處韓文諱卞云作人得如周公孔子亦可以止矣李髯作詩有佳句雖無厚祿故人書杜詩厚祿故人書斷絶長飢稚子色凄涼門外猶多長者車陳平事見上我讀楊雄逐貧賦斯人用意未全踈逐貧賦見雄傳兹不及注寄南陽謝外舅謝公遂偃蹇後漢蔡雍傳董卓聞雍名髙辟之稱疾不就卓大怒曰我力能族人蔡雍遂偃蹇者不旋踵矣南陽無舊廬天與解纓紱元非傲當塗老杜獨酌詩本無軒冕意不是傲當時庖丁釋牛刀衆手斫大觚莊子曰庖丁為文惠君解牛砉然嚮然奏刀騞然莫不中音文惠君曰技蓋至此乎庖丁釋刀對曰臣之所好者道也進乎技矣批大郤導大窽因其固然技經肯綮之未嘗而况大觚乎白雲曲肱卧青山滿牀書寒山子詩家中何所有惟見一牀書妙質落川澤莊子郢人堊漫其鼻端使匠石斫之宋元君召匠石曰嘗試為寡人為之匠石曰臣之質死久矣自夫子之死也吾無以為質矣果然天網踈老子云天網恢恢踈而不失故知今人巧未覺古人迂築場歲功休國語云埸功未畢詩云九月築埸囿夜泉鳴竹渠胸懷鬱磊隗丗説阮籍胸中磊隗故須澆之此物諒時須此物謂酒先言夜泉鳴竹渠謂糟床也兒能了翁事晉傳咸傳云生子癡了官事官事未易了了事正自癡復為快耳此借用安用府中趍古樂府詩三十侍中郎四十專城居盈盈公府步冉冉府中趍孫能誦翁詩老杜驥子詩云問知人客妵誦得老人詩乃是千里駒漢楚元王傳云德有智略武帝謂之千里駒人生行樂耳漢楊惲傳其詩云人生行樂耳須冨貴何時用舍要自如我方神其拙社檪官道樗莊子逍遙遊篇云惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝絭曲而不中規矩立之塗匠石不顧又人間丗云匠石之齊至乎曲轅見檪社樹云云第一卷上再和答為之詩云檪依曲轅社聊用神其拙巳注其詳公猶憂斧斤睥睨斫樽壷莊子云百年之木破為犧樽萬古身後前芭蕉秋雨余少年喜狡獪叱化粒成珠神仙傳王逺字方平過蔡經家麻姑亦至即求少許米撤地視米皆成真珠方平笑曰姑固少年吾老矣不復作此狡獪變化也謨功可歌舞書矢厥謨禹成厥功左九功之德皆可歌也又襄三十一文王之功天下誦而歌舞之學古則暖姝莊子徐無鬼篇云有暖姝者學一先生之言則暖暖姝姝而自恱也所好果不同未可一理驅眇思忘言對前所注臣之質死久矣郭象注云非夫不動之質忘言之對則雖至言妙斫無所用之安得南飛鳬飛鳬見上注鄙心生蔓草萌芽望耘鉏後漢黃憲傳陳蕃周舉曰時月之間不見黃生則鄙吝之萌復存乎心左傳蔓草猶不可除離筵如昨日杜詩離筵何大頻春桞見霜枯未辱錦繍段時蒙雙鯉魚文選張平子四愁詩云美人贈我錦繍段古樂府詩云客從逺方來遺我雙鯉魚憶昔參凡杖旌容覷規模引接開藻鑒杜詩持衡留藻鑒髙明通事樞門生五七輩寂寞半白鬚談經落麈尾晉孫盛傳善言明理時殷浩擅名一時惟盛與抗論嘗談論對食擲麈尾毛悉落飯中行樂從藍輿晉陶潛傳向乘藍輿亦足自返看竹辟強宅徽之觀竹見上王獻之傳云嘗經吳郡聞顧辟強有名園先不相識乘平肩輿徑入時辟強方集賔友而獻之遊歷既畢傍若無辟人強勃然便驅出門獻之傲如也閲士黃公壚晉王戎傳戎嘗經黃公酒壚下過顧謂後車曰吾昔與嵇叔夜阮嗣宗酣暢於此竹林之下亦預其末自嵇阮云亡吾便為時之所羈紲今日視之雖近邈若山河雪屋煮茶藥晴簷張畫圖幽寺促燈火青氊置樗蒲繞牀呌一擲十白九雉盧晉劉毅傳於東府聚樗蒲大擲一判應至數百万餘人並黑犢以還惟劉𥙿及毅在後毅次擲得雉大喜褰衣繞床呌謂同坐曰非不能盧不事此耳𥙿惡之因挼五木久之曰老兄試為卿答既而四子俱黑其一子轉躍未定𥙿厲聲喝之即成盧焉毅意殊不快蔡澤來分功史記蔡澤傳蔡澤謂應侯曰君獨不觀夫博者乎或欲大投或欲分功袁耽必上都晉袁耽傳耽字彥道桓溫少時遊於博徒資産俱盡尚有負進欲永濟於耽而耽在艱試以告焉耽略無難色遂變服懷布帽隨溫與債主戲耽素有藝名債者聞之而不相識謂之曰卿當不辦作袁彥道也遂就局十万一擲直上百万耽投馬絶呌探布帽擲地曰竟識袁彥道不開旗縱七步破竹一群胡諸葛亮傳注引漢晉春秋曰亮至南中所在戰捷聞孟獲者為夷漢所服募生致之既得使觀於營陳之間獲對曰向者不知虛實故敗若秪如此即易勝耳亮笑縱使更戰七縱七禽而亮猶遣獲獲曰公天威也南人不復反矣晉杜預傳預曰今兵威已振譬如破竹數節之間皆迎刃而解詩意蓋以兵喻樗蒱也成梟燭為明挾長朋佐呼終飲見溫克詩飲酒溫克所爭匪錙銖禮儒行曰雖分國如錙銖注八兩曰錙釋音説文云六銖誰令運甓翁見謂牧豬奴晉陶侃傳諸參佐或以談戲廢事者乃命取其酒器蒲博之具悉投之江曰摴蒲者牧豬奴戲耳侃在廣州無事輒朝運百甓於齋外暮運於齋內人問其故答曰吾方致力中原過尓優逸恐不堪事見謂見上事託丈人重乃愛屋上烏老杜云丈人屋上烏人好烏亦好尚書大傳曰武王登夏臺以臨殷民周公旦曰臣聞之愛其人者愛其屋上烏憎其人者憎其徒胥韓詩外傳曰武王至于邢丘天雨三日不休問大公對曰愛其人及屋上烏惡其人憎其胥餘舊言如對面形迹滯舟車禮舟車所至風簾想隱几天籟嗚寒梧隱几天籟見莊子尚喜讀書否還能把酒無鄴城渺塵沙冠蓋若秋蕖詩山有扶蘇注曰荷華扶蕖也相過問寒溫杜詩虛名但蒙寒溫問泛愛不救溝壑辱意氣馳九衢楚客雖工瑟齊人本好竽退之答陳啇書云齊王好竽永懷溟海量北斗不可㪺詩維比有斗不可以挹酒漿韻書云㪺挹也勝夜親筆墨因來明月珠肇法師答劉遺民書云君與法師當數有文集因來何少此篇題云寄南陽謝外舅而後人編類誤雜之南陽詩中其詩云鄴城渺塵沙鄴城謂大名也大名本魏州後唐建鄴都山谷自大名寄詩南陽也次韻正仲三文自衡山返命舍驛過外舅師厚贈答正仲三丈謂王存字正仲元豐間修起居注元祐𥘉自右丞遷左丞陳無巳詩話云謝師厚廢居於鄧王右丞存其妹壻也奉使荆湖枉道過之夜至其家師厚有詩云倒著衣裳迎户外盡呼兒女拜燈前昏昏市井氣楊子雲市井相與言則以財與利昏昏見上呫呫兒女語前漢灌夫傳平生毀程不識不直一錢今日長者為壽乃效女兒曹呫囁耳語退之詩呢呢兒女語禽喧聲百種春作事萬緒列子云優優萬緒起矣人間雞黍期文選范雲詩恨不具雞黍注引謝承後漢書山陽范式字巨卿與汝南張元伯為友春别京師以秋為期至九月十五日殺雞作黍二親笑曰山陽去此幾千里何必至元伯曰巨卿信士不失期言未絶而巨卿至天上德星聚丗説新語注云續晉陽秋曰陳仲弓從諸子姪造荀郎父子于時德星聚太史奏五百里賢人聚乖離略十年文選詩乖離即長衢王逸少帖多有乖離字髮白齒齟齬見上太史禱衡丘佐王用貔虎子雲免大夫楊雄傳雄以病免復召為大夫以言師厚草玄空自苦劉歆觀太玄謂雄曰空自苦人生只尓是付與甕頭謂法書要録江東云缸面猶河比稱甕頭謂𥘉熟酒也山谷外集詩注卷之二
