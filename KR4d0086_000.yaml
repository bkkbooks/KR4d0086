front:
  text: 山谷外集詩注目録
  hash: sha256:29efa6feade9fed05186ccec3259ba01f4888d5e399d6d38727d5000d3fcb22b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_000-1a}
body:
  text: 青神史容撰注卷之一賦劉明仲墨竹賦放目亭賦古詩溪上吟并序清江引還家呈伯氏流民歎次韻答張沙河次時進叔二十六韻二月丁卯喜雨爲北門留守文潞公作古風次韻贈答𥘉和甫二首次韻答和甫盧泉水三首并序招子髙二十二韻兼簡常甫丗弼林爲之送筆戯贈再和答爲之再和答爲之贈趙言次韻晁𥙷之廖正一贈答詩再次韻呈明略走答明略適堯民來相約奉謁故篇末及之答明略并寄无咎再次韻呈明略并寄无咎再答明略二首次韻感春五首聖東將寓于衛再次韻感春五首贈之卷之二古詩謝張㤗伯惠黄雀鮓次韻謝子髙讀淵明傳奉答子髙見贈十韻次韻孔著作早行次韻晁无咎閻子常携琴入村贈答晁次膺春遊同堯民遊靈源廟用馬陵二字賦詩二首奉和王丗弼寄上元兄先生用其韻贈張仲謀送薛樂道知鄖郷送張沙河遊齊魯諸邦送吳彦㱕番陽薛樂道自南陽來入都作詩餞行次韻奉送公定種决明都下喜見八叔父次韻答叔原同王稚川飯寂照房次韻叔原次韻稚川竹軒詠雪丙寅十四首效韋蘇州并序對酒歌答謝公静戲贈李彦深寄南陽謝外舅次韻正仲三丈卷之三古詩次韻謝外舅病不能拜復官次韻師厚視田悼李彦深次韻師厚食蟹次韻謝外舅食驢腸次韻師厚答馬著作次韻師厚黃連橋次韻外舅謝師厚病間十首和謝公定征南謡寄耿令幾父過新堂邑作放言十首送伯氏入都次韻孔四著作北行滹沱渡河次韻李六弟濟南郡城橋亭之詩和甫得竹数本於周翰喜而作詩和之卷之四古詩送劉道純次韻子瞻春菜六舅以詩來覔銅犀用長句持送次韻子瞻與舒堯文禱雪霧猪泉唱和見子瞻粲字韻詩和答三人四返不困而愈崛竒輙次舊韻寄彭門三首次韻答堯民再和寄子瞻聞得湖州用明發不寐有懷二人爲韻寄李秉彛賦未見君子憂心靡樂八韻寄李師載以同心之言其臭如蘭爲韻寄李子先次韻晁元忠西歸十首卷之五古詩答王道濟寺丞觀許道寕山水圖過家上冡明叔知縣和示過家上冡二篇輙復次韻次韻叔父聖謨詠鸎迁谷說清水若呈郭明叔并序次韻淸水岩次韻章禹直開元寺觀畫壁兼簡李德素聽崇德君鼓琴次韻答楊子聞見贈食笋十韻蕭巽葛敏修二學子和予食笋詩次韻答之胡朝請見和食笋詩輙復次韻寄李次翁題髙君正適軒奉送周元翁鏁吉州司法片赴礼部試寄晁元忠十首次韻周法曹游青原山寺答永新宗令寄石耳喜知命弟自青原歸寄張宜父髙至言築亭於家圃以奉親揔其觀覽之富命曰溪亭乞余賦詩彫陂幾復寄檳榔且答詩勸予同種復次韻寄之元翁見次元寄到和孔四飲王䕫玉家長韻再次孔四韻卷之六古詩三月乙已來賦塩萬歲郷二首四月戊申賦塩萬歲山中仰懷外舅謝師厚上權郡孫承議寄懷元翁對酒次前韻寄懷元翁奉答茂衡恵𥿄長句雜言贈羅茂衡長句謝陳適用恵送吳南雄所贈𥿄次韻吉老遊青原將㱕次韻知命永和道中飲潤父家次前韻寄潤父送酒與周法曹用贈潤父韻癸丑宿早禾渡僧舎宿觀山上大蒙籠勞坑入前城乙卯宿淸泉寺丙辰仍宿清泉寺丁巳宿寳石寺已未過太湖僧寺得宗汝爲書庚申宿觀音院辛酉憩刀坑口金刀坑迎將家待追漿坑十餘户山農不至因題其壁追憶予泊舟西江事次韻以十扇送徐天隱聞致政胡朝請多藏書以詩借書目次韻郭明叔長歌卷之七古詩和答魏道輔寄懷十首代書寄陳適用奉送時中攝東曹獄掾次韻和答孔毅甫再用舊韻寄孔毅甫寄題安福李令適軒寄題安福李令先春閣和孫公善李仲同金櫻餌唱酬二首寄題安福李令愛竹堂二月二日曉夢會於廬陵西齋作寄陳適用次韻周德夫經行不相見之詩寄傳君倚同年次韻張禹直魏道輔贈答之詩次韻道輔雙嶺見寄三疊次韻道輔旅懷見寄寄餘干徐隱甫次韻秋郊晚望八月十四日夜刀坑口對月奉寄王子難子聞適用贈王環中戲和于寺丞乞王醇老米贈朱方李道人戯題曽處善尉片二首寄上髙李令懷道謝文灝元豐上文藁讀方言卷之八古詩送昌上座歸成都送彦孚主簿寄朱樂仲從王都尉覔千葉梅云巳落盡戲作嘲吹笛侍兒次韻子瞻書黄庭經尾付蹇道士次韻叔父夷仲送夏君玉赴零陵主簿謝曹子方恵二物二首送曹子方福建路運判兼簡運使張仲謀戲贈曹子方家鳯兒題老鶴萬里心題韋偃馬子瞻題狄引進雪林石屏要同作和曹子方送張材翁摩詰畫和劉景文寄忠玉送吕知常和答莘老老杜浣花谿圖引奉謝劉景文送茶謝景文恵墨奉和公擇舅氏送吕道人研再和公擇次韻答王四題畫鵝鴈二首送六十五弟賁南歸贈陳師道十四弟歸洪州賦莫如兄弟四章題李夫人偃竹贈呉道士戲答仇夢得和任夫人悟道卷之九古詩題落星寺四首玉京軒過致政屯田劉公隱廬題杜槃澗叟冥鴻亭宮亭湖泊大孤山作貴池大雷口阻風庚寅乙未猶泊大雷口乙未移舟出口丙申泊東流縣阻風銅陵阻水泊舟竹山下金陵十月十三日泊舟白沙江口發白沙口次長蘆阻風入長蘆寺次韻伯氏長蘆寺下別蔣頴叔贈別李端叔汴岸置酒贈黄十七曉放汴舟次盱眙外舅孫華老守蘇州留詩斗野亭題大雲倉逹觀臺二首卷之十古詩庭堅得邑太和六舅按節岀同安邂逅於皖溪口十首同蘇子平李德叟登擢秀閣書石牛溪題山谷大石靈龜泉上發舒州道中作寄李德叟豐城與胡彦明處道飲何氏恱亭詠栢薄薄酒并序放言七首定交詩碾建溪第一奉邀徐天隱奉議并效建除体再作答徐天隱重贈徐天隱八音歌贈晁堯民二首古意贈鄭彦能贈无咎二十八宿歌贈別无咎壽聖觀小隱銅官縣望五松山荆州即事藥名詩八首卷十一律詩徐孺子祠堂送徐隱父二首答德甫弟何造誠浩然詞題前定録贈李伯牖二首駐輿遣人尋訪後山陳德方家池口風雨留三日思親汝州作次韻戯答彦和衝雪宿新寨郭明父西齋二首睡起戯詠江南土風和答孫不愚次韻裴仲謀次韻寄滑州舅氏病起次韻和稚川進叔稚川約晚過進叔和答登封王晦之伯氏到濟南寄詩同丗弼韻作寄伯氏丗弼恵詩求舜泉伯父祖善放隱齋倉後酒正片昔唐林夫謪官所作十一月巳卯余納秋租隔墻芙蓉盛開自咸平至太康鞍馬間得十小詩次韻蓋郎中率郭郎中休官二首和張沙河閏月訪同年李夷伯乞猫書扇次韻郭右曹次韻元日和答李子眞次韻答柳通叟催公静碾茶用前韻戯公静和謝公定八首武陵過平輿懷李子先謝曉純送衲韈避暑李氏園二首戯題大年防禦蘆鴈平原宴坐二首次韻舎弟題牛氏園二首謝送宣城筆王彦祖恵其祖黄州制草書其後寄懷公壽以金沙酴醾送公壽同劉景文遊郭氏西園因留宿張仲謀家堂前酴醾委地贈陳元輿祠部和陳君儀讀楊太眞外傳五首卷十二律詩讀曹公傳并序雜詩同謝公定攜書浴室汶師置飯作此謝人恵茶萶到張氏園和壁間舊題從人求花懋宗奉議有佳句詠冷庭叟野居李濠州挽詞二首寄家衛南酒急雪寄王立之問梅花又寄王立之歲寒知松栢效進士作觀成都石經詩送徐景道尉武寕二首杜似吟院二首奉送劉君昆仲勸交代張和父酒楊朴墓次韻李士雄二首戲和舎弟舩場探春二首戲答李子眞同景文丈詠蓮從丘十四借韓文二首次韻題粹老客亭次韻寅菴四首送楊􅗕鴈門省親二首次韻謝公定王丗弼贈答二絶句次韻公定丗弼登北都東楼四首李右司以詩送梅花至潞公次韻張祕校喜雪三首呻吟齋五首送蛤䖽與李明叔戯贈丗弼丗弼病方家不善論蛤䖽之功戯答次韻萱草次韻雨中晝寢和師厚郊居和師厚秋半時復官分司西都和外舅夙興三首陪謝師厚遊百花洲十首和師厚接花和師厚栽竹次韻外舅三首百花洲雜題竹下把酒砌臺晚思卷十三律詩叔父釣亭夜發分寕寄杜澗叟元豐癸亥經行石潭寺見舊和栖蟾詩甚可笑因别和一章題馬當山魯望亭四首次韻胡彦明同年羇旅京師寄李飛三章上蕭家峽何蕭二族魏夫人壇隱梅福處蕭子雲宅避秦十人黄雀到官歸志浩然二絶句迎客質明放舡自瓦窰歸送酒與畢大夫次韻奉寄子由再次韻奉答子由再次韻寄子由次韻寄上七兄吉老受秋租輙成長句再次韻和吉老招吉老子範觀梅花寄黄從善登快閣題息軒從時中乞蒲團答余洪範二首題安福李令朝華亭寄舒申之次韻吉老十小詩歐陽從道許寄金橘黄幾復自海上寄恵金液和七兄山蕷湯奕棊二首呈任公漸次韻幾復答子所贈三物三首静居寺上方南入一徑有釣臺氣象侯尉之吉水覆按未歸三日泥雨戯成寄之侯尉家聽琵琶次韻吉老寄君庸寄袁州廖獻卿廖袁州次韻見答并寄黄靖國再生傳次韻以寄之袁州劉司法亦和予摩字詩因次韻寄之次韻奉答吉老聞吉老縣丞按田在萬安山中次韻喜陳吉老還家二絶再次韻和答吉老二首雙澗寺二首酴醾奉答李和甫代簡二絶次韻奉答廖袁州觀王主簿家酴醾花社日奉寄君庸北䆫洪範以不合俗人題片壁二絶句次韻和之次韻答杜仲觀二絶再次韻杜仲觀二絶卷十四律詩次韻元翁奉和孫承議學元翁作浦口詩和元翁次韻知命次韻吉老知命二首次韻答十九叔父臺源次韻曾都曹喜雨和李才甫先輩快閣五首幾道復覔㯽榔發贑上寄余洪範同韻和元明兄知命弟題吉州承天院題槐安閣太和奉呈吉老立春子範徼廵諸郷捕逐羣盗幾盡輙作長句勞苦行李喜太守畢朝散致政戯贈南安栁倅睡起次韻君庸寓慈雲寺次韻奉答存道題神移仁壽㙮題海首座壁題仁上座畫松次韻漢公招七兄送髙士敦赴成都鈐轄二首次韻子瞻送穆父二首和子瞻内翰題公擇舅中丞山房以潞公所恵揀芽送公擇次舊韻承吏部蘇尚書右選胡侍郎皆和鄙句次韻道謝奉同公擇作揀芽詠今歲官茶極妙而難爲賞音者戲作兩詩用前韻公擇用前韻嘲戯雙井又戯爲雙井解嘲奉同六舅尚書詠茶碾煎烹三首王立之以小詩送並蔕牡丹戯答題子瞻書詩後戯贈髙述與李公擇道中見兩客布衣班荆而坐對戲奕秋因作一絶題歸去來圗二首題陽関圗二首次韻答少章聞鴈聽雞二首題王居士所藏王友畫桃杏花二首戯答仇夢得承制二首題李十八知常軒次韻奉答吉鄰機宜送曹黔南口號題劉氏所藏展子䖍感應觀音二首以虎臂杖送李任道二首謝周文之送猫戯呈田子平太平州作二首長沙留別贈花光老題花光老爲曽公卷作水邊梅清明山谷外集詩注目録終
