front:
  text: 山谷外集詩注卷之六
  hash: sha256:3726d462cac83ca2648b2f568c898aaee026e5f547c5a8e6d2d91e007eff35e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_006-1a}
body:
  text: 三月乙巳來賦鹽萬歲鄉且搜獮匿賦之家晏飯此舍遂留宿是日大風自採菊苗薦湯餅二首飛廉快雲開白日離騷云前望舒使先驅兮後飛廉使奔屬注飛廉風伯也頓撼天地萬竅號退之女拏壙銘云輿致走道撼頓莊子齊物篇云大塊噫氣其名為風是唯無作作則萬竅怒呺挼莏桃李欲淨盡曲禮云共飯不澤手注澤謂挼莎也劉禹錫玄都觀詩桃花淨盡菜花開乞與遊絲百尺髙退之同冠峽詩落英千尺墯遊絲百丈飄幽叢秀色可欖擷大業拾遺帝曰古人云秀色若可餐杜牧之云光潔疑可攬欲以襟懷貯晉志隆安中民作懊惱歌有草生可攬結之言煮餅菊苗深注湯崔氏四民月令曰立秋無食煮餅及氷溲餅飲氷食蘖浪自苦白樂天詩三年為刺史飲氷復食蘖摩挲滿懷春草香後漢薊子訓傳摩莎金狄四月戊申賦鹽万歲山中仰懷外舅謝師厚山谷銘胥夫人謝氏墓云嘗任司封郎中提點成都府路刑獄公事或以疑似中之坐失官數年巳而有大臣冤其獄天子直之今為屯田郎中通判襄州名景𥘉者父也景𥘉字師厚只今漢龐公白髮佐州郡後漢書龐公者南郡襄陽人也用襄陽事因以龐比師厚窮通視寒暑莊子讓王篇古之得道者窮亦樂通亦樂所樂非窮通也道得於此則窮通為寒暑風雨之序矣仕巳誰喜愠見上長松卧澗底文選詩欎欎澗底松離離山上苗以彼徑寸葉蔭此百尺條丗胄漸髙位英俊沉下寮桴霤多裂璺方言器破而未離謂之璺未須論才難栁子厚詩才難不其然字本出論語丗人無此韻晉庾敳傳雅有逺韻禪恱稱性深維摩經云雖復飲食而以禪恱為味語端入理近渙若開春氷左傳序云渙然氷釋超然聽年運老子燕處超然莊子年運而往臨民秉三尺漎杜周傳客有謂周曰君為天下平不循三尺法注云以三尺竹簡書法律也左傳魯秉周禮朱墨不可紊後周書蘇綽傳始制文案程式朱出墨入傳聞但言歸心許手自隱自隱見第二卷次韻師厚注欲知南陂稻得幾就收捃後漎范丹傳捃拾自資注引它書云捃拾麥得五斛胥疏江湖濵莊子山木篇猶且胥疏於江湖之上不邇金玉訓詩云母金玉尓音濡需且肉食莊子徐無鬼篇濡需者豕蝨是也擇疏鬣自以為廣宫大囿不知屠者之一旦鼓臂布草操煙火而巳與豕俱焦也觳觫恐鍾釁孟子對齊宣王曰王坐於堂上有牽牛而過堂下者王曰牛何之對曰將以釁鍾王曰舍之吾不忍其觳觫龍移山發洪虎乳月生暈淮南子虎嘨而谷風至龍舉而景雲屬月生暈謂月暈而風也竹聲寒夏簟輟寢中夜聽寄聲向鹿門倘賜勞苦問龐公傳云遂携妻子登鹿門山因采藥不反勞苦見漎張耳傳上權郡孫承議公家簿領如雞棲簿領見上車如雞棲馬如狗見陳蕃傳後私家田園無置錐荀子無置錐之地而明於為社稷之大義真成忍罵加餐飯杜詩真成浪出遊文選古詩弩力加餐飯不如江西之水可樂飢詩泌之洋洋可以樂飢它人勤拙猶相輔樂天詩救煩無若靜輔拙莫如勤列子云恩過不相輔矣漎何武傳堊王有計功除過故云無功狀身無功狀堪上府漎朱博傳齎伐閲詣府注伐功勞也于定國傳具獄上府公誠遣騎束縛歸文選魏文帝書今遣騎到鄴老杜云大官喜我來遣騎問所須山谷在太和閲郡守三人按集中所志墓云吉州姚公元豐辛酉卒又一志云知吉州畢公元豐五年十一月卒又按吉州西峯院三秀亭記云廬陵比缺守輒以他吏攝承託宿傳舍胥視民為俎豆執鞭者衆羊失其牧元豐六年春詔用夀春魏矦以此觀之則孫權郡者必能病諸邑故詩有忿語長隨白鷗卧煙雨寄懷元翁嵗年豐稻粳井邑盛煙火選詩井邑自相循注引周禮九夫為井四井為邑史記律書煙火萬里北園曾未窺董仲舒傳三年不窺園王事方勤我詩王事適我花枝互低昂韓文公詩道旁草木花紅紫相低昂歐陽公詩薰風入花骨花枝互低昂鳥語相許可觀物見歸根撫時終宴坐漢蕭何傳上奏許可師古曰可其所奏許其所請老子云萬物並作吾以觀其復夫物藝藝各復歸其根歸根曰靜是謂復命宴坐見上搔首望四鄰諸賢皆最課極工簿領書甚辨米鹽顆班固敘傳云奏課運最韓詩寄鄒刺史初如遺宦情終乃最郡課史記天官書其占驗淩雜米鹽漢書咸宣傳其治米鹽平生矩朱墨見上吏考仰丞佐𥘉無公侯心骨相本寒餓退之詩自歎虞翻骨相屯明窗懷王友清絶吟楚些見楚詞招魂南史王琳傳時謂銓錫二王玉昆金友念君方坐曹薛宣傳日至休吏賊曹掾獨不肯休坐曹治事無因奉虛左史記魏公子無忌傳公子從車騎虛左自迎夷門侯生魏勃願見相君無因見齊悼惠王傳對酒次前韻寄懷元翁花光漸寒食木燧催國火鄴中記并州一百五日為介子推斷火冷食三日內則云大鐫木燧注云木燧鑽火也周禮司灌掌行火之政令四時變國火以救時疾沽酒鳥勸人見上懷賢吾忘我莊子齊物論云今者吾喪我注云我自忘矣事往墯甑休孟敏荷甑墯地不顧而去林宗見而問其意對曰甑巳破矣視之何益林宗異之勸令遊學十年知名見後漎郭太傅心知求田可劉備謂許汜曰君求田問舍言無可采附吕布傳後可人不在眼禮記管仲遇盜取二人焉上以為公臣曰其所與遊辟也可人也樽爼思促坐有生常倥偬後漢卓茂傳斯固倥偬不暇給之日無暇天所課不解聞健飲白樂天詩聞健偷間且勤飲俄成一蓬顆賈山傳曽不得蓬顆蔽冢而託宿焉泥鈞埏萬物董仲舒䇿云猶泥之在鈞唯甄者之所為老子云埏埴以為器注云埏和也埴土也寒暑勤五佐史記天官書云天神貴者太一太一佐曰五帝按月令四時皆有帝而土王四季豈其懷愛憎私使我窮餓莊子太宗師篇云父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉醉魂招不來浪下巫陽些退之詩愁狖酸骨死怪花醉魂馨招魂云帝告巫陽曰有人在下我欲輔之魂魄離散汝筮與之夢成少年嬉走馬章臺左漢張敞傳走馬章臺街太白詩靑雲少年子挾彈章臺左奉答茂衡惠紙長句陽山老藤截玉肪文選魏文帝論玉玦書云白如截肪唐舒元輿弔剡藤文剡溪上多古藤溪中多紙工斬伐無時烏田翠竹避寒光蘇昜簡紙譜今江浙間有以嫩竹為紙者作密書隨手裂烏田地名羅侯包贈室生白莊子虛室生白明於機上之流黃樂府詩長安有狹邪行大婦織綺羅中婦織流黃又文選別賦注間色有五紺紅縹紫流黃愧無征南蠆尾手法書要録載宋羊欣古來能書人名云燉煌索靖張芝姊之孫晉征南司馬亦善革書又載王僧虔論書云索氏自謂其書具銀鈎蠆尾晉書不言曽為征南司馬為寫黃門急就章急就章漢黃門令史遊撰羅侯相見無雜語陶詩相見無雜言但道桑麻長苦問溈山有無句春草肥牛脫鼻繩溈山露地白牛石鞏禪師牧牛入草便拽鼻孔來並見第二卷覔銅犀注菰蒲野鴨還飛去傳燈録百丈與馬祖遊山見野鴨子祖問曰是甚麼丈曰野鴨子又曰甚麼處去丈曰飛過去祖遂引手掐百丈鼻丈作痛聲祖曰何曽飛過去丈於是大悟山谷嘗草書一偈云野鴨子知何許馬祖見來相共語話盡山空水月清依前不會還飛去還飛去却把住故將藤靣乞伽他𣑽語伽他此言諷誦楞嚴經祕密伽陀微妙章句願草驚蛇起風雨法書要録王羲之自敘草書勢云疾若驚蛇之失道遲若録水之徘徊長詩説𥿄落秋河要知溪工下手處溪多𥿄工見上却將氷幅展似君震旦花開第一祖梵語震旦此云漢地第一祖謂迦葉也二十八傳而至逹磨達磨天竺國人告尊者曰我既得法當往何國而作佛事尊者曰待吾滅後當往震旦後寓止嵩山少林寺以法傳慧可告之曰昔如來以正法眼付迦葉大士展轉囑付纍而至於我我今付汝聽吾偈曰吾本來兹土傳法救迷情一花開五葉結果自然成證道歌曰第一迦葉百傳燈二十八代西天記入此土菩提逹磨為𥘉祖雜言贈羅茂衡嗟來茂衡莊子嗟來桑戶乎學道如登國語云諺曰從善如登從惡如崩淳化帖有何氏書云道大難俗情見善從善如登欲與天地為友欲與日月並行万物峥嶸本由心生去子之取舍與愛憎莊子去子之態色與淫志惟人自縛非天黥傳燈録僧璨傳有沙彌禮師曰乞與解脫法門師曰誰縛汝又曰律師持律自縛莊子天刑之安可解又曰庸詎知造物之不息我黥而輔我劓墮子筋骨莊子墮汝形躰吐尓聰明又云忘汝神氣墮汝形骸堂堂法窟九丘四溟書序曰九州之志謂之九丘丘聚也左傳曰楚左史倚相能讀三墳五典八索九丘四溟見上同一眼精不改五官之用而透聲色荀子天論篇耳目鼻口形能各有接而不相能也夫是之謂天官心居中虛以治五官夫是之謂天君常為萬物之宰而無死生念子坐幽室爐香思靑冥是謂蟄蟲欲作吾驚之以雷霆莊子天運篇蟄蟲始作吾驚之以雷霆長句謝陳適用惠送吳南雄所贈紙廬陵政事無全牛吉州治廬陵縣適用與山谷同時作邑莊子庖丁對文惠君曰始臣之解牛之時所見無非全牛者三年之後未嘗見全牛也恐是漢時陳太丘後漢陳實傳除太丘長修德淸淨百姓以安書記姓名不肯學項籍傳少時學書不成去學劒又不成去籍曰書足記姓名而巳得紙無異夏得裘琢詩包紙送贈我自狀明月非暗投見上詩句縱橫剪宫錦惜無阿買書銀鈎退之詩阿買不識字頗知書八分詩成使之寫亦足張吾軍銀鈎見上蠻溪功藤卷盈百側釐羞滑繭羞白拾遺記南越獻側理紙南人以海苔為之其理縱橫斜側因以為名蘇易簡紙譜云張華造博物志成晉武帝賜側理紙万畨南越所貢也本草陟釐陶隱居云此即南人所用作紙者唐本注云此物乃水中苔今取為紙音陟釐陟釐與側黎相近側黎又與側理相近也又云即石髮也繭紙見上想當鳴杵砧面平桄榔葉風溪水碧桄榔木廣南所出此紙吳南雄所贈南雄州隸廣南東路千里鵝毛意不輕復齊謾録云諺曰是人眼裏有西施又曰千里寄鵝毛物輕人意重皆鄙語也山谷取以為詩答公益春思云西施逐人眼稱心最為得謝陳適用惠紙云千里鵝毛意不輕瘴衣腥膩北歸客君侯謙虛不自供胡不贈丗文章伯老杜詩同心不減骨肉親每語見許文章伯一涔之水容牛蹄淮南子曰牛蹄之涔無尺之鯉識字有數我自知楊文公談苑云晉開運中詔令兩制各作詩賦一篇付禮部為考試之式獨學士李懌不肯曰李懌識字有數因人成事使令衣白𫀆入貢部下第必矣胡能作文章為丗模楷時論美之小時雙鈎學楷法山谷論學字云先當雙鈎用兩指相疊蹙筆壓無名指髙捉筆令腕隨巳左右然後觀人字格則不患其難矣至今兒子憎家雞南史王僧虔傳論書云征西庾翼書少時與右軍齊名右軍後進庾猶不分在荆州與都下人書云小兒輩賤家雞皆學逸少書雖然嘉惠敢虛辱賈誼賦恭承嘉惠兮煮泥續尾成大軸後漢鄧訓傳注云東觀記曰訓故吏最貧嬴者念訓常所服藥北州所乏又知訓好青泥封書從黎陽步推鹿車於洛陽市藥還過趙國易陽并載青泥一襆至上谷遺訓其得人心如此寫心與君心莫傳平生落魄不問天􅐱食其傳家貧落魄又音薄杜詩自斷此生休問天樽前花底幸好戲杜詩退朝花底散為君絶筆謝風煙巳無商頌猗那手商頌以那為首其辝曰猗與那與請續南華內外篇莊子號南華真經內萹七外萹三十三次韻吉老遊青原將歸欣欣林皋樂莊子知北萹山林與皋瀼與使我欣欣然而樂與賞心天際翔文選謝靈運詩序賞心樂事淸樽鱠魴鯉詩六月云炮鱉膾鯉采緑云其釣維何維魴及鱮朱果災圎方文選南都賦珍羞琅玕充溢圎方王仲宣詩嘉肴充圎方醉罷聽踈雨孟浩然詩踈雨滴梧桐衾寒夢國香左傳宣三年𥘉鄭文公有賤妾曰燕姞夢天使與巳蘭曰余為伯倏余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之生穆公名之曰蘭雨餘山吐月杜詩四更山吐月的皪滿簾霜上林賦明月珠子的皪江靡展轉復展轉詩云輾轉反側張籍宛轉行云宛轉復宛轉憶憶更未央鍾魚曉琅琅思歸笑迎門兒女相扶將扶將出拜見上次韻知命永和道中靈骨閟金鎖續玄怪録延州有婦人少年子悉與之狎昵數歲而殁葬於道左大曆中有胡僧敬禮其墓曰此乃大慈悲喜捨即鎖骨菩薩也衆開墓視其骨鈎結如鎖狀丗傳觀音化身所謂金沙灘頭馬郎婦類此梵宫超玉繩選詩玉繩低建章玉繩星名言超出星辰之上道人往香火獨先開靜行栁子厚詩始悟三空門華堂開淨域東坡云酌茗開淨筵山谷云獨先開淨行其意一也呼船久無人月沉河漢傾杜詩七星在北戶河漢聲西流謂天河也虛舟不受怒故在蓼灘橫莊子山木篇方舟而濟於河有虛舟來觸舟雖有𥚹心之人不怒飲潤父家齊閣寒麝薰書帙映斜景老杜詠竹云色侵書帙晚偶來樽爼同延此笑言頃宫線添尺餘荆楚歲時記云宫中以紅線量日影至日日添一線杜詩何人錯認窮愁日愁日愁隨一線長朝市日未永一醉解語花開元天寶遺事太液池千葉白蓮開帝與貴戚燕賞指貴妃曰爭如我解語花萬事畫地餅魏志盧育傳詔曰選舉莫取有名名如畫地作餅不可啖也要似虎頭癡何須樗里癭虎頭顧愷之也晉書本傳云愷之才絶畫絶癡絶史記樗里子傳滑稽多智秦人號曰智囊愷之傳無虎頭之稱按張彥逺名畫記愷之小字虎頭樗里傳不言癭豈謂智囊為癭乎次韻寄潤父昏昏迷簿領韓詩海氣昏昏水拍天勿勿貴晷景顔氏家訓丗中書翰多稱勿勿相承如此莫知其由或有妄言此忽忽之殘缺耳案説文勿者州里所建之旗也象其柄及三遊之形所以促民事故匆遽者稱勿勿説文又曰晷日影也周禮地官曰大司徒以士圭之法測土深正日景以求地中退之秋懷詩憂愁費晷景日月如跳丸貴字疑是費嘗盡身百憂左傳稱晉侯險阻艱難備嘗之矣訖無田二頃蘇秦傳使我有雒陽負郭田二頃吾豈能佩六國相印乎喜從吾宗遊九里河潤永見上呼兒跪酒樽戒婦饌湯餅杜詩喚婦出房親自饌劉夢得云我作坐上客引著舉湯餅老夫何取焉君恱甕盎癭莊子德充符萹甕盎大癭説齊桓公公恱之而視全人其脰肩肩送酒與周法曹用前韻吉州司法周元翁也遙知謝法曹南史謝惠連為彭城王義康法曹行參軍詩句多夏景聞道學書勤墨池方一頃王羲之傳曽與人書云張芝臨池學書池水盡黑法書要録所載一同唯石刻孫過庭書譜云張精熟池水盡墨當以碑板為正臨川有王逸少墨池曽子固作記見本集大字苦未道小字逼智永法書要録陳永欣寺僧智永會稽人逺祖逸少歷紀專精真草唯命我有何郎樽清江醖玉餅還書及斗數與君酌南癭玉餅謂麯也司馬遷傳云媒孽其短師古曰孽如鞠孽之孽齊人謂鞠餅為媒還書及斗數疑有舛誤東坡賦酌以癭藤之紋樽癸丑宿早禾渡僧舍城頭渡可涉早禾渡可㪺詩大東云維北有斗不可以挹酒漿注云挹㪺也釋音云廣雅曰酌也試問安用舟春水三丈餘是維一都會史記貨殖傳邯鄲一都會也凡言一都會者八一駔儈權征輸漢貨殖傳節駔儈注儈者合二家交易者也駔者其首率也駔子黨切征輸即賦輸也史記平準書天下賦輸或不償其僦費鬱欎多大姓儒冠頗詩書漢趙廣漢傳潁川豪傑大姓以武斷鄉曲食貨與眺錯奏言并兼豪黨之徒以武斷鄉曲舊俗小未除厭囂謝近市左傳昭三年景公謂晏子曰子之宅近市湫隘囂塵又云賈而𣣔贏而惡囂乎斬絶得僧區韓文鄭群墓志云不為崖岸斬絶之行此地美水竹林明見浴鳬杜詩沙暖低風蝶天晴喜浴鳬相追喋蓤藻楚詞鳬鴈皆唼梁藻兮鳯飄翔而髙舉子虛賦唼喋菁藻咀嚼蓤藕唼亦作喋天樂非丗娛莊子黃帝張樂於洞庭之野其卒無尾其始無首此之謂天樂憶在田園日放浪友禽魚蘭亭禊飲序云放浪形骸之外今來長山邑忍飢撫惸孤出入部曲隨漢光武紀云各領部曲注引續漢志曰大將軍營有五部部三校尉部下有曲曲有軍候一人咳唾吏史趨法書要録羲之帖云頃因小差欲極遊娛而吏卒守之可歎耳形骸束簮笏可意一事無杜詩咸陽客舍一事無謀生理未拙仰愧擁腫樗莊子道遙遊萹惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨曲肱晴簷砥結網看蜘蛛宿觀山莫發白下地白下見上暝投觀山宿橫溪赤欄橋溫飛卿樂府云一渠春水赤欄橋一徑入松竹野僧如驚麏文選沈休文詩驚麏去不息避堂具燈燭曹參傳避正堂舍蓋公我眠興視夜詩子興視夜部曲始炊熟筧水煙際鳴以竹通水曰筧古典切万籟入秋木莊子齊物論敢問天籟子綦曰吹万不同而使其自巳也平生蕭灑興本願終澗谷杜詩非無江海志蕭灑送日月丗纍漸逼人晉謝安傳亹亹為來逼人如垢不靧沐禮內則五日則燂湯請浴三日具沭其間靣垢燂潘請靧釋文曰靧音悔巳成老翁為作吏長碌碌杜詩顔狀老翁為文選魏文帝書巳成老翁但未白頭耳史記平原君傳公等碌碌因人成事上大蒙籠乙卯晨起黃霧冥冥小石門苔衣草路無人迹尓雅藫石衣注水苔也苦竹參天大石門杜詩喬木上參天虎迒兔蹊聊倚息尓雅麋其迹躔兔其迹迒注迹腳所踐處迒户郎切隂風搜林山鬼嘨宋玉風賦梢殺林莽屈原九歌有山鬼萹千丈寒藤繞崩石清風源裏有人家牛羊在山亦桑麻向來陸梁嫚官府陸梁見上莊子官天地府万物試呼使前問其故衣冠漢儀民父子光武紀復見漢官威儀吏曹優之至如此窮鄉有米無食鹽今日有田無米食當作今日有鹽無食米但願官清不愛錢太白贈崔秋浦云見客但傾酒為官不愛錢縣古槐根出官清馬骨髙見歐陽公詩話長飬兒孫聽驅使退之贈盧同云有力未免遭驅使勞坑入前城乙卯飯後刀坑石如刀勞坑人馬勞窈窕篁竹隂退之送區册序云夾江荒茅篁竹之間本出漢書是常主逋逃武成云為天下逋逃主白狐跳梁去甘泉賦注云陸梁跳也豪豬森怒嘷雲黃覺日瘦杜詩久行見空巷日瘦氣慘悽木落知風叨退之祭文云雪虐風號號一作叨輕軒息源口飯羮煮溪毛左傳澗溪沼沚之毛山農驚長吏退之詩山農驚見之出拜家騷騷檀弓騷騷耳則野借問淡食民祖孫甘餔糟退之徐偃王碑祖孫相望楚詞餔其糟而啜其醨賴官得鹽喫正苦無錢刀契布刀皆錢也食貨志王莽造契刀錯刀乙卯宿清泉寺稅輿陟髙岡詩卷耳云陟彼髙岡却立倚尺壁宋玉大言賦長剱耿介倚天外東坡詩倚天無數開靑壁就輿亂清溪轉石為霹靂太白詩崩崖轉石万壑雷十步一沮洳魏國風彼汾沮洳五步一枳棘上方未言返上方見上豁見平土宅書是降丘宅土孟子然後人得平土而居之田家雞犬歸佛廟檀欒碧枚乘菟園賦修竹檀欒夾池水旋菟園蓮蕩落紅衣趙嘏詩紅衣落盡渚蓮愁泉泓數白石人如安巢鳥稍就一枝息莊子鷦鷯巢於深林不過一枝鍾魚各知時吾亦自得力杜詩生我不得力丙辰仍宿清泉寺山農居負山呼集來苦遲既來授政役文選東京賦賦政任役常畏人力之盡也謡詠謂余欺按省其家資可忍鞭抶之元結春陵行悉使索其家而又無生資左傳一抶女庸何傷注抶擊洲敕擊切恩言諭公家疑阻久乃隨滕口終自愧易咸之上六滕口説也吾敢乏王師官寧憚淹留官字蓋用韓退之瀧吏詩云瀧吏垂手笑官何問之愚譬官居京邑何由知東吳職在拊􅑱婺矛牙所將部曲多溷汝父老為漢陸賈傳母久溷汝為也西山失半壁太白詩靑山猶銜半邊日又云半壁見海日且復下囊輜漢王古傳所載不過囊衣左傳襄十二年楚重至于泌注云輜重也正義曰輜一名軿前後蔽以載物啼鴉散篇帙靈運詩散帙問所知詩意謂日暮罷休文書也休吏見上稅巾衣石泉鼓坎坎詩坎坎鼓我言泉鳴如鼓聲竹風吹參差楚詞吹參差兮誰思注參差洞簘也輔注曰風俗通云舜作簘其形參差此聮雖以簫鼓為喻然亦取栁子厚南澗詩回風一簘瑟林影久參差也書憐行熠耀詩熠耀宵行注熠耀磷也磷螢火也詩蓋取車㣧聚螢之意壁蟲催杼機古今注促織一名投機謂其聲如急織也昏缸夜未央缸燈也西都賦金釭銜壁夜未央見詩髙枕夢登巇丁巳宿寶石寺鍾磬秋山靜栁子厚詩鶴鳴楚山靜爐香沉水寒楞嚴經云見諸比丘燒沉水香晴風蕩濛雨詩東山零雨其濛雲物尚盤桓歸去來詞云撫孤松而盤桓注云尓雅曰盤桓不進也瀹茗赤銅碗筧泉蒼煙竿紅榴罅玉房吳都賦云榛栗罅發文選六士衡弔魏武文云陪窈窕於玉房注引漢書郊祀歌曰神之出排五房栁子厚詩侯家熾炭雕玉房此摘其字么橘委金丸西京雜記韓嫣好彈以金為丸枕簟巳思燠飯羹可加餐翟方進傳飯我豆食羮芋魁加餐見上觀巳自得力談玄舌本乾晉殷仲堪傳每云三日不讀道德經覺舌本間強理窟乃塊然晉張慿傳簡文帝召慿與語嘆曰張慿勃窣為理窟丗故浪万端杜詩丗故莽相仍王莽傳云方故万端牛刀經肯綮莊子庖丁解牛技經肯綮之未嘗古人貴守官左傳守道不如守官摩挲發硎手考此一丘槃摩挲見上刀刃若新發於硎亦庖丁事衛國風考槃在澗注去考成槃樂也己未過太湖僧寺得宗汝為書寄山蕷白酒長韻寄答從學晚聞道莊子曰孔子行年五十有一而不聞道謀官無見功魏伯陽參同契云竭力勞精神終身無見功早衰觀水鑒酒誥云人無於水監當於民監注視水見巳形內熱愧鄰邦莊子人間丗萹今吾朝受命而夕飲氷我其內熱歟北鄰有宗侯治劇乃雍容摩手撫鰥寡藁砧磔強梁莊子從其強梁隨其曲轉樂府詩云藁砧今何在藁砧鈇也項籍傳身伏斧質師古曰質謂鍖也古者斬人加於鍖上而斫之鍖竹林反景帝紀云改磔曰棄市師古曰磔謂張其尸也棄市殺之市也磔竹客反挑李與荆棘見此卷寄張冝父詩注稱物施露霜言恩威兼用如雨露霜雪也詩云蒹葭蒼蒼白露為霜此摘其字政經甚稹密私不蚍蜉通韓文無蚍蜉蟻子之援比言無一蟻之私也吏舍無請賕曹參傳後園近吏舍吏舍日飲歌呼趙廣漢傳吏受取請求銖兩之姦皆知之尹賞傳受賕報仇家有侯在堂府符下鹽䇿𬋩子曰海王之國謹正鹽策十口之家十人食鹽百口之家百人食鹽縣官勸和羮書若作和羮作民敏風雨令先諸邑行我居万夫上闒惰世無雙此邑宅岩岩魯頌太山岩岩里中頗秦風翁媪無恙時出分如蜂房賈誼書秦人家冨子壯則出分家貧子壯則出贅一錢氣不直白挺及父兄簮筆懷三尺揖我謂我臧山谷江西道院賦序其略云江西之俗其細民險而健以終訟為能名曰珥筆之民惟筠為州獨不嚚於訟然與南康廬陵冝春三郡並蒙惡聲廬陵即吉州也齊國風還云揖我謂我臧兮三尺見上向來豪傑吏治之以牛羊我不忍敵民教養如兒甥荆雞伏鵠卵久望羽翼成莊子庚桑楚萹越雞不能伏鵠卵魯雞固能矣音義曰小雞也或云荆雞魯雞大雞也今蜀雞張良傳上召戚夫人指視曰羽翼巳成不可動矣訟端洶洶來諭去稍聽從尚餘租庸調見唐書歲歲稽法程漢賈誼䇿云立經陳紀可以為万丗法程按圖索家資四壁逹牖窗掩目鞭朴之檀弓每斃一人掩其目桁楊相推掁莊子云桁楊接槢音義云械夾頸及脛者身𣣔免官去駑馬戀豆粳桓範出赴曹爽蔣濟曰駑馬戀棧豆爽必不能用也見魏志所以積廪鹽未使户得烹八月釃杜酒公私樂年登遣徒與會稽史記夏紀太史公曰禺會諸侯江南計功而崩因葬焉命曰會稽會稽者會計也而悉走荻篁吾惟不足遣張良傳上曰吾惟之豎子固不足遣乃公自行耳夙駕略我疆邑西軱戾地車犬當作軱音孤莊子庖丁解牛技經肯綮之未嘗而况大軱乎注云軱戾大骨也音義云盤結骨是嘗嬰吾鋒齦齕其強宗齦齧也口狼切退之曹成王碑齦其姦猖漎田儋傳云秦復得志於天下則齮齕首用事者墳墓矣注云齮側齧也音蟻齕咬也音紇彼乃可使令夙夜于逺郊草露沾帷裳詩漸車惟裳入磴履虎尾用易履卦語捫蘿觸蠆芒杜詩捫蘿澀先登借問夕何宿煙邊數峰橫松竹不見天楚詞山鬼余處幽篁兮終不見天漢書廣川王歌曰內茀鬱憂哀積上不見天生何益蟠空作秋聲谷鳥與溪瀨合絃琵琶筝楚詞石瀨兮濺濺張籍祭退之詩云乃出二侍女合彈琵琶筝稅駕亂石間岩寺鳴踈鍾山農頗來服見其父孫翁退之銘馬少監云吾未耄老而哭其祖子孫三丗苦辝王賦遲戶戶無積藏民病我亦病呻吟逹五更韻為誦書語一作書生語行歌類楚狂論語楚狂接輿歌而過孔子舉鞭問嘉禾秣馬可及城嘉禾謂吉州永新縣也縣有禾山故號嘉禾此卷先有答永新宗令寄石耳詩云嘉禾令尹淸如冰宗令即汝為也惜哉憂城旦漢儒林傳竇太后好黃老轅固曰此家人言矣太后怒曰安得司空城旦書乎惠帝紀當為城旦舂者皆耐為鬼薪白粲注云城旦者旦起行治城舂作米皆四歲刑也不得對榻床􅎈筆付飛鳥北風吹報章書回銀鈎壯見上句與麝煤香李建中題楊凝式大字壁後云枯衫倒檜霜天老松煙麝煤風雨寒山谷喜書此詩浮蛆撥官醅太白詩恰似蒲桃新撥醅傾壷嫩鵝黃杜詩鵝兒黃似酒對酒愛新鵝山氣常蓊㔩杜詩蓊匌川氣黃此物可屢觴蕷藥割紫藤開籠喜手封味溫頗宜人杜詩踈快頗宜人芼以石飴薑舉杯引藥糜詠詩對寒江寄聲甚勞苦寄聲勞苦並見上相思秋月明我邑萬戶鄉其民資嚚凶欲割以夀公使之承化光反以來壽我中有吞舟鯨杜詩中有掉尾鯨銅墨俱王命文選䇿秀才文深汰圭符妙筒銅墨注云圭符謂刺史銅墨謂縣令漢書曰縣令長皆秦官秩六百石銅印墨綬職思慰孤惸詩職思其憂何時賭一擲燒燭呪明瓊晉劉毅傳樗蒱大擲一判至數百萬列子説符萹射者射明瓊注云齒五白也此卷先有三月乙已來賦鹽萬歲山中一首今觀此詩可見鹽之優民甚矣司馬溫公記聞載皮公弼言官賣鹽無利實録載皮公弼言官賣鹽不得不罷今觀此詩蓋官賣不售而賦之民也前三首有月日後十一首止稱甲子自癸丑至辛酉凡浹旬歷盡﨑嶇雖不能無怨而詞甚宛庚申宿觀音院谷底一墟落文選范彥龍詩軒蓋照墟落李善曰説苑云師曠謂晉平公曰五鼎不當生墟落地形如盎盆榱題相照耀孟子榱題數尺釋文云尓雅曰桷謂之榱題頭也其民頗家溫董仲舒傳家溫而食厚祿土風甚於秦不可借釡甗音言賈誼言秦俗云借父耰鉏慮有德色母取箕帚立而誶語僧屋無陶瓦剪茅蒼竹樊眺錯傳茆茨不剪詩東方未明折栁樊圃注樊藩也借問僧安在乞飯走諸門人閧鳥烏語法言云一閧之市簟涼風水文退之詩水文浮枕簟旁有蜂蜜廬山海經云是惟螫蟲實惟蜂蜜之廬頗聞衙集喧禆雅蜂有兩衙應潮錢昭度村居云黃蜂衙退海潮上白蟻戰酣山再來見談苑將兩蟻爭丘鏖兵復追奔異聞集淳于棼夢人扶入宅南古槐穴中有大城門樓題曰大槐安國其王以女瑶芳妻之使為南柯郡守二十年有檀蘿國來伐王命生征之敗績其妻病死王謂生可暫歸生上車出一穴見本里閭巷入其門見巳身卧堂廡下發悟如𥘉夢中倐忽若度一丗矣遂尋古槐下穴見大穴洞然積土壤為城郭臺殿之狀有蟻數斛中有小臺二大蟻處之即槐安國也又窮一穴直上南枝亦有土城小樓即南柯郡也宅東一里澗側有大檀樹藤蘿擁織旁有蟻穴意其為檀蘿國也合短兵鏖皋蘭下見霍去病傳追奔逐北見文選李陵書紅英委鳯翼赤幘峩雞冠老杜樹雞柵詩云終日憎赤幘今以言雞冠花汲烹寒泉窟伐竹古松根相戒莫浪出月黑虎夔藩老杜課伐木詩序云我有藩籬是缺是輔有虎知禁若恃爪牙之利必昏黑摚突夔人屋壁山谷蓋用此語而杜詩作於夔州所謂夔人蓋夔州之人也老杜有夔府詠懷詩云市暨瀼西巔自注云市暨夔人語也夔人屋壁即此類文選靈光殿賦頷𣣔動而躨跜夔藩蓋誤以夔人為躨跜之義也躨跜動也辛酉憩刀坑口群山黛新染蒙氣寒鬱欎漢京房傳上封事曰辛酉以來蒙氣衰去太陽精明辛巳蒙氣復乘卦太陽侵色復上封事曰乃丙戍小雨丁亥蒙氣去掃除迎將家莊子寓言萹其往也舍者迎將其家公執席釋文曰家公主人公也讀舍者迎將其家為句此事本出列子列子云舍者迎將家注云客舍家也山谷本用此語而莊子云迎將其家多一其字轉寫誤耳釋文又承誤也下簟脫巾襪退之送文暢詩詭制恆巾襪南北舍小棠詩蔽芾甘棠勿翦勿伐召伯所茇毛云蔽芾小貌箋云舍小棠之下况可清煩暍文選西京賦此焉清暑史記禹扇暍暍暑病也鳥聲廢書眠聊以休吏卒竹雞苦喚人北夢瑣言醫工云竹雞食半夏陶嶽零陵記云竹雞狀如鶉尾少長大率皆鳩也方言各異耳喚謂喚雨覺坐觀法窟無外同一家見上惟巳非万物清波兩鴛鴦善遊且能沒莊子逹生萹顔淵問仲尼曰吾嘗濟乎觴深之淵津人操舟若神吾問焉曰操舟可學邪曰可善遊者數能若乃夫沒人則未嘗見舟而便操之也驚人相追飛甚念失其匹文選劉安招隱士云禽獸駭兮亡其曹春鉏貌間暇尓雅鷺春鉏鵬鳥賦止於坐隅貌甚間暇羡魚情至骨董仲舒云臨川羡魚不如退而結網杜周傳內深次骨注云深刻至骨也廣道䇿堅良漢食貨志乘堅䇿良熙熙集於苑國語晉施優謂李克妻曰主孟啖我我教兹暇豫事君乃歌曰暇豫之吾吾不如鳥烏人皆集於苑巳獨集於枯里克曰何謂苑何謂枯曰其母為夫人其子為君可不謂苑乎其母既死其子又有謗可不謂枯乎詩苑彼栁斯鳴蜩嘒嘒苑音欎今叶韻當用此音爛額始論功倘能謀曲突漢霍光傳𥘉霍氏奢侈茂陵徐生曰霍氏必亡乃上疏言霍氏泰盛冝以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人默然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰向使聽客之言不費牛酒終亡災悉今論功而曲突徙薪亡恩澤燋頭爛額為上客耶主人寤而請之今茂陵徐福數上書言霍氏且有變冝防絶之使福説得行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既巳而福不蒙其功唯陛下察之此詩萹末蓋有所諷也金刀坑迎將家待追漿坑十餘戶山農不至因題其壁窮鄉阻地險篁竹嘨夔魖篁竹見上國語云木石之怪夔水之怪龍文選東京賦殘夔魖與罔象注云夔木石之怪説文曰魖耗鬼也甘泉賦亦云梢夔魖而抶獝狂惡少擅三窟見上不承吏追呼老翁燕無凶此句疑舛誤偃蹇坐里閭後生集聞見官不禁權輿尓雅權輿始也懷書斥長吏持杖鏖公徒鏖見上魯頌公徒三萬遂令五百里化為豺豕墟古來沉牛羊檄水臣鱷魚韓退之告鱷魚文云以羊一豬一投惡溪之潭水以與鱷魚食而告之曰云云猛虎剝文章矧而民髮膚孝經身躰髮膚哀哉奉其身曽不如鳥烏注見前萹破家縣令手南面天子除要能伐強梁然後活惸孤屬為民父母未教忍先誅孟子曰惡在其為民父母也又曰其教之不改而後誅之乎山川甚秀拔人物亦詩書十室有忠信此鄉何獨無見論語江西泊舟後作太和小舫板上塵土中得此詩莆田李才甫江水冥冥沙石隂一舸行盡春巳深浪花緑蔓曵錦帶短蘆刺水抽玉簮飢魚未沉波面筒小舫正橫溪上風清輝濯淨逺山碧白鳥飛入蒼煙叢追憶子泊舟西江事次韻老大無機如漢隂苐一卷次韻答張沙河亦有此句巳詳注白鳥不去相知深文選江文通詩亹亹玄思清胸中去機巧物我俱忘懷可以狎鷗鳥李太白鳴皋歌云白鷗兮飛來與君兮相親往事刻舟求墜剱吕氏春秋察令萹楚人有涉江者其剱自舟中墜於水遽契其舟曰是吾剱之所從墜舟止從其契者入水求之舟巳行矣而剱不可求懷人揮淚著直略反亡簮韓詩外傳孔子出遊少源之野有婦人中澤而哭甚哀使弟子問焉婦人曰向者刈新亡吾蓍簮是以哀也弟子曰亡蓍簮有何悲焉婦人曰非傷亡簮也蓋不忘故也城南鼓罷吹去畫筒城北歸帆落晚風人煙犬吠西山麓鬼火狐鳴春竹叢杜詩隂房鬼火青漢陳勝傳叢祠中夜篝火狐鳴以十扇送徐天隱人貧鵝鴈聒鄰墻退之詩有時未朝餐得米日巳晏隔墻聞歡呼衆口極鵝鴈公貧琢詩聲繞梁列子湯問萹昔韓娥東之齊匱糧過雍門鬻歌假食既去而余音繞梁欐三日不絶坐客有氊吾不愛杜詩坐客寒無氊暑榻無扇公自涼黨錮諸生尊孺子后漢徐稚字孺子建安七人先偉長建安七人孔融自有傳余皆附魏志王􅙾傳後徐幹字偉長取同姓也詳見苐二卷新詩淩建安注又按文選典論曰今之文人魯國孔融廣陵陳琳山陽王粲北海徐幹陳留阮瑀汝南應瑒東平劉楨斯七子者於學無所遺於辝無所假退之詩建安能者七卓犖變風操遣奴送箑非為好恐有佳客或升堂聞致政胡朝請多藏書以詩借書目万事不理問伯始万事不理問伯始天下中庸有胡公見後漢胡廣字伯始傳藉甚聲名南郡胡名聲藉甚見陸賈傳胡廣南郡華容人逺孫白頭坐郎省蔡質漢官典聀云尚書郎省中以胡粉塗壁乞身歸來尤好書手抄万卷未閣茟唐劉知幾傳云閣茟相視含毫不斷心醉六經還荷鉏列子見之而心醉見列子中説云心若醉六經目若營四海願公借我藏書目時送一鴟開鎖魚古語借書一癡還書一癡或謂癡當作瓻説文云瓻音絺注酒器按集韻瓻字注云古以借書借書餽酒一瓻還書亦餽酒一瓻獨蘇黃詩乃作鴟東坡云不持兩鴟酒肯借一車書山谷又有詩云莫惜借行千里他日還君一鴟秦少遊亦云知續春明退朝録借觀當奉一鴟還蓋用揚雄酒葴鴟夷滑稽腹大如壷盡日盛酒人復借酤師古曰韋囊盛酒即今鴟夷滕也芝田緑云門鑰必以魚者取其不瞑目守夜之義次韻郭明叔長歌君不見懸車劉屯田騎牛澗壑弄潺湲八十唇紅眼點􅃮金鐘舉酒不留殘謂劉渙凝之也詳見苐二卷注晉杜乂傳眼如點􅃮庾信詩飲酒那得留殘君不見征西徐尚書為國捐軀矢石間徐禧字德占洪州分寧人與山谷同鄉死於永樂之禍巳見此卷過家上冡詩注贈吏部尚書諡忠愍文選曹子建詩云誰言捐軀昜殺身良獨􅭑龍章鳯姿委秋草晉嵆康傳人以為龍章鳯姿天質自然唐李機傳龍章鳯姿士不見用麞頭鼠目子乃求官耶天馬長辝十二間周禮校人曰天子十有二間馬六種何如髙陽􅐱生醉落魄長揖輟洗驚龍顔􅐱食其傳陳留髙陽人落魄無衣食業為里監門沛公略地陳留麾下騎士適食其里中子從容言食其食其入謁沛公方踞床令兩女子洗食其長揖不拜沛公輟洗起衣謝之丈夫當年傾意氣太白豪士歌意氣相傾山可移安用蚓食而蝎跧孟子夫蚓上食稿壤古人巳作泉下土風義可想尤班班後漢五行志童謡曰車班班入河間郭侯忠信如古人薦書飛名上九關楚詞虎豹九關啄害下人詩書自可老斫輪輪扁行年七十而老斫輪見莊子智略足以解連環莊子言惠施之辨曰連環可解也銅章屈宰山水縣漢官儀縣令秩六百石銅章墨綬退之詩出宰山水縣讀書松桂林友聲相求不我頑詩求其友聲鵬翼垂天公直起莊子其名為鵬翼若垂天之雲燕巢見社身思還文思舜禹開言路杜牧詩文思天子復河湟字本出堯典思息嗣反又如字即看承詔著豸冠漢官儀御史四人持書皆法冠一名柱後一名獬豸冠尚趍手板事直指手板見苐一卷注雋不疑傳暴勝之為直指使者少忍吏道之多艱漢薛宣傳吏道以法令為師黃花零落一尊酒别有天地非人寰太白詩問君何事栖碧山笑而不答心自間桃花㳅水窅然去别有天地非人間山谷外集詩注卷六
