front:
  text: 山谷外集詩注卷之六
  hash: sha256:3726d462cac83ca2648b2f568c898aaee026e5f547c5a8e6d2d91e007eff35e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_006-1a}
body:
  text: 三月乙巳來賦塩萬歲郷且蒐狝匿賦之家晏飯此舍遂留宿是日大風自採菊苗薦湯餅二首飛廉快雲開白日離騷云前望舒使先驅兮後飛廉使奔属注飛廉風伯也頓撼天地萬竅号退之女拏壙銘云輿致走道撼頓莊子齊物篇云大塊噫氣其名爲風是唯無作作則萬竅怒呺挼莏桃李欲浄盡曲礼云共飯不澤手注澤謂挼莎也刘禹錫玄都觀詩桃花浄盡菜花開乞與游絲百尺髙退之同冠峽詩落英千尺墯游絲百丈飄幽叢秀色可欖擷大業拾遺帝曰古人云秀色若可餐杜牧之云光潔疑可攬欲以襟懐貯晋志隆安中民作懊惱歌有草生可攬結之言煑餅菊苗深注湯崔氏四民月令曰立秋無食煑餅及氷溲餅飲氷食蘖浪自苦白楽天詩三年爲刺史飲氷復食蘖摩挲滿懷春草香後漢薊子訓傳摩莎金狄四月戊申賦塩万歳山中仰懷外舅謝師厚山谷銘胥夫人謝氏墓云嘗任司封郎中提點成都府路刑獄公事或以疑似中之坐失官数年巳而有大臣冤其獄天子直之今爲屯田郎中通判㐮州名景𥘉者父也景𥘉字師厚只今漢龐公白髮佐州郡後漢書龐公者南郡㐮陽人也用㐮陽事因以龐比師厚窮通視寒暑莊子譲王篇古之得道者窮亦楽通亦楽所楽非窮通也道得於此則窮通爲寒暑風雨之序矣仕巳誰喜愠見上長松卧澗底文選詩欎欎澗底松離離山上苗以彼徑寸葉䕃此百尺條丗胄漸髙位英俊沉下寮桴霤多裂璺方言器破而未離謂之璺未須論才難栁子厚詩才難不其然字本出論語丗人無此韵晋庾敳傳雅有逺韵禅恱称性深維摩經云雖復飲食而以禅恱爲味語端入理近渙若開春氷左傳序云渙然氷釋超然听年運老子燕処超然莊子年運而往臨民秉三尺漎杜周傳客有謂周曰君爲天下平不循三尺法注云以三尺竹簡書法律也左傳魯秉周礼朱墨不可紊後周書蘇綽傳始制文案程式朱岀墨入傳聞但言㱕心許手自隠自隠見第二卷次韵師厚注欲知南陂稲得幾就収捃後漎范丹傳捃拾自資注引它書云捃拾麥得五斛胥䟽江湖濵莊子山木篇猶且胥䟽於江湖之上不迩金玉訓詩云母金玉尓音濡需且肉食莊子徐无鬼篇濡需者豕蝨是也擇䟽鬣自以爲廣宫大囿不知屠者之一旦皷臂布草操煙火而巳与豕俱焦也觳觫恐鍾釁孟子對斉宣王曰王坐於堂上有牽牛而過堂下者王曰牛何之對曰將以釁鍾王曰舎之吾不忍其觳觫龍移山發洪虎乳月生暈淮南子虎嘨而谷風至龍㪯而景雲屬月生暈謂月暈而風也竹声寒夏簟輟寢中夜听寄声向鹿門倘賜勞苦問龐公傳云遂携妻子登鹿門山因采薬不反劳苦見漎張耳傳上權郡孫承議公家簿領如雞棲簿領見上車如雞棲馬如狗見陳蕃傳後私家田園无置錐荀子无置錐之地而明於爲社稷之大義真成忍罵加飡飯杜詩真成浪岀游文選古詩弩力加餐飯不如江西之水可楽飢詩泌之洋洋可以楽飢它人勤拙猶相𥙷楽天詩救煩无若静𥙷拙莫如勤列子云恩過不相𥙷矣漎何武傳垩王有計功除過故云无功狀身无功狀堪上府漎朱博傳齎伐閱詣府注伐功勞也于定囯傳具獄上府公誠遣騎束縛㱕文選魏文帝書今遣騎到鄴老杜云大官喜我来遣騎問所須山谷在太和閱郡守三人按集中所誌墓云吉州姚公元豐辛酉卒又一誌云知吉州畢公元豐五年十一月卒又按吉州西峯院三秀亭記云廬陵比缺守輒以他吏攝承託宿傳舍胥視民爲俎豆執鞭者衆羊失其牧元豐六年春詔用夀春魏矦以此觀之則孫權郡者必能病諸邑故詩有忿語長隨白鷗卧煙雨寄懷元翁嵗年豐稻秔井邑盛煙火選詩井邑自相循注引周禮九夫爲井四井爲邑史記律書煙火萬里北園曾未窺董仲舒傳三年不窺園王事方勤我詩王事適我花枝互低昂韓文公詩道旁草木花紅紫相低昂歐陽公詩薫風入花骨花枝互低昂鳥語相許可觀物見歸根撫時終宴坐漢蕭何傳上奏許可師古曰可其所奏許其所請老子云萬物並作吾以觀其復夫物芸芸各復歸其根歸根曰静是謂復命宴坐見上搔首望四鄰諸賢皆最課極工簿領書甚辨米塩顆班固叙傳云奏課運最韓詩寄鄒刺史初如遺宦情終乃最郡課史記天官書其占驗淩雜米塩漢書咸宣傳其治米塩平生矩朱墨見上吏考仰丞佐𥘉无公侯心骨相本寒餓退之詩自歎虞飜骨相屯明䆫懷王友清絶吟楚些見楚詞招魂南史王琳傳時謂銓錫二王玉昆金友念君方坐曹薛宣傳日至休吏賊曹掾独不肯休坐曹治事无因奉虚左史記魏公子无忌傳公子從車騎虚左自迎夷門侯生魏勃願見相君无因見斉悼恵王傳對酒次前韻寄懷元翁花光漸寒食木燧催囯火鄴中記并州一百五日爲介子推断火冷食三日内則云大䥴木燧注云木燧鑚火也周礼司灌掌行火之政令四時変囯火以救時疾沽酒鳥勸人見上懷䝨吾忘我莊子斉物論云今者吾䘮我注云我自忘矣事往墯甑休孟敏荷甑墯地不頋而去林宗見而問其意對曰甑巳破矣視之何益林宗異之勸令游斈十年知名見後漎郭太傅心知求田可刘備謂許汜曰君求田問舎言無可采附吕布傳後可人不在眼礼記管仲遇盗取二人焉上以爲公臣曰其所與游辟也可人也樽爼思促坐有生常倥偬後漢卓茂傳斯固倥偬不暇給之日無暇天所課不解聞健飲白楽天詩聞健偷閑且勤飲俄成一蓬顆賈山傳曽不得蓬顆蔽冢而託宿焉泥鈞埏萬物董仲舒䇿云猶泥之在鈞唯甄者之所爲老子云埏埴以爲器注云埏和也埴土也寒暑勤五佐史記天官書云天神貴者太一太一佐曰五帝按月令四時皆有帝而土王四季豈其懷爱憎私使我窮餓莊子太宗師篇云父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉醉魂招不來浪下巫陽些退之詩愁狖酸骨死恠花醉䰟馨招䰟云帝告巫陽曰有人在下我欲輔之䰟魄離散汝筮與之夢成少年嬉走馬章臺左漢張敞傳走馬章臺街太白詩靑雲少年子挾弹章䑓左奉荅茂衡惠紙長句陽山老藤截玉肪文選魏文帝論玉玦書云白如截肪唐舒元輿弔剡藤文剡溪上多古藤溪中多帋工斬伐無時烏田翠竹避寒光蘇昜簡紙譜今江浙間有以嫰竹爲紙者作宻書隨手裂烏田地名羅侯包贈室生白莊子虚室生白明於機上之流黃楽府詩長安有狹邪行大婦織綺羅中婦織流黄又文選別賦注間色有五紺紅縹紫流黄愧無征南蠆尾手法書要録載宋羊欣古来能書人名云燉煌索靖張芝姊之孫晋征南司馬亦善革書又載王僧䖍論書云索氏自謂其書具銀鈎蠆尾晋書不言曽爲征南司馬爲冩黄門急就章急就章漢黄門令史游撰羅侯相見無雜語陶詩相見無雜言但道桑麻長苦問潙山有無句春草肥牛脫鼻繩潙山露地白牛石鞏禅師牧牛入草便拽鼻孔來並見第二卷覔銅犀注菰蒲野鴨還飛去傳燈録百丈与馬祖遊山見野鴨子祖問曰是甚麽丈曰野鴨子又曰甚麽処去丈曰飛過去祖遂引手掐百丈鼻丈作痛声祖曰何曽飛過去丈於是大悟山谷嘗草書一偈云野鴨子知何許馬祖見来相共語話尽山空水月清依前不㑹還飛去還飛去却把住故將藤靣乞伽佗𣑽語伽佗此言諷誦楞嚴經祕密伽陁微妙章句願草驚虵起風雨法書要録王羲之自叙草書势云疾若驚虵之失道遟若録水之徘徊長詩說𥿄落秋河要知溪工下手処溪多𥿄工見上却將氷幅展似君震旦花開第一祖梵語震旦此云漢地第一祖謂迦葉也二十八傳而至逹磨達磨天竺囯人告尊者曰我旣得法當往何囯而作佛事尊者曰待吾㓕後當往震旦後寓止嵩山少林寺以法傳慧可告之曰昔如来以正法眼付迦葉大士展轉嘱付累而至於我我今付汝听吾偈曰吾本来兹土傳法救迷情一花開五葉結果自然成證道歌曰第一迦葉百傳燈二十八代西天記入此土菩提逹磨爲𥘉祖雜言贈羅茂衡嗟来茂衡莊子嗟来桑戸乎學道如登囯語云諺曰從善如登從悪如崩淳化帖有何氏書云道大難俗情見善從善如登欲與天地爲友欲與日月並行万物峥嶸本由心生去子之取舎與爱憎莊子去子之態色與淫志惟人自縛非天黥傳燈録僧璨傳有沙弥礼師曰乞與解脫法門師曰誰縛汝又曰律師持律自縛莊子天刑之安可解又曰庸詎知造物之不息我黥而𥙷我劓墮子䈥骨莊子墮汝形躰吐尓聦明又云忘汝神氣墮汝形骸堂堂法窟九丘四溟書序曰九州之志謂之九丘丘聚也左傳曰楚左史倚相能讀三墳五典八索九丘四溟見上同一眼精不改五官之用而透聲色荀子天論篇耳目鼻口形能各有接而不相能也夫是之謂天官心居中虚以治五官夫是之謂天君常爲萬物之宰而無死生念子坐幽室爐香思靑冥是謂蛰蟲欲作吾驚之以雷霆莊子天運篇蛰虫始作吾驚之以雷霆長句謝陳適用恵送呉南雄所贈紙廬陵政事無全牛吉州治庐陵縣適用與山谷同時作邑莊子庖丁對文恵君曰始臣之解牛之時所見无非全牛者三年之後未嘗見全牛也恐是漢時陳太丘後漢陳寔傳除太丘長修德淸浄百姓以安書記姓名不肯斈項籍傳少時斈書不成去斈劒又不成去籍曰書足記姓名而巳得紙无異夏得裘琢詩包紙送贈我自狀明月非暗投見上詩句縱横剪宫錦惜无阿買書銀鈎退之詩阿買不識字頗知書八分詩成使之冩亦足張吾軍銀鈎見上蠻溪功藤卷盈百側厘羞滑蠒羞白拾遺記南越献側理帋南人以海苔爲之其理縱横斜側因以爲名蘇易簡帋譜云張華造博物志成晉武帝賜側理帋万畨南越所貢也本草陟厘陶隱居云此即南人所用作帋者唐本注云此物乃水中苔今取爲帋音陟厘陟厘与側黎相近側黎又与側理相近也又云即石髮也蠒帋見上想當鳴杵砧面平桄榔葉風溪水碧桄榔木廣南所岀此帋吴南雄所贈南雄州隷廣南東路千里鵝毛意不輕復斎謾録云諺曰是人眼裏有西施又曰千里寄鵝毛物輕人意重皆鄙語也山谷取以爲詩荅公益春思云西施逐人眼称心最爲得謝陳適用恵紙云千里鵝毛意不輕瘴衣腥膩北㱕客君侯謙虚不自供胡不贈丗文章伯老杜詩同心不减骨肉親每語見許文章伯一涔之水容牛蹄淮南子曰牛蹄之涔无尺之鯉識字有数我自知楊文公談苑云晋開運中詔令两制各作詩賦一篇付礼部爲考試之式獨斈士李懌不肯曰李懌識字有数因人成亊使令衣白𫀆入貢部下第必矣胡能作文章爲丗模楷時論美之小時双鈎斈楷法山谷論斈字云先當双鈎用两指相疊蹙筆壓无名指髙捉筆令腕随巳左右然後觀人字格則不患其難矣至今兒子憎家雞南史王僧䖍傳論書云征西庾翼書少時与右軍斉名右軍後進庾猶不分在荆州与都下人書云小兒軰賤家雞皆斈逸少書雖然嘉恵敢虚辱賈誼賦恭承嘉恵兮煑泥續尾成大軸後漢鄧訓傳注云東觀記曰訓故吏最貧嬴者念訓常所服薬北州所乏又知訓好青泥封書從黎陽步推鹿車於洛陽市薬還過趙囯易陽并載青泥一襆至上谷遺訓其得人心如此冩心與君心莫傳平生落魄不問天􅐱食其傳家貧落魄又音薄杜詩自断此生休問天樽前花底幸好戲杜詩退朝花底散爲君絶筆謝風煙巳无商頌猗那手商頌以那爲首其辝曰猗与那与請續南華内外篇莊子號南華真經内萹七外萹三十三次韻吉老遊青原將歸欣欣林皐楽莊子知北萹山林与皐瀼与使我欣欣然而楽与賞心天際翔文選謝靈運詩序賞心楽事淸樽鱠魴鯉詩六月云炰鼈膾鯉采緑云其釣維何維魴及鱮朱果灾圎方文選南都賦珍羞琅玕充溢圎方王仲宣詩嘉肴充圎方醉罷聽踈雨孟浩然詩踈雨滴梧桐衾寒夢囯香左傳宣三年𥘉鄭文公有賤妾曰燕姞夢天使与巳蘭曰余爲伯儵余而祖也以是爲而子以蘭有囯香人服媚之如是旣而文公見之与之蘭而御之生穆公名之曰蘭雨餘山吐月杜詩四更山吐月的皪滿簾霜上林賦明月珠子的皪江靡展轉復展轉詩云輾轉反側張籍宛轉行云宛轉復宛轉憶憶更未央鍾魚暁瑯瑯思㱕笑迎門児女相扶將扶將岀拜見上次韻知命永和道中靈骨閟金鏁續玄恠録延州有婦人少年子悉与之狎昵数歳而殁葬於道左大暦中有胡僧敬礼其墓曰此乃大慈悲喜捨即鏁骨菩薩也衆開墓視其骨鈎結如鏁狀丗傳觀音化身所謂金沙灘頭馬郎婦類此梵宫超玉繩選詩玉繩低建章玉繩星名言超岀星辰之上道人往香火獨先開静行栁子厚詩始悟三空門華堂開浄域東坡云酌茗開浄筵山谷云獨先開浄行其意一也呼船乆无人月沉河漢傾杜詩七星在北戸河漢声西流謂天河也虚舟不受怒故在蓼灘横莊子山木篇方舟而済於河有虚舟来觸舟雖有𥚹心之人不怒飲潤父家斎閤寒麝薰書帙映斜景老杜詠竹云色侵書帙晚偶来樽爼同延此笑言頃宫線添尺餘荆楚歳時記云宫中以紅線量日影至日日添一線杜詩何人錯認窮愁日愁日愁隨一線長朝市日未永一醉解語花開元天宝遺事太液池千葉白蓮開帝与貴戚燕賞指貴妃曰争如我解語花萬事畫地餅魏志盧毓傳詔曰選㪯莫取有名名如畫地作餅不可啖也要似虎頭癡何湏樗里癭虎頭顧愷之也晋書本傳云愷之才絶畫絶癡絶史記樗里子傳滑稽多智秦人号曰智囊愷之傳无虎頭之称按張彦逺名畫記愷之小字虎頭樗里傳不言癭豈謂智囊爲癭乎次韻寄潤父昏昏迷簿領韓詩海氣昏昏水拍天勿勿貴晷景顔氏家訓丗中書翰多称勿勿相承如此莫知其由或有妄言此忽忽之殘缺耳案說文勿者州里所建之旗也象其柄及三游之形所以促民事故怱遽者称勿勿說文又曰晷日影也周礼地官曰大司徒以士圭之法測土深正日景以求地中退之秋懷詩憂愁費晷景日月如跳丸貴字疑是費嘗尽身百憂左傳称晋侯險阻艱難備嘗之矣訖无田二頃蘇秦傳使我有雒陽負郭田二頃吾豈能佩六囯相印乎喜從吾宗游九里河潤永見上呼児跪酒樽戒婦饌湯餅杜詩喚婦出房親自饌刘夢得云我作坐上客引著㪯湯餅老夫何取焉君恱甕盎癭莊子徳充符萹甕盎大癭說斉桓公公恱之而視全人其脰肩肩送酒与周法曹用前韻吉州司法周元翁也遥知謝法曹南史謝惠連爲彭城王義康法曹行參軍詩句多夏景聞道斈書勤墨池方一頃王羲之傳曽与人書云張芝臨池斈書池水尽黒法書要録所載一同唯石刻孫過庭書譜云張精熟池水尽墨當以碑板爲正臨川有王逸少墨池曽子固作記見本集大字苦未道小字逼智永法書要録陳永欣寺僧智永㑹稽人逺祖逸少歴紀專精真草唯命我有何郎樽清江醖玉餅還書及斗数与君酌南癭玉餅謂麯也司馬迁傳云媒孽其短師古曰孽如鞠孽之孽斉人謂鞠餅爲媒還書及斗数疑有舛誤東坡賦酌以癭藤之紋樽癸丑宿早禾渡僧舎城頭渡可涉早禾渡可㪺詩大東云維北有斗不可以挹酒漿注云挹㪺也釋音云廣雅曰酌也試問安用舟春水三丈餘是維一都㑹史記貨殖傳邯郸一都㑹也凡言一都㑹者八一駔儈權征輸漢貨殖傳節駔儈注儈者合二家交易者也駔者其首率也駔子黨切征輸即賦輸也史記平準書天下賦輸或不償其僦費欝欎多大姓儒冠頗詩書漢趙廣漢傳潁川豪傑大姓以武断郷曲食貨与眺錯奏言并兼豪黨之徒以武断郷曲舊俗小未除厭囂謝近市左傳昭三年景公謂晏子曰子之宅近市湫隘囂塵又云賈而𣣔贏而悪囂乎斬絶得僧區韓文鄭群墓誌云不爲崖岸斬絶之行此地美水竹林明見浴鳬杜詩沙暖低風蝶天晴喜浴鳬相追啑蓤藻楚詞鳬鴈皆唼梁藻兮鳯飄翔而髙㪯子虚賦唼喋菁藻咀嚼蓤藕唼亦作啑天楽非丗娯莊子黄帝張楽於洞庭之野其卒无尾其始无首此之謂天楽憶在田園日放浪友禽魚蘭亭禊飲序云放浪形骸之外今来長山邑忍飢抚惸孤岀入部曲隨漢光武紀云各領部曲注引續漢志曰大將軍營有五部部三校尉部下有曲曲有軍候一人咳唾吏史趨法書要録羲之帖云頃因小差欲極遊娯而吏卒守之可歎耳形骸束簮笏可意一事无杜詩咸陽客舎一事无謀生理未拙仰愧擁腫樗莊子道遥遊萹恵子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨曲肱晴簷厎結網看蜘蛛宿觀山莫發白下地白下見上暝投觀山宿横溪赤欄橋温飛卿楽府云一渠春水赤欄橋一徑入松竹野僧如驚麏文選沈休文詩驚麏去不息避堂具燈燭曹參傳避正堂舎盖公我眠㒷視夜詩子㒷視夜部曲始炊熟筧水煙際鳴以竹通水曰筧古典切万籟入秋木莊子斉物論敢問天籟子綦曰吹万不同而使其自巳也平生䔥洒興本願終澗谷杜詩非无江海志䔥洒送日月丗累漸逼人晋謝安傳亹亹爲来逼人如垢不靧沐礼内則五日則燂湯請浴三日具沭其間靣垢燂潘請靧釋文曰靧音悔巳成老翁爲作吏長碌碌杜詩顔狀老翁爲文選魏文帝書巳成老翁但未白頭耳史記平原君傳公等碌碌因人成事上大蒙籠乙卯晨起黄霧冥冥小石門苔衣草路无人迹尓雅藫石衣注水苔也苦竹參天大石門杜詩喬木上參天虎迒兎蹊聊倚息尓雅麋其跡躔兎其跡迒注跡脚所踐處迒户郎切隂風搜林山鬼嘨宋玉風賦梢殺林莽屈原九歌有山鬼萹千丈寒藤繞崩石清風源裏有人家牛羊在山亦桑麻向来陸梁嫚官府陸梁見上莊子官天地府万物試呼使前問其故衣冠漢儀民父子光武紀復見漢官威儀吏曹優之至如此窮郷有米无食塩今日有田无米食當作今日有塩无食米但願官清不爱錢太白贈崔秋浦云見客但傾酒爲官不愛錢縣古槐根岀官清馬骨髙見歐陽公詩話長飬児孫聽驅使退之贈盧仝云有力未免遭驅使勞坑入前城乙卯飯後刀坑石如刀勞坑人馬勞窈窕篁竹隂退之送區冊序云夾江荒茅篁竹之間本出漢書是常主逋逃武成云爲天下逋逃主白狐跳梁去甘泉賦注云陸梁跳也豪猪森怒嘷雲黄斍日瘦杜詩乆行見空巷日瘦氣慘悽木落知風饕退之祭文云雪虐風號號一作饕輕軒息源口飯羮煑溪毛左傳澗溪沼沚之毛山農驚長吏退之詩山農驚見之岀拜家騷騷檀弓騷騷耳則野借問淡食民祖孫甘餔糟退之徐偃王碑祖孫相望楚詞餔其糟而啜其醨頼官得塩喫正苦无錢刀契布刀皆錢也食貨志王莽造契刀錯刀乙卯宿清泉寺稅輿陟髙岡詩卷耳云陟彼髙岡却立倚尺壁宋玉大言賦長剱耿介倚天外東坡詩倚天无数開靑壁就輿乱清溪轉石爲霹靂太白詩崩崖轉石万壑雷十歩一沮洳魏囯風彼汾沮洳五歩一枳棘上方未言返上方見上豁見平土宅書是降丘宅土孟子然後人得平土而居之田家雞犬㱕佛廟檀栾碧枚乗菟園賦脩竹檀栾夾池水旋菟園蓮蕩落紅衣趙嘏詩紅衣落尽渚蓮愁泉泓数白石人如安巢鳥稍就一枝息莊子鷦鷯巢於深林不過一枝鍾魚各知時吾亦自得力杜詩生我不得力丙辰仍宿清泉寺山農居負山呼集來苦遟旣來授政役文選東京賦賦政任役常畏人力之尽也謡詠謂余欺按省其家貲可忍鞭抶之元結春陵行悉使索其家而又无生資左傳一抶女庸何傷注抶擊洲敕擊切恩言諭公家疑阻乆廼随滕口終自愧易咸之上六滕口說也吾敢乏王師官寕惮淹留官字盖用韓退之瀧吏詩云瀧吏垂手笑官何問之愚譬官居京邑何由知東呉職在拊􅑱婺矛牙所將部曲多溷汝父老爲漢陸賈傳母乆溷汝爲也西山失半壁太白詩靑山猶衘半边日又云半壁見海日且復下嚢輜漢王古傳所載不過囊衣左傳㐮十二年楚重至于泌注云輜重也正義曰輜一名軿前後蔽以載物啼鴉散篇帙靈運詩散帙問所知詩意謂日暮罷休文書也休吏見上稅巾衣石泉皷坎坎詩坎坎皷我言泉鳴如皷声竹風吹參差楚詞吹參差兮誰思注參差洞簘也𥙷注曰風俗通云舜作簘其形參差此聮雖以箫皷爲喻然亦取栁子厚南澗詩迴風一簘瑟林影乆參差也書怜行熠燿詩熠燿宵行注熠燿燐也燐萤火也詩盖取車㣧聚萤之意壁虫催杼機古今注促織一名投機謂其声如急織也昏缸夜未央缸燈也西都賦金釭衘壁夜未央見詩髙枕夢登巇丁巳宿宝石寺鍾磬秋山静栁子厚詩鶴鸣楚山静炉香沉水寒楞嚴経云見諸比丘燒沉水香晴風蕩濛雨詩東山零雨其濛雲物尚盤桓帰去来詞云抚孤松而盤桓注云尓雅曰盤桓不進也瀹茗赤銅椀筧泉蒼煙竿紅榴罅玉房吴都賦云榛栗罅發文選六士衡弔魏武文云陪窈窕於玉房注引漢書郊祀歌曰神之出排五房栁子厚詩侯家熾炭雕玉房此摘其字么橘委金丸西京雜記韓嫣好弹以金爲丸枕簟巳思燠飯羹可加飡翟方進傳飯我豆食羮芋魁加飡見上觀巳自得力談玄舌本乾晋殷仲堪傳毎云三日不讀道徳經斍舌本間強理窟乃塊然晋張慿傳簡文帝召慿与語嘆曰張慿勃窣爲理窟丗故浪万端杜詩丗故莽相仍王莽傳云方故万端牛刀經肯綮莊子庖丁解牛技經肯綮之未嘗古人貴守官左傳守道不如守官摩挲發硎手考此一丘槃摩挲見上刀刃若新發於硎亦庖丁亊衛囯風考槃在澗注去考成槃楽也己未過太湖僧寺得宗汝爲書寄山蕷白酒長韻寄荅従斈晚聞道莊子曰孔子行年五十有一而不聞道謀官无見功魏伯陽參同契云竭力勞精神終身无見功早衰觀水鉴酒誥云人无於水监當於民监注視水見巳形内热愧鄰邦莊子人間丗萹今吾朝受命而夕飲氷我其内热欤北鄰有宗侯治劇乃雍容摩手抚鰥寡藁碪磔強梁莊子從其強梁随其曲轉楽府詩云藁碪今何在藁碪鈇也項籍傳身伏斧質師古曰質謂鍖也古者斬人加於鍖上而斫之鍖竹林反景帝紀云改磔曰棄市師古曰磔謂張其尸也棄市殺之市也磔竹客反挑李与荆棘見此卷寄張冝父詩注称物施露霜言恩威兼用如雨露霜雪也詩云蒹葭蒼蒼白露爲霜此摘其字政經甚稹密私不蚍蜉通韓文无蚍蜉蟻子之援比言无一蟻之私也吏舎无請賕曹參傳後園近吏舎吏舎日飲歌呼趙廣漢傳吏受取請求銖兩之姦皆知之尹賞傳受賕报仇家有侯在堂府符下塩䇿𬋩子曰海王之囯謹正塩筴十口之家十人食塩百口之家百人食塩縣官勸和羮書若作和羮作民敏風雨令先諸邑行我居万夫上闒惰世无双此邑宅岩岩魯頌太山岩岩里中頗秦風翁媪无恙時出分如蜂房賈誼書秦人家冨子壯則出分家貧子壯則出贅一錢氣不直白挺及父兄簮筆懐三尺揖我謂我臧山谷江西道院賦序其略云江西之俗其細民険而健以終訟爲能名曰珥筆之民惟筠爲州独不嚚於訟然与南康庐陵冝春三郡並蒙悪声庐陵即吉州也斉囯風還云揖我謂我臧兮三尺見上向來豪傑吏治之以牛羊我不忍敵民教养如児甥荆雞伏鵠卵乆望羽翼成莊子庚桑楚萹越雞不能伏鵠卵鲁雞固能矣音義曰小雞也或云荆雞魯雞大雞也今蜀雞張良傳上召戚夫人指視曰羽翼巳成不可動矣訟端洶洶來諭去稍听從尚餘租庸調見唐書歳歳稽法程漢賈誼䇿云立經陳紀可以爲万丗法程按圖索家資四壁逹牖䆫揜目鞭朴之檀弓毎斃一人揜其目桁楊相推掁莊子云桁楊接槢音義云械夾頸及脛者身𣣔免官去駑馬戀豆糠桓範出赴曹爽蔣済曰駑馬恋栈豆爽必不能用也見魏志所以積廪塩未使户得烹八月釃杜酒公私楽年登遣徒与㑹稽史記夏紀太史公曰禺㑹諸侯江南計功而崩因葬焉命曰㑹稽會稽者㑹計也而悉走荻篁吾惟不足遣張良傳上曰吾惟之豎子固不足遣乃公自行耳夙駕略我疆邑西軱戾地車犬當作軱音孤莊子庖丁解牛技経肯綮之未嘗而况大軱乎注云軱戾大骨也音義云盤結骨是嘗嬰吾鋒齦齕其強宗齦齧也口狼切退之曹成王碑齦其姦猖漎田儋傳云秦復得志於天下則齮齕首用事者墳墓矣注云齮側齧也音蟻齕齩也音紇彼乃可使令夙夜于逺郊草露沾帷裳詩漸車惟裳入磴履虎尾用易履卦語捫蘿觸虿芒杜詩捫蘿澁先登借問夕何宿煙边数峰横松竹不見天楚詞山鬼余處幽篁兮終不見天漢書廣川王歌曰内茀欝憂哀積上不見天生何益蟠空作秋聲谷鳥與溪瀬合絃琵琶筝楚詞石瀬兮濺濺張籍祭退之詩云乃出二侍女合弹琵琶筝稅駕乱石間岩寺鳴踈鍾山農頗来服見其父孫翁退之銘馬少監云吾未耄老而哭其祖子孫三丗苦辝王賦遲戸戸无積藏民病我亦病呻吟逹五更韻爲誦書語一作書生語行歌類楚狂論語楚狂接輿歌而過孔子舉鞭問嘉禾秣馬可及城嘉禾謂吉州永新縣也縣有禾山故號嘉禾此卷先有荅永新宗令寄石耳詩云嘉禾令尹淸如冰宗令即汝爲也惜哉憂城旦漢儒林傳竇太后好黄老轅固曰此家人言矣太后怒曰安得司空城旦書乎恵帝紀當爲城旦舂者皆耐爲鬼薪白粲注云城旦者旦起行治城舂作米皆四歳刑也不得對榻床􅎈筆付飛鳥北風吹報章書回銀鈎壯見上句與麝煤香李建中題楊凝式大字壁後云枯衫倒檜霜天老松煙麝煤風雨寒山谷喜書此詩浮蛆撥官醅太白詩恰似蒲桃新撥醅傾壷嫰鵝黄杜詩鵝児黄似酒對酒爱新鵝山氣常蓊㔩杜詩蓊匌川氣黄此物可屡觴蕷薬割紫藤開籠喜手封味温頗宜人杜詩踈快頗宜人芼以石飴薑㪯盃引薬糜詠詩對寒江寄声甚劳苦寄声勞苦並見上相思秋月明我邑萬戸郷其民資嚚凶欲割以夀公使之承化光反以来壽我中有吞舟鯨杜詩中有掉尾鯨銅墨俱王命文選䇿秀才文深汰珪符妙筒銅墨注云珪符謂刺史銅墨謂縣令漢書曰縣令長皆秦官秩六百石銅印墨綬職思慰孤惸詩職思其憂何時賭一擲燒燭呪明瓊晋劉毅傳樗蒱大擲一判至数百萬列子說符萹射者射明瓊注云齒五白也此卷先有三月乙已来賦塩萬歳山中一首今觀此詩可見塩之優民甚矣司馬温公記聞載皮公弼言官賣塩无利實録載皮公弼言官賣塩不得不罷今觀此詩盖官賣不售而賦之民也前三首有月日後十一首止稱甲子自癸丑至辛酉凡浹旬歴尽﨑嶇雖不能无怨而詞甚宛庚申宿觀音院谷底一墟落文選范彦龍詩軒盖照墟落李善曰說苑云師曠謂晋平公曰五鼎不當生墟落地形如盎盆榱題相照耀孟子榱題数尺釋文云尓雅曰桷謂之榱題頭也其民頗家温董仲舒傳家温而食厚禄土風甚於秦不可借釡甗音言賈誼言秦俗云借父耰鉏慮有徳色母取箕箒立而誶語僧屋无陶瓦剪茅蒼竹樊眺錯傳茆茨不剪詩東方未明折栁樊圃注樊藩也借問僧安在乞飯走諸門人閧鳥烏語法言云一閧之市簟凉風水文退之詩水文浮枕簟旁有蜂蜜庐山海経云是惟螫虫寔惟蜂蜜之庐頗聞衙集喧禆雅蜂有两衙應潮錢昭度村居云黄蜂衙退海潮上白蟻戦酣山再来見談苑將两蟻争丘鏖兵復追奔異聞集淳于棼夢人扶入宅南古槐穴中有大城門楼題曰大槐安囯其王以女瑶芳妻之使爲南柯郡守二十年有檀蘿囯来伐王命生征之敗績其妻病死王謂生可暫帰生上車出一穴見本里閭巷入其門見巳身卧堂廡下發悟如𥘉夢中倐忽若度一丗矣遂㝷古槐下穴見大穴洞然積土壌爲城郭䑓殿之狀有蟻数斛中有小䑓二大蟻処之即槐安囯也又窮一穴直上南枝亦有土城小楼即南柯郡也宅東一里澗側有大檀樹藤蘿擁織旁有蟻穴意其爲檀蘿囯也合短兵鏖皐蘭下見霍去病傳追奔逐北見文選李陵書紅英委鳯翼赤幘峩雞冠老杜樹雞柵詩云終日憎赤幘今以言雞冠花汲烹寒泉窟伐竹古松根相戒莫浪出月黒虎䕫藩老杜課伐木詩序云我有藩籬是缺是𥙷有虎知禁若恃爪牙之利必昏黒摚突䕫人屋壁山谷盖用此語而杜詩作於䕫州所謂䕫人盖䕫州之人也老杜有䕫府詠懷詩云市暨瀼西巓自注云市暨䕫人語也䕫人屋壁即此類文選靈光殿賦頷𣣔動而躨跜䕫藩盖誤以䕫人爲躨跜之義也躨跜動也辛酉憇刀坑口群山黛新染蒙氣寒欝欎漢京房傳上封事曰辛酉以來蒙氣衰去太陽精明辛巳蒙氣復乗卦太陽侵色復上封事曰乃丙戍小雨丁亥蒙氣去掃除迎將家莊子寓言萹其往也舎者迎將其家公執席釋文曰家公主人公也讀舎者迎將其家爲句此亊本出列子列子云舎者迎將家注云客舎家也山谷本用此語而莊子云迎將其家多一其字轉冩誤耳釋文又承誤也下簟脫巾韈退之送文暢詩詭制恒巾韈南北舎小棠詩蔽芾甘棠勿翦勿伐召伯所茇毛云蔽芾小皃箋云舎小棠之下况可清煩暍文選西京賦此焉清暑史記禹扇暍暍暑病也鳥声廢書眠聊以休吏卒竹雞苦喚人北夢瑣言醫工云竹雞食半夏陶岳零陵記云竹雞狀如鶉尾少長大率皆鳩也方言各異耳喚謂喚雨斍坐觀法窟无外同一家見上惟巳非万物清波两鴛鴦善游且能没莊子逹生萹顔渊問仲尼曰吾嘗済乎觴深之渊津人操舟若神吾問焉曰操舟可斈邪曰可善游者数能若乃夫没人則未嘗見舟而便操之也驚人相追飛甚念失其匹文選刘安招隠士云禽獸駭兮亡其曹春鉏貌間暇尓雅鷺春鉏鵬鳥賦止於坐隅皃甚間暇羡魚情至骨董仲舒云臨川羡魚不如退而結網杜周傳内深次骨注云深刻至骨也廣道䇿坚良漢食貨志乗坚䇿良熈熙集於苑囯語晋施優謂李克妻曰主孟啗我我教兹暇豫事君乃歌曰暇豫之吾吾不如鳥烏人皆集於苑巳獨集於枯里克曰何謂苑何謂枯曰其母爲夫人其子爲君可不謂苑乎其母旣死其子又有謗可不謂枯乎詩苑彼栁斯鳴蜩嘒嘒苑音欎今叶韵當用此音爛額始論功倘能謀曲突漢霍光傳𥘉霍氏奢侈茂陵徐生曰霍氏必亡廼上䟽言霍氏㤗盛冝以時抑制无使至亡書三上輒报聞其後霍氏誅滅而告霍氏者皆封人爲徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更爲曲突逺徙其薪不者且有火患主人黙然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰向使听客之言不費牛酒終亡灾悉今論功而曲突徙薪亡恩澤燋頭爛額爲上客耶主人寤而請之今茂陵徐福数上書言霍氏且有変冝防絶之使福說得行則囯亡裂土出爵之費臣亡逆乱誅滅之敗往亊旣巳而福不蒙其功唯陛下察之此詩萹末盖有所諷也金刀坑迎將家待追漿坑十餘戸山農不至因題其壁窮郷阻地險篁竹嘨䕫魖篁竹見上囯語云木石之恠䕫水之恠龍文選東京賦殘䕫魖与罔象注云䕫木石之恠說文曰魖耗鬼也甘泉賦亦云梢䕫魖而抶獝狂悪少擅三窟見上不承吏追呼老翁燕无凶此句疑舛誤偃蹇坐里閭後生集聞見官不禁權輿尓雅權輿始也懷書斥長吏持杖鏖公徒鏖見上魯頌公徒三萬遂令五百里化爲豺豕墟古来沉牛羊檄水臣鱷魚韓退之告鱷魚文云以羊一猪一投悪溪之潭水以与鱷魚食而告之曰云云猛虎剥文章矧而民髪膚孝經身躰髮膚哀哉奉其身曽不如鳥烏注見前萹破家縣令手南面天子除要能伐強梁然後活惸孤屬爲民父母未教忍先誅孟子曰悪在其爲民父母也又曰其教之不改而後誅之乎山川甚秀拔人物亦詩書十室有忠信此郷何独无見論語江西泊舟後作太和小舫板上塵土中得此詩莆田李才甫江水冥冥沙石隂一舸行尽春巳深浪花緑蔓曵錦帶短芦刺水抽玉簮飢魚未沉波面筒小舫正横溪上風清輝濯浄逺山碧白鳥飛入蒼煙叢追憶子泊舟西江事次韻老大无機如漢隂苐一卷次韻荅張沙河亦有此句巳詳注白鳥不去相知深文選江文通詩亹亹玄思清胸中去機巧物我俱忘懷可以狎鷗鳥李太白鳴皐歌云白鷗兮飛来与君兮相親往事刻舟求墜剱吕氏春秋察令萹楚人有渉江者其剱自舟中墜於水遽契其舟曰是吾剱之所從墜舟止從其契者入水求之舟巳行矣而剱不可求懐人揮淚著直略反亡簮韓詩外傳孔子出遊少源之野有婦人中澤而哭甚哀使弟子問焉婦人曰向者刈新亡吾蓍簮是以哀也弟子曰亡蓍簮有何悲焉婦人曰非傷亡簮也盖不忘故也城南皷罷吹去畫筒城北㱕帆落晚風人煙犬吠西山麓鬼火狐鳴春竹叢杜詩隂房鬼火青漢陳勝傳叢祠中夜篝火狐鳴以十扇送徐天隠人貧鵝鴈聒鄰墻退之詩有时未朝飡得米日巳晏隔墻聞讙呼衆口極鵝鴈公貧琢詩声繞梁列子湯問萹昔韓娥東之斉匱粮過雍門鬻歌假食既去而余音繞梁欐三日不絶坐客有氊吾不爱杜詩坐客寒无氊暑榻无扇公自凉黨錮諸生尊孺子后漢徐稺字孺子建安七人先偉長建安七人孔融自有傳余皆附魏志王􅙾傳後徐幹字偉長取同姓也詳見苐二卷新詩淩建安注又按文選典論曰今之文人魯囯孔融廣陵陳琳山陽王粲北海徐幹陳留阮瑀汝南應瑒東平刘楨斯七子者於斈无所遺於辝无所假退之詩建安能者七卓犖変風操遣奴送箑非爲好恐有佳客或升堂聞致政胡朝請多蔵書以詩借書目万事不理問伯始万事不理問伯始天下中庸有胡公見後漢胡廣字伯始傳藉甚声名南郡胡名声藉甚見陸賈傳胡廣南郡華容人逺孫白頭坐郎省蔡質漢官典聀云尚書郎省中以胡粉塗壁乞身㱕来尤好書手抄万卷未閣茟唐刘知幾傳云閣茟相視含毫不断心醉六經還荷鉏列子見之而心醉見列子中說云心若醉六經目若营四海願公借我藏書目時送一鴟開鏁魚古語借書一癡還書一癡或謂癡當作瓻說文云瓻音絺注酒器按集韵瓻字注云古以借書借書餽酒一瓻還書亦餽酒一瓻独蘇黄詩乃作鴟東坡云不持两鴟酒肯借一車書山谷又有詩云莫惜借行千里他日還君一鴟秦少游亦云知續春明退朝録借觀當奉一鴟還盖用揚雄酒葴鴟夷滑稽腹大如壷尽日盛酒人復借酤師古曰韋囊盛酒即今鴟夷滕也芝田緑云門鑰必以魚者取其不瞑目守夜之義次韵郭明叔長歌君不見懸車刘屯田騎牛㵎壑弄潺湲八十唇紅眼點􅃮金鐘㪯酒不留殘謂刘渙凝之也詳見苐二卷注晋杜乂傳眼如點􅃮庾信詩飲酒那得留殘君不見征西徐尚書爲囯捐軀矢石間徐禧字德占洪州分寕人与山谷同郷死於永楽之禍巳見此卷過家上冡詩注贈吏部尚書謚忠愍文選曹子建詩云誰言捐軀昜殺身良独􅭑龍章鳯姿委秋草晋嵆康傳人以爲龍章鳯姿天質自然唐李機傳龍章鳯姿士不見用麞頭䑕目子乃求官耶天馬長辝十二閑周礼校人曰天子十有二閑馬六種何如髙陽􅐱生醉落魄長揖輟洗驚龍顔􅐱食其傳陳留髙陽人落魄无衣食業爲里监門沛公略地陳留麾下騎士適食其里中子從容言食其食其入謁沛公方踞床令兩女子洗食其長揖不拜沛公輟洗起衣謝之丈夫當年傾意氣太白豪士歌意氣相傾山可移安用蚓食而蝎跧孟子夫蚓上食槁壌古人巳作泉下土風義可想尤班班後漢五行志童謡曰車班班入河間郭侯忠信如古人薦書飛名上九関楚詞虎豹九関啄害下人詩書自可老斵輪輪扁行年七十而老斵輪見莊子智略足以解連環莊子言恵施之辯曰連環可解也銅章屈宰山水縣漢官儀縣令秩六百石銅章墨綬退之詩出宰山水縣讀書松桂林友声相求不我頑詩求其友声鵬翼垂天公直起莊子其名爲鵬翼若垂天之雲燕巢見社身思還文思舜禹開言路杜牧詩文思天子復河湟字本出堯典思息嗣反又如字即看承詔著豸冠漢官仪御史四人持書皆法冠一名柱後一名獬豸冠尚趍手板事直指手板見苐一卷注雋不疑傳暴勝之爲直指使者少忍吏道之多艱漢薛宣傳吏道以法令爲师黄花零落一尊酒别有天地非人寰太白詩問君何事栖碧山笑而不荅心自閑桃花㳅水窅然去别有天地非人間山谷外集詩注卷六
