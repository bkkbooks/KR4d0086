front:
  text: 山谷外集詩注卷之七
  hash: sha256:f2353d9bf661d5a2d6ffe4f496b68afb244b40ea82949a7b537c335dd3c35e4b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_007-1a}
body:
  text: 和答魏道輔寄懷十首魏泰字道輔襄陽人曽子宣婦弟有東軒録堂堂陽元公人物妙晉東晉魏舒字陽元太白詩能成五宅相不減魏陽元魏侯多能事髣佛見家風長魚無波濤坐與蝦蜆同後漢隗囂傳魚不可脫於淵神龍失勢與蚯蚓同諸山搖落盡旅食歲時窮杜詩旅食京華春平生弄翰墨客事半九州天末逢故人老杜天末懷李白云涼風起天末君子意何如園𬞞當肴羞酒闌豪氣在尚欲椎肥牛漢髙祖紀酒闌注云飮酒者半罷半在謂之闌魏志季布傳許泛曰陳元龍湖海之士豪氣不除桐江詩話云魏道輔與王介甫兄弟最相厚試院中因上請恃才豪縱驅主文幾死坐是不許取應虞卿不窮愁後丗無春秋史記虞卿傳不重万戶侯卿相之印與魏齊間行卒去趙困於梁不得意乃著書丗傳之曰虞氏春秋太史公曰虞卿非窮愁亦不能著書以自見於後丗云雷行万物春易無妄天下雷行物與無妄天震而地撼閉塞成冬冰月令孟冬之月天地不通閉塞而成冬楚越自肝膽莊子德充符篇自其異者視之則肝膽楚越也貂狐諒柔溫貂狐見上溫柔卿見趙飛燕外傳藜藿自羮糝藜羮不糝見上六家人要云墨氏糲梁之食藜藿之羮相思牛羊下詩牛羊下來城鼓寒紞紞晉鄧攸傳吳人歌曰紞如打五鼓雞鳴天欲曙劒埋豐城獄氣與牛斗平見上皇明燭九幽文選西都賦云散皇明以燭幽山海經曰赤水之北有神其瞑乃晦其視乃明是燭九隂是謂燭龍黃庭經九幽日月洞虛無湔祓用神兵周亞夫傳兵事上神密南史沈慶之傳文帝北侵慶之處分旬日內外整辦時皆謂神兵杜詩近賀中興主神兵動朔方誰言黃沙磧張籍關山月云胡兒夜度黃龍磧唐人出塞曲云黃沙直上白雲間矢盡鼓不鳴李陵傳一日五十万矢皆盡夜半時擊鼓起士鼓不鳴至今門下士落涕為荆卿荆軻傳荆軻衛人也衛人謂之慶卿軻為燕太子丹使秦左手把秦王之袖而右手持匕首揕之秦王自引而起左右前殺軻此語為徐德占也永樂之禍案實録乃元豐五年九月時山谷在太和與前萹不見征西徐尚書同時作德占娶山谷從妹潘子真詩話云道輔少與徐忠愍及山谷老人友善别時燕辭屋草黃秋半分今來冬日至稍添刺繍文添一線見上史記貨殖傳刺繍文不如倚市門百年幾會合美酒不屢醺犀牛可乞角窮士難薦論文選蜀都賦拔象齒戾犀角戾立結反拔犀之角擢象之齒見唐舒元輿傳山谷帖有戲答寶勝云易拔蒼龍角難參寶勝禪語意與此同排江鬼瞰室楊雄解嘲髙明之家鬼瞰其室貫朽粟紅陳漢食貨志京師之錢纍百巨万貫朽而不可校太倉之粟陳陳相因紅腐而不可食君行誰為容鄒陽傳蟠木根柢輪囷離竒而為万乘器者以左右先為之容也欵門定生嗔漢宣紀欵塞來享注云叩塞門也退之詩剝剝啄啄有客至門我不出應客去而嗔今言主人嗔也諒無綈𫀆故史記范雎傳綈𫀆戀戀有故人之意盡是白頭新鄒陽傳白頭如新傾蓋如故天涯阿介老有鼻可揮斤阿介老疑是黃介字幾復元豐末為端州四會縣令山谷志其墓前集和謝公定秋懷云四會有黃令學古著勳多白頭對紅葉奈此搖落何雖懷斫鼻巧有斧且無柯與斫鼻可揮斤語意同阿介云者如晉人以王平子為阿平也斫鼻見上赤豹負文章楚詞乘赤豹兮從文貍歲晚智剞􅕻楚詞握剞劂而不用兮操規矩而無所施注剞劂刻􅍢刀也􅕻亦作劂退之詩先生閟窮巷未得窺剞劂上居蟻切下音厥渴飮南山霧見上飢食西山蕨張翰傳與子採南山蕨見春菜詩注封狐託脂澤封狐文豹見莊子等書離騷經又好射夫封狐注云封大也郭氏玄中記曰千歲之狐為淫婦百歲之狐為美女白樂天古冢狐云狐假女妖害猶淺一朝一夕迷人眼女為狐媚害即深日長月長溺人心眉頰頗秀發唐司空圖山居記云中條距虞卿百里亦猶人之秀發必見於眉宇之間時時一樽酒老杜何時一樽酒婆娑弄風月退之詩我今官間得婆娑猛虎倚山號強梁不敢前失身檻穽間搖尾乞人憐司馬遷書猛虎處深山百獸震恐及其在穽檻之中搖尾而求食積威約之漸也男子要身在退之詩學問藏之身身在則有餘史記魏豹等贊曰智略絶人獨患無身耳得攝尺寸之柄雲蒸龍變万金自保全老拉王孫善保千金軀雲黃雉兔伏霜鶻莫空拳杜詩霜鶻不空拳生涯共七十去日良巳半山谷生於乙酉至庚申作邑太和時年三十六短長相觖望漢盧綰傳羣臣觖望觖音決面一作向盡酒可斷大道體甚寬老子云大道甚夷而民好徑窘束非逹觀賈誼傳鵩賦曰逹人大觀物亡不可又曰愚士繫俗僒若囚抅莫問夜如何詩庭燎夜如何其醉從雞號旦明駝思千里楊妃外傳貴妃私發明駝以瑞龍腦遺安祿山明駝者眼下有毛夜明日行五百里酉陽雜爼云古樂府木蘭萹願馳明駝千里足多誤作鳴駝駝卧腹不帖地屈足漏明則行千里駑馬怯負荷智度論云今以負荷大法者比龍象小人蠧詩書韓詩古史散左右詩書置後前豈殊蠧書蟲生死文字間安樂北蔥卧國語人生安樂孰知其它瓢空且乞飯淵明有乞食詩兒寒教輔破山谷寫衲襖歌其略云輔破遮寒過一生豈問人言妙不妙機巧主五兵周禮夏官司兵掌五兵五盾杜詩所歷厭機巧百拙可用過傳燈録宣州柏巖明哲禪師傳藥山云跛跛挈挈百醜千拙且恁麼過時代書阿熊去我時山谷有非熊墓銘云仲熊其名非熊其字先大夫之幼子漢外戚傳竇廣德曰姊去我西時與我訣傳舍中秋暑削甘瓜魏文帝與吳質書浮甘瓜於清泉離别日月除詩日月其除蓮房倒箭靫靫箭室也得書報平安肥字如栖鴉玉川子添丁詩忽來案上翻墨汁塗抹詩書如老鴉汝才躍鈩金自必為鏌鎁莊子大宗師萹今大冶鑄金金踊躍曰我且必為莫耶大冶必以為不祥之金窮年抱新書新書謂王氏經學挽條咀春葩退之進學解含英咀華又詩云東野動驚俗天葩吐竒芬弄筆不能休文選典論云傳毅之於班固伯仲之間也而固小之與弟超書曰武仲下筆不能自休屈宋欲作衙唐杜審言傳常語人曰吾文章當傳屈宋作衙官屈指推日星屈指計其日見陳湯傳許身上雲霞杜詩許身一何愚墓銘云先大天以歲月日時參伍以曆象為吉祥非熊亦自恃其命曰我生日在申辰在卯歲庚午天地令終冨貴安知九天關虎豹守夜義虎豹九關見上盧同詩云天門九重髙崔嵬淸空鑿出黃金堆夜義守門晝不啓夜半醮祭夜半開視田操豚蹄持狹所欲奢史記淳于髠傳臣從東方來見道傍有穰田者操一豚蹄酒一蓋而祝曰甌窶滿㝤汙邪滿車五榖蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之文章六經來汗漫十牛車漢兒寬傳大家牛車小家簷負譬如觀滄海細大極龍蝦退之鰐魚文云潮之州大海在其南鯨鵬之大蝦蟹之細無不容歸古人以聖學未肯廢百家舊山木十圍齋堂緑隂遮紅稻香盂飯維摩經化菩薩以滿鉢香飯與維摩詰黃雞厭食鮭食鮭見上鮭魚也音鞋不在此韻疑是食蛙按圖經本草蛙有背作黃文者又云一名水雞摩挲垂腴腹韓詩外傳魚之侈口垂腴者魚畏之凡言腹腴皆魚也獨王充論衡云堯若臘舜若腒桀紂之君垂腴尺餘頗復讀書耶念汝齒壯矣無婦助烹茶父兄亦憐汝須兒牧犬豭左傳使卒出豭行出犬雞鮑明逺詩倚杖牧雞豚且伐千章木漢貨殖傳木千章贈行當馬檛見上贏糧果後時史記李斯傳躍馬贏糧唯恐後時定隨八月槎張華博物志云舊説天河與海通近丗有人居海渚年年八月有浮槎去來不失期人有竒立飛閣於槎上多齎糧乘槎而去十餘日中猶見星月日辰自後茫茫忽忽亦不覺晝夜十餘日奄至一處有城郭狀屋舍甚嚴遙望宫中多織婦見一丈夫牽牛渚次飲之牽牛人驚問曰何由至此此人具説來意并問此是何處答曰君還至蜀郡訪嚴君平則知之及歸問君平對曰某年月日有客星犯牽牛宿計其年月正此人到天河時也覺民在中林集中字説云弟仲堪溫恭而文庭堅字之曰覺民丁丁聞兔罝詩肅肅兔罝椓之丁丁又云肅肅兔罝施于中林奉身甚和友幹父辦咄嗟易云幹父之蠱晉石崇傳為客作豆粥咄嗟便辦按文選曹子建詩自顧非金石咄唶令心悲注引説文云咄叱也唶大呼也言人命在叱呼之間咄丁兀切唶子夜切漢末有此語至晉而訛為咄嗟也臺源吟松籟苐七卷有次韻十九叔臺源詩云聞道臺源境鉏荒三徑通先生岸巾紗留客醉風月槃筯供柔嘉退之詩野𬞞拾新柔詩柔嘉維則此摘其字仍工朱絲絃文選陸士行詩直如朱絲絃洗心拂竒邪禮記祭義雖有竒邪而不治者則微矣孤臣發楚調謂屈原楚詞傾國怨胡笳丗傳胡茄十八拍蔡琰所作傾國見漢書李夫人傳把茟學周鼓鳯翔石鼓文丗傳周宣王時作字形錐畫沙見上詩書乃宿好淵明詩詩書敦宿好林園無俗情不為蓬生麻説苑蓬生麻中不扶自直元明祖師禪山谷兄大臨字元明妙手發琵琶巳無冨貴心鼓吹一池蛙南史孔圭傳門庭之內草萊不剪中有蛙鳴或問之曰欲為陳蕃乎答曰我以此當兩部鼓吹何必效蕃天民服農圃頗復秋㰸賖周禮泉府斂市之不售貨之滯於民用者以其賈買之凡賖者祭祀無過旬日下田督未耘入嶺按新畬周頌臣工云亦又何求如何新畬注云田二歲曰新三歲曰畬悉力輸王賦至今困生涯莊子吾生也有涯知命叔山徒莊子德充苻篇魯有兀者叔山無趾知命山谷弟名叔逹足蹇故以為喻爐香嚴佛花圜覺經云心花發明巳見上唯思苾芻園梵語比丘或曰苾芻尊勝經號僧曰苾芻此物草也而有五義一生不背日二冬夏常靑三體性柔軟四香氣逺騰五引蔓傍布為佛徒弟亦然故以為名脫冠著袈裟梵語袈裟此云不正色即壞色染衣也起家望兩季漢儒林傳孔氏有古文尚書孔安國以今文讀之因以起其家佩金踏朝鞾嘉魚在南國小雅南有嘉魚樂與賢也宗廟薦鱨鯊小雅魚麗美万物盛多可以告於神明矣魚麗于罶鱨鯊我為万夫長書咸有一德万夫之長可以觀政言為万户縣也朝論不齒牙南史謝朓傳朓好獎人才曰士子聲名未立應共獎成無惜齒牙余論退之詩顧我未肯置齒牙刺頭簿領中蚤虱廢搔􅐡栁子厚詩中散虱空爬蓋用文選嵆康絶交書性復多蝨􅐡搔無巳而當裹以章服丗纍巳纒縛官針昜疪瑕左傳襄四年魏絳論和戎云昔周辛甲之為大史也命百官官針王闕僖七年楚文王謂申侯曰子取豫求不女疵瑕何時煙雨裏驅羊入金華黃𥘉平牧羊金華山見上遣奴迫王事不暇學驚蛇晉衛恆傳張伯英臨池學書池水盡黑下茟必為楷則號匆匆不暇草書法書要録羲之自敘草書云疾若驚蛇之失道寄陳適用日月如驚鴻歸燕不及社杜牧之歸燕詩畫堂歌舞喧喧地社去社來人不看清明氣妍暖亹亹向朱夏杜詩人生幾何春巳夏輕衣頗宜人杜詩宜人獨桂林又云踈快頗冝人裘褐就椸架曲禮男女不同椸架巳非紅紫時春事歸桑柘空余車馬迹顛倒桃李下新晴百鳥語各自有匹亜選詩春鳥翻南飛翩翩獨翶翔悲聲命儔匹哀鳴傷我腸林中僕姑歸苦遭拙婦罵見上氣候使之然光隂促晨夜解甲號清風即有幽蟲化言蟬也退之聮句化蟲枯挶莖朱墨本非工見上王事少間暇幸蒙余波及左傳重耳云其波及晉國者君之余也治郡得黃霸黃霸傳及為相功名損於治郡時巴鄰陳太丘后漢陳實為太丘長威德可資借決事不遲疑敏手擘泰華西京賦綴以二華巨靈贔屓髙掌逺跖以流河曲厥迹尤存善曰古語云此本一山當河水遇之而曲行河之神以手擘開其上足踏離其下中分為二以通河流手足之迹今尚在也頗復集紅衣呼僚飲休假退之詩兩府變炎涼三年就休假歌梁韻金石歌聲繞梁見上舞池委蘭麝寄我五字詩句法窺鮑明逺謝靈運亦歎簿領勞行欲問田舍求田問舍見上相期黃公壚晉王戎傳嘗經黃公酒壚下過顧謂后車客曰吾昔與嵆叔夜阮嗣宗酣暢於此自嵆阮云亡吾遂為時之所羈紲今日視之錐近邈若山河不異秦人炙孟子告子萹耆秦人之炙無以異於耆吾炙我𥘉無廊廟王羲之傳吾素無廊廟身願執耕稼今將荷鋤歸區芋畦甘蔗文選蜀都賦瓜疇芋區觀君氣如虹禮記聘義君子於玉比德焉氣如白虹天也千輩可陵跨自當出懷壁往取連城價趙得和氏璧秦願以十五城昜之藺相如使從者衣褐懷璧歸趙詳見相如傳賜地買歌僮珠翠羅廣厦杜詩安得廣厦千万間冨貴不相忘寄聲相慰藉苟冨貴無相忘見陳勝傳界上亭長寄聲謝我見趙廣漢傳所以慰薦走卒師古曰薦者舉藉也見胡建傳所以慰藉之良厚見后漢隗囂傳奉送時中攝東曹獄掾公退蒲團坐后亭詩羔羊自公退食傳燈録龍牙禪師傳師在翠微時問如何是祖師意翠微曰與我過禪板來又問臨濟如何是祖師意臨濟曰與我過蒲團來短日松風吟萬籟見上黃葵紫菊委榛叢雪梅靚粧欲無對上林賦靚粧刻飾丗説習鑿齒曰樂令無對於晉丗遣騎相呼近酒樽文選魏文帝書今遣騎到鄴言君曉鼓前征斾蒼崖按轡虎豹號周亞夫傳天子乃按轡徐行野水呼船風兩晦詩風雨如晦昨日歸來有行色莊子盜跖篇車馬有行色未曾從容解冠帶府中奪我同官良老杜送長孫侍御赴武威判官云奪我同官良飄飄按城堡簡書趣行將數輩詩出車云豈不懷歸畏此簡書王事君今困馬鞍田園我亦思牛背晉王衍傳爾看吾目光乃在牛背上矣唐陸羽傳又使牧牛羽潛以竹畫牛背為字安得歸舟載月明滿船空載月明歸船子和尚偈也盧鷀白鷗為友生詩雖有凡弟不如友生一身不是百年物五湖無邊万里行欲招蓑笠同雲水念君未可及吾盟春秋公及邾儀父盟於蔑冨於春秋西漢語也見上貌突兀杜詩夜深殿突兀睥睨滿世收功名睥睨視也左傳子産授兵登陴注陴城上睥睨也好功名者睨視一丗城上短垣亦於此睨視因以為名參軍雖卑獄司命多由隂德至公卿于定國傳我治獄多隂德顉頥折額秦相國楊雄解嘲云蔡澤山東之匹夫顉頥折額注顉曲也不滿六尺齊晏嬰史記晏平仲嬰傳晏子長不滿六尺身相齊國名顯諸侯丈夫身在形骸外莊子德充符篇索我於形骸之外俗眼那能致重輕次韻和答孔毅甫鵬飛鯤化未即逍遙遊見莊子第一篇龍章鳯姿終作廣陵散嵇康傳人以為龍章鳯姿康將刑東市顧視日影索琴彈之曰昔袁孝尼嘗從吾學廣陵散吾每靳固之廣陵散於今絶矣湓浦爐邊督數錢平仲字毅甫元祐入館時監江州錢監按潯陽志廣寧監歲鑄錢二十万東坡帖云數日前孔毅甫見過此人錢監得替欲入京注擬中路思家而還後漢志童謡曰何間姹女工數錢故人陸沉心可見莊子則陽篇方且與丗違而心不屑與之俱是陸沉者也氣與神兵上斗牛神兵見上斗牛之間常有紫氣寶劔之精上徹於天耳詳見張華傳詩如晴雪濯江漢孟子江漢以濯之把詠公詩闔且開旁無知音面墻歎我今廢書迷簿領樂毅傳未嘗不廢書而泣魚蠹筆鋒蛛網硯選詩五車摧筆鋒六年國子無寸功退之詩三年國子師腸肚集藜莧李廣傳終無尺寸功猶得江南万家縣客來欲語誰與同令人熟寐觸屏風三國𬋩輅傳嘗謂人曰吾與劉潁川兄弟語使人神思清發自此之外殆白日欲寢矣漢陳万年傳子咸有異材万年嘗病召咸教戒於牀下語至夜半咸睡頭觸屏風切食仰愧冥冥鴻楊子云鴻飛冥冥弋人何篡焉少年所期如夢中江頭酒賤樽屢空孔融傳撙中酒不空南山有田歲不逢漢楊惲傳其詩曰田彼南山蕪穢不治種豆一頃落而為萁人生行樂耳須冨貴何時相思夜半涕無從檀弓上吾惡夫涕之無從也千金公亦費屠龍屠龍見上再用舊韻寄孔毅甫鑒中之髮蒲桞望秋衰晉書顧恱之與簡文同年而髮早白帝問之曰松柏之姿經霜尤茂蒲桞常質望秋先零眼中之人風雨俱星散杜詩青眼髙歌望吾子眼中之人吾老矣言熙豐門諸人皆斥逐三國志薑維傳星散流離往者話躰同青山健者漂零不相見庾公樓上有詩人樓在江州平生落茟㵼河漢莊子逍遙遊篇其言猶河漢而無極也置驛勤來索我詩自説中郎識元歎吳志顧雍傳雍字元歎吳郡吳人蔡伯喈避怨於吳雍從學琴書江表傳云伯喈謂曰今以吾名與卿故雍與伯喈同名吳録曰雍字元歎言為蔡雍所歎也我方凍坐酒官曹為公然薪炙冰硯西漢雜記以酒為書滴以玊為硯皆取其不冰不解窮愁著一書見上豈有文章名九縣漢光武贊九縣飈回奴星結桞送文窮退之送窮文云主人使奴星結桞作車退倚北窗睡松風太阿耿耿截歸鴻張華傳雷煥掘豐城獄得一石函中有奴剱一曰龍泉一曰太阿退之詩利剱光耿耿夜思龍泉號匣中斗柄垂天霜雨空獨鴈叫群雲萬重退之詩一一叫群猿杜詩孤鴈不飲啄飛鳴聲念群誰憐一片影相失萬重雲何時握手香爐峯香爐峯􅊢江州下看寒泉濯卧龍寄題安福李令適軒安福縣隸吉州琳宫接叢霄此軒當在道觀故云道人勤灑掃渌水連翠微爾雅山未及上翠微凼花露林薄甘泉賦列新夷於林薄好鳥娛淸輝謝靈運詩淸輝能娛人遊子淡忘歸道人勤灑掃令尹每忘歸孝慈民父母虎去蝗退飛後漢劉昆傳守弘農虎北渡河卓茂傳時天下大蝗獨不入密縣界魯恭傳郡國螟傷稼犬牙緣界不入中牟左傳六蠲退飛來惠僚友同小雅爾羊來思爾牧來思歌舞醉紅衣定知與民樂孟子云與民同樂吏瘦吾民肥唐韓休傳帝曰吾雖瘠天下肥矣寄題安福李令先春閣宫殿繞風煙此句與前篇琳宫同意江山壯城郭令君藝桃李面春築飛閣春至最先知雨露遍花藥淵明詩言息其廬花藥分列鮑明逺詩乳燕拾草蟲巢蜂拾花藥是日勸農桑冰銷土膏作國語周語云土乃脈發又曰士膏其動弦歌出縣齋子之武城聞弦歌之聲見論語退之有縣齋讀書詩裴回問民瘼後漢循吏傳序廣求民瘼雞犬聲相聞莊子胠篋篇鄰邑相望雞狗之聲相聞老子亦云嬰此簿領縛簿領見上安得携手嬉烹茶煨鴨腳歐陽公和梅聖俞鴨腳子詩絳囊因入貢銀杏貴中州和孫公善李仲同金櫻餌唱酬二首人生欲長存日月不肯遲百年風吹過忽成甘蔗滓寒山子詩更足三十年還如甘蔗滓傳聞上丗士烹餌草木滋千秋垂緑髮李賀詩緑鬢少年金叉客緑髮見上每恨不同時司馬相如傳朕獨不得與此人同時哉李侯好方術方術見下注肘後探神竒莊子臭腐化為神竒南史陶洪景傳著肘後方金櫻出皇墳本草金櫻子味酸澀久服令人耐寒輕身方術多用云是今之刺梨子色黃有刺本草序云丗所傳曰神農氏本草三卷尚書序云伏犧神農黃帝之書謂之三墳刺橐覽霜枝寒窗司火候古鼎凍膠飴內則棗栗飴蜜釋文飴餳也圗經本草云金櫻子蜀中人熬作煎𥘉嘗不可口見上醇酒和味宜和味宜見前第三卷石耳詩芥薑作辛和味宜注至今身七十孺子色不衰莊子逹生篇單豹行年七十而猶有嬰兒之色田中按耘鉏孫息親抱持却笑鄰舍公未老須杖藜見上假守冨春公漢南粵王傳誅秦所置吏以其黨為守假注云令為郡縣之職或守或假弟三卷有上權郡孫丞議詩即此人也廬陵比缺守孫攝州事秋毫聽民詞夙夜臨公廳歸卧酸體肢枚乘七發云恣支體之安桞子厚讀書詩云欠伸展肢體李侯來饋藥論語康子饋藥期以十日知史記扁鵲傳長桑君出懷中藥豫扁鵲曰飲是以上池之水三十日當知物矣古方書云以知為度未知再服深中護靈根黃庭經玉池淸水灌靈根金鎖祕玉􅙞黃庭經玉􅙞金籥常完堅不須許斧子辛勤采玉芝真誥英夫人吟云有心許斧子言當采玉芝芝草不必得汝亦不能來汝來當可得芝草與汝食許斧子許玉斧也一本作五芝天台山賦云五芝含秀而晨敷見文選我方困健訟撾翁爭一錐魏武紀第五伯魚三娶孤女謂之撾婦翁此􅎥其字爭錐見左傳昭六年錐刀之末將盡爭之注云錐刀末喻小事不能鳴弦坐頗似巫馬期韓詩外傳子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不處以身親之而單父亦治巫馬期問於子賤子賤曰我任人子任力任人者佚任力者勞亦見説苑敢乞刀圭餘本草序例云刀圭者十分方寸七之一準如梧桐子大也退之詩云乞取刀圭救病身歸和卯飲巵儻令憂民病從此得國醫晉語云上醫醫國寄題安福李令愛竹堂淵明喜種菊見陶潛詩集子猷喜種竹晉王徽之字子猷寄居空宅便令種竹曰何可一日無此君邪託物雖自殊心期俱不俗文選任彥升詩中道遇心期千載得李侯異丗等風流風流見第一卷答張沙河詩注為官恐是陶彭澤愛竹最知王子猷寒窗對酒聽雨雪夏簟烹茶卧風月小僧知令不凡材老杜鷹詩金眸玉瓜不凡材自掃竹根培老節冨貴於我如浮雲見論語安可一日無此君見上人言愛竹有何好此中難為俗人道晉孟嘉傳桓溫問嘉酒有何好而卿嗜之嘉曰公未得酒中趣耳司馬遷任安書曰此可為智者道難為俗人言也我於此物更不踈一官窘束何由到賈誼賦僒若囚拘文選吳都賦􅎗籠束退之詩人生如此自可樂豈必局束為人鞿二月二日曉夢會於廬陵西齊作寄陳適用燕寢著爐香韋蘇州詩燕寢凝清香愔愔間窗闥左傳祈招之愔愔注云安和貌因到郡城東笑談西齊月行樂未渠央詩庭燎夜未央注夜未渠央渠音遽苦遭晴鳩聒杜詩苦遭此物聒孰謂吾廬幽江郡梅李白士女嬉城闕鄭國風在城闕兮聞道潘河陽滿城花秀發潘嶽為河陽令樹桃李花人號曰河陽一縣花庾信集中有春賦云河陽一縣併是花金谷從來滿園樹文選蜀都賦君平王褒曄曄而秀發頗留載酒車楊雄傳時有好事者載酒肴從遊學共醉生麈襪文選洛神賦凌波微步羅襪生麈想見舞余姿風枝斜蠆髮詩都人士云彼君子女卷髮如蠆鄙夫不舉酒春事亦可恱老杜北征詩幽事亦可恱雨足肥􅌲芝沙暄饒笋蕨海牛壓風簾見上野飯薰僧鉢維摩經以滿鉢香飯普薰毗耶城飽食愧公家曽無助毫末勸鹽惟新令王欲惸獨活尚書無虐惸獨此邦淡食傖賈誼傳國制搶攘注搶音傖吳人罵楚人曰傖傖攘亂貌也音仕庚切晉周處傳處子玘將卒謂子協曰殺我者諸傖子能復之乃吾子也吳人謂中州人曰傖故云耳南史宋孝武狎侮群臣各有稱目桞元景桓護之並北人而王玄謨獨受老傖之目南史杜坦曰臣本中華髙族直以南渡不早便以傖荒見隔丗説雅量門云昨有一傖父來寄亭中注云晉陽秋曰吳人以中州人為傖桞子厚詩我今誤落千萬山身同傖人不思還以上所説不同故具列之山谷豫章人也而詆吉州人為傖蓋取傖荒之義無分於南北也勸鹽巳見前詩蓋官鹽不售而抑配焉婉其詞曰勸耳儉陋深刺骨漢杜周傳內深次骨公囷積丘山賈豎但圭撮漢律曆志量多少者不失圭撮注四圭曰撮三指撮之也又曰六十四黍為圭撮倉括反縣官恩乳哺縣官見上南史梁宗室始興王憺傳行荆州事人歌曰始興王人之爹赴人急如水火何時復來哺乳我荆土方言謂父為爹徒我反下吏用鞭撻政恐利一源隂符經云絶利一源用師十倍未塞兔三窟戰國策馮諼為孟嘗君收債於薛燒劵而還孟嘗君不恱後就國於薛老幼迎於道孟嘗君乃喜馮諼曰狡兔三窟免其死耳今君有一未得高枕而卧請復鑿二窟云云謂孟嘗君曰三窟巳成請君髙枕矣晉王衍傳以弟澄為荆州族弟為青州因謂曰荆州有江漢之固青州有輔海之險卿二人在外而吾留此足為三窟矣蓋舉馮諼語也寄聲賢令尹何道輔黥刖莊子太宗師篇息我黥而輔我劓從來無斫桑班固賔戲斫桑心計於無垠注云史記勾踐用范蠡計然斫計然之名也漢書桑弘羊以心計為侍中顧影愧簮笏退之詩峨峨進賢冠耿耿水蒼佩服章豈不好不與德相對顧影聽其聲頳顔汗漸背何顔殿課上解綬行采葛漢兒寬傳寬遷左內史以負租課殿當免民聞當免皆恐失之大家牛車小家擔負輸租繦屬課更以最上王國風采葛懼讒也次韻周德夫經行不相見之詩春風倚樽俎緑髮少年時緑髮見上酒贍大如斗蜀志薑維膽大如斗當時淮海知醉眼槩九州何嘗識憂悲看雲飛翰墨老杜詩明日看雲還杖藜秀句詠蛛絲杜詩最傳秀句寰區滿樂如同隊魚退之詩少小聚嬉戲不殊同隊魚遊泳清水湄波濤倐相失歲月秣馬馳李斯傳時乎時乎贏糧躍馬唯恐後時客事走京洛鄉貢趍禮闈艱難思一臂唐薛元超傳帝幸東都留輔太子曰朕留卿若失一臂講學抱群疑易睽卦群疑亡也邂逅無因得詩邂逅相遇適我願兮君居天南陲誰言井砥坐後漢馬援傳子陽井砥蛙也韓文坐井觀天忽枉故人詩清如秋露蟬李白詩白若白鷺鮮清如清唳蟬髙栁噫衰遲大塊噫氣見上注子虛賦榜人歌聲流喝郭璞曰言悲嘶也一介切退之聮句云騰口甚蟬喝又云蟬煩鳴轉喝意喝音義同感歎各頭白民生竟自癡晉王述排其子坦之曰汝竟癡耶見本傳過門不我見寧復論前期文選沈休文詩平生少年日分手昜前期注謂春秋冨前期非逺分手之際輕而易之及年衰則􅭑别今過門不相見豈論此耶杯酒良􅭑必况望功名垂吉守鄉丈人政成犬生氂後漢岑熙為魏郡太守人歌曰狗卧不驚足下生氂緑栁隂鈴閣晉羊祜傳祜都督荆州諸軍事鈴閣之下侍衛不過十數人紅蓮媚官池老杜有官池春鴈詩媚字蓋用謝靈運詩緑篠媚清漣又云孤嶼媚中川山谷多用此字開軒納日月見上髙會無使譏琵琶二十四此後又有詩言廬陵郡燕遊寄郡僚云今夕傳杯定何處應無二十四琵琶當是言吉州官妓琵琶之數如東坡云琵琶一秣四十絃也明粧百騎隨鮑明逺詩明粧帶綺羅退之詩淨濯明粧有所奉顧我未肯置齒牙為公置樂飮才可慰路岐列子岐路又有岐焉詩言分携也矧公妙顧曲周瑜傳曲有誤周郎顧取同姓也調笑才不羈玉臺新詠馮子都詩調笑酒家胡鄒陽傳不羈之士司馬遷傳僕少負不羈之才幕中佳少年多欲從汝嬉人事喜乖捂淵明集人事好乖會當語離班固賔戲乖忤而不可通曽莫把一巵朝雲髙唐觀髙唐賦襄王望髙唐之觀又云妾在巫山之陽髙唐之阻旦為朝雲暮為行雨客枕勞夢思杜詩雲雨荒臺豈夢思主翁悲琴瑟周與吉守同鄉不知官於何郡主翁蓋指其郡將以悼亡不聽音樂也生僧見蛾眉杜詩生憎栁絮白於綿君亦晚坎坷楚辝七諌云年既過半百兮愁轗軻而滯留古詩坎軻常苦辛有句怨棄遺退之詩頻蒙怨句刺棄遺夜光暗投人見上所向蒙詆嗤相思秋日黃西嶺含半規謝靈運詩逺峯隱半規老矣失少味尚能詩酒為惡解扁舟下何年復來兹寄聲緩行李鮑明逺詩願尓篤行李此反其意激箭無由追賈誼傳矢激則逺白樂天詩年光同激箭寄傅君倚同年有情清江水東下投豫章故人江上居不寄書一行杜詩相看過半百不寄一行書相思對明月談笑如淸光向風長歎息孤鴈起寒塘杜詩鳥影度寒塘傾寫鬱結懷楚辝遭沉濁而汙穢兮獨鬱結其誰語因之東南翔文選休上人詩桂水日千里因之平生懷太白嘗用此語寄魯中二子云裂素寫逺意因之汶陽川姑氏有淑質幽林蘭靜芳願因奉箕帚漢髙紀願為箕帚妾蘋藻羞蒸嘗采蘋采藻見詩召南凡祀如殺而嘗閉蟄而蒸見左傳念君方策名退之感二鳥賦况萊名於薦書要津邁騰驤選詩何不策髙足先據要路津西京賦乃奮翅而騰驤杜詩此豈有意仍騰驤引車入里門万石君傳諸子入里門趍至家觀者塞路傍玉臺新詠詩云兄弟兩三人中子為侍郎五日一來歸道上自生光黃金絡馬頭𫀆者滿路傍雍雍求匹好羔鴈委潘楊詩雍雍鳴鴈注雍雍鴈聲和也納采用鴈文選潘安仁作楊武仲誄云潘楊之穆有自來矣顧惟蓬茅陋禮記儒行篳門圭竇蓬户甕牖豈能屈東床見上眷言南鳴鴈七子伊在桑曹國風鳴鳩在桑其子七兮幸緣一日雅結好永不忘谷永傳無一日之雅左右之介次韻章禹直魏道輔贈答之詩我老倦多故心期馬少遊淵明詩實欣心期方從我遊後漢馬援傳援謂官屬曰吾弟少遊常哀吾慷慨多大志曰士生一丗但取衣食才足乘下澤車御欵假馬為郡掾吏守墳墓鄉里稱善人斯可矣願為春眠蠶吐絲自綢繆詩綢繆束薪翩翩魏公子史記平原君翩翩濁丗之佳公子也閲丗無全牛莊子庖丁解牛三年之後未嘗見全牛也吹噓鼓萬物説卦云動万物者莫疾乎雷撓万物者莫疾乎風領袖傾九流晉裴秀傳時人為之語曰後進領袖有裴秀後漢班固傳博貫載籍九流百家之言無不窮究注云九流謂道儒墨名法隂陽農雜縱橫昨來懷白璧往撼西諸侯史記藺相如奉璧入秦使其從者衣褐懷其璧亡歸退之王適墓志云聞金吾李將軍年少喜士可撼乃踳門告曰天下竒男子王適願見將軍白事中丞文武將徐德占自布衣為中書户房習學公事召對除太子中允館閣較勘權監察御史裏行拜中丞致永洛之敗巳見上注良非衛霍侔靑去病誓開河源地畫作禹貢州壯士捐軀死文選曹子建詩捐軀遠從戎鯨鯢尚吞舟莊子吞舟之魚蕩而失水則蟻能苦之左傳宣十二取其鯨鯢而封之客心無一寸老杜心折此時無一寸草食隨百憂木食草衣見傳燈録故人道舊語漢髙祖紀諸母故人日樂飲極歡道舊故為笑樂末路非前籌鄒陽傳至其晚節末路張良傳請借前箸籌之重來滕王閣閣在洪州德占洪州人今為隆興府楓葉上江秋章子飽經術賦行如曹劉曹植子建劉楨公幹太學得虛名文選古詩南箕北有斗牽牛不負軛良無磬石固虛名復何益權勢殊未尤禍機發尤妄易無妄之災禍機見上對吏抵搶頭司馬遷書見獄吏則頭搶地遇逢椎鼓赦帝澤萬邦休退之詩昨日州前椎大鼓嗣皇繼聖登夔皋赦書一日行萬里罪從大辟皆除死章江三年拘解裝買莫愁文選馬賦輟駕回慮息徒解裝退之詩解裝具盤筵唐書樂志曰莫愁樂者出於石城樂石城有女子名莫愁善歌謡麗姬泣又悔見上生故難豫謀邂逅識靣晚困窮理相收夜語倒樽酒參旌偃風旒文選景福殿賦叄旗九旒從風飄掦注云參三也旗上畫日月星今言夜語見星耳兩公但取醉古今共髙丘取醉見上漢楊惲傳古與今如一丘之貉注云言同類也次韻道輔雙嶺見寄三疊明如九井璜見上美如三危露吕氏春秋水之美者三危之露崑崙之井正觀魏公孫魏證也今來功名誤杜詩從來禦魑魅多𬒳才名誤兒時漢南栁搖客傷歲暮時不與我謀論語日月逝矣歲不我與羲和促天步離騷經云吾令羲和弭莭兮望崦嵫而勿迫注云羲和日御也詩云天步艱難生涯魚吹沫莊子大宗師萹泉涸魚相與處於陸相詬以􅊜相濡以沫不如相忘於江湖文彩豹藏霧列女傳陶答子妻曰南山有玄豹霧兩七日而不下食欲以澤其毛而成文章也文選謝玄暉詩雖無玄豹姿終隱南山霧人言壷中老渠但未得趣晉孟嘉傳公未得酒中趣耳飲酒入壷中茫然失巾屨后漢費長房傳市有老翁賣藥挂一壷市罷輒跳入壷中唯長房覩之因往奉酒脯翁與俱入壷中唯見玉堂嚴麗旨酒甘肴共飲畢而出老杜詩松下丈人巾屨同偶坐似是商山翁時不與我謀今君向何處蓮塘倒箭靫此卷有代書一萹亦云蓮房倒箭靫桂影涼一作落霜兔平生知音地地下無尺素樂府詩云中有尺素書十夜九作夢虜乘驚沙度李華弔古戰埸文驚沙入面又云河冰夜度時不與我謀征西枕戈去自平生知音地至此皆言徐德占也晉劉琨傳吾枕戈待旦志梟逆虜次韻道輔旅懷見寄歲華其將晚霜葉不可風孟子王曰有寒疾不可以風此借使漢韓安國傳草木經霜者不可以風過生理魚乞水轍中鮒魚見上歸心鳥飛空風塵化衣黑陸士行詩京洛多風塵素衣化為緇謝玄暉詩誰能久京洛緇塵染素衣皆見文選旅宿夢裙紅退之詩孤遊懷耿介旅宿夢婉娩又云不解文字飲唯能醉紅裙人言家無壁司馬相如家徒四壁立自倚茟有鋒退之詩題詩尚倚筆鋒徑蓋用鮑明逺詩兩説窮舌端五車催筆鋒轉蓬且半歲曹子建詩轉蓬離本根飄飄隨長風步里客談云古人多用轉蓬不知何物外祖林公使遼見蓬花枝葉相屬團欒在地遇風即轉問之云轉蓬也交臂各衰翁莊子吾終身與汝交一臂而失之扁舟去日逺明月與君同文選月賦美人邁兮音塵闕鬲千里兮共明月露晞百年駛詩湛湛露斯匪陽不晞言人生如朝露也駛音史疾也圎覺經雲駛月運麟獲万事窮春秋絶筆於獲麟裝懷酒淡菼淡琰二字元注也上林賦云隨風淡淡與波搖蕩師古曰淡大覽反淡音琰北山移文云牒訴倥偬裝其懷塞意霧空濛諸公尚無恙賈誼書六七貴人皆無恙不見陳元龍此語亦指徐德占按魏志陳登字元龍許汜曰陳元龍湖海之士豪氣不除寄余干徐隱甫余干縣屬饒州江行吾邅回楚詞邅吾道兮洞庭又云固邅回而不息風水索米東方朔傳無令但索長安米相逢解人頥匡行傳匡説時解人頥豪士徐孺子后漢徐稚字孺子鸕鷀葭葦間煮茗當酌醴詩以御賔客且以酌醴夜船餉蒸鵝白髮厭甘旨禮記內則慈以旨甘東江始分風廬山廟有神分風送客舟見神仙傳苔網饋百紙后漢蔡倫傳造意用樹膚麻頭及敝布魚網以為𥿄遣兵夜賦詩月冷石齒齒退之羅池廟碑桂樹團團兮白石齒齒别來星環天左傳襄九年是謂一終一星終也注歲星十二歲一周天再見艷桃李退之詩偶逢明月曜桃李選詩艷陽桃李莭寄聲良勞勤第三卷答宗汝為詩寄聲甚勞苦即良勞勤也趙廣漢傳寄聲謝我張耳傳勞苦如平生歡師古曰勞苦相勞問其勤苦也報我缼雙鯉並見上但聞佳邑政杻械生􅌲耳蓮經普門品云或囚禁枷鎖手足𬒳杻械頗聞延諸儒破訟作詩禮顧豫白下邑山谷先有詩黃綬今為白下令自注云太和縣古白下按寰宇記太和漢為廬陵縣地隋改為太和唐貞元三年移歸白下驛西置即今理也庭聚雨前蟻李義山詩閙若雨前蟻多於秋後蠅義山以言洞庭魚山谷以言縣庭人聚珥筆通文章錐刀爭未巳珥筆之民詳見第三卷注錐刀見此卷上注𥘉無得民具周禮太宰一曰牧以地得民二曰長以貴得民言得民者九名實正尓尓尓尓魏晉間語也崔琰傳生女耳耳阮咸傳聊復耳耳願間庖丁方江湖天到水遙知解千牛庖丁解牛見上袖手笑血指退之祭栁子厚云不善為斫血指汗顔巧匠旁觀縮手袖間書來倘垂教改事從此始左傳宣十二年不泯其社稷使改事君退之詩君其務貰過我亦請改事次韻秋郊晚望通同一指馬莊子齊物萹以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也天地一指也万物一馬也心解廢耳目短生行長謝文運謝靈運詩短生旅長丗黃落看草木漢武秋風詞秋風起兮白雲飛草木黃落兮鴈南飛見武帝故事月令季秋之月草木黃落無懷丗不知有酒客可速昜蒙不速之客來誰能縛詩書用老杜身猶縛禪寂之意閉門抱羈獨披襟臨江皋宋玉風賦王乃披襟當之万籟發空谷風力斜鴈行山光森雨足選詩森森散雨足杜詩雨聲先巳風散足盡西靡壁蟲先知寒機織日夜促尓雅蟋蟀蛬注云促織也居人思行人裘褐誰結束文選古詩何為自結束行人喜歸來邂逅天從欲左傳人之所欲天必從之可奈甑生塵後漢范丹傳甑中生塵范史雲嚴霜凍𣏌菊陸龜蒙有𣏌菊賦八月十四日夜刀坑口對月奉寄王子難子聞適用元注云聞郡中數月未嘗有燕遊去年對月廬陵郡吉州曰廬陵郡治廬陵縣醉留歌舞踏金沙老杜陪王使君晦日泛江詩云有徑金沙軟無人碧草芳今年今夕千峰下新磨古鑒動菱花魏武帝有菱花鏡趙飛燕外傳有七出菱花鏡一奩史信詩鏡失菱花影叉除却月梁寒藤老木𬒳光景深山大澤皆龍蛇左傳襄二十一年深山大澤實生龍蛇杜詩深山大澤龍蛇逺春寒野隂風景暮西風為我奏萬籟落葉起舞驚棲鴉遙憐城中二三友風流慣醉玉叉斜退之詩金叉半醉座添春今夕傳杯定何處老杜詩舊日重陽日傳杯不放杯應無二十四琵琶見上贈王環中丹霞不踏長安道傳燈録丹霞天然禪師𥘉習儒學將入長安應舉方宿逆旅偶一禪客問曰仁者何往曰選官去客曰選官何如選佛遂直造江西見馬大師生涯蕭條破席帽囊中收得劫𥘉鈴寶積經云善順菩薩得劫𥘉時閻浮金鈴於四衢中髙聲言此舍衛中誰最貧窮當以此鈴而施與時有耆舊最勝長者云我於此城最為貧窮可施於我菩薩云汝非貧者有波斯匿王最為貧者而施與之今齎此鈴願以相奉復説偈言若人多貪求積財無厭足如是狂亂者名為最貧人王聞斯語內懷慙愧曰仁者汝雖善勸我猶未信為汝自説為有證乎答曰汝不聞耶如來至真等正覺當證大王是貧窮人王言我願相與往見如來於是善順菩薩説偈遙請如來從地涌出尓時丗尊告言六王當知或有於法善順貧窮王當冨貴或有於法王為貧窮善順冨貴所以者何身登王位於丗自在王為冨貴善順貧窮勤持𣑽行樂持尸羅善順冨貴王為貧窮夜靜月明獅子吼傳燈録釋迦牟尼佛生兜率天分手指天地作師子吼聲那伽定後一爐香譯梵曰那伽此云龍也牛沒馬回觀六道牛頭沒馬頭回曹溪鏡裏絶塵埃山谷喜書此偈傳燈録寶志十讃云輪回六道不停結耆域歸來日未西一鉏識盡婆娑草髙僧傳耆域天竺人神竒任性迹行不常且善醫見本傳戲和于寺丞乞王醇老米君不見公車待詔老詼諧幾年索米長安街謂東方朔並見上君不見杜陵白頭在同谷夜提長鑱掘黃獨老杜集云乾元中寓居同谷縣作歌七首其一云長鑱長鑱白术柄我生託子以為命黃獨無苗山雪盛短衣數挽不掩脛山谷云往時儒者不解黃獨義改為黃精學者承之以豫考之蓋黃獨是也本草赭魁肉白皮黃巴漢人蒸食之江東謂之土芋江西謂之士卵蒸煮食之類芋魁文人古來例寒餓安得野蠶成繭天雨粟漢光武紀野蠶成繭𬒳於山阜史記天雨粟鬼夜哭王家圭田登幾斛孟子卿以下必有圭田圭田五十畒于家買桂炊白玉蘇秦曰使臣食玉炊桂見戰國策山谷前集又有詩云薪桂炊白玉贈朱方李道人顴骨橫穿夀門過年比數珠剩三顆傳燈録趙州從諗禪師傳俗夀一百二十歲嘗有人問師年多少師云一穿數珠數不足橫吹鐵笛如怒雷國𥘉舊人唯有我劉禹錫與歌者米嘉榮云舊人唯有米嘉榮戲題曽處善尉廳二首雞塒啄鴈如鴐鵝詩雞栖于塒子虛賦弋白鵠連鴐鵝万里天衢且一波宫錦絡衫弓石八與人同狀不同科論語為力不同科右超然臺茅茨中安一牀寂退之送張道士云臣有膽與氣不能死茅茨維摩經摩詰即以神力空其室內唯置一床以疾而卧天女元非丗間色道人今日八關齋南史袁粲傳宋孝武即位遷侍中文帝諱日群臣並於中興寺八關齋中食竟粲别與黃門郎張淹更進魚肉食何尚之密以白孝武並免官南史又云吳興有項羽神太守到必須祀以跪下牛李安人不與又於廳上設八關齋俄而牛死道人山谷自謂也按釋氏書戒有八一不殺二不偷盜三不邪淫四不妄語五不飲酒六不坐髙廣大牀七不著花鬘瓔珞不用香油塗身熏衣八不自歌舞不得輒往聽不過中食此八戒名八關齋戒關者閉也森也莫散花來染衣裓天女散花見維摩經裓古得切衣前襟也彌陀經曰西方堊衆以衣裓盛花奉諸佛右不動菴寄上髙李令懷道上髙隸筠州李侯湖海士魏志陳登傳元龍湖海之士瓜葛附婚友晉王導傳相與有瓜葛書盤庚至于婚友平生各轉蓬轉蓬見上未曾接樽酒司馬遷報任安書云未嘗銜杯酒接殷勤之歡寄聲維勞勤見上江路常永久莭物居然秋莊子山木篇居然不免於患蛻蟲悲髙栁謂蟬也傳聞闢學館鼓士薦豚韭禮內則豚春用韭秋用蓼能使珥筆黔黔謂黔首也史記秦紀更名民曰黔首珥筆見上稍知忠信有論語十室之邑必有忠信驕虎縮瓜距詩禮開戶牖事勝感邦人淵明感二踈云餘榮何足顧事勝感行人伐山謀不朽漢地理志以漁獵山伐為業左傳襄二十四年春穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔曰魯有先大夫曰臧文仲既沒其言立其是之謂乎豹聞之太上有立德其次有立功其次有立言雖久不廢此之謂不朽武功筆如椽晉王珉傳夢人以大筆如椽與之文字爛瓊玖謂豫有書癖瓊玖書癖見第一卷注摹篆寫科斗不珍金石刻要我一揮肘安知乃兒戲漢周亞夫傳鄉者霸上棘門如兒戲耳敢傳万丗後摩拂幼婦篇後漢蔡雍題曹娥碑云黃絹幼婦外孫虀臼慙非換鵝手見王羲之傳公其勤勞來小雅鴻鴈万民離散而能勞來還定安集之嘉政民父母不用琢蒼崖豐碑在人口禮公室視豐碑詩意謂姓蘇人作碑山谷為書末章言但能勞來安定則民事之如父母所謂道上行人口似碑無用此也謝文灝元豐上文藁虎豹文章非一斑見上乳雉五色蜃胎寒書山龍華蟲疏云華蟲雉也雉五色象草華也楊雄賦剖明月之珠胎吳都賦蚌蛤珠胎爾雅蚌􅍭漿注蚌即蜃也天生材器各有用太白將進酒云天生我材必有用千金散盡還復來相如名獨重太山藺相如傳退而讓頗名重太山風流小謝宣城後南齊書云謝朓字玄暉轉中書郎出為宣城太守而南史不載太白宣州謝朓樓餞别詩蓬萊文章建安骨中間小謝又清發少年如春膽如斗見上𥙿陵書藁公不朽永𥙿乃神宗陵持心鐵石要長久魏武帝令長史王必曰忠能勤事心如鐵石國之良吏也讀方言楊雄著此書名曰輶軒使者絶代語釋别國方言其答劉歆書云成帝時天下上計孝廉及內郡衛卒會者雄常把三寸弱翰賫油素四尺以問其異方語歸即以鉛擲次之於槧云云八月梨棗紅杜詩庭前八月梨棗熟繞墻風自落江南風雨餘末覺衣衾薄壁蟲憂寒來催婦織衣去聲著斫音二字元注也荒畦𣏌菊花猶用充羮臛招魂云露雞臛觹注云有菜曰羮無菜曰臛齊民要術有羮臛法一門大率以肉作羮臛耳促織𣏌菊見上連日無酒飮令人風味惡頗似楊子雲家貧官落魄楊雄傳何為官之拓落也􅐱食其傳家貧落魄魄音薄忽開輶軒書澀讀勞輔齶虛堂漏刻間九土可領略宋玉登徒子賦云少曽逺逰周覽九土李善曰九土九州之土也願多載酒人喜我識字博淵明詩云子雲性嗜酒家貧無由得時賴好事人載醪祛所惑觴來為之盡是咨無不塞設心更自笑欲過屠門嚼文選曹子建書過屠門而大嚼雖不得肉貴且快意注云桓子新論人聞長安樂則出門向西而笑知肉味美對屠門而大嚼往時抱經綸待價一丘壑論語云待價見語班固敘傳漁釣於一壑栖遲於一丘一丘卜師非熊羆史記齊太公丗家云吕尚以漁釣干周西伯西伯將出獵卜之曰所獲非龍非鱺非虎非羆所獲伯王之輔西伯獵果遇太公立為師夢相解靡索書髙宗夢得説㑭以形旁求于天下説築傳岩之野惟肖爰立作相疏曰皇甫謐云髙宗夢天賜賢人胥靡之衣使百工寫其形旁求于天下果見築岩者胥靡其衣帶索執役于虞􅉑之間所欲吾未奢史記淳于髠傳所欲者奢倘使耕可穫楊子法言耕不穫獵不享耕穫乎今年美牟麥厨饌豐餅拓歐陽公歸田録湯餅唐人謂之不托今俗謂之餺飥矣束晳餅賦有饅頭薄持起溲牢九惟饅頭至今存余曉何物摩莎腹中書妥知非糟粕丗説郝隆曬腹中書莊子所讀者古人之糟粕巳見上注此萹言索寞無酒因讀方言願多有好事者載酒肴來問竒字因得大嚼耳古者固有抱經綸之術而隱於築釣後為師為相我則異於此所望不奢也若使麥田豐而冨湯餅足矣山谷外集詩注卷之七
