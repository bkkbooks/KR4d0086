front:
  text: 山谷外集詩註卷第三
  hash: sha256:89811b3a26e77f04446ea566e0ab3209e2659f17d303fd17ad62255cc212fb32
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_003-1a}
body:
  text: 次韻謝外舅病不能拜復官夏雨眠起之什復官盖熈寕十年丈人痾卧兹漢高彪傳公今飬痾傲士固其冝也文選謝靈運詩飬痾血園中又云卧痾對空林此道取衆弃史記白圭傳人弃我取人取我弃引此以言取捨與衆異耳山谷祭劉凝之文云執盈虚以化物取衆弃而致夥此乃言用白圭之術強飯尚可飽漢貢禹傳生其強飯慎疾以自輔力田苦常匱言力學而不遇時如力田而不逢年也欲從群児嬉出語不娬媚退之詩又不媚笑語不能伴児嬉戯娬媚見上軒窗㘴風凉編簡堪遺墜漢劉歆傳經或脫簡傳或間編自安井無禽昜井卦𥘉六井泥不食舊井無禽注謂井不渫治禽所不向而况人乎一時所共弃師厚能安之焉未歎旅焚次旅卦九三旅焚其次喪其僕注謂次焚僕喪而身危也師厚幸未至此夏暑極陽功舒策陽常居大夏以主歳功時霖作隂事記昏義月食則后素服蕩天下之隂事呼児䟽藥畦植杖按瓜地植杖岀語杜詩青門瓜地新凍裂南山雲氣佳北極冕旒邃爾雅北極謂之北辰礼天子冕十有二旒前後邃延自欣鬚髮白得見衣裳治係辝垂衣裳而天下治山林収枯槁草木洗憔悴砥痔以車來詩以爾車來莊子禦㓂篇秦王有病召醫破癰潰瘡者得車一乘䑛痔者得車五乘探珠遭龍睡禦㓂篇又云河上有家貧恃緯䔥而食者其子没於淵得千金之珠其父曰千金之珠必在九重之淵而􅌐龍頷下子能得珠者必遭其睡也腹便時蒙嘲後漢边韶晝卧弟子私嘲之曰边孝先腹便便懶讀書但欲眠身退得自恣莊周傳云其言汪洋自恣以適已伊憂無下僚骯髒謝髙位伊憂骯髒見上選詩英俊沉下僚誰能領斯㑹文選向秀思舊賦託運遇於領㑹注云領㑹冥理相㑹好在漆園吏選詩􅃮園有傲吏史記莊子蒙人也甞爲蒙􅃮園吏杜詩因君問消息好在阮元瑜桞子厚再上湘江詩好在湘江水今朝又上來次韻師厚五月十六日視田悼李彦深元注云去年五月十三日與遊西郊南鴈傳尺素古樂府中有尺素書飛來卧龍城見上頗知髙卧乆忽作田野行湛湛陂水滿欣欣原草榮歸去來詞木欣欣以向榮泉㳙㳙而始流日華麗山川杜詩遲日江山麗秀色奪目精髙唐賦煌煌熒熒奪人目精對酒不滿懷攬物有餘清文選陸士衡詩安寢北堂上明月入我牖照之有餘輝攬之不盈手謝靈運詩宻林含餘清念昔讀書客逺人遺丗情南畒道觀餉西郊留勸耕共遊如昨日笑語絶平生此事今巳矣賔筵老無成退之祭文甔石之儲常空於私室方丈之食毎盛於賔進猶倚謝安石深心撫婺矛牙惸以安石比師厚婺矛牙謂無夫也左傳婺矛牙不恤其緯婺矛牙也何害巳爲婺矛牙婦韻書惸憂也次韻師厚食蟹海饌糖蟹肥南史何㣧傳㣧侈於味食白魚䱉脯糖蟹使門人議之斈生鍾岏曰䱉之就脯驟於屈伸蟹之將糖躁優彌甚江醪白蟻醇毎恨腹未厭左昭二十八年願以小人之腹爲君子之心属厭而巳誇說齒生津三歳在河外霜臍常食新左成十年不食新矣朝泥㸔郭索大玄云蟹之郭索後矧黄泉林逋詩云草泥行郭索雲木呌鈎周暮鼎調酸辛戰國䇿楚語云黄雀晝遊乎茂樹夕調乎酸辛趨蹌雖入笑齊國風云巧趨蹌兮退之詩點綴簿上字趨蹌閤前鈴風味極可人憶觀淮南夜火攻不及晨借用晉周顗傳阿奴火攻固岀下䇿横行葭葦中雲溪友議曰皮日休螃蟹詩云海龍王處也横行不自貴其身誰怜一網盡蘇子美监進奏院用市故𥿄錢祠神㑹客以自盗除名所㑹客皆一時賢俊悉㘴貶逐中之者喜曰吾一舉網尽之矣此借用其字大去河伯民晏子春秋曰齊景公時大旱欲祀靈山及河晏子曰山以石爲身草木爲毛髪今不雨毛髪且焦身且熱山豈不欲雨乎河伯以水爲國以魚鱉爲民彼獨不欲雨乎祀之何益君冝避殿暴露公從之果大雨鼎司費萬錢漢彭宣云三公鼎足承君而鼎司字見於文選勸進表云臣等荷寵三丗位厠鼎司又陳琳爲袁紹檄曹䂊州云竊盗鼎司傾覆神噐晉何曽爲大傳日食萬錢玉食羅常珍法言云弃常珍而嗜異饌吾評楊州貢此物真絶倫楊雄􅐌以爲絶倫次韻謝外舅食驢膓垂頭畏庖丁見上趍死尚能鳴退之秋懷詩浮生雖多途趍死惟一軌晉書王武子好馿鳴丗說王仲宣好馿鳴說以雕爼樂甘言果非誠莊子逹生篇祝宗人臨牢筴說彘曰汝奚悪死吾將三月勝汝十日戒三日斎藉白茅加汝肩􅥑乎彫爼之上則汝爲之乎左傳云幣重而言丼誘我也生無千金轡老杜後出塞云千金買馬鞍樂府木蘭歌云南市買轡頭馿安得有此哉死得五鼎烹主父偃傳大丈夫生不五鼎食死則五鼎烹耳禍胎無膓胃枚乗書云福生有基禍生有胎殺身和椒橙春風都門道貫魚百十并昜剥卦貫魚以宫人寵魏志鄧艾傳魚貫而進騎奴吹一吷史記任安傳與騎奴同食莊子則陽篇吹劒首者吷而巳道堯舜於戴晋人之前譬猶一吷也駔駿不敢争文選魏都賦曰兾馬填廐而駔駿馬賦云於時駔駿充階街兮注云說文曰駔壯也物材苟當用左傳隠五年凡物不足以講大事其材不足以備噐用則君不舉又云取材以章物采謂之物何必渥洼生漢書礼楽志楽章有元狩三年馬生渥洼水中作忽思麒麟楦突兀使人驚朝野僉載云唐衢州盈川縣令楊烱恃才簡傲目朝官爲麒麟楦人問之曰今假弄麒麟者刻畫頭角修飾皮毛覆之馿上及脫去皮楬還是馿耳無徳而衣朱紫与此何異次韻師厚答馬著作屢贈詩嘗聞馬南郡後漢馬融傳爲南郡太守少有技俗韻陶詩少無適俗韻性本愛丘山寒灰幾見溺韓安國傳安國㘴法抵罪䝉獄吏田甲辱安囯安國曰死灰當不復然乎甲曰然即溺之鎩翮常思奮文選五君詠詠嵇康云鸞翮有時鎩龍性誰能馴桐薪鳴竈間後漢蔡邕傳呉人有燒桐以㸑者邕聞火烈之聲知其良木因請而裁爲琴果有羙音而其尾猶焦故時人名焦尾琴劒氣吐呉分晋張華傳吴之未㓕也斗牛之間常有紫氣呉平之後紫氣愈明華問雷煥是何祥也喚曰寳劒之精上徹於天耳多言丗益蚩老子多言數窮當律心自隠莊子言而當物則終日言而不盡自隠謂隠度也漢元帝紀自度曲應劭曰自隠度在新曲文選崔子玉座右銘云隠心而後動謗議庸何傷注云隠度也家雖四立壁見上仕要三無愠語三巳之無愠色㑹將漁父意徃就莊生問莊子有漁父篇和答師厚黄連橋壞大木亦爲秋雹所損溪橋喬木下徃歳記經過居人指神社不敢㝷柯用莊子檪社樹意也晋阮脩伐杜樹或止之脩曰若社而爲樹伐樹則社移樹而爲社伐樹則社亡矣左傳文七年此諺所謂庇焉而縱㝷斧焉者也青隂百尺蔽白日烏鵲取意占作窠隋五行志童謡云可怜青雀子作窠猶未成黄泉浸根雨長葉造物着意固巳多風摧電打掃地盡太白詩春光掃地盡字本出楊雄羽獵賦軍驚師駭刮野掃地師古曰皆盡無遺餘也竟莫知爲何譴訶漢薛宣傳云譴訶及細微獨山冷落城東路不見指名終不磨項羽傳非丗所指名也韓文吾立子名百丗不磨次韻師厚病間十首具錦不足歌詩巷伯萋兮斐兮成是具錦按實録熈寕五年五月追前提點成都府路刑獄司封郎中謝景𥘉两官都官郎中李杲卿一官並勒停㘴在成都府路踰滥故也今觀此詩盖必有織成其罪者前集和邢惇夫秋懷云謝公藴風流詩作鮑照語絲蟲縈諌草筆力挾風雨萬里投諌書石交化豺虎石交不如謂何人請陳江漢詩江漢乃大雅篇名荀子賦篇天下不治請陳詭詩羙人岀江漢窈窕丗未窺文選張平子四愁詩序云依屈原以羙人爲君子以珍寳爲仁義以水深雪雰爲小人折蘭不肯佩告我以蠶飢温飛卿詩云蠶飢使君馬鴈避將君箭玉臺新詠其略云秦氏有好女自言名羅敷羅敷善蠶桑採桑城南隅使君從南來五馬立踟蹰使君遣吏問寕可共載不羅敷前置詞使君一何愚云云獨歸豈憚逺三危路如飴吕氏春秋本味篇云水之美者三危之露崑崙之井大雅綿詩堇荼如飴德人更疢􅍚術智益灑落孟子曰人之有德慧術知者恒存乎疢􅍚反身見萬古孟子曰萬物皆備於我反身而誠樂莫大焉道不在卜度胸中有鏌鎁老境要志弱言内剛外柔也吴越春秋干將吴人也闔閭使作剱二曰干將曰莫耶莫耶干將之妻也道德經云實其腹弱其志注云和柔謙譲不處權也謝公賦逹生逹生眞可託莊子有逹生篇引鏡照青骨驚非曩時人肇法師物不遷論云𣑽志出家白首而歸鄰人曰昔人尚存乎志曰吾猶昔人非昔人也天地入喻指莊子齊物篇以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也天地一指也萬物一馬也芭蕉自觀身維摩經是身如芭蕉中無有堅程力則已病征財又室貧古來支離䟽粟帛王所仁莊子人間丗篇支離䟽者頥隠於齊肩髙於項上有大役則支離以有常疾不受功上與病者粟則受三鍾與十束薪𦵔寒知園秋賈誼新書曰楚惠王食寒𦵔而得蛭遂吞之飯白問米賤老杜云與奴白飯馬青蒭又云爲問淮南米貴賤婦孫勸甘㫖霜兎頗冝麵内則云慈以甘㫖又云牛冝稌羊冝黍豕冝稷犬冝粱鴈冝麥黄花不舉酒佳句餘嫪戀嫪郎到切退之薦士詩念將决焉去感物増戀嫪經行宴坐堂維摩經曽於林中宴坐䑕跡書几硯語林曰簡文爲撫軍時所坐牀上生塵不聽左右掃去見䑕行跡視以爲佳桃李一春期松栢千歲永經玄事寂寞楊雄有解嘲云意者玄得無尚白乎又云惟寂惟寞守德之宅髪白官閑冷草緑艾如張艾如張樂府篇名波淸􅈮司影春秋莊十八年秋有􅈮注短狐也􅍭沙射人爲灾音或官韻域或兩音博物志江南溪水中有射工蟲長一寸口中有努形氣射人影不治則殺人東里與無趾渠有幸不幸莊子德充符篇申屠嘉兀者也而與鄭子産同師於伯昏無人子産謂申屠嘉曰我先岀則子止子先出則我止又云魯有兀者叔山無趾踵見仲尼仲尼曰子不謹前旣犯患若是矣雖今來何及矣两人皆兀者故誤以申屠嘉爲無趾東里子産也病餘兒廢鋤門巷草芊眠楚詞云逺望兮阡眠陸士衡云林薄草阡眠謝元暉云阡眠起雜樹來者何所聞披草足跫然晉稽康傳康居貧鍜於大樹之下以自贍給鍾㑹往造焉康不爲之礼而鍜不輟良乆㑹去康謂曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去㑹以此憾之言於文帝遂害之文選趙景珍書云披榛覔路蛩然見上封侯謝骨相李廣傳豈吾相不當封耶班超傳此萬里侯相也翟方進傳小史有封侯骨使鬼無金錢見上夢作白鷗去江湖水黏天退之祭張貟外文云洞庭漫汗黏天無壁前集有詩云夢作白鷗去江湖水如天莊子曰且汝夢爲鳥而厲乎天夢爲魚而没於渊南史梁丗子方傳嘗著論曰吾嘗夢爲魚因化爲鳥方其夢也何樂如之民生自煎熬杜詩置膏烈火上哀哀自煎熬太白詩名利徒煎熬煑豆以其㸑丗說魏文帝使東阿王七歩作詩不成當行大法王應声曰萁在釡下燃豆在釡中泣本是同根生相煎何太急居然忘本根文子云形之與名居然別矣光隂不供翫桞子厚與李翰林書云悠悠人丗不過爲四十年客耳前過三十七年與瞬息無異後所得者其不足把翫亦巳審矣藏山夜半失莊子大宗師篇云藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走烏合歸星散文選晉紀緫論云新起之㓂烏合之衆註引𬋩子書云烏合之衆𥘉雖相歡後必相噬蜀志姜維傳曰星散流離死者甚衆因病見不生逹人果大觀維摩經云我不任詣彼問疾云云諸法畢竟不生不㓕又云法本不生今則無㓕逹人大觀見上開田種白玉搜神記曰羊公雍伯性篤孝父母亡葬無終山遂家焉山髙無水公作義漿有一人就飲以一斗石子與種之云玉當生其中種之得白璧五双飽牛事耕犂雨露非無澤得秋常苦遲猛虎擅文章語虎豹之鞟猶犬羊之鞟正義曰此章貴尚文章斑斑𬒳諸児上林賦曰𬒳班文文選七命云拉虎摧斑長松抱勁莭唯有歳寒知見論語謝公蒔蘭苕文選陸士衡詩翡翠係蘭苕容色更相鮮真意付此物惠然風肯來詩惠然肯來香爲一披拂莊子天運篇孰居無事而披拂是遥知醉吟姿黽勉向朱紱詩黽勉求之昜困卦朱紱方來杜詩朱紱負平生師厚𥘉復官得㐮陽倅榰笻橘柚黄僧屋對像佛身病心輕安道肥體癯瘦韓非子云子夏見曽子曽子曰何肥也曰戦勝故肥吾入見先王之義則榮之出見冨貴之樂則又榮之两者交戦於胸中未知勝負故癯今先王之義勝故肥好懷當告誰四墻棗紅皺退之聮句紅皺曬簷瓦黄團繫門衡負暄不可献列子楊朱篇云宋國有田父常衣緼黂僅以過冬曁春東作自曝於日不知天下之有廣厦隩室綿纊狐狢頋謂其妻曰負日之暄人莫知者以献吾君將有重賞捫虱坐清晝見上端有真冨貴樂天詩爲報髙盖車恐非真冨貴千秋萬年後杜詩千秋萬歳名寂寞身後事以上與師厚贈荅凡十八篇非同時作後人類聚於此和謝公定征南謡漢武平南粤分其地爲儋耳朱崖南海蒼梧鬰林合浦交趾九真日南凡九郡置交州刺史以領之唐改交州緫𬋩又改安南都護國朝封其主爲交趾郡王進南平王神宗王安石秉政献言者謂交趾可取乃以蕭注知桂州有献䇿平交州者輙火其書沈起獨言交州小醜無不可取之理安石喜乃罷注以起知桂州不能懷輯又禁交趾與州縣貿昜熈寕八年交趾入㓂䧟欽廉二州遂圍邕州城䧟大守蘇緘死之神宗以趙卨爲招討使緫九將軍進討旣又以郭逵爲宣撫使而卨副之逹至長沙督諸將進兵復邕州遣將拔永安州溪洞悉降交趾乘船迎戦達破之賊勢蹙乃乞降凡費錢帛金銀粮草五百一十九萬貫疋两石二廣之民大困此其大略也李乾德降盖熈寕十年二月時山谷猶在北京然此詩未必是此時作傳聞交州𥘉陸梁楊雄甘泉賦云飛蒙茸而走陸梁東連五溪西氐差後漢馬援傳擊武陵五谿蛮夷注云􅐱元注水經曰武陵有五溪謂雄溪㨺溪西溪潕溪辰溪悉是蛮夷所居皆槃瓠子孫在今辰州界南史河南宕昌鄧至武興並爲氐羌之地軍行不断蛮標盾曽子固集中政要䇿論南蛮云南蛮於四夷爲類最微然動輙一方受其患大中咸通之間安南之變是也宋興嘗設廣捷之兵習標牌之器皆以備蛮之爲患也狄武㐮平儂智髙記云賊執大盾標搶又云賊皆翳大盾翼两標謀主皆収漢畔亡合浦譙門腥血沸合浦郡廉州也漢陳勝傳戦譙門中註楼一名譙門上爲楼以望也晉興城下白骨荒晉興郡晉元帝置漢属鬱林郡隋廢爲宣化縣今邕州也盖㓂䧟欽廉邕三州也謀臣異時坐致㓂守臣今日愧包桑昜負且乘致㓂至又云其亡其亡繫于包桑巳遣戈船下灕水更分楼船浮豫章漢南粤王傳主爵都尉楊僕爲楼船將軍出豫章下横浦故歸義粤侯二人爲戈船下瀬將軍出零陵或灕水或抵蒼梧頗聞師出三鵶路通典板楯蠻篇云荆郢蠻大優動断三鵶路注云今南陽郡向城縣北至臨汝縣盡是中屯六郡良漢武帝選天水隴西安定北地上郡西河凡六郡良家子𥙷羽林以材力爲官名將多岀焉見地理志漢南食麥如食玉戦國䇿蘇秦曰使臣食玉炊桂湖南驅人如驅羊文選晉紀緫論云優天下如驅群羊注引淮南子云兵略者避實就虚若驅群羊營平請榖三百萬趙充國封營平侯本傳云金城湟中榖斛八錢吾謂耿中丞籴三百萬斛羗人不敢動矣耿中丞請籴百萬斛迺得四十萬斛耳祁連引兵九千里田廣明爲祁連將軍事見匈奴傳少府私錢不可知大農計歲今餘幾漢賈捐之傳論弃朱崖云臣竊以徃昔差軍言之暴師曽未一年兵出不踰千里費四十餘萬大農錢盡又以少府禁錢續之注云少府主供天子故日禁錢土兵畨馬貔虎同蝮蛇毒草篁竹中漢嚴助傳發兵誅南粤淮南王安上書諌曰越非有城郭邑里也處豀谷之間篁竹之中習於水闘又云林中多蝮蛇猛獸未論芻粟捐金費直愁瘴癘連營宫我思荆州李太守欲募蛮夷令自攻至今民歌尹殺我州郡擇人誠見功張喬祝良不難得誰借前筯開天聦後漢南蛮傳順帝永和二年日南象林徼外蛮夷攻象林縣殺長吏交趾刺史發交趾九真二郡兵萬餘人救之兵士惮逺役反攻其府二郡雖擊破反者而賊勢愈盛歲餘兵榖不継帝以爲憂明年召公卿百官問方畧皆議遣大將發荆楊兖豫四萬人赴之大將軍從事中郎李固駮曰云云其不可七也前中郎將尹就討益州諺曰虜來尚可尹來殺我後就召還以兵付刺史張喬喬因其將吏旬日之間破殄㓂虜此發將無益之効州郡可任之驗也冝更選有勇略仁惠任將帥者以爲刺史大守悉使共住交阯募蛮夷使自相攻故并州刺史長沙祝良性多勇决又南陽張喬前在益州有破虜之功皆可任用冝即拜良等便道之守四府悉從固議即拜祝良爲九真大守張喬爲交阯刺史喬至開示慰誘並皆降散良到九真單車入賊中設方畧招以威信降者数萬人皆爲良築起府寺由是嶺外悉平參同契云竭力勞精神終年無見功張良傳願借前筯而籌之書天聦明詔書哀痛言語切前漢西域賛遂弃輪䑓之地而下哀痛之詔爲民一洗横尸血椎鋒䧟堅賞萬户南粤王傳南粤巳平伏波將軍益封楼船將軍以椎鋒䧟堅爲將塹山堙谷窮三穴史記蒙恬傳始皇使蒙恬通道自九原抵甘泉塹山堙谷千八百里春秋後語馮煖謂孟嘗君曰狡兔有三窟南平舊時頗臣順欲献封疆請旄節廟謨猶計病中原豈知一朝更屠㓕天道從來不爭勝莊子曰天之道不爭而善勝功臣好爲可喜說交州雞肋安足貪後漢楊脩傳脩爲曹操主簿操平漢中出教曰雞肋而巳外曹莫能曉脩獨曰雞肋食之無所得棄之則可惜公歸計决矣漢開九郡勞臣監吕嘉不肯佩銀印漢南粤王趙佗傳大子興嗣立其母爲大后元鼎四年漢使安國少季喻王王太后入朝賜其丞相吕嘉銀印嘉反攻殺太后王盡殺漢使者元鼎五年路博得爲伏波將軍平南粤以其地爲九郡徴側持戈敵百男後漢馬援傳交阯女子徴側及女弟徴弍反攻没其郡拜援伏波將軍與賊戦破之斬徴側徴貳詩則百斯男君不見往年瀕海未郡縣趙佗閉閞罷朝献老翁竊帝聊自娱白頭抱孫思事漢孝文親遣勞苦書稽首請去黄屋車得一忘十終不忍大宗之仁千古無趙佗傳髙帝十一年遣陸賈立佗爲南粤王與剖符通使髙后時有司請禁粤閞市鐡器佗乃自尊号爲南粤武帝乘黄屋左纛文帝元年使陸賈使粤賜佗書云云聞王發兵於邊爲㓂長沙苦之雖王庸獨利乎必多殺士卒得一亡十朕不忍爲也又云王之号爲帝两帝並立亡一乘之使是爭也願與王分弃前悪通使如故陸賈至南粤王恐乃頓首謝願奉詔下令國中去帝制黄屋左纛因上書云妄竊帝号聊以自娱又云處粤四十九年于今抱孫焉文帝廟号太宗漢两粤賛云追懷太宗鎮撫尉佗豈古所謂懷逺以德者哉寄耿令幾父過新堂邑作堂邑乃幾父舊治之地􅊢博州當是大名解官經行此地解官是元豐二年歳巳未呼船凌大河驅馬踏平沙退之詩遂凌大江極東陬道傍開新邑千户有生涯四衢平且直尓雅四逹謂之衢緑槐隂縣衙問誰作此邑耆舊對予嗟前日耿令君遷民出拗窊退之聮句採日漉拗泓始遷民懷土異端極紛拏旣遷人氣和草木茂萌芽桃李雖不言春風滿城花陵陂青青麥煙雨潤桑麻自非耿令君大澤荒兼葭髙帝嘗息大澤之陂詩兼葭蒼蒼毛云蒹薕葭蘆也白頭晏起飯襁褓語嘔啞見前卷送呉彦詩云伊啞弄文襁自非耿令君漂轉隨魚鰕豈弟民父母不專司㰸賖周禮泉府歛市之不售貨之滯於民用者以其賈買之凡賖者祭祀無過旬日令君两男兒有得必丗家問令今安在解官駕柴車當時舞文吏漢張湯傳舞文巧詆白璧強生瑕相如傳曰璧有瑕請指示王令君䄂手去不忍試虎牙見上猛摩虎牙注人徃惜事廢感深知政嘉我聞耆舊語歎息至昏鴉見上定知循吏傳來者不能加今爲將軍客軒盖湛光華幕府省文書漢李廣傳幕府省文書醉歸接籬斜晉山簡傳童児歌曰山公出何許徃至髙陽池日夕倒戴歸茗艼無所知時時能騎馬倒着白接籬北史獨孤信在秦州嘗因獵日暮馳馬入城其㡌微側旦而吏人戴㡌者亦咸慕而側㡌焉懷寳仁者病語懷寳迷邦可謂仁乎偷安道之邪左傳宴安酖毒不可懷也又懷與安實敗名勉哉思爱日贈言同馬檛見第一卷折桞當馬䇿注文選馬融笛賦云剡其上孔通洞之裁以當簻使昜符注云簻馬䇿也爱日見上放言十首語虞仲夷逸隱居放言廢興冝有命語道之將行也與命也道之將廢也與命也得失但自知踽踽衆所忌悠悠誰與歸檀弓死者如可作也吾誰与歸吾義苟不存豈更月攘雞攘雞見孟子風清聞鶴唳想見南山棲晋謝玄傳符堅餘衆弃甲宵遁聞風聲鶴唳皆以為王師至此借風匣中緑綺琴文選張孟陽詩云佳人遺我緑綺琴注云傳玄琴賦序曰齊桓公有琴曰號鍾楚莊王有琴曰繞梁司馬相如有焦尾蔡邕有緑綺皆名器也欲抚巳絶絃何時絶鍾謝丗年見上正聲不可聞千載寂寞間未有顔叔子安知桞下賢昔者顔叔子獨處于室鄰之婺矛牙婦又獨處于室夜暴風雨至而室壞婦人趍而至顔叔子納之而使執燭放乎旦而蒸尽縮屋而継之自以為避慊之不審矣若其審者冝若鲁人然魯人有男子獨處于室鄰之婺矛牙婦又獨處于室夜暴風雨至而室壞婦人趍而托之男子閉户而不納婦人自牖与之言曰子何為不納我乎男子曰吾聞之也男子不六十不間居今子㓜吾亦㓜不可以納子婦人曰子何不若桞下惠然嫗不逮門之女囯人不称其乱男子日桞下惠固可吾固不可吾將以吾不可斈桞下惠之可孔子曰欲斈桞下恵者未有似於是輕肥馬上郎語乘肥馬衣輕裘杜云馬上誰家白面郎枯槁林下士屈原漁父篇顔色憔悴形容枯槁聲名斵自然自然見此章華胥注勢利焚和氣莊子外物篇利害相摩生火甚多衆人焚和智人不駭俗同朝皆用亊物外有華胥時時夢中至列子黄帝晝寢而夢遊於華胥氏之囯盖非舟車之所及神遊而巳其囯无帥長自然而巳其民无嗜慾自然而巳云云蘭楫桂為舟九歌云沛吾乘兮桂舟又云桂櫂兮蘭枻大江可逺遊堅車无良馬岀門敗吾輈子厚愚溪對云吾盪而趍不知太山之異乎九衢以敗吾車吾放而游不知吕梁之異乎安流以没吾舟一身交万物用我未昜周安得桞下惠窮年与之遊微雲起膚寸大䕃弥九州公羊春秋云觸石而岀膚寸而合不崇朝而徧雨乎天下者惟㤗山尓弥字取弥天之意晋習鑿齒傳時桑門釋道安与鑿齒相見道安曰弥天釋道安鑿齒曰四海習鑿齒石林詩話曰舊不解四海弥天為何等語因讀梁慧皎髙僧傳載鑿齒与道安書云夫不終朝而雨六合者弥天之雲也引渊源而潤八極者四海之流也因摘其語以為戯耳至仁雖爱物用捨如春秋晴空不成雨逺岫行歸休淵明云雲無心而出岫曹子建詩云朝雲不歸山暮雨成川澤此反其意何疑陶淵明一去如驚鷗淵明去官如海上之狎鷗人欲取而玩之則舞而不下事見列子黄鵠送黄鵠中道言别離漢西域傳烏孫公主作歌曰頋爲黄鵠兮歸故郷文選蘇子卿答李少卿云黄鵠一别逺千里顧徘徊又云頋爲双黄鵠送汝俱逺飛送君不惮逺愁見獨歸時退之送李貟外云飲中相頋色送後獨歸情羅網翳稲粱杜詩君㸔隨陽雁亦有稲粱謀江湖水㳽㳽行行不相見勉哉冥冥飛楊子雲鴻飛冥冥弋人何篡焉蝉聲巳紓遲秋日行晼晚宋玉九辯云白日晼晚其將入兮長年困道路驅馬方更逺從事常厭煩詩黽勉從事後漢書閔仲叔丗稱節士注引髙士傳云周黨遺之生蒜仲叔曰我欲省煩尓今更作煩耶歸心自如卷㫖甘良未豐安得懷息偃詩我心匪席不可卷也又云或偃息在床月滿不踰望日中爲之傾蔡澤傳語曰日中則移月滿則傾天地尚乃尔萬物能乆盈明德忌曄曄髙才貴冥冥顔延年祭屈原文云物忌堅芳人諱明㓗冥冥見上忽解扁舟去懷哉張季鷹晉張翰傳字季鷹齊王囧辟爲大司馬東曹椽因見秋風起乃思吴中菰菜蓴羮鱸魚鱠曰人生貴得適志何能覊官数千里以要名爵乎遂命駕而歸謝玄暉詩懷哉謝歡宴又毛詩懷哉懷哉榨床在東壁榨玉篇作醡又作􅶻仄射反切韻云壓酒具也病起繞壁行新醅浮白蟻渇見解朝酲劉伶傳五斗解酲小槽垂玉筯李賀云小槽滴酒真珠紅音響有餘清疾風春雨作静夜山泉鳴雨作泉鳴以喻槽床滴聲也安得朱絲絃爲我冩此聲禮記朱絃䟽越一唱而三歎有遺音者矣史記樂書衛靈公將之晉至於濮水之上夜半聞鼔琴聲召師㳙曰爲我聽而冩之想知舜南風正爾可人情禮記舜作五弦之琴以歌南風正爾見上弄水清江曲采薇南山隅史記伯夷傳隠於首陽山采薇而食之及餓且死作歌曰登彼西山采其薇矣當吾無事時此豈不可娱喬木好鳥音見伐木詩天風韻虚徐詩其虚其邪音徐遐心遊四海詩而有􅜯心陸機文賦精騖八區心游萬仞萬里不湏臾回首古衣冠荆樊老丘墟文選月賦曰臣東鄙幽介長自丘樊注引爾雅樊藩也郭璞曰藩籬也囬視古之衣冠者皆老於荆棘之籬丘壑墟落之間古衣冠謂背時也不隨時俯仰在熈寕間皆斥逐也欲付此中意歸翻䖝蠧書退之詩豈殊蠧書䖝生死文字間短生見上憂不足此道楽有餘送伯氏入都貧賤難安處别離更增悲老杜云乃知貧賤别更苦經營動北征慈母待春衣言母欲令待縫衣就乃行孟郊詩慈母手中線游子身上衣臨行宻宻縫意恐遲遲歸短箠驅瘦馬青草牧中嘶送行不知逺可忍獨㱕時見前篇送君不惮逺愁見獨㱕時注大華物華春街桞囀黄鸝王維詩隂隂夏木囀黄鸝九衢生紫煙退之詩子雲祗自守奚事九衢塵三輔舊事云長安城中八街九陌到家使人迷知音者誰子老杜詩伐木者誰子退之詩訏謀者誰子倦客無光輝王侯不可謁昜蠱上九不事王侯戦囯䇿蘇秦之楚三日乃得見乎王談卒辝而行曰楚囯之食貴於玉薪貴於桂謁者難得見如鬼王難得見如天帝今令臣食玉炊桂因鬼見帝秣馬興言㱕詩之子于㱕言秣其馬又云興言出宿又云言旋言㱕豈無他人遊不如我塤箎詩豈無他人不如我同姓又伯氏吹塤仲氏吹箎陳書北䆫下此自有餘師孟子㱕而求之有餘師次韻孔四著作北行滹沱駝褐蒙風霜雞聲渺墟里渊明詩暧暧逺人甘依依墟里煙青燈進豆粥後漢馮異傳光武自薊東南馳時天寒異上豆粥因復渡滹河落月踏氷水平生不龜薬纔可衛十指持比千户封誰能優劣此莊子逍遥篇宋人有善爲不龜手之薬者丗丗以洴澼絖爲事客聞之買其方百金以說呉王呉王使之將冬與越人水戦大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也渡河客行歳晚非逺遊河水無情日夜流去年排堤注東郡漢東郡治濮陽今澶州所治縣也詔使奪河還此州憶昔冬行河梁上文選李少卿詩携手上河梁遊子暮何之飛雪千里層冰壯杜詩交河幾蹴層冰裂又云安得赤脚踏曽冰盖取東方朔神異經云北方有層氷萬里人言河源凍徹天氷底猶聞沸驚浪漢書賛張騫窮河源次韻寄李六弟濟南郡城橋亭之詩得叟客心如頭垢日欲撩千箟聞人說江南喜氣吐晴霓大白詩意氣素蜺生伏枕夢歸路子規吟翠微杜䳌一名子規一名鷤䳏爾雅山未及上翠微濟南似江南済南今齊州濟南郡也後又升爲済南府舊見今不疑洗心欲成游王事相奪移文選曹顔逺詩田竇相奪移駑馬恋棧豆干寳晉紀曰桓範出赴曹爽宣王謂蔣済曰智囊徃矣済曰智則智矣駑馬恋芻豆爽不能用也豈能辭縶縲詩絷之維之以永今朝本無封侯骨見上見事又重遲史記范睢傳穰侯智士也其見事遲漢杜周傳周少言重遲徒能多着酒大腹如鴟夷楊雄酒箴曰䲭夷滑稽腹如大壷盡日盛酒人復借酤惟思一漁舟載網横渺瀰退之詩擺掉出渺瀰矯首歴下亭矯貢當是矯首諸本皆誤老杜有陪李北海宴歴下亭詩云海内此亭古済南名士多朱欄轉清溪春風吹桃李三月自成蹊見上翠葉張日幄文選陸士衡詩云宻葉成翠幄紅英鋪地衣紅錦地衣隨地縐此南唐李氏宫中歌詞也歐公稱之此中有佳興不醉定自非定自見上况當郡政成野蠒麥两歧漢光武紀建武二年野蠶成蠒𬒳於山阜張堪爲漁陽大守百姓歌曰桑無附枝麥穗兩歧見後漢書與民同觀游韓文汴州水門記云因而飾之匪爲觀游永夜不闔扉女墻上金樞文選海賦大明鑣轡於金樞之穴注云月也金西方也杜詩云缺月壞金樞天如青琉璃想子果下歸馬飽生芻嘶後漢書􅐮囯出果下馬注云髙三尺乘之可以果下行杜詩云生芻適馬性和甫得竹数本於周翰喜而和之𥘉侯一畒宮記儒行儒有一畒之宮環堵之室風雨到卧席前日築短垣囯語晉人謂呉曰君有短垣而自踰之昨日始封植平生歲寒心楽見歳寒色翩翩佳公子史記曰平原君翩翩濁丗之佳公子也爲致一䆫碧憶公來相居筮吉龜墨食洛誥云召公旣相宅又云惟洛食注云卜必先畫龜然後灼之兆湏食墨人言陋如何我自適其適莊子云適人之適而不自適其適陋如何見論語白眼見俗徒晋阮籍傳見礼法之士以白眼對之醉㡌坐欹側見上人知爱酒耳不解心得得莊子不自見而見彼不自得而得彼是謂得人之得而不自得其得者也阿堵絶往還晋王衍傳衍口未嘗言錢晨起見錢謂婢曰舉阿堵物却盖言將此物去耳後人遂以錢爲阿堵顧愷之傳云傳神冩照正在阿堵中盖謂目睛也然則目睛亦可稱阿堵乎盖相傳承誤耳此君是賔客徽之傳指竹曰何可一日無此君清風吹月來􅌚甚齒折屐謝安傳破堅驛書過户限心喜甚不斍屐齒之折有節似見聖書君陳凡人未見聖若不克見無言諒知黙楊雄觧嘲云知玄知黙守道之極数囬長者車猶恨地未僻杜詩地僻懶衣裳隂雨打葉時曲肱自夏息心游萬物𥘉莊子田子方篇老子曰吾游於物之𥘉何處㝷轍迹老子云善行無轍迹劉伶酒得頌云行無轍迹居無窒庐從來脩竹林乃是逸民囯晋阮咸傳與叔父籍爲竹林之游論語逸民乃夷齊之属後漢逸民傳盖隠士耳寄題傳欽之草堂此詩見秦少游集非山谷所作今不録戯荅伯充勸莫斈書及爲席子澤觧嘲此詩見前集巳有注更不録山谷外集詩註卷之三
