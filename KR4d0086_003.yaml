front:
  text: 山谷外集詩注卷第三
  hash: sha256:fd79aee3d305517606d88b327beb3d6aed1c3e784f1d05dbaf4fa02439a0f948
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0086_SBCK_003-1a}
body:
  text: 次韻謝外舅病不能拜復官夏雨眠起之什復官蓋熙寧十年丈人痾卧兹漢高彪傳公今飬痾傲士固其冝也文選謝靈運詩飬痾血園中又云卧痾對空林此道取衆棄史記白圭傳人棄我取人取我棄引此以言取捨與衆異耳山谷祭劉凝之文云執盈虛以化物取衆棄而致夥此乃言用白圭之術強飯尚可飽漢貢禹傳生其強飯慎疾以自輔力田苦常匱言力學而不遇時如力田而不逢年也欲從群兒嬉出語不嫵媚退之詩又不媚笑語不能伴兒嬉戲嫵媚見上軒窗坐風涼編簡堪遺墜漢劉歆傳經或脫簡傳或間編自安井無禽昜井卦𥘉六井泥不食舊井無禽注謂井不泄治禽所不向而况人乎一時所共棄師厚能安之焉未歎旅焚次旅卦九三旅焚其次喪其僕注謂次焚僕喪而身危也師厚幸未至此夏暑極陽功舒策陽常居大夏以主歲功時霖作隂事記昏義月食則后素服蕩天下之隂事呼兒疏藥畦植杖按瓜地植杖出語杜詩青門瓜地新凍裂南山雲氣佳北極冕旒邃爾雅北極謂之北辰禮天子冕十有二旒前後邃延自欣鬚髮白得見衣裳治係辝垂衣裳而天下治山林收枯稿草木洗憔悴砥痔以車來詩以爾車來莊子禦寇篇秦王有病召醫破癰潰瘡者得車一乘舐痔者得車五乘探珠遭龍睡禦寇篇又云河上有家貧恃緯蕭而食者其子沒於淵得千金之珠其父曰千金之珠必在九重之淵而􅌐龍頷下子能得珠者必遭其睡也腹便時蒙嘲後漢邊韶晝卧弟子私嘲之曰邊孝先腹便便懶讀書但欲眠身退得自恣莊周傳云其言汪洋自恣以適已伊憂無下僚骯髒謝髙位伊憂骯髒見上選詩英俊沉下僚誰能領斯會文選向秀思舊賦託運遇於領會注云領會冥理相會好在漆園吏選詩􅃮園有傲吏史記莊子蒙人也嘗為蒙􅃮園吏杜詩因君問消息好在阮元瑜桞子厚再上湘江詩好在湘江水今朝又上來次韻師厚五月十六日視田悼李彥深元注云去年五月十三日與遊西郊南鴈傳尺素古樂府中有尺素書飛來卧龍城見上頗知髙卧久忽作田野行湛湛陂水滿欣欣原草榮歸去來詞木欣欣以向榮泉涓涓而始流日華麗山川杜詩遲日江山麗秀色奪目精髙唐賦煌煌熒熒奪人目精對酒不滿懷攬物有餘清文選陸士衡詩安寢北堂上明月入我牖照之有餘輝攬之不盈手謝靈運詩密林含餘清念昔讀書客逺人遺丗情南畒道觀餉西郊留勸耕共遊如昨日笑語絶平生此事今巳矣賔筵老無成退之祭文甔石之儲常空於私室方丈之食每盛於賔進猶倚謝安石深心撫婺矛牙惸以安石比師厚婺矛牙謂無夫也左傳婺矛牙不恤其緯婺矛牙也何害巳為婺矛牙婦韻書惸憂也次韻師厚食蟹海饌糖蟹肥南史何㣧傳㣧侈於味食白魚鱔脯糖蟹使門人議之學生鍾岏曰鱔之就脯驟於屈伸蟹之將糖躁優彌甚江醪白蟻醇每恨腹未厭左昭二十八年願以小人之腹為君子之心屬厭而巳誇説齒生津三歲在河外霜臍常食新左成十年不食新矣朝泥看郭索大玄云蟹之郭索後矧黃泉林逋詩云草泥行郭索雲木呌鈎周暮鼎調酸辛戰國䇿楚語云黃雀晝遊乎茂樹夕調乎酸辛趨蹌雖入笑齊國風云巧趨蹌兮退之詩點綴簿上字趨蹌閣前鈴風味極可人憶觀淮南夜火攻不及晨借用晉周顗傳阿奴火攻固出下䇿橫行葭葦中雲溪友議曰皮日休螃蟹詩云海龍王處也橫行不自貴其身誰憐一網盡蘇子美監進奏院用市故𥿄錢祠神會客以自盜除名所會客皆一時賢俊悉坐貶逐中之者喜曰吾一舉網盡之矣此借用其字大去河伯民晏子春秋曰齊景公時大旱欲祀靈山及河晏子曰山以石為身草木為毛髮今不雨毛髮且焦身且熱山豈不欲雨乎河伯以水為國以魚鱉為民彼獨不欲雨乎祀之何益君冝避殿暴露公從之果大雨鼎司費萬錢漢彭宣云三公鼎足承君而鼎司字見於文選勸進表云臣等荷寵三丗位厠鼎司又陳琳為袁紹檄曹豫州云竊盜鼎司傾覆神器晉何曽為大傳日食萬錢玉食羅常珍法言云棄常珍而嗜異饌吾評楊州貢此物真絶倫楊雄􅐌以為絶倫次韻謝外舅食驢腸垂頭畏庖丁見上趍死尚能鳴退之秋懷詩浮生雖多途趍死惟一軌晉書王武子好驢鳴丗説王仲宣好驢鳴説以雕爼樂甘言果非誠莊子逹生篇祝宗人臨牢策説彘曰汝奚惡死吾將三月勝汝十日戒三日齊藉白茅加汝肩􅥑乎雕爼之上則汝為之乎左傳云幣重而言井誘我也生無千金轡老杜後出塞云千金買馬鞍樂府木蘭歌云南市買轡頭驢安得有此哉死得五鼎烹主父偃傳大丈夫生不五鼎食死則五鼎烹耳禍胎無腸胃枚乘書云福生有基禍生有胎殺身和椒橙春風都門道貫魚百十并昜剝卦貫魚以宫人寵魏志鄧艾傳魚貫而進騎奴吹一吷史記任安傳與騎奴同食莊子則陽篇吹劒首者吷而巳道堯舜於戴晉人之前譬猶一吷也駔駿不敢爭文選魏都賦曰兾馬填廄而駔駿馬賦云於時駔駿充階街兮注云説文曰駔壯也物材苟當用左傳隱五年凡物不足以講大事其材不足以備器用則君不舉又云取材以章物采謂之物何必渥窪生漢書禮樂志樂章有元狩三年馬生渥窪水中作忽思麒麟楦突兀使人驚朝野僉載云唐衢州盈川縣令楊炯恃才簡傲目朝官為麒麟楦人問之曰今假弄麒麟者刻畫頭角修飾皮毛覆之驢上及脫去皮楬還是驢耳無德而衣朱紫與此何異次韻師厚答馬著作屢贈詩嘗聞馬南郡後漢馬融傳為南郡太守少有技俗韻陶詩少無適俗韻性本愛丘山寒灰幾見溺韓安國傳安國坐法抵罪蒙獄吏田甲辱安國安國曰死灰當不復然乎甲曰然即溺之鎩翮常思奮文選五君詠詠嵇康云鸞翮有時鎩龍性誰能馴桐薪鳴竈間後漢蔡雍傳吳人有燒桐以㸑者雍聞火烈之聲知其良木因請而裁為琴果有美音而其尾猶焦故時人名焦尾琴劒氣吐吳分晉張華傳吳之未滅也斗牛之間常有紫氣吳平之後紫氣愈明華問雷煥是何祥也喚曰寶劒之精上徹於天耳多言丗益蚩老子多言數窮當律心自隱莊子言而當物則終日言而不盡自隱謂隱度也漢元帝紀自度曲應劭曰自隱度在新曲文選崔子玉座右銘云隱心而後動謗議庸何傷注云隱度也家雖四立壁見上仕要三無愠語三巳之無愠色會將漁父意往就莊生問莊子有漁父篇和答師厚黃連橋壞大木亦為秋雹所損溪橋喬木下往歲記經過居人指神社不敢尋柯用莊子檪社樹意也晉阮修伐杜樹或止之修曰若社而為樹伐樹則社移樹而為社伐樹則社亡矣左傳文七年此諺所謂庇焉而縱尋斧焉者也青隂百尺蔽白日烏鵲取意占作窠隋五行志童謡云可憐青雀子作窠猶未成黃泉浸根雨長葉造物著意固巳多風摧電打掃地盡太白詩春光掃地盡字本出楊雄羽獵賦軍驚師駭刮野掃地師古曰皆盡無遺餘也竟莫知為何譴訶漢薛宣傳云譴訶及細微獨山冷落城東路不見指名終不磨項羽傳非丗所指名也韓文吾立子名百丗不磨次韻師厚病間十首具錦不足歌詩巷伯萋兮斐兮成是具錦按實録熙寧五年五月追前提點成都府路刑獄司封郎中謝景𥘉兩官都官郎中李杲卿一官並勒停坐在成都府路踰濫故也今觀此詩蓋必有織成其罪者前集和邢惇夫秋懷云謝公藴風流詩作鮑照語絲蟲縈諌草筆力挾風雨萬里投諌書石交化豺虎石交不如謂何人請陳江漢詩江漢乃大雅篇名荀子賦篇天下不治請陳詭詩美人出江漢窈窕丗未窺文選張平子四愁詩序云依屈原以美人為君子以珍寶為仁義以水深雪氛為小人折蘭不肯佩告我以蠶飢溫飛卿詩云蠶飢使君馬鴈避將君箭玉臺新詠其略云秦氏有好女自言名羅敷羅敷善蠶桑採桑城南隅使君從南來五馬立踟蹰使君遣吏問寧可共載不羅敷前置詞使君一何愚云云獨歸豈憚逺三危路如飴吕氏春秋本味篇云水之美者三危之露崑崙之井大雅綿詩堇荼如飴德人更疢􅍚術智益灑落孟子曰人之有德慧術知者恆存乎疢􅍚反身見萬古孟子曰萬物皆備於我反身而誠樂莫大焉道不在卜度胸中有鏌鎁老境要志弱言內剛外柔也吳越春秋干將吳人也闔閭使作剱二曰干將曰莫耶莫耶干將之妻也道德經云實其腹弱其志注云和柔謙讓不處權也謝公賦逹生逹生真可託莊子有逹生篇引鏡照青骨驚非曩時人肇法師物不遷論云𣑽志出家白首而歸鄰人曰昔人尚存乎志曰吾猶昔人非昔人也天地入喻指莊子齊物篇以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也天地一指也萬物一馬也芭蕉自觀身維摩經是身如芭蕉中無有堅程力則已病征財又室貧古來支離疏粟帛王所仁莊子人間丗篇支離疏者頥隱於齊肩髙於項上有大役則支離以有常疾不受功上與病者粟則受三鍾與十束薪𦵔寒知園秋賈誼新書曰楚惠王食寒𦵔而得蛭遂吞之飯白問米賤老杜云與奴白飯馬青芻又云為問淮南米貴賤婦孫勸甘旨霜兔頗冝麵內則云慈以甘旨又云牛冝稌羊冝黍豕冝稷犬冝粱鴈冝麥黃花不舉酒佳句餘嫪戀嫪郎到切退之薦士詩念將決焉去感物增戀嫪經行宴坐堂維摩經曽於林中宴坐鼠迹書几硯語林曰簡文為撫軍時所坐牀上生塵不聽左右掃去見鼠行迹視以為佳桃李一春期松柏千歲永經玄事寂寞楊雄有解嘲云意者玄得無尚白乎又云惟寂惟寞守德之宅髮白官間冷草緑艾如張艾如張樂府篇名波淸􅈮司影春秋莊十八年秋有􅈮注短狐也􅍭沙射人為災音或官韻域或兩音博物志江南溪水中有射工蟲長一寸口中有努形氣射人影不治則殺人東里與無趾渠有幸不幸莊子德充符篇申屠嘉兀者也而與鄭子産同師於伯昏無人子産謂申屠嘉曰我先出則子止子先出則我止又云魯有兀者叔山無趾踵見仲尼仲尼曰子不謹前既犯患若是矣雖今來何及矣兩人皆兀者故誤以申屠嘉為無趾東里子産也病餘兒廢鋤門巷草芊眠楚詞云逺望兮阡眠陸士衡云林薄草阡眠謝元暉云阡眠起雜樹來者何所聞披草足跫然晉稽康傳康居貧煆於大樹之下以自贍給鍾會往造焉康不為之禮而煆不輟良久會去康謂曰何所聞而來何所見而去會曰聞所聞而來見所見而去會以此憾之言於文帝遂害之文選趙景珍書云披榛覔路蛩然見上封侯謝骨相李廣傳豈吾相不當封耶班超傳此萬里侯相也翟方進傳小史有封侯骨使鬼無金錢見上夢作白鷗去江湖水黏天退之祭張貟外文云洞庭漫汗黏天無壁前集有詩云夢作白鷗去江湖水如天莊子曰且汝夢為鳥而厲乎天夢為魚而沒於淵南史梁丗子方傳嘗著論曰吾嘗夢為魚因化為鳥方其夢也何樂如之民生自煎熬杜詩置膏烈火上哀哀自煎熬太白詩名利徒煎熬煮豆以其㸑丗説魏文帝使東阿王七步作詩不成當行大法王應聲曰萁在釡下燃豆在釡中泣本是同根生相煎何太急居然忘本根文子云形之與名居然別矣光隂不供玩桞子厚與李翰林書云悠悠人丗不過為四十年客耳前過三十七年與瞬息無異後所得者其不足把玩亦巳審矣藏山夜半失莊子大宗師篇云藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走烏合歸星散文選晉紀總論云新起之寇烏合之衆注引𬋩子書云烏合之衆𥘉雖相歡後必相噬蜀志薑維傳曰星散流離死者甚衆因病見不生逹人果大觀維摩經云我不任詣彼問疾云云諸法畢竟不生不滅又云法本不生今則無滅逹人大觀見上開田種白玉搜神記曰羊公雍伯性篤孝父母亡葬無終山遂家焉山髙無水公作義漿有一人就飲以一斗石子與種之云玉當生其中種之得白璧五雙飽牛事耕犂雨露非無澤得秋常苦遲猛虎擅文章語虎豹之鞟猶犬羊之鞟正義曰此章貴尚文章斑斑𬒳諸兒上林賦曰𬒳班文文選七命云拉虎摧斑長松抱徑莭唯有歲寒知見論語謝公蒔蘭苕文選陸士衡詩翡翠係蘭苕容色更相鮮真意付此物惠然風肯來詩惠然肯來香為一披拂莊子天運篇孰居無事而披拂是遙知醉吟姿黽勉向朱紱詩黽勉求之昜困卦朱紱方來杜詩朱紱負平生師厚𥘉復官得襄陽倅榰笻橘柚黃僧屋對像佛身病心輕安道肥體癯瘦韓非子云子夏見曽子曽子曰何肥也曰戰勝故肥吾入見先王之義則榮之出見冨貴之樂則又榮之兩者交戰於胸中未知勝負故癯今先王之義勝故肥好懷當告誰四墻棗紅皺退之聮句紅皺曬簷瓦黃團繫門衡負暄不可獻列子楊朱篇云宋國有田父常衣緼黂僅以過冬暨春東作自曝於日不知天下之有廣厦隩室綿纊狐狢顧謂其妻曰負日之暄人莫知者以獻吾君將有重賞捫虱坐清晝見上端有真冨貴樂天詩為報髙蓋車恐非真冨貴千秋萬年後杜詩千秋萬歲名寂寞身後事以上與師厚贈答凡十八篇非同時作後人類聚於此和謝公定征南謡漢武平南粵分其地為儋耳朱崖南海蒼梧鬱林合浦交趾九真日南凡九郡置交州刺史以領之唐改交州總𬋩又改安南都護國朝封其主為交趾郡王進南平王神宗王安石秉政獻言者謂交趾可取乃以蕭注知桂州有獻䇿平交州者輒火其書沈起獨言交州小醜無不可取之理安石喜乃罷注以起知桂州不能懷輯又禁交趾與州縣貿昜熙寧八年交趾入寇陷欽廉二州遂圍雍州城陷大守蘇緘死之神宗以趙卨為招討使總九將軍進討既又以郭逵為宣撫使而卨副之逹至長沙督諸將進兵復雍州遣將拔永安州溪洞悉降交趾乘船迎戰達破之賊勢蹙乃乞降凡費錢帛金銀糧草五百一十九萬貫匹兩石二廣之民大困此其大略也李乾德降蓋熙寧十年二月時山谷猶在北京然此詩未必是此時作傳聞交州𥘉陸梁楊雄甘泉賦云飛蒙茸而走陸梁東連五溪西氐差後漢馬援傳擊武陵五溪蠻夷注云􅐱元注水經曰武陵有五溪謂雄溪捫溪西溪潕溪辰溪悉是蠻夷所居皆槃瓠子孫在今辰州界南史河南宕昌鄧至武興並為氐羌之地軍行不斷蠻標盾曽子固集中政要䇿論南蠻云南蠻於四夷為類最微然動輒一方受其患大中咸通之間安南之變是也宋興嘗設廣捷之兵習標牌之器皆以備蠻之為患也狄武襄平儂智髙記云賊執大盾標搶又云賊皆翳大盾翼兩標謀主皆收漢畔亡合浦譙門腥血沸合浦郡廉州也漢陳勝傳戰譙門中注樓一名譙門上為樓以望也晉興城下白骨荒晉興郡晉元帝置漢屬鬱林郡隋廢為宣化縣今雍州也蓋寇陷欽廉雍三州也謀臣異時坐致寇守臣今日愧包桑昜負且乘致寇至又云其亡其亡繫于包桑巳遣戈船下灕水更分樓船浮豫章漢南粵王傳主爵都尉楊僕為樓船將軍出豫章下橫浦故歸義粵侯二人為戈船下瀨將軍出零陵或灕水或抵蒼梧頗聞師出三鴉路通典板楯蠻篇云荆郢蠻大優動斷三鴉路注云今南陽郡向城縣北至臨汝縣盡是中屯六郡良漢武帝選天水隴西安定北地上郡西河凡六郡良家子輔羽林以材力為官名將多出焉見地理志漢南食麥如食玉戰國䇿蘇秦曰使臣食玉炊桂湖南驅人如驅羊文選晉紀總論云優天下如驅群羊注引淮南子云兵略者避實就虛若驅群羊營平請榖三百萬趙充國封營平侯本傳云金城湟中榖斛八錢吾謂耿中丞糴三百萬斛羌人不敢動矣耿中丞請糴百萬斛乃得四十萬斛耳祁連引兵九千里田廣明為祁連將軍事見胸奴傳少府私錢不可知大農計歲今餘幾漢賈捐之傳論棄朱崖云臣竊以往昔差軍言之暴師曽未一年兵出不踰千里費四十餘萬大農錢盡又以少府禁錢續之注云少府主供天子故日禁錢土兵畨馬貔虎同蝮蛇毒草篁竹中漢嚴助傳發兵誅南粵淮南王安上書諌曰越非有城郭邑里也處豀谷之間篁竹之中習於水鬪又云林中多蝮蛇猛獸未論芻粟捐金費直愁瘴癘連營宫我思荆州李太守欲募蠻夷令自攻至今民歌尹殺我州郡擇人誠見功張喬祝良不難得誰借前筯開天聰後漢南蠻傳順帝永和二年日南象林徼外蠻夷攻象林縣殺長吏交趾刺史發交趾九真二郡兵萬餘人救之兵士憚逺役反攻其府二郡雖擊破反者而賊勢愈盛歲餘兵榖不繼帝以為憂明年召公卿百官問方略皆議遣大將發荆楊兖豫四萬人赴之大將軍從事中郎李固駮曰云云其不可七也前中郎將尹就討益州諺曰虜來尚可尹來殺我後就召還以兵付刺史張喬喬因其將吏旬日之間破殄寇虜此發將無益之效州郡可任之驗也冝更選有勇略仁惠任將帥者以為刺史大守悉使共住交址募蠻夷使自相攻故并州刺史長沙祝良性多勇決又南陽張喬前在益州有破虜之功皆可任用冝即拜良等便道之守四府悉從固議即拜祝良為九真大守張喬為交址刺史喬至開示慰誘並皆降散良到九真單車入賊中設方略招以威信降者數萬人皆為良築起府寺由是嶺外悉平參同契云竭力勞精神終年無見功張良傳願借前筯而籌之書天聰明詔書哀痛言語切前漢西域贊遂棄輪臺之地而下哀痛之詔為民一洗橫尸血椎鋒陷堅賞萬户南粵王傳南粵巳平伏波將軍益封樓船將軍以椎鋒陷堅為將塹山堙谷窮三穴史記蒙恬傳始皇使蒙恬通道自九原抵甘泉塹山堙谷千八百里春秋後語馮暖謂孟嘗君曰狡兔有三窟南平舊時頗臣順欲獻封疆請旄節廟謨猶計病中原豈知一朝更屠滅天道從來不爭勝莊子曰天之道不爭而善勝功臣好為可喜説交州雞肋安足貪後漢楊修傳修為曹操主簿操平漢中出教曰雞肋而巳外曹莫能曉修獨曰雞肋食之無所得棄之則可惜公歸計決矣漢開九郡勞臣監吕嘉不肯佩銀印漢南粵王趙他傳大子興嗣立其母為大后元鼎四年漢使安國少季喻王王太后入朝賜其丞相吕嘉銀印嘉反攻殺太后王盡殺漢使者元鼎五年路博得為伏波將軍平南粵以其地為九郡徴側持戈敵百男後漢馬援傳交址女子徴側及女弟徴二反攻沒其郡拜援伏波將軍與賊戰破之斬徴側徴二詩則百斯男君不見往年瀕海未郡縣趙他閉閞罷朝獻老翁竊帝聊自娛白頭抱孫思事漢孝文親遣勞苦書稽首請去黃屋車得一忘十終不忍大宗之仁千古無趙他傳髙帝十一年遣陸賈立他為南粵王與剖符通使髙后時有司請禁粵閞市鐡器他乃自尊號為南粵武帝乘黃屋左纛文帝元年使陸賈使粵賜他書云云聞王發兵於邊為寇長沙苦之雖王庸獨利乎必多殺士卒得一亡十朕不忍為也又云王之號為帝兩帝並立亡一乘之使是爭也願與王分棄前惡通使如故陸賈至南粵王恐乃頓首謝願奉詔下令國中去帝制黃屋左纛因上書云妄竊帝號聊以自娛又云處粵四十九年于今抱孫焉文帝廟號太宗漢兩粵贊云追懷太宗鎮撫尉他豈古所謂懷逺以德者哉寄耿令幾父過新堂邑作堂邑乃幾父舊治之地􅊢博州當是大名解官經行此地解官是元豐二年歲巳未呼船凌大河驅馬踏平沙退之詩遂凌大江極東陬道傍開新邑千户有生涯四衢平且直尓雅四逹謂之衢緑槐隂縣衙問誰作此邑耆舊對豫嗟前日耿令君遷民出拗窊退之聮句採日漉拗泓始遷民懷土異端極紛拏既遷人氣和草木茂萌芽桃李雖不言春風滿城花陵陂青青麥煙雨潤桑麻自非耿令君大澤荒兼葭髙帝嘗息大澤之陂詩兼葭蒼蒼毛云蒹薕葭蘆也白頭晏起飯襁褓語嘔啞見前卷送吳彥詩云伊啞弄文襁自非耿令君漂轉隨魚蝦豈弟民父母不專司㰸賖周禮泉府斂市之不售貨之滯於民用者以其賈買之凡賖者祭祀無過旬日令君兩男兒有得必丗家問令今安在解官駕柴車當時舞文吏漢張湯傳舞文巧詆白璧強生瑕相如傳曰璧有瑕請指示王令君袖手去不忍試虎牙見上猛摩虎牙注人往惜事廢感深知政嘉我聞耆舊語歎息至昏鴉見上定知循吏傳來者不能加今為將軍客軒蓋湛光華幕府省文書漢李廣傳幕府省文書醉歸接籬斜晉山簡傳童兒歌曰山公出何許往至髙陽池日夕倒戴歸茗艼無所知時時能騎馬倒著白接籬北史獨孤信在秦州嘗因獵日暮馳馬入城其帽微側旦而吏人戴帽者亦咸慕而側帽焉懷寶仁者病語懷寶迷邦可謂仁乎偷安道之邪左傳宴安鴆毒不可懷也又懷與安實敗名勉哉思愛日贈言同馬檛見第一卷折桞當馬䇿注文選馬融笛賦云剡其上孔通洞之裁以當簻使昜符注云簻馬䇿也愛日見上放言十首語虞仲夷逸隱居放言廢興冝有命語道之將行也與命也道之將廢也與命也得失但自知踽踽衆所忌悠悠誰與歸檀弓死者如可作也吾誰與歸吾義苟不存豈更月攘雞攘雞見孟子風清聞鶴唳想見南山棲晉謝玄傳符堅餘衆棄甲宵遁聞風聲鶴唳皆以為王師至此借風匣中緑綺琴文選張孟陽詩云佳人遺我緑綺琴注云傳玄琴賦序曰齊桓公有琴曰號鍾楚莊王有琴曰繞梁司馬相如有焦尾蔡雍有緑綺皆名器也欲撫巳絶絃何時絶鍾謝丗年見上正聲不可聞千載寂寞間未有顔叔子安知桞下賢昔者顔叔子獨處于室鄰之婺矛牙婦又獨處于室夜暴風雨至而室壞婦人趍而至顔叔子納之而使執燭放乎旦而蒸盡縮屋而繼之自以為避慊之不審矣若其審者冝若魯人然魯人有男子獨處于室鄰之婺矛牙婦又獨處于室夜暴風雨至而室壞婦人趍而托之男子閉户而不納婦人自牖與之言曰子何為不納我乎男子曰吾聞之也男子不六十不間居今子幼吾亦幼不可以納子婦人曰子何不若桞下惠然嫗不逮門之女國人不稱其亂男子日桞下惠固可吾固不可吾將以吾不可學桞下惠之可孔子曰欲學桞下惠者未有似於是輕肥馬上郎語乘肥馬衣輕裘杜云馬上誰家白面郎枯稿林下士屈原漁父篇顔色憔悴形容枯稿聲名斫自然自然見此章華胥注勢利焚和氣莊子外物篇利害相摩生火甚多衆人焚和智人不駭俗同朝皆用事物外有華胥時時夢中至列子黃帝晝寢而夢遊於華胥氏之國蓋非舟車之所及神遊而巳其國無帥長自然而巳其民無嗜欲自然而巳云云蘭楫桂為舟九歌云沛吾乘兮桂舟又云桂棹兮蘭枻大江可逺遊堅車無良馬出門敗吾輈子厚愚溪對云吾蕩而趍不知太山之異乎九衢以敗吾車吾放而遊不知吕梁之異乎安流以沒吾舟一身交万物用我未昜周安得桞下惠窮年與之遊微雲起膚寸大蔭彌九州公羊春秋云觸石而出膚寸而合不崇朝而遍雨乎天下者惟泰山尓彌字取彌天之意晉習鑿齒傳時桑門釋道安與鑿齒相見道安曰彌天釋道安鑿齒曰四海習鑿齒石林詩話曰舊不解四海彌天為何等語因讀梁慧皎髙僧傳載鑿齒與道安書云夫不終朝而雨六合者彌天之雲也引淵源而潤八極者四海之流也因摘其語以為戲耳至仁雖愛物用捨如春秋晴空不成雨逺岫行歸休淵明云雲無心而出岫曹子建詩云朝雲不歸山暮雨成川澤此反其意何疑陶淵明一去如驚鷗淵明去官如海上之狎鷗人欲取而玩之則舞而不下事見列子黃鵠送黃鵠中道言别離漢西域傳烏孫公主作歌曰顧為黃鵠兮歸故鄉文選蘇子卿答李少卿云黃鵠一别逺千里顧徘徊又云顧為雙黃鵠送汝俱逺飛送君不憚逺愁見獨歸時退之送李貟外云飲中相顧色送後獨歸情羅網翳稻粱杜詩君看隨陽雁亦有稻粱謀江湖水瀰瀰行行不相見勉哉冥冥飛楊子雲鴻飛冥冥弋人何篡焉蟬聲巳紓遲秋日行晼晚宋玉九辨云白日晼晚其將入兮長年困道路驅馬方更逺從事常厭煩詩黽勉從事後漢書閔仲叔丗稱節士注引髙士傳云周黨遺之生蒜仲叔曰我欲省煩尓今更作煩耶歸心自如卷旨甘良未豐安得懷息偃詩我心匪席不可卷也又云或偃息在床月滿不踰望日中為之傾蔡澤傳語曰日中則移月滿則傾天地尚乃爾萬物能久盈明德忌曄曄髙才貴冥冥顔延年祭屈原文云物忌堅芳人諱明潔冥冥見上忽解扁舟去懷哉張季鷹晉張翰傳字季鷹齊王囧辟為大司馬東曹椽因見秋風起乃思吳中菰菜蓴羮鱸魚鱠曰人生貴得適志何能羈官數千里以要名爵乎遂命駕而歸謝玄暉詩懷哉謝歡宴又毛詩懷哉懷哉榨床在東壁榨玉篇作醡又作􅶻仄射反切韻云壓酒具也病起繞壁行新醅浮白蟻渴見解朝酲劉伶傳五斗解酲小槽垂玉筯李賀云小槽滴酒真珠紅音響有餘清疾風春雨作靜夜山泉鳴雨作泉鳴以喻槽床滴聲也安得朱絲絃為我寫此聲禮記朱絃疏越一唱而三歎有遺音者矣史記樂書衛靈公將之晉至於濮水之上夜半聞鼓琴聲召師涓曰為我聽而寫之想知舜南風正爾可人情禮記舜作五弦之琴以歌南風正爾見上弄水清江曲采薇南山隅史記伯夷傳隱於首陽山采薇而食之及餓且死作歌曰登彼西山采其薇矣當吾無事時此豈不可娛喬木好鳥音見伐木詩天風韻虛徐詩其虛其邪音徐遐心遊四海詩而有􅜯心陸機文賦精騖八區心遊萬仞萬里不須臾回首古衣冠荆樊老丘墟文選月賦曰臣東鄙幽介長自丘樊注引爾雅樊藩也郭璞曰藩籬也回視古之衣冠者皆老於荆棘之籬丘壑墟落之間古衣冠謂背時也不隨時俯仰在熙寧間皆斥逐也欲付此中意歸翻蟲蠧書退之詩豈殊蠧書蟲生死文字間短生見上憂不足此道樂有餘送伯氏入都貧賤難安處别離更增悲老杜云乃知貧賤别更苦經營動北征慈母待春衣言母欲令待縫衣就乃行孟郊詩慈母手中線遊子身上衣臨行密密縫意恐遲遲歸短箠驅瘦馬青草牧中嘶送行不知逺可忍獨歸時見前篇送君不憚逺愁見獨歸時注大華物華春街桞囀黃鸝王維詩隂隂夏木囀黃鸝九衢生紫煙退之詩子雲祗自守奚事九衢塵三輔舊事云長安城中八街九陌到家使人迷知音者誰子老杜詩伐木者誰子退之詩訏謀者誰子倦客無光輝王侯不可謁昜蠱上九不事王侯戰國䇿蘇秦之楚三日乃得見乎王談卒辝而行曰楚國之食貴於玉薪貴於桂謁者難得見如鬼王難得見如天帝今令臣食玉炊桂因鬼見帝秣馬興言歸詩之子于歸言秣其馬又云興言出宿又云言旋言歸豈無他人遊不如我塤箎詩豈無他人不如我同姓又伯氏吹塤仲氏吹箎陳書北窗下此自有餘師孟子歸而求之有餘師次韻孔四著作北行滹沱駝褐蒙風霜雞聲渺墟里淵明詩曖曖逺人甘依依墟里煙青燈進豆粥後漢馮異傳光武自薊東南馳時天寒異上豆粥因復渡滹河落月踏氷水平生不龜藥才可衛十指持比千户封誰能優劣此莊子逍遙篇宋人有善為不龜手之藥者丗丗以洴澼絖為事客聞之買其方百金以説吳王吳王使之將冬與越人水戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也渡河客行歲晚非逺遊河水無情日夜流去年排堤注東郡漢東郡治濮陽今澶州所治縣也詔使奪河還此州憶昔冬行河梁上文選李少卿詩携手上河梁遊子暮何之飛雪千里層冰壯杜詩交河幾蹴層冰裂又云安得赤腳踏曽冰蓋取東方朔神異經云北方有層氷萬里人言河源凍徹天氷底猶聞沸驚浪漢書贊張騫窮河源次韻寄李六弟濟南郡城橋亭之詩得叟客心如頭垢日欲撩千箟聞人説江南喜氣吐晴霓大白詩意氣素霓生伏枕夢歸路子規吟翠微杜鵑一名子規一名鷤鵙爾雅山未及上翠微濟南似江南濟南今齊州濟南郡也後又升為濟南府舊見今不疑洗心欲成遊王事相奪移文選曹顔逺詩田竇相奪移駑馬戀棧豆干寶晉紀曰桓範出赴曹爽宣王謂蔣濟曰智囊往矣濟曰智則智矣駑馬戀芻豆爽不能用也豈能辭縶縲詩縶之維之以永今朝本無封侯骨見上見事又重遲史記范睢傳穰侯智士也其見事遲漢杜周傳周少言重遲徒能多著酒大腹如鴟夷楊雄酒針曰鴟夷滑稽腹如大壷盡日盛酒人復借酤惟思一漁舟載網橫渺瀰退之詩擺掉出渺瀰矯首歷下亭矯貢當是矯首諸本皆誤老杜有陪李北海宴歷下亭詩云海內此亭古濟南名士多朱欄轉清溪春風吹桃李三月自成蹊見上翠葉張日幄文選陸士衡詩云密葉成翠幄紅英鋪地衣紅錦地衣隨地皺此南唐李氏宫中歌詞也歐公稱之此中有佳興不醉定自非定自見上况當郡政成野繭麥兩歧漢光武紀建武二年野蠶成繭𬒳於山阜張堪為漁陽大守百姓歌曰桑無附枝麥穗兩歧見後漢書與民同觀遊韓文汴州水門記云因而飾之匪為觀遊永夜不闔扉女墻上金樞文選海賦大明鑣轡於金樞之穴注云月也金西方也杜詩云缺月壞金樞天如青琉璃想子果下歸馬飽生芻嘶後漢書􅐮國出果下馬注云髙三尺乘之可以果下行杜詩云生芻適馬性和甫得竹數本於周翰喜而和之𥘉侯一畒宮記儒行儒有一畒之宮環堵之室風雨到卧席前日築短垣國語晉人謂吳曰君有短垣而自踰之昨日始封植平生歲寒心樂見歲寒色翩翩佳公子史記曰平原君翩翩濁丗之佳公子也為致一窗碧憶公來相居筮吉龜墨食洛誥云召公既相宅又云惟洛食注云卜必先畫龜然後灼之兆須食墨人言陋如何我自適其適莊子云適人之適而不自適其適陋如何見論語白眼見俗徒晉阮籍傳見禮法之士以白眼對之醉帽坐欹側見上人知愛酒耳不解心得得莊子不自見而見彼不自得而得彼是謂得人之得而不自得其得者也阿堵絶往還晉王衍傳衍口未嘗言錢晨起見錢謂婢曰舉阿堵物却蓋言將此物去耳後人遂以錢為阿堵顧愷之傳云傳神寫照正在阿堵中蓋謂目睛也然則目睛亦可稱阿堵乎蓋相傳承誤耳此君是賔客徽之傳指竹曰何可一日無此君清風吹月來􅌚甚齒折屐謝安傳破堅驛書過户限心喜甚不覺屐齒之折有節似見聖書君陳凡人未見聖若不克見無言諒知默楊雄解嘲云知玄知默守道之極數回長者車猶恨地未僻杜詩地僻懶衣裳隂雨打葉時曲肱自夏息心遊萬物𥘉莊子田子方篇老子曰吾遊於物之𥘉何處尋轍迹老子云善行無轍迹劉伶酒得頌云行無轍迹居無窒廬從來修竹林乃是逸民國晉阮咸傳與叔父籍為竹林之遊論語逸民乃夷齊之屬後漢逸民傳蓋隱士耳寄題傳欽之草堂此詩見秦少遊集非山谷所作今不録戲答伯充勸莫學書及為席子澤解嘲此詩見前集巳有注更不録山谷外集詩注卷之三
